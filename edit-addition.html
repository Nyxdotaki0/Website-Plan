<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" href="favicon.png">
    <title>Edit Addition - Nullverse</title>

    <script>
        const savedNullverseTheme =
            localStorage.getItem("nullverse-theme") || "void";

        document.documentElement.setAttribute(
            "data-theme",
            savedNullverseTheme
        );
    </script>

    <link rel="stylesheet" href="theme.css?v=20">

    <style>
        html {
            min-height: 100%;
            background: #000;
        }

        body {
            margin: 0;
            min-height: 100vh;
            font-family: Arial,sans-serif;
            background: var(--page-bg);
            background-attachment: fixed;
            color: var(--text-primary);
        }

        header {
            padding: 12px 40px;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(12,12,14,0.72);
            position: sticky;
            top: 0;
            z-index: 100;
            backdrop-filter: blur(18px);
            -webkit-backdrop-filter: blur(18px);
            box-shadow: 0 10px 35px rgba(0,0,0,0.28);
        }

        .logo,
        .logo a {
            display: flex;
            align-items: center;
        }

        .site-logo {
            height: 64px;
            width: auto;
            display: block;
            max-width: none;
        }

        nav {
            display: flex;
            gap: 22px;
            align-items: center;
            flex-wrap: wrap;
        }

            nav a,
            nav button {
                color: var(--text-secondary);
                text-decoration: none;
                background: none;
                border: none;
                cursor: pointer;
                font-family: Arial,sans-serif;
                font-size: .95rem;
                transition: .18s ease;
            }

                nav a:hover,
                nav button:hover {
                    color: white;
                }

        main {
            max-width: 950px;
            margin: auto;
            padding: 48px 40px 80px;
        }

        .hero,
        .panel {
            background: linear-gradient( 135deg, rgba(255,255,255,0.06), rgba(255,255,255,0.02) ), var(--panel-bg);
            border: 1px solid var(--border-color);
            border-radius: 22px;
            padding: 32px;
            margin-bottom: 24px;
            backdrop-filter: blur(18px);
            -webkit-backdrop-filter: blur(18px);
            box-shadow: 0 18px 40px rgba(0,0,0,0.24), 0 0 24px rgba(255,255,255,0.03);
        }

        .hero {
            position: relative;
            overflow: hidden;
        }

            .hero::before {
                content: "";
                position: absolute;
                inset: 0;
                background: radial-gradient(circle at top right, rgba(255,255,255,0.06), transparent 36%);
                pointer-events: none;
            }

        h1 {
            margin: 0 0 10px;
            font-size: 2.7rem;
            line-height: 1.05;
        }

        p {
            color: var(--text-secondary);
            line-height: 1.7;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: var(--text-primary);
        }

        input,
        textarea,
        select {
            width: 100%;
            box-sizing: border-box;
            padding: 14px;
            border-radius: 14px;
            border: 1px solid var(--border-color);
            background: rgba(0,0,0,0.22);
            color: white;
            font-family: Arial,sans-serif;
            margin-bottom: 18px;
            transition: .18s ease;
        }

            input:focus,
            textarea:focus,
            select:focus {
                outline: none;
                border-color: rgba(255,255,255,0.16);
                box-shadow: 0 0 18px rgba(255,255,255,0.05);
            }

        textarea {
            resize: vertical;
        }

        .button {
            display: inline-block;
            background: linear-gradient( 180deg, #2a2a2f 0%, #16161a 45%, #0d0d10 100% );
            color: #f5f5f5;
            border: 1px solid rgba(255,255,255,0.12);
            padding: 11px 15px;
            border-radius: 12px;
            cursor: pointer;
            text-decoration: none;
            font-family: Arial,sans-serif;
            font-size: .95rem;
            transition: .18s ease;
            box-shadow: 0 0 16px rgba(255,255,255,0.08), inset 0 1px 0 rgba(255,255,255,0.06);
        }

            .button:hover {
                background: linear-gradient( 180deg, #3a3a40 0%, #202026 45%, #111116 100% );
                border-color: rgba(255,255,255,0.18);
                transform: translateY(-1px);
                box-shadow: 0 0 20px rgba(255,255,255,0.12), inset 0 1px 0 rgba(255,255,255,0.08);
            }

        .primary {
            background: linear-gradient( 180deg, #3a3a40 0%, #1d1d22 45%, #101014 100% );
            border-color: rgba(255,255,255,0.16);
        }

            .primary:hover {
                background: linear-gradient( 180deg, #4a4a50 0%, #26262c 45%, #151519 100% );
            }

        .empty {
            color: var(--text-muted);
        }

        .cover-preview {
            width: 100%;
            height: 220px;
            object-fit: cover;
            border-radius: 18px;
            border: 1px solid var(--border-color);
            margin-bottom: 18px;
            box-shadow: 0 14px 32px rgba(0,0,0,0.24);
        }

        .actions {
            display: flex;
            justify-content: space-between;
            gap: 12px;
            flex-wrap: wrap;
            margin-top: 22px;
            padding-top: 18px;
            border-top: 1px solid var(--border-soft);
        }

        .info-wrap {
            display: flex;
            align-items: center;
            gap: 8px;
            position: relative;
            margin-bottom: 8px;
            width: fit-content;
        }

            .info-wrap label,
            .info-wrap h1 {
                margin: 0;
            }

        .info-icon {
            width: 18px;
            height: 18px;
            border-radius: 50%;
            border: 1px solid rgba(255,255,255,0.18);
            color: var(--text-secondary);
            background: rgba(255,255,255,0.04);
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-size: .7rem;
            font-style: italic;
            font-weight: bold;
            cursor: pointer;
            user-select: none;
            transition: .18s ease;
        }

            .info-icon:hover {
                color: white;
                border-color: rgba(255,255,255,0.34);
                background: rgba(255,255,255,0.08);
            }

        .tooltip {
            position: absolute;
            left: 100%;
            top: 50%;
            transform: translate(12px,-50%);
            width: 270px;
            background: linear-gradient( 180deg, rgba(255,255,255,0.05), rgba(255,255,255,0.015) ), #0b0b0d;
            border: 1px solid var(--border-color);
            border-radius: 14px;
            padding: 13px 15px;
            color: var(--text-secondary);
            line-height: 1.6;
            font-size: .9rem;
            opacity: 0;
            visibility: hidden;
            pointer-events: none;
            z-index: 1000;
            backdrop-filter: blur(18px);
            box-shadow: 0 16px 40px rgba(0,0,0,.45);
        }

        @media (hover: hover) {
            .info-icon:hover + .tooltip {
                opacity: 1;
                visibility: visible;
            }
        }

        .tooltip.open {
            opacity: 1;
            visibility: visible;
            pointer-events: auto;
        }

        @media (max-width: 800px) {

            header {
                flex-direction: column;
                gap: 14px;
                padding: 20px;
            }

            nav {
                justify-content: center;
            }

            main {
                padding: 34px 24px 70px;
            }

            h1 {
                font-size: 2.1rem;
            }

            .hero,
            .panel {
                padding: 24px;
            }

            .tooltip {
                left: 0;
                top: calc(100% + 8px);
                transform: none;
                width: 240px;
            }
        }
    </style>
</head>
<body>
    <header>
        <div class="logo">
            <a href="index.html">
                <img src="Nullverse-3.png" alt="Nullverse" class="site-logo">
            </a>
        </div>
        <nav>
            <a href="index.html">Home</a>
            <a href="explore.html">Explore</a>
            <a href="dashboard.html">Dashboard</a>
            <button onclick="logOut()">Log Out</button>
        </nav>
    </header>

    <main>
        <a id="back-link" class="button">← Back to Addition</a>

        <section class="hero" style="margin-top:24px;">
            <h1>Edit Community Addition</h1>
            <p id="page-subtitle">Loading addition...</p>
        </section>

        <section class="panel">
            <label>Addition Type</label>
            <select id="addition-type">
                <option>Story</option>
                <option>Character</option>
                <option>Location</option>
                <option>Language</option>
                <option>Lore</option>
                <option>Timeline</option>
                <option>Map</option>
                <option>Custom</option>
            </select>

            <label>Title</label>
            <input id="addition-title">

            <label>Short Summary</label>
<textarea id="addition-summary" rows="4"></textarea>

            <label>Cover Image</label>
            <div id="cover-preview"></div>
            <input id="addition-cover" type="file" accept="image/*">

            <label>Main Content</label>
<textarea id="addition-content" rows="14"></textarea>

            <div class="actions">
                <a id="cancel-link" class="button">Cancel</a>
                <button class="button primary" onclick="saveAddition()">Save Changes</button>
            </div>

            <p id="message" class="empty"></p>
        </section>
    </main>

    <script type="module">
        import { requireBetaAccess } from "./betaGate.js";
        import { supabase } from "./supabaseClient.js";
        import { optimizeImage } from "./imageUtils.js";
        const currentUser = await requireBetaAccess({ allowRestricted: false });
        const params = new URLSearchParams(window.location.search);
        const additionId = params.get("id");

        let currentAddition = null;

        if (!additionId) {
            alert("No addition ID provided.");
            window.location.href = "explore.html";
        }

        await loadAddition();

        async function loadAddition() {
            const { data, error } = await supabase
                .from("world_additions")
                .select("*")
                .eq("id", additionId)
                .single();

            if (error || !data) {
                alert("Addition not found.");
                window.location.href = "explore.html";
                return;
            }

            if (data.author_id !== currentUser.id) {
                alert("You can only edit your own additions.");
                window.location.href =
                    `addition.html?id=${encodeURIComponent(additionId)}`;
                return;
            }

            currentAddition = data;

            document.getElementById("page-subtitle").textContent =
                `Editing ${data.title || "Untitled Addition"}.`;

            document.getElementById("back-link").href =
                `addition.html?id=${encodeURIComponent(additionId)}`;

            document.getElementById("cancel-link").href =
                `addition.html?id=${encodeURIComponent(additionId)}`;

            document.getElementById("addition-type").value =
                data.addition_type || "Story";

            document.getElementById("addition-title").value =
                data.title || "";

            document.getElementById("addition-summary").value =
                data.summary || "";

            document.getElementById("addition-content").value =
                data.content || "";

            const cover = data.cover_image_url || data.image_url;

            if (cover) {
                document.getElementById("cover-preview").innerHTML =
                    `<img class="cover-preview" src="${escapeHtml(cover)}">`;
            }
        }

        window.saveAddition = async function () {
            if (!currentAddition) return;

            const message = document.getElementById("message");

            const type = document.getElementById("addition-type").value;
            const title = document.getElementById("addition-title").value.trim();
            const summary = document.getElementById("addition-summary").value.trim();
            const content = document.getElementById("addition-content").value.trim();
            const coverFile = document.getElementById("addition-cover").files[0];

            if (!title) {
                message.textContent = "Title is required.";
                return;
            }

            let coverImageUrl =
                currentAddition.cover_image_url ||
                currentAddition.image_url ||
                null;

            if (coverFile) {

                const optimized =
                    await optimizeImage(
                        coverFile,
                        {
                            maxWidth: 1600,
                            maxHeight: 900,
                            quality: .82
                        }
                    );

                const filePath =
                    `${currentUser.id}/${Date.now()}-edit-addition.webp`;

                const { error: uploadError } =
                    await supabase.storage
                        .from("world-images")
                        .upload(
                            filePath,
                            optimized
                        );

                if (uploadError) {
                    message.textContent =
                        uploadError.message;
                    return;
                }

                const { data } =
                    supabase.storage
                        .from("world-images")
                        .getPublicUrl(filePath);

                coverImageUrl =
                    data.publicUrl;
            }

                if (uploadError) {
                    message.textContent = uploadError.message;
                    return;
                }

                const { data } = supabase.storage
                    .from("world-images")
                    .getPublicUrl(filePath);

                coverImageUrl = data.publicUrl;
            }

            const { error } = await supabase
                .from("world_additions")
                .update({
                    addition_type: type,
                    title,
                    summary,
                    content,
                    cover_image_url: coverImageUrl,
                    image_url: coverImageUrl,
                    updated_at: new Date().toISOString()
                })
                .eq("id", additionId)
                .eq("author_id", currentUser.id);

            if (error) {
                message.textContent = error.message;
                return;
            }

            window.location.href =
                `addition.html?id=${encodeURIComponent(additionId)}`;
        };

        function escapeHtml(value) {
            return String(value || "")
                .replaceAll("&", "&amp;")
                .replaceAll("<", "&lt;")
                .replaceAll(">", "&gt;")
                .replaceAll('"', "&quot;")
                .replaceAll("'", "&#039;");
        }

        window.logOut = async function () {
            await supabase.auth.signOut();
            window.location.href = "login.html";
        };
    </script>

    <script>
        document.addEventListener("pointerdown", function (e) {
            const icon = e.target.closest(".info-icon");

            if (icon) {
                e.preventDefault();
                e.stopPropagation();

                const tip = icon.nextElementSibling;

                document.querySelectorAll(".tooltip").forEach(t => {
                    if (t !== tip) {
                        t.classList.remove("open");
                    }
                });

                tip.classList.toggle("open");
                return;
            }

            document.querySelectorAll(".tooltip").forEach(t => {
                t.classList.remove("open");
            });
        });
    </script>

</body>
</html>
