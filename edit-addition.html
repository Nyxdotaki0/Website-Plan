<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" href="favicon.png">
    <title>Edit Addition - Nullverse</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #0d0d12;
            color: #f2f2f2;
        }

        header {
            padding: 12px 40px;
            border-bottom: 1px solid #2a2a35;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #111118;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .logo {
            display: flex;
            align-items: center;
        }

            .logo a {
                display: flex;
                align-items: center;
            }

        .site-logo {
            height: 64px;
            width: auto;
            display: block;
            max-width: none;
        }

        nav {
            display: flex;
            gap: 22px;
            align-items: center;
            flex-wrap: wrap;
        }

            nav a,
            nav button {
                color: #cfcfd8;
                text-decoration: none;
                background: none;
                border: none;
                cursor: pointer;
                font-family: Arial, sans-serif;
                font-size: 0.95rem;
            }

                nav a:hover,
                nav button:hover {
                    color: white;
                }

        main {
            max-width: 900px;
            margin: auto;
            padding: 55px 40px 80px;
        }

        .hero,
        .panel {
            background: #15151f;
            border: 1px solid #2a2a35;
            border-radius: 16px;
            padding: 28px;
            margin-bottom: 24px;
        }

        .hero {
            background: linear-gradient(135deg, #15151f, #1b1b2b);
        }

        h1 {
            margin: 0 0 10px;
            font-size: 2.5rem;
        }

        p {
            color: #c8c8d4;
            line-height: 1.6;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: #d8d8e5;
        }

        input,
        textarea,
        select {
            width: 100%;
            box-sizing: border-box;
            padding: 13px;
            border-radius: 10px;
            border: 1px solid #333344;
            background: #0d0d12;
            color: white;
            font-family: Arial, sans-serif;
            margin-bottom: 16px;
        }

            input:focus,
            textarea:focus,
            select:focus {
                outline: none;
                border-color: #56568a;
            }

        textarea {
            resize: vertical;
        }

        .button {
            display: inline-block;
            background: #2a2a44;
            color: white;
            border: none;
            padding: 11px 15px;
            border-radius: 8px;
            cursor: pointer;
            text-decoration: none;
            font-family: Arial, sans-serif;
            font-size: 0.95rem;
        }

            .button:hover {
                background: #3a3a5c;
            }

        .primary {
            background: #4d4d7a;
        }

            .primary:hover {
                background: #62629a;
            }

        .empty {
            color: #8f8fa3;
        }

        .cover-preview {
            width: 100%;
            height: 180px;
            object-fit: cover;
            border-radius: 14px;
            border: 1px solid #333344;
            margin-bottom: 16px;
        }

        .actions {
            display: flex;
            justify-content: space-between;
            gap: 12px;
            flex-wrap: wrap;
            margin-top: 22px;
        }

        .info-wrap {
            display: flex;
            align-items: center;
            gap: 8px;
            position: relative;
            margin-bottom: 8px;
            width: fit-content;
        }

            .info-wrap label,
            .info-wrap h1 {
                margin: 0;
            }

        .info-icon {
            width: 18px;
            height: 18px;
            border-radius: 50%;
            border: 1px solid #4a4a62;
            color: #aaaabd;
            background: transparent;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-size: 0.7rem;
            font-style: italic;
            font-weight: bold;
            cursor: pointer;
            user-select: none;
        }

            .info-icon:hover {
                color: white;
                border-color: #6a6a95;
                background: #1b1b28;
            }

        .tooltip {
            position: absolute;
            left: 100%;
            top: 50%;
            transform: translate(10px, -50%);
            width: 270px;
            background: #111118;
            border: 1px solid #2a2a35;
            border-radius: 12px;
            padding: 12px 14px;
            color: #c8c8d4;
            line-height: 1.5;
            font-size: 0.9rem;
            opacity: 0;
            visibility: hidden;
            pointer-events: none;
            z-index: 1000;
            box-shadow: 0 12px 30px rgba(0, 0, 0, 0.35);
        }

        @media (hover: hover) {
            .info-icon:hover + .tooltip {
                opacity: 1;
                visibility: visible;
            }
        }

        .tooltip.open {
            opacity: 1;
            visibility: visible;
            pointer-events: auto;
        }

        @media (max-width: 800px) {
            header {
                flex-direction: column;
                gap: 14px;
                padding: 20px;
            }

            nav {
                justify-content: center;
            }

            main {
                padding: 35px 24px 70px;
            }

            h1 {
                font-size: 2.1rem;
            }

            .tooltip {
                left: 0;
                top: calc(100% + 8px);
                transform: none;
                width: 240px;
            }
        }
    </style>
</head>
<body>
    <header>
        <div class="logo">
            <a href="index.html">
                <img src="Nullverse-3.png" alt="Nullverse" class="site-logo">
            </a>
        </div>
        <nav>
            <a href="index.html">Home</a>
            <a href="explore.html">Explore</a>
            <a href="dashboard.html">Dashboard</a>
            <button onclick="logOut()">Log Out</button>
        </nav>
    </header>

    <main>
        <a id="back-link" class="button">← Back to Addition</a>

        <section class="hero" style="margin-top:24px;">
            <h1>Edit Community Addition</h1>
            <p id="page-subtitle">Loading addition...</p>
        </section>

        <section class="panel">
            <label>Addition Type</label>
            <select id="addition-type">
                <option>Story</option>
                <option>Character</option>
                <option>Location</option>
                <option>Language</option>
                <option>Lore</option>
                <option>Timeline</option>
                <option>Map</option>
                <option>Custom</option>
            </select>

            <label>Title</label>
            <input id="addition-title">

            <label>Short Summary</label>
<textarea id="addition-summary" rows="4"></textarea>

            <label>Cover Image</label>
            <div id="cover-preview"></div>
            <input id="addition-cover" type="file" accept="image/*">

            <label>Main Content</label>
<textarea id="addition-content" rows="14"></textarea>

            <div class="actions">
                <a id="cancel-link" class="button">Cancel</a>
                <button class="button primary" onclick="saveAddition()">Save Changes</button>
            </div>

            <p id="message" class="empty"></p>
        </section>
    </main>

    <script type="module">
        import { requireBetaAccess } from "./betaGate.js";
        import { supabase } from "./supabaseClient.js";
        import { optimizeImage } from "./imageUtils.js";
        const currentUser = await requireBetaAccess();
        const params = new URLSearchParams(window.location.search);
        const additionId = params.get("id");

        let currentAddition = null;

        if (!additionId) {
            alert("No addition ID provided.");
            window.location.href = "explore.html";
        }

        await loadAddition();

        async function loadAddition() {
            const { data, error } = await supabase
                .from("world_additions")
                .select("*")
                .eq("id", additionId)
                .single();

            if (error || !data) {
                alert("Addition not found.");
                window.location.href = "explore.html";
                return;
            }

            if (data.author_id !== currentUser.id) {
                alert("You can only edit your own additions.");
                window.location.href =
                    `addition.html?id=${encodeURIComponent(additionId)}`;
                return;
            }

            currentAddition = data;

            document.getElementById("page-subtitle").textContent =
                `Editing ${data.title || "Untitled Addition"}.`;

            document.getElementById("back-link").href =
                `addition.html?id=${encodeURIComponent(additionId)}`;

            document.getElementById("cancel-link").href =
                `addition.html?id=${encodeURIComponent(additionId)}`;

            document.getElementById("addition-type").value =
                data.addition_type || "Story";

            document.getElementById("addition-title").value =
                data.title || "";

            document.getElementById("addition-summary").value =
                data.summary || "";

            document.getElementById("addition-content").value =
                data.content || "";

            const cover = data.cover_image_url || data.image_url;

            if (cover) {
                document.getElementById("cover-preview").innerHTML =
                    `<img class="cover-preview" src="${escapeHtml(cover)}">`;
            }
        }

        window.saveAddition = async function () {
            if (!currentAddition) return;

            const message = document.getElementById("message");

            const type = document.getElementById("addition-type").value;
            const title = document.getElementById("addition-title").value.trim();
            const summary = document.getElementById("addition-summary").value.trim();
            const content = document.getElementById("addition-content").value.trim();
            const coverFile = document.getElementById("addition-cover").files[0];

            if (!title) {
                message.textContent = "Title is required.";
                return;
            }

            let coverImageUrl =
                currentAddition.cover_image_url ||
                currentAddition.image_url ||
                null;

            if (coverFile) {

                const optimized =
                    await optimizeImage(
                        coverFile,
                        {
                            maxWidth: 1600,
                            maxHeight: 900,
                            quality: .82
                        }
                    );

                const filePath =
                    `${currentUser.id}/${Date.now()}-edit-addition.webp`;

                const { error: uploadError } =
                    await supabase.storage
                        .from("world-images")
                        .upload(
                            filePath,
                            optimized
                        );

                if (uploadError) {
                    message.textContent =
                        uploadError.message;
                    return;
                }

                const { data } =
                    supabase.storage
                        .from("world-images")
                        .getPublicUrl(filePath);

                coverImageUrl =
                    data.publicUrl;
            }

                if (uploadError) {
                    message.textContent = uploadError.message;
                    return;
                }

                const { data } = supabase.storage
                    .from("world-images")
                    .getPublicUrl(filePath);

                coverImageUrl = data.publicUrl;
            }

            const { error } = await supabase
                .from("world_additions")
                .update({
                    addition_type: type,
                    title,
                    summary,
                    content,
                    cover_image_url: coverImageUrl,
                    image_url: coverImageUrl,
                    updated_at: new Date().toISOString()
                })
                .eq("id", additionId)
                .eq("author_id", currentUser.id);

            if (error) {
                message.textContent = error.message;
                return;
            }

            window.location.href =
                `addition.html?id=${encodeURIComponent(additionId)}`;
        };

        function escapeHtml(value) {
            return String(value || "")
                .replaceAll("&", "&amp;")
                .replaceAll("<", "&lt;")
                .replaceAll(">", "&gt;")
                .replaceAll('"', "&quot;")
                .replaceAll("'", "&#039;");
        }

        window.logOut = async function () {
            await supabase.auth.signOut();
            window.location.href = "login.html";
        };
    </script>

    <script>
        document.addEventListener("pointerdown", function (e) {
            const icon = e.target.closest(".info-icon");

            if (icon) {
                e.preventDefault();
                e.stopPropagation();

                const tip = icon.nextElementSibling;

                document.querySelectorAll(".tooltip").forEach(t => {
                    if (t !== tip) {
                        t.classList.remove("open");
                    }
                });

                tip.classList.toggle("open");
                return;
            }

            document.querySelectorAll(".tooltip").forEach(t => {
                t.classList.remove("open");
            });
        });
    </script>

</body>
</html>
