<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Addition - Nullverse</title>
    <style>
        body {
            margin: 0;
            font-family: Arial,sans-serif;
            background: #0d0d12;
            color: #f2f2f2
        }

        header {
            padding: 24px 40px;
            border-bottom: 1px solid #2a2a35;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #111118
        }

        .logo a, nav a, nav button {
            color: #cfcfd8;
            text-decoration: none;
            background: none;
            border: none;
            cursor: pointer;
            font-family: Arial,sans-serif
        }

        .logo a {
            color: white;
            font-size: 1.6rem;
            font-weight: bold
        }

        nav {
            display: flex;
            gap: 22px;
            flex-wrap: wrap
        }

        main {
            max-width: 1050px;
            margin: auto;
            padding: 45px 40px 80px
        }

        .hero, .panel {
            background: #15151f;
            border: 1px solid #2a2a35;
            border-radius: 16px;
            padding: 28px;
            margin-bottom: 24px
        }

        .hero {
            background: linear-gradient(135deg,#15151f,#1b1b2b)
        }

        .cover {
            width: 100%;
            max-height: 380px;
            object-fit: cover;
            border-radius: 16px;
            border: 1px solid #333344;
            margin-bottom: 22px
        }

        h1 {
            font-size: 2.7rem;
            margin: 0 0 10px
        }

        p {
            color: #c8c8d4;
            line-height: 1.7
        }

        .badge {
            display: inline-block;
            border: 1px solid #333344;
            border-radius: 999px;
            padding: 6px 10px;
            color: #bdbdca;
            font-size: .85rem;
            margin-bottom: 12px
        }

        .button {
            display: inline-block;
            background: #2a2a44;
            color: white;
            border: none;
            padding: 10px 14px;
            border-radius: 8px;
            cursor: pointer;
            text-decoration: none;
            font-family: Arial,sans-serif
        }

            .button:hover {
                background: #3a3a5c
            }

        .actions {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            margin-top: 20px
        }

        .empty {
            color: #8f8fa3
        }

        textarea {
            width: 100%;
            box-sizing: border-box;
            padding: 13px;
            border-radius: 10px;
            border: 1px solid #333344;
            background: #0d0d12;
            color: white;
            font-family: Arial,sans-serif;
            margin-bottom: 14px
        }

        .comment {
            border-top: 1px solid #2a2a35;
            padding-top: 16px;
            margin-top: 16px
        }
    </style>
</head>
<body>
    <header>
        <div class="logo"><a href="index.html">Nullverse</a></div>
        <nav>
            <a href="index.html">Home</a>
            <a href="explore.html">Explore</a>
            <a href="dashboard.html">Dashboard</a>
            <button onclick="logOut()">Log Out</button>
        </nav>
    </header>

    <main>
        <a id="back-link" class="button">← Back to Community</a>

        <section class="hero" style="margin-top:24px;">
            <div id="type-badge" class="badge">Addition</div>
            <h1 id="addition-title">Loading...</h1>
            <p id="addition-author"></p>
            <p id="addition-summary"></p>
            <div class="actions">
                <button id="like-button" class="button">♡ Like</button>
                <span id="like-count" class="empty">0 Likes</span>
                <a id="edit-link" class="button" style="display:none;">Edit Addition</a>
            </div>
        </section>

        <section class="panel">
            <img id="addition-cover" class="cover" style="display:none;">
            <div id="addition-content"></div>
        </section>

        <section class="panel">
            <h2>Comments</h2>
            <div id="comment-form">
<textarea id="comment-input" rows="4" placeholder="Comment on this addition..."></textarea>
                <button class="button" onclick="submitComment()">Post Comment</button>
            </div>
            <div id="comments-container"><p class="empty">Loading comments...</p></div>
        </section>
    </main>

    <script type="module">
import { requireBetaAccess } from "./betaGate.js";
import { supabase } from "./supabaseClient.js";

import { createNotification } from "./notifications.js";

const currentUser = await requireBetaAccess();
const params = new URLSearchParams(window.location.search);
const additionId = params.get("id");

let currentAddition = null;

if (!additionId) {
    alert("No addition ID provided.");
    window.location.href = "explore.html";
}

await loadAddition();
await loadLikes();
await loadComments();

async function loadAddition() {
    const { data, error } = await supabase
        .from("world_additions")
        .select("*")
        .eq("id", additionId)
        .single();

    if (error || !data) {
        alert("Addition not found.");
        window.location.href = "explore.html";
        return;
    }

    currentAddition = data;

    const { data: world } = await supabase
        .from("worlds")
        .select("id, title, owner_id")
        .eq("id", data.world_id)
        .single();

    const { data: profile } = await supabase
        .from("profiles")
        .select("username, display_name")
        .eq("id", data.author_id)
        .single();

    document.title = `${data.title || "Addition"} - Nullverse`;

    document.getElementById("back-link").href =
        `world-additions.html?id=${encodeURIComponent(data.world_id)}`;

    document.getElementById("type-badge").textContent =
        data.addition_type || "Addition";

    document.getElementById("addition-title").textContent =
        data.title || "Untitled Addition";

    document.getElementById("addition-summary").textContent =
        data.summary || "";

    document.getElementById("addition-author").innerHTML =
        `A community addition to <strong>${escapeHtml(world?.title || "Unknown World")}</strong> by <strong>${escapeHtml(profile?.display_name || profile?.username || "Unknown Creator")}</strong>`;

    document.getElementById("addition-content").innerHTML =
        `<p style="white-space:pre-wrap;">${escapeHtml(data.content || "No content yet.")}</p>`;

    const cover = data.cover_image_url || data.image_url;

    if (cover) {
        document.getElementById("addition-cover").src = cover;
        document.getElementById("addition-cover").style.display = "block";
    }

    if (currentUser.id === data.author_id) {
        document.getElementById("edit-link").style.display = "inline-block";
        document.getElementById("edit-link").href =
            `edit-addition.html?id=${encodeURIComponent(data.id)}`;
    }
}

async function loadLikes() {
    const { data: likes } = await supabase
        .from("world_addition_likes")
        .select("*")
        .eq("addition_id", additionId);

    const count = likes?.length || 0;

    document.getElementById("like-count").textContent =
        `${count} ${count === 1 ? "Like" : "Likes"}`;

    const userLiked = likes?.some(like => like.user_id === currentUser.id);
    const button = document.getElementById("like-button");

    button.textContent = userLiked ? "♥ Liked" : "♡ Like";
    button.dataset.liked = userLiked ? "true" : "false";
}

document.getElementById("like-button").addEventListener("click", async () => {
    const liked = document.getElementById("like-button").dataset.liked === "true";

    if (liked) {
        await supabase
            .from("world_addition_likes")
            .delete()
            .eq("addition_id", additionId)
            .eq("user_id", currentUser.id);
    } else {
        const { error: likeError } = await supabase
            .from("world_addition_likes")
            .insert({
                addition_id: additionId,
                user_id: currentUser.id
            });

        if (!likeError) {
            await createNotification({
                recipientId: currentAddition.author_id,
                actorId: currentUser.id,
                additionId: currentAddition.id,
                type: "addition_liked",
                message: `Someone liked your addition: ${currentAddition.title}.`,
                link: `addition.html?id=${encodeURIComponent(currentAddition.id)}`
            });
        }
    }

    await loadLikes();
});

async function loadComments() {
    const container = document.getElementById("comments-container");

    const { data: comments, error } = await supabase
        .from("world_addition_comments")
        .select("*")
        .eq("addition_id", additionId)
        .order("created_at", { ascending:false });

    if (error) {
        container.innerHTML = `<p class="empty">${escapeHtml(error.message)}</p>`;
        return;
    }

    if (!comments || !comments.length) {
        container.innerHTML = `<p class="empty">No comments yet.</p>`;
        return;
    }

    const userIds = [...new Set(comments.map(comment => comment.user_id))];

    const { data: profiles } = await supabase
        .from("profiles")
        .select("id, username, display_name")
        .in("id", userIds);

    container.innerHTML = comments.map(comment => {
        const profile = profiles?.find(profile => profile.id === comment.user_id);
        const name = profile?.display_name || profile?.username || "Unknown";

        const canDelete =
            currentUser.id === comment.user_id ||
            currentUser.id === currentAddition.author_id;

        return `
            <div class="comment">
                <p><strong>${escapeHtml(name)}</strong></p>
                <p>${escapeHtml(comment.content)}</p>
                ${canDelete ? `
                    <button class="button" onclick="deleteComment('${comment.id}')">
                        Delete
                    </button>
                ` : ""}
            </div>
        `;
    }).join("");
}

window.submitComment = async function() {
    const input = document.getElementById("comment-input");
    const content = input.value.trim();

    if (!content) return;

    const { error } = await supabase
        .from("world_addition_comments")
        .insert({
            addition_id: additionId,
            user_id: currentUser.id,
            content
        });

    if (!error) {
        await createNotification({
            recipientId: currentAddition.author_id,
            actorId: currentUser.id,
            additionId: currentAddition.id,
            type: "addition_commented",
            message: `Someone commented on your addition: ${currentAddition.title}.`,
            link: `addition.html?id=${encodeURIComponent(currentAddition.id)}`
        });
    }

    if (error) {
        alert(error.message);
        return;
    }

    input.value = "";
    await loadComments();
};

window.deleteComment = async function(commentId) {
    const confirmed = confirm("Delete this comment?");
    if (!confirmed) return;

    const { error } = await supabase
        .from("world_addition_comments")
        .delete()
        .eq("id", commentId);

    if (error) {
        alert(error.message);
        return;
    }

    await loadComments();
};

function escapeHtml(value) {
    return String(value || "")
        .replaceAll("&","&amp;")
        .replaceAll("<","&lt;")
        .replaceAll(">","&gt;")
        .replaceAll('"',"&quot;")
        .replaceAll("'","&#039;");
}

window.logOut = async function () {
    await supabase.auth.signOut();
    window.location.href = "login.html";
};
    </script>
</body>
</html>
