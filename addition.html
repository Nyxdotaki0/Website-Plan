<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Addition - Nullverse</title>
    <link rel="icon" type="image/png" href="favicon.png">

    <script>
        const savedNullverseTheme =
            localStorage.getItem("nullverse-theme") || "void";

        document.documentElement.setAttribute(
            "data-theme",
            savedNullverseTheme
        );
    </script>

    <link rel="stylesheet" href="theme.css?v=25">

    <style>
        html {
            min-height: 100%;
            background: #000;
        }

        body {
            margin: 0;
            min-height: 100vh;
            font-family: Arial, sans-serif;
            background: var(--page-bg);
            background-attachment: fixed;
            color: var(--text-primary);
        }

        header {
            padding: 12px 40px;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(12,12,14,0.72);
            position: sticky;
            top: 0;
            z-index: 100;
            backdrop-filter: blur(18px);
            -webkit-backdrop-filter: blur(18px);
            box-shadow: 0 10px 35px rgba(0,0,0,0.28);
        }

        .logo,
        .logo a {
            display: flex;
            align-items: center;
        }

        .site-logo {
            height: 64px;
            width: auto;
            display: block;
            max-width: none;
        }

        nav {
            display: flex;
            gap: 22px;
            flex-wrap: wrap;
            align-items: center;
        }

            nav a,
            nav button {
                color: var(--text-secondary);
                text-decoration: none;
                background: none;
                border: none;
                cursor: pointer;
                font-family: Arial, sans-serif;
                font-size: .95rem;
                transition: .18s ease;
            }

                nav a:hover,
                nav button:hover {
                    color: white;
                }

        main {
            max-width: 1180px;
            margin: auto;
            padding: 44px 40px 80px;
        }

        .layout {
            display: grid;
            grid-template-columns: minmax(0, 1fr) 320px;
            gap: 26px;
            align-items: start;
        }

        .hero,
        .panel,
        .side-panel {
            background: linear-gradient(135deg, rgba(255,255,255,.055), rgba(255,255,255,.015)), var(--panel-bg);
            border: 1px solid var(--border-color);
            border-radius: 22px;
            backdrop-filter: blur(18px);
            -webkit-backdrop-filter: blur(18px);
            box-shadow: 0 18px 40px rgba(0,0,0,.24), 0 0 24px rgba(255,255,255,.03);
        }

        .hero {
            padding: 34px;
            margin: 24px 0;
            position: relative;
            overflow: hidden;
        }

            .hero::after {
                content: "";
                position: absolute;
                inset: 0;
                background: radial-gradient(circle at top right, rgba(255,255,255,.08), transparent 35%);
                pointer-events: none;
            }

            .hero > * {
                position: relative;
                z-index: 2;
            }

        .panel,
        .side-panel {
            padding: 26px;
            margin-bottom: 24px;
        }

        .side-panel {
            position: sticky;
            top: 112px;
        }

        h1 {
            font-size: 3rem;
            margin: 0 0 12px;
            line-height: 1.05;
        }

        h2,
        h3 {
            margin-top: 0;
        }

        p {
            color: var(--text-secondary);
            line-height: 1.7;
        }

        a {
            color: white;
        }

        .badge {
            display: inline-block;
            border: 1px solid var(--border-color);
            border-radius: 999px;
            padding: 6px 10px;
            color: var(--text-secondary);
            background: rgba(255,255,255,0.04);
            font-size: .85rem;
            margin-bottom: 12px;
        }

        .meta {
            color: var(--text-muted);
            margin-bottom: 12px;
        }

        .summary {
            font-size: 1.03rem;
            max-width: 780px;
        }

        .button {
            display: inline-block;
            background: linear-gradient(180deg, #2a2a2f 0%, #16161a 45%, #0d0d10 100%);
            color: #f5f5f5;
            border: 1px solid rgba(255,255,255,.12);
            padding: 10px 14px;
            border-radius: 12px;
            cursor: pointer;
            text-decoration: none;
            font-family: Arial, sans-serif;
            font-size: .95rem;
            transition: .18s ease;
            box-shadow: 0 0 16px rgba(255,255,255,.08), inset 0 1px 0 rgba(255,255,255,.06);
        }

            .button:hover {
                background: linear-gradient(180deg, #3a3a40 0%, #202026 45%, #111116 100%);
                border-color: rgba(255,255,255,.18);
                transform: translateY(-1px);
                box-shadow: 0 0 20px rgba(255,255,255,.12), inset 0 1px 0 rgba(255,255,255,.08);
            }

            .button.secondary {
                background: linear-gradient(180deg, #202025 0%, #121216 100%);
            }

        .actions {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            margin-top: 20px;
            align-items: center;
        }

        .empty {
            color: var(--text-muted);
        }

        .cover-wrap,
        .content-image-wrap {
            position: relative;
            overflow: visible;
            margin-bottom: 24px;
        }

        .cover,
        .content-image {
            width: 100%;
            max-height: 430px;
            object-fit: cover;
            border-radius: 18px;
            border: 1px solid var(--border-color);
            box-shadow: 0 16px 34px rgba(0,0,0,0.26);
            display: block;
        }

        .content-image {
            max-height: 520px;
        }

        .image-caption {
            margin: 10px 0 0;
            color: var(--text-muted);
            font-size: .9rem;
        }

        .addition-content {
            color: var(--text-secondary);
            line-height: 1.85;
            font-size: 1.02rem;
            white-space: pre-wrap;
        }

        .credit-pill {
            position: absolute;
            left: 12px;
            bottom: 12px;
            z-index: 8;
            display: inline-flex;
            align-items: center;
            max-width: calc(100% - 24px);
            padding: 7px 10px;
            border-radius: 999px;
            border: 1px solid rgba(255,255,255,.16);
            background: rgba(0,0,0,.62);
            color: white;
            font-size: .72rem;
            text-decoration: none;
            backdrop-filter: blur(14px);
            -webkit-backdrop-filter: blur(14px);
            white-space: nowrap;
        }

            .credit-pill:hover {
                background: rgba(0,0,0,.78);
            }

        .credit-label {
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .credit-tooltip {
            position: absolute;
            left: 0;
            bottom: calc(100% + 8px);
            width: 240px;
            padding: 10px 12px;
            border-radius: 12px;
            background: rgba(0,0,0,.92);
            border: 1px solid rgba(255,255,255,.16);
            color: #d8d8e6;
            font-size: .78rem;
            line-height: 1.45;
            opacity: 0;
            visibility: hidden;
            pointer-events: none;
            white-space: normal;
            box-shadow: 0 12px 28px rgba(0,0,0,.35);
        }

        .credit-pill:hover .credit-tooltip,
        .credit-pill.show-tooltip .credit-tooltip {
            opacity: 1;
            visibility: visible;
        }

        textarea,
        select,
        input {
            width: 100%;
            box-sizing: border-box;
            padding: 13px 14px;
            border-radius: 14px;
            border: 1px solid var(--border-color);
            background: rgba(0,0,0,.22);
            color: var(--text-primary);
            font-family: Arial, sans-serif;
            margin-bottom: 14px;
            resize: vertical;
            transition: .18s ease;
        }

            textarea:focus,
            select:focus,
            input:focus {
                outline: none;
                border-color: rgba(255,255,255,.16);
                box-shadow: 0 0 18px rgba(255,255,255,.05);
            }

        .comment {
            border-top: 1px solid var(--border-soft);
            padding-top: 16px;
            margin-top: 16px;
        }

            .comment p {
                margin-top: 0;
            }

        .moderation-box {
            width: 100%;
            margin-top: 16px;
            padding: 16px;
            border: 1px solid var(--border-color);
            border-radius: 16px;
            background: rgba(255,255,255,.04);
            box-sizing: border-box;
        }

        .stat-card {
            border: 1px solid var(--border-color);
            border-radius: 16px;
            padding: 14px;
            background: rgba(255,255,255,.035);
            margin-bottom: 12px;
        }

            .stat-card strong {
                display: block;
                color: var(--text-primary);
                margin-bottom: 4px;
            }

        .notification-link {
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }

        .notification-badge {
            min-width: 18px;
            height: 18px;
            padding: 0 6px;
            border-radius: 999px;
            background: white;
            color: black;
            font-size: .72rem;
            align-items: center;
            justify-content: center;
            line-height: 1;
        }

        @media (max-width: 950px) {
            .layout {
                grid-template-columns: 1fr;
            }

            .side-panel {
                position: static;
            }
        }

        @media (max-width: 800px) {
            header {
                flex-direction: column;
                gap: 14px;
                padding: 20px;
            }

            nav {
                justify-content: center;
            }

            main {
                padding: 32px 24px 70px;
            }

            h1 {
                font-size: 2.25rem;
            }

            .hero,
            .panel,
            .side-panel {
                padding: 24px;
            }
        }
    </style>
</head>

<body>
    <div class="nullverse-stars"></div>

    <header>
        <div class="logo">
            <a href="index.html">
                <img src="Nullverse-3.png" alt="Nullverse" class="site-logo">
            </a>
        </div>

        <nav>
            <a href="index.html">Home</a>
            <a href="notifications.html">Notifications</a>
            <a href="explore.html">Explore</a>
            <a href="profile.html">Profile</a>
            <a href="dashboard.html">Dashboard</a>
            <a href="messages.html">Messages</a>
            <button onclick="logOut()">Log Out</button>
        </nav>
    </header>

    <main>
        <a id="back-link" class="button secondary">← Back to Community</a>

        <section class="hero">
            <div id="type-badge" class="badge">Addition</div>

            <h1 id="addition-title">Loading...</h1>

            <p id="addition-author" class="meta"></p>

            <p id="addition-summary" class="summary"></p>

            <div class="actions">
                <button id="like-button" class="button">♡ Like</button>

                <span id="like-count" class="empty">
                    0 Likes
                </span>

                <a id="edit-link"
                   class="button"
                   style="display:none;">
                    Edit Addition
                </a>

                <button id="report-addition-btn"
                        class="button">
                    Report
                </button>
            </div>
        </section>

        <div class="layout">
            <section>
                <section class="panel">
                    <div id="cover-container"></div>

                    <div id="addition-content" class="addition-content">
                        Loading content...
                    </div>

                    <div id="content-image-container"></div>
                </section>

                <section class="panel">
                    <h2>Comments</h2>

                    <div id="comment-form">
                        <textarea id="comment-input"
                                  rows="4"
                                  placeholder="Comment on this addition..."></textarea>

                        <button class="button" onclick="submitComment()">
                            Post Comment
                        </button>
                    </div>

                    <div id="comments-container">
                        <p class="empty">Loading comments...</p>
                    </div>
                </section>
            </section>

            <aside class="side-panel">
                <h3>Addition Details</h3>

                <div class="stat-card">
                    <strong>Status</strong>
                    <span id="addition-status" class="empty">Loading...</span>
                </div>

                <div class="stat-card">
                    <strong>World</strong>
                    <span id="addition-world" class="empty">Loading...</span>
                </div>

                <div class="stat-card">
                    <strong>Creator</strong>
                    <span id="addition-creator" class="empty">Loading...</span>
                </div>

                <div class="stat-card">
                    <strong>Updated</strong>
                    <span id="addition-updated" class="empty">Loading...</span>
                </div>
            </aside>
        </div>
    </main>

    <div id="report-modal"
         style="
            display:none;
            position:fixed;
            inset:0;
            background:rgba(0,0,0,.75);
            z-index:9999;
            justify-content:center;
            align-items:center;
         ">

        <div style="
            width:500px;
            max-width:90%;
            background:var(--panel-bg);
            border:1px solid var(--border-color);
            border-radius:18px;
            padding:24px;
        ">

            <h2>Report Addition</h2>

            <select id="report-reason">
                <option>Spam</option>
                <option>Harassment</option>
                <option>Hate Speech</option>
                <option>NSFW Content</option>
                <option>Copyright Violation</option>
                <option>Misinformation</option>
                <option>Impersonation</option>
                <option>Other</option>
            </select>

            <textarea id="report-details"
                      placeholder="Additional details..."
                      style="height:120px;"></textarea>

            <div class="actions">
                <button class="button"
                        id="submit-report-btn">
                    Submit Report
                </button>

                <button class="button"
                        id="close-report-btn">
                    Cancel
                </button>
            </div>

        </div>

    </div>

    <script type="module">
        import { requireBetaAccess } from "./betaGate.js";
        import { supabase } from "./supabaseClient.js";
        import { setupNotificationBadge } from "./notificationBadge.js";
        import { setupMessageBadge } from "./messageBadge.js";
        import { createNotification } from "./notifications.js";

        import {
            getCurrentUserWithPermissions,
            canModerateAdditions,
            canModerateContentOwner
        } from "./permissions.js?v=4";

        setupMessageBadge();

        const currentUser = await requireBetaAccess();
        setupNotificationBadge();

        const {
            profile: currentProfile,
            permissions: currentPermissions
        } = await getCurrentUserWithPermissions(currentUser.id);

        const params = new URLSearchParams(window.location.search);
        const additionId = params.get("id");

        let currentAddition = null;
        let currentWorld = null;
        let authorProfile = null;
        let pendingCommentReport = null;
        let blockedUserIds = [];

        if (!additionId) {
            alert("No addition ID provided.");
            window.location.href = "explore.html";
        }

        setupReportSystem();
        setupCreditTapSystem();

        await loadBlockedUsers();
        await loadAddition();
        await loadLikes();
        await loadComments();

        async function loadBlockedUsers() {
            const { data } = await supabase
                .from("user_blocks")
                .select("blocker_id, blocked_id")
                .in("blocker_id", [currentUser.id]);

            const { data: reverseData } = await supabase
                .from("user_blocks")
                .select("blocker_id, blocked_id")
                .in("blocked_id", [currentUser.id]);

            blockedUserIds = [
                ...((data || []).map(x => x.blocked_id)),
                ...((reverseData || []).map(x => x.blocker_id))
            ];
        }

        async function loadAddition() {
            const { data, error } = await supabase
                .from("world_additions")
                .select("*")
                .eq("id", additionId)
                .single();

            if (error || !data) {
                alert("Addition not found.");
                window.location.href = "explore.html";
                return;
            }

            currentAddition = data;

            if (blockedUserIds.includes(currentAddition.author_id)) {
                alert("This addition is unavailable.");
                window.location.href = "explore.html";
                return;
            }

            const { data: world } = await supabase
                .from("worlds")
                .select("id, title, owner_id")
                .eq("id", data.world_id)
                .single();

            const { data: profile } = await supabase
                .from("profiles")
                .select("id, username, display_name, role, role_name")
                .eq("id", data.author_id)
                .single();

            currentWorld = world;
            authorProfile = profile;
            currentAddition.authorProfile = profile;

            const ownerAccess = currentUser.id === data.author_id;
            const staffAccess = canModerateAdditions(currentPermissions);

            if (
                data.moderation_status === "hidden" &&
                !ownerAccess &&
                !staffAccess
            ) {
                alert("This addition has been hidden by Nullverse staff.");
                window.location.href = "explore.html";
                return;
            }

            renderAddition();
            renderModerationControls(data);
        }

        function renderAddition() {
            const data = currentAddition;
            const profile = authorProfile;
            const world = currentWorld;

            document.title = `${data.title || "Addition"} - Nullverse`;

            document.getElementById("back-link").href =
                `world-additions.html?id=${encodeURIComponent(data.world_id)}`;

            document.getElementById("type-badge").textContent =
                data.addition_type || "Addition";

            document.getElementById("addition-title").textContent =
                data.title || "Untitled Addition";

            document.getElementById("addition-summary").textContent =
                data.summary || "";

            const profileName =
                profile?.display_name ||
                profile?.username ||
                "Unknown Creator";

            const profileLink = profile?.username
                ? `<a href="profile.html?user=${encodeURIComponent(profile.username)}">${escapeHtml(profileName)}</a>`
                : escapeHtml(profileName);

            document.getElementById("addition-author").innerHTML =
                `A community addition to <strong>${escapeHtml(world?.title || "Unknown World")}</strong> by <strong>${profileLink}</strong>`;

            document.getElementById("addition-content").textContent =
                data.content || "No content yet.";

            document.getElementById("addition-status").textContent =
                formatStatus(data.status || "approved");

            document.getElementById("addition-world").innerHTML =
                world
                    ? `<a href="world.html?id=${encodeURIComponent(world.id)}">${escapeHtml(world.title || "World")}</a>`
                    : "Unknown World";

            document.getElementById("addition-creator").innerHTML =
                profile?.username
                    ? `<a href="profile.html?user=${encodeURIComponent(profile.username)}">${escapeHtml(profileName)}</a>`
                    : escapeHtml(profileName);

            document.getElementById("addition-updated").textContent =
                data.updated_at
                    ? new Date(data.updated_at).toLocaleDateString()
                    : "Unknown";

            renderCoverImage(data);
            renderContentImage(data);

            if (currentUser.id === data.author_id) {
                document.getElementById("edit-link").style.display = "inline-block";
                document.getElementById("edit-link").href =
                    `edit-addition.html?id=${encodeURIComponent(data.id)}`;
            }

            if (data.moderation_status === "hidden") {
                document.getElementById("addition-summary").insertAdjacentHTML(
                    "beforebegin",
                    `
                            <div style="margin:18px 0;padding:16px;border-radius:14px;border:1px solid rgba(255,160,60,.3);background:rgba(255,160,60,.08);">
                                <strong>Hidden by Moderation</strong>
                                <p style="margin:8px 0 0;">This addition is hidden from public view.</p>
                                <p style="margin:8px 0 0;">Reason: ${escapeHtml(data.moderation_reason || "No reason provided.")}</p>
                            </div>
                            `
                );
            }
        }

        function renderCoverImage(data) {
            const container = document.getElementById("cover-container");
            const cover = data.cover_image_url || data.image_url;

            if (!cover) {
                container.innerHTML = "";
                return;
            }

            container.innerHTML = `
                        <div class="cover-wrap">
                            <img class="cover"
                                 src="${escapeHtml(cover)}"
                                 alt="${escapeHtml(data.title || "Addition cover")}">

                            ${buildCreditPill({
                context: "Cover Image",
                type: data.cover_credit_type,
                name: data.cover_credit_name,
                username: data.cover_credit_nullverse_username,
                url: data.cover_credit_url,
                note: data.cover_credit_note,
                ownerUsername: authorProfile?.username
            })}
                        </div>
                    `;
        }

        function renderContentImage(data) {
            const container = document.getElementById("content-image-container");

            if (!data.content_image_url) {
                container.innerHTML = "";
                return;
            }

            container.innerHTML = `
                        <div class="content-image-wrap">
                            <img class="content-image"
                                 src="${escapeHtml(data.content_image_url)}"
                                 alt="${escapeHtml(data.content_image_caption || "Addition content image")}">

                            ${buildCreditPill({
                context: "Content Image",
                type: data.content_image_credit_type,
                name: data.content_image_credit_name,
                username: data.content_image_credit_nullverse_username,
                url: data.content_image_credit_url,
                note: data.content_image_credit_note,
                ownerUsername: authorProfile?.username
            })}
                        </div>

                        ${data.content_image_caption
                    ? `<p class="image-caption">${escapeHtml(data.content_image_caption)}</p>`
                    : ""}
                    `;
        }

        function buildCreditPill({
            context,
            type,
            name,
            username,
            url,
            note,
            ownerUsername
        }) {
            type = type || "no_credit_needed";

            const hasAnyCreditInfo =
                name ||
                username ||
                url ||
                note ||
                type !== "no_credit_needed";

            if (!hasAnyCreditInfo) {
                return "";
            }

            let source = "";
            let href = "";

            if (type === "own_work") {
                source = `@${ownerUsername || "creator"}`;

                if (ownerUsername) {
                    href = `profile.html?user=${encodeURIComponent(ownerUsername)}`;
                }
            } else if (type === "nullverse_creator" && username) {
                source = `@${username}`;
                href = `profile.html?user=${encodeURIComponent(username)}`;
            } else if (name) {
                source = name;
                href = url || "";
            } else if (username) {
                source = `@${username}`;
                href = `profile.html?user=${encodeURIComponent(username)}`;
            } else {
                source = formatCreditType(type);
                href = url || "";
            }

            const label = `Image Credit: ${source}`;

            const tooltip = `
            <span class="credit-tooltip">
                <strong>${escapeHtml(context)} Credit</strong>
                <br>
                Source: ${escapeHtml(source)}
                ${note ? `<br><br>${escapeHtml(note)}` : ""}
            </span>
        `;

            if (!href) {
                return `
                <span class="credit-pill">
                    <span class="credit-label">${escapeHtml(label)}</span>
                    ${tooltip}
                </span>
            `;
            }

            return `
            <a class="credit-pill"
               href="${escapeHtml(href)}"
               ${href.startsWith("http") ? 'target="_blank"' : ""}>
                <span class="credit-label">${escapeHtml(label)}</span>
                ${tooltip}
            </a>
        `;
        }

        function setupCreditTapSystem() {
            document.addEventListener("click", (e) => {
                const pill = e.target.closest(".credit-pill");

                document.querySelectorAll(".credit-pill").forEach(p => {
                    if (p !== pill) {
                        p.classList.remove("show-tooltip");
                    }
                });

                if (!pill) return;

                e.preventDefault();

                if (pill.classList.contains("show-tooltip")) {
                    const href = pill.getAttribute("href");

                    if (href && href !== "#") {
                        window.open(
                            href,
                            href.startsWith("http") ? "_blank" : "_self"
                        );
                    }

                    return;
                }

                pill.classList.add("show-tooltip");
            });
        }

        function renderModerationControls(addition) {
            const canModerate =
                canModerateAdditions(currentPermissions) &&
                canModerateContentOwner(currentProfile, addition.authorProfile);

            if (!canModerate) return;

            document.querySelector(".hero .actions").insertAdjacentHTML("beforeend", `
                        <div class="moderation-box">
                            <strong>Addition Moderation</strong>
                            <p class="empty">Status: ${escapeHtml(addition.moderation_status || "visible")}</p>

                            <label class="empty">Reason for hiding</label>
                            <input id="addition-hide-reason"
                                   placeholder="Reason shown to author...">

                            <div class="actions">
                                <button class="button" onclick="setAdditionModerationStatus('hidden')">Hide Addition</button>
                                <button class="button" onclick="setAdditionModerationStatus('visible')">Restore Addition</button>
                            </div>

                            <p id="addition-moderation-message" class="empty"></p>
                        </div>
                    `);
        }

        window.setAdditionModerationStatus = async function (status) {
            if (!currentAddition || !canModerateAdditions(currentPermissions)) return;

            const reasonInput = document.getElementById("addition-hide-reason");
            const reason = reasonInput ? reasonInput.value.trim() : "";
            const message = document.getElementById("addition-moderation-message");

            if (status === "hidden" && !reason) {
                if (message) message.textContent = "Enter a reason before hiding this addition.";
                return;
            }

            const { error } = await supabase
                .from("world_additions")
                .update({
                    moderation_status: status,
                    moderation_reason: status === "hidden" ? reason : null
                })
                .eq("id", currentAddition.id);

            if (error) {
                if (message) message.textContent = error.message;
                return;
            }

            await supabase.from("moderation_logs").insert({
                target_user_id: currentAddition.author_id,
                moderator_id: currentUser.id,
                action: `addition_${status}`,
                reason: status === "hidden"
                    ? reason
                    : `Addition "${currentAddition.title || "Untitled Addition"}" was restored.`,
                expires_at: null
            });

            if (status === "hidden") {
                await createNotification({
                    recipientId: currentAddition.author_id,
                    actorId: currentUser.id,
                    additionId: currentAddition.id,
                    type: "addition_hidden",
                    message: `Your addition "${currentAddition.title || "Untitled Addition"}" was hidden by moderation. Reason: ${reason}`,
                    link: `edit-addition.html?id=${encodeURIComponent(currentAddition.id)}`
                });
            }

            if (status === "visible") {
                await createNotification({
                    recipientId: currentAddition.author_id,
                    actorId: currentUser.id,
                    additionId: currentAddition.id,
                    type: "addition_restored",
                    message: `Your addition "${currentAddition.title || "Untitled Addition"}" was restored by moderation.`,
                    link: `addition.html?id=${encodeURIComponent(currentAddition.id)}`
                });
            }

            if (message) message.textContent = `Addition set to ${status}.`;

            setTimeout(() => {
                window.location.reload();
            }, 700);
        };

        async function loadLikes() {
            const { data: likes } = await supabase
                .from("world_addition_likes")
                .select("*")
                .eq("addition_id", additionId);

            const count = likes?.length || 0;

            document.getElementById("like-count").textContent =
                `${count} ${count === 1 ? "Like" : "Likes"}`;

            const userLiked = likes?.some(like => like.user_id === currentUser.id);
            const button = document.getElementById("like-button");

            button.textContent = userLiked ? "♥ Liked" : "♡ Like";
            button.dataset.liked = userLiked ? "true" : "false";
        }

        document.getElementById("like-button").addEventListener("click", async () => {
            const liked = document.getElementById("like-button").dataset.liked === "true";

            if (liked) {
                await supabase
                    .from("world_addition_likes")
                    .delete()
                    .eq("addition_id", additionId)
                    .eq("user_id", currentUser.id);
            } else {
                const { error: likeError } = await supabase
                    .from("world_addition_likes")
                    .insert({
                        addition_id: additionId,
                        user_id: currentUser.id
                    });

                if (!likeError) {
                    await createNotification({
                        recipientId: currentAddition.author_id,
                        actorId: currentUser.id,
                        additionId: currentAddition.id,
                        type: "addition_liked",
                        message: `Someone liked your addition: ${currentAddition.title}.`,
                        link: `addition.html?id=${encodeURIComponent(currentAddition.id)}`
                    });
                }
            }

            await loadLikes();
        });

        async function loadComments() {
            const container = document.getElementById("comments-container");

            const { data: comments, error } = await supabase
                .from("world_addition_comments")
                .select("*")
                .eq("addition_id", additionId)
                .order("created_at", { ascending: false });

            if (error) {
                container.innerHTML = `<p class="empty">${escapeHtml(error.message)}</p>`;
                return;
            }

            const visibleComments =
                (comments || []).filter(comment =>
                    !blockedUserIds.includes(comment.user_id)
                );

            if (!visibleComments.length) {
                container.innerHTML = `<p class="empty">No comments yet.</p>`;
                return;
            }

            const userIds = [
                ...new Set(visibleComments.map(comment => comment.user_id))
            ];

            const { data: profiles } = await supabase
                .from("profiles")
                .select("id, username, display_name")
                .in("id", userIds);

            container.innerHTML = visibleComments.map(comment => {
                const profile = profiles?.find(profile => profile.id === comment.user_id);
                const name = profile?.display_name || profile?.username || "Unknown";

                const canDelete =
                    currentUser.id === comment.user_id ||
                    currentUser.id === currentAddition.author_id;

                return `
                            <div class="comment">
                                <p><strong>${escapeHtml(name)}</strong></p>
                                <p>${escapeHtml(comment.content)}</p>

                                <button class="button"
                                        onclick="openAdditionCommentReport(
                                            '${comment.id}',
                                            '${comment.user_id}',
                                            \`${escapeHtml(comment.content)}\`
                                        )">
                                    Report Comment
                                </button>

                                ${canDelete ? `
                                    <button class="button" onclick="deleteComment('${comment.id}')">
                                        Delete
                                    </button>
                                ` : ""}
                            </div>
                        `;
            }).join("");
        }

        window.openAdditionCommentReport = function (commentId, userId, commentText) {
            pendingCommentReport = {
                commentId,
                userId,
                commentText
            };

            document.querySelector("#report-modal h2").textContent =
                "Report Comment";

            document.getElementById("report-details").value = "";
            document.getElementById("report-modal").style.display = "flex";
        };

        async function submitAdditionCommentReport() {
            if (!pendingCommentReport) return;

            const reason = document.getElementById("report-reason").value;
            const details = document.getElementById("report-details").value.trim();

            const { error } = await supabase
                .from("reports")
                .insert({
                    reporter_id: currentUser.id,
                    reported_user_id: pendingCommentReport.userId,
                    addition_id: currentAddition.id,
                    comment_id: pendingCommentReport.commentId,
                    report_type: "addition_comment",
                    reason,
                    details,
                    reported_text: pendingCommentReport.commentText,
                    status: "open"
                });

            if (error) {
                alert(error.message);
                return;
            }

            pendingCommentReport = null;
            document.getElementById("report-modal").style.display = "none";
            alert("Report submitted.");
        }

        window.submitComment = async function () {
            if (blockedUserIds.includes(currentAddition.author_id)) {
                alert("You cannot interact with this addition.");
                return;
            }

            const input = document.getElementById("comment-input");
            const content = input.value.trim();

            if (!content) return;

            const { error } = await supabase
                .from("world_addition_comments")
                .insert({
                    addition_id: additionId,
                    user_id: currentUser.id,
                    content
                });

            if (!error) {
                await createNotification({
                    recipientId: currentAddition.author_id,
                    actorId: currentUser.id,
                    additionId: currentAddition.id,
                    type: "addition_commented",
                    message: `Someone commented on your addition: ${currentAddition.title}.`,
                    link: `addition.html?id=${encodeURIComponent(currentAddition.id)}`
                });
            }

            if (error) {
                alert(error.message);
                return;
            }

            input.value = "";
            await loadComments();
        };

        window.deleteComment = async function (commentId) {
            const confirmed = confirm("Delete this comment?");
            if (!confirmed) return;

            const { error } = await supabase
                .from("world_addition_comments")
                .delete()
                .eq("id", commentId);

            if (error) {
                alert(error.message);
                return;
            }

            await loadComments();
        };

        function setupReportSystem() {
            const reportBtn = document.getElementById("report-addition-btn");
            const modal = document.getElementById("report-modal");
            const closeBtn = document.getElementById("close-report-btn");
            const submitBtn = document.getElementById("submit-report-btn");

            if (!reportBtn) return;

            reportBtn.addEventListener("click", () => {
                document.querySelector("#report-modal h2").textContent =
                    "Report Addition";

                pendingCommentReport = null;
                modal.style.display = "flex";
            });

            closeBtn.addEventListener("click", () => {
                modal.style.display = "none";
                pendingCommentReport = null;
            });

            submitBtn.addEventListener("click", () => {
                if (pendingCommentReport) {
                    submitAdditionCommentReport();
                } else {
                    submitAdditionReport();
                }
            });
        }

        async function submitAdditionReport() {
            if (!currentAddition) return;

            const reason = document.getElementById("report-reason").value;
            const details = document.getElementById("report-details").value.trim();

            const { error } = await supabase
                .from("reports")
                .insert({
                    reporter_id: currentUser.id,
                    reported_user_id: currentAddition.author_id,
                    addition_id: currentAddition.id,
                    report_type: "addition",
                    reason,
                    details,
                    status: "open"
                });

            if (error) {
                alert(error.message);
                return;
            }

            document.getElementById("report-modal").style.display = "none";
            alert("Report submitted.");
        }

        function formatStatus(value) {
            return String(value || "")
                .replaceAll("_", " ")
                .replace(/\b\w/g, letter => letter.toUpperCase());
        }

        function formatCreditType(value) {
            return String(value || "")
                .replaceAll("_", " ")
                .replace(/\b\w/g, letter => letter.toUpperCase());
        }

        function escapeHtml(value) {
            return String(value || "")
                .replaceAll("&", "&amp;")
                .replaceAll("<", "&lt;")
                .replaceAll(">", "&gt;")
                .replaceAll('"', "&quot;")
                .replaceAll("'", "&#039;");
        }

        window.logOut = async function () {
            await supabase.auth.signOut();
            window.location.href = "login.html";
        };
    </script>
</body>
</html>
