<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Notifications - Nullverse</title>

    <style>
        body {
            margin: 0;
            font-family: Arial,sans-serif;
            background: #0d0d12;
            color: #f2f2f2
        }

        header {
            padding: 24px 40px;
            border-bottom: 1px solid #2a2a35;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #111118;
            position: sticky;
            top: 0;
            z-index: 100
        }

        .logo a, nav a, nav button {
            color: #cfcfd8;
            text-decoration: none;
            background: none;
            border: none;
            cursor: pointer;
            font-family: Arial,sans-serif
        }

        .logo a {
            color: white;
            font-size: 1.6rem;
            font-weight: bold
        }

        nav {
            display: flex;
            gap: 22px;
            flex-wrap: wrap
        }

        main {
            max-width: 900px;
            margin: auto;
            padding: 45px 40px 80px
        }

        .hero, .panel, .notification-card {
            background: #15151f;
            border: 1px solid #2a2a35;
            border-radius: 16px;
            padding: 24px;
            margin-bottom: 20px
        }

        .hero {
            background: linear-gradient(135deg,#15151f,#1b1b2b)
        }

        h1 {
            margin: 0 0 10px;
            font-size: 2.5rem
        }

        p {
            color: #c8c8d4;
            line-height: 1.6
        }

        .button {
            display: inline-block;
            background: #2a2a44;
            color: white;
            border: none;
            padding: 10px 14px;
            border-radius: 8px;
            cursor: pointer;
            text-decoration: none;
            font-family: Arial,sans-serif
        }

            .button:hover {
                background: #3a3a5c
            }

        .empty {
            color: #8f8fa3
        }

        .notification-card.unread {
            border-color: #56568a;
            background: #191927
        }

        .notification-message {
            font-size: 1rem;
            margin-bottom: 10px
        }

        .notification-meta {
            color: #8f8fa3;
            font-size: .9rem
        }

        .actions {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            margin-top: 14px
        }

        .top-actions {
            display: flex;
            justify-content: space-between;
            gap: 14px;
            align-items: center;
            flex-wrap: wrap;
            margin-bottom: 22px
        }

        .badge {
            display: inline-block;
            border: 1px solid #333344;
            border-radius: 999px;
            padding: 5px 9px;
            color: #bdbdca;
            font-size: .82rem
        }

        @media(max-width:800px) {
            header {
                flex-direction: column;
                gap: 14px;
                padding: 20px
            }

            nav {
                justify-content: center
            }

            main {
                padding: 30px 24px 70px
            }

            h1 {
                font-size: 2.1rem
            }
        }
    </style>
</head>

<body>

    <header>
        <div class="logo"><a href="index.html">Nullverse</a></div>
        <nav>
            <a href="index.html">Home</a>
            <a href="explore.html">Explore</a>
            <a href="notifications.html">Notifications</a>
            <a href="dashboard.html">Dashboard</a>
            <button onclick="logOut()">Log Out</button>
        </nav>
    </header>

    <main>

        <section class="hero">
            <h1>Notifications</h1>
            <p>Updates from creators you follow, activity on your worlds, comments, likes, questions, and community additions.</p>
        </section>

        <div class="top-actions">
            <span id="notification-count" class="badge">Loading...</span>

            <div>
                <button class="button" onclick="markAllRead()">Mark All Read</button>
                <button class="button" onclick="clearRead()">Clear Read</button>
            </div>
        </div>

        <section id="notifications-container">
            <p class="empty">Loading notifications...</p>
        </section>

    </main>

    <script type="module">
import { requireBetaAccess } from "./betaGate.js";
import { supabase } from "./supabaseClient.js";

const currentUser = await requireBetaAccess();
        console.log("Viewing notifications as:", currentUser.id, currentUser.email);
await loadNotifications();

async function loadNotifications() {
    const container = document.getElementById("notifications-container");

    const { data: notifications, error } = await supabase
        .from("notifications")
        .select("*")
        .eq("recipient_id", currentUser.id)
        .order("created_at", { ascending: false });

    if (error) {
        container.innerHTML = `<p class="empty">${escapeHtml(error.message)}</p>`;
        return;
    }

    const unreadCount = notifications?.filter(n => !n.is_read).length || 0;

    document.getElementById("notification-count").textContent =
        `${unreadCount} unread`;

    if (!notifications || notifications.length === 0) {
        container.innerHTML = `<p class="empty">No notifications yet.</p>`;
        return;
    }

    container.innerHTML = notifications.map(notification => `
        <article class="notification-card ${notification.is_read ? "" : "unread"}">
            <div class="notification-message">
                ${escapeHtml(notification.message)}
            </div>

            <div class="notification-meta">
                ${formatDate(notification.created_at)}
            </div>

            <div class="actions">
                ${notification.link ? `
                    <a class="button" href="${escapeHtml(notification.link)}" onclick="markReadInline('${notification.id}')">
                        Open
                    </a>
                ` : ""}

                ${!notification.is_read ? `
                    <button class="button" onclick="markRead('${notification.id}')">
                        Mark Read
                    </button>
                ` : ""}

                <button class="button" onclick="deleteNotification('${notification.id}')">
                    Delete
                </button>
            </div>
        </article>
    `).join("");
}

window.markRead = async function(notificationId) {
    await supabase
        .from("notifications")
        .update({ is_read: true })
        .eq("id", notificationId)
        .eq("recipient_id", currentUser.id);

    await loadNotifications();
};

window.markReadInline = async function(notificationId) {
    await supabase
        .from("notifications")
        .update({ is_read: true })
        .eq("id", notificationId)
        .eq("recipient_id", currentUser.id);
};

window.markAllRead = async function() {
    await supabase
        .from("notifications")
        .update({ is_read: true })
        .eq("recipient_id", currentUser.id);

    await loadNotifications();
};

window.clearRead = async function() {
    await supabase
        .from("notifications")
        .delete()
        .eq("recipient_id", currentUser.id)
        .eq("is_read", true);

    await loadNotifications();
};

window.deleteNotification = async function(notificationId) {
    await supabase
        .from("notifications")
        .delete()
        .eq("id", notificationId)
        .eq("recipient_id", currentUser.id);

    await loadNotifications();
};

function formatDate(value) {
    if (!value) return "";
    return new Date(value).toLocaleString();
}

function escapeHtml(value) {
    return String(value || "")
        .replaceAll("&","&amp;")
        .replaceAll("<","&lt;")
        .replaceAll(">","&gt;")
        .replaceAll('"',"&quot;")
        .replaceAll("'","&#039;");
}

window.logOut = async function () {
    await supabase.auth.signOut();
    window.location.href = "login.html";
};
    </script>

</body>
</html>
