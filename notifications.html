<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" href="favicon.png">
    <title>Notifications - Nullverse</title>

    <script>
        const savedNullverseTheme =
            localStorage.getItem("nullverse-theme") || "void";

        document.documentElement.setAttribute(
            "data-theme",
            savedNullverseTheme
        );
    </script>

    <link rel="stylesheet" href="theme.css?v=25">

    <style>
        html {
            min-height: 100%;
            background: #000000;
        }

        body {
            margin: 0;
            min-height: 100vh;
            font-family: Arial, sans-serif;
            background: var(--page-bg);
            background-attachment: fixed;
            color: var(--text-primary);
            transition: background 0.25s ease, color 0.25s ease;
        }

        header {
            padding: 12px 40px;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(12,12,14,0.72);
            position: sticky;
            top: 0;
            z-index: 100;
            backdrop-filter: blur(18px);
            -webkit-backdrop-filter: blur(18px);
            box-shadow: 0 10px 35px rgba(0,0,0,0.28);
        }

        .logo,
        .logo a {
            display: flex;
            align-items: center;
        }

        .site-logo {
            height: 64px;
            width: auto;
            display: block;
            max-width: none;
        }

        nav {
            display: flex;
            gap: 22px;
            align-items: center;
            flex-wrap: wrap;
        }

            nav a,
            nav button {
                color: var(--text-secondary);
                text-decoration: none;
                background: none;
                border: none;
                cursor: pointer;
                font-family: Arial, sans-serif;
                font-size: 0.95rem;
                transition: 0.18s ease;
            }

                nav a:hover,
                nav button:hover {
                    color: white;
                }

                nav a.active {
                    color: white;
                    background: linear-gradient(180deg, #35353b 0%, #1d1d22 45%, #101014 100%);
                    padding: 8px 12px;
                    border-radius: 999px;
                    border: 1px solid rgba(255,255,255,0.12);
                    box-shadow: 0 0 18px rgba(255,255,255,0.10), inset 0 1px 0 rgba(255,255,255,0.07);
                }

        main {
            max-width: 900px;
            margin: auto;
            padding: 55px 40px 80px;
        }

        .hero {
            background: linear-gradient(135deg, rgba(255,255,255,0.06), rgba(255,255,255,0.02)), var(--panel-bg);
            border: 1px solid var(--border-color);
            border-radius: 22px;
            padding: 42px;
            margin-bottom: 28px;
            backdrop-filter: blur(18px);
            -webkit-backdrop-filter: blur(18px);
            box-shadow: 0 18px 40px rgba(0,0,0,0.24), 0 0 24px rgba(255,255,255,0.03);
        }

            .hero h1 {
                font-size: 3.4rem;
                margin: 0 0 18px;
                max-width: 850px;
            }

            .hero p {
                color: var(--text-secondary);
                font-size: 1.15rem;
                line-height: 1.7;
                max-width: 760px;
            }

        .panel {
            background: var(--panel-bg);
            border: 1px solid var(--border-color);
            border-radius: 18px;
            padding: 24px;
            margin-bottom: 24px;
            backdrop-filter: blur(18px);
            -webkit-backdrop-filter: blur(18px);
            box-shadow: 0 14px 34px rgba(0,0,0,0.22), 0 0 24px rgba(255,255,255,0.03);
        }

            .panel h2 {
                margin-top: 0;
            }

        .notification-card {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 18px;
            transition: 0.18s ease;
            box-shadow: 0 12px 30px rgba(0,0,0,0.18);
        }

            .notification-card:hover {
                transform: translateY(-2px);
                border-color: rgba(255,255,255,0.12);
                box-shadow: 0 18px 40px rgba(0,0,0,0.24), 0 0 22px rgba(255,255,255,0.05);
            }

            .notification-card.unread {
                border-color: rgba(255,255,255,0.22);
                background: linear-gradient(180deg, rgba(255,255,255,0.055), rgba(255,255,255,0.018)), var(--bg-tertiary);
            }

        p {
            color: var(--text-secondary);
            line-height: 1.6;
        }

        .button {
            display: inline-block;
            background: linear-gradient(180deg, #2a2a2f 0%, #16161a 45%, #0d0d10 100%);
            color: #f5f5f5;
            border: 1px solid rgba(255,255,255,0.12);
            padding: 11px 15px;
            border-radius: 10px;
            cursor: pointer;
            text-decoration: none;
            font-family: Arial, sans-serif;
            transition: 0.18s ease;
            box-shadow: 0 0 16px rgba(255,255,255,0.08), inset 0 1px 0 rgba(255,255,255,0.06);
        }

            .button:hover {
                background: linear-gradient(180deg, #3a3a40 0%, #202026 45%, #111116 100%);
                border-color: rgba(255,255,255,0.18);
                box-shadow: 0 0 20px rgba(255,255,255,0.12), inset 0 1px 0 rgba(255,255,255,0.08);
                transform: translateY(-1px);
            }

        .empty {
            color: var(--text-muted);
            line-height: 1.6;
        }

        .notification-message {
            font-size: 1rem;
            margin-bottom: 10px;
            color: var(--text-primary);
        }

        .notification-meta {
            color: var(--text-muted);
            font-size: 0.9rem;
        }

        .actions {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            margin-top: 14px;
        }

        .top-actions {
            display: flex;
            justify-content: space-between;
            gap: 14px;
            align-items: center;
            flex-wrap: wrap;
            margin-bottom: 22px;
        }

        .badge {
            display: inline-block;
            border: 1px solid var(--border-color);
            border-radius: 999px;
            padding: 5px 9px;
            color: var(--text-secondary);
            background: rgba(255,255,255,0.03);
            font-size: 0.82rem;
        }

        .notification-link {
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }

        .notification-badge {
            min-width: 18px;
            height: 18px;
            padding: 0 6px;
            border-radius: 999px;
            background: white;
            color: black;
            font-size: 0.72rem;
            align-items: center;
            justify-content: center;
            line-height: 1;
        }

        @media (max-width: 800px) {
            header {
                flex-direction: column;
                gap: 14px;
                padding: 20px;
            }

            nav {
                justify-content: center;
            }

            main {
                padding: 35px 24px 70px;
            }

            .hero h1 {
                font-size: 2.4rem;
            }

            .hero {
                padding: 28px;
            }
        }
    </style>
    <link rel="stylesheet" href="nullverse-shell.css?v=2">
    <link rel="stylesheet" href="notifications.css?v=2">
</head>

<body data-page="notifications" data-nv-beta-only-user="true" data-nv-active-only="true">
    <div class="nullverse-stars"></div>
    <div id="nv-site-header"></div>
    <div id="nv-mobile-nav"></div>

    <main class="nv-page-shell notifications-main">
        <section class="notifications-hero">
            <div><p class="notifications-kicker">Your activity center</p><h1>Notifications</h1><p>Follow replies, likes, moderation updates, questions, additions, and creator activity without losing the important things in one long stream.</p></div>
            <div class="notifications-summary">
                <div class="notification-summary-card"><strong id="notification-unread-total">0</strong><span>Unread</span></div>
                <div class="notification-summary-card"><strong id="notification-total">0</strong><span>Total</span></div>
            </div>
        </section>

        <section class="notifications-toolbar" aria-label="Notification controls">
            <input id="notification-search" class="notifications-search" type="search" placeholder="Search notifications..." autocomplete="off">
            <div class="notifications-filter-row">
                <button class="notification-filter active" type="button" data-notification-filter="all">All</button>
                <button class="notification-filter" type="button" data-notification-filter="unread">Unread</button>
                <button class="notification-filter" type="button" data-notification-filter="read">Read</button>
            </div>
            <div class="notifications-action-row">
                <span id="notification-count" class="badge">Loading...</span>
                <button class="button" type="button" onclick="markAllRead()">Mark All Read</button>
                <button class="button" type="button" onclick="clearRead()">Clear Read</button>
            </div>
        </section>

        <section id="notifications-container" class="notifications-list"><p class="notifications-empty">Loading notifications...</p></section>
    </main>

    <script type="module">
        import { requireBetaAccess } from "./betaGate.js";
        import { supabase } from "./supabaseClient.js";
        import { setupNotificationBadge } from "./notificationBadge.js";
        import { setupMessageBadge } from "./messageBadge.js";
        setupMessageBadge();

        const currentUser = await requireBetaAccess();
        setupNotificationBadge();
        console.log("Viewing notifications as:", currentUser.id, currentUser.email);

        let allNotifications = [];
        let activeNotificationFilter = "all";
        let notificationSearchQuery = "";

        document.querySelectorAll("[data-notification-filter]").forEach(button => {
            button.addEventListener("click", () => {
                activeNotificationFilter = button.dataset.notificationFilter || "all";
                document.querySelectorAll("[data-notification-filter]").forEach(item => item.classList.toggle("active", item === button));
                renderNotifications();
            });
        });

        document.getElementById("notification-search")?.addEventListener("input", event => {
            notificationSearchQuery = String(event.target.value || "").trim().toLowerCase();
            renderNotifications();
        });

        await loadNotifications();

        async function loadNotifications() {
            const container = document.getElementById("notifications-container");

            const { data: notifications, error } = await supabase
                .from("notifications")
                .select("*")
                .eq("recipient_id", currentUser.id)
                .order("created_at", { ascending: false });

            if (error) {
                container.innerHTML = `<p class="empty">${escapeHtml(error.message)}</p>`;
                return;
            }

            allNotifications = Array.isArray(notifications) ? notifications : [];
            const unreadCount = allNotifications.filter(notification => !notification.is_read).length;

            document.getElementById("notification-count").textContent = `${unreadCount} unread`;
            document.getElementById("notification-unread-total").textContent = String(unreadCount);
            document.getElementById("notification-total").textContent = String(allNotifications.length);
            renderNotifications();
        }

        function renderNotifications() {
            const container = document.getElementById("notifications-container");
            const filtered = allNotifications.filter(notification => {
                if (activeNotificationFilter === "unread" && notification.is_read) return false;
                if (activeNotificationFilter === "read" && !notification.is_read) return false;
                if (notificationSearchQuery && !String(notification.message || "").toLowerCase().includes(notificationSearchQuery)) return false;
                return true;
            });

            if (!filtered.length) {
                const message = allNotifications.length ? "No notifications match this view." : "No notifications yet.";
                container.innerHTML = `<div class="notifications-empty">${escapeHtml(message)}</div>`;
                return;
            }

            container.innerHTML = filtered.map(notification => `
                    <article class="notification-card ${notification.is_read ? "" : "unread"}">
                        <div class="notification-content">
                            <div class="notification-message">${escapeHtml(notification.message)}</div>
                            <div class="notification-meta">${formatDate(notification.created_at)}</div>
                        </div>
                        <div class="actions">
                            ${notification.link ? `<a class="button" href="${escapeHtml(notification.link)}" onclick="markReadInline('${notification.id}')">Open</a>` : ""}
                            ${!notification.is_read ? `<button class="button" onclick="markRead('${notification.id}')">Mark Read</button>` : ""}
                            <button class="button danger-action" onclick="deleteNotification('${notification.id}')">Delete</button>
                        </div>
                    </article>
                `).join("");
        }

        window.markRead = async function (notificationId) {
            await supabase
                .from("notifications")
                .update({ is_read: true })
                .eq("id", notificationId)
                .eq("recipient_id", currentUser.id);

            await loadNotifications();
        };

        window.markReadInline = async function (notificationId) {
            await supabase
                .from("notifications")
                .update({ is_read: true })
                .eq("id", notificationId)
                .eq("recipient_id", currentUser.id);
        };

        window.markAllRead = async function () {
            await supabase
                .from("notifications")
                .update({ is_read: true })
                .eq("recipient_id", currentUser.id);

            await loadNotifications();
        };

        window.clearRead = async function () {
            await supabase
                .from("notifications")
                .delete()
                .eq("recipient_id", currentUser.id)
                .eq("is_read", true);

            await loadNotifications();
        };

        window.deleteNotification = async function (notificationId) {
            await supabase
                .from("notifications")
                .delete()
                .eq("id", notificationId)
                .eq("recipient_id", currentUser.id);

            await loadNotifications();
        };

        function formatDate(value) {
            if (!value) return "";
            return new Date(value).toLocaleString();
        }

        function escapeHtml(value) {
            return String(value || "")
                .replaceAll("&", "&amp;")
                .replaceAll("<", "&lt;")
                .replaceAll(">", "&gt;")
                .replaceAll('"', "&quot;")
                .replaceAll("'", "&#039;");
        }


        const notificationChannel = supabase
            .channel(`notification-center-${currentUser.id}`)
            .on("postgres_changes", { event: "*", schema: "public", table: "notifications", filter: `recipient_id=eq.${currentUser.id}` }, loadNotifications)
            .subscribe();

        window.addEventListener("beforeunload", () => supabase.removeChannel(notificationChannel));

        window.logOut = async function () {
            await supabase.auth.signOut();
            window.location.href = "login.html";
        };
    </script>

    <script type="module" src="nullverse-shell-bootstrap.js?v=2"></script>
</body>
</html>
