<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" href="favicon.png">
    <title>Literature Comments - Nullverse</title>

    <script>
        const savedNullverseTheme =
            localStorage.getItem("nullverse-theme") || "void";

        document.documentElement.setAttribute(
            "data-theme",
            savedNullverseTheme
        );
    </script>

    <link rel="stylesheet" href="theme.css?v=25">

    <style>
        html {
            min-height: 100%;
            background: #000000;
        }

        body {
            margin: 0;
            min-height: 100vh;
            font-family: Arial, sans-serif;
            background: var(--page-bg);
            background-attachment: fixed;
            color: var(--text-primary);
        }

        header {
            padding: 12px 40px;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(12,12,14,0.72);
            position: sticky;
            top: 0;
            z-index: 100;
            backdrop-filter: blur(18px);
            -webkit-backdrop-filter: blur(18px);
            box-shadow: 0 10px 35px rgba(0,0,0,0.28);
        }

        .logo,
        .logo a {
            display: flex;
            align-items: center;
        }

        .site-logo {
            height: 64px;
            width: auto;
            display: block;
            max-width: none;
        }

        nav {
            display: flex;
            gap: 22px;
            flex-wrap: wrap;
            align-items: center;
        }

            nav a,
            nav button {
                color: var(--text-secondary);
                text-decoration: none;
                background: none;
                border: none;
                cursor: pointer;
                font-family: Arial, sans-serif;
                font-size: 0.95rem;
                transition: 0.18s ease;
            }

                nav a:hover,
                nav button:hover {
                    color: white;
                }

        main {
            max-width: 960px;
            margin: auto;
            padding: 45px 40px 80px;
            position: relative;
            z-index: 2;
        }

        header {
            position: sticky;
            z-index: 100;
        }

        .hero,
        .panel,
        .content-card {
            background: linear-gradient(135deg, rgba(255,255,255,0.06), rgba(255,255,255,0.02)), var(--panel-bg);
            border: 1px solid var(--border-color);
            border-radius: 22px;
            backdrop-filter: blur(18px);
            -webkit-backdrop-filter: blur(18px);
            box-shadow: 0 18px 40px rgba(0,0,0,0.24), 0 0 24px rgba(255,255,255,0.03);
        }

        .hero {
            padding: 34px;
            margin: 24px 0 28px;
        }

            .hero h1 {
                margin: 0 0 10px;
                font-size: clamp(2.2rem, 5vw, 3.4rem);
                line-height: 1.05;
            }

            .hero p,
            p {
                color: var(--text-secondary);
                line-height: 1.7;
            }

        .panel {
            padding: 26px;
            margin-bottom: 24px;
        }

        .content-card {
            background: var(--card-bg);
            border-radius: 18px;
            padding: 22px;
            margin-bottom: 18px;
            transition: 0.18s ease;
        }

            .content-card:hover {
                transform: translateY(-2px);
                border-color: rgba(255,255,255,0.12);
                box-shadow: 0 18px 40px rgba(0,0,0,0.24), 0 0 22px rgba(255,255,255,0.05);
            }

        .button {
            display: inline-block;
            background: linear-gradient(180deg, #2a2a2f 0%, #16161a 45%, #0d0d10 100%);
            color: #f5f5f5;
            border: 1px solid rgba(255,255,255,0.12);
            padding: 10px 14px;
            border-radius: 10px;
            cursor: pointer;
            text-decoration: none;
            font-family: Arial, sans-serif;
            transition: 0.18s ease;
            box-shadow: 0 0 16px rgba(255,255,255,0.08), inset 0 1px 0 rgba(255,255,255,0.06);
        }

            .button:hover {
                background: linear-gradient(180deg, #3a3a40 0%, #202026 45%, #111116 100%);
                border-color: rgba(255,255,255,0.18);
                box-shadow: 0 0 20px rgba(255,255,255,0.12), inset 0 1px 0 rgba(255,255,255,0.08);
                transform: translateY(-1px);
            }

            .button.danger {
                border-color: rgba(255,80,80,.35);
                color: #ffd7d7;
            }

        textarea,
        select,
        input {
            width: 100%;
            box-sizing: border-box;
            padding: 14px;
            border-radius: 14px;
            border: 1px solid var(--border-color);
            background: rgba(0,0,0,0.22);
            color: var(--text-primary);
            font-family: Arial, sans-serif;
            margin-bottom: 14px;
            transition: 0.18s ease;
        }

        textarea {
            resize: vertical;
        }

            textarea:focus,
            select:focus,
            input:focus {
                outline: none;
                border-color: rgba(255,255,255,0.16);
                box-shadow: 0 0 18px rgba(255,255,255,0.05);
            }

        .top-row,
        .actions {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            align-items: center;
        }

        .top-row {
            justify-content: space-between;
            margin-bottom: 8px;
        }

        .author-line,
        .meta,
        .empty {
            color: var(--text-muted);
        }

        .author-line {
            margin-bottom: 12px;
            font-size: 0.95rem;
        }

        .content-body {
            white-space: pre-wrap;
            color: var(--text-primary);
            line-height: 1.75;
        }

        .answer-box {
            margin-top: 20px;
            padding: 18px;
            border-radius: 16px;
            background: linear-gradient(180deg, rgba(255,255,255,0.05), rgba(255,255,255,0.015));
            border: 1px solid var(--border-color);
            box-shadow: inset 0 1px 0 rgba(255,255,255,0.04);
        }

        .modal {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,.75);
            z-index: 9999;
            justify-content: center;
            align-items: center;
            padding: 20px;
            box-sizing: border-box;
        }

        .modal-box {
            width: 520px;
            max-width: 100%;
            background: var(--panel-bg);
            border: 1px solid var(--border-color);
            border-radius: 18px;
            padding: 24px;
            box-shadow: 0 22px 60px rgba(0,0,0,.45);
        }

        .notification-link {
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }

        .notification-badge {
            min-width: 18px;
            height: 18px;
            padding: 0 6px;
            border-radius: 999px;
            background: white;
            color: black;
            font-size: 0.72rem;
            align-items: center;
            justify-content: center;
            line-height: 1;
        }

        @media (max-width: 800px) {
            header {
                flex-direction: column;
                gap: 14px;
                padding: 20px;
            }

            nav {
                justify-content: center;
            }

            main {
                padding: 32px 24px 70px;
            }

            .hero,
            .panel {
                padding: 24px;
            }
        }
    </style>
</head>

<body>
    <div class="nullverse-stars"></div>

    <header>
        <div class="logo">
            <a href="index.html">
                <img src="Nullverse-3.png" alt="Nullverse" class="site-logo">
            </a>
        </div>

        <nav>
            <a href="index.html">Home</a>
            <a href="notifications.html">Notifications</a>
            <a href="explore.html">Explore</a>
            <a href="profile.html">Profile</a>
            <a href="dashboard.html">Dashboard</a>
            <a href="messages.html">Messages</a>
            <button onclick="logOut()">Log Out</button>
        </nav>
    </header>


    <main>
        <div class="top-row">
            <a id="back-to-literature" class="button">← Back to Literature</a>
        </div>

        <section class="hero">
            <h1 id="page-title">Literature Comments</h1>
            <p id="page-subtitle">Loading literature...</p>
        </section>

        <section id="comment-form-section" class="panel">
            <h2>Leave a Comment</h2>

            <textarea id="comment-input"
                      rows="5"
                      placeholder="Share your thoughts about this story..."></textarea>

            <button class="button" id="post-comment-button">
                Post Comment
            </button>
        </section>

        <section>
            <h2>Comments</h2>
            <div id="comments-container">
                <p class="empty">Loading comments...</p>
            </div>
        </section>
    </main>

    <div id="report-modal" class="modal">
        <div class="modal-box">
            <h2 id="report-modal-title">Report Comment</h2>

            <select id="report-reason">
                <option>Spam</option>
                <option>Harassment</option>
                <option>Hate Speech</option>
                <option>NSFW Content</option>
                <option>Copyright Violation</option>
                <option>Misinformation</option>
                <option>Impersonation</option>
                <option>Other</option>
            </select>

            <textarea id="report-details"
                      rows="6"
                      placeholder="Additional details..."></textarea>

            <div class="actions">
                <button class="button" id="submit-report-btn">Submit Report</button>
                <button class="button" id="close-report-btn">Cancel</button>
            </div>
        </div>
    </div>

    <script type="module">
        import { requireBetaAccess } from "./betaGate.js";
        import { supabase } from "./supabaseClient.js";
        import { createNotification } from "./notifications.js";
        import { setupNotificationBadge } from "./notificationBadge.js";
        import { setupMessageBadge } from "./messageBadge.js";
        import {
            getCurrentUserWithPermissions,
            canModerateWorlds,
            canModerateContentOwner
        } from "./permissions.js?v=4";

        const currentUser = await requireBetaAccess();
        setupNotificationBadge();
        setupMessageBadge();

        const {
            profile: currentProfile,
            permissions: currentPermissions
        } = await getCurrentUserWithPermissions(currentUser.id);

        const params = new URLSearchParams(window.location.search);
        const literatureId = params.get("id");

        let currentLiterature = null;
        let blockedUserIds = [];
        let pendingReport = null;

        document.getElementById("post-comment-button")
            .addEventListener("click", submitComment);

        document.getElementById("close-report-btn")
            .addEventListener("click", closeReportModal);

        document.getElementById("submit-report-btn")
            .addEventListener("click", submitCommentReport);

        if (!literatureId) {
            alert("No literature ID provided.");
            window.location.href = "explore.html";
        }

        await loadBlockedUsers();
        await loadLiterature();
        await loadComments();

        async function loadBlockedUsers() {
            const { data, error } = await supabase
                .from("user_blocks")
                .select("blocker_id, blocked_id")
                .in("blocker_id", [currentUser.id]);

            const { data: reverseData, error: reverseError } = await supabase
                .from("user_blocks")
                .select("blocker_id, blocked_id")
                .in("blocked_id", [currentUser.id]);

            if (error || reverseError) {
                console.error(error || reverseError);
                blockedUserIds = [];
                return;
            }

            blockedUserIds = [
                ...(data || []).map(row => row.blocked_id),
                ...(reverseData || []).map(row => row.blocker_id)
            ];
        }

        async function loadLiterature() {
            const { data, error } = await supabase
                .from("worlds")
                .select("*")
                .eq("id", literatureId)
                .single();

            if (error || !data) {
                alert("Literature not found.");
                window.location.href = "explore.html";
                return;
            }

            if (data.content_type !== "literature") {
                alert("This comments page is only for literature projects.");
                window.location.href = `world.html?id=${encodeURIComponent(literatureId)}`;
                return;
            }

            currentLiterature = data;

            const { data: ownerProfile } = await supabase
                .from("profiles")
                .select("id, username, display_name, role, role_name")
                .eq("id", currentLiterature.owner_id)
                .single();

            currentLiterature.ownerProfile = ownerProfile;

            if (blockedUserIds.includes(currentLiterature.owner_id)) {
                alert("These comments are unavailable.");
                window.location.href = "explore.html";
                return;
            }

            const ownerAccess =
                currentUser.id === currentLiterature.owner_id;

            if (
                currentLiterature.moderation_status === "hidden" &&
                !ownerAccess &&
                !canModerateWorlds(currentPermissions)
            ) {
                alert("This literature has been hidden by Nullverse staff.");
                window.location.href = "explore.html";
                return;
            }

            document.title =
                `${currentLiterature.title || "Literature"} Comments - Nullverse`;

            document.getElementById("page-title").textContent =
                `${currentLiterature.title || "Untitled Literature"} Comments`;

            document.getElementById("page-subtitle").textContent =
                `Discuss ${currentLiterature.title || "this literature project"} with readers.`;

            document.getElementById("back-to-literature").href =
                `literature.html?id=${encodeURIComponent(literatureId)}`;

            if (ownerAccess) {
                document.getElementById("comment-form-section").style.display =
                    "none";
            }
        }

        async function loadComments() {
            const container =
                document.getElementById("comments-container");

            const { data: comments, error } = await supabase
                .from("world_comments")
                .select("*")
                .eq("world_id", literatureId)
                .order("created_at", { ascending: false });

            if (error) {
                container.innerHTML =
                    `<p class="empty">${escapeHtml(error.message)}</p>`;
                return;
            }

            const visibleComments =
                (comments || []).filter(comment =>
                    !blockedUserIds.includes(comment.user_id)
                );

            if (!visibleComments.length) {
                container.innerHTML =
                    `<p class="empty">No comments yet.</p>`;
                return;
            }

            const userIds = [
                ...new Set(visibleComments.map(comment => comment.user_id))
            ];

            const { data: profiles } = await supabase
                .from("profiles")
                .select("id, username, display_name")
                .in("id", userIds.length ? userIds : ["00000000-0000-0000-0000-000000000000"]);

            const profileMap =
                new Map((profiles || []).map(profile => [profile.id, profile]));

            container.innerHTML =
                visibleComments.map(comment =>
                    renderCommentCard(comment, profileMap.get(comment.user_id))
                ).join("");

            container.querySelectorAll("[data-action]").forEach(button => {
                button.addEventListener("click", handleCommentAction);
            });
        }

        function renderCommentCard(comment, profile) {
            const username =
                profile?.username || "unknown";

            const displayName =
                profile?.display_name || username;

            const canEdit =
                currentUser.id === comment.user_id;

            const canDelete =
                canEdit ||
                currentUser.id === currentLiterature.owner_id ||
                (
                    canModerateWorlds(currentPermissions) &&
                    canModerateContentOwner(currentProfile, currentLiterature.ownerProfile || { id: currentLiterature.owner_id, role_name: "creator" })
                );

            return `
                    <article class="content-card">
                        <div class="author-line">
                            <strong>${escapeHtml(displayName)}</strong>
                            (@${escapeHtml(username)})
                        </div>

                        <div class="content-body">
                            ${escapeHtml(comment.content)}
                        </div>

                        <div class="actions" style="margin-top:16px;">
                            <button class="button"
                                    data-action="report"
                                    data-comment-id="${escapeHtml(comment.id)}"
                                    data-user-id="${escapeHtml(comment.user_id)}">
                                Report Comment
                            </button>

                            ${canEdit ? `
                                <button class="button"
                                        data-action="edit"
                                        data-comment-id="${escapeHtml(comment.id)}">
                                    Edit
                                </button>
                            ` : ""}

                            ${canDelete ? `
                                <button class="button danger"
                                        data-action="delete"
                                        data-comment-id="${escapeHtml(comment.id)}">
                                    Delete
                                </button>
                            ` : ""}
                        </div>
                    </article>
                `;
        }

        async function handleCommentAction(event) {
            const button = event.currentTarget;
            const action = button.dataset.action;
            const commentId = button.dataset.commentId;

            if (action === "report") {
                await openCommentReport(commentId, button.dataset.userId);
            }

            if (action === "edit") {
                await editComment(commentId);
            }

            if (action === "delete") {
                await deleteComment(commentId);
            }
        }

        async function openCommentReport(commentId, userId) {
            const { data: comment, error } = await supabase
                .from("world_comments")
                .select("*")
                .eq("id", commentId)
                .single();

            if (error || !comment) {
                alert("This comment could not be loaded.");
                return;
            }

            pendingReport = {
                commentId,
                userId,
                reportedText: comment.content || ""
            };

            document.getElementById("report-details").value = "";
            document.getElementById("report-modal").style.display = "flex";
        }

        function closeReportModal() {
            pendingReport = null;
            document.getElementById("report-modal").style.display = "none";
        }

        async function submitCommentReport() {
            if (!pendingReport || !currentLiterature) return;

            const reason =
                document.getElementById("report-reason").value;

            const details =
                document.getElementById("report-details").value.trim();

            const { error } = await supabase
                .from("reports")
                .insert({
                    reporter_id: currentUser.id,
                    reported_user_id: pendingReport.userId,
                    world_id: literatureId,
                    comment_id: pendingReport.commentId,
                    report_type: "literature_comment",
                    reason,
                    details,
                    reported_text: pendingReport.reportedText,
                    status: "open"
                });

            if (error) {
                alert(error.message);
                return;
            }

            closeReportModal();
            alert("Report submitted.");
        }

        async function submitComment() {
            if (!currentLiterature) return;

            if (blockedUserIds.includes(currentLiterature.owner_id)) {
                alert("You cannot interact with this creator.");
                return;
            }

            if (currentUser.id === currentLiterature.owner_id) {
                return;
            }

            const input =
                document.getElementById("comment-input");

            const content =
                input.value.trim();

            if (!content) return;

            const { error } = await supabase
                .from("world_comments")
                .insert({
                    world_id: literatureId,
                    user_id: currentUser.id,
                    content
                });

            if (error) {
                alert(error.message);
                return;
            }

            await createNotification({
                recipientId: currentLiterature.owner_id,
                actorId: currentUser.id,
                worldId: literatureId,
                type: "literature_commented",
                message: `Someone commented on ${currentLiterature.title || "your literature"}.`,
                link: `literature-comments.html?id=${encodeURIComponent(literatureId)}`
            });

            input.value = "";
            await loadComments();
        }

        async function editComment(commentId) {
            const { data: comment, error: loadError } = await supabase
                .from("world_comments")
                .select("*")
                .eq("id", commentId)
                .single();

            if (loadError || !comment) {
                alert("Comment not found.");
                return;
            }

            if (comment.user_id !== currentUser.id) {
                alert("You can only edit your own comments.");
                return;
            }

            const updated =
                prompt("Edit comment:", comment.content || "");

            if (!updated || !updated.trim()) return;

            const { error } = await supabase
                .from("world_comments")
                .update({ content: updated.trim() })
                .eq("id", commentId)
                .eq("user_id", currentUser.id);

            if (error) {
                alert(error.message);
                return;
            }

            await loadComments();
        }

        async function deleteComment(commentId) {
            const confirmed =
                confirm("Delete this comment?");

            if (!confirmed) return;

            const { error } = await supabase
                .from("world_comments")
                .delete()
                .eq("id", commentId);

            if (error) {
                alert(error.message);
                return;
            }

            await loadComments();
        }

        function escapeHtml(value) {
            return String(value || "")
                .replaceAll("&", "&amp;")
                .replaceAll("<", "&lt;")
                .replaceAll(">", "&gt;")
                .replaceAll('"', "&quot;")
                .replaceAll("'", "&#039;");
        }

        window.logOut = async function () {
            await supabase.auth.signOut();
            window.location.href = "login.html";
        };
    </script>
</body>
</html>
