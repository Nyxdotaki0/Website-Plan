<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create World - Nullverse</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #0d0d12;
            color: #f2f2f2;
        }

        header {
            padding: 24px 40px;
            border-bottom: 1px solid #2a2a35;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #111118;
        }

        .logo a {
            color: white;
            text-decoration: none;
            font-size: 1.6rem;
            font-weight: bold;
        }

        nav {
            display: flex;
            gap: 22px;
            align-items: center;
            flex-wrap: wrap;
        }

            nav a, nav button {
                color: #cfcfd8;
                text-decoration: none;
                background: none;
                border: none;
                cursor: pointer;
                font-family: Arial, sans-serif;
            }

                nav a:hover, nav button:hover {
                    color: white;
                }

        main {
            max-width: 780px;
            margin: auto;
            padding: 50px 30px 70px;
        }

        .hero h1 {
            font-size: 3rem;
            margin: 0 0 12px;
        }

        .hero p {
            color: #bdbdca;
            line-height: 1.6;
            margin-bottom: 30px;
        }

        .panel {
            background: #15151f;
            border: 1px solid #2a2a35;
            border-radius: 14px;
            padding: 28px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: #d8d8e5;
        }

        input, textarea, select {
            width: 100%;
            padding: 12px;
            border-radius: 8px;
            border: 1px solid #333344;
            background: #0d0d12;
            color: white;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
            margin-bottom: 16px;
        }

        textarea {
            resize: vertical;
        }

        .button-row {
            display: flex;
            gap: 14px;
            flex-wrap: wrap;
            margin-top: 18px;
        }

        .button {
            background: #2a2a44;
            color: white;
            border: none;
            padding: 12px 16px;
            border-radius: 8px;
            cursor: pointer;
            text-decoration: none;
            font-family: Arial, sans-serif;
        }

            .button:hover {
                background: #3a3a5c;
            }

       

        .secondary-button {
            background: #1d1d2a;
        }

        .message {
            margin-top: 18px;
            color: #bdbdca;
        }
    </style>
</head>

<body>

    <header>
        <div class="logo">
            <a href="index.html">Nullverse</a>
        </div>

        <nav>
            <a href="index.html">Home</a>
            <a href="explore.html">Explore</a>
            <a href="dashboard.html">Dashboard</a>
            <button onclick="logOut()">Log Out</button>
        </nav>
    </header>

    <main>
        <section class="hero">
            <h1>Create a World</h1>
            <p>
                Start with the basics. After creation, you’ll enter the World Editor
                where you can add stories, characters, lore, languages, timelines,
                locations, and tags.
            </p>
        </section>

        <section class="panel">
            <label>World Title</label>
            <input id="world-title" placeholder="Example: Static Earth">

            <label>Short Summary</label>
            <textarea id="world-summary" rows="5" placeholder="Describe the world in a few sentences..."></textarea>

            <label>Visibility</label>
            <select id="world-visibility">
                <option value="published">Published</option>
                <option value="draft">Draft</option>
            </select>

            <div class="button-row">
                <button class="button" onclick="createWorld()">Create World</button>
                <a class="button secondary-button" href="dashboard.html">Cancel</a>
            </div>

            <p id="message" class="message"></p>
        </section>
    </main>

    <script type="module">
        import { requireBetaAccess } from "./betaGate.js";
        import { supabase } from "./supabaseClient.js";

        const user = await requireBetaAccess();

        window.createWorld = async function () {
            const message = document.getElementById("message");

            const title = document.getElementById("world-title").value.trim();
            const summary = document.getElementById("world-summary").value.trim();
            const visibility = document.getElementById("world-visibility").value;

            if (!title) {
                message.textContent = "World title is required.";
                return;
            }

            if (!summary) {
                message.textContent = "World summary is required.";
                return;
            }

            message.textContent = "Creating world...";

            const { data: world, error } = await supabase
                .from("worlds")
                .insert({
                    owner_id: user.id,
                    title: title,
                    summary: summary,
                    genres: "",
                    themes: "",
                    visibility: visibility,
                    featured: false
                })
                .select()
                .single();

            if (error || !world) {
                message.textContent = error?.message || "Failed to create world.";
                return;
            }

            window.location.href = `edit-world.html?id=${world.id}`;
        };

        window.logOut = async function () {
            await supabase.auth.signOut();
            window.location.href = "login.html";
        };
    </script>

</body>
</html>
