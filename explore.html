<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Explore - Nullverse</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #0d0d12;
            color: #f2f2f2;
        }

        header {
            padding: 24px 40px;
            border-bottom: 1px solid #2a2a35;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #111118;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .logo a {
            color: white;
            text-decoration: none;
            font-size: 1.6rem;
            font-weight: bold;
        }

        nav {
            display: flex;
            gap: 22px;
            align-items: center;
            flex-wrap: wrap;
        }

            nav a, nav button {
                color: #cfcfd8;
                text-decoration: none;
                background: none;
                border: none;
                cursor: pointer;
                font-family: Arial, sans-serif;
                font-size: 0.95rem;
                padding: 0;
            }

                nav a:hover, nav button:hover {
                    color: white;
                }

        main {
            max-width: 1200px;
            margin: auto;
            padding: 45px 40px 70px;
        }

        .hero {
            margin-bottom: 28px;
        }

            .hero h1 {
                font-size: 3rem;
                margin: 0 0 12px;
            }

            .hero p {
                color: #bdbdca;
                max-width: 720px;
                line-height: 1.6;
                font-size: 1.1rem;
            }

        .panel {
            background: #15151f;
            border: 1px solid #2a2a35;
            border-radius: 12px;
            padding: 22px;
            margin-bottom: 24px;
        }

        .filters {
            display: grid;
            grid-template-columns: 1fr 220px;
            gap: 14px;
        }

        input, select {
            width: 100%;
            padding: 12px;
            border-radius: 8px;
            border: 1px solid #333344;
            background: #0d0d12;
            color: white;
            font-family: Arial, sans-serif;
            box-sizing: border-box;
        }

        .feed-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 14px;
            flex-wrap: wrap;
            margin-bottom: 16px;
        }

            .feed-header h2 {
                margin: 0;
            }

        .button {
            display: inline-block;
            background: #2a2a44;
            color: white;
            border: none;
            padding: 10px 14px;
            border-radius: 8px;
            cursor: pointer;
            text-decoration: none;
            font-family: Arial, sans-serif;
            font-size: 0.95rem;
        }

            .button:hover {
                background: #3a3a5c;
            }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
            gap: 18px;
        }

        .work-card {
            background: #1b1b28;
            border: 1px solid #2a2a35;
            border-radius: 14px;
            padding: 20px;
            transition: transform 0.15s ease, border-color 0.15s ease;
        }

            .work-card:hover {
                transform: translateY(-2px);
                border-color: #44445f;
            }

        .work-type {
            display: inline-block;
            font-size: 0.78rem;
            color: #bdbdca;
            border: 1px solid #333344;
            border-radius: 999px;
            padding: 5px 9px;
            margin-bottom: 12px;
        }

        .work-card h3 {
            margin: 0 0 8px;
            font-size: 1.35rem;
        }

        .work-card p {
            color: #c8c8d4;
            line-height: 1.5;
        }

        .creator {
            margin-top: 14px;
            color: #8f8fa3;
            font-size: 0.9rem;
        }

            .creator a {
                color: #cfcfd8;
                text-decoration: none;
            }

                .creator a:hover {
                    color: white;
                }

        .empty {
            color: #8f8fa3;
            line-height: 1.6;
        }

        @media (max-width: 800px) {
            header {
                flex-direction: column;
                gap: 14px;
                padding: 20px;
            }

            nav {
                justify-content: center;
            }

            main {
                padding: 30px 24px 60px;
            }

            .hero h1 {
                font-size: 2.3rem;
            }

            .filters {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>

<body>

    <header>
        <div class="logo">
            <a href="index.html">Nullverse</a>
        </div>

        <nav>
            <a href="index.html">Home</a>
            <a href="explore.html">Explore</a>
            <a href="world.html">Worlds</a>
            <a href="character.html">Characters</a>
            <a href="story.html">Stories</a>
            <a href="dashboard.html">Dashboard</a>
            <button onclick="logOut()">Log Out</button>
        </nav>
    </header>

    <main>
        <section class="hero">
            <h1>Explore the Nullverse</h1>
            <p>
                Discover worlds, characters, stories, lore entries, documents, and fictional languages
                published by creators inside the closed beta.
            </p>
        </section>

        <section class="panel">
            <div class="filters">
                <input id="search-input" placeholder="Search by title, description, creator, or type...">

                <select id="type-filter">
                    <option value="All">All Types</option>
                    <option value="World">Worlds</option>
                    <option value="Character">Characters</option>
                    <option value="Story">Stories</option>
                    <option value="Lore">Lore</option>
                    <option value="Document">Documents</option>
                    <option value="Language">Languages</option>
                </select>
            </div>
        </section>

        <section class="panel">
            <div class="feed-header">
                <h2>Published Works</h2>
                <a class="button" href="create-work.html">Create Work</a>
            </div>

            <div id="works-feed" class="grid">
                <p class="empty">Loading published works...</p>
            </div>
        </section>
    </main>

    <script type="module">
        import { requireBetaAccess } from "./betaGate.js";
        import { supabase } from "./supabaseClient.js";

        await requireBetaAccess();

        let allWorks = [];

        async function loadWorks() {
            const feed = document.getElementById("works-feed");

            const { data, error } = await supabase
                .from("works")
                .select(`
                    id,
                    title,
                    work_type,
                    description,
                    content,
                    featured,
                    created_at,
                    owner_id,
                    profiles (
                        username,
                        display_name,
                        avatar_url
                    )
                `)
                .eq("visibility", "published")
                .order("created_at", { ascending: false });

            if (error) {
                feed.innerHTML = `<p class="empty">${error.message}</p>`;
                return;
            }

            allWorks = data || [];
            renderWorks();
        }

        function renderWorks() {
            const feed = document.getElementById("works-feed");
            const searchValue = document.getElementById("search-input").value.toLowerCase().trim();
            const typeValue = document.getElementById("type-filter").value;

            let filteredWorks = allWorks;

            if (typeValue !== "All") {
                filteredWorks = filteredWorks.filter(work => work.work_type === typeValue);
            }

            if (searchValue) {
                filteredWorks = filteredWorks.filter(work => {
                    const creatorName = work.profiles?.display_name || "";
                    const username = work.profiles?.username || "";

                    return (
                        work.title?.toLowerCase().includes(searchValue) ||
                        work.description?.toLowerCase().includes(searchValue) ||
                        work.work_type?.toLowerCase().includes(searchValue) ||
                        creatorName.toLowerCase().includes(searchValue) ||
                        username.toLowerCase().includes(searchValue)
                    );
                });
            }

            if (!filteredWorks.length) {
                feed.innerHTML = `<p class="empty">No works found.</p>`;
                return;
            }

            feed.innerHTML = filteredWorks.map(renderWorkCard).join("");
        }

        function renderWorkCard(work) {
            const username = work.profiles?.username || "unknown";
            const displayName = work.profiles?.display_name || "Unknown Creator";

            return `
                <article class="work-card">
                    <span class="work-type">${escapeHtml(work.work_type || "Work")}</span>

                    <h3>${escapeHtml(work.title || "Untitled Work")}</h3>

                    <p>${escapeHtml(work.description || "No description provided.")}</p>

                    <div class="creator">
                        by <a href="profile.html?user=${encodeURIComponent(username)}">
                            ${escapeHtml(displayName)} (@${escapeHtml(username)})
                        </a>
                    </div>
                </article>
            `;
        }

        function escapeHtml(value) {
            return String(value)
                .replaceAll("&", "&amp;")
                .replaceAll("<", "&lt;")
                .replaceAll(">", "&gt;")
                .replaceAll('"', "&quot;")
                .replaceAll("'", "&#039;");
        }

        document.getElementById("search-input").addEventListener("input", renderWorks);
        document.getElementById("type-filter").addEventListener("change", renderWorks);

        window.logOut = async function () {
            await supabase.auth.signOut();
            window.location.href = "login.html";
        };

        loadWorks();
    </script>

</body>
</html>
