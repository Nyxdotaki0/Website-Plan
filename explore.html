<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" href="favicon.png">
    <title>Explore - Nullverse</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #0d0d12;
            color: #f2f2f2;
        }

        header {
            padding: 24px 40px;
            border-bottom: 1px solid #2a2a35;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #111118;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .logo {
            display: flex;
            align-items: center;
        }

            .logo a {
                display: flex;
                align-items: center;
            }

        .site-logo {
            height: 64px;
            width: auto;
            display: block;
            max-width: none;
        }

        nav {
            display: flex;
            gap: 22px;
            align-items: center;
            flex-wrap: wrap;
        }

            nav a, nav button {
                color: #cfcfd8;
                text-decoration: none;
                background: none;
                border: none;
                cursor: pointer;
                font-family: Arial, sans-serif;
                font-size: 0.95rem;
                padding: 0;
            }

                nav a:hover, nav button:hover {
                    color: white;
                }
                nav a.active {
                    color: white;
                    background: #2a2a44;
                    padding: 8px 12px;
                    border-radius: 999px;
                }

        main {
            max-width: 1200px;
            margin: auto;
            padding: 45px 40px 70px;
        }

        .hero {
            margin-bottom: 28px;
        }

            .hero h1 {
                font-size: 3rem;
                margin: 0 0 12px;
            }

            .hero p {
                color: #bdbdca;
                max-width: 720px;
                line-height: 1.6;
                font-size: 1.1rem;
            }

        .panel {
            background: #15151f;
            border: 1px solid #2a2a35;
            border-radius: 12px;
            padding: 22px;
            margin-bottom: 24px;
        }

        .filters {
            display: grid;
            grid-template-columns: 1fr 220px 120px 160px;
            gap: 14px;
        }

        input, select {
            width: 100%;
            padding: 12px;
            border-radius: 8px;
            border: 1px solid #333344;
            background: #0d0d12;
            color: white;
            font-family: Arial, sans-serif;
            box-sizing: border-box;
        }

        .button {
            display: inline-block;
            background: #2a2a44;
            color: white;
            border: none;
            padding: 10px 14px;
            border-radius: 8px;
            cursor: pointer;
            text-decoration: none;
            font-family: Arial, sans-serif;
            font-size: 0.95rem;
        }

            .button:hover {
                background: #3a3a5c;
            }

        .feed-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 14px;
            flex-wrap: wrap;
            margin-bottom: 16px;
        }

            .feed-header h2 {
                margin: 0;
            }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
            gap: 18px;
        }

        .work-card, .creator-card {
            background: #1b1b28;
            border: 1px solid #2a2a35;
            border-radius: 14px;
            padding: 20px;
            transition: transform 0.15s ease, border-color 0.15s ease;
        }

            .work-card:hover, .creator-card:hover {
                transform: translateY(-2px);
                border-color: #44445f;
            }

        .work-type {
            display: inline-block;
            font-size: 0.78rem;
            color: #bdbdca;
            border: 1px solid #333344;
            border-radius: 999px;
            padding: 5px 9px;
            margin-bottom: 12px;
        }

        .work-card h3, .creator-card h3 {
            margin: 0 0 8px;
            font-size: 1.35rem;
        }

        .work-card p, .creator-card p {
            color: #c8c8d4;
            line-height: 1.5;
        }

        .creator-card {
            display: flex;
            gap: 14px;
            align-items: center;
        }

        .work-card h3 a {
            color: white;
            text-decoration: none;
        }

            .work-card h3 a:hover {
                text-decoration: underline;
            }

        .creator-card img {
            width: 62px;
            height: 62px;
            border-radius: 50%;
            object-fit: cover;
            background: #2a2a35;
        }

        .creator-card a, .creator a {
            color: #cfcfd8;
            text-decoration: none;
        }

            .creator-card a:hover, .creator a:hover {
                color: white;
            }

        .creator {
            margin-top: 14px;
            color: #8f8fa3;
            font-size: 0.9rem;
        }

        .empty {
            color: #8f8fa3;
            line-height: 1.6;
        }

        @media (max-width: 800px) {
            header {
                flex-direction: column;
                gap: 14px;
                padding: 20px;
            }

            nav {
                justify-content: center;
            }

            main {
                padding: 30px 24px 60px;
            }

            .hero h1 {
                font-size: 2.3rem;
            }

            .filters {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>

<body>

    <header>
        <div class="logo">
            <a href="index.html">
                <img src="Nullverse-3.png"
                     alt="Nullverse"
                     class="site-logo">
            </a>
        </div>

        <nav>
            <a href="index.html">Home</a>
            <a href="notifications.html">Notifications</a>
            <a href="explore.html" class="active">Explore</a>
            <a href="profile.html">Profile</a>
            <a href="dashboard.html">Dashboard</a>
            <button onclick="logOut()">Log Out</button>
        </nav>
    </header>

    <main>
        <section class="hero">
            <h1>Explore the Nullverse</h1>
            <p>
                Search creators, worlds, characters, stories, lore entries, documents, and fictional languages
                published inside the closed beta.
            </p>
        </section>

        <section class="panel">
            <div class="filters">
                <input id="search-input" placeholder="Search creators, usernames, worlds, stories...">

                <option value="All">All Worlds</option>

                <button id="search-button" class="button">Search</button>
                <select id="sort-filter">
                    <option value="Newest">Newest</option>
                    <option value="Popular">Popular</option>
                </select>

            </div>
        </section>

        <section class="panel">
            <div class="feed-header">
                <h2>Creators</h2>
            </div>

            <div id="profiles-feed" class="grid">
                <p class="empty">Loading creators...</p>
            </div>
        </section>

        <section class="panel">
            <div class="feed-header">
                <h2>Published Worlds</h2>
                <a class="button" href="create-world.html">Create World</a>
            </div>

            <div id="works-feed" class="grid">
                <p class="empty">Loading published works...</p>
            </div>
        </section>
    </main>

    <script type="module">
        import { requireBetaAccess } from "./betaGate.js";
        import { supabase } from "./supabaseClient.js";

        await requireBetaAccess();

        let allWorlds = [];
        let allProfiles = [];

        async function loadExploreData() {
            await Promise.all([
                loadWorlds(),
                loadProfiles()
            ]);

            renderExplore();
        }

        async function loadWorlds() {

            const { data: worldsData, error } = await supabase
                .from("worlds")
                .select("*")
                .eq("visibility", "published")
                .order("updated_at", { ascending: false });

            if (error) {
                document.getElementById("works-feed").innerHTML =
                    `<p class="empty">${escapeHtml(error.message)}</p>`;
                return;
            }

            const ownerIds = [
                ...new Set(
                    (worldsData || []).map(world => world.owner_id)
                )
            ];

            let profilesData = [];

            if (ownerIds.length > 0) {

                const { data: profiles, error: profilesError } = await supabase
                    .from("profiles")
                    .select("id, username, display_name, avatar_url")
                    .in("id", ownerIds);

                if (profilesError) {
                    document.getElementById("works-feed").innerHTML =
                        `<p class="empty">${escapeHtml(profilesError.message)}</p>`;
                    return;
                }

                profilesData = profiles || [];
            }

            const { data: likesData } = await supabase
                .from("world_likes")
                .select("world_id");

            allWorlds = (worldsData || []).map(world => {

                const profile =
                    profilesData.find(
                        profile => profile.id === world.owner_id
                    );

                const likeCount = likesData
                    ? likesData.filter(
                        like => like.world_id === world.id
                    ).length
                    : 0;

                return {
                    ...world,
                    profile: profile || null,
                    likeCount: likeCount
                };
            });
        }

        async function loadProfiles() {

            const { data, error } = await supabase
                .from("profiles")
                .select("id, username, display_name, bio, creator_type, avatar_url")
                .order("created_at", { ascending: false });

            if (error) {
                document.getElementById("profiles-feed").innerHTML =
                    `<p class="empty">${escapeHtml(error.message)}</p>`;
                return;
            }

            allProfiles = data || [];
        }

        function renderExplore() {
            renderProfiles();
            renderWorlds();
        }

        function getSearchValue() {
            return document.getElementById("search-input")
                .value
                .toLowerCase()
                .trim();
        }

        function renderProfiles() {

            const feed =
                document.getElementById("profiles-feed");

            const searchValue =
                getSearchValue();

            let filteredProfiles =
                allProfiles;

            if (searchValue) {

                filteredProfiles =
                    filteredProfiles.filter(profile => {

                        return (
                            profile.display_name?.toLowerCase().includes(searchValue) ||
                            profile.username?.toLowerCase().includes(searchValue) ||
                            profile.bio?.toLowerCase().includes(searchValue) ||
                            profile.creator_type?.toLowerCase().includes(searchValue)
                        );
                    });
            }

            if (!filteredProfiles.length) {
                feed.innerHTML =
                    `<p class="empty">No creators found.</p>`;
                return;
            }

            feed.innerHTML =
                filteredProfiles.map(renderProfileCard).join("");
        }

        function renderWorlds() {

            const feed =
                document.getElementById("works-feed");

            const searchValue =
                getSearchValue();

            const sortValue =
                document.getElementById("sort-filter").value;

            let filteredWorlds =
                allWorlds;

            if (searchValue) {

                filteredWorlds =
                    filteredWorlds.filter(world => {

                        const creatorName =
                            world.profile?.display_name || "";

                        const username =
                            world.profile?.username || "";

                        return (
                            world.title?.toLowerCase().includes(searchValue) ||
                            world.summary?.toLowerCase().includes(searchValue) ||
                            world.genres?.toLowerCase().includes(searchValue) ||
                            world.themes?.toLowerCase().includes(searchValue) ||
                            creatorName.toLowerCase().includes(searchValue) ||
                            username.toLowerCase().includes(searchValue)
                        );
                    });
            }

            if (sortValue === "Popular") {

                filteredWorlds.sort(
                    (a, b) => b.likeCount - a.likeCount
                );

            } else {

                filteredWorlds.sort(
                    (a, b) =>
                        new Date(b.updated_at || b.created_at) -
                        new Date(a.updated_at || a.created_at)
                );
            }

            if (!filteredWorlds.length) {
                feed.innerHTML =
                    `<p class="empty">No worlds found.</p>`;
                return;
            }

            feed.innerHTML =
                filteredWorlds.map(renderWorldCard).join("");
        }

        function renderProfileCard(profile) {

            const username =
                profile.username || "unknown";

            const displayName =
                profile.display_name || "Unnamed Creator";

            const avatar =
                profile.avatar_url ||
                "https://placehold.co/200x200/1b1b28/ffffff?text=NV";

            return `
                <article class="creator-card">

                    <img src="${escapeAttribute(avatar)}"
                         alt="${escapeAttribute(displayName)} profile picture">

                    <div>

                        <h3>
                            <a href="profile.html?user=${encodeURIComponent(username)}">
                                ${escapeHtml(displayName)}
                            </a>
                        </h3>

                        <p>@${escapeHtml(username)}</p>

                        <p>
                            ${escapeHtml(profile.creator_type || "Creator")}
                        </p>

                    </div>

                </article>
            `;
        }

        function renderWorldCard(world) {

            const coverImage =
                world.cover_image_url ||
                "https://placehold.co/600x600/1b1b28/ffffff?text=World";

            return `
        <article class="work-card">

            <div style="
    width:100%;
    height:145px;
    border-radius:12px;
    overflow:hidden;
    margin-bottom:16px;
    background:#222;
">
    <img
        src="${escapeHtml(coverImage)}"
        alt="${escapeHtml(world.title || "World cover")}"
        style="
            width:100%;
            height:100%;
            object-fit:cover;
            display:block;
        "
    >
</div>

            <span class="work-type">
                ${escapeHtml(world.genres || "World")}
            </span>

            <h3>
                <a href="world.html?id=${encodeURIComponent(world.id)}">
                    ${escapeHtml(world.title || "Untitled World")}
                </a>
            </h3>

            <p>
                ${escapeHtml(world.summary || "No summary yet.")}
            </p>

            <p class="empty">
                ${escapeHtml(world.themes || "")}
            </p>

            <div class="creator">
                ♥ ${world.likeCount || 0} Likes
            </div>

        </article>
    `;
        }

        function escapeHtml(value) {
            return String(value || "")
                .replaceAll("&", "&amp;")
                .replaceAll("<", "&lt;")
                .replaceAll(">", "&gt;")
                .replaceAll('"', "&quot;")
                .replaceAll("'", "&#039;");
        }

        function escapeAttribute(value) {
            return escapeHtml(value)
                .replaceAll("`", "&#096;");
        }

        document.getElementById("search-button")
            .addEventListener("click", renderExplore);

        document.getElementById("search-input")
            .addEventListener("keydown", function (event) {

                if (event.key === "Enter") {
                    renderExplore();
                }
            });

        document.getElementById("sort-filter")
            .addEventListener("change", renderExplore);

        window.logOut = async function () {
            await supabase.auth.signOut();
            window.location.href = "login.html";
        };

        loadExploreData();
    </script>

</body>
</html>
