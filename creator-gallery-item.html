<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OC / Gallery Showcase - Nullverse</title>
    <link rel="icon" type="image/png" href="favicon.png">
    <script>
        const savedNullverseTheme = localStorage.getItem("nullverse-theme") || "void";
        document.documentElement.setAttribute("data-theme", savedNullverseTheme);</script>
    <link rel="stylesheet" href="theme.css?v=25">
    <style>
        * {
            box-sizing: border-box;
        }

        html {
            min-height: 100%;
            background: #000;
        }

        body {
            margin: 0;
            min-height: 100vh;
            font-family: Arial,sans-serif;
            background: var(--page-bg);
            color: var(--text-primary);
        }

        header {
            position: sticky;
            top: 0;
            z-index: 1000;
            padding: 12px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 20px;
            border-bottom: 1px solid var(--border-color);
            background: rgba(12,12,14,.72);
            backdrop-filter: blur(18px);
            box-shadow: 0 10px 35px rgba(0,0,0,.28);
        }

        .logo, .logo a {
            display: flex;
            align-items: center;
        }

        .site-logo {
            height: 52px;
            width: auto;
            display: block;
        }

        nav {
            display: flex;
            gap: 18px;
            flex-wrap: wrap;
            align-items: center;
        }

            nav a, nav button {
                color: var(--text-secondary);
                text-decoration: none;
                background: none;
                border: 0;
                cursor: pointer;
                font: inherit;
            }

                nav a:hover, nav button:hover {
                    color: #fff;
                }

        main {
            min-height: calc(100vh - 77px);
        }

        .default-shell {
            width: min(1100px, calc(100% - 40px));
            margin: 0 auto;
            padding: 44px 0 90px;
        }

        .default-card {
            border: 1px solid var(--border-color);
            border-radius: 26px;
            padding: 26px;
            background: linear-gradient(135deg, rgba(255,255,255,.055), rgba(255,255,255,.015)), var(--panel-bg);
            backdrop-filter: blur(18px);
            box-shadow: 0 22px 55px rgba(0,0,0,.28);
        }

        .default-layout {
            display: grid;
            grid-template-columns: minmax(280px, 520px) minmax(0, 1fr);
            gap: 28px;
            align-items: start;
        }

        .default-image {
            width: 100%;
            border-radius: 22px;
            max-height: 70vh;
            object-fit: contain;
            background: rgba(0,0,0,.24);
            border: 1px solid rgba(255,255,255,.10);
        }

        .default-card h1 {
            margin: 0 0 10px;
            font-size: clamp(2rem, 4vw, 4rem);
            line-height: 1;
        }

        .muted {
            color: var(--text-secondary);
            line-height: 1.65;
        }

        .button {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            margin-top: 16px;
            padding: 10px 14px;
            border-radius: 12px;
            border: 1px solid rgba(255,255,255,.12);
            background: linear-gradient(180deg,#2a2a2f 0%,#16161a 45%,#0d0d10 100%);
            color: #fff;
            text-decoration: none;
            cursor: pointer;
        }

        .custom-shell {
            width: 100%;
            min-height: calc(100vh - 77px);
            overflow: hidden;
            background: var(--page-bg);
        }

        .custom-canvas {
            position: relative;
            margin: 0;
            overflow: visible;
            background: transparent;
            transform-origin: top left;
        }

        .custom-object {
            position: absolute;
            border: 1px solid transparent;
            background: transparent;
            color: #fff;
            transform-origin: center center;
            overflow: visible;
        }

        .custom-inner {
            width: 100%;
            height: 100%;
            position: relative;
            border-radius: inherit;
            overflow: hidden;
        }

        .art-hero, .art-card, .image-object {
            width: 100%;
            height: 100%;
            position: relative;
            overflow: hidden;
            border-radius: inherit;
            background: rgba(0,0,0,.18);
        }

            .art-hero img, .art-card img, .image-object img {
                width: 100%;
                height: 100%;
                object-fit: cover;
                display: block;
            }

        .art-card {
            display: grid;
            grid-template-rows: 68% 1fr;
        }

        .art-card-body {
            padding: 12px;
            overflow: hidden;
        }

            .art-card-body h3 {
                margin: 0 0 6px;
                font-size: 1em;
                line-height: 1.15;
            }

            .art-card-body p {
                margin: 0;
                opacity: .78;
                font-size: .82em;
                line-height: 1.35;
            }

        .text-object, .title-object, .description-object {
            width: 100%;
            height: 100%;
            white-space: pre-wrap;
            word-break: normal;
            overflow: visible;
            color: inherit;
            font-family: var(--object-font, Arial);
            font-size: inherit;
            line-height: var(--object-line-height,1.16);
        }

        .title-object {
            font-weight: 850;
            line-height: 1.05;
        }

        .type-badge, .credit-badge, .noai-badge {
            display: inline-flex;
            width: 100%;
            height: 100%;
            align-items: center;
            justify-content: center;
            text-align: center;
            border-radius: inherit;
            background: rgba(0,0,0,.48);
            border: 1px solid rgba(255,255,255,.16);
            font-weight: 800;
            letter-spacing: .035em;
        }

        .noai-badge {
            border-color: rgba(135,210,255,.6);
            box-shadow: 0 0 18px rgba(135,210,255,.22);
        }


        .system-page-button {
            width: 100%;
            height: 100%;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            border-radius: inherit;
            color: inherit;
            background: transparent;
            border: 0;
            text-decoration: none;
            font-weight: 850;
            letter-spacing: .015em;
            white-space: nowrap;
            cursor: pointer;
        }

        .custom-object.required-object {
            z-index: 99999 !important;
        }

        .shape-object {
            width: 100%;
            height: 100%;
            background: inherit;
            opacity: .92;
            border-radius: inherit;
        }

            .shape-object.circle {
                border-radius: 999px;
            }

            .shape-object.star {
                clip-path: polygon(50% 0%,61% 35%,98% 35%,68% 56%,79% 91%,50% 70%,21% 91%,32% 56%,2% 35%,39% 35%);
            }

        .divider-object {
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
        }

            .divider-object::before {
                content: "";
                width: 100%;
                height: 3px;
                border-radius: 999px;
                background: currentColor;
                opacity: .72;
            }

        .pill {
            position: absolute;
            left: 10px;
            bottom: 10px;
            max-width: calc(100% - 20px);
            z-index: 5;
            padding: 6px 9px;
            border: 1px solid rgba(255,255,255,.16);
            border-radius: 999px;
            background: rgba(0,0,0,.62);
            color: #fff;
            font-size: .68rem;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            backdrop-filter: blur(14px);
        }

        .public-gradient-border {
            position: absolute !important;
            border-color: transparent !important;
        }

            .public-gradient-border::before {
                content: "";
                position: absolute;
                inset: 0;
                z-index: 3;
                border-radius: inherit;
                padding: var(--border-width,1px);
                background: var(--border-paint,transparent);
                pointer-events: none;
                -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
                -webkit-mask-composite: xor;
                mask-composite: exclude;
            }

            .public-gradient-border > .custom-inner {
                position: relative;
                z-index: 4;
            }

        .floating-owner-actions {
            position: fixed;
            right: 18px;
            bottom: 18px;
            z-index: 2000;
            display: none;
            gap: 8px;
            flex-wrap: wrap;
            justify-content: flex-end;
        }

            .floating-owner-actions.show {
                display: flex;
            }

        @media(max-width:860px) {
            header {
                flex-direction: column;
                padding: 16px 20px;
            }

            nav {
                justify-content: center;
            }

            .default-layout {
                grid-template-columns: 1fr;
            }

            .site-logo {
                height: 46px;
            }
        }

        /* Gallery item public renderer polish */
        .custom-object.required-object {
            z-index: 10000 !important;
        }

            .custom-object.required-object .system-page-button {
                pointer-events: auto;
            }

        .custom-shell {
            background: var(--page-bg);
        }

        .custom-canvas {
            box-shadow: none;
        }

        .public-text-paint-target,
        .public-button-label {
            -webkit-box-decoration-break: clone;
            box-decoration-break: clone;
        }

        .custom-object[data-type="text"],
        .custom-object[data-type="title"],
        .custom-object[data-type="description"] {
            border-color: transparent !important;
            background: transparent !important;
            box-shadow: none !important;
        }

        .text-object,
        .title-object,
        .description-object {
            white-space: pre-wrap;
            tab-size: 4;
            word-break: normal;
            overflow-wrap: normal;
        }



        /* Public renderer parity with Gallery/Profile Studio paint system */
        .studio-button-label,
        .studio-text-paint-target {
            display: inline-block;
            max-width: 100%;
            -webkit-box-decoration-break: clone;
            box-decoration-break: clone;
        }

        .studio-gradient-text {
            color: transparent !important;
            -webkit-background-clip: text !important;
            background-clip: text !important;
            -webkit-text-fill-color: transparent !important;
        }

        .custom-object,
        .custom-object .custom-inner,
        .title-object,
        .description-object,
        .text-object,
        .type-badge,
        .credit-badge,
        .noai-badge,
        .system-page-button,
        .art-card-body,
        .art-card-body h3,
        .art-card-body p,
        .pill {
            font-family: var(--studio-object-font-family, inherit) !important;
            line-height: var(--studio-object-line-height, inherit) !important;
        }

            .custom-object[data-type="shape"],
            .custom-object[data-shape-type="rectangle"],
            .custom-object[data-type="shape"] .custom-inner,
            .custom-object[data-shape-type="rectangle"] .custom-inner,
            .custom-object[data-type="shape"] .shape-object,
            .custom-object[data-shape-type="rectangle"] .shape-object {
                border-radius: var(--studio-surface-radius, 0px) !important;
            }

            .custom-object.public-gradient-border {
                position: absolute !important;
                border-color: transparent !important;
                border-image: none !important;
                overflow: visible !important;
            }

                .custom-object.public-gradient-border::before {
                    content: "";
                    position: absolute;
                    inset: 0;
                    z-index: 3;
                    border-radius: var(--studio-surface-radius, inherit);
                    padding: var(--studio-border-width, var(--border-width, 1px));
                    background: var(--studio-border-paint, var(--border-paint, transparent));
                    pointer-events: none;
                    -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
                    -webkit-mask-composite: xor;
                    mask-composite: exclude;
                }

                .custom-object.public-gradient-border > .custom-inner {
                    position: relative;
                    z-index: 4;
                }

        .shape-object.rectangle {
            border-radius: var(--studio-surface-radius, 0px) !important;
        }
    </style>
</head>
<body>
    <header>
        <div class="logo"><a id="logo-link" href="creator-gallery.html"><img src="Nullverse-3.png" alt="Nullverse" class="site-logo"></a></div>
        <nav id="main-nav"><a href="creator-gallery.html">Creator Gallery</a><a href="login.html">Beta Login</a></nav>
    </header>
    <main id="page-root">
        <section class="default-shell"><div class="default-card"><p class="muted">Loading gallery showcase...</p></div></section>
    </main>
    <div id="owner-actions" class="floating-owner-actions">
        <a id="customize-link" class="button" href="#">Customize Showcase</a>
        <a id="back-link" class="button" href="creator-gallery.html">Back to Gallery</a>
    </div>
    <script type="module">
        import { supabase } from "./supabaseClient.js";

        const params = new URLSearchParams(location.search);
        const itemId = params.get("id") || params.get("item") || "";
        let currentUser = await getOptionalBetaUser();
        let item = null;
        let profile = null;
        let layoutBundle = null;

        renderNav();
        await init();

        async function init() {
            if (!itemId) { showError("No gallery item was selected."); return; }
            await loadItem();
            if (!item) { showError("This gallery item is not public, approved, or available."); return; }
            await loadProfile();
            await loadLayout();
            renderPage();
            renderOwnerActions();
        }

        async function getOptionalBetaUser() {
            try {
                const { data: sessionData } = await supabase.auth.getSession();
                const user = sessionData?.session?.user || null;
                if (!user) return null;
                const { data: betaData } = await supabase.from("beta_access").select("role").ilike("email", String(user.email || '').trim().toLowerCase()).maybeSingle();
                if (!betaData) { await supabase.auth.signOut(); return null; }
                return user;
            } catch { return null; }
        }

        function renderNav() {
            const nav = document.getElementById("main-nav");
            const logo = document.getElementById("logo-link");
            if (currentUser) {
                logo.href = "index.html";
                nav.innerHTML = `<a href="index.html">Home</a><a href="notifications.html">Notifications</a><a href="explore.html">Explore</a><a href="profile.html">Profile</a><a href="dashboard.html">Dashboard</a><a href="messages.html">Messages</a><button onclick="logOut()">Log Out</button>`;
            } else {
                logo.href = "creator-gallery.html";
                nav.innerHTML = `<a href="creator-gallery.html">Creator Gallery</a><a href="login.html">Beta Login</a>`;
            }
        }

        window.logOut = async function () { await supabase.auth.signOut(); location.href = "login.html"; };
        window.openReportPlaceholder = function () {
            alert("Report tools for gallery showcases will be added soon.");
        };

        async function loadItem() {
            const { data: publicItem } = await supabase.from("public_creator_gallery_items").select("*").eq("id", itemId).maybeSingle();
            if (publicItem) { item = publicItem; return; }
            if (currentUser) {
                const { data: ownItem } = await supabase.from("creator_proof_gallery").select("*").eq("id", itemId).eq("owner_id", currentUser.id).maybeSingle();
                if (ownItem) item = ownItem;
            }
        }

        async function loadProfile() {
            if (!item?.owner_id) return;
            const { data } = await supabase.from("public_creator_profiles").select("id, username, display_name, bio, avatar_url").eq("id", item.owner_id).maybeSingle();
            profile = data || null;
        }

        async function loadLayout() {
            const { data } = await supabase.from("public_creator_gallery_item_layouts").select("published_layout_json").eq("gallery_item_id", item.id).maybeSingle();
            layoutBundle = data?.published_layout_json || null;
            if (!layoutBundle && currentUser?.id === item.owner_id) {
                const { data: own } = await supabase.from("creator_gallery_item_layouts").select("published_layout_json").eq("gallery_item_id", item.id).maybeSingle();
                layoutBundle = own?.published_layout_json || null;
            }
        }

        function renderPage() {
            document.title = `${item.title || 'Gallery Showcase'} - Nullverse`;
            const layout = chooseLayout(layoutBundle);
            if (layout) renderCustom(layout); else renderDefault();
        }

        function parseGalleryLayout(value) {
            if (typeof value === "string") {
                try {
                    return JSON.parse(value);
                } catch {
                    return null;
                }
            }

            return value && typeof value === "object" ? value : null;
        }

        function getStoredPublishedLayoutSnapshot(layout) {
            const parsed = parseGalleryLayout(layout);
            if (!parsed) return null;

            let snapshot =
                parsed.publishedSnapshot ||
                parsed.published_layout ||
                parsed.publishedLayout ||
                parsed.publicLayout ||
                parsed.liveLayout ||
                null;

            snapshot = parseGalleryLayout(snapshot);
            return snapshot || null;
        }

        function getGalleryLayoutBundle(bundle) {
            const parsed = parseGalleryLayout(bundle);

            if (!parsed) {
                return { desktop: null, mobile: null };
            }

            if (parsed.layouts) {
                return {
                    desktop: parsed.layouts.desktop || parsed.desktop || null,
                    mobile: parsed.layouts.mobile || parsed.mobile || null
                };
            }

            if (parsed.desktop || parsed.mobile) {
                return {
                    desktop: parsed.desktop || null,
                    mobile: parsed.mobile || null
                };
            }

            return {
                desktop: parsed,
                mobile: null
            };
        }

        function chooseLayout(bundle) {
            const layouts = getGalleryLayoutBundle(bundle);
            const wantMobile = isMobileGalleryViewer();
            const wantedMode = wantMobile ? "mobile" : "desktop";
            const chosen = layouts[wantedMode];

            /*
                Match Account Settings/Profile behavior: PC/tablet only gets
                the PC published layout, and phones only get the mobile
                published layout. No cross-device fallback.
            */
            return getPublicRenderableLayout(chosen, wantedMode);
        }

        function getPublicRenderableLayout(layout, mode) {
            const parsed = parseGalleryLayout(layout);

            if (!parsed) return null;

            const snapshot = getStoredPublishedLayoutSnapshot(parsed);
            const isPublished = parsed.published === true || parsed.sourceWasPublished === true || !!snapshot;

            if (snapshot) {
                return normalizeLayout({
                    ...snapshot,
                    published: true,
                    sourceWasPublished: true
                }, mode);
            }

            /*
                Older Gallery Studio publishes saved the public row without
                embedding per-layout published flags. Since this file is reading
                from published_layout_json, treat that legacy public payload as
                renderable when it has real objects.
            */
            const hasLegacyPublicObjects = Array.isArray(parsed.objects) && parsed.objects.length > 0;

            if (!isPublished && !hasLegacyPublicObjects) {
                return null;
            }

            return normalizeLayout({
                ...parsed,
                published: true,
                sourceWasPublished: true
            }, mode);
        }

        function isMobileGalleryViewer() {
            const ua = navigator.userAgent || "";
            const platform = navigator.platform || "";
            const maxTouchPoints = Number(navigator.maxTouchPoints || 0);
            const isModernIPad = platform === "MacIntel" && maxTouchPoints > 1;
            const isPhoneUA = /iPhone|iPod|Android.*Mobile|Windows Phone/i.test(ua);
            const narrowTouch = matchMedia("(max-width: 700px) and (any-pointer: coarse)").matches;
            return !isModernIPad && (isPhoneUA || narrowTouch);
        }

        function renderDefault() {
            document.getElementById("page-root").innerHTML = `<section class="default-shell"><div class="default-card"><div class="default-layout"><div><img class="default-image" src="${escapeAttr(item.image_url || '')}" alt="${escapeAttr(item.title || '')}"></div><div><p class="muted">${escapeHtml(profile?.display_name || profile?.username || 'Nullverse Creator')}</p><h1>${escapeHtml(item.title || 'Untitled')}</h1><p class="muted">${escapeHtml(formatType(item.proof_type))}</p><p class="muted">${escapeHtml(item.description || 'No description provided.')}</p><a class="button" href="creator-gallery.html?user=${encodeURIComponent(profile?.username || '')}">Back to Creator Gallery</a><button class="button" type="button" onclick="openReportPlaceholder()">Report</button></div></div></div></section>`;
        }

        function renderCustom(layout) {
            layout = normalizeLayout(layout, layout?.layoutMode || layout?.mode || "desktop");
            const root = document.getElementById("page-root");
            root.innerHTML = `<section class="custom-shell"><div id="custom-canvas" class="custom-canvas"></div></section>`;
            const canvas = document.getElementById("custom-canvas");

            canvas.style.width = layout.canvas.width + "px";
            canvas.style.height = layout.canvas.height + "px";
            canvas.style.minHeight = layout.canvas.height + "px";
            applyCanvasBackground(canvas, layout.canvas);
            canvas.style.fontFamily = layout.canvas.fontFamily || "Arial";

            layout.objects
                .filter(o => o.visible !== false)
                .sort((a, b) => (Number(a.z || 0) - Number(b.z || 0)))
                .forEach(obj => canvas.appendChild(renderObject(obj)));

            scaleCanvas(canvas, layout);
        }

        function applyCanvasBackground(canvas, canvasData = {}) {
            if (canvasData.backgroundImage) {
                canvas.style.background = `${canvasData.background || canvasData.backgroundGradient || "var(--page-bg)"}, url('${safeCssUrl(canvasData.backgroundImage)}')`;
                canvas.style.backgroundSize = canvasData.backgroundSize || "cover";
                canvas.style.backgroundPosition = canvasData.backgroundPosition || "center";
                canvas.style.backgroundRepeat = "no-repeat";
                return;
            }

            if (canvasData.background) {
                canvas.style.background = canvasData.background;
                return;
            }

            if (canvasData.backgroundMode === "solid") {
                canvas.style.background = canvasData.backgroundColor || "#09090b";
                return;
            }

            canvas.style.background = canvasData.backgroundGradient || "var(--page-bg)";
        }

        function scaleCanvas(canvas, layout) {
            if (layout.layoutMode === "mobile") {
                const scale = Math.min(1, innerWidth / layout.canvas.width);
                canvas.style.transform = `scale(${scale})`;
                canvas.parentElement.style.minHeight = (layout.canvas.height * scale) + "px";
                return;
            }

            canvas.style.transform = "none";
            canvas.parentElement.style.overflowX = "auto";
            canvas.parentElement.style.minHeight = layout.canvas.height + "px";
        }

        function normalizeLayout(layout, preferredMode = "desktop") {
            const parsed = parseGalleryLayout(layout) || {};
            const mode = parsed.layoutMode === "mobile" || parsed.mode === "mobile" || preferredMode === "mobile" ? "mobile" : "desktop";
            const width = mode === "mobile" ? 430 : 1600;
            const height = Number(parsed.canvas?.height || parsed.height || (mode === "mobile" ? 1450 : 2200));

            const normalized = {
                ...parsed,
                layoutMode: mode,
                mode,
                published: true,
                sourceWasPublished: true,
                canvas: {
                    width,
                    height,
                    backgroundMode: "gradient",
                    backgroundColor: "#09090b",
                    backgroundGradient: "linear-gradient(135deg,#050506,#14141b)",
                    background: parsed.canvas?.background || parsed.background || "",
                    backgroundImage: parsed.canvas?.backgroundImage || "",
                    backgroundSize: parsed.canvas?.backgroundSize || "cover",
                    backgroundPosition: parsed.canvas?.backgroundPosition || "center",
                    fontFamily: "Arial",
                    ...(parsed.canvas || {}),
                    width,
                    height
                },
                objects: Array.isArray(parsed.objects) ? parsed.objects.map(normalizeObject).filter(Boolean) : []
            };

            ensureRequiredObjects(normalized);
            return normalized;
        }

        function normalizeObject(input) {
            if (!input || typeof input !== "object") return null;

            let type = input.type || "text";
            type = {
                image: "image_box",
                image_box: "image_box",
                bio_box: "bio",
                lore_box: "bio",
                artwork: "art_hero",
                artwork_card: "art_card",
                back_button: "back_gallery_button"
            }[type] || type;

            return {
                ...input,
                id: input.id || `public_gallery_obj_${Math.random().toString(36).slice(2)}`,
                type,
                x: Number.isFinite(Number(input.x)) ? Number(input.x) : 80,
                y: Number.isFinite(Number(input.y)) ? Number(input.y) : 80,
                w: Number.isFinite(Number(input.w ?? input.width)) ? Number(input.w ?? input.width) : 240,
                h: Number.isFinite(Number(input.h ?? input.height)) ? Number(input.h ?? input.height) : 120,
                rotation: Number.isFinite(Number(input.rotation)) ? Number(input.rotation) : 0,
                z: Number.isFinite(Number(input.z ?? input.zIndex)) ? Number(input.z ?? input.zIndex) : 10,
                visible: input.visible !== false && input.hidden !== true,
                required: isRequiredType(type) || input.required === true,
                text: input.text ?? input.content ?? "",
                imageUrl: input.imageUrl || input.image_url || input.src || "",
                styles: normalizeObjectStyles(input.styles || {}, type)
            };
        }

        function normalizeObjectStyles(styles = {}, type = "text") {
            const textPaint = styles.textPaint || styles.textColor || styles.color || "#fff";
            const solidTextColor = isStudioTextGradientPaint(textPaint) ? (styles.color || styles.textColor || "#fff") : textPaint;

            return {
                ...styles,
                background: styles.background ?? styles.fill ?? "transparent",
                textColor: solidTextColor,
                color: solidTextColor,
                textPaint,
                borderColor: styles.borderColor || "transparent",
                borderGradient: styles.borderGradient || styles.borderPaint || "",
                borderPaint: styles.borderPaint || styles.borderGradient || "",
                borderWidth: Number(styles.borderWidth || 0),
                radius: Number(styles.radius ?? (type === "shape" ? 0 : type === "circle" ? 999 : 18)),
                opacity: Number(styles.opacity ?? 1),
                fontSize: Number(styles.fontSize || 18),
                fontFamily: styles.fontFamily || "Arial",
                lineHeight: Number(styles.lineHeight || 1.16),
                textAlign: styles.textAlign || "left",
                objectFit: styles.objectFit || styles.imageFit || "cover",
                imageFit: styles.imageFit || styles.objectFit || "cover",
                padding: Number(styles.padding || 0)
            };
        }

        const requiredObjectTypes = ["back_gallery_button", "report_button"];

        function isRequiredType(type) {
            return requiredObjectTypes.includes(type);
        }

        function ensureRequiredObjects(layout) {
            if (!layout || !Array.isArray(layout.objects)) return;
            const mobile = layout.layoutMode === "mobile";
            const defaults = {
                back_gallery_button: mobile
                    ? { x: 24, y: 860, w: 210, h: 46 }
                    : { x: 90, y: 60, w: 260, h: 50 },
                report_button: mobile
                    ? { x: 250, y: 860, w: 120, h: 46 }
                    : { x: 1280, y: 60, w: 150, h: 50 }
            };
            requiredObjectTypes.forEach(type => {
                let obj = layout.objects.find(item => item.type === type);
                if (!obj) {
                    const base = defaults[type];
                    obj = {
                        id: `${type}_required`,
                        type,
                        name: type === "back_gallery_button" ? "Back to Creator Gallery" : "Report",
                        text: type === "back_gallery_button" ? "Back to Creator Gallery" : "Report",
                        x: base.x,
                        y: base.y,
                        w: base.w,
                        h: base.h,
                        rotation: 0,
                        visible: true,
                        required: true,
                        styles: {
                            background: type === "report_button" ? "rgba(90,20,20,.42)" : "rgba(0,0,0,.58)",
                            textColor: "#ffffff",
                            borderColor: type === "report_button" ? "rgba(255,120,120,.28)" : "rgba(255,255,255,.20)",
                            borderWidth: 1,
                            radius: 999,
                            opacity: 1,
                            fontSize: mobile ? 14 : 16,
                            fontFamily: "Arial",
                            lineHeight: 1.16,
                            textAlign: "center"
                        }
                    };
                    layout.objects.push(obj);
                }
                obj.required = true;
                obj.visible = true;
            });
            layout.objects.sort((a, b) => (isRequiredType(a.type) ? 1 : 0) - (isRequiredType(b.type) ? 1 : 0));
        }

        function renderObject(obj) {
            const s = obj.styles || {};
            const borderPaint = s.borderGradient || s.borderPaint || "";
            const el = document.createElement("article");

            el.className = `custom-object ${isRequiredType(obj.type) ? 'required-object' : ''} ${borderPaint ? 'public-gradient-border' : ''}`;
            el.dataset.type = obj.type;
            el.dataset.shapeType = obj.type === "shape" ? "rectangle" : obj.type;

            Object.assign(el.style, objectStyle(obj));

            el.style.setProperty("--border-width", `${Number(s.borderWidth || 0)}px`);
            el.style.setProperty("--border-paint", borderPaint || "transparent");
            el.style.setProperty("--studio-border-width", `${Number(s.borderWidth || 0)}px`);
            el.style.setProperty("--studio-border-paint", borderPaint || "transparent");

            const inner = document.createElement("div");
            inner.className = "custom-inner";
            inner.innerHTML = renderObjectInner(obj);
            el.appendChild(inner);

            return el;
        }

        function objectStyle(obj) {
            const s = obj.styles || {};
            const radius = Number(s.radius ?? (obj.type === "shape" ? 0 : obj.type === "circle" ? 999 : 18));
            const borderWidth = Number(s.borderWidth || 0);
            const borderPaint = s.borderGradient || s.borderPaint || "";
            const textPaint = s.textPaint || s.textColor || s.color || "#fff";
            const solidTextColor = isStudioTextGradientPaint(textPaint) ? (s.color || s.textColor || "#fff") : textPaint;
            const fontFamily = s.fontFamily || "Arial";
            const lineHeight = Number(s.lineHeight || 1.16);
            const fontSize = Number(s.fontSize || 18);

            return {
                left: (obj.x || 0) + "px",
                top: (obj.y || 0) + "px",
                width: (obj.w || 100) + "px",
                height: (obj.h || 100) + "px",
                zIndex: String(obj.z || 10),
                transform: `rotate(${obj.rotation || 0}deg)`,
                background: s.background || "transparent",
                color: solidTextColor || "#fff",
                borderColor: borderPaint ? "transparent" : (s.borderColor || "transparent"),
                borderWidth: borderWidth + "px",
                borderStyle: "solid",
                borderRadius: radius + "px",
                opacity: String(s.opacity ?? 1),
                fontSize: fontSize + "px",
                fontFamily,
                textAlign: s.textAlign || "left",
                lineHeight: String(lineHeight),
                "--object-font": fontFamily,
                "--object-line-height": String(lineHeight),
                "--studio-object-font-family": fontFamily,
                "--studio-object-font-size": fontSize + "px",
                "--studio-object-line-height": String(lineHeight),
                "--studio-surface-radius": radius + "px",
                "--studio-border-width": borderWidth + "px",
                "--studio-border-paint": borderPaint || "transparent"
            };
        }

        function isStudioTextGradientPaint(value) {
            return /linear-gradient|radial-gradient/i.test(String(value || ""));
        }

        function getTextPaint(obj) {
            const s = obj?.styles || {};
            return String(s.textPaint || s.textColor || s.color || "#fff").trim();
        }

        function getStudioTextPaintInlineStyle(obj) {
            const paint = getTextPaint(obj);
            if (!isStudioTextGradientPaint(paint)) return "";
            return `background:${escapeAttr(paint)};color:transparent;-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;`;
        }

        function getStudioTextPaintClass(obj, extra = "") {
            const gradientClass = isStudioTextGradientPaint(getTextPaint(obj)) ? " studio-gradient-text" : "";
            return `${extra} studio-text-paint-target${gradientClass}`.trim();
        }

        function renderStudioTextPaintTarget(obj, text, extraClass = "") {
            return `<span class="${escapeAttr(getStudioTextPaintClass(obj, extraClass))}" style="${getStudioTextPaintInlineStyle(obj)}">${escapeHtml(text)}</span>`;
        }

        function renderObjectInner(obj) {
            const s = obj.styles || {};
            const imageUrl = obj.imageUrl || item.image_url || "";
            const fit = `object-fit:${escapeAttr(s.objectFit || s.imageFit || 'cover')};`;
            const padding = Number(s.padding || 0);

            if (obj.type === "art_hero") {
                return `<div class="art-hero"><img src="${escapeAttr(imageUrl)}" style="${fit}" alt=""><span class="pill">${renderStudioTextPaintTarget(obj, item.title || 'Artwork')}</span></div>`;
            }

            if (obj.type === "art_card") {
                return `<div class="art-card"><img src="${escapeAttr(imageUrl)}" style="${fit}" alt=""><div class="art-card-body"><h3>${renderStudioTextPaintTarget(obj, item.title || 'Untitled')}</h3><p>${renderStudioTextPaintTarget(obj, item.description || 'No description provided.')}</p></div></div>`;
            }

            if (obj.type === "title") {
                return `<div class="title-object">${renderStudioTextPaintTarget(obj, obj.text || item.title || 'Untitled')}</div>`;
            }

            if (obj.type === "description") {
                return `<div class="description-object">${renderStudioTextPaintTarget(obj, obj.text || item.description || 'No description provided.')}</div>`;
            }

            if (obj.type === "type_badge") {
                return `<div class="type-badge"><span class="studio-button-label">${renderStudioTextPaintTarget(obj, obj.text || formatType(item.proof_type))}</span></div>`;
            }

            if (obj.type === "credit_badge") {
                return `<div class="credit-badge"><span class="studio-button-label">${renderStudioTextPaintTarget(obj, obj.text || 'Creator credited')}</span></div>`;
            }

            if (obj.type === "noai_badge") {
                return `<div class="noai-badge"><span class="studio-button-label">${renderStudioTextPaintTarget(obj, obj.text || 'Human-made / No AI')}</span></div>`;
            }

            if (obj.type === "back_gallery_button") {
                return `<a class="system-page-button" href="creator-gallery.html?user=${encodeURIComponent(profile?.username || '')}"><span class="studio-button-label">${renderStudioTextPaintTarget(obj, obj.text || 'Back to Creator Gallery')}</span></a>`;
            }

            if (obj.type === "report_button") {
                return `<button class="system-page-button" type="button" onclick="openReportPlaceholder()"><span class="studio-button-label">${renderStudioTextPaintTarget(obj, obj.text || 'Report')}</span></button>`;
            }

            if (obj.type === "text") {
                return `<div class="text-object">${renderStudioTextPaintTarget(obj, obj.text || '')}</div>`;
            }

            if (obj.type === "bio") {
                return `<div class="description-object" style="padding:${padding}px">${renderStudioTextPaintTarget(obj, obj.text || '')}</div>`;
            }

            if (obj.type === "section") {
                const [heading, ...body] = String(obj.text || "").split("\n");
                return `<div class="description-object" style="padding:${padding}px"><h3>${renderStudioTextPaintTarget(obj, heading || 'Section')}</h3><p>${renderStudioTextPaintTarget(obj, body.join("\n"))}</p></div>`;
            }

            if (obj.type === "image_text") {
                const [heading, ...body] = String(obj.text || "").split("\n");
                return `<div class="art-card" style="grid-template-rows:none;grid-template-columns:38% 1fr;gap:12px;padding:${padding || 12}px;"><div class="image-object">${imageUrl ? `<img src="${escapeAttr(imageUrl)}" style="${fit}" alt="">` : ''}</div><div class="art-card-body" style="padding:0;"><h3>${renderStudioTextPaintTarget(obj, heading || 'Image + Text')}</h3><p>${renderStudioTextPaintTarget(obj, body.join("\n"))}</p></div></div>`;
            }

            if (obj.type === "image_box") {
                return `<div class="image-object">${obj.imageUrl ? `<img src="${escapeAttr(obj.imageUrl)}" style="${fit}" alt="">` : ''}</div>`;
            }

            if (["shape", "circle", "star"].includes(obj.type)) {
                return `<div class="shape-object ${obj.type === 'circle' ? 'circle' : obj.type === 'star' ? 'star' : 'rectangle'}"></div>`;
            }

            if (obj.type === "divider") {
                return `<div class="divider-object">${renderStudioTextPaintTarget(obj, "")}</div>`;
            }

            return "";
        }

        function safeCssUrl(value) {
            return String(value || "").replace(/['"\\\n\r]/g, "");
        }

        function renderOwnerActions() {
            const actions = document.getElementById("owner-actions");
            const customize = document.getElementById("customize-link");
            const back = document.getElementById("back-link");
            if (profile?.username) back.href = `creator-gallery.html?user=${encodeURIComponent(profile.username)}`;
            if (currentUser && item && currentUser.id === item.owner_id) {
                customize.href = `creator-gallery-studio.html?item=${encodeURIComponent(item.id)}`;
                actions.classList.add("show");
            }
        }

        function showError(message) { document.getElementById("page-root").innerHTML = `<section class="default-shell"><div class="default-card"><h1>Gallery Showcase Unavailable</h1><p class="muted">${escapeHtml(message)}</p><a class="button" href="creator-gallery.html">Back to Creator Gallery</a></div></section>`; }
        function formatType(v) { return String(v || 'other').replaceAll('_', ' ').replace(/\b\w/g, l => l.toUpperCase()); }
        function escapeHtml(v) { return String(v ?? '').replaceAll('&', '&amp;').replaceAll('<', '&lt;').replaceAll('>', '&gt;').replaceAll('"', '&quot;').replaceAll("'", '&#039;'); }
        function escapeAttr(v) { return escapeHtml(v); }</script>
</body>
</html>
