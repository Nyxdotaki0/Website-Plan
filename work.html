<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Work - Nullverse</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #0d0d12;
            color: #f2f2f2;
        }

        header {
            padding: 24px 40px;
            border-bottom: 1px solid #2a2a35;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #111118;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .logo a, nav a, nav button {
            color: #cfcfd8;
            text-decoration: none;
            background: none;
            border: none;
            cursor: pointer;
            font-family: Arial, sans-serif;
        }

        .logo a {
            color: white;
            font-size: 1.6rem;
            font-weight: bold;
        }

        nav {
            display: flex;
            gap: 22px;
            flex-wrap: wrap;
            align-items: center;
        }

        main {
            max-width: 900px;
            margin: auto;
            padding: 45px 40px 70px;
        }

        .panel {
            background: #15151f;
            border: 1px solid #2a2a35;
            border-radius: 12px;
            padding: 28px;
        }

        .work-type {
            display: inline-block;
            font-size: 0.8rem;
            color: #bdbdca;
            border: 1px solid #333344;
            border-radius: 999px;
            padding: 5px 10px;
            margin-bottom: 14px;
        }

        h1 {
            font-size: 2.7rem;
            margin: 0 0 12px;
        }

        .creator {
            color: #8f8fa3;
            margin-bottom: 24px;
        }

            .creator a {
                color: #cfcfd8;
                text-decoration: none;
            }

        .description {
            color: #c8c8d4;
            font-size: 1.1rem;
            line-height: 1.6;
            border-bottom: 1px solid #2a2a35;
            padding-bottom: 24px;
            margin-bottom: 24px;
        }

        .like-row {
            display: flex;
            align-items: center;
            gap: 14px;
            margin-bottom: 26px;
        }

        .like-button {
            background: #2a2a44;
            color: white;
            border: none;
            padding: 10px 16px;
            border-radius: 999px;
            cursor: pointer;
            font-size: 0.95rem;
        }

            .like-button:hover {
                background: #3a3a5c;
            }

            .like-button.liked {
                background: #6b2d44;
            }

        .like-count {
            color: #9c9cb0;
        }

        .content {
            white-space: pre-wrap;
            color: #f2f2f2;
            line-height: 1.8;
        }

        .empty {
            color: #8f8fa3;
        }

        @media (max-width: 800px) {
            header {
                flex-direction: column;
                gap: 14px;
            }

            main {
                padding: 30px 24px 60px;
            }

            h1 {
                font-size: 2.1rem;
            }
        }
    </style>
</head>

<body>

    <header>
        <div class="logo">
            <a href="index.html">Nullverse</a>
        </div>

        <nav>
            <a href="index.html">Home</a>
            <a href="explore.html">Explore</a>
            <a href="dashboard.html">Dashboard</a>
            <button onclick="logOut()">Log Out</button>
        </nav>
    </header>

    <main>
        <section class="panel">
            <span id="work-type" class="work-type">Loading...</span>
            <h1 id="work-title">Loading work...</h1>

            <p id="work-creator" class="creator"></p>

            <div id="work-description" class="description"></div>

            <div class="like-row">
                <button id="like-button" class="like-button">
                    ♡ Like
                </button>

                <span id="like-count" class="like-count">
                    0 Likes
                </span>
            </div>

            <article id="work-content" class="content"></article>
        </section>
    </main>

    <script type="module">
        import { requireBetaAccess } from "./betaGate.js";
        import { supabase } from "./supabaseClient.js";

        let currentUser = null;
        let currentWork = null;

        currentUser = await requireBetaAccess();

        const params = new URLSearchParams(window.location.search);
        const workId = params.get("id");

    if (!workId) {
        showNotFound("No work ID was provided.");
    } else {
        await loadWork(workId);
    }

    async function loadWork(id) {
        const { data: work, error } = await supabase
            .from("works")
            .select("*")
            .eq("id", id)
            .eq("visibility", "published")
            .single();


        currentWork = work;
        if (error || !work) {
            showNotFound("This work does not exist or is not published.");
            return;
        }

        const { data: profile } = await supabase
            .from("profiles")
            .select("username, display_name")
            .eq("id", work.owner_id)
            .single();

        document.title = `${work.title} - Nullverse`;

        document.getElementById("work-type").textContent =
            work.work_type || "Work";

        document.getElementById("work-title").textContent =
            work.title || "Untitled Work";

        document.getElementById("work-description").textContent =
            work.description || "No description provided.";

        document.getElementById("work-content").textContent =
            work.content || "No full content provided.";


        await loadLikes();
        if (profile) {
            document.getElementById("work-creator").innerHTML =
                `by <a href="profile.html?user=${encodeURIComponent(profile.username)}">${escapeHtml(profile.display_name || profile.username)} (@${escapeHtml(profile.username)})</a>`;
        } else {
            document.getElementById("work-creator").textContent =
                "by Unknown Creator";
        }
    }

    function showNotFound(message) {
        document.getElementById("work-type").textContent = "Not Found";
        document.getElementById("work-title").textContent = "Work not found";
        document.getElementById("work-creator").textContent = "";
        document.getElementById("work-description").textContent = message;
        document.getElementById("work-content").textContent = "";
    }

    function escapeHtml(value) {
        return String(value || "")
            .replaceAll("&", "&amp;")
            .replaceAll("<", "&lt;")
            .replaceAll(">", "&gt;")
            .replaceAll('"', "&quot;")
            .replaceAll("'", "&#039;");
    }

        async function loadLikes() {
            if (!currentWork) return;

            const { data: likes } = await supabase
                .from("work_likes")
                .select("*")
                .eq("work_id", currentWork.id);

            const likeCount = likes ? likes.length : 0;

            document.getElementById("like-count").textContent =
                `${likeCount} ${likeCount === 1 ? "Like" : "Likes"}`;

            const userLiked = likes?.some(
                like => like.user_id === currentUser.id
            );

            const button = document.getElementById("like-button");

            if (userLiked) {
                button.classList.add("liked");
                button.textContent = "♥ Liked";
            } else {
                button.classList.remove("liked");
                button.textContent = "♡ Like";
            }
        }

        document.getElementById("like-button").addEventListener("click", async () => {
            if (!currentWork || !currentUser) return;

            const button = document.getElementById("like-button");
            const alreadyLiked = button.classList.contains("liked");

            if (alreadyLiked) {
                await supabase
                    .from("work_likes")
                    .delete()
                    .eq("work_id", currentWork.id)
                    .eq("user_id", currentUser.id);
            } else {
                await supabase
                    .from("work_likes")
                    .insert({
                        work_id: currentWork.id,
                        user_id: currentUser.id
                    });
            }

            await loadLikes();
        });

    window.logOut = async function () {
        await supabase.auth.signOut();
        window.location.href = "login.html";
    };
    </script>

</body>
</html>
