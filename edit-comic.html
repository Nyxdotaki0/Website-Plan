<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<link rel="icon" type="image/png" href="favicon.png">
<title>Edit Comic - Nullverse</title>
<script>const savedNullverseTheme=localStorage.getItem("nullverse-theme")||"void";document.documentElement.setAttribute("data-theme",savedNullverseTheme);</script>
<link rel="stylesheet" href="theme.css?v=25">
<style>
html{min-height:100%;background:#000}body{margin:0;font-family:Arial,sans-serif;background:var(--page-bg);background-attachment:fixed;color:var(--text-primary);display:flex;min-height:100vh}.nullverse-stars{z-index:0}.sidebar,.main{position:relative;z-index:2}.sidebar{width:330px;background:linear-gradient(180deg,rgba(255,255,255,.04),rgba(255,255,255,.015)),rgba(10,10,12,.82);border-right:1px solid var(--border-color);display:flex;flex-direction:column;backdrop-filter:blur(22px);box-shadow:10px 0 40px rgba(0,0,0,.32)}.sidebar-header{padding:26px;border-bottom:1px solid var(--border-soft)}.sidebar-header h1{margin:0 0 10px;font-size:1.55rem}.muted,.sidebar-header p{color:var(--text-secondary);line-height:1.6}.chapter-list{flex:1;overflow:auto;padding:20px}.chapter-card{background:var(--card-bg);border:1px solid var(--border-color);border-radius:16px;padding:15px;margin-bottom:12px;cursor:pointer;transition:.18s ease}.chapter-card:hover,.chapter-card.active{transform:translateY(-2px);border-color:rgba(255,255,255,.18);box-shadow:0 0 22px rgba(255,255,255,.06)}.chapter-card p{margin:7px 0 0;color:var(--text-muted);font-size:.9rem}.sidebar-footer{padding:20px;border-top:1px solid var(--border-soft)}.main{flex:1;padding:42px;overflow:auto}.editor-panel{max-width:1050px;margin:auto}.topbar{display:flex;justify-content:space-between;gap:14px;flex-wrap:wrap;margin-bottom:26px}.panel{background:var(--panel-bg);border:1px solid var(--border-color);border-radius:20px;padding:28px;margin-bottom:24px;backdrop-filter:blur(18px);box-shadow:0 18px 38px rgba(0,0,0,.22)}input,textarea,select{width:100%;box-sizing:border-box;padding:13px 14px;margin-bottom:16px;border-radius:12px;border:1px solid var(--border-color);background:rgba(0,0,0,.22);color:var(--text-primary);font-family:Arial,sans-serif}label{display:block;margin-bottom:8px}.button{display:inline-block;background:linear-gradient(180deg,#2a2a2f 0%,#16161a 45%,#0d0d10 100%);color:#f5f5f5;border:1px solid rgba(255,255,255,.12);padding:11px 15px;border-radius:12px;cursor:pointer;text-decoration:none;font-family:Arial,sans-serif;transition:.18s ease;box-shadow:0 0 16px rgba(255,255,255,.08),inset 0 1px 0 rgba(255,255,255,.06)}.button:hover{transform:translateY(-1px);border-color:rgba(255,255,255,.18)}.danger-button{background:linear-gradient(180deg,#472328 0%,#2f171a 100%)}.actions{display:flex;gap:10px;flex-wrap:wrap}.page-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:16px}.page-card{position:relative;background:var(--card-bg);border:1px solid var(--border-color);border-radius:16px;padding:12px}.page-card img{width:100%;height:240px;object-fit:cover;border-radius:12px;background:#111}.page-card strong{display:block;margin:10px 0 8px}.mini-row{display:flex;gap:8px;flex-wrap:wrap}.mini-row .button{padding:8px 10px;font-size:.85rem}.credit-panel{display:none;margin:0 0 16px;padding:16px;border:1px solid var(--border-color);border-radius:16px;background:rgba(255,255,255,.035)}.credit-pill{display:inline-flex;align-items:center;position:absolute;left:20px;bottom:74px;max-width:calc(100% - 40px);padding:7px 11px;border-radius:999px;border:1px solid rgba(255,255,255,.16);background:rgba(0,0,0,.58);color:#fff;font-size:.78rem;text-decoration:none;white-space:nowrap;z-index:5}.message{color:var(--text-secondary)}@media(max-width:900px){body{display:block}.sidebar{width:100%;border-right:0;border-bottom:1px solid var(--border-color)}.chapter-list{max-height:260px}.main{padding:26px}.page-card img{height:auto}}
</style>
</head>
<body>
<div class="nullverse-stars"></div>
<aside class="sidebar">
<div class="sidebar-header"><h1 id="world-name">Loading...</h1><p>Build comic and manga chapters inside this world. Upload pages, reorder them, and keep image credit consistent.</p></div>
<div class="chapter-list"><div class="chapter-card active" onclick="openSettings()"><strong>Comic Settings</strong><p>Reading mode and overview</p></div><div id="chapter-list"></div></div>
<div class="sidebar-footer"><button class="button" onclick="createChapter()">+ Add Chapter</button></div>
</aside>
<main class="main"><div class="editor-panel"><div class="topbar"><div><h1 id="editor-title" style="margin:0">Comic Editor</h1><p class="muted" style="margin-top:8px">Paged comic, manga, and webtoon support.</p></div><div class="actions"><a class="button" href="dashboard.html">← Dashboard</a><a class="button" id="view-public-comic" target="_blank">View Public Page</a></div></div><div id="editor-content"></div></div></main>
<script type="module">
import{requireBetaAccess}from"./betaGate.js";import{supabase}from"./supabaseClient.js";import{optimizeImage}from"./imageUtils.js";import{createNotification}from"./notifications.js";
const user=await requireBetaAccess({allowRestricted:false});const params=new URLSearchParams(location.search);const worldId=params.get("id");let currentWorld=null;let chapters=[];let currentChapter=null;if(!worldId){alert("No comic ID provided.");location.href="dashboard.html"}await init();
async function init(){await loadWorld();await loadChapters();openSettings()}
async function loadWorld(){const{data,error}=await supabase.from("worlds").select("*").eq("id",worldId).single();if(error||!data){alert("Comic not found.");location.href="dashboard.html";return}if(data.owner_id!==user.id){alert("You can only edit your own comic.");location.href="dashboard.html";return}currentWorld=data;if(!["comic","manga"].includes(currentWorld.content_type)){await supabase.from("worlds").update({content_type:"comic"}).eq("id",worldId);currentWorld.content_type="comic"}document.getElementById("world-name").textContent=currentWorld.title||"Untitled Comic";document.getElementById("editor-title").textContent=currentWorld.title||"Comic Editor";document.getElementById("view-public-comic").href=`comic.html?id=${encodeURIComponent(worldId)}`}
async function loadChapters(){const{data,error}=await supabase.from("comic_chapters").select("*").eq("world_id",worldId).order("chapter_number",{ascending:true});if(error){alert(error.message);return}chapters=data||[];renderChapters()}
function renderChapters(){const c=document.getElementById("chapter-list");if(!chapters.length){c.innerHTML=`<p class="muted">No chapters yet.</p>`;return}c.innerHTML=chapters.map(ch=>`<div class="chapter-card ${currentChapter?.id===ch.id?"active":""}" onclick="openChapter('${ch.id}')"><strong>${ch.chapter_number}. ${escapeHtml(ch.title||"Untitled Chapter")}</strong><p>${escapeHtml(ch.visibility||"draft")}</p></div>`).join("")}
window.openSettings=function(){currentChapter=null;document.querySelectorAll(".chapter-card").forEach(x=>x.classList.remove("active"));document.querySelector(".chapter-card").classList.add("active");document.getElementById("editor-content").innerHTML=`<section class="panel"><h2>Comic Settings</h2><p class="muted">These settings control how readers move through your comic.</p><label>Reading Mode</label><select id="comic-reading-mode"><option value="paged" ${currentWorld.comic_reading_mode!=="webtoon"?"selected":""}>Comic / Manga - page by page</option><option value="webtoon" ${currentWorld.comic_reading_mode==="webtoon"?"selected":""}>Webtoon - vertical scroll</option></select><div class="actions"><a class="button" href="edit-world.html?id=${encodeURIComponent(worldId)}">Edit Cover, Tags, Rating, and World Style</a><button class="button" onclick="saveSettings()">Save Settings</button></div><p id="message" class="message"></p></section>`};
window.saveSettings=async function(){const mode=document.getElementById("comic-reading-mode").value;const{error}=await supabase.from("worlds").update({comic_reading_mode:mode,updated_at:new Date().toISOString()}).eq("id",worldId).eq("owner_id",user.id);document.getElementById("message").textContent=error?error.message:"Comic settings saved.";if(!error)currentWorld.comic_reading_mode=mode};
window.createChapter=async function(){const title=prompt("Chapter title?")||"Untitled Chapter";const next=(chapters.length?Math.max(...chapters.map(c=>c.chapter_number||0)):0)+1;const{error}=await supabase.from("comic_chapters").insert({world_id:worldId,owner_id:user.id,title,chapter_number:next,visibility:"draft"});if(error){alert(error.message);return}await loadChapters()};
window.openChapter=async function(id){currentChapter=chapters.find(c=>c.id===id);renderChapters();const{data:pages,error}=await supabase.from("comic_pages").select("*").eq("chapter_id",id).order("page_number",{ascending:true});if(error){alert(error.message);return}document.getElementById("editor-content").innerHTML=`<section class="panel"><h2>${escapeHtml(currentChapter.title||"Untitled Chapter")}</h2><label>Chapter Title</label><input id="chapter-title" value="${escapeHtml(currentChapter.title||"")}"><label>Visibility</label><select id="chapter-visibility"><option value="published" ${currentChapter.visibility==="published"?"selected":""}>Published</option><option value="draft" ${currentChapter.visibility==="draft"?"selected":""}>Draft</option></select><div class="actions"><button class="button" onclick="saveChapter()">Save Chapter</button><button class="button danger-button" onclick="deleteChapter()">Delete Chapter</button></div><p id="message" class="message"></p></section><section class="panel"><h2>Upload Pages</h2><input id="page-files" type="file" accept="image/*" multiple><label style="display:flex;gap:10px;align-items:center"><input id="bulk-no-ai" type="checkbox" style="width:auto"> I confirm these uploaded pages are not AI-generated artwork</label><button class="button" onclick="uploadPages()">Upload Selected Pages</button></section><section class="panel"><h2>Pages</h2><div id="page-grid" class="page-grid">${(pages||[]).map(renderPageCard).join("")||`<p class="muted">No pages yet.</p>`}</div></section>`};
function renderPageCard(page){return `<article class="page-card"><img src="${escapeHtml(page.image_url||"")}" alt="${escapeHtml(page.alt_text||"Comic page")}"><span class="credit-pill">Credit: ${escapeHtml(getCreditLabel(page))}</span><strong>Page ${page.page_number}</strong><input id="alt-${page.id}" placeholder="Alt text" value="${escapeHtml(page.alt_text||"")}"><div class="credit-panel" id="credit-${page.id}" style="display:block"><label>Credit Type</label><select id="type-${page.id}"><option value="own_work" ${page.credit_type==="own_work"?"selected":""}>My own work</option><option value="nullverse_creator" ${page.credit_type==="nullverse_creator"?"selected":""}>Another Nullverse creator</option><option value="external_artist" ${page.credit_type==="external_artist"?"selected":""}>External artist</option><option value="photographer" ${page.credit_type==="photographer"?"selected":""}>Photographer</option><option value="stock_public_domain" ${page.credit_type==="stock_public_domain"?"selected":""}>Stock / public domain</option><option value="no_credit_needed" ${page.credit_type==="no_credit_needed"?"selected":""}>No credit needed</option></select><input id="name-${page.id}" placeholder="Artist / source name" value="${escapeHtml(page.credit_name||"")}"><input id="url-${page.id}" placeholder="Credit link" value="${escapeHtml(page.credit_url||"")}"><input id="username-${page.id}" placeholder="Nullverse username" value="${escapeHtml(page.credit_nullverse_username||"")}"><textarea id="note-${page.id}" rows="2" placeholder="Permission / source note">${escapeHtml(page.credit_note||"")}</textarea><label style="display:flex;gap:10px;align-items:center"><input id="noai-${page.id}" type="checkbox" style="width:auto" ${page.credit_no_ai?"checked":""}> Not AI-generated artwork</label></div><div class="mini-row"><button class="button" onclick="savePage('${page.id}')">Save</button><button class="button" onclick="movePage('${page.id}',-1)">↑</button><button class="button" onclick="movePage('${page.id}',1)">↓</button><button class="button danger-button" onclick="deletePage('${page.id}')">Delete</button></div></article>`}
window.saveChapter=async function(){const title=document.getElementById("chapter-title").value.trim()||"Untitled Chapter";const visibility=document.getElementById("chapter-visibility").value;const{error}=await supabase.from("comic_chapters").update({title,visibility,updated_at:new Date().toISOString()}).eq("id",currentChapter.id).eq("owner_id",user.id);document.getElementById("message").textContent=error?error.message:"Chapter saved.";await loadChapters();currentChapter=chapters.find(c=>c.id===currentChapter.id)};
window.deleteChapter=async function(){if(!confirm("Delete this chapter and all pages?"))return;const{error}=await supabase.from("comic_chapters").delete().eq("id",currentChapter.id).eq("owner_id",user.id);if(error){alert(error.message);return}currentChapter=null;await loadChapters();openSettings()};
window.uploadPages=async function(){const input=document.getElementById("page-files");const files=[...(input.files||[])];if(!files.length)return;const noAi=document.getElementById("bulk-no-ai").checked;if(!noAi){alert("Confirm the pages are not AI-generated artwork before uploading.");return}const{data:existing}=await supabase.from("comic_pages").select("page_number").eq("chapter_id",currentChapter.id);let next=(existing?.length?Math.max(...existing.map(p=>p.page_number||0)):0)+1;for(const file of files){const optimized=await optimizeImage(file,{maxWidth:2200,maxHeight:3200,quality:.86});const path=`${user.id}/${Date.now()}-${Math.random().toString(36).slice(2)}-comic-page.webp`;const{error:uploadError}=await supabase.storage.from("world-images").upload(path,optimized);if(uploadError){alert(uploadError.message);return}const{data}=supabase.storage.from("world-images").getPublicUrl(path);const{error}=await supabase.from("comic_pages").insert({chapter_id:currentChapter.id,world_id:worldId,owner_id:user.id,page_number:next,image_url:data.publicUrl,credit_type:"own_work",credit_no_ai:true});if(error){alert(error.message);return}next++}await openChapter(currentChapter.id)};
window.savePage=async function(id){const payload={alt_text:document.getElementById(`alt-${id}`).value.trim(),credit_type:document.getElementById(`type-${id}`).value,credit_name:document.getElementById(`name-${id}`).value.trim(),credit_url:document.getElementById(`url-${id}`).value.trim(),credit_nullverse_username:document.getElementById(`username-${id}`).value.trim().replace("@",""),credit_note:document.getElementById(`note-${id}`).value.trim(),credit_no_ai:document.getElementById(`noai-${id}`).checked,updated_at:new Date().toISOString()};if(!payload.credit_no_ai){alert("Confirm this page is not AI-generated artwork.");return}const{error}=await supabase.from("comic_pages").update(payload).eq("id",id).eq("owner_id",user.id);if(error){alert(error.message);return}if(payload.credit_type==="nullverse_creator"&&payload.credit_nullverse_username){const{data:p}=await supabase.from("profiles").select("id,username").ilike("username",payload.credit_nullverse_username).single();if(p&&p.id!==user.id){await createNotification({recipientId:p.id,actorId:user.id,worldId, type:"image_credit",message:`You were credited for comic artwork in "${currentWorld.title||"a comic"}".`,link:`comic.html?id=${encodeURIComponent(worldId)}`})}}await openChapter(currentChapter.id)};
window.deletePage=async function(id){if(!confirm("Delete this page?"))return;const{error}=await supabase.from("comic_pages").delete().eq("id",id).eq("owner_id",user.id);if(error){alert(error.message);return}await renumberPages();await openChapter(currentChapter.id)};
window.movePage=async function(id,dir){const{data:pages}=await supabase.from("comic_pages").select("id,page_number").eq("chapter_id",currentChapter.id).order("page_number",{ascending:true});const i=pages.findIndex(p=>p.id===id);const j=i+dir;if(i<0||j<0||j>=pages.length)return;[pages[i],pages[j]]=[pages[j],pages[i]];for(let n=0;n<pages.length;n++){await supabase.from("comic_pages").update({page_number:n+1}).eq("id",pages[n].id).eq("owner_id",user.id)}await openChapter(currentChapter.id)};
async function renumberPages(){const{data:pages}=await supabase.from("comic_pages").select("id").eq("chapter_id",currentChapter.id).order("page_number",{ascending:true});for(let i=0;i<(pages||[]).length;i++)await supabase.from("comic_pages").update({page_number:i+1}).eq("id",pages[i].id).eq("owner_id",user.id)}
function getCreditLabel(p){if(p.credit_type==="own_work")return"Creator";if(p.credit_type==="nullverse_creator")return"@"+(p.credit_nullverse_username||"creator");return p.credit_name||p.credit_note||"No credit needed"}function escapeHtml(v){return String(v||"").replaceAll("&","&amp;").replaceAll("<","&lt;").replaceAll(">","&gt;").replaceAll('"',"&quot;").replaceAll("'","&#039;")}
</script>
</body>
</html>
