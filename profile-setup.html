<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Set Up Profile - Nullverse</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #0d0d12;
            color: #f2f2f2;
        }

        main {
            max-width: 700px;
            margin: auto;
            padding: 50px 30px;
        }

        .panel {
            background: #15151f;
            border: 1px solid #2a2a35;
            border-radius: 12px;
            padding: 24px;
        }

        input, textarea, select {
            width: 100%;
            margin-bottom: 14px;
            padding: 12px;
            border-radius: 8px;
            border: 1px solid #333344;
            background: #0d0d12;
            color: white;
            font-family: Arial, sans-serif;
        }

        button {
            background: #2a2a44;
            color: white;
            border: none;
            padding: 12px 16px;
            border-radius: 8px;
            cursor: pointer;
        }

            button:hover {
                background: #3a3a5c;
            }

        p {
            color: #c8c8d4;
            line-height: 1.6;
        }
    </style>
</head>

<body>

    <main>
        <section class="panel">
            <h1>Set Up Your Nullverse Profile</h1>
            <p>This profile will be attached to your worlds, characters, and stories.</p>

            <input id="username" placeholder="Username, example: nyx">
            <input id="display-name" placeholder="Display name, example: Nyx">

            <select id="creator-type">
                <option value="">Choose creator type</option>
                <option value="Worldbuilder">Worldbuilder</option>
                <option value="Writer">Writer</option>
                <option value="Artist">Artist</option>
                <option value="Character Creator">Character Creator</option>
                <option value="Mixed Creator">Mixed Creator</option>
            </select>

            <textarea id="bio" rows="5" placeholder="Short bio..."></textarea>

            <button onclick="saveProfile()">Save Profile</button>

            <p id="message"></p>
        </section>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <script>
    const SUPABASE_URL = "https://baaygzddafopihtxyyjq.supabase.co";
        const SUPABASE_ANON_KEY = "sb_publishable_O0JPmpCSe7TDoUxotIe4aQ_4EBgEBV8";

    const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
    const message = document.getElementById("message");

    async function checkUser() {
      const { data: { user } } = await supabaseClient.auth.getUser();

      if (!user) {
        window.location.href = "login.html";
      }
    }

    async function saveProfile() {
      const { data: { user } } = await supabaseClient.auth.getUser();

      if (!user) {
        window.location.href = "login.html";
        return;
      }

      const username = document.getElementById("username").value.trim();
      const displayName = document.getElementById("display-name").value.trim();
      const creatorType = document.getElementById("creator-type").value;
      const bio = document.getElementById("bio").value.trim();

      if (!username || !displayName) {
        message.textContent = "Username and display name are required.";
        return;
      }

      const { error } = await supabaseClient
        .from("profiles")
        .upsert({
          id: user.id,
          username: username,
          display_name: displayName,
          creator_type: creatorType,
          bio: bio
        });

      if (error) {
        message.textContent = error.message;
      } else {
        message.textContent = "Profile saved.";
        window.location.href = "dashboard.html";
      }
    }

    checkUser();
    </script>

</body>
</html>
