<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" href="favicon.png">
    <title>Literature Q&A - Nullverse</title>

    <script>
        const savedNullverseTheme =
            localStorage.getItem("nullverse-theme") || "void";

        document.documentElement.setAttribute(
            "data-theme",
            savedNullverseTheme
        );
    </script>

    <link rel="stylesheet" href="theme.css?v=25">

    <style>
        html {
            min-height: 100%;
            background: #000000;
        }

        body {
            margin: 0;
            min-height: 100vh;
            font-family: Arial, sans-serif;
            background: var(--page-bg);
            background-attachment: fixed;
            color: var(--text-primary);
        }

        header {
            padding: 12px 40px;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(12,12,14,0.72);
            position: sticky;
            top: 0;
            z-index: 100;
            backdrop-filter: blur(18px);
            -webkit-backdrop-filter: blur(18px);
            box-shadow: 0 10px 35px rgba(0,0,0,0.28);
        }

        .logo,
        .logo a {
            display: flex;
            align-items: center;
        }

        .site-logo {
            height: 64px;
            width: auto;
            display: block;
            max-width: none;
        }

        nav {
            display: flex;
            gap: 22px;
            flex-wrap: wrap;
            align-items: center;
        }

            nav a,
            nav button {
                color: var(--text-secondary);
                text-decoration: none;
                background: none;
                border: none;
                cursor: pointer;
                font-family: Arial, sans-serif;
                font-size: 0.95rem;
                transition: 0.18s ease;
            }

                nav a:hover,
                nav button:hover {
                    color: white;
                }

        main {
            max-width: 960px;
            margin: auto;
            padding: 45px 40px 80px;
            position: relative;
            z-index: 2;
        }

        header {
            position: sticky;
            z-index: 100;
        }

        .hero,
        .panel,
        .content-card {
            background: linear-gradient(135deg, rgba(255,255,255,0.06), rgba(255,255,255,0.02)), var(--panel-bg);
            border: 1px solid var(--border-color);
            border-radius: 22px;
            backdrop-filter: blur(18px);
            -webkit-backdrop-filter: blur(18px);
            box-shadow: 0 18px 40px rgba(0,0,0,0.24), 0 0 24px rgba(255,255,255,0.03);
        }

        .hero {
            padding: 34px;
            margin: 24px 0 28px;
        }

            .hero h1 {
                margin: 0 0 10px;
                font-size: clamp(2.2rem, 5vw, 3.4rem);
                line-height: 1.05;
            }

            .hero p,
            p {
                color: var(--text-secondary);
                line-height: 1.7;
            }

        .panel {
            padding: 26px;
            margin-bottom: 24px;
        }

        .content-card {
            background: var(--card-bg);
            border-radius: 18px;
            padding: 22px;
            margin-bottom: 18px;
            transition: 0.18s ease;
        }

            .content-card:hover {
                transform: translateY(-2px);
                border-color: rgba(255,255,255,0.12);
                box-shadow: 0 18px 40px rgba(0,0,0,0.24), 0 0 22px rgba(255,255,255,0.05);
            }

        .button {
            display: inline-block;
            background: linear-gradient(180deg, #2a2a2f 0%, #16161a 45%, #0d0d10 100%);
            color: #f5f5f5;
            border: 1px solid rgba(255,255,255,0.12);
            padding: 10px 14px;
            border-radius: 10px;
            cursor: pointer;
            text-decoration: none;
            font-family: Arial, sans-serif;
            transition: 0.18s ease;
            box-shadow: 0 0 16px rgba(255,255,255,0.08), inset 0 1px 0 rgba(255,255,255,0.06);
        }

            .button:hover {
                background: linear-gradient(180deg, #3a3a40 0%, #202026 45%, #111116 100%);
                border-color: rgba(255,255,255,0.18);
                box-shadow: 0 0 20px rgba(255,255,255,0.12), inset 0 1px 0 rgba(255,255,255,0.08);
                transform: translateY(-1px);
            }

            .button.danger {
                border-color: rgba(255,80,80,.35);
                color: #ffd7d7;
            }

        textarea,
        select,
        input {
            width: 100%;
            box-sizing: border-box;
            padding: 14px;
            border-radius: 14px;
            border: 1px solid var(--border-color);
            background: rgba(0,0,0,0.22);
            color: var(--text-primary);
            font-family: Arial, sans-serif;
            margin-bottom: 14px;
            transition: 0.18s ease;
        }

        textarea {
            resize: vertical;
        }

            textarea:focus,
            select:focus,
            input:focus {
                outline: none;
                border-color: rgba(255,255,255,0.16);
                box-shadow: 0 0 18px rgba(255,255,255,0.05);
            }

        .top-row,
        .actions {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            align-items: center;
        }

        .top-row {
            justify-content: space-between;
            margin-bottom: 8px;
        }

        .author-line,
        .meta,
        .empty {
            color: var(--text-muted);
        }

        .author-line {
            margin-bottom: 12px;
            font-size: 0.95rem;
        }

        .content-body {
            white-space: pre-wrap;
            color: var(--text-primary);
            line-height: 1.75;
        }

        .answer-box {
            margin-top: 20px;
            padding: 18px;
            border-radius: 16px;
            background: linear-gradient(180deg, rgba(255,255,255,0.05), rgba(255,255,255,0.015));
            border: 1px solid var(--border-color);
            box-shadow: inset 0 1px 0 rgba(255,255,255,0.04);
        }

        .modal {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,.75);
            z-index: 9999;
            justify-content: center;
            align-items: center;
            padding: 20px;
            box-sizing: border-box;
        }

        .modal-box {
            width: 520px;
            max-width: 100%;
            background: var(--panel-bg);
            border: 1px solid var(--border-color);
            border-radius: 18px;
            padding: 24px;
            box-shadow: 0 22px 60px rgba(0,0,0,.45);
        }

        .notification-link {
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }

        .notification-badge {
            min-width: 18px;
            height: 18px;
            padding: 0 6px;
            border-radius: 999px;
            background: white;
            color: black;
            font-size: 0.72rem;
            align-items: center;
            justify-content: center;
            line-height: 1;
        }

        @media (max-width: 800px) {
            header {
                flex-direction: column;
                gap: 14px;
                padding: 20px;
            }

            nav {
                justify-content: center;
            }

            main {
                padding: 32px 24px 70px;
            }

            .hero,
            .panel {
                padding: 24px;
            }
        }
    </style>
</head>

<body>
    <div class="nullverse-stars"></div>

    <header>
        <div class="logo">
            <a href="index.html">
                <img src="Nullverse-3.png" alt="Nullverse" class="site-logo">
            </a>
        </div>

        <nav>
            <a href="index.html">Home</a>
            <a href="notifications.html">Notifications</a>
            <a href="explore.html">Explore</a>
            <a href="profile.html">Profile</a>
            <a href="dashboard.html">Dashboard</a>
            <a href="messages.html">Messages</a>
            <button onclick="logOut()">Log Out</button>
        </nav>
    </header>


    <main>
        <div class="top-row">
            <a id="back-to-literature" class="button">← Back to Literature</a>
        </div>

        <section class="hero">
            <h1 id="page-title">Literature Q&A</h1>
            <p id="page-subtitle">Loading literature...</p>
        </section>

        <section id="question-form-section" class="panel">
            <h2>Ask the Creator</h2>

            <textarea id="question-input"
                      rows="5"
                      placeholder="Ask a question about this story..."></textarea>

            <button class="button" id="ask-question-button">
                Ask Question
            </button>
        </section>

        <section>
            <h2>Questions</h2>
            <div id="questions-container">
                <p class="empty">Loading questions...</p>
            </div>
        </section>
    </main>

    <div id="report-modal" class="modal">
        <div class="modal-box">
            <h2 id="report-modal-title">Report</h2>

            <select id="report-reason">
                <option>Spam</option>
                <option>Harassment</option>
                <option>Hate Speech</option>
                <option>NSFW Content</option>
                <option>Copyright Violation</option>
                <option>Misinformation</option>
                <option>Impersonation</option>
                <option>Other</option>
            </select>

            <textarea id="report-details"
                      rows="6"
                      placeholder="Additional details..."></textarea>

            <div class="actions">
                <button class="button" id="submit-report-btn">Submit Report</button>
                <button class="button" id="close-report-btn">Cancel</button>
            </div>
        </div>
    </div>

    <script type="module">
        import { requireBetaAccess } from "./betaGate.js";
        import { supabase } from "./supabaseClient.js";
        import { setupNotificationBadge } from "./notificationBadge.js";
        import { createNotification } from "./notifications.js";
        import { setupMessageBadge } from "./messageBadge.js";
        import {
            getCurrentUserWithPermissions,
            canModerateWorlds,
            canModerateContentOwner
        } from "./permissions.js?v=4";

        const currentUser = await requireBetaAccess();
        setupNotificationBadge();
        setupMessageBadge();

        const {
            profile: currentProfile,
            permissions: currentPermissions
        } = await getCurrentUserWithPermissions(currentUser.id);

        const params = new URLSearchParams(window.location.search);
        const literatureId = params.get("id");

        let currentLiterature = null;
        let blockedUserIds = [];
        let pendingReport = null;

        document.getElementById("ask-question-button")
            .addEventListener("click", submitQuestion);

        document.getElementById("close-report-btn")
            .addEventListener("click", closeReportModal);

        document.getElementById("submit-report-btn")
            .addEventListener("click", submitQaReport);

        if (!literatureId) {
            alert("No literature ID provided.");
            window.location.href = "explore.html";
        }

        await loadBlockedUsers();
        await loadLiterature();
        await loadQuestions();

        async function loadBlockedUsers() {
            const { data, error } = await supabase
                .from("user_blocks")
                .select("blocker_id, blocked_id")
                .in("blocker_id", [currentUser.id]);

            const { data: reverseData, error: reverseError } = await supabase
                .from("user_blocks")
                .select("blocker_id, blocked_id")
                .in("blocked_id", [currentUser.id]);

            if (error || reverseError) {
                console.error(error || reverseError);
                blockedUserIds = [];
                return;
            }

            blockedUserIds = [
                ...(data || []).map(row => row.blocked_id),
                ...(reverseData || []).map(row => row.blocker_id)
            ];
        }

        async function loadLiterature() {
            const { data, error } = await supabase
                .from("worlds")
                .select("*")
                .eq("id", literatureId)
                .single();

            if (error || !data) {
                alert("Literature not found.");
                window.location.href = "explore.html";
                return;
            }

            if (data.content_type !== "literature") {
                alert("This Q&A page is only for literature projects.");
                window.location.href = `world.html?id=${encodeURIComponent(literatureId)}`;
                return;
            }

            currentLiterature = data;

            const { data: ownerProfile } = await supabase
                .from("profiles")
                .select("id, username, display_name, role, role_name")
                .eq("id", currentLiterature.owner_id)
                .single();

            currentLiterature.ownerProfile = ownerProfile;

            if (blockedUserIds.includes(currentLiterature.owner_id)) {
                alert("This Q&A is unavailable.");
                window.location.href = "explore.html";
                return;
            }

            const ownerAccess =
                currentUser.id === currentLiterature.owner_id;

            if (
                currentLiterature.moderation_status === "hidden" &&
                !ownerAccess &&
                !canModerateWorlds(currentPermissions)
            ) {
                alert("This literature has been hidden by Nullverse staff.");
                window.location.href = "explore.html";
                return;
            }

            document.title =
                `${currentLiterature.title || "Literature"} Q&A - Nullverse`;

            document.getElementById("page-title").textContent =
                `${currentLiterature.title || "Untitled Literature"} Q&A`;

            document.getElementById("page-subtitle").textContent =
                `Ask questions about ${currentLiterature.title || "this literature project"}, or read what the creator has answered.`;

            document.getElementById("back-to-literature").href =
                `literature.html?id=${encodeURIComponent(literatureId)}`;

            if (ownerAccess) {
                document.getElementById("question-form-section").style.display =
                    "none";
            }
        }

        async function loadQuestions() {
            const container =
                document.getElementById("questions-container");

            const { data: questions, error } = await supabase
                .from("world_questions")
                .select("*")
                .eq("world_id", literatureId)
                .order("created_at", { ascending: false });

            if (error) {
                container.innerHTML =
                    `<p class="empty">${escapeHtml(error.message)}</p>`;
                return;
            }

            const visibleQuestions =
                (questions || []).filter(question =>
                    !blockedUserIds.includes(question.user_id)
                );

            if (!visibleQuestions.length) {
                container.innerHTML =
                    `<p class="empty">No questions yet.</p>`;
                return;
            }

            const userIds = [
                ...new Set(visibleQuestions.map(question => question.user_id))
            ];

            const { data: profiles } = await supabase
                .from("profiles")
                .select("id, username, display_name")
                .in("id", userIds.length ? userIds : ["00000000-0000-0000-0000-000000000000"]);

            const profileMap =
                new Map((profiles || []).map(profile => [profile.id, profile]));

            container.innerHTML =
                visibleQuestions.map(question =>
                    renderQuestionCard(question, profileMap.get(question.user_id))
                ).join("");

            container.querySelectorAll("[data-action]").forEach(button => {
                button.addEventListener("click", handleQuestionAction);
            });
        }

        function renderQuestionCard(question, profile) {
            const username =
                profile?.username || "unknown";

            const displayName =
                profile?.display_name || username;

            const isOwner =
                currentUser.id === currentLiterature.owner_id;

            const canEdit =
                currentUser.id === question.user_id;

            const canDelete =
                canEdit ||
                isOwner ||
                (
                    canModerateWorlds(currentPermissions) &&
                    canModerateContentOwner(currentProfile, currentLiterature.ownerProfile)
                );

            return `
                <article class="content-card">
                    <div class="author-line">
                        Asked by <strong>${escapeHtml(displayName)}</strong>
                        (@${escapeHtml(username)})
                    </div>

                    <div class="content-body">
                        <strong>Q:</strong>
                        ${escapeHtml(question.question)}
                    </div>

                    <div class="actions" style="margin-top:16px;">
                        <button class="button"
                                data-action="report-question"
                                data-question-id="${escapeHtml(question.id)}">
                            Report Question
                        </button>

                        ${canEdit ? `
                            <button class="button"
                                    data-action="edit-question"
                                    data-question-id="${escapeHtml(question.id)}">
                                Edit Question
                            </button>
                        ` : ""}

                        ${canDelete ? `
                            <button class="button danger"
                                    data-action="delete-question"
                                    data-question-id="${escapeHtml(question.id)}">
                                Delete
                            </button>
                        ` : ""}
                    </div>

                    ${question.creator_answer ? `
                        <div class="answer-box">
                            <strong>Creator Answer:</strong>

                            <div class="content-body" style="margin-top:10px;">
                                ${escapeHtml(question.creator_answer)}
                            </div>

                            <div class="actions" style="margin-top:16px;">
                                <button class="button"
                                        data-action="report-answer"
                                        data-question-id="${escapeHtml(question.id)}">
                                    Report Answer
                                </button>

                                ${isOwner ? `
                                    <button class="button"
                                            data-action="edit-answer"
                                            data-question-id="${escapeHtml(question.id)}">
                                        Edit Answer
                                    </button>
                                ` : ""}
                            </div>
                        </div>
                    ` : `
                        <p class="empty">Awaiting creator response.</p>

                        ${isOwner ? `
                            <textarea id="answer-${escapeHtml(question.id)}"
                                      rows="4"
                                      placeholder="Write your answer..."></textarea>

                            <button class="button"
                                    data-action="answer-question"
                                    data-question-id="${escapeHtml(question.id)}">
                                Reply
                            </button>
                        ` : ""}
                    `}
                </article>
            `;
        }

        async function handleQuestionAction(event) {
            const button = event.currentTarget;
            const action = button.dataset.action;
            const questionId = button.dataset.questionId;

            if (action === "report-question") {
                await openQaReport("question", questionId);
            }

            if (action === "report-answer") {
                await openQaReport("answer", questionId);
            }

            if (action === "edit-question") {
                await editQuestion(questionId);
            }

            if (action === "delete-question") {
                await deleteQuestion(questionId);
            }

            if (action === "answer-question") {
                await answerQuestion(questionId);
            }

            if (action === "edit-answer") {
                await editAnswer(questionId);
            }
        }

        async function openQaReport(reportTarget, questionId) {
            const { data: question, error } = await supabase
                .from("world_questions")
                .select("*")
                .eq("id", questionId)
                .single();

            if (error || !question) {
                alert("This question could not be loaded.");
                return;
            }

            const reportedText =
                reportTarget === "answer"
                    ? question.creator_answer || ""
                    : question.question || "";

            if (!reportedText.trim()) {
                alert("There is no text to report.");
                return;
            }

            pendingReport = {
                reportTarget,
                questionId,
                reportedUserId: reportTarget === "answer"
                    ? currentLiterature.owner_id
                    : question.user_id,
                reportedText
            };

            document.getElementById("report-modal-title").textContent =
                reportTarget === "answer"
                    ? "Report Creator Answer"
                    : "Report Question";

            document.getElementById("report-details").value = "";
            document.getElementById("report-modal").style.display = "flex";
        }

        function closeReportModal() {
            pendingReport = null;
            document.getElementById("report-modal").style.display = "none";
        }

        async function submitQaReport() {
            if (!pendingReport || !currentLiterature) return;

            const reason =
                document.getElementById("report-reason").value;

            const details =
                document.getElementById("report-details").value.trim();

            const { error } = await supabase
                .from("reports")
                .insert({
                    reporter_id: currentUser.id,
                    reported_user_id: pendingReport.reportedUserId,
                    world_id: literatureId,
                    question_id: pendingReport.questionId,
                    report_type: pendingReport.reportTarget === "answer"
                        ? "literature_answer"
                        : "literature_question",
                    reason,
                    details,
                    reported_text: pendingReport.reportedText,
                    status: "open"
                });

            if (error) {
                alert(error.message);
                return;
            }

            closeReportModal();
            alert("Report submitted.");
        }

        async function submitQuestion() {
            if (!currentLiterature) return;

            if (blockedUserIds.includes(currentLiterature.owner_id)) {
                alert("You cannot interact with this creator.");
                return;
            }

            if (currentUser.id === currentLiterature.owner_id) {
                return;
            }

            const input =
                document.getElementById("question-input");

            const question =
                input.value.trim();

            if (!question) return;

            const { error } = await supabase
                .from("world_questions")
                .insert({
                    world_id: literatureId,
                    user_id: currentUser.id,
                    question
                });

            if (error) {
                alert(error.message);
                return;
            }

            await createNotification({
                recipientId: currentLiterature.owner_id,
                actorId: currentUser.id,
                worldId: literatureId,
                type: "literature_question",
                message: `Someone asked a question about ${currentLiterature.title || "your literature"}.`,
                link: `literature-qa.html?id=${encodeURIComponent(literatureId)}`
            });

            input.value = "";
            await loadQuestions();
        }

        async function answerQuestion(questionId) {
            if (!currentLiterature) return;

            if (currentUser.id !== currentLiterature.owner_id) {
                return;
            }

            const input =
                document.getElementById(`answer-${questionId}`);

            const answer =
                input.value.trim();

            if (!answer) return;

            const { error } = await supabase
                .from("world_questions")
                .update({
                    creator_answer: answer,
                    answered_at: new Date().toISOString()
                })
                .eq("id", questionId)
                .eq("world_id", literatureId);

            if (error) {
                alert(error.message);
                return;
            }

            const { data: questionData } = await supabase
                .from("world_questions")
                .select("user_id")
                .eq("id", questionId)
                .single();

            if (questionData) {
                await createNotification({
                    recipientId: questionData.user_id,
                    actorId: currentUser.id,
                    worldId: literatureId,
                    type: "literature_question_answered",
                    message: `Your question about ${currentLiterature.title || "a literature project"} was answered.`,
                    link: `literature-qa.html?id=${encodeURIComponent(literatureId)}`
                });
            }

            await loadQuestions();
        }

        async function editQuestion(questionId) {
            const { data: question, error: loadError } = await supabase
                .from("world_questions")
                .select("*")
                .eq("id", questionId)
                .single();

            if (loadError || !question) {
                alert("Question not found.");
                return;
            }

            if (question.user_id !== currentUser.id) {
                alert("You can only edit your own questions.");
                return;
            }

            const updated =
                prompt("Edit question:", question.question || "");

            if (!updated || !updated.trim()) return;

            const { error } = await supabase
                .from("world_questions")
                .update({ question: updated.trim() })
                .eq("id", questionId)
                .eq("user_id", currentUser.id);

            if (error) {
                alert(error.message);
                return;
            }

            await loadQuestions();
        }

        async function editAnswer(questionId) {
            if (currentUser.id !== currentLiterature.owner_id) return;

            const { data: question, error: loadError } = await supabase
                .from("world_questions")
                .select("*")
                .eq("id", questionId)
                .single();

            if (loadError || !question) {
                alert("Question not found.");
                return;
            }

            const updated =
                prompt("Edit answer:", question.creator_answer || "");

            if (!updated || !updated.trim()) return;

            const { error } = await supabase
                .from("world_questions")
                .update({
                    creator_answer: updated.trim(),
                    answered_at: new Date().toISOString()
                })
                .eq("id", questionId)
                .eq("world_id", literatureId);

            if (error) {
                alert(error.message);
                return;
            }

            await loadQuestions();
        }

        async function deleteQuestion(questionId) {
            const confirmed =
                confirm("Delete this question?");

            if (!confirmed) return;

            const { error } = await supabase
                .from("world_questions")
                .delete()
                .eq("id", questionId);

            if (error) {
                alert(error.message);
                return;
            }

            await loadQuestions();
        }

        function escapeHtml(value) {
            return String(value || "")
                .replaceAll("&", "&amp;")
                .replaceAll("<", "&lt;")
                .replaceAll(">", "&gt;")
                .replaceAll('"', "&quot;")
                .replaceAll("'", "&#039;");
        }

        window.logOut = async function () {
            await supabase.auth.signOut();
            window.location.href = "login.html";
        };
    </script>
</body>
</html>
