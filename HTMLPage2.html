<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nyx World Hub</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #0f0f1a;
            color: #ffffff;
            text-align: center;
        }

        header {
            padding: 60px 20px;
            background: linear-gradient(135deg, #6a00ff, #1a1a40);
        }

        h1 {
            font-size: 3rem;
            margin: 0;
        }

        p {
            font-size: 1.2rem;
            opacity: 0.8;
        }

        .box {
            margin: 40px auto;
            padding: 20px;
            max-width: 600px;
            background: #1c1c2e;
            border-radius: 12px;
        }

        footer {
            margin-top: 60px;
            padding: 20px;
            font-size: 0.9rem;
            opacity: 0.6;
        }

        button {
            padding: 10px 20px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            background: #6a00ff;
            color: white;
            font-size: 1rem;
        }

            button:hover {
                background: #8a2bff;
            }
    </style>
</head>

<body>

    <header>
        <h1>Nyx World Hub</h1>
        <p>A living universe of characters, stories, and lore</p>
    </header>

    <div class="box">
        <h2>Welcome</h2>
        <p>This is a test update. If you see this on GitHub/Vercel, your setup is working.</p>

        <button onclick="alert('It works! Your site is live.')">
            Click Me
        </button>
    </div>

    <footer>
        Built with GitHub + Vercel 🚀
    </footer>

</body>
</html>
