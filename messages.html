<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Messages - Nullverse</title>
    <link rel="icon" type="image/png" href="favicon.png">

    <script>
        const savedNullverseTheme =
            localStorage.getItem("nullverse-theme") || "void";
        document.documentElement.setAttribute("data-theme", savedNullverseTheme);
    </script>

    <link rel="stylesheet" href="theme.css?v=25">

    <style>
        html {
            min-height: 100%;
            background: #000;
        }

        body {
            margin: 0;
            min-height: 100vh;
            font-family: Arial,sans-serif;
            background: var(--page-bg);
            color: var(--text-primary);
        }

        header {
            padding: 12px 40px;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(12,12,14,.72);
            position: sticky;
            top: 0;
            z-index: 100;
            backdrop-filter: blur(18px);
            -webkit-backdrop-filter: blur(18px);
            box-shadow: 0 10px 35px rgba(0,0,0,.28);
        }

        .logo, .logo a {
            display: flex;
            align-items: center;
        }

        .site-logo {
            height: 64px;
            width: auto;
            display: block;
        }

        nav {
            display: flex;
            gap: 22px;
            flex-wrap: wrap;
            align-items: center;
        }

            nav a, nav button {
                color: var(--text-secondary);
                text-decoration: none;
                background: none;
                border: none;
                cursor: pointer;
                font-family: Arial,sans-serif;
                font-size: .95rem;
                transition: .18s ease;
            }

                nav a:hover, nav button:hover, nav a.active {
                    color: white;
                }

        main {
            max-width: 1050px;
            margin: auto;
            padding: 44px 40px 80px;
        }

        .hero, .panel, .conversation-card {
            background: linear-gradient(135deg,rgba(255,255,255,.055),rgba(255,255,255,.015)), var(--panel-bg);
            border: 1px solid var(--border-color);
            border-radius: 22px;
            backdrop-filter: blur(18px);
            -webkit-backdrop-filter: blur(18px);
            box-shadow: 0 18px 40px rgba(0,0,0,.24),0 0 24px rgba(255,255,255,.03);
        }

        .hero {
            padding: 36px;
            margin-bottom: 24px;
        }

            .hero h1 {
                margin: 0 0 10px;
                font-size: 3rem;
                line-height: 1.05;
            }

            .hero p {
                color: var(--text-secondary);
                line-height: 1.7;
                margin: 0;
            }

        .panel {
            padding: 24px;
        }

        .conversation-card {
            padding: 20px;
            margin-bottom: 16px;
            display: flex;
            gap: 16px;
            align-items: center;
            transition: .18s ease;
            text-decoration: none;
            color: inherit;
        }

            .conversation-card:hover {
                transform: translateY(-2px);
                border-color: rgba(255,255,255,.14);
            }

        .avatar {
            width: 56px;
            height: 56px;
            border-radius: 50%;
            object-fit: cover;
            background: #222;
            border: 1px solid var(--border-color);
            flex-shrink: 0;
        }

        .conversation-main {
            flex: 1;
            min-width: 0;
        }

        .conversation-top {
            display: flex;
            gap: 10px;
            align-items: center;
            flex-wrap: wrap;
            margin-bottom: 5px;
        }

        .conversation-main strong {
            display: block;
        }

        .conversation-main p {
            margin: 0;
            color: var(--text-secondary);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .unread-pill {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            min-width: 20px;
            height: 20px;
            padding: 0 7px;
            border-radius: 999px;
            background: white;
            color: black;
            font-size: .72rem;
            font-weight: bold;
        }

        .conversation-time {
            color: var(--text-muted);
            font-size: .85rem;
            white-space: nowrap;
        }

        .empty {
            color: var(--text-muted);
            line-height: 1.7;
        }

        .notification-link {
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }

        .notification-badge {
            min-width: 18px;
            height: 18px;
            padding: 0 6px;
            border-radius: 999px;
            background: white;
            color: black;
            font-size: .72rem;
            align-items: center;
            justify-content: center;
            line-height: 1;
        }

        @media(max-width:800px) {
            header {
                flex-direction: column;
                gap: 14px;
                padding: 20px;
            }

            nav {
                justify-content: center;
            }

            main {
                padding: 32px 24px 70px;
            }

            .hero h1 {
                font-size: 2.35rem;
            }

            .conversation-card {
                align-items: flex-start;
            }

            .conversation-time {
                display: none;
            }
        }
    </style>
    <link rel="stylesheet" href="nullverse-shell.css?v=5">
    <link rel="stylesheet" href="messages.css?v=2">
</head>

<body data-page="messages" data-nv-beta-only-user="true" data-nv-active-only="true">
    <div class="nullverse-stars"></div>
    <div id="nv-site-header"></div>
    <div id="nv-mobile-nav"></div>

    <main class="nv-page-shell messages-main">
        <section class="messages-hero">
            <div><p class="messages-kicker">Private conversations</p><h1>Messages</h1><p>Keep up with mutual followers and open the conversations that need your attention. Blocking and mutual-follow requirements remain enforced by the existing messaging system.</p></div>
            <div class="messages-summary">
                <div class="messages-summary-card"><strong id="conversation-count">0</strong><span>Conversations</span></div>
                <div class="messages-summary-card"><strong id="unread-conversation-count">0</strong><span>Unread chats</span></div>
            </div>
        </section>

        <section class="messages-toolbar" aria-label="Message filters">
            <input id="messages-search" class="messages-search" type="search" placeholder="Search people or recent messages..." autocomplete="off">
            <div class="messages-filter-row">
                <button class="message-filter active" type="button" data-message-filter="all">All</button>
                <button class="message-filter" type="button" data-message-filter="unread">Unread</button>
            </div>
        </section>

        <section class="panel messages-panel"><div id="conversations-container" class="conversations-list"><div class="messages-empty">Loading conversations...</div></div></section>
    </main>

    <script type="module">
        import { requireBetaAccess } from "./betaGate.js";
        import { supabase } from "./supabaseClient.js";
        import { setupNotificationBadge } from "./notificationBadge.js";
        import { setupMessageBadge } from "./messageBadge.js";

        const currentUser = await requireBetaAccess({ allowRestricted: false });

        setupNotificationBadge();
        setupMessageBadge();

        let allConversationCards = [];
        let activeMessageFilter = "all";
        let messageSearchQuery = "";

        document.querySelectorAll("[data-message-filter]").forEach(button => {
            button.addEventListener("click", () => {
                activeMessageFilter = button.dataset.messageFilter || "all";
                document.querySelectorAll("[data-message-filter]").forEach(item => item.classList.toggle("active", item === button));
                renderConversationList();
            });
        });

        document.getElementById("messages-search")?.addEventListener("input", event => {
            messageSearchQuery = String(event.target.value || "").trim().toLowerCase();
            renderConversationList();
        });

        await loadConversations();

        async function loadConversations() {
            const container =
                document.getElementById("conversations-container");

            const { data: memberships, error } = await supabase
                .from("conversation_members")
                .select("conversation_id, last_read_at")
                .eq("user_id", currentUser.id);

            if (error) {
                container.innerHTML =
                    `<p class="empty">${escapeHtml(error.message)}</p>`;
                return;
            }

            if (!memberships || !memberships.length) {
                container.innerHTML =
                    `<p class="empty">No messages yet. Mutual followers will show up here once a conversation starts.</p>`;
                return;
            }

            const conversationIds =
                memberships.map(member => member.conversation_id);

            const memberMap =
                new Map(
                    memberships.map(member => [
                        member.conversation_id,
                        member
                    ])
                );

            const { data: allMembers, error: memberError } = await supabase
                .from("conversation_members")
                .select("conversation_id, user_id")
                .in("conversation_id", conversationIds);

            if (memberError) {
                container.innerHTML =
                    `<p class="empty">${escapeHtml(memberError.message)}</p>`;
                return;
            }

            const otherUserIds = [
                ...new Set(
                    (allMembers || [])
                        .filter(member => member.user_id !== currentUser.id)
                        .map(member => member.user_id)
                )
            ];

            const { data: profiles } = await supabase
                .from("profiles")
                .select("id, username, display_name, avatar_url")
                .in("id", otherUserIds);

            const { data: messages } = await supabase
                .from("messages")
                .select("*")
                .in("conversation_id", conversationIds)
                .is("deleted_at", null)
                .eq("moderation_status", "visible")
                .order("created_at", { ascending: false });

            const profileMap =
                new Map((profiles || []).map(profile => [profile.id, profile]));

            const latestByConversation =
                new Map();

            const unreadByConversation =
                new Map();

            (messages || []).forEach(message => {
                if (!latestByConversation.has(message.conversation_id)) {
                    latestByConversation.set(message.conversation_id, message);
                }

                const membership =
                    memberMap.get(message.conversation_id);

                const isUnread =
                    message.sender_id !== currentUser.id &&
                    (
                        !membership?.last_read_at ||
                        new Date(message.created_at) >
                        new Date(membership.last_read_at)
                    );

                if (isUnread) {
                    unreadByConversation.set(
                        message.conversation_id,
                        (unreadByConversation.get(message.conversation_id) || 0) + 1
                    );
                }
            });

            const cards =
                conversationIds.map(conversationId => {
                    const otherMember =
                        (allMembers || []).find(member =>
                            member.conversation_id === conversationId &&
                            member.user_id !== currentUser.id
                        );

                    const profile =
                        profileMap.get(otherMember?.user_id);

                    const latest =
                        latestByConversation.get(conversationId);

                    return {
                        conversationId,
                        profile,
                        latest,
                        unreadCount:
                            unreadByConversation.get(conversationId) || 0,
                        sortDate:
                            latest?.created_at || ""
                    };
                })
                    .sort((a, b) =>
                        new Date(b.sortDate || 0) - new Date(a.sortDate || 0)
                    );

            allConversationCards = cards;
            document.getElementById("conversation-count").textContent = String(cards.length);
            document.getElementById("unread-conversation-count").textContent = String(cards.filter(card => card.unreadCount > 0).length);
            renderConversationList();
        }

        function renderConversationList() {
            const container = document.getElementById("conversations-container");
            const filtered = allConversationCards.filter(item => {
                if (activeMessageFilter === "unread" && item.unreadCount <= 0) return false;
                const haystack = [item.profile?.display_name, item.profile?.username, item.latest?.body].filter(Boolean).join(" ").toLowerCase();
                return !messageSearchQuery || haystack.includes(messageSearchQuery);
            });

            if (!filtered.length) {
                const message = allConversationCards.length ? "No conversations match this view." : "No messages yet. Mutual followers will show up here once a conversation starts.";
                container.innerHTML = `<div class="messages-empty">${escapeHtml(message)}</div>`;
                return;
            }

            container.innerHTML = filtered.map(renderConversationCard).join("");
        }

        function renderConversationCard(item) {
            const profile = item.profile;

            const name =
                profile?.display_name ||
                profile?.username ||
                "Unknown User";

            const username =
                profile?.username || "unknown";

            const avatar =
                profile?.avatar_url ||
                "https://placehold.co/200x200/1b1b28/ffffff?text=NV";

            const latestText =
                item.latest?.image_url
                    ? "Sent an image"
                    : item.latest?.body || "No messages yet.";

            const time =
                item.latest?.created_at
                    ? new Date(item.latest.created_at).toLocaleString()
                    : "";

            return `
                    <a class="conversation-card ${item.unreadCount > 0 ? "has-unread" : ""}"
                       href="chat.html?id=${encodeURIComponent(item.conversationId)}">
                        <img class="avatar" src="${escapeAttribute(avatar)}" alt="${escapeAttribute(name)}">
                        <div class="conversation-main">
                            <div class="conversation-top">
                                <strong>${escapeHtml(name)}</strong>
                                <span class="conversation-handle">@${escapeHtml(username)}</span>
                                ${item.unreadCount > 0 ? `<span class="unread-pill">${item.unreadCount > 99 ? "99+" : item.unreadCount}</span>` : ""}
                            </div>
                            <p class="conversation-preview">${escapeHtml(latestText)}</p>
                        </div>
                        <div class="conversation-time">${escapeHtml(time)}</div>
                        <div class="conversation-arrow" aria-hidden="true">→</div>
                    </a>
                `;
        }

        const messageChannel = supabase
            .channel(`messages-inbox-${currentUser.id}`)
            .on(
                "postgres_changes",
                {
                    event: "*",
                    schema: "public",
                    table: "messages"
                },
                async () => {
                    await loadConversations();
                }
            )
            .on(
                "postgres_changes",
                {
                    event: "*",
                    schema: "public",
                    table: "conversation_members",
                    filter: `user_id=eq.${currentUser.id}`
                },
                async () => {
                    await loadConversations();
                }
            )
            .subscribe();

        window.addEventListener("beforeunload", () => {
            supabase.removeChannel(messageChannel);
        });

        function escapeHtml(value) {
            return String(value || "")
                .replaceAll("&", "&amp;")
                .replaceAll("<", "&lt;")
                .replaceAll(">", "&gt;")
                .replaceAll('"', "&quot;")
                .replaceAll("'", "&#039;");
        }

        function escapeAttribute(value) {
            return escapeHtml(value).replaceAll("`", "&#096;");
        }

        window.logOut = async function () {
            await supabase.auth.signOut();
            window.location.href = "login.html";
        };
    </script>
    <script type="module" src="nullverse-shell-bootstrap.js?v=5"></script>
</body>
</html>
