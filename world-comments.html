<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" href="favicon.png">
    <title>World Comments - Nullverse</title>

    <script>
        const savedNullverseTheme =
            localStorage.getItem("nullverse-theme") || "void";

        document.documentElement.setAttribute(
            "data-theme",
            savedNullverseTheme
        );
    </script>

    <link rel="stylesheet" href="theme.css?v=20">

    <style>
        html {
            min-height: 100%;
            background: #000000;
        }

        body {
            margin: 0;
            min-height: 100vh;
            font-family: Arial, sans-serif;
            background: var(--page-bg);
            background-attachment: fixed;
            color: var(--text-primary);
        }

        header {
            padding: 12px 40px;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(12,12,14,0.72);
            position: sticky;
            top: 0;
            z-index: 100;
            backdrop-filter: blur(18px);
            -webkit-backdrop-filter: blur(18px);
            box-shadow: 0 10px 35px rgba(0,0,0,0.28);
        }

        .logo,
        .logo a {
            display: flex;
            align-items: center;
        }

        .site-logo {
            height: 64px;
            width: auto;
            display: block;
            max-width: none;
        }

        nav {
            display: flex;
            gap: 22px;
            flex-wrap: wrap;
        }

            nav a,
            nav button {
                color: var(--text-secondary);
                text-decoration: none;
                background: none;
                border: none;
                cursor: pointer;
                font-family: Arial, sans-serif;
                transition: 0.18s ease;
            }

                nav a:hover,
                nav button:hover {
                    color: white;
                }

        main {
            max-width: 900px;
            margin: auto;
            padding: 45px 40px 80px;
        }

        .hero {
            background: linear-gradient(135deg, rgba(255,255,255,0.06), rgba(255,255,255,0.02)), var(--panel-bg);
            border: 1px solid var(--border-color);
            border-radius: 22px;
            padding: 32px;
            margin-bottom: 28px;
            backdrop-filter: blur(18px);
            -webkit-backdrop-filter: blur(18px);
            box-shadow: 0 18px 40px rgba(0,0,0,0.24), 0 0 24px rgba(255,255,255,0.03);
        }

            .hero h1 {
                margin: 0 0 10px;
                font-size: 2.5rem;
            }

            .hero p {
                color: var(--text-secondary);
                line-height: 1.6;
            }

        .button {
            display: inline-block;
            background: linear-gradient(180deg, #2a2a2f 0%, #16161a 45%, #0d0d10 100%);
            color: #f5f5f5;
            border: 1px solid rgba(255,255,255,0.12);
            padding: 10px 14px;
            border-radius: 10px;
            cursor: pointer;
            text-decoration: none;
            font-family: Arial, sans-serif;
            transition: 0.18s ease;
            box-shadow: 0 0 16px rgba(255,255,255,0.08), inset 0 1px 0 rgba(255,255,255,0.06);
        }

            .button:hover {
                background: linear-gradient(180deg, #3a3a40 0%, #202026 45%, #111116 100%);
                border-color: rgba(255,255,255,0.18);
                box-shadow: 0 0 20px rgba(255,255,255,0.12), inset 0 1px 0 rgba(255,255,255,0.08);
                transform: translateY(-1px);
            }

        textarea {
            width: 100%;
            box-sizing: border-box;
            padding: 14px;
            border-radius: 14px;
            border: 1px solid var(--border-color);
            background: rgba(0,0,0,0.22);
            color: var(--text-primary);
            resize: vertical;
            font-family: Arial, sans-serif;
            margin-bottom: 14px;
            transition: 0.18s ease;
        }

            textarea:focus {
                outline: none;
                border-color: rgba(255,255,255,0.16);
                box-shadow: 0 0 18px rgba(255,255,255,0.05);
            }

        .comment-card {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 18px;
            padding: 22px;
            margin-bottom: 18px;
            box-shadow: 0 12px 30px rgba(0,0,0,0.18);
            transition: 0.18s ease;
        }

            .comment-card:hover {
                transform: translateY(-2px);
                border-color: rgba(255,255,255,0.12);
                box-shadow: 0 18px 40px rgba(0,0,0,0.24), 0 0 22px rgba(255,255,255,0.05);
            }

        .comment-author {
            color: var(--text-secondary);
            margin-bottom: 10px;
            font-size: 0.95rem;
        }

        .comment-content {
            line-height: 1.75;
            color: var(--text-primary);
            white-space: pre-wrap;
        }

        .empty {
            color: var(--text-muted);
        }

        .top-row {
            display: flex;
            justify-content: space-between;
            gap: 18px;
            align-items: center;
            flex-wrap: wrap;
            margin-bottom: 26px;
        }

        .notification-link {
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }

        .notification-badge {
            min-width: 18px;
            height: 18px;
            padding: 0 6px;
            border-radius: 999px;
            background: white;
            color: black;
            font-size: 0.72rem;
            align-items: center;
            justify-content: center;
            line-height: 1;
        }
    </style>
</head>

<body>

    <header>
        <div class="logo">
            <a href="index.html">
                <img src="Nullverse-3.png"
                     alt="Nullverse"
                     class="site-logo">
            </a>
        </div>

        <nav>
            <a href="index.html">Home</a>
            <a href="notifications.html">Notifications</a>
            <a href="explore.html">Explore</a>
            <a href="profile.html">Profile</a>
            <a href="dashboard.html">Dashboard</a>
            <button onclick="logOut()">Log Out</button>
        </nav>
    </header>

    <main>

        <div class="top-row">
            <a id="back-to-world" class="button">
                ← Back to World
            </a>
        </div>

        <section class="hero">
            <h1 id="page-title">
                World Comments
            </h1>

            <p id="page-subtitle">
                Loading world...
            </p>
        </section>

        <section id="comment-form-section">

            <textarea id="comment-input"
                      rows="5"
                      placeholder="Share your thoughts about this world..."></textarea>

            <button class="button"
                    onclick="submitComment()">
                Post Comment
            </button>

        </section>

        <br>

        <section id="comments-container">
            <p class="empty">Loading comments...</p>
        </section>

    </main>

    <script type="module">
    import { requireBetaAccess } from "./betaGate.js";
    import { supabase } from "./supabaseClient.js";
    import { createNotification } from "./notifications.js";
    import { setupNotificationBadge } from "./notificationBadge.js";

        const currentUser = await requireBetaAccess();
        setupNotificationBadge();

    const params = new URLSearchParams(window.location.search);

    const worldId = params.get("id");

        let currentWorld = null;
        let allAdditions = [];

    if (!worldId) {
        alert("No world ID provided.");
        window.location.href = "explore.html";
    }

    await loadWorld();
    await loadComments();

    async function loadWorld() {

        const { data, error } = await supabase
            .from("worlds")
            .select("*")
            .eq("id", worldId)
            .single();

        if (error || !data) {
            alert("World not found.");
            window.location.href = "explore.html";
            return;
        }

        currentWorld = data;

        document.getElementById("page-title").textContent =
            `${data.title} Comments`;

        document.getElementById("page-subtitle").textContent =
            `Discuss ${data.title} with the community.`;

        document.getElementById("back-to-world").href =
            `world.html?id=${encodeURIComponent(worldId)}`;

        const isOwner =
            currentUser.id === currentWorld.owner_id;

        if (isOwner) {
            document.getElementById("comment-form-section").style.display =
                "none";
        }
    }

    async function loadComments() {

        const container =
            document.getElementById("comments-container");

        const { data: comments, error } = await supabase
            .from("world_comments")
            .select("*")
            .eq("world_id", worldId)
            .order("created_at", { ascending: false });

        if (error) {
            container.innerHTML = `
                <p class="empty">
                    ${escapeHtml(error.message)}
                </p>
            `;
            return;
        }

        if (!comments || comments.length === 0) {
            container.innerHTML = `
                <p class="empty">
                    No comments yet.
                </p>
            `;
            return;
        }

        const userIds = [
            ...new Set(comments.map(comment => comment.user_id))
        ];

        const { data: profiles } = await supabase
            .from("profiles")
            .select("id, username, display_name")
            .in("id", userIds);

        container.innerHTML = comments.map(comment => {
            const profile = profiles?.find(profile => profile.id === comment.user_id);

            const username = profile?.username || "unknown";
            const displayName = profile?.display_name || username;

            return `
        <article class="comment-card">
            <div class="comment-author">
                <strong>${escapeHtml(displayName)}</strong>
                (@${escapeHtml(username)})
            </div>

            <div class="comment-content">
    ${escapeHtml(comment.content)}
</div>

${(
                    currentUser.id === comment.user_id ||
                    currentUser.id === currentWorld.owner_id
                ) ? `
    <div style="margin-top:16px; display:flex; gap:10px; flex-wrap:wrap;">

        ${currentUser.id === comment.user_id ? `
            <button
                class="button"
                onclick="editComment('${comment.id}', \`${escapeHtml(comment.content)}\`)">
                Edit
            </button>
        ` : ""}

        <button
            class="button"
            onclick="deleteComment('${comment.id}')">
            Delete
        </button>

    </div>
` : ""}
        </article>
    `;
        }).join("");
    }

    window.submitComment = async function () {

        if (!currentWorld) return;

        if (currentUser.id === currentWorld.owner_id) {
            return;
        }

        const input =
            document.getElementById("comment-input");

        const content =
            input.value.trim();

        if (!content) return;

        const { error } = await supabase
            .from("world_comments")
            .insert({
                world_id: worldId,
                user_id: currentUser.id,
                content
            });

        if (!error) {
            await createNotification({
                recipientId: currentWorld.owner_id,
                actorId: currentUser.id,
                worldId: worldId,
                type: "world_commented",
                message: `Someone commented on ${currentWorld.title}.`,
                link: `world-comments.html?id=${encodeURIComponent(worldId)}`
            });
        }

        if (error) {
            alert(error.message);
            return;
        }

        input.value = "";

        await loadComments();
    };

        window.deleteComment = async function (commentId) {

            const confirmed =
                confirm("Delete this comment?");

            if (!confirmed) return;

            const { error } = await supabase
                .from("world_comments")
                .delete()
                .eq("id", commentId);

            if (error) {
                alert(error.message);
                return;
            }

            await loadComments();
        };

        window.editComment = async function (commentId, oldContent) {

            const updated =
                prompt("Edit comment:", oldContent);

            if (!updated) return;

            const { error } = await supabase
                .from("world_comments")
                .update({
                    content: updated
                })
                .eq("id", commentId);

            if (error) {
                alert(error.message);
                return;
            }

            await loadComments();
        };

    function escapeHtml(value) {
        return String(value || "")
            .replaceAll("&", "&amp;")
            .replaceAll("<", "&lt;")
            .replaceAll(">", "&gt;")
            .replaceAll('"', "&quot;")
            .replaceAll("'", "&#039;");
    }

    window.logOut = async function () {
        await supabase.auth.signOut();
        window.location.href = "login.html";
    };
    </script>

</body>
</html>
