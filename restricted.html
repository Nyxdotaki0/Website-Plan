<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <<title>Account Restricted - Nullverse</title>
    <link rel="stylesheet" href="theme.css?v=22">
</head>
<body style="margin:0;min-height:100vh;background:var(--page-bg);color:var(--text-primary);font-family:Arial,sans-serif;display:flex;align-items:center;justify-content:center;padding:30px;">
    <section style="max-width:620px;background:var(--panel-bg);border:1px solid var(--border-color);border-radius:20px;padding:34px;">
        
        <h1>Account Restricted</h1>
        <p>Your account is currently restricted from posting, creating, or editing content.</p>
        <p><strong>Reason:</strong> <span id="reason">Loading...</span></p>
        <p id="expires">Loading...</p>
        <a href="index.html" style="color:white;">Return Home</a>
    </section>

    <script type="module">
        import { requireBetaAccess } from "./betaGate.js";

        await requireBetaAccess({ allowRestricted: true });

        const reason = localStorage.getItem("nullverse_moderation_reason") || "No reason provided.";
        const expires = localStorage.getItem("nullverse_moderation_expires_at");

        document.getElementById("reason").textContent = reason;
        document.getElementById("expires").textContent = expires
            ? "Expires: " + new Date(expires).toLocaleString()
            : "Duration: Permanent";
    </script>
</body>
</html>
