<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" href="favicon.png">
    <title>Nullverse Login</title>
    <style>
        body {
            margin: 0;
            font-family: Arial,sans-serif;
            background: radial-gradient(circle at top,#1b1b2b 0,#0d0d12 45%,#08080c 100%);
            color: #f2f2f2;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 28px;
            box-sizing: border-box
        }

        .auth-shell {
            width: 100%;
            max-width: 470px
        }

        .auth-card {
            background: rgba(21,21,31,.94);
            border: 1px solid #2a2a35;
            border-radius: 22px;
            padding: 34px;
            box-shadow: 0 24px 70px rgba(0,0,0,.38)
        }

        .logo-wrap {
            display: flex;
            justify-content: center;
            margin-bottom: 24px
        }

        .site-logo {
            height: 82px;
            width: auto;
            display: block
        }

        h1 {
            margin: 0 0 8px;
            font-size: 2.1rem
        }

        p {
            color: #bdbdca;
            line-height: 1.6;
            margin: 0 0 22px
        }

        input {
            width: 100%;
            padding: 13px;
            margin-bottom: 14px;
            border-radius: 10px;
            border: 1px solid #333344;
            background: #0d0d12;
            color: white;
            box-sizing: border-box;
            font-family: Arial,sans-serif
        }

            input:focus {
                outline: none;
                border-color: #56568a
            }

        button {
            width: 100%;
            padding: 13px;
            background: #2a2a44;
            color: white;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-size: 1rem;
            margin-top: 6px;
            font-family: Arial,sans-serif
        }

            button:hover {
                background: #3a3a5c
            }

        .link-button {
            background: none;
            color: #cfcfd8;
            padding: 0;
            margin-top: 18px;
            text-decoration: underline
        }

            .link-button:hover {
                background: none;
                color: white
            }

        .message {
            margin-top: 16px;
            color: #c8c8d4;
            line-height: 1.5
        }

        .hidden {
            display: none
        }

        .back-link {
            display: block;
            margin-top: 20px;
            color: #8f8fa3;
            text-align: center;
            text-decoration: none
        }

            .back-link:hover {
                color: white
            }

        .auth-note {
            font-size: .9rem;
            color: #8f8fa3;
            margin-top: -8px;
            margin-bottom: 18px
        }

        @media(max-width:600px) {
            .auth-card {
                padding: 28px 22px
            }

            .site-logo {
                height: 70px
            }

            h1 {
                font-size: 1.85rem
            }
        }
    </style>
</head>
<body>
    <main class="auth-shell">
        <section class="auth-card">
            <div class="logo-wrap">
                <img src="Nullverse-3.png" alt="Nullverse" class="site-logo">
            </div>

            <section id="login-section">
                <h1>Welcome Back</h1>
                <p>Continue building worlds, stories, characters, and creator profiles.</p>
                <input id="login-email" type="email" placeholder="Email">
                <input id="login-password" type="password" placeholder="Password">
                <button onclick="logIn()">Log In</button>
                <button class="link-button" onclick="showCreateAccount()">Don't have an account? Create one</button>
            </section>

            <section id="signup-section" class="hidden">
                <h1>Create Account</h1>
                <p>Create your Nullverse account. After this, you’ll set up your creator profile.</p>
                <p class="auth-note">You only need an email and password to begin.</p>
                <input id="signup-email" type="email" placeholder="Email">
                <input id="signup-password" type="password" placeholder="Password">
                <input id="signup-confirm-password" type="password" placeholder="Confirm password">
                <button onclick="signUp()">Create Account</button>
                <button class="link-button" onclick="showLogin()">Already have an account? Log in</button>
            </section>

            <p id="message" class="message"></p>
            <a class="back-link" href="index.html">Back to Nullverse</a>
        </section>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        const SUPABASE_URL = "https://baaygzddafopihtxyyjq.supabase.co";
        const SUPABASE_ANON_KEY = "sb_publishable_O0JPmpCSe7TDoUxotIe4aQ_4EBgEBV8";
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
        const message = document.getElementById("message");

        function showCreateAccount() {
            document.getElementById("login-section").classList.add("hidden");
            document.getElementById("signup-section").classList.remove("hidden");
            message.textContent = "";
        }

        function showLogin() {
            document.getElementById("signup-section").classList.add("hidden");
            document.getElementById("login-section").classList.remove("hidden");
            message.textContent = "";
        }

        async function signUp() {
            const email = document.getElementById("signup-email").value.trim();
            const password = document.getElementById("signup-password").value.trim();
            const confirmPassword = document.getElementById("signup-confirm-password").value.trim();

            if (!email || !password || !confirmPassword) {
                message.textContent = "Email, password, and password confirmation are required.";
                return;
            }

            if (password.length < 6) {
                message.textContent = "Password must be at least 6 characters.";
                return;
            }

            if (password !== confirmPassword) {
                message.textContent = "Passwords do not match.";
                return;
            }

            const { error } = await supabaseClient.auth.signUp({
                email,
                password,
                options: {
                    emailRedirectTo: "https://nullverse.dev/profile-setup.html"
                }
            });

            if (error) {
                message.textContent = error.message;
                return;
            }

            message.textContent = "Account created. Check your email to confirm your account, then continue to profile setup.";
        }

        async function logIn() {
            const email = document.getElementById("login-email").value.trim();
            const password = document.getElementById("login-password").value.trim();

            if (!email || !password) {
                message.textContent = "Enter your email and password.";
                return;
            }

            const { error } = await supabaseClient.auth.signInWithPassword({ email, password });

            if (error) {
                message.textContent = error.message;
                return;
            }

            window.location.href = "dashboard.html";
        }

        async function checkExistingSession() {
            const { data } = await supabaseClient.auth.getSession();
            if (data.session) window.location.href = "dashboard.html";
        }

        checkExistingSession();
    </script>
</body>
</html>
