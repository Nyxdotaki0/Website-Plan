<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Nullverse Login</title>
</head>

<body>

    <h1>Nullverse Login</h1>

    <input id="email" type="email" placeholder="Email">
    <input id="password" type="password" placeholder="Password">

    <button onclick="signUp()">Create Account</button>
    <button onclick="logIn()">Log In</button>
    <button onclick="logOut()">Log Out</button>

    <p id="message"></p>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <script>
        const SUPABASE_URL = "https://baaygzddafopihtxyyjq.supabase.co";
        const SUPABASE_ANON_KEY = "sb_publishable_O0JPmpCSe7TDoUxotIe4aQ_4EBgEBV8";

        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        const message = document.getElementById("message");

        async function signUp() {
            const email = document.getElementById("email").value.trim();
            const password = document.getElementById("password").value.trim();

            if (!email || !password) {
                message.textContent = "Please enter an email and password.";
                return;
            }

            const { data, error } = await supabaseClient.auth.signUp({
                email: email,
                password: password,
                options: {
                    emailRedirectTo: "https://nullverse.dev/dashboard.html"
                }
            });

            if (error) {
                message.textContent = error.message;
            } else {
                message.textContent = "Account created. Check your email to confirm your account.";
            }
        }

        async function logIn() {
            const email = document.getElementById("email").value.trim();
            const password = document.getElementById("password").value.trim();

            if (!email || !password) {
                message.textContent = "Please enter an email and password.";
                return;
            }

            const { data, error } = await supabaseClient.auth.signInWithPassword({
                email: email,
                password: password
            });

            if (error) {
                message.textContent = error.message;
            } else {
                message.textContent = "Logged in successfully.";
                window.location.href = "profile-setup.html";
            }
        }

        async function logOut() {
            const { error } = await supabaseClient.auth.signOut();

            if (error) {
                message.textContent = error.message;
            } else {
                message.textContent = "Logged out.";
            }
        }

        async function checkExistingSession() {
            const { data } = await supabaseClient.auth.getSession();

            if (data.session) {
                message.textContent = "You are already logged in.";
            }
        }

        checkExistingSession();
    </script>

</body>
</html>
