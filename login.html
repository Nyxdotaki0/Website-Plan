<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Nullverse Login</title>
</head>
<body>

    <h1>Nullverse Login</h1>

    <input id="email" type="email" placeholder="Email">
    <input id="password" type="password" placeholder="Password">

    <button onclick="signUp()">Create Account</button>
    <button onclick="logIn()">Log In</button>
    <button onclick="logOut()">Log Out</button>

    <p id="message"></p>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <script>
    const SUPABASE_URL = "PASTE_YOUR_PROJECT_URL_HERE";
    const SUPABASE_ANON_KEY = "PASTE_YOUR_ANON_KEY_HERE";

    const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    async function signUp() {
      const email = document.getElementById("email").value;
      const password = document.getElementById("password").value;

      const { data, error } = await supabaseClient.auth.signUp({
        email: email,
        password: password
      });

      if (error) {
        document.getElementById("message").textContent = error.message;
      } else {
        document.getElementById("message").textContent = "Account created. Check your email if confirmation is required.";
      }
    }

    async function logIn() {
      const email = document.getElementById("email").value;
      const password = document.getElementById("password").value;

      const { data, error } = await supabaseClient.auth.signInWithPassword({
        email: email,
        password: password
      });

      if (error) {
        document.getElementById("message").textContent = error.message;
      } else {
        document.getElementById("message").textContent = "Logged in successfully.";
        window.location.href = "dashboard.html";
      }
    }

    async function logOut() {
      await supabaseClient.auth.signOut();
      document.getElementById("message").textContent = "Logged out.";
    }
    </script>

</body>
</html>
