<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" href="favicon.png">
    <title>Nullverse Login</title>

    <link rel="stylesheet" href="theme.css?v=22">

    <style>
        html {
            min-height: 100%;
            background: #000;
        }

        body {
            margin: 0;
            min-height: 100vh;
            font-family: Arial,sans-serif;
            background: radial-gradient(circle at 15% 12%, rgba(255,255,255,0.08), transparent 24%), radial-gradient(circle at 82% 18%, rgba(255,255,255,0.05), transparent 28%), radial-gradient(circle at 50% 90%, rgba(255,255,255,0.04), transparent 36%), radial-gradient(circle at 12% 18%, rgba(255,255,255,0.95) 0 1px, transparent 1.7px), radial-gradient(circle at 24% 42%, rgba(255,255,255,0.55) 0 1px, transparent 1.6px), radial-gradient(circle at 38% 12%, rgba(255,255,255,0.45) 0 1px, transparent 1.5px), radial-gradient(circle at 52% 34%, rgba(255,255,255,0.65) 0 1px, transparent 1.6px), radial-gradient(circle at 68% 18%, rgba(255,255,255,0.75) 0 1px, transparent 1.7px), radial-gradient(circle at 82% 48%, rgba(255,255,255,0.5) 0 1px, transparent 1.5px), radial-gradient(circle at 90% 72%, rgba(255,255,255,0.7) 0 1px, transparent 1.7px), radial-gradient(circle at 34% 78%, rgba(255,255,255,0.45) 0 1px, transparent 1.5px), radial-gradient(circle at 58% 88%, rgba(255,255,255,0.4) 0 1px, transparent 1.5px), linear-gradient( 180deg, #000000 0%, #060608 45%, #000000 100% );
            color: #f2f2f2;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 30px;
            box-sizing: border-box;
            overflow-x: hidden;
        }

        .auth-shell {
            width: 100%;
            max-width: 500px;
            position: relative;
        }

        .auth-card {
            position: relative;
            overflow: hidden;
            background: linear-gradient( 135deg, rgba(255,255,255,0.06), rgba(255,255,255,0.015) ), rgba(10,10,12,0.82);
            border: 1px solid rgba(255,255,255,0.10);
            border-radius: 28px;
            padding: 40px;
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            box-shadow: 0 30px 80px rgba(0,0,0,0.42), 0 0 50px rgba(255,255,255,0.04);
        }

            .auth-card::before {
                content: "";
                position: absolute;
                inset: 0;
                background: radial-gradient(circle at top right, rgba(255,255,255,0.08), transparent 36%);
                pointer-events: none;
            }

        .logo-wrap {
            display: flex;
            justify-content: center;
            margin-bottom: 28px;
        }

        .site-logo {
            height: 92px;
            width: auto;
            display: block;
            filter: drop-shadow(0 0 18px rgba(255,255,255,0.10));
        }

        h1 {
            margin: 0 0 10px;
            font-size: 2.4rem;
            line-height: 1.05;
        }

        p {
            color: #b9b9c0;
            line-height: 1.75;
            margin: 0 0 24px;
        }

        .auth-note {
            font-size: .92rem;
            color: #8d8d95;
            margin-top: -10px;
            margin-bottom: 18px;
        }

        input {
            width: 100%;
            box-sizing: border-box;
            padding: 14px;
            margin-bottom: 16px;
            border-radius: 14px;
            border: 1px solid rgba(255,255,255,0.08);
            background: rgba(0,0,0,0.24);
            color: white;
            font-family: Arial,sans-serif;
            transition: .18s ease;
        }

            input::placeholder {
                color: #808089;
            }

            input:focus {
                outline: none;
                border-color: rgba(255,255,255,0.16);
                box-shadow: 0 0 18px rgba(255,255,255,0.05);
            }

        button {
            width: 100%;
            padding: 14px;
            border-radius: 14px;
            border: 1px solid rgba(255,255,255,0.12);
            background: linear-gradient( 180deg, #2a2a2f 0%, #16161a 45%, #0d0d10 100% );
            color: #f5f5f5;
            cursor: pointer;
            font-size: 1rem;
            font-family: Arial,sans-serif;
            transition: .18s ease;
            box-shadow: 0 0 16px rgba(255,255,255,0.08), inset 0 1px 0 rgba(255,255,255,0.06);
        }

            button:hover {
                background: linear-gradient( 180deg, #3a3a40 0%, #202026 45%, #111116 100% );
                border-color: rgba(255,255,255,0.18);
                transform: translateY(-1px);
                box-shadow: 0 0 20px rgba(255,255,255,0.12), inset 0 1px 0 rgba(255,255,255,0.08);
            }

        .link-button {
            background: none !important;
            border: none !important;
            box-shadow: none !important;
            color: #b8b8c4;
            padding: 0;
            margin-top: 18px;
            text-decoration: underline;
        }

            .link-button:hover {
                color: white;
                transform: none;
            }

        .message {
            margin-top: 18px;
            color: #c8c8d4;
            line-height: 1.6;
        }

        .hidden {
            display: none;
        }

        .back-link {
            display: block;
            margin-top: 24px;
            color: #8f8fa3;
            text-align: center;
            text-decoration: none;
            transition: .18s ease;
        }

            .back-link:hover {
                color: white;
            }

        @media(max-width:600px) {

            body {
                padding: 18px;
            }

            .auth-card {
                padding: 30px 24px;
                border-radius: 24px;
            }

            .site-logo {
                height: 74px;
            }

            h1 {
                font-size: 2rem;
            }
        }
    </style>
</head>
<body>
    <main class="auth-shell">
        <section class="auth-card">
            <div class="logo-wrap">
                <img src="Nullverse-3.png" alt="Nullverse" class="site-logo">
            </div>

            <section id="login-section">
                <h1>Welcome Back</h1>
                <p>Continue building worlds, stories, characters, and creator profiles.</p>
                <input id="login-email" type="email" placeholder="Email">
                <input id="login-password" type="password" placeholder="Password">
                <button onclick="logIn()">Log In</button>
                <button class="link-button" onclick="showCreateAccount()">Don't have an account? Create one</button>
            </section>

            <section id="signup-section" class="hidden">
                <h1>Create Account</h1>
                <p>Create your Nullverse account. After this, you’ll set up your creator profile.</p>
                <p class="auth-note">You only need an email and password to begin.</p>
                <input id="signup-email" type="email" placeholder="Email">
                <input id="signup-password" type="password" placeholder="Password">
                <input id="signup-confirm-password" type="password" placeholder="Confirm password">
                <button onclick="signUp()">Create Account</button>
                <button class="link-button" onclick="showLogin()">Already have an account? Log in</button>
            </section>

            <p id="message" class="message"></p>
            <a class="back-link" href="index.html">Back to Nullverse</a>
        </section>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        const SUPABASE_URL = "https://baaygzddafopihtxyyjq.supabase.co";
        const SUPABASE_ANON_KEY = "sb_publishable_O0JPmpCSe7TDoUxotIe4aQ_4EBgEBV8";
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
        const message = document.getElementById("message");

        function showCreateAccount() {
            document.getElementById("login-section").classList.add("hidden");
            document.getElementById("signup-section").classList.remove("hidden");
            message.textContent = "";
        }

        function showLogin() {
            document.getElementById("signup-section").classList.add("hidden");
            document.getElementById("login-section").classList.remove("hidden");
            message.textContent = "";
        }

        async function signUp() {
            const email = document.getElementById("signup-email").value.trim();
            const password = document.getElementById("signup-password").value.trim();
            const confirmPassword = document.getElementById("signup-confirm-password").value.trim();

            if (!email || !password || !confirmPassword) {
                message.textContent = "Email, password, and password confirmation are required.";
                return;
            }

            if (password.length < 6) {
                message.textContent = "Password must be at least 6 characters.";
                return;
            }

            if (password !== confirmPassword) {
                message.textContent = "Passwords do not match.";
                return;
            }

            const { error } = await supabaseClient.auth.signUp({
                email,
                password,
                options: {
                    emailRedirectTo: "https://nullverse.dev/profile-setup.html"
                }
            });

            if (error) {
                message.textContent = error.message;
                return;
            }

            message.textContent = "Account created. Check your email to confirm your account, then continue to profile setup.";
        }

        async function logIn() {
            const email = document.getElementById("login-email").value.trim();
            const password = document.getElementById("login-password").value.trim();

            if (!email || !password) {
                message.textContent = "Enter your email and password.";
                return;
            }

            const { error } = await supabaseClient.auth.signInWithPassword({ email, password });

            if (error) {
                message.textContent = error.message;
                return;
            }

            window.location.href = "dashboard.html";
        }

        async function checkExistingSession() {
            const { data } = await supabaseClient.auth.getSession();
            if (data.session) window.location.href = "dashboard.html";
        }

        checkExistingSession();
    </script>
</body>
</html>
