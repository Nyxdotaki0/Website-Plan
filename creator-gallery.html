<!<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Creator Gallery - Nullverse</title>
    <link rel="icon" type="image/png" href="favicon.png">

    <script>
        const savedNullverseTheme =
            localStorage.getItem("nullverse-theme") || "void";

        document.documentElement.setAttribute(
            "data-theme",
            savedNullverseTheme
        );
    </script>

    <link rel="stylesheet" href="theme.css?v=25">

    <style>
        body {
            margin: 0;
            min-height: 100vh;
            font-family: Arial, sans-serif;
            background: var(--page-bg);
            background-attachment: fixed;
            color: var(--text-primary);
        }

        header {
            padding: 12px 40px;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(12,12,14,0.72);
            position: sticky;
            top: 0;
            z-index: 100;
            backdrop-filter: blur(18px);
            box-shadow: 0 10px 35px rgba(0,0,0,0.28);
        }

        .logo, .logo a {
            display: flex;
            align-items: center;
        }

        .site-logo {
            height: 46px;
            width: auto;
            display: block;
        }

        nav {
            display: flex;
            gap: 22px;
            align-items: center;
            flex-wrap: wrap;
        }

        nav a, nav button {
            color: var(--text-secondary);
            text-decoration: none;
            background: none;
            border: none;
            cursor: pointer;
            font-family: Arial, sans-serif;
            font-size: .95rem;
        }

        nav a:hover, nav button:hover {
            color: white;
        }

        main {
            max-width: 1180px;
            margin: auto;
            padding: 44px 40px 90px;
        }

        .hero, .panel, .gallery-card {
            background: linear-gradient(135deg, rgba(255,255,255,.055), rgba(255,255,255,.015)), var(--panel-bg);
            border: 1px solid var(--border-color);
            border-radius: 22px;
            backdrop-filter: blur(18px);
            box-shadow: 0 18px 40px rgba(0,0,0,.24), 0 0 24px rgba(255,255,255,.03);
        }

        .hero {
            padding: 34px;
            margin-bottom: 24px;
        }

        .hero h1 {
            margin: 0 0 10px;
            font-size: 2.7rem;
        }

        .hero p {
            color: var(--text-secondary);
            line-height: 1.7;
            margin: 0;
        }

        .button {
            display: inline-block;
            margin-top: 16px;
            background: linear-gradient(180deg, #2a2a2f 0%, #16161a 45%, #0d0d10 100%);
            color: #f5f5f5;
            border: 1px solid rgba(255,255,255,.12);
            padding: 10px 14px;
            border-radius: 10px;
            text-decoration: none;
            cursor: pointer;
        }

        .filter-row {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            margin-bottom: 24px;
        }

        .filter-chip {
            background: rgba(255,255,255,.045);
            color: var(--text-secondary);
            border: 1px solid var(--border-color);
            border-radius: 999px;
            padding: 8px 12px;
            cursor: pointer;
        }

        .filter-chip.active {
            color: white;
            border-color: rgba(255,255,255,.28);
            background: rgba(255,255,255,.10);
        }

        .gallery-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(215px, 215px));
            gap: 18px;
            justify-content: start;
        }

        .gallery-card {
            position: relative;
            overflow: hidden;
            padding: 0;
            cursor: pointer;
            width: 215px;
            height: 215px;
            border-radius: 18px;
        }

            .gallery-card img {
                width: 100%;
                height: 100%;
                object-fit: cover;
                display: block;
                border: none;
            }

        .gallery-overlay {
            position: absolute;
            inset: 0;
            padding: 12px;
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            pointer-events: none;
        }

        .gallery-pill {
            background: rgba(0,0,0,.62);
            border: 1px solid rgba(255,255,255,.18);
            color: white;
            border-radius: 999px;
            padding: 6px 9px;
            font-size: .78rem;
            backdrop-filter: blur(10px);
        }

        .gallery-like-button {
            position: absolute;
            right: 12px;
            bottom: 12px;
            z-index: 3;
            margin: 0;
        }

        .gallery-type {
            display: inline-block;
            margin-bottom: 10px;
            color: var(--text-secondary);
            border: 1px solid var(--border-color);
            border-radius: 999px;
            padding: 5px 9px;
            font-size: .78rem;
        }

        .gallery-body h3 {
            margin: 0 0 8px;
        }

        .gallery-body p {
            color: var(--text-secondary);
            line-height: 1.6;
            margin: 0;
        }

        .empty {
            color: var(--text-muted);
            line-height: 1.7;
        }

        .lightbox-close,
        .lightbox-like {
            position: absolute;
            z-index: 10001;
            width: 46px;
            height: 46px;
            border-radius: 999px;
            border: 1px solid rgba(255,255,255,.16);
            background: linear-gradient(180deg, rgba(255,255,255,.16), rgba(255,255,255,.04)), rgba(8,8,10,.78);
            color: white;
            cursor: pointer;
            backdrop-filter: blur(16px);
            box-shadow: 0 0 18px rgba(255,255,255,.08), inset 0 1px 0 rgba(255,255,255,.14);
        }

        .lightbox-close {
            top: 18px;
            right: 18px;
            font-size: 1.5rem;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .lightbox-like {
            top: 18px;
            right: 74px;
            font-size: 1rem;
            width: auto;
            padding: 0 16px;
        }

        .lightbox-shell {
            width: min(900px, 96vw);
            max-height: 92vh;
            overflow-y: auto;
        }

        .lightbox-image {
            width: 100%;
            max-height: 70vh;
            object-fit: contain;
            display: block;
            border-radius: 18px;
        }

        .lightbox-details {
            margin-top: 14px;
            background: var(--panel-bg);
            border: 1px solid var(--border-color);
            border-radius: 18px;
            padding: 18px;
        }
        .lightbox-hint {
            position: absolute;
            top: 18px;
            left: 18px;
            background: linear-gradient( 180deg, rgba(255,255,255,.16), rgba(255,255,255,.04) ), rgba(8,8,10,.78);
            border: 1px solid rgba(255,255,255,.16);
            border-radius: 999px;
            padding: 8px 12px;
            color: white;
            font-size: .78rem;
            backdrop-filter: blur(16px);
        }

        @media (max-width: 800px) {
            header {
                padding: 12px 14px;
                gap: 10px;
            }

            nav {
                justify-content: center;
            }

            main {
                padding: 32px 24px 80px;
            }

            .hero h1 {
                font-size: 2.1rem;
            }
            .gallery-grid {
                grid-template-columns: repeat(2, minmax(0, 1fr));
            }

            .gallery-card {
                width: 100%;
                height: auto;
                aspect-ratio: 1 / 1;
            }

            .lightbox-close {
                top: 16px;
                right: 16px;
            }

            .lightbox-like {
                top: 16px;
                right: 72px;
            }
            #gallery-lightbox {
                padding: 150px 16px 28px !important;
                align-items: flex-start !important;
            }

            .lightbox-shell {
                width: 100%;
                max-height: calc(100vh - 180px);
            }

        }
    </style>
</head>

<body>
    <div class="nullverse-stars"></div>

    <header>
        <div class="logo">
            <a href="index.html">
                <img src="Nullverse-3.png" alt="Nullverse" class="site-logo">
            </a>
        </div>

        <nav>
            <a href="index.html">Home</a>
            <a href="notifications.html">Notifications</a>
            <a href="explore.html">Explore</a>
            <a href="profile.html">Profile</a>
            <a href="dashboard.html">Dashboard</a>
            <a href="messages.html">Messages</a>
            <button onclick="logOut()">Log Out</button>
        </nav>
    </header>

    <main>
        <section class="hero">
            <h1 id="gallery-title">Creator Gallery</h1>
            <p id="gallery-subtitle">Loading creator gallery...</p>
            <a id="back-profile-link" class="button" href="profile.html">Back to Profile</a>
        </section>

        <section class="panel" style="padding:24px; margin-bottom:24px;">
            <div id="filter-row" class="filter-row"></div>
            <div id="gallery-count" class="empty"></div>
        </section>

        <section id="gallery-grid" class="gallery-grid">
            <p class="empty">Loading gallery items...</p>
        </section>

        <div id="gallery-lightbox"
             onclick="closeGalleryLightbox()"
             style="
        display:none;
        position:fixed;
        inset:0;
        z-index:10000;
        background:rgba(0,0,0,.88);
        justify-content:center;
        align-items:center;
        padding:90px 24px 32px;
     ">
            <div class="lightbox-close"
                 onclick="closeGalleryLightbox()"
                 title="Close">
                ×
            </div>



            <div class="lightbox-shell" onclick="event.stopPropagation()">
                <img id="lightbox-image"
                     class="lightbox-image"
                     src=""
                     alt="">

                <div class="lightbox-details">
                    <h2 id="lightbox-title" style="margin:0 0 8px;"></h2>
                    <p id="lightbox-type" class="empty" style="margin:0 0 10px;"></p>

                    <button id="lightbox-like-button"
                            class="button"
                            onclick="event.stopPropagation(); toggleLightboxLike()"
                            style="margin:0 0 14px;">
                        ♡ 0
                    </button>

                    <p id="lightbox-description" style="margin:0;"></p>
                    <p id="lightbox-likes" class="empty"></p>
                </div>

                <button id="lightbox-like-button"
                        class="lightbox-like"
                        onclick="toggleLightboxLike()">
                    ♡ 0
                </button>

                <button id="lightbox-edit-button"
                        class="button"
                        onclick="event.stopPropagation(); openEditGalleryWorkModal()"
                        style="display:none; margin:0 0 14px;">
                    Edit Work
                </button>
            </div>
        </div>

        <div id="edit-gallery-modal"
             style="
        display:none;
        position:fixed;
        inset:0;
        z-index:10002;
        background:rgba(0,0,0,.78);
        justify-content:center;
        align-items:center;
        padding:24px;
     ">
            <div onclick="event.stopPropagation()"
                 style="
            width:560px;
            max-width:94vw;
            background:var(--panel-bg);
            border:1px solid var(--border-color);
            border-radius:20px;
            padding:24px;
        ">
                <h2>Edit Gallery Work</h2>

                <label>Title</label>
                <input id="edit-gallery-title">

                <label>Description</label>
                <textarea id="edit-gallery-description"></textarea>

                <label>Gallery Type</label>
                <select id="edit-gallery-type">
                    <option value="process">Process</option>
                    <option value="sketch">Sketch</option>
                    <option value="workspace">Workspace</option>
                    <option value="finished_piece">Finished Piece</option>
                    <option value="reference">Reference Material</option>
                    <option value="worldbuilding">Worldbuilding</option>
                    <option value="writing">Writing</option>
                    <option value="other">Other</option>
                </select>

                <label>Visibility</label>
                <select id="edit-gallery-visibility">
                    <option value="public">Public</option>
                    <option value="private">Private</option>
                </select>

                <button class="button" onclick="saveGalleryWorkEdits()">
                    Save Changes
                </button>

                <button class="button" onclick="closeEditGalleryWorkModal()">
                    Cancel
                </button>

                <p id="edit-gallery-message" class="empty"></p>
            </div>
        </div>

    </main>

    <script type="module">
        import { requireBetaAccess } from "./betaGate.js";
        import { supabase } from "./supabaseClient.js";
        import { setupNotificationBadge } from "./notificationBadge.js";
        import { setupMessageBadge } from "./messageBadge.js";

        const currentUser = await requireBetaAccess();

        setupNotificationBadge();
        setupMessageBadge();

        const params = new URLSearchParams(window.location.search);
        const usernameFromUrl = params.get("user");

        let profile = null;
        let allItems = [];
        let activeType = "all";
        let activeLightboxItemId = null;

        if (!usernameFromUrl) {
            window.location.href = "profile.html";
        }

        await loadCreatorGallery();

        async function loadCreatorGallery() {
            const { data: profileData, error: profileError } = await supabase
                .from("profiles")
                .select("id, username, display_name, bio, avatar_url")
                .eq("username", usernameFromUrl)
                .single();

            if (profileError || !profileData) {
                showError("Creator not found.");
                return;
            }

            profile = profileData;

            document.title =
                `${profile.display_name || profile.username} Gallery - Nullverse`;

            document.getElementById("gallery-title").textContent =
                `${profile.display_name || profile.username}'s Creator Gallery`;

            document.getElementById("gallery-subtitle").textContent =
                profile.bio || "A showcase of creative process, artwork, sketches, notes, and finished pieces.";

            document.getElementById("back-profile-link").href =
                `profile.html?user=${encodeURIComponent(profile.username)}`;
            document.addEventListener("keydown", event => {
                if (
                    event.key === "Escape" &&
                    activeLightboxItemId
                ) {
                    closeGalleryLightbox();
                }
            });

            const { data, error } = await supabase
                .from("creator_proof_gallery")
                .select(`
        *,
        creator_gallery_likes (
            user_id
        )
    `)
                .eq("owner_id", profile.id)
                .eq("visibility", "public")
                .order("created_at", { ascending: false });

            if (error) {
                showError(error.message);
                return;
            }

            allItems = data || [];

            renderFilters();
            renderGallery();
        }

        function renderFilters() {
            const container = document.getElementById("filter-row");

            const types = [...new Set(
                allItems
                    .map(item => item.proof_type || "other")
                    .filter(Boolean)
            )];

            container.innerHTML = `
                <button class="filter-chip active" data-type="all">
                    All
                </button>

                ${types.map(type => `
                    <button class="filter-chip" data-type="${escapeHtml(type)}">
                        ${escapeHtml(formatGalleryType(type))}
                    </button>
                `).join("")}
            `;

            container.querySelectorAll(".filter-chip").forEach(button => {
                button.addEventListener("click", () => {
                    activeType = button.dataset.type;

                    container.querySelectorAll(".filter-chip")
                        .forEach(chip => chip.classList.remove("active"));

                    button.classList.add("active");

                    renderGallery();
                });
            });
        }

        function renderGallery() {
            const grid = document.getElementById("gallery-grid");
            const count = document.getElementById("gallery-count");

            const filtered = activeType === "all"
                ? allItems
                : allItems.filter(item => item.proof_type === activeType);

            count.textContent =
                `${filtered.length} ${filtered.length === 1 ? "item" : "items"} shown`;

            if (!filtered.length) {
                grid.innerHTML = `<p class="empty">No gallery items found.</p>`;
                return;
            }

            grid.innerHTML = filtered.map(item => {
                const likes = item.creator_gallery_likes || [];
                const likedByMe = likes.some(like => like.user_id === currentUser.id);

                return `
            <article class="gallery-card" onclick="openGalleryLightbox('${item.id}')">
                <img
                    src="${escapeHtml(item.image_url)}"
                    alt="${escapeHtml(item.title || "Creator gallery item")}">

                <div class="gallery-overlay">
                    <span class="gallery-pill">
                        ${escapeHtml(item.title || "Untitled")}
                    </span>

                    <span class="gallery-pill">
                        ${escapeHtml(formatGalleryType(item.proof_type))}
                    </span>
                </div>

                <button
                    class="button gallery-like-button"
                    data-id="${item.id}"
                    onclick="event.stopPropagation(); toggleGalleryLike('${item.id}')">
                    ${likedByMe ? "♥" : "♡"} ${likes.length}
                </button>
            </article>
        `;
            }).join("");
        }

        window.openGalleryLightbox = function (itemId) {
            const item = allItems.find(entry => entry.id === itemId);

            if (!item) return;

            activeLightboxItemId = itemId;

            const likes = item.creator_gallery_likes || [];
            const likedByMe = likes.some(like => like.user_id === currentUser.id);

            document.getElementById("lightbox-image").src = item.image_url;
            document.getElementById("lightbox-image").alt =
                item.title || "Creator gallery item";

            document.getElementById("lightbox-title").textContent =
                item.title || "Untitled Gallery Item";

            document.getElementById("lightbox-type").textContent =
                formatGalleryType(item.proof_type);

            document.getElementById("lightbox-description").textContent =
                item.description || "No description provided.";

            document.getElementById("lightbox-likes").textContent =
                `${likes.length} ${likes.length === 1 ? "Like" : "Likes"}`;

            document.getElementById("lightbox-like-button").textContent =
                `${likedByMe ? "♥" : "♡"} ${likes.length}`;

            document.getElementById("gallery-lightbox").style.display = "flex";

            const editButton = document.getElementById("lightbox-edit-button");

            if (editButton) {
                editButton.style.display =
                    currentUser.id === item.owner_id ? "inline-block" : "none";
            }
        };

        window.openEditGalleryWorkModal = function () {
            const item = allItems.find(entry => entry.id === activeLightboxItemId);
            if (!item || currentUser.id !== item.owner_id) return;

            document.getElementById("edit-gallery-title").value = item.title || "";
            document.getElementById("edit-gallery-description").value = item.description || "";
            document.getElementById("edit-gallery-type").value = item.proof_type || "process";
            document.getElementById("edit-gallery-visibility").value = item.visibility || "public";

            document.getElementById("edit-gallery-modal").style.display = "flex";
        };

        window.closeEditGalleryWorkModal = function () {
            document.getElementById("edit-gallery-modal").style.display = "none";
        };

        window.saveGalleryWorkEdits = async function () {
            const message = document.getElementById("edit-gallery-message");

            const item = allItems.find(entry => entry.id === activeLightboxItemId);
            if (!item || currentUser.id !== item.owner_id) {
                message.textContent = "You can only edit your own gallery work.";
                return;
            }

            const { error } = await supabase
                .from("creator_proof_gallery")
                .update({
                    title: document.getElementById("edit-gallery-title").value.trim(),
                    description: document.getElementById("edit-gallery-description").value.trim(),
                    proof_type: document.getElementById("edit-gallery-type").value,
                    visibility: document.getElementById("edit-gallery-visibility").value,
                    updated_at: new Date().toISOString()
                })
                .eq("id", item.id)
                .eq("owner_id", currentUser.id);

            if (error) {
                message.textContent = error.message;
                return;
            }

            await loadCreatorGallery();
            closeEditGalleryWorkModal();
            openGalleryLightbox(item.id);
        };

        window.closeGalleryLightbox = function () {
            activeLightboxItemId = null;
            document.getElementById("gallery-lightbox").style.display = "none";
        };

        window.toggleLightboxLike = async function () {
            if (!activeLightboxItemId) return;

            await toggleGalleryLike(activeLightboxItemId);

            const item = allItems.find(entry => entry.id === activeLightboxItemId);
            if (item) {
                openGalleryLightbox(activeLightboxItemId);
            }
        };

        function showError(message) {
            document.getElementById("gallery-title").textContent =
                "Creator Gallery Unavailable";

            document.getElementById("gallery-subtitle").textContent =
                message;

            document.getElementById("gallery-grid").innerHTML =
                "";
        }

        function formatGalleryType(value) {
            return String(value || "other")
                .replaceAll("_", " ")
                .replace(/\b\w/g, letter => letter.toUpperCase());
        }

        function escapeHtml(value) {
            return String(value || "")
                .replaceAll("&", "&amp;")
                .replaceAll("<", "&lt;")
                .replaceAll(">", "&gt;")
                .replaceAll('"', "&quot;")
                .replaceAll("'", "&#039;");
        }

        window.logOut = async function () {
            await supabase.auth.signOut();
            window.location.href = "login.html";
        };

        async function toggleGalleryLike(galleryId) {

            const existing =
                allItems
                    .find(item => item.id === galleryId)
                    ?.creator_gallery_likes
                    ?.find(
                        like =>
                            like.user_id === currentUser.id
                    );

            if (existing) {

                await supabase
                    .from("creator_gallery_likes")
                    .delete()
                    .eq("gallery_item_id", galleryId)
                    .eq("user_id", currentUser.id);

            } else {

                await supabase
                    .from("creator_gallery_likes")
                    .insert({
                        gallery_item_id: galleryId,
                        user_id: currentUser.id
                    });
            }

            await loadCreatorGallery();
        }
    </script>
</body>
</html>
