<!<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Creator Gallery - Nullverse</title>
    <link rel="icon" type="image/png" href="favicon.png">

    <script>
        const savedNullverseTheme =
            localStorage.getItem("nullverse-theme") || "void";

        document.documentElement.setAttribute(
            "data-theme",
            savedNullverseTheme
        );
    </script>

    <link rel="stylesheet" href="theme.css?v=25">

    <style>
        body {
            margin: 0;
            min-height: 100vh;
            font-family: Arial, sans-serif;
            background: var(--page-bg);
            background-attachment: fixed;
            color: var(--text-primary);
        }

        header {
            padding: 12px 40px;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(12,12,14,0.72);
            position: sticky;
            top: 0;
            z-index: 100;
            backdrop-filter: blur(18px);
            box-shadow: 0 10px 35px rgba(0,0,0,0.28);
        }

        .logo, .logo a {
            display: flex;
            align-items: center;
        }

        .site-logo {
            height: 64px;
            width: auto;
            display: block;
        }

        nav {
            display: flex;
            gap: 22px;
            align-items: center;
            flex-wrap: wrap;
        }

        nav a, nav button {
            color: var(--text-secondary);
            text-decoration: none;
            background: none;
            border: none;
            cursor: pointer;
            font-family: Arial, sans-serif;
            font-size: .95rem;
        }

        nav a:hover, nav button:hover {
            color: white;
        }

        main {
            max-width: 1180px;
            margin: auto;
            padding: 44px 40px 90px;
        }

        .hero, .panel, .gallery-card {
            background: linear-gradient(135deg, rgba(255,255,255,.055), rgba(255,255,255,.015)), var(--panel-bg);
            border: 1px solid var(--border-color);
            border-radius: 22px;
            backdrop-filter: blur(18px);
            box-shadow: 0 18px 40px rgba(0,0,0,.24), 0 0 24px rgba(255,255,255,.03);
        }

        .hero {
            padding: 34px;
            margin-bottom: 24px;
        }

        .hero h1 {
            margin: 0 0 10px;
            font-size: 2.7rem;
        }

        .hero p {
            color: var(--text-secondary);
            line-height: 1.7;
            margin: 0;
        }

        .button {
            display: inline-block;
            margin-top: 16px;
            background: linear-gradient(180deg, #2a2a2f 0%, #16161a 45%, #0d0d10 100%);
            color: #f5f5f5;
            border: 1px solid rgba(255,255,255,.12);
            padding: 10px 14px;
            border-radius: 10px;
            text-decoration: none;
            cursor: pointer;
        }

        .filter-row {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            margin-bottom: 24px;
        }

        .filter-chip {
            background: rgba(255,255,255,.045);
            color: var(--text-secondary);
            border: 1px solid var(--border-color);
            border-radius: 999px;
            padding: 8px 12px;
            cursor: pointer;
        }

        .filter-chip.active {
            color: white;
            border-color: rgba(255,255,255,.28);
            background: rgba(255,255,255,.10);
        }

        .gallery-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
            gap: 22px;
        }

        .gallery-card {
            overflow: hidden;
        }

        .gallery-card img {
            width: 100%;
            height: 240px;
            object-fit: cover;
            display: block;
            border-bottom: 1px solid var(--border-color);
        }

        .gallery-body {
            padding: 18px;
        }

        .gallery-type {
            display: inline-block;
            margin-bottom: 10px;
            color: var(--text-secondary);
            border: 1px solid var(--border-color);
            border-radius: 999px;
            padding: 5px 9px;
            font-size: .78rem;
        }

        .gallery-body h3 {
            margin: 0 0 8px;
        }

        .gallery-body p {
            color: var(--text-secondary);
            line-height: 1.6;
            margin: 0;
        }

        .empty {
            color: var(--text-muted);
            line-height: 1.7;
        }

        @media (max-width: 800px) {
            header {
                flex-direction: column;
                gap: 14px;
                padding: 20px;
            }

            nav {
                justify-content: center;
            }

            main {
                padding: 32px 24px 80px;
            }

            .hero h1 {
                font-size: 2.1rem;
            }
        }
    </style>
</head>

<body>
    <div class="nullverse-stars"></div>

    <header>
        <div class="logo">
            <a href="index.html">
                <img src="Nullverse-3.png" alt="Nullverse" class="site-logo">
            </a>
        </div>

        <nav>
            <a href="index.html">Home</a>
            <a href="notifications.html">Notifications</a>
            <a href="explore.html">Explore</a>
            <a href="profile.html">Profile</a>
            <a href="dashboard.html">Dashboard</a>
            <a href="messages.html">Messages</a>
            <button onclick="logOut()">Log Out</button>
        </nav>
    </header>

    <main>
        <section class="hero">
            <h1 id="gallery-title">Creator Gallery</h1>
            <p id="gallery-subtitle">Loading creator gallery...</p>
            <a id="back-profile-link" class="button" href="profile.html">Back to Profile</a>
        </section>

        <section class="panel" style="padding:24px; margin-bottom:24px;">
            <div id="filter-row" class="filter-row"></div>
            <div id="gallery-count" class="empty"></div>
        </section>

        <section id="gallery-grid" class="gallery-grid">
            <p class="empty">Loading gallery items...</p>
        </section>
    </main>

    <script type="module">
        import { requireBetaAccess } from "./betaGate.js";
        import { supabase } from "./supabaseClient.js";
        import { setupNotificationBadge } from "./notificationBadge.js";
        import { setupMessageBadge } from "./messageBadge.js";

        const currentUser = await requireBetaAccess();

        setupNotificationBadge();
        setupMessageBadge();

        const params = new URLSearchParams(window.location.search);
        const usernameFromUrl = params.get("user");

        let profile = null;
        let allItems = [];
        let activeType = "all";

        if (!usernameFromUrl) {
            window.location.href = "profile.html";
        }

        await loadCreatorGallery();

        async function loadCreatorGallery() {
            const { data: profileData, error: profileError } = await supabase
                .from("profiles")
                .select("id, username, display_name, bio, avatar_url")
                .eq("username", usernameFromUrl)
                .single();

            if (profileError || !profileData) {
                showError("Creator not found.");
                return;
            }

            profile = profileData;

            document.title =
                `${profile.display_name || profile.username} Gallery - Nullverse`;

            document.getElementById("gallery-title").textContent =
                `${profile.display_name || profile.username}'s Creator Gallery`;

            document.getElementById("gallery-subtitle").textContent =
                profile.bio || "A showcase of creative process, artwork, sketches, notes, and finished pieces.";

            document.getElementById("back-profile-link").href =
                `profile.html?user=${encodeURIComponent(profile.username)}`;

            const { data, error } = await supabase
                .from("creator_proof_gallery")
                .select("*")
                .eq("owner_id", profile.id)
                .eq("visibility", "public")
                .order("created_at", { ascending: false });

            if (error) {
                showError(error.message);
                return;
            }

            allItems = data || [];

            renderFilters();
            renderGallery();
        }

        function renderFilters() {
            const container = document.getElementById("filter-row");

            const types = [...new Set(
                allItems
                    .map(item => item.proof_type || "other")
                    .filter(Boolean)
            )];

            container.innerHTML = `
                <button class="filter-chip active" data-type="all">
                    All
                </button>

                ${types.map(type => `
                    <button class="filter-chip" data-type="${escapeHtml(type)}">
                        ${escapeHtml(formatGalleryType(type))}
                    </button>
                `).join("")}
            `;

            container.querySelectorAll(".filter-chip").forEach(button => {
                button.addEventListener("click", () => {
                    activeType = button.dataset.type;

                    container.querySelectorAll(".filter-chip")
                        .forEach(chip => chip.classList.remove("active"));

                    button.classList.add("active");

                    renderGallery();
                });
            });
        }

        function renderGallery() {
            const grid = document.getElementById("gallery-grid");
            const count = document.getElementById("gallery-count");

            const filtered = activeType === "all"
                ? allItems
                : allItems.filter(item => item.proof_type === activeType);

            count.textContent =
                `${filtered.length} ${filtered.length === 1 ? "item" : "items"} shown`;

            if (!filtered.length) {
                grid.innerHTML =
                    `<p class="empty">No gallery items found.</p>`;
                return;
            }

            grid.innerHTML = filtered.map(item => `
                <article class="gallery-card">
                    <img
                        src="${escapeHtml(item.image_url)}"
                        alt="${escapeHtml(item.title || "Creator gallery item")}">

                    <div class="gallery-body">
                        <span class="gallery-type">
                            ${escapeHtml(formatGalleryType(item.proof_type))}
                        </span>

                        <h3>
                            ${escapeHtml(item.title || "Untitled Gallery Item")}
                        </h3>

                        <p>
                            ${escapeHtml(item.description || "")}
                        </p>
                    </div>
                </article>
            `).join("");
        }

        function showError(message) {
            document.getElementById("gallery-title").textContent =
                "Creator Gallery Unavailable";

            document.getElementById("gallery-subtitle").textContent =
                message;

            document.getElementById("gallery-grid").innerHTML =
                "";
        }

        function formatGalleryType(value) {
            return String(value || "other")
                .replaceAll("_", " ")
                .replace(/\b\w/g, letter => letter.toUpperCase());
        }

        function escapeHtml(value) {
            return String(value || "")
                .replaceAll("&", "&amp;")
                .replaceAll("<", "&lt;")
                .replaceAll(">", "&gt;")
                .replaceAll('"', "&quot;")
                .replaceAll("'", "&#039;");
        }

        window.logOut = async function () {
            await supabase.auth.signOut();
            window.location.href = "login.html";
        };
    </script>
</body>
</html>
