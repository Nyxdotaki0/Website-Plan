<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Nullverse Dashboard</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #0d0d12;
            color: #f2f2f2;
        }

        header {
            padding: 24px 40px;
            border-bottom: 1px solid #2a2a35;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #111118;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .logo a {
            color: #ffffff;
            text-decoration: none;
            font-size: 1.6rem;
            font-weight: bold;
            letter-spacing: 1px;
        }

        nav {
            display: flex;
            gap: 22px;
            align-items: center;
            flex-wrap: wrap;
        }

            nav a, nav button {
                color: #cfcfd8;
                text-decoration: none;
                font-size: 0.95rem;
                background: none;
                border: none;
                cursor: pointer;
                font-family: Arial, sans-serif;
                padding: 0;
            }

                nav a:hover, nav button:hover {
                    color: white;
                }

        main {
            max-width: 1100px;
            margin: auto;
            padding: 40px;
        }

        .panel {
            background: #15151f;
            border: 1px solid #2a2a35;
            border-radius: 12px;
            padding: 24px;
            margin-bottom: 22px;
        }

        .profile-panel {
            overflow: hidden;
            padding: 0;
        }

        .dashboard-banner {
            height: 190px;
            background: linear-gradient(135deg, #1b1b28, #2a2a44);
            background-size: cover;
            background-position: center;
            border-bottom: 1px solid #2a2a35;
        }

        .profile-row {
            display: flex;
            align-items: flex-end;
            gap: 22px;
            padding: 0 24px 24px;
            margin-top: -55px;
            flex-wrap: wrap;
        }

        .dashboard-avatar {
            width: 115px;
            height: 115px;
            border-radius: 50%;
            object-fit: cover;
            border: 5px solid #15151f;
            background: #2a2a35;
        }

        .profile-text h1 {
            margin: 0;
            font-size: 2rem;
        }

        .profile-text p {
            margin: 6px 0;
        }

        .profile-actions {
            margin-top: 14px;
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 18px;
        }

        .card {
            background: #1b1b28;
            border: 1px solid #2a2a35;
            border-radius: 12px;
            padding: 20px;
        }

        h1, h2, h3 {
            margin-top: 0;
        }

        p {
            color: #c8c8d4;
            line-height: 1.6;
        }

        .muted {
            color: #8f8fa3;
            font-size: 0.95rem;
        }

        .button {
            display: inline-block;
            margin-top: 10px;
            background: #2a2a44;
            color: white;
            border: none;
            padding: 10px 14px;
            border-radius: 8px;
            cursor: pointer;
            text-decoration: none;
            font-family: Arial, sans-serif;
            font-size: 0.95rem;
        }

            .button:hover {
                background: #3a3a5c;
            }

        .danger {
            color: #d9a0a0;
        }

        @media (max-width: 800px) {
            header {
                flex-direction: column;
                gap: 14px;
                padding: 20px;
            }

            nav {
                justify-content: center;
            }

            main {
                padding: 25px;
            }

            .profile-row {
                align-items: flex-start;
            }
        }
    </style>
</head>

<body>

    <header>
        <div class="logo">
            <a href="index.html">Nullverse</a>
        </div>

        <nav>
            <a href="index.html">Home</a>
            <a href="explore.html">Explore</a>
            <a href="profile.html">Profile</a>
            <a href="dashboard.html">Dashboard</a>
            <button onclick="logOut()">Log Out</button>
        </nav>
    </header>

    <main>

        <section class="panel profile-panel">
            <div id="dashboard-banner" class="dashboard-banner"></div>

            <div class="profile-row">
                <img id="dashboard-avatar"
                     class="dashboard-avatar"
                     src="https://placehold.co/200x200/1b1b28/ffffff?text=NV"
                     alt="Profile picture">

                <div class="profile-text">
                    <p class="muted">Creator Dashboard</p>

                    <h1 id="dashboard-display-name">Loading...</h1>

                    <p id="dashboard-username">@creator</p>

                    <p id="dashboard-bio" style="max-width: 650px;">
                        Loading profile...
                    </p>




                    <p id="dashboard-creator-type" class="muted"></p>

                    <p id="dashboard-email" class="muted"></p>

                    <div class="profile-actions">
                        <a id="view-public-profile" class="button" href="profile.html">View Public Profile</a>
                        <a class="button" href="account-settings.html">Edit Profile</a>
                        <a class="button" href="create-world.html">Create World</a>
                    </div>
                </div>
            </div>
        </section>

        <section class="panel">
            <h2>Your Worlds</h2>

            <p class="muted">
                Build, organize, and continuously expand your fictional universes.
            </p>

            <div style="margin-bottom:20px;">
                <a class="button" href="create-world.html">
                    Create New World
                </a>
            </div>

            <div id="your-worlds" class="grid">
                <p class="muted">Loading worlds...</p>
            </div>
        </section>

       

    </main>

    <script type="module">
        import { requireBetaAccess } from "./betaGate.js";
        import { supabase } from "./supabaseClient.js";

        const user = await requireBetaAccess();

        document.getElementById("dashboard-email").textContent =
            "Signed in as: " + user.email;

        const { data: profile, error: profileError } = await supabase
            .from("profiles")
            .select("*")
            .eq("id", user.id)
            .single();

        if (profileError || !profile) {
            window.location.href = "profile-setup.html";
        }

        document.getElementById("dashboard-display-name").textContent =
            profile.display_name || "New Creator";

        document.getElementById("dashboard-username").textContent =
            "@" + (profile.username || "creator");

        document.getElementById("view-public-profile").href =
            "profile.html?user=" + encodeURIComponent(profile.username);

        document.getElementById("dashboard-bio").textContent =
            profile.bio || "This creator has not added a bio yet.";

        document.getElementById("dashboard-creator-type").textContent =
            profile.creator_type || "";

        document.getElementById("dashboard-avatar").src =
            profile.avatar_url || "https://placehold.co/200x200/1b1b28/ffffff?text=NV";

        const banner = document.getElementById("dashboard-banner");


        banner.style.background =
            "linear-gradient(135deg, #1b1b28, #2a2a44)";

        if (profile.banner_url) {
            banner.style.backgroundImage = `url('${profile.banner_url}')`;
        }


        async function loadYourWorlds() {
            const container = document.getElementById("your-worlds");

            const { data: worlds, error } = await supabase
                .from("worlds")
                .select("*")
                .eq("owner_id", user.id)
                .order("updated_at", { ascending: false });

            if (error) {
                container.innerHTML =
                    `<p class="muted">${error.message}</p>`;

                return;
            }

            if (!worlds || worlds.length === 0) {
                container.innerHTML = `
            <p class="muted">
                You have not created any worlds yet.
            </p>
        `;

                return;
            }

            container.innerHTML = worlds.map(world => `
        <div class="card">
            <p class="muted">
                ${world.genres || "No genres"}
            </p>

            <h3>${world.title}</h3>

            <p>
                ${world.summary || "No summary provided."}
            </p>

            <p class="muted">
                ${world.featured ? "Featured on profile" : "Not featured"}
            </p>

            <div style="display:flex; gap:10px; flex-wrap:wrap; margin-top:14px;">

                <a class="button"
                   href="edit-world.html?id=${world.id}">
                    Continue Building
                </a>

                <button class="button"
                        onclick="deleteWorld('${world.id}')">
                    Delete
                </button>
            </div>
        </div>
    `).join("");
        }

        window.deleteWorld = async function (worldId) {
            const confirmed = confirm(
                "Delete this world? This cannot be undone."
            );

            if (!confirmed) return;

            const { error } = await supabase
                .from("worlds")
                .delete()
                .eq("id", worldId)
                .eq("owner_id", user.id);

            if (error) {
                alert(error.message);
                return;
            }

            loadYourWorlds();
        };

        loadYourWorlds();

        

        window.logOut = async function () {
            await supabase.auth.signOut();
            window.location.href = "login.html";
        };
    </script>

    


</body>
</html>
