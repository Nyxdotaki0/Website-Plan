<!DOCTYPE html>

<html lang="en" xmlns="http://www.w3.org/1999/xhtml">
<head>
    <meta charset="utf-8" />
    <title></title>
</head>
<body>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <script>
        const SUPABASE_URL = "https://baaygzddafopihtxyyjq.supabase.co";
        const SUPABASE_ANON_KEY = "sb_publishable_O0JPmpCSe7TDoUxotIe4aQ_4EBgEBV8";

        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        async function checkUser() {
            const { data: { user } } = await supabaseClient.auth.getUser();

            if (!user) {
                window.location.href = "login.html";
            } else {
                document.body.insertAdjacentHTML("beforeend", `<p>Logged in as: ${user.email}</p>`);
            }
        }

        checkUser();
    </script>
</body>
</html>
