<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Nullverse Dashboard</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #0d0d12;
            color: #f2f2f2;
        }

        header {
            padding: 24px 40px;
            border-bottom: 1px solid #2a2a35;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #111118;
        }

        .logo a {
            color: white;
            text-decoration: none;
            font-size: 1.6rem;
            font-weight: bold;
        }

        nav a {
            color: #cfcfd8;
            text-decoration: none;
            margin-left: 20px;
        }

        main {
            max-width: 1000px;
            margin: auto;
            padding: 40px;
        }

        .panel {
            background: #15151f;
            border: 1px solid #2a2a35;
            border-radius: 12px;
            padding: 24px;
            margin-bottom: 22px;
        }

        button {
            background: #2a2a44;
            color: white;
            border: none;
            padding: 10px 14px;
            border-radius: 8px;
            cursor: pointer;
        }

            button:hover {
                background: #3a3a5c;
            }

        p {
            color: #c8c8d4;
            line-height: 1.6;
        }
    </style>
</head>

<body>

    <header>
        <div class="logo">
            <a href="index.html">Nullverse</a>
        </div>

        <nav>
            <a href="index.html">Home</a>
            <a href="explore.html">Explore</a>
            <a href="world.html">Worlds</a>
            <a href="character.html">Characters</a>
            <a href="story.html">Stories</a>
            <a href="login.html">Log In</a>
        </nav>
    </header>

    <main>
        <section class="panel">
            <h1>Creator Dashboard</h1>
            <p id="user-email">Checking login...</p>
            <button onclick="logOut()">Log Out</button>
        </section>

        <section class="panel">
            <h2>Your Worlds</h2>
            <p>You have not created any worlds yet.</p>
            <button onclick="alert('World creation will be added later.')">Create New World</button>
        </section>

        <section class="panel">
            <h2>Your Characters</h2>
            <p>You have not created any characters yet.</p>
            <button onclick="alert('Character creation will be added later.')">Create New Character</button>
        </section>

        <section class="panel">
            <h2>Your Stories</h2>
            <p>You have not published any stories yet.</p>
            <button onclick="alert('Story creation will be added later.')">Create New Story</button>
        </section>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <script>
        const SUPABASE_URL = "https://baaygzddafopihtxyyjq.supabase.co";
        const SUPABASE_ANON_KEY = "sb_publishable_O0JPmpCSe7TDoUxotIe4aQ_4EBgEBV8";

        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        async function checkUser() {
            const { data: { user }, error } = await supabaseClient.auth.getUser();

            if (error || !user) {
                window.location.href = "login.html";
                return;
            }

            document.getElementById("user-email").textContent = "Logged in as: " + user.email;
        }

        async function logOut() {
            await supabaseClient.auth.signOut();
            window.location.href = "login.html";
        }

        checkUser();
    </script>

</body>
</html>
