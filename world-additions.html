<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" href="favicon.png">
    <title>World Community - Nullverse</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #0d0d12;
            color: #f2f2f2;
        }

        header {
            padding: 24px 40px;
            border-bottom: 1px solid #2a2a35;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #111118;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .logo a, nav a, nav button {
            color: #cfcfd8;
            text-decoration: none;
            background: none;
            border: none;
            cursor: pointer;
            font-family: Arial, sans-serif;
        }

        .logo {
            display: flex;
            align-items: center;
        }

            .logo a {
                display: flex;
                align-items: center;
            }

        .site-logo {
            height: 64px;
            width: auto;
            display: block;
            max-width: none;
        }

        nav {
            display: flex;
            gap: 22px;
            flex-wrap: wrap;
        }

        main {
            max-width: 1350px;
            margin: auto;
            padding: 42px 40px 80px;
        }

        .layout {
            display: grid;
            grid-template-columns: 280px 1fr;
            gap: 28px;
            align-items: start;
        }

        .sidebar {
            position: sticky;
            top: 110px;
        }

        .panel, .hero, .addition-card {
            background: #15151f;
            border: 1px solid #2a2a35;
            border-radius: 16px;
            padding: 24px;
            margin-bottom: 22px;
        }

        .hero {
            background: linear-gradient(135deg, #15151f, #1b1b2b);
        }

        h1 {
            margin: 0 0 10px;
            font-size: 2.6rem;
        }

        h2, h3 {
            margin-top: 0;
        }

        p {
            color: #c8c8d4;
            line-height: 1.6;
        }

        input, select {
            width: 100%;
            box-sizing: border-box;
            padding: 12px;
            border-radius: 10px;
            border: 1px solid #333344;
            background: #0d0d12;
            color: white;
            font-family: Arial, sans-serif;
            margin-bottom: 14px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: #d8d8e5;
        }

        .button {
            display: inline-block;
            background: #2a2a44;
            color: white;
            border: none;
            padding: 10px 14px;
            border-radius: 8px;
            cursor: pointer;
            text-decoration: none;
            font-family: Arial, sans-serif;
            font-size: 0.95rem;
        }

            .button:hover {
                background: #3a3a5c;
            }

            .button.full {
                width: 100%;
                box-sizing: border-box;
                text-align: center;
                margin-bottom: 10px;
            }

        .secondary {
            background: #1d1d2a;
        }

        .danger {
            background: #552d36;
        }

            .danger:hover {
                background: #6a3743;
            }

        .empty {
            color: #8f8fa3;
        }

        .badge {
            display: inline-block;
            border: 1px solid #333344;
            border-radius: 999px;
            padding: 5px 9px;
            font-size: 0.8rem;
            color: #bdbdca;
            margin-bottom: 12px;
        }

        .addition-card {
            transition: 0.18s ease;
        }

            .addition-card:hover {
                transform: translateY(-2px);
                border-color: #404060;
            }

        .addition-image {
            width: 100%;
            max-height: 300px;
            object-fit: cover;
            border-radius: 14px;
            border: 1px solid #333344;
            margin: 14px 0 18px;
        }

        .author {
            color: #9f9fb1;
            margin-bottom: 12px;
            font-size: 0.95rem;
        }

        .card-actions {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            margin-top: 18px;
        }

        .feed-header {
            display: flex;
            justify-content: space-between;
            gap: 16px;
            align-items: center;
            flex-wrap: wrap;
            margin-bottom: 18px;
        }

        .count-pill {
            color: #bdbdca;
            border: 1px solid #333344;
            border-radius: 999px;
            padding: 6px 10px;
            font-size: 0.85rem;
        }

        @media (max-width: 900px) {
            header {
                flex-direction: column;
                gap: 14px;
                padding: 20px;
            }

            nav {
                justify-content: center;
            }

            main {
                padding: 28px 24px 70px;
            }

            .layout {
                grid-template-columns: 1fr;
            }

            .sidebar {
                position: static;
            }

            h1 {
                font-size: 2.1rem;
            }
        }
        .notification-link {
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }

        .notification-badge {
            min-width: 18px;
            height: 18px;
            padding: 0 6px;
            border-radius: 999px;
            background: #56568a;
            color: white;
            font-size: 0.72rem;
            align-items: center;
            justify-content: center;
            line-height: 1;
        }
    </style>
</head>

<body>

    <header>
        <div class="logo">
            <a href="index.html">
                <img src="Nullverse-3.png"
                     alt="Nullverse"
                     class="site-logo">
            </a>
        </div>

        <nav>
            <a href="index.html">Home</a>
            <a href="notifications.html">Notifications</a>
            <a href="explore.html">Explore</a>
            <a href="profile.html">Profile</a>
            <a href="dashboard.html">Dashboard</a>
            <button onclick="logOut()">Log Out</button>
        </nav>
    </header>

    <main>

        <section class="hero">
            <h1 id="page-title">Community Additions</h1>
            <p id="page-subtitle">Loading world...</p>
        </section>

        <div class="layout">

            <aside class="sidebar">

                <section class="panel">
                    <a id="back-to-world" class="button full secondary">
                        ← Back to World
                    </a>

                    <a id="create-addition-link" class="button full">
                        + Add to This World
                    </a>

                    <p id="addition-mode-message" class="empty"></p>
                </section>

                <section class="panel">
                    <h3>Search</h3>

                    <input id="addition-search"
                           placeholder="Search additions...">

                    <label>Sort</label>
                    <select id="addition-sort">
                        <option value="newest">Newest</option>
                        <option value="oldest">Oldest</option>
                        <option value="popular">Popular</option>
                    </select>

                    <label>Type</label>
                    <select id="addition-type-filter">
                        <option value="all">All Types</option>
                        <option value="Story">Story</option>
                        <option value="Character">Character</option>
                        <option value="Location">Location</option>
                        <option value="Language">Language</option>
                        <option value="Lore">Lore</option>
                        <option value="Timeline">Timeline</option>
                        <option value="Map">Map</option>
                        <option value="Custom">Custom</option>
                    </select>
                </section>

            </aside>

            <section>

                <div class="feed-header">
                    <div>
                        <h2 style="margin:0;">Browse Additions</h2>
                        <p class="empty" style="margin-top:6px;">
                            Side stories, OCs, lore, maps, and ideas connected to this world.
                        </p>
                    </div>

                    <span id="addition-count" class="count-pill">
                        0 additions
                    </span>
                </div>

                <div id="additions-container">
                    <p class="empty">Loading additions...</p>
                </div>

            </section>

        </div>

    </main>

    <script type="module">
        import { requireBetaAccess } from "./betaGate.js";
        import { supabase } from "./supabaseClient.js";
        import { setupNotificationBadge } from "./notificationBadge.js";

        const currentUser = await requireBetaAccess();
        setupNotificationBadge();

        const params = new URLSearchParams(window.location.search);
        const worldId = params.get("id");

        let currentWorld = null;
        let allAdditions = [];
        let profileCache = [];

        if (!worldId) {
            alert("No world ID provided.");
            window.location.href = "explore.html";
        }

        await loadWorld();
        await loadAdditions();

        async function loadWorld() {
            const { data, error } = await supabase
                .from("worlds")
                .select("*")
                .eq("id", worldId)
                .single();

            if (error || !data) {
                alert("World not found.");
                window.location.href = "explore.html";
                return;
            }

            currentWorld = data;

            document.getElementById("page-title").textContent =
                `${data.title} Community`;

            document.getElementById("page-subtitle").textContent =
                `Explore community-made stories, characters, lore, and additions connected to ${data.title}.`;

            document.getElementById("back-to-world").href =
                `world.html?id=${encodeURIComponent(worldId)}`;

            configureCommunityAccess();
        }

        function configureCommunityAccess() {
            const createLink =
                document.getElementById("create-addition-link");

            const message =
                document.getElementById("addition-mode-message");

            if (!currentWorld) return;

            if (currentUser.id === currentWorld.owner_id) {
                createLink.style.display = "none";
                message.textContent =
                    "You own this world. Community additions from other creators appear here.";
                return;
            }

            if (currentWorld.addition_mode === "locked") {
                createLink.style.display = "none";
                message.textContent =
                    "This world is locked. The creator is not accepting additions.";
                return;
            }

            if (currentWorld.addition_mode === "approval") {
                createLink.href =
                    `create-addition.html?id=${encodeURIComponent(worldId)}`;

                message.textContent =
                    "This world requires creator approval before additions appear publicly.";
                return;
            }

            createLink.href =
                `create-addition.html?id=${encodeURIComponent(worldId)}`;

            message.textContent =
                "This world allows open additions. Approved additions appear in this community feed.";
        }

        async function loadAdditions() {
            const container =
                document.getElementById("additions-container");

            const { data: additions, error } = await supabase
                .from("world_additions")
                .select("*")
                .eq("world_id", worldId)
                .eq("status", "approved")
                .order("created_at", { ascending: false });

            if (error) {
                container.innerHTML =
                    `<p class="empty">${escapeHtml(error.message)}</p>`;
                return;
            }

            allAdditions = additions || [];

            const authorIds = [
                ...new Set(allAdditions.map(addition => addition.author_id))
            ];

            if (authorIds.length > 0) {
                const { data: profiles } = await supabase
                    .from("profiles")
                    .select("id, username, display_name")
                    .in("id", authorIds);

                profileCache = profiles || [];
            } else {
                profileCache = [];
            }

            filterAndRenderAdditions();
        }

        function filterAndRenderAdditions() {
            const search =
                document.getElementById("addition-search")
                    .value
                    .trim()
                    .toLowerCase();

            const sort =
                document.getElementById("addition-sort")
                    .value;

            const type =
                document.getElementById("addition-type-filter")
                    .value;

            let filtered =
                [...allAdditions];

            if (search) {
                filtered = filtered.filter(addition =>
                    addition.title?.toLowerCase().includes(search) ||
                    addition.content?.toLowerCase().includes(search) ||
                    addition.addition_type?.toLowerCase().includes(search)
                );
            }

            if (type !== "all") {
                filtered = filtered.filter(addition =>
                    addition.addition_type === type
                );
            }

            if (sort === "newest") {
                filtered.sort((a, b) =>
                    new Date(b.created_at) - new Date(a.created_at)
                );
            }

            if (sort === "oldest") {
                filtered.sort((a, b) =>
                    new Date(a.created_at) - new Date(b.created_at)
                );
            }

            if (sort === "popular") {
                filtered.sort((a, b) =>
                    (b.like_count || 0) - (a.like_count || 0)
                );
            }

            renderAdditions(filtered);
        }

        function renderAdditions(additions) {
            const container =
                document.getElementById("additions-container");

            document.getElementById("addition-count").textContent =
                `${additions.length} ${additions.length === 1 ? "addition" : "additions"}`;

            if (!additions.length) {
                container.innerHTML =
                    `<p class="empty">No additions found.</p>`;
                return;
            }

            container.innerHTML = additions.map(addition => {
                const profile =
                    profileCache.find(profile =>
                        profile.id === addition.author_id
                    );

                const username =
                    profile?.username || "unknown";

                const displayName =
                    profile?.display_name || username;

                const canModerate =
                    currentUser.id === addition.author_id ||
                    currentUser.id === currentWorld.owner_id;

                return `
                    <article class="addition-card">
                        <span class="badge">
                            ${escapeHtml(addition.addition_type || "Addition")}
                        </span>

                        <h2>
                            ${escapeHtml(addition.title || "Untitled Addition")}
                        </h2>

                        <div class="author">
                            Added by
                            <strong>${escapeHtml(displayName)}</strong>
                            (@${escapeHtml(username)})
                        </div>

                        ${addition.image_url ? `
                            <img
                                class="addition-image"
                                src="${escapeHtml(addition.image_url)}"
                                alt="${escapeHtml(addition.title || "Addition image")}"
                            >
                        ` : ""}

                        <p style="white-space:pre-wrap;">
                            ${escapeHtml(addition.content || "")}
                        </p>

                        <div class="card-actions">
                            <a
                                class="button"
                                href="addition.html?id=${encodeURIComponent(addition.id)}">
                                Open Addition
                            </a>

                            ${currentUser.id === addition.author_id ? `
                                <a
                                    class="button secondary"
                                    href="edit-addition.html?id=${encodeURIComponent(addition.id)}">
                                    Edit Addition
                                </a>
                            ` : ""}

                            ${canModerate ? `
                                <button
                                    class="button danger"
                                    onclick="deleteAddition('${addition.id}')">
                                    Delete
                                </button>
                            ` : ""}
                        </div>
                    </article>
                `;
            }).join("");
        }

        window.deleteAddition = async function (additionId) {
            const confirmed =
                confirm("Delete this addition?");

            if (!confirmed) return;

            const { error } = await supabase
                .from("world_additions")
                .delete()
                .eq("id", additionId);

            if (error) {
                alert(error.message);
                return;
            }

            await loadAdditions();
        };

        document
            .getElementById("addition-search")
            .addEventListener("input", filterAndRenderAdditions);

        document
            .getElementById("addition-sort")
            .addEventListener("change", filterAndRenderAdditions);

        document
            .getElementById("addition-type-filter")
            .addEventListener("change", filterAndRenderAdditions);

        function escapeHtml(value) {
            return String(value || "")
                .replaceAll("&", "&amp;")
                .replaceAll("<", "&lt;")
                .replaceAll(">", "&gt;")
                .replaceAll('"', "&quot;")
                .replaceAll("'", "&#039;");
        }

        window.logOut = async function () {
            await supabase.auth.signOut();
            window.location.href = "login.html";
        };
    </script>

</body>
</html>
