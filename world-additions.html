<<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>World Additions - Nullverse</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #0d0d12;
            color: #f2f2f2;
        }

        header {
            padding: 24px 40px;
            border-bottom: 1px solid #2a2a35;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #111118;
        }

        .logo a, nav a, nav button {
            color: #cfcfd8;
            text-decoration: none;
            background: none;
            border: none;
            cursor: pointer;
            font-family: Arial, sans-serif;
        }

        .logo a {
            color: white;
            font-size: 1.6rem;
            font-weight: bold;
        }

        nav {
            display: flex;
            gap: 22px;
            flex-wrap: wrap;
        }

        main {
            max-width: 950px;
            margin: auto;
            padding: 45px 40px 80px;
        }

        .hero, .panel, .addition-card {
            background: #15151f;
            border: 1px solid #2a2a35;
            border-radius: 16px;
            padding: 28px;
            margin-bottom: 24px;
        }

        h1 {
            margin: 0 0 10px;
            font-size: 2.5rem;
        }

        p {
            color: #c8c8d4;
            line-height: 1.6;
        }

        input, textarea, select {
            width: 100%;
            box-sizing: border-box;
            padding: 14px;
            border-radius: 10px;
            border: 1px solid #333344;
            background: #0d0d12;
            color: white;
            font-family: Arial, sans-serif;
            margin-bottom: 14px;
        }

        textarea {
            resize: vertical;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: #d8d8e5;
        }

        .button {
            display: inline-block;
            background: #2a2a44;
            color: white;
            border: none;
            padding: 10px 14px;
            border-radius: 8px;
            cursor: pointer;
            text-decoration: none;
            font-family: Arial, sans-serif;
        }

        .button:hover {
            background: #3a3a5c;
        }

        .empty {
            color: #8f8fa3;
        }

        .badge {
            display: inline-block;
            border: 1px solid #333344;
            border-radius: 999px;
            padding: 5px 9px;
            font-size: 0.8rem;
            color: #bdbdca;
            margin-bottom: 12px;
        }

        .addition-image {
            width: 100%;
            max-height: 360px;
            object-fit: cover;
            border-radius: 14px;
            border: 1px solid #333344;
            margin-bottom: 18px;
        }

        .author {
            color: #9f9fb1;
            margin-bottom: 14px;
        }

        .community-topbar {
            display: flex;
            justify-content: space-between;
            gap: 20px;
            align-items: center;
            flex-wrap: wrap;
            margin-bottom: 22px;
        }

        .community-controls {
            display: flex;
            gap: 14px;
            margin-bottom: 28px;
            flex-wrap: wrap;
        }

            .community-controls input {
                flex: 1;
                min-width: 220px;
            }

            .community-controls select {
                width: 180px;
            }

        .addition-card {
            transition: 0.2s ease;
        }

            .addition-card:hover {
                transform: translateY(-3px);
                border-color: #404060;
            }
    </style>
</head>

<body>

<header>
    <div class="logo">
        <a href="index.html">Nullverse</a>
    </div>

    <nav>
        <a href="index.html">Home</a>
        <a href="explore.html">Explore</a>
        <a href="dashboard.html">Dashboard</a>
        <button onclick="logOut()">Log Out</button>
    </nav>
</header>

<main>

    <a id="back-to-world" class="button">← Back to World</a>

    <section class="hero" style="margin-top:24px;">
        <h1 id="page-title">World Additions</h1>
        <p id="page-subtitle">Loading world...</p>
    </section>

    <section id="addition-form-section" class="panel">
        <h2>Add to This World</h2>
        <p id="addition-mode-message" class="empty"></p>

        <label>Addition Type</label>
        <select id="addition-type">
            <option>Story</option>
            <option>Character</option>
            <option>Location</option>
            <option>Language</option>
            <option>Lore</option>
            <option>Timeline</option>
            <option>Map</option>
            <option>Custom</option>
        </select>

        <label>Title</label>
        <input id="addition-title" placeholder="Example: My OC enters the city of Veyra">

        <label>Content</label>
        <textarea id="addition-content" rows="10" placeholder="Write your addition..."></textarea>

        <label>Optional Image</label>
        <input id="addition-image" type="file" accept="image/*">

        <button class="button" onclick="submitAddition()">
            Submit Addition
        </button>
    </section>

    <section>
        <h2>Community Additions</h2>
        <section>

            <div class="community-topbar">

                <div>
                    <h2 style="margin:0;">
                        Community Additions
                    </h2>

                    <p class="empty" style="margin-top:8px;">
                        Explore stories, characters, lore, and creations made by the community.
                    </p>
                </div>

                <button class="button"
                        id="scroll-to-addition-form">
                    + Add to This World
                </button>

            </div>

            <div class="community-controls">

                <input id="addition-search"
                       placeholder="Search additions...">

                <select id="addition-sort">
                    <option value="newest">Newest</option>
                    <option value="oldest">Oldest</option>
                    <option value="popular">Popular</option>
                </select>

            </div>
            <div id="additions-container">
                <p class="empty">Loading additions...</p>
            </div>
        </section>

</main>

<script type="module">
    import { requireBetaAccess } from "./betaGate.js";
    import { supabase } from "./supabaseClient.js";

    const currentUser = await requireBetaAccess();

    const params = new URLSearchParams(window.location.search);
    const worldId = params.get("id");

    let currentWorld = null;
    let allAdditions = [];

    if (!worldId) {
        alert("No world ID provided.");
        window.location.href = "explore.html";
    }

    await loadWorld();
    await loadAdditions();

    async function loadWorld() {
        const { data, error } = await supabase
            .from("worlds")
            .select("*")
            .eq("id", worldId)
            .single();

        if (error || !data) {
            alert("World not found.");
            window.location.href = "explore.html";
            return;
        }

        currentWorld = data;

        document.getElementById("page-title").textContent =
            `${data.title} Additions`;

        document.getElementById("page-subtitle").textContent =
            `Browse community-made stories, characters, lore, and ideas connected to ${data.title}.`;

        document.getElementById("back-to-world").href =
            `world.html?id=${encodeURIComponent(worldId)}`;

        configureAdditionForm();
    }

    function configureAdditionForm() {
        const form = document.getElementById("addition-form-section");
        const message = document.getElementById("addition-mode-message");

        if (currentUser.id === currentWorld.owner_id) {
            form.style.display = "none";
            return;
        }

        if (currentWorld.addition_mode === "locked") {
            form.innerHTML = `
                <h2>Additions Locked</h2>
                <p class="empty">
                    The creator has locked this world from community additions.
                </p>
            `;
            return;
        }

        if (currentWorld.addition_mode === "approval") {
            message.textContent =
                "This world requires creator approval. Your addition will be submitted as pending.";
        }

        if (currentWorld.addition_mode === "open") {
            message.textContent =
                "This world allows open contributions. Your addition will appear publicly after submission.";
        }
    }

    async function loadAdditions() {
        const container = document.getElementById("additions-container");

        const { data: additions, error } = await supabase
            .from("world_additions")
            .select("*")
            .eq("world_id", worldId)
            .eq("status", "approved")
            .order("created_at", { ascending: false });

        if (error) {
            container.innerHTML = `<p class="empty">${escapeHtml(error.message)}</p>`;
            return;
        }

        allAdditions = additions || [];

        if (!additions || additions.length === 0) {
            container.innerHTML = `<p class="empty">No approved additions yet.</p>`;
            return;
        }

        const authorIds = [
            ...new Set(additions.map(addition => addition.author_id))
        ];

        const { data: profiles } = await supabase
            .from("profiles")
            .select("id, username, display_name")
            .in("id", authorIds);

        renderAdditions(additions, profiles); `
    <div style="margin-top:18px; display:flex; gap:10px; flex-wrap:wrap;">

        ${currentUser.id === addition.author_id ? `
            <button
                class="button"
                onclick="editAddition(
                    '${addition.id}',
                    \`${escapeHtml(addition.title || "")}\`,
                    \`${escapeHtml(addition.content || "")}\`
                )">
                Edit
            </button>
        ` : ""}

        <button
            class="button"
            onclick="deleteAddition('${addition.id}')">
            Delete
        </button>

    </div>
` : ""}

                </article>
            `;
        }).join("");
    }

    function renderAdditions(additions, profiles) {

        const container =
            document.getElementById("additions-container");

        if (!additions || additions.length === 0) {
            container.innerHTML = `
            <p class="empty">
                No additions found.
            </p>
        `;
            return;
        }

        container.innerHTML = additions.map(addition => {

            const profile =
                profiles?.find(profile =>
                    profile.id === addition.author_id
                );

            const username =
                profile?.username || "unknown";

            const displayName =
                profile?.display_name || username;

            return `
            <article class="addition-card">

                <span class="badge">
                    ${escapeHtml(addition.addition_type || "Addition")}
                </span>

                <h2>
                    ${escapeHtml(addition.title || "Untitled Addition")}
                </h2>

                <div class="author">
                    Added by
                    <strong>${escapeHtml(displayName)}</strong>
                    (@${escapeHtml(username)})
                </div>

                ${addition.image_url ? `
                    <img
                        class="addition-image"
                        src="${escapeHtml(addition.image_url)}"
                        alt="${escapeHtml(addition.title || "Addition image")}"
                    >
                ` : ""}

                <p style="white-space:pre-wrap;">
                    ${escapeHtml(addition.content || "")}
                </p>

                <div style="
                    margin-top:18px;
                    display:flex;
                    gap:10px;
                    flex-wrap:wrap;
                ">

                    <a
                        class="button"
                        href="addition.html?id=${addition.id}">
                        Open Addition
                    </a>

                    ${(
                    currentUser.id === addition.author_id ||
                    currentUser.id === currentWorld.owner_id
                ) ? `
                        ${currentUser.id === addition.author_id ? `
                            <button
                                class="button"
                                onclick="editAddition(
                                    '${addition.id}',
                                    \`${escapeHtml(addition.title || "")}\`,
                                    \`${escapeHtml(addition.content || "")}\`
                                )">
                                Edit
                            </button>
                        ` : ""}

                        <button
                            class="button"
                            onclick="deleteAddition('${addition.id}')">
                            Delete
                        </button>
                    ` : ""}

                </div>

            </article>
        `;
        }).join("");
    }

    window.submitAddition = async function () {
        if (!currentWorld) return;

        if (currentUser.id === currentWorld.owner_id) return;

        if (currentWorld.addition_mode === "locked") return;

        const type = document.getElementById("addition-type").value;
        const title = document.getElementById("addition-title").value.trim();
        const content = document.getElementById("addition-content").value.trim();
        const imageFile = document.getElementById("addition-image").files[0];

        if (!title) {
            alert("Title is required.");
            return;
        }

        let imageUrl = null;

        if (imageFile) {
            const filePath =
                `${currentUser.id}/${Date.now()}-${imageFile.name}`;

            const { error: uploadError } = await supabase.storage
                .from("world-images")
                .upload(filePath, imageFile);

            if (uploadError) {
                alert(uploadError.message);
                return;
            }

            const { data } = supabase.storage
                .from("world-images")
                .getPublicUrl(filePath);

            imageUrl = data.publicUrl;
        }

        const status =
            currentWorld.addition_mode === "open"
                ? "approved"
                : "pending";

        const { error } = await supabase
            .from("world_additions")
            .insert({
                world_id: worldId,
                author_id: currentUser.id,
                addition_type: type,
                title,
                content,
                image_url: imageUrl,
                status
            });

        if (error) {
            alert(error.message);
            return;
        }

        document.getElementById("addition-title").value = "";
        document.getElementById("addition-content").value = "";
        document.getElementById("addition-image").value = "";

        if (status === "approved") {
            await loadAdditions();
            alert("Addition posted.");
        } else {
            alert("Addition submitted for creator approval.");
        }
    };

    window.deleteAddition = async function (additionId) {

        const confirmed =
            confirm("Delete this addition?");

        if (!confirmed) return;

        const { error } = await supabase
            .from("world_additions")
            .delete()
            .eq("id", additionId);

        if (error) {
            alert(error.message);
            return;
        }

        await loadAdditions();
    };

    window.editAddition = async function (additionId, oldTitle, oldContent) {

        const title =
            prompt("Edit title:", oldTitle);

        if (!title) return;

        const content =
            prompt("Edit content:", oldContent);

        if (!content) return;

        const { error } = await supabase
            .from("world_additions")
            .update({
                title,
                content
            })
            .eq("id", additionId);

        if (error) {
            alert(error.message);
            return;
        }

        await loadAdditions();
    };

    document
        .getElementById("addition-search")
        .addEventListener("input", filterAndSortAdditions);

    document
        .getElementById("addition-sort")
        .addEventListener("change", filterAndSortAdditions);

    document
        .getElementById("scroll-to-addition-form")
        .addEventListener("click", () => {

            const form =
                document.getElementById("addition-form-section");

            if (!form) return;

            form.scrollIntoView({
                behavior: "smooth"
            });
        });

    async function filterAndSortAdditions() {

        const search =
            document
                .getElementById("addition-search")
                .value
                .trim()
                .toLowerCase();

        const sort =
            document
                .getElementById("addition-sort")
                .value;

        let filtered =
            [...allAdditions];

        if (search) {

            filtered = filtered.filter(addition => {

                return (
                    addition.title?.toLowerCase().includes(search) ||
                    addition.content?.toLowerCase().includes(search) ||
                    addition.addition_type?.toLowerCase().includes(search)
                );
            });
        }

        if (sort === "newest") {

            filtered.sort((a, b) =>
                new Date(b.created_at) -
                new Date(a.created_at)
            );
        }

        if (sort === "oldest") {

            filtered.sort((a, b) =>
                new Date(a.created_at) -
                new Date(b.created_at)
            );
        }

        if (sort === "popular") {

            filtered.sort((a, b) =>
                (b.like_count || 0) -
                (a.like_count || 0)
            );
        }

        const authorIds = [
            ...new Set(filtered.map(addition => addition.author_id))
        ];

        const { data: profiles } = await supabase
            .from("profiles")
            .select("id, username, display_name")
            .in("id", authorIds);

        renderAdditions(filtered, profiles);
    }

    function escapeHtml(value) {
        return String(value || "")
            .replaceAll("&", "&amp;")
            .replaceAll("<", "&lt;")
            .replaceAll(">", "&gt;")
            .replaceAll('"', "&quot;")
            .replaceAll("'", "&#039;");
    }

    window.logOut = async function () {
        await supabase.auth.signOut();
        window.location.href = "login.html";
    };
</script>

</body>
</html>
