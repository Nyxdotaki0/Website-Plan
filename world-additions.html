<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" href="favicon.png">
    <title>World Community - Nullverse</title>

    <script>
        const savedNullverseTheme =
            localStorage.getItem("nullverse-theme") || "void";

        document.documentElement.setAttribute(
            "data-theme",
            savedNullverseTheme
        );
    </script>

    <link rel="stylesheet" href="theme.css?v=22">

    <style>
        html {
            min-height: 100%;
            background: #000000;
        }

        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: var(--page-bg);
            background-attachment: fixed;
            color: var(--text-primary);
            min-height: 100vh;
        }

        header {
            padding: 12px 40px;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(12,12,14,0.72);
            position: sticky;
            top: 0;
            z-index: 100;
            backdrop-filter: blur(18px);
            -webkit-backdrop-filter: blur(18px);
            box-shadow: 0 10px 35px rgba(0,0,0,0.28);
        }

        .logo,
        .logo a {
            display: flex;
            align-items: center;
        }

        .site-logo {
            height: 64px;
            width: auto;
            display: block;
            max-width: none;
        }

        nav {
            display: flex;
            gap: 22px;
            flex-wrap: wrap;
        }

            nav a,
            nav button {
                color: var(--text-secondary);
                text-decoration: none;
                background: none;
                border: none;
                cursor: pointer;
                font-family: Arial, sans-serif;
                transition: 0.18s ease;
            }

                nav a:hover,
                nav button:hover {
                    color: white;
                }

        main {
            max-width: 1350px;
            margin: auto;
            padding: 42px 40px 80px;
        }

        .layout {
            display: grid;
            grid-template-columns: 280px 1fr;
            gap: 28px;
            align-items: start;
        }

        .sidebar {
            position: sticky;
            top: 110px;
        }

        .panel,
        .hero,
        .addition-card {
            background: linear-gradient( 135deg, rgba(255,255,255,0.05), rgba(255,255,255,0.015) ), var(--panel-bg);
            border: 1px solid var(--border-color);
            border-radius: 20px;
            padding: 24px;
            margin-bottom: 22px;
            backdrop-filter: blur(18px);
            -webkit-backdrop-filter: blur(18px);
            box-shadow: 0 18px 38px rgba(0,0,0,0.22), 0 0 24px rgba(255,255,255,0.03);
        }

        .hero {
            padding: 34px;
        }

        h1 {
            margin: 0 0 10px;
            font-size: 2.7rem;
            line-height: 1.05;
        }

        h2,
        h3 {
            margin-top: 0;
        }

        p {
            color: var(--text-secondary);
            line-height: 1.7;
        }

        input,
        select {
            width: 100%;
            box-sizing: border-box;
            padding: 12px;
            border-radius: 12px;
            border: 1px solid var(--border-color);
            background: rgba(0,0,0,0.22);
            color: white;
            font-family: Arial, sans-serif;
            margin-bottom: 14px;
            transition: 0.18s ease;
        }

            input:focus,
            select:focus {
                outline: none;
                border-color: rgba(255,255,255,0.16);
                box-shadow: 0 0 18px rgba(255,255,255,0.05);
            }

        label {
            display: block;
            margin-bottom: 8px;
            color: var(--text-primary);
        }

        .button {
            display: inline-block;
            background: linear-gradient( 180deg, #2a2a2f 0%, #16161a 45%, #0d0d10 100% );
            color: #f5f5f5;
            border: 1px solid rgba(255,255,255,0.12);
            padding: 10px 14px;
            border-radius: 10px;
            cursor: pointer;
            text-decoration: none;
            font-family: Arial, sans-serif;
            font-size: 0.95rem;
            transition: 0.18s ease;
            box-shadow: 0 0 16px rgba(255,255,255,0.08), inset 0 1px 0 rgba(255,255,255,0.06);
        }

            .button:hover {
                background: linear-gradient( 180deg, #3a3a40 0%, #202026 45%, #111116 100% );
                border-color: rgba(255,255,255,0.18);
                box-shadow: 0 0 20px rgba(255,255,255,0.12), inset 0 1px 0 rgba(255,255,255,0.08);
                transform: translateY(-1px);
            }

            .button.full {
                width: 100%;
                box-sizing: border-box;
                text-align: center;
                margin-bottom: 10px;
            }

        .secondary {
            background: linear-gradient( 180deg, #202025 0%, #121216 100% );
        }

        .danger {
            background: linear-gradient( 180deg, #472328 0%, #2f171a 100% );
        }

            .danger:hover {
                background: linear-gradient( 180deg, #5d2d34 0%, #3b1d22 100% );
            }

        .empty {
            color: var(--text-muted);
        }

        .badge {
            display: inline-block;
            border: 1px solid var(--border-color);
            border-radius: 999px;
            padding: 5px 9px;
            font-size: 0.8rem;
            color: var(--text-secondary);
            margin-bottom: 12px;
            background: rgba(255,255,255,0.04);
        }

        .addition-card {
            transition: 0.18s ease;
        }

            .addition-card:hover {
                transform: translateY(-3px);
                border-color: rgba(255,255,255,0.12);
                box-shadow: 0 20px 40px rgba(0,0,0,0.26), 0 0 26px rgba(255,255,255,0.05);
            }

        .addition-image {
            width: 100%;
            max-height: 300px;
            object-fit: cover;
            border-radius: 16px;
            border: 1px solid var(--border-color);
            margin: 14px 0 18px;
            box-shadow: 0 12px 28px rgba(0,0,0,0.22);
        }

        .author {
            color: var(--text-muted);
            margin-bottom: 12px;
            font-size: 0.95rem;
        }

        .card-actions {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            margin-top: 18px;
        }

        .feed-header {
            display: flex;
            justify-content: space-between;
            gap: 16px;
            align-items: center;
            flex-wrap: wrap;
            margin-bottom: 18px;
        }

        .count-pill {
            color: var(--text-secondary);
            border: 1px solid var(--border-color);
            border-radius: 999px;
            padding: 6px 10px;
            font-size: 0.85rem;
            background: rgba(255,255,255,0.04);
        }

        .notification-link {
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }

        .notification-badge {
            min-width: 18px;
            height: 18px;
            padding: 0 6px;
            border-radius: 999px;
            background: white;
            color: black;
            font-size: 0.72rem;
            align-items: center;
            justify-content: center;
            line-height: 1;
        }

        @media (max-width: 900px) {
            header {
                flex-direction: column;
                gap: 14px;
                padding: 20px;
            }

            nav {
                justify-content: center;
            }

            main {
                padding: 28px 24px 70px;
            }

            .layout {
                grid-template-columns: 1fr;
            }

            .sidebar {
                position: static;
            }

            h1 {
                font-size: 2.1rem;
            }
        }
    </style>
</head>

<body>

    <header>
        <div class="logo">
            <a href="index.html">
                <img src="Nullverse-3.png"
                     alt="Nullverse"
                     class="site-logo">
            </a>
        </div>

        <nav>
            <a href="index.html">Home</a>
            <a href="notifications.html">Notifications</a>
            <a href="explore.html">Explore</a>
            <a href="profile.html">Profile</a>
            <a href="dashboard.html">Dashboard</a>
            <button onclick="logOut()">Log Out</button>
        </nav>
    </header>

    <main>

        <section class="hero">
            <h1 id="page-title">Community Additions</h1>
            <p id="page-subtitle">Loading world...</p>
        </section>

        <div class="layout">

            <aside class="sidebar">

                <section class="panel">
                    <a id="back-to-world" class="button full secondary">
                        ← Back to World
                    </a>

                    <a id="create-addition-link" class="button full">
                        + Add to This World
                    </a>

                    <p id="addition-mode-message" class="empty"></p>
                </section>

                <section class="panel">
                    <h3>Search</h3>

                    <input id="addition-search"
                           placeholder="Search additions...">

                    <label>Sort</label>
                    <select id="addition-sort">
                        <option value="newest">Newest</option>
                        <option value="oldest">Oldest</option>
                        <option value="popular">Popular</option>
                    </select>

                    <label>Type</label>
                    <select id="addition-type-filter">
                        <option value="all">All Types</option>
                        <option value="Story">Story</option>
                        <option value="Character">Character</option>
                        <option value="Location">Location</option>
                        <option value="Language">Language</option>
                        <option value="Lore">Lore</option>
                        <option value="Timeline">Timeline</option>
                        <option value="Map">Map</option>
                        <option value="Custom">Custom</option>
                    </select>
                </section>

            </aside>

            <section>

                <div class="feed-header">
                    <div>
                        <h2 style="margin:0;">Browse Additions</h2>
                        <p class="empty" style="margin-top:6px;">
                            Side stories, OCs, lore, maps, and ideas connected to this world.
                        </p>
                    </div>

                    <span id="addition-count" class="count-pill">
                        0 additions
                    </span>
                </div>

                <div id="additions-container">
                    <p class="empty">Loading additions...</p>
                </div>

            </section>

        </div>

    </main>

    <script type="module">
        import { requireBetaAccess } from "./betaGate.js";
        import { supabase } from "./supabaseClient.js";
        import { setupNotificationBadge } from "./notificationBadge.js";

        const currentUser = await requireBetaAccess({ allowRestricted: false });
        setupNotificationBadge();

        const params = new URLSearchParams(window.location.search);
        const worldId = params.get("id");

        let currentWorld = null;
        let allAdditions = [];
        let profileCache = [];

        if (!worldId) {
            alert("No world ID provided.");
            window.location.href = "explore.html";
        }

        await loadWorld();
        await loadAdditions();

        async function loadWorld() {
            const { data, error } = await supabase
                .from("worlds")
                .select("*")
                .eq("id", worldId)
                .single();

            if (error || !data) {
                alert("World not found.");
                window.location.href = "explore.html";
                return;
            }

            currentWorld = data;

            document.getElementById("page-title").textContent =
                `${data.title} Community`;

            document.getElementById("page-subtitle").textContent =
                `Explore community-made stories, characters, lore, and additions connected to ${data.title}.`;

            document.getElementById("back-to-world").href =
                `world.html?id=${encodeURIComponent(worldId)}`;

            configureCommunityAccess();
        }

        function configureCommunityAccess() {
            const createLink =
                document.getElementById("create-addition-link");

            const message =
                document.getElementById("addition-mode-message");

            if (!currentWorld) return;

            if (currentUser.id === currentWorld.owner_id) {
                createLink.style.display = "none";
                message.textContent =
                    "You own this world. Community additions from other creators appear here.";
                return;
            }

            if (currentWorld.addition_mode === "locked") {
                createLink.style.display = "none";
                message.textContent =
                    "This world is locked. The creator is not accepting additions.";
                return;
            }

            if (currentWorld.addition_mode === "approval") {
                createLink.href =
                    `create-addition.html?id=${encodeURIComponent(worldId)}`;

                message.textContent =
                    "This world requires creator approval before additions appear publicly.";
                return;
            }

            createLink.href =
                `create-addition.html?id=${encodeURIComponent(worldId)}`;

            message.textContent =
                "This world allows open additions. Approved additions appear in this community feed.";
        }

        async function loadAdditions() {
            const container =
                document.getElementById("additions-container");

            let query = supabase
                .from("world_additions")
                .select("*")
                .eq("world_id", worldId)
                .eq("status", "approved")
                .order("created_at", { ascending: false });

            if (currentUser.id !== currentWorld.owner_id) {
                query = query.eq("moderation_status", "visible");
            }

            const { data: additions, error } = await query;

            if (error) {
                container.innerHTML =
                    `<p class="empty">${escapeHtml(error.message)}</p>`;
                return;
            }

            allAdditions = additions || [];

            const authorIds = [
                ...new Set(allAdditions.map(addition => addition.author_id))
            ];

            if (authorIds.length > 0) {
                const { data: profiles } = await supabase
                    .from("profiles")
                    .select("id, username, display_name")
                    .in("id", authorIds);

                profileCache = profiles || [];
            } else {
                profileCache = [];
            }

            filterAndRenderAdditions();
        }

        function filterAndRenderAdditions() {
            const search =
                document.getElementById("addition-search")
                    .value
                    .trim()
                    .toLowerCase();

            const sort =
                document.getElementById("addition-sort")
                    .value;

            const type =
                document.getElementById("addition-type-filter")
                    .value;

            let filtered =
                [...allAdditions];

            if (search) {
                filtered = filtered.filter(addition =>
                    addition.title?.toLowerCase().includes(search) ||
                    addition.content?.toLowerCase().includes(search) ||
                    addition.addition_type?.toLowerCase().includes(search)
                );
            }

            if (type !== "all") {
                filtered = filtered.filter(addition =>
                    addition.addition_type === type
                );
            }

            if (sort === "newest") {
                filtered.sort((a, b) =>
                    new Date(b.created_at) - new Date(a.created_at)
                );
            }

            if (sort === "oldest") {
                filtered.sort((a, b) =>
                    new Date(a.created_at) - new Date(b.created_at)
                );
            }

            if (sort === "popular") {
                filtered.sort((a, b) =>
                    (b.like_count || 0) - (a.like_count || 0)
                );
            }

            renderAdditions(filtered);
        }

        function renderAdditions(additions) {
            const container =
                document.getElementById("additions-container");

            document.getElementById("addition-count").textContent =
                `${additions.length} ${additions.length === 1 ? "addition" : "additions"}`;

            if (!additions.length) {
                container.innerHTML =
                    `<p class="empty">No additions found.</p>`;
                return;
            }

            container.innerHTML = additions.map(addition => {
                const profile =
                    profileCache.find(profile =>
                        profile.id === addition.author_id
                    );

                const username =
                    profile?.username || "unknown";

                const displayName =
                    profile?.display_name || username;

                const canModerate =
                    currentUser.id === addition.author_id ||
                    currentUser.id === currentWorld.owner_id;

                return `
                    <article class="addition-card">
                        <span class="badge">
                            ${escapeHtml(addition.addition_type || "Addition")}
                        </span>

                        <h2>
                            ${escapeHtml(addition.title || "Untitled Addition")}
                        </h2>

                        <div class="author">
                            Added by
                            <strong>${escapeHtml(displayName)}</strong>
                            (@${escapeHtml(username)})
                        </div>

                        ${addition.image_url ? `
                            <img
                                class="addition-image"
                                src="${escapeHtml(addition.image_url)}"
                                alt="${escapeHtml(addition.title || "Addition image")}"
                            >
                        ` : ""}

                        <p style="white-space:pre-wrap;">
                            ${escapeHtml(addition.content || "")}
                        </p>

                        <div class="card-actions">
                            <a
                                class="button"
                                href="addition.html?id=${encodeURIComponent(addition.id)}">
                                Open Addition
                            </a>

                            ${currentUser.id === addition.author_id ? `
                                <a
                                    class="button secondary"
                                    href="edit-addition.html?id=${encodeURIComponent(addition.id)}">
                                    Edit Addition
                                </a>
                            ` : ""}

                            ${canModerate ? `
                                <button
                                    class="button danger"
                                    onclick="deleteAddition('${addition.id}')">
                                    Delete
                                </button>
                            ` : ""}
                        </div>
                    </article>
                `;
            }).join("");
        }

        window.deleteAddition = async function (additionId) {
            const confirmed =
                confirm("Delete this addition?");

            if (!confirmed) return;

            const { error } = await supabase
                .from("world_additions")
                .delete()
                .eq("id", additionId);

            if (error) {
                alert(error.message);
                return;
            }

            await loadAdditions();
        };

        document
            .getElementById("addition-search")
            .addEventListener("input", filterAndRenderAdditions);

        document
            .getElementById("addition-sort")
            .addEventListener("change", filterAndRenderAdditions);

        document
            .getElementById("addition-type-filter")
            .addEventListener("change", filterAndRenderAdditions);

        function escapeHtml(value) {
            return String(value || "")
                .replaceAll("&", "&amp;")
                .replaceAll("<", "&lt;")
                .replaceAll(">", "&gt;")
                .replaceAll('"', "&quot;")
                .replaceAll("'", "&#039;");
        }

        window.logOut = async function () {
            await supabase.auth.signOut();
            window.location.href = "login.html";
        };
    </script>

</body>
</html>
