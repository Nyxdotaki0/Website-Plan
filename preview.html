<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" href="favicon.png">
    <title>Preview - Nullverse</title>

    <script>
        const savedNullverseTheme = localStorage.getItem("nullverse-theme") || "void";
        document.documentElement.setAttribute("data-theme", savedNullverseTheme);
    </script>

    <link rel="stylesheet" href="theme.css?v=25">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Alegreya:wght@400;500;600;700&family=EB+Garamond:wght@400;500;600;700&family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600;700&family=Libre+Baskerville:wght@400;700&family=Lora:wght@400;500;600;700&family=Merriweather:wght@300;400;700;900&family=Nunito:wght@400;500;600;700;800&family=Open+Sans:wght@400;500;600;700;800&family=Roboto:wght@400;500;700;900&display=swap" rel="stylesheet">

    <style id="preview-source-page-style"></style>

    <style>
        html {
            min-height: 100%;
            background: #000;
        }

        body {
            margin: 0;
            min-height: 100vh;
            background: #000;
            color: var(--text-primary, #f5f5f5);
            font-family: Arial, sans-serif;
        }

        .preview-loading-screen,
        .preview-error-screen {
            min-height: 100vh;
            display: grid;
            place-items: center;
            padding: 24px;
            box-sizing: border-box;
            background: radial-gradient(circle at top, rgba(255,255,255,.075), transparent 38%), #050506;
        }

        .preview-loading-card,
        .preview-error-card {
            width: min(620px, 100%);
            padding: 28px;
            border-radius: 24px;
            border: 1px solid rgba(255,255,255,.12);
            background: linear-gradient(135deg, rgba(255,255,255,.075), rgba(255,255,255,.022)), rgba(8,8,12,.82);
            box-shadow: 0 24px 70px rgba(0,0,0,.46), inset 0 1px 0 rgba(255,255,255,.05);
            backdrop-filter: blur(18px);
            -webkit-backdrop-filter: blur(18px);
        }

            .preview-loading-card h1,
            .preview-error-card h1 {
                margin: 0 0 10px;
                letter-spacing: -.03em;
            }

            .preview-loading-card p,
            .preview-error-card p {
                color: var(--text-secondary, rgba(255,255,255,.72));
                line-height: 1.65;
                margin: 0;
            }

        .preview-mode-banner {
            position: relative;
            z-index: 12;
            width: fit-content;
            max-width: calc(100vw - 32px);
            margin: 14px auto 0;
            padding: 8px 13px;
            border-radius: 999px;
            border: 1px solid rgba(255,255,255,.14);
            background: rgba(8,8,12,.64);
            color: rgba(255,255,255,.82);
            font-size: .82rem;
            line-height: 1.25;
            text-align: center;
            box-shadow: 0 10px 28px rgba(0,0,0,.28), inset 0 1px 0 rgba(255,255,255,.06);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
        }

            .preview-mode-banner strong {
                color: #fff;
            }

        .preview-toast {
            position: fixed;
            right: 18px;
            bottom: 18px;
            z-index: 2147483000;
            max-width: min(360px, calc(100vw - 36px));
            padding: 12px 14px;
            border-radius: 16px;
            border: 1px solid rgba(255,255,255,.16);
            background: rgba(8,8,12,.92);
            color: white;
            box-shadow: 0 18px 46px rgba(0,0,0,.42), inset 0 1px 0 rgba(255,255,255,.06);
            backdrop-filter: blur(18px);
            -webkit-backdrop-filter: blur(18px);
            opacity: 0;
            transform: translateY(10px);
            transition: .18s ease;
            pointer-events: none;
            font-size: .9rem;
        }

            .preview-toast.show {
                opacity: 1;
                transform: translateY(0);
            }

        .preview-image-placeholder {
            min-height: 170px;
            display: grid;
            place-items: center;
            padding: 18px;
            box-sizing: border-box;
            border: 1px dashed rgba(255,255,255,.20);
            border-radius: 16px;
            background: rgba(255,255,255,.04);
            color: var(--text-muted, rgba(255,255,255,.58));
            text-align: center;
            line-height: 1.55;
        }

            .preview-image-placeholder strong {
                display: block;
                color: var(--text-secondary, rgba(255,255,255,.72));
                margin-bottom: 4px;
            }

        .preview-disabled {
            cursor: pointer;
        }

        .preview-reader-empty {
            min-height: 240px;
            display: grid;
            place-items: center;
            padding: 22px;
            border: 1px dashed rgba(255,255,255,.16);
            border-radius: 18px;
            color: rgba(255,255,255,.64);
            text-align: center;
            background: rgba(0,0,0,.20);
        }

        @media (max-width: 700px) {
            .preview-mode-banner {
                margin-top: 10px;
                font-size: .76rem;
            }

            .preview-toast {
                right: 12px;
                bottom: 12px;
            }
        }
    </style>
</head>
<body>
    <div id="preview-root" class="preview-loading-screen">
        <section class="preview-loading-card">
            <h1>Loading preview...</h1>
            <p>Nullverse is preparing your current editor state.</p>
        </section>
    </div>

    <div id="preview-toast" class="preview-toast"></div>

    <script>
        const PREVIEW_PAGE_BY_TYPE = {
            world: "world.html",
            literature: "literature.html",
            comic: "comic.html"
        };

        const WORLD_EDITOR_FONT_STACKS = {
            "Georgia": `Georgia, "Times New Roman", Times, serif`,
            "Merriweather": `"Merriweather", Georgia, "Times New Roman", Times, serif`,
            "Lora": `"Lora", Georgia, "Times New Roman", Times, serif`,
            "EB Garamond": `"EB Garamond", Garamond, Georgia, "Times New Roman", serif`,
            "Times New Roman": `"Times New Roman", Times, Georgia, serif`,
            "Inter": `"Inter", Arial, Helvetica, sans-serif`,
            "Arial": `Arial, Helvetica, sans-serif`,
            "Helvetica": `Helvetica, Arial, sans-serif`,
            "Open Sans": `"Open Sans", Arial, Helvetica, sans-serif`,
            "Roboto": `"Roboto", Arial, Helvetica, sans-serif`,
            "Nunito": `"Nunito", Arial, Helvetica, sans-serif`,
            "Courier New": `"Courier New", Courier, monospace`,
            "JetBrains Mono": `"JetBrains Mono", "Courier New", Courier, monospace`,
            "Alegreya": `"Alegreya", Georgia, "Times New Roman", Times, serif`,
            "Libre Baskerville": `"Libre Baskerville", Georgia, "Times New Roman", Times, serif`
        };

        const WORLD_EDITOR_FONT_ALIASES = {
            "serif": "Georgia",
            "sans-serif": "Inter",
            "sans": "Inter",
            "monospace": "JetBrains Mono",
            "mono": "JetBrains Mono",
            "georgia": "Georgia",
            "merriweather": "Merriweather",
            "lora": "Lora",
            "eb garamond": "EB Garamond",
            "garamond": "EB Garamond",
            "times": "Times New Roman",
            "times new roman": "Times New Roman",
            "inter": "Inter",
            "arial": "Arial",
            "helvetica": "Helvetica",
            "open sans": "Open Sans",
            "roboto": "Roboto",
            "nunito": "Nunito",
            "courier": "Courier New",
            "courier new": "Courier New",
            "jetbrains mono": "JetBrains Mono",
            "alegreya": "Alegreya",
            "libre baskerville": "Libre Baskerville"
        };

        const previewParams = new URLSearchParams(window.location.search);
        const previewKey = previewParams.get("previewKey") || previewParams.get("key") || "";
        const requestedType = normalizePreviewType(previewParams.get("type"));

        let activePayload = null;
        let activeType = requestedType;
        let activeProject = null;
        let activeOwnerProfile = null;
        let activeSections = [];
        let activeChapters = [];
        let activePagesByChapter = {};
        let readerChapterIndex = 0;
        let readerPageIndex = 0;
        let fullscreenMode = "paged";
        let toastTimer = null;

        initPreviewPage();

        async function initPreviewPage() {
            try {
                activePayload = readPreviewPayload();

                if (!activePayload) {
                    showPreviewError(
                        "Preview data was not found.",
                        "Open this page from one of the editors using the Preview Page button. The editor will create a temporary preview snapshot first."
                    );
                    return;
                }

                activeType = normalizePreviewType(
                    activePayload.contentType ||
                    activePayload.type ||
                    activePayload.previewType ||
                    activePayload.kind ||
                    requestedType
                );

                if (!activeType) {
                    showPreviewError(
                        "Preview type missing.",
                        "The editor needs to send type: world, literature, or comic in the preview payload."
                    );
                    return;
                }

                await injectSourcePageStyle(activeType);

                document.body.classList.remove("preview-world", "preview-literature", "preview-comic");
                document.body.classList.add(`preview-${activeType}`);

                if (activeType === "world") renderWorldPreview(activePayload);
                if (activeType === "literature") renderLiteraturePreview(activePayload);
                if (activeType === "comic") renderComicPreview(activePayload);

                setupPreviewGlobalHandlers();
                showToast("Preview loaded. Public actions are disabled.");
            } catch (error) {
                console.error("Preview render error:", error);
                showPreviewError("Preview could not load.", error?.message || "Check the browser console for details.");
            }
        }

        function readPreviewPayload() {
            const candidates = [];

            if (previewKey) {
                candidates.push(previewKey);
            }

            const routeId = previewParams.get("id") || "draft";
            if (requestedType) {
                candidates.push(`nullverse-preview:${requestedType}:${routeId}`);
                candidates.push(`nullverse-preview-${requestedType}-${routeId}`);
                candidates.push(`nullverse-preview:${requestedType}`);
                candidates.push(`nullverse-${requestedType}-preview`);
            }

            for (const key of [...new Set(candidates.filter(Boolean))]) {
                const raw = localStorage.getItem(key) || sessionStorage.getItem(key);

                if (!raw) {
                    continue;
                }

                try {
                    const parsed = JSON.parse(raw);
                    parsed.__previewStorageKey = key;
                    return parsed;
                } catch (error) {
                    console.warn("Preview payload parse failed:", key, error);
                }
            }

            const directPayload = previewParams.get("payload");
            if (directPayload) {
                try {
                    return JSON.parse(decodeURIComponent(directPayload));
                } catch (error) {
                    console.warn("Direct preview payload parse failed:", error);
                }
            }

            return null;
        }

        function normalizePreviewType(value) {
            const clean = String(value || "").trim().toLowerCase().replace(/\s+/g, "_");
            if (["world", "worlds"].includes(clean)) return "world";
            if (["literature", "lit", "book", "novel"].includes(clean)) return "literature";
            if (["comic", "manga", "comics"].includes(clean)) return "comic";
            return "";
        }

        async function injectSourcePageStyle(type) {
            const sourcePage = PREVIEW_PAGE_BY_TYPE[type];
            if (!sourcePage) return;

            try {
                const response = await fetch(`${sourcePage}?previewStyle=${Date.now()}`, { cache: "no-store" });
                if (!response.ok) throw new Error(`Could not fetch ${sourcePage}`);

                const html = await response.text();
                const styleBlocks = [...html.matchAll(/<style[^>]*>([\s\S]*?)<\/style>/gi)]
                    .map(match => match[1])
                    .join("\n\n");

                document.getElementById("preview-source-page-style").textContent = styleBlocks;
            } catch (error) {
                console.warn("Preview style fetch failed. Using fallback styles only.", error);
            }
        }

        function commonHeader() {
            return `
                    <div class="nullverse-stars"></div>
                    <header>
                        <div class="logo">
                            <a href="#" data-preview-action="Home">
                                <img src="Nullverse-3.png" alt="Nullverse" class="site-logo">
                            </a>
                        </div>
                        <nav>
                            <a href="#" data-preview-action="Home">Home</a>
                            <a href="#" data-preview-action="Notifications">Notifications</a>
                            <a href="#" data-preview-action="Explore">Explore</a>
                            <a href="#" data-preview-action="Profile">Profile</a>
                            <a href="#" data-preview-action="Dashboard">Dashboard</a>
                            <a href="#" data-preview-action="Messages">Messages</a>
                            <button type="button" data-preview-action="Log Out">Log Out</button>
                        </nav>
                    </header>
                    <div class="preview-mode-banner">
                        <strong>Preview Mode</strong> — this version is not public yet. Public actions are disabled.
                    </div>
                `;
        }

        function renderWorldPreview(payload) {
            activeProject = normalizeProject(payload, "world");
            activeOwnerProfile = normalizeOwnerProfile(payload, activeProject);
            activeProject.ownerProfile = activeOwnerProfile;
            activeSections = sortByDisplayOrder(
                payload.sections ||
                payload.worldSections ||
                payload.world_sections ||
                payload.chapters ||
                []
            );

            document.title = `${activeProject.title || "World"} Preview - Nullverse`;
            document.getElementById("preview-root").className = "";
            document.getElementById("preview-root").innerHTML = `
                    ${commonHeader()}
                    <div id="world-background-layer" class="world-background-layer">
                        <div id="world-background-image" class="world-background-image"></div>
                        <div id="world-gradient-layer" class="world-gradient-layer"></div>
                        <div id="world-background-overlay" class="world-background-overlay"></div>
                    </div>
                    <main>
                        <aside class="left-sidebar">
                            <section id="section-nav" class="section-nav" style="display:none;">
                                <div class="index-header">
                                    <h2>Search This World</h2>
                                    <p>Jump between sections instantly</p>
                                </div>
                                <input id="section-search" class="section-search" type="text" placeholder="Search sections...">
                                <div id="section-type-filter" class="section-filters"></div>
                                <div id="section-count" class="section-count"></div>
                                <div id="section-nav-links"></div>
                            </section>
                        </aside>
                        <div class="content-column">
                            <section class="hero">
                                <div id="world-tags" class="tag-row"></div>
                                <h1 id="world-title"></h1>
                                <p id="world-creator" class="creator"></p>
                                <div id="world-summary" class="summary"></div>
                                <div class="like-row">
                                    <button id="like-button" class="like-button preview-disabled" data-preview-action="Like">♡ Like</button>
                                    <span id="like-count" class="like-count">0 Likes</span>
                                    <a class="button preview-disabled" href="#" data-preview-action="Comments">Comments</a>
                                    <a class="button preview-disabled" href="#" data-preview-action="Q&A">Q&A</a>
                                    <a class="button preview-disabled" href="#" data-preview-action="Community">Community</a>
                                    <button class="button preview-disabled" type="button" data-preview-action="Report">Report</button>
                                </div>
                                <div id="owner-actions" class="owner-actions"></div>
                            </section>
                            <section id="sections-container"></section>
                        </div>
                    </main>
                    <div id="section-image-lightbox" class="section-image-lightbox" aria-hidden="true">
                        <div class="section-image-lightbox-side left" data-local-control="close-section-lightbox" title="Close image"></div>
                        <div class="section-image-lightbox-side right" data-local-control="close-section-lightbox" title="Close image"></div>
                        <div class="section-image-lightbox-hint">Click the sides or press Esc to close</div>
                        <button class="section-image-lightbox-close" type="button" data-local-control="close-section-lightbox" title="Close image">×</button>
                        <div class="section-image-lightbox-shell">
                            <img id="section-image-lightbox-image" class="section-image-lightbox-image" src="" alt="">
                        </div>
                    </div>
                `;

            applyWorldTheme(activeProject);
            document.getElementById("world-title").textContent = activeProject.title || "Untitled World";
            document.getElementById("world-summary").textContent = activeProject.summary || "No summary provided.";
            document.getElementById("world-creator").innerHTML = buildCreatorLine(activeOwnerProfile);
            renderWorldTags(activeProject);

            const hero = document.querySelector(".hero");
            hero.insertAdjacentHTML(
                "afterbegin",
                buildPlacedImageStage(getImageUrl(activeProject, ["theme_overview_card_image_url", "overview_card_image_url"]), activeProject.theme_overview_card_image_placement, "hero-placed-image")
            );
            hero.insertAdjacentHTML("beforeend", buildCreditPill({
                type: activeProject.overview_card_credit_type,
                name: activeProject.overview_card_credit_name,
                username: activeProject.overview_card_credit_nullverse_username,
                url: activeProject.overview_card_credit_url,
                note: activeProject.overview_card_credit_note,
                ownerUsername: activeOwnerProfile?.username,
                context: "Overview Image"
            }));

            const backgroundCredit = buildCreditPill({
                type: activeProject.background_credit_type,
                name: activeProject.background_credit_name,
                username: activeProject.background_credit_nullverse_username,
                url: activeProject.background_credit_url,
                note: activeProject.background_credit_note,
                ownerUsername: activeOwnerProfile?.username,
                context: "Background Image"
            });

            if (backgroundCredit) {
                document.getElementById("world-background-layer")?.insertAdjacentHTML("beforeend", backgroundCredit);
            }

            renderWorldSections(activeSections);
            renderWorldSectionNav(activeSections);
            setupWorldPreviewLightbox();
        }

        function renderLiteraturePreview(payload) {
            activeProject = normalizeProject(payload, "literature");
            activeOwnerProfile = normalizeOwnerProfile(payload, activeProject);
            activeProject.ownerProfile = activeOwnerProfile;
            activeChapters = sortByDisplayOrder(
                payload.chapters ||
                payload.literatureChapters ||
                payload.literature_chapters ||
                []
            );

            document.title = `${activeProject.title || "Literature"} Preview - Nullverse`;
            document.getElementById("preview-root").className = "";
            document.getElementById("preview-root").innerHTML = `
                    <div id="reading-progress" class="reading-progress"></div>
                    ${commonHeader()}
                    <div id="literature-background-layer" class="literature-background-layer">
                        <div id="literature-background-base" class="literature-background-base"></div>
                        <div id="literature-background-image" class="literature-background-image"></div>
                        <div id="literature-background-overlay" class="literature-background-overlay"></div>
                    </div>
                    <main>
                        <aside class="left-sidebar">
                            <section id="chapter-index" class="chapter-index" style="display:none;">
                                <div class="index-header">
                                    <h2>Chapter Index</h2>
                                    <p>Search and jump between chapters instantly.</p>
                                </div>
                                <input id="chapter-search" class="chapter-search" type="text" placeholder="Search chapters...">
                                <div id="chapter-count" class="chapter-count"></div>
                                <div id="chapter-nav-links"></div>
                            </section>
                        </aside>
                        <div class="content-column">
                            <section class="book-hero">
                                <div class="book-layout">
                                    <div id="book-cover-wrap" class="cover-wrap"></div>
                                    <div>
                                        <div id="book-tags" class="tag-row"></div>
                                        <h1 id="book-title"></h1>
                                        <p id="book-creator" class="creator"></p>
                                        <div id="reading-meta" class="reading-meta"></div>
                                        <div id="book-summary" class="summary"></div>
                                        <div class="action-row">
                                            <button id="like-button" class="like-button preview-disabled" type="button" data-preview-action="Like">♡ Like</button>
                                            <span id="like-count" class="like-count">0 Likes</span>
                                            <a class="button preview-disabled" href="#" data-preview-action="Comments">Comments</a>
                                            <a class="button preview-disabled" href="#" data-preview-action="Q&A">Q&A</a>
                                            <button class="button preview-disabled" type="button" data-preview-action="Report">Report</button>
                                        </div>
                                        <div id="owner-actions" class="owner-actions"></div>
                                    </div>
                                </div>
                            </section>
                            <section class="reader-tools" id="reader-tools" style="display:none;">
                                <div class="reader-tools-left">
                                    <button class="reader-tool-button mobile-index-toggle" type="button" data-local-control="toggle-mobile-index">Chapters</button>
                                    <button class="reader-tool-button" type="button" data-local-control="start-reading">Start Reading</button>
                                    <button class="reader-tool-button" type="button" data-local-control="toggle-focus">Focus</button>
                                </div>
                                <div class="reader-tools-right">
                                    <button class="reader-tool-button" type="button" data-local-control="large-text">Text +</button>
                                    <button class="reader-tool-button" type="button" data-local-control="wide-reader">Wide</button>
                                    <button class="reader-tool-button" type="button" data-local-control="center-headings">Center Titles</button>
                                </div>
                            </section>
                            <section id="chapters-container"></section>
                        </div>
                    </main>
                `;

            applyLiteratureTheme(activeProject);
            renderLiteratureHero(activeProject, activeOwnerProfile);
            renderLiteratureChapters(activeChapters);
            renderGenericChapterIndex(activeChapters, "literature");
            setupLiteratureReaderTools();
            setupReaderScrollTracking();
        }

        function renderComicPreview(payload) {
            activeProject = normalizeProject(payload, "comic");
            activeOwnerProfile = normalizeOwnerProfile(payload, activeProject);
            activeProject.ownerProfile = activeOwnerProfile;
            activeChapters = sortByDisplayOrder(payload.chapters || payload.comicChapters || payload.comic_chapters || []);
            activePagesByChapter = normalizePagesByChapter(payload);
            fullscreenMode = activeProject.comic_reading_mode || activeProject.reading_mode || "paged";

            document.title = `${activeProject.title || "Comic"} Preview - Nullverse`;
            document.getElementById("preview-root").className = "";
            document.getElementById("preview-root").innerHTML = `
                    ${commonHeader()}
                    <div id="comic-background-layer" class="comic-background-layer">
                        <div id="comic-background-base" class="comic-background-base"></div>
                        <div id="comic-background-image" class="comic-background-image"></div>
                        <div id="comic-background-overlay" class="comic-background-overlay"></div>
                    </div>
                    <main>
                        <aside class="left-sidebar">
                            <section id="chapter-index" class="chapter-index" style="display:none;">
                                <div class="index-header">
                                    <h2>Chapter Index</h2>
                                    <p>Search and jump between chapters instantly.</p>
                                </div>
                                <input id="chapter-search" class="chapter-search" type="text" placeholder="Search chapters...">
                                <div id="chapter-count" class="chapter-count"></div>
                                <div id="chapter-nav-links"></div>
                            </section>
                        </aside>
                        <div class="content-column">
                            <section class="comic-hero">
                                <div class="comic-layout">
                                    <div id="comic-cover-wrap" class="cover-wrap"></div>
                                    <div>
                                        <div id="comic-tags" class="tag-row"></div>
                                        <h1 id="comic-title"></h1>
                                        <p id="comic-creator" class="creator"></p>
                                        <div id="comic-summary" class="summary"></div>
                                        <div class="action-row">
                                            <button id="like-button" class="like-button preview-disabled" type="button" data-preview-action="Like">♡ Like</button>
                                            <span id="like-count" class="like-count">0 Likes</span>
                                            <a class="button preview-disabled" href="#" data-preview-action="Comments">Comments</a>
                                            <a class="button preview-disabled" href="#" data-preview-action="Q&A">Q&A</a>
                                            <a class="button preview-disabled" href="#" data-preview-action="Community">Community</a>
                                            <button class="button preview-disabled" type="button" data-preview-action="Report">Report</button>
                                        </div>
                                        <div id="owner-actions" class="owner-actions"></div>
                                    </div>
                                </div>
                            </section>
                            <section id="chapters-gallery-container"></section>
                        </div>
                    </main>
                    <div id="reader-overlay" class="reader-overlay">
                        <div id="reader-bg-base" class="reader-bg-base"></div>
                        <div id="reader-bg-image" class="reader-bg-image"></div>
                        <div id="reader-bg-overlay" class="reader-bg-overlay"></div>
                        <div id="reader-ui" class="reader-ui">
                            <div class="reader-topbar">
                                <div class="reader-title">
                                    <strong id="reader-title">Comic Reader</strong>
                                    <span id="reader-subtitle">Choose a page to begin</span>
                                </div>

        function normalizeProject(payload, type) {
            const possible = [
                payload[type],
                payload.project,
                payload.item,
                payload.world,
                payload.literature,
                payload.comic,
                payload.data
            ].find(value => value && typeof value === "object" && !Array.isArray(value));

            return possible || {};
        }

        function normalizeOwnerProfile(payload, project) {
            return (
                payload.ownerProfile ||
                payload.profile ||
                payload.creator ||
                project.ownerProfile ||
                project.profile ||
                project.creator ||
                {
                    username: project.owner_username || project.username || "creator",
                    display_name: project.owner_display_name || project.display_name || project.owner_name || "Creator"
                }
            );
        }

        function normalizePagesByChapter(payload) {
            const pagesByChapter = payload.pagesByChapter || payload.pages_by_chapter || payload.comicPagesByChapter || {};

            if (pagesByChapter && typeof pagesByChapter === "object" && !Array.isArray(pagesByChapter)) {
                return Object.fromEntries(
                    Object.entries(pagesByChapter).map(([key, pages]) => [key, sortByDisplayOrder(pages || [])])
                );
            }

            const flatPages = payload.pages || payload.comicPages || payload.comic_pages || [];
            const grouped = {};

            flatPages.forEach(page => {
                const chapterId = page.chapter_id || page.comic_chapter_id || page.chapterId || "default";
                if (!grouped[chapterId]) grouped[chapterId] = [];
                grouped[chapterId].push(page);
            });

            Object.keys(grouped).forEach(key => {
                grouped[key] = sortByDisplayOrder(grouped[key]);
            });

            return grouped;
        }

        function sortByDisplayOrder(items) {
            return [...(Array.isArray(items) ? items : [])].sort((a, b) => {
                const aOrder = Number(a?.display_order ?? a?.order_index ?? a?.sort_order ?? a?.position);
                const bOrder = Number(b?.display_order ?? b?.order_index ?? b?.sort_order ?? b?.position);
                const aHas = Number.isFinite(aOrder);
                const bHas = Number.isFinite(bOrder);

                if (aHas && bHas && aOrder !== bOrder) return aOrder - bOrder;
                if (aHas && !bHas) return -1;
                if (!aHas && bHas) return 1;

                const aDate = new Date(a?.created_at || 0).getTime();
                const bDate = new Date(b?.created_at || 0).getTime();
                return aDate - bDate;
            });
        }

        function setupPreviewGlobalHandlers() {
            document.addEventListener("click", event => {
                const previewAction = event.target.closest("[data-preview-action]");

                if (previewAction) {
                    event.preventDefault();
                    showToast(`${previewAction.dataset.previewAction || "This action"} is disabled in preview mode.`);
                    return;
                }

                const pill = event.target.closest(".credit-pill");
                if (pill) {
                    event.preventDefault();
                    document.querySelectorAll(".credit-pill").forEach(item => {
                        if (item !== pill) item.classList.remove("show-tooltip");
                    });
                    pill.classList.toggle("show-tooltip");
                }
            });

            document.addEventListener("keydown", event => {
                if (event.key === "Escape") {
                    closeSectionImageLightbox();
                    closeReader();
                    closeCreditSheet();
                }

                const readerOpen = document.getElementById("reader-overlay")?.classList.contains("open");
                if (readerOpen && activeType === "comic") {
                    if (event.key === "ArrowRight") readerForward();
                    if (event.key === "ArrowLeft") readerBack();
                    if (event.key.toLowerCase() === "w") setFullscreenMode("webtoon");
                    if (event.key.toLowerCase() === "p") setFullscreenMode("paged");
                }
            });
        }

        function showToast(message) {
            const toast = document.getElementById("preview-toast");
            if (!toast) return;

            toast.textContent = message;
            toast.classList.add("show");

            clearTimeout(toastTimer);
            toastTimer = setTimeout(() => {
                toast.classList.remove("show");
            }, 2800);
        }

        function showPreviewError(title, message) {
            document.getElementById("preview-root").className = "preview-error-screen";
            document.getElementById("preview-root").innerHTML = `
                    <section class="preview-error-card">
                        <h1>${escapeHtml(title)}</h1>
                        <p>${escapeHtml(message)}</p>
                    </section>
                `;
        }

        function getImageUrl(source, keys) {
            for (const key of keys) {
                const value = source?.[key];
                const normalized = normalizeImageValue(value);
                if (normalized) return normalized;
            }
            return "";
        }

        function normalizeImageValue(value) {
            if (!value) return "";

            if (typeof value === "object") {
                if (value.previewUnavailable || value.unsaved || value.needsSave) return "";
                return normalizeImageValue(value.url || value.src || value.previewUrl || value.preview_url || value.savedUrl || value.saved_url);
            }

            const raw = String(value || "").trim();
            if (!raw) return "";
            if (raw.startsWith("__UNSAVED") || raw === "unsaved" || raw === "needs_save") return "";

            return raw;
        }

        function buildUnavailableImagePlaceholder(label = "Image") {
            return `
                    <div class="preview-image-placeholder">
                        <span>
                            <strong>${escapeHtml(label)} needs saving first.</strong>
                            Preview will still show your text, colors, layout, and saved images.
                        </span>
                    </div>
                `;
        }

        function normalizeImagePlacement(value) {
            let parsed = value;
            if (typeof parsed === "string") {
                try { parsed = JSON.parse(parsed); } catch { parsed = null; }
            }

            return {
                x: 0,
                y: 0,
                scale: 1,
                rotation: 0,
                fit: "cover",
                ...(parsed && typeof parsed === "object" ? parsed : {})
            };
        }

        function getImagePlacementTransform(placement, includeDefaultScale = false) {
            const safe = normalizeImagePlacement(placement);
            const baseScale = includeDefaultScale ? 1.03 : 1;
            const finalScale = (Number(safe.scale) || 1) * baseScale;
            return `translate(${Number(safe.x) || 0}px, ${Number(safe.y) || 0}px) rotate(${Number(safe.rotation) || 0}deg) scale(${finalScale})`;
        }

        function getImagePlacementFit(placement) {
            return normalizeImagePlacement(placement).fit || "cover";
        }

        function getImagePlacementStyle(placement) {
            const safe = normalizeImagePlacement(placement);
            return `object-fit:${escapeHtml(safe.fit || "cover")}; transform:${escapeHtml(getImagePlacementTransform(safe))}; transform-origin:center center;`;
        }

        function buildPlacedImageStage(url, placement, className = "") {
            if (!url) return "";
            const safe = normalizeImagePlacement(placement);
            return `
                    <div class="placed-image-stage ${escapeHtml(className)}">
                        <img src="${escapeHtml(url)}" alt="" style="object-fit:${escapeHtml(safe.fit || "cover")}; transform:${escapeHtml(getImagePlacementTransform(safe))};">
                    </div>
                `;
        }

        function buildCreatorLine(profile) {
            if (!profile || (!profile.username && !profile.display_name)) return "by Unknown Creator";
            const name = profile.display_name || profile.username || "Creator";
            const username = profile.username || "creator";
            return `by <a href="#" data-preview-action="Creator Profile">${escapeHtml(name)} (@${escapeHtml(username)})</a>`;
        }

        function escapeHtml(value) {
            return String(value ?? "")
                .replaceAll("&", "&amp;")
                .replaceAll("<", "&lt;")
                .replaceAll(">", "&gt;")
                .replaceAll('"', "&quot;")
                .replaceAll("'", "&#039;");
        }

        function escapeAttr(value) {
            return escapeHtml(value).replaceAll("`", "&#096;");
        }

        function formatCreditType(value) {
            return String(value || "")
                .replaceAll("_", " ")
                .replace(/\b\w/g, letter => letter.toUpperCase());
        }

        function buildCreditPill({ type, name, username, url, note, ownerUsername, context = "Image" }) {
            type = type || "no_credit_needed";
            if (type === "no_credit_needed") return "";

            let label = "";
            let source = name || username || ownerUsername || formatCreditType(type);

            if (type === "own_work") {
                label = `${context} Credit: @${ownerUsername || "creator"}`;
                source = ownerUsername || source;
            } else if (type === "nullverse_creator" && username) {
                label = `${context} Credit: @${username}`;
                source = username;
            } else {
                label = `${context} Credit: ${name || formatCreditType(type)}`;
            }

            const tooltipContent = `
                    <strong>${escapeHtml(context)} Credit</strong>
                    <br>
                    Source: ${escapeHtml(source)}
                    ${note ? `<br><br>${escapeHtml(note)}` : ""}
                    ${url ? `<br><br>External link disabled in preview.` : ""}
                `;

            return `
                    <span class="credit-pill">
                        ${escapeHtml(label)}
                        <span class="credit-tooltip">${tooltipContent}</span>
                    </span>
                `;
        }

        function splitTags(value) {
            if (Array.isArray(value)) return value.map(String);
            return String(value || "")
                .split(",")
                .map(tag => tag.trim())

        }

        function getCombinedTags(project, label) {
            return [

                ...splitTags(project.themes),

                imageLayer.style.transform = getImagePlacementTransform(world.theme_background_image_placement);

        function buildSectionCardStyle(section) {

        function getSectionImageStage(section) {

            const isFull = section.image_position === "full";

        function renderWorldSectionNav(sections) {
            const nav = document.getElementById("section-nav");
            const links = document.getElementById("section-nav-links");
            const search = document.getElementById("section-search");
            const filters = document.getElementById("section-type-filter");
            const count = document.getElementById("section-count");
            if (!nav || !links || !search || !filters || !count) return;

            if (!sections.length) {
                nav.style.display = "none";
                return;
            }

            nav.style.display = "block";

            const indexImageUrl = getImageUrl(activeProject, ["theme_index_image_url", "index_image_url"]);
            nav.insertAdjacentHTML("afterbegin", buildPlacedImageStage(indexImageUrl, activeProject.theme_index_image_placement, "index-placed-image"));

                type: activeProject.index_credit_type,
                name: activeProject.index_credit_name,

                types.map(type => `<button class="filter-chip" type="button" data-section-type="${escapeAttr(type)}">${escapeHtml(type)}</button>`).join("");

            let activeType = "All";

            function paint() {
                const query = normalizeSearch(search.value || "");
                const filtered = sections.map((section, index) => ({ section, index })).filter(({ section }) => {
                    const type = String(section.section_type || section.type || "Section").trim() || "Section";
                    const text = normalizeSearch(`${section.title || ""} ${type} ${plainTextFromRich(section.content || section.body || "")}`);
                    const typeOk = activeType === "All" || type === activeType;
                    const searchOk = !query || text.includes(query);
                    return typeOk && searchOk;
                });

                count.textContent = `${filtered.length} of ${sections.length} section${sections.length === 1 ? "" : "s"}`;
                links.innerHTML = filtered.map(({ section, index }) => `
                        <a href="#section-${index}" data-local-control="section-link" data-target="section-${index}">

            filters.addEventListener("click", event => {
                const chip = event.target.closest("[data-section-type]");
                if (!chip) return;
                activeType = chip.dataset.sectionType;
                filters.querySelectorAll(".filter-chip").forEach(item => item.classList.remove("active"));
                chip.classList.add("active");
                paint();
            });

            search.addEventListener("input", paint);
            links.addEventListener("click", event => {
                const link = event.target.closest("[data-target]");
                if (!link) return;
                event.preventDefault();
                document.getElementById(link.dataset.target)?.scrollIntoView({ behavior: "smooth", block: "start" });
            });

            paint();
        }

                type: literature.cover_credit_type,

            });

            coverWrap.classList.toggle("placed-cover", !!literature.cover_image_placement);

                coverWrap.innerHTML = `<img src="${escapeAttr(coverUrl)}" alt="" style="${getImagePlacementStyle(literature.cover_image_placement)}">${coverCredit}`;

        function updateReadingMeta(chapters) {
            const meta = document.getElementById("reading-meta");
            if (!meta) return;
            const chapterCount = chapters.length;
            const wordCount = chapters.reduce((total, chapter) => total + countWords(plainTextFromRich(chapter.body || chapter.content || "")), 0);
            const minutes = Math.max(1, Math.ceil(wordCount / 220));
            meta.innerHTML = `
                    <span>${chapterCount} chapter${chapterCount === 1 ? "" : "s"}</span>
                    <span>${wordCount.toLocaleString()} words</span>
                    <span>${minutes} min read</span>
                `;
        }

        function renderLiteratureChapters(chapters) {
            const container = document.getElementById("chapters-container");
            if (!container) return;
            document.getElementById("reader-tools").style.display = chapters.length ? "flex" : "none";

            if (!chapters.length) {
                container.innerHTML = `<p class="empty">This preview does not have any chapters yet.</p>`;
                return;
            }

            container.innerHTML = chapters.map((chapter, index) => buildLiteratureChapterArticle(chapter, index)).join("");
            container.querySelectorAll(".chapter-main-text.rich-chapter-content").forEach(normalizeRenderedRichText);
        }

        function buildLiteratureChapterArticle(chapter, index) {
            const chapterNumber = index + 1;
            const visualTop = buildLiteratureChapterHeaderImage(chapter, "top");
            const visualLeftRight = ["left", "right"].includes(chapter.image_position) ? buildLiteratureChapterHeaderImage(chapter, chapter.image_position) : "";
            const visualBottom = buildLiteratureChapterHeaderImage(chapter, "bottom");

            return `
                    <article id="chapter-${chapterNumber}" class="literature-chapter" style="${buildLiteratureChapterCardStyle(chapter)} ${buildLiteratureChapterWritingStyle(chapter)}">
                        <div class="chapter-title-row">
                            <div class="chapter-eyebrow">Chapter ${chapterNumber} · ${getChapterReadTime(chapter)} min read</div>
                            <h2>${escapeHtml(chapter.title || "Untitled")}</h2>
                            ${chapter.subtitle ? `<div class="chapter-subtitle">${escapeHtml(chapter.subtitle)}</div>` : ""}
                        </div>
                        ${visualTop}
                        <div class="chapter-main-text rich-chapter-content">
                            ${visualLeftRight}
                            ${formatRichContent(chapter.body || chapter.content || "No chapter text yet.")}
                        </div>
                        ${visualBottom}
                        ${chapter.author_note ? `<div class="author-note"><strong>Author Note</strong><br><br>${escapeHtml(chapter.author_note)}</div>` : ""}
                        ${chapter.theme_card_style === "image" && getImageUrl(chapter, ["theme_card_image_url"]) ? buildCreditPill({
                type: chapter.card_credit_type,
                name: chapter.card_credit_name,
                username: chapter.card_credit_nullverse_username,
                url: chapter.card_credit_url,
                note: chapter.card_credit_note,
                ownerUsername: activeOwnerProfile?.username,
                context: "Chapter Card Image"
            }) : ""}
                    </article>
                `;
        }

        function buildLiteratureChapterHeaderImage(chapter, requestedPosition) {
            const imageUrl = getImageUrl(chapter, ["image_url", "chapter_image_url", "header_image_url"]);
            if (!imageUrl) return "";

            const savedPosition = chapter.image_position || "top";
            const isLeftRight = savedPosition === "left" || savedPosition === "right";
            if (requestedPosition === "top" && !(savedPosition === "top" || savedPosition === "full")) return "";
            if (requestedPosition === "bottom" && savedPosition !== "bottom") return "";
            if ((requestedPosition === "left" || requestedPosition === "right") && savedPosition !== requestedPosition) return "";

            const credit = buildCreditPill({
                type: chapter.image_credit_type,
                name: chapter.image_credit_name,
                username: chapter.image_credit_nullverse_username,
                url: chapter.image_credit_url,
                note: chapter.image_credit_note,
                ownerUsername: activeOwnerProfile?.username,
                context: "Chapter Image"
            });
            const classes = ["chapter-header-image-wrap", savedPosition === "full" ? "full" : savedPosition, isLeftRight ? `float-${savedPosition}` : "", credit ? "has-credit" : ""].filter(Boolean).join(" ");
            return `<div class="${classes}"><img src="${escapeAttr(imageUrl)}" alt="" style="${getImagePlacementStyle(chapter.image_placement)}">${credit}</div>`;
        }

        function buildLiteratureChapterCardStyle(chapter) {
            let background = "linear-gradient(180deg, rgba(255,255,255,.04), rgba(255,255,255,.012))";
            if (chapter.theme_card_style === "solid") background = chapter.theme_card_color_1 || "#141416";
            if (["gradient", "image"].includes(chapter.theme_card_style)) background = `linear-gradient(135deg, ${chapter.theme_card_color_1 || "#141416"}, ${chapter.theme_card_color_2 || "#0b0b0d"})`;

            const imageUrl = getImageUrl(chapter, ["theme_card_image_url"]);
            const image = chapter.theme_card_style === "image" && imageUrl ? `url("${imageUrl}")` : "none";

            return `
                    --chapter-card-background:${background};
                    --chapter-card-text:${chapter.theme_card_text_color || "#f5f5f5"};
                    --chapter-card-image:${image};
                    --chapter-card-image-size:${getImagePlacementFit(chapter.theme_card_image_placement)};
                    --chapter-card-image-transform:${getImagePlacementTransform(chapter.theme_card_image_placement)};
                    --chapter-card-image-opacity:${chapter.theme_card_opacity ?? .85};
                    --chapter-card-overlay:${chapter.theme_card_overlay ?? .35};
                `;
        }

        function buildLiteratureChapterWritingStyle(chapter) {
            const spacingMap = {
                compact: ["1.45", "0px"],
                comfortable: ["1.8", "0px"],
                airy: ["2.15", ".02em"],
                manuscript: ["2", ".01em"]
            };
            const spacing = spacingMap[chapter.spacing_type || "comfortable"] || spacingMap.comfortable;
            return `
                    --chapter-text-color:${chapter.text_color || "#f5f5f5"};
                    --chapter-panel-background:${chapter.chapter_panel_color || "#141416"};
                    --chapter-line-height:${spacing[0]};
                    --chapter-letter-spacing:${spacing[1]};
                `;
        }

        function getChapterReadTime(chapter) {
            return Math.max(1, Math.ceil(countWords(plainTextFromRich(chapter.body || chapter.content || "")) / 220));
        }

        function setupLiteratureReaderTools() {
            document.querySelectorAll("[data-local-control]").forEach(button => {
                button.addEventListener("click", event => {
                    const control = event.currentTarget.dataset.localControl;
                    if (control === "toggle-mobile-index") document.getElementById("chapter-index")?.classList.toggle("mobile-open");
                    if (control === "start-reading") scrollToFirstChapter();
                    if (control === "toggle-focus") document.body.classList.toggle("reader-focus");
                    if (control === "large-text") document.body.classList.toggle("reader-large-text");
                    if (control === "wide-reader") document.body.classList.toggle("reader-wide");
                    if (control === "center-headings") document.body.classList.toggle("reader-center-headings");
                });
            });
        }

        function scrollToFirstChapter() {
            document.getElementById("chapter-1")?.scrollIntoView({ behavior: "smooth", block: "start" });
        }

        function setupReaderScrollTracking() {
            const progress = document.getElementById("reading-progress");
            if (!progress) return;

            function update() {
                const scrollTop = window.scrollY || document.documentElement.scrollTop;
                const scrollHeight = Math.max(1, document.documentElement.scrollHeight - window.innerHeight);
                progress.style.width = `${Math.min(100, Math.max(0, (scrollTop / scrollHeight) * 100))}%`;
            }

            update();
            window.addEventListener("scroll", update, { passive: true });
        }

        function renderGenericChapterIndex(chapters, mode) {
            const nav = document.getElementById("chapter-index");
            const links = document.getElementById("chapter-nav-links");
            const search = document.getElementById("chapter-search");
            const count = document.getElementById("chapter-count");
            if (!nav || !links || !search || !count) return;

            if (!chapters.length) {
                nav.style.display = "none";
                return;
            }

            nav.style.display = "block";

            const indexCredit = buildCreditPill({
                type: activeProject.index_credit_type,
                name: activeProject.index_credit_name,
                username: activeProject.index_credit_nullverse_username,
                url: activeProject.index_credit_url,
                note: activeProject.index_credit_note,
                ownerUsername: activeOwnerProfile?.username,
                context: "Index Image"
            });
            if (indexCredit) nav.insertAdjacentHTML("beforeend", indexCredit);

            function paint() {
                const query = normalizeSearch(search.value || "");
                const filtered = chapters.map((chapter, index) => ({ chapter, index })).filter(({ chapter }) => {
                    const text = normalizeSearch(`${chapter.title || ""} ${chapter.subtitle || ""} ${plainTextFromRich(chapter.body || chapter.content || chapter.author_note || "")}`);
                    return !query || text.includes(query);
                });

                count.textContent = `${filtered.length} of ${chapters.length} chapter${chapters.length === 1 ? "" : "s"}`;
                links.innerHTML = filtered.map(({ chapter, index }) => {
                    const target = mode === "comic" ? `comic-chapter-${index}` : `chapter-${index + 1}`;
                    const small = mode === "comic"
                        ? `${(activePagesByChapter[chapter.id] || []).length} page${(activePagesByChapter[chapter.id] || []).length === 1 ? "" : "s"}`
                        : `${getChapterReadTime(chapter)} min read`;
                    return `
                            <a href="#${target}" class="chapter-nav-link" data-local-control="chapter-link" data-target="${target}">
                                <span>Chapter ${index + 1}: ${escapeHtml(chapter.title || "Untitled")}</span>
                                <small>${escapeHtml(chapter.subtitle || small)}</small>
                            </a>
                        `;
                }).join("") || `<p class="empty">No matching chapters.</p>`;
            }

            search.addEventListener("input", paint);
            links.addEventListener("click", event => {
                const link = event.target.closest("[data-target]");
                if (!link) return;
                event.preventDefault();
                document.getElementById(link.dataset.target)?.scrollIntoView({ behavior: "smooth", block: "start" });
            });

            paint();
        }

        function renderComicChapterGalleries() {
            const container = document.getElementById("chapters-gallery-container");
            if (!container) return;

            if (!activeChapters.length) {
                container.innerHTML = `<p class="empty">This preview does not have any comic chapters yet.</p>`;
                return;
            }

            container.innerHTML = activeChapters.map((chapter, chapterIndex) => {
                const pages = activePagesByChapter[chapter.id] || activePagesByChapter[String(chapter.id)] || [];
                return `
                        <section class="comic-gallery-panel" id="comic-chapter-${chapterIndex}">
                            <div class="gallery-top">
                                <div>
                                    <div class="chapter-eyebrow">Chapter ${chapterIndex + 1}</div>
                                    <h2>${escapeHtml(chapter.title || "Untitled")}</h2>
                                    ${chapter.subtitle ? `<div class="chapter-subtitle">${escapeHtml(chapter.subtitle)}</div>` : ""}
                                </div>
                                ${pages.length ? `<button class="button" type="button" data-local-control="open-reader" data-chapter-index="${chapterIndex}" data-page-index="0">Start Reading</button>` : ""}
                            </div>
                            ${chapter.author_note ? `<div class="author-note">${escapeHtml(chapter.author_note)}</div>` : ""}

                                <div class="chapter-gallery-grid">

                        </section>
                    `;

        function buildComicPageThumb(page, chapterIndex, pageIndex) {
            const imageUrl = getImageUrl(page, ["image_url", "page_image_url", "src"]);
            const hasCredit = !!buildPageCreditText(page);
            return `
                    <div class="page-thumb" role="button" tabindex="0" data-local-control="open-reader" data-chapter-index="${chapterIndex}" data-page-index="${pageIndex}">
                        ${imageUrl
                    ? `<img src="${escapeAttr(imageUrl)}" alt="${escapeAttr(page.title || `Page ${pageIndex + 1}`)}" style="${getImagePlacementStyle(page.image_placement || page.placement)}">`
                    : buildUnavailableImagePlaceholder(`Page ${pageIndex + 1}`)}
                        <div class="page-thumb-footer">
                            <span>Page ${pageIndex + 1}</span>
                            ${hasCredit ? `<span class="credit-dot">i</span>` : ""}
                        </div>
                    </div>
