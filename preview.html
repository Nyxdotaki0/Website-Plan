        function setupComicReaderControls() {
            document.querySelectorAll("[data-local-control]").forEach(control => {
                control.addEventListener("click", event => {
                    const button = event.currentTarget;
                    const action = button.dataset.localControl;

                    if (action === "open-reader") {
                        openReader(Number(button.dataset.chapterIndex) || 0, Number(button.dataset.pageIndex) || 0);
                    }
                    if (action === "reader-close") closeReader();
                    if (action === "reader-paged") setFullscreenMode("paged");
                    if (action === "reader-webtoon") setFullscreenMode("webtoon");
                    if (action === "reader-back") readerBack();
                    if (action === "reader-forward") readerForward();
                    if (action === "credit-sheet") toggleCreditSheet();
                });
            });
        }

        function openReader(chapterIndex, pageIndex) {
            readerChapterIndex = Math.max(0, Math.min(activeChapters.length - 1, chapterIndex));
            const pages = getCurrentReaderPages();
            readerPageIndex = Math.max(0, Math.min(Math.max(0, pages.length - 1), pageIndex));
            document.getElementById("reader-overlay")?.classList.add("open");
            document.body.classList.add("reader-open");
            renderReader();
        }

        function closeReader() {
            document.getElementById("reader-overlay")?.classList.remove("open");
            document.body.classList.remove("reader-open");
            closeCreditSheet();
        }

        function setFullscreenMode(mode) {
            fullscreenMode = mode === "webtoon" ? "webtoon" : "paged";
            renderReader();
        }

        function getCurrentReaderPages() {
            const chapter = activeChapters[readerChapterIndex];
            return chapter ? (activePagesByChapter[chapter.id] || activePagesByChapter[String(chapter.id)] || []) : [];
        }

        function renderReader() {
            const overlay = document.getElementById("reader-overlay");
            if (!overlay?.classList.contains("open")) return;

            const chapter = activeChapters[readerChapterIndex] || {};
            const pages = getCurrentReaderPages();
            const page = pages[readerPageIndex] || pages[0] || null;
            const stage = document.getElementById("reader-stage");
            const content = document.getElementById("reader-content");
            const desktopCredit = document.getElementById("reader-credit-desktop");
            const mobileCredit = document.getElementById("reader-credit-sheet");

            document.getElementById("reader-title").textContent = activeProject.title || "Comic Reader";
            document.getElementById("reader-subtitle").textContent = `Chapter ${readerChapterIndex + 1}: ${chapter.title || "Untitled"}`;
            document.getElementById("reader-mode-paged")?.classList.toggle("active", fullscreenMode === "paged");
            document.getElementById("reader-mode-webtoon")?.classList.toggle("active", fullscreenMode === "webtoon");
            stage?.classList.toggle("webtoon", fullscreenMode === "webtoon");

            if (!pages.length) {
                content.innerHTML = `<div class="preview-reader-empty">No pages are available in this chapter yet.</div>`;
                document.getElementById("reader-bottombar").textContent = "No pages";
                if (desktopCredit) desktopCredit.innerHTML = "";
                if (mobileCredit) mobileCredit.innerHTML = "";
                return;
            }

            if (fullscreenMode === "webtoon") {
                content.innerHTML = `
                        <div class="reader-webtoon-stack">
                            ${pages.map((readerPage, index) => {
                    const url = getImageUrl(readerPage, ["image_url", "page_image_url", "src"]);
                    return url
                        ? `<img src="${escapeAttr(url)}" alt="Page ${index + 1}" data-reader-page-index="${index}" style="${getImagePlacementStyle(readerPage.image_placement || readerPage.placement)}">`
                        : buildUnavailableImagePlaceholder(`Page ${index + 1}`);
                }).join("")}
                        </div>
                    `;
                document.getElementById("reader-bottombar").textContent = `${pages.length} page${pages.length === 1 ? "" : "s"} · Webtoon mode`;
            } else {
                const url = getImageUrl(page, ["image_url", "page_image_url", "src"]);
                content.innerHTML = url
                    ? `<img class="reader-page" src="${escapeAttr(url)}" alt="Page ${readerPageIndex + 1}" style="${getImagePlacementStyle(page.image_placement || page.placement)}">`
                    : buildUnavailableImagePlaceholder(`Page ${readerPageIndex + 1}`);
                document.getElementById("reader-bottombar").textContent = `Page ${readerPageIndex + 1} of ${pages.length}`;
            }

            const creditHtml = buildReaderCreditHtml(fullscreenMode === "webtoon" ? pages[readerPageIndex] || pages[0] : page);
            if (desktopCredit) desktopCredit.innerHTML = creditHtml;
            if (mobileCredit) mobileCredit.innerHTML = `<strong>Page Credit</strong><br><br>${creditHtml || "No credit listed for this page."}`;
        }

        function readerForward() {
            const pages = getCurrentReaderPages();
            if (!pages.length) return;

            if (readerPageIndex < pages.length - 1) {
                readerPageIndex += 1;
            } else if (readerChapterIndex < activeChapters.length - 1) {
                readerChapterIndex += 1;
                readerPageIndex = 0;
            }

            renderReader();
        }

        function readerBack() {
            if (readerPageIndex > 0) {
                readerPageIndex -= 1;
            } else if (readerChapterIndex > 0) {
                readerChapterIndex -= 1;
                const pages = getCurrentReaderPages();
                readerPageIndex = Math.max(0, pages.length - 1);
            }

            renderReader();
        }

        function toggleCreditSheet() {
            document.getElementById("reader-credit-sheet")?.classList.toggle("open");
        }

        function closeCreditSheet() {
            document.getElementById("reader-credit-sheet")?.classList.remove("open");
        }

        function buildReaderCreditHtml(page) {
            if (!page) return "";
            const text = buildPageCreditText(page);
            if (!text) return "";
            const note = page.image_credit_note || page.credit_note;
            return `${escapeHtml(text)}${note ? `<br>${escapeHtml(note)}` : ""}`;
        }

        function buildPageCreditText(page) {
            const type = page.image_credit_type || page.credit_type || "no_credit_needed";
            if (!type || type === "no_credit_needed") return "";
            if (type === "own_work") return `Credit: @${activeOwnerProfile?.username || "creator"}`;
            if (type === "nullverse_creator" && page.image_credit_nullverse_username) return `Credit: @${page.image_credit_nullverse_username}`;
            return `Credit: ${page.image_credit_name || page.credit_name || formatCreditType(type)}`;
        }

        function formatRichContent(value) {
            const rawInput = String(value ?? "").trim();
            if (!rawInput) return "No content yet.";

            try {
                const snapshot = extractRichTextSnapshot(rawInput);
                if (snapshot) {
                    const rendered = renderRichTextSnapshot(snapshot);
                    if (rendered && rendered.trim()) return rendered;
                }

                const withoutSnapshot = removeRichTextSnapshotComment(rawInput);
                const normalized = normalizeSavedRichText(withoutSnapshot);

                if (textLooksLikeRichHtml(normalized)) {
                    const cleaned = sanitizeRichHtml(normalized);
                    if (cleaned && cleaned.trim()) return cleaned;
                }

                return renderPlainText(normalized);
            } catch (error) {
                console.error("Preview rich text render error:", error);
                return renderPlainText(plainTextFromRich(rawInput));
            }
        }

        function extractRichTextSnapshot(value) {
            const raw = String(value ?? "");
            const match = raw.match(/<!--\s*NV_(?:WORLD|LITERATURE)_RICH_TEXT_V2:([A-Za-z0-9+/=]+)\s*-->/);
            if (!match) return null;

            try {
                const json = decodeURIComponent(escape(atob(match[1])));
                const snapshot = JSON.parse(json);
                if (!snapshot || snapshot.version !== 2 || !Array.isArray(snapshot.blocks)) return null;
                return snapshot;
            } catch (error) {
                console.error("Preview rich text snapshot decode error:", error);
                return null;
            }
        }

        function removeRichTextSnapshotComment(value) {
            return String(value ?? "").replace(/<!--\s*NV_(?:WORLD|LITERATURE)_RICH_TEXT_V2:[A-Za-z0-9+/=]+\s*-->/g, "").trim();
        }

        function renderRichTextSnapshot(snapshot) {
            return (snapshot.blocks || []).map(renderRichTextSnapshotBlock).filter(Boolean).join("");
        }

        function renderRichTextSnapshotBlock(block) {
            const tag = normalizeRichTextTag(block?.tag || "p");
            const style = renderRichTextStyle(block?.style || {}, "block");

            if (tag === "ul" || tag === "ol") {
                const items = Array.isArray(block.items) ? block.items : [];
                const html = items.map(item => {
                    const itemStyle = renderRichTextStyle(item?.style || {}, "block");
                    const runs = renderRichTextRuns(item?.runs || []);
                    return `<li data-nv-world-rich-block="true" data-nv-literature-rich-block="true"${itemStyle ? ` style="${itemStyle}"` : ""}>${runs}</li>`;
                }).join("");
                return `<${tag} data-nv-world-rich-block="true" data-nv-literature-rich-block="true"${style ? ` style="${style}"` : ""}>${html}</${tag}>`;
            }

            const runs = renderRichTextRuns(block?.runs || []);
            if (!runs.trim()) return "";
            return `<${tag} data-nv-world-rich-block="true" data-nv-literature-rich-block="true"${style ? ` style="${style}"` : ""}>${runs}</${tag}>`;
        }

        function renderRichTextRuns(runs) {
            return (Array.isArray(runs) ? runs : []).map(run => {
                if (run?.break) return "<br>";
                const text = String(run?.text ?? "");
                if (!text) return "";
                const style = renderRichTextStyle(run?.style || {}, "run");
                return `<span data-nv-world-rich-run="true" data-nv-literature-rich-run="true"${style ? ` style="${style}"` : ""}>${escapeHtml(text)}</span>`;
            }).join("");
        }

        function normalizeRichTextTag(value) {
            const tag = String(value || "p").toLowerCase();
            const allowed = new Set(["p", "div", "h1", "h2", "h3", "h4", "blockquote", "ul", "ol", "li"]);
            return allowed.has(tag) ? tag : "p";
        }

        function renderRichTextStyle(styleMap, kind = "run") {
            const rules = [];
            function add(prop, value) {
                if (value) rules.push(`${prop}: ${escapeHtml(value)} !important`);
            }
            if (styleMap.fontFamily) add("font-family", getTrustedFontStack(styleMap.fontFamily));
            if (styleMap.fontSize) add("font-size", normalizeFontSize(styleMap.fontSize));
            if (styleMap.color) add("color", normalizeCssColor(styleMap.color));
            if (styleMap.backgroundColor) {
                const bg = normalizeCssColor(styleMap.backgroundColor);
                if (bg && !/transparent|rgba\(\s*0\s*,\s*0\s*,\s*0\s*,\s*0\s*\)/i.test(bg)) add("background-color", bg);
            }
            if (styleMap.fontWeight) add("font-weight", normalizeFontWeight(styleMap.fontWeight));
            if (styleMap.fontStyle) add("font-style", normalizeFontStyle(styleMap.fontStyle));
            if (styleMap.textDecoration) add("text-decoration", normalizeTextDecoration(styleMap.textDecoration));
            if (styleMap.lineHeight) add("line-height", normalizeLineHeight(styleMap.lineHeight));
            if (kind === "block") {
                if (styleMap.textAlign) add("text-align", normalizeTextAlign(styleMap.textAlign));
                if (styleMap.marginBottom) add("margin-bottom", normalizeSafeLength(styleMap.marginBottom, -120, 160));
            }
            return rules.join("; ");
        }

        function sanitizeRichHtml(html) {
            const template = document.createElement("template");
            template.innerHTML = normalizeSavedRichText(html);
            expandEscapedRichTextNodes(template.content);
            convertLegacyFontTags(template.content);

            const allowedTags = new Set(["P", "BR", "DIV", "SPAN", "MARK", "STRONG", "B", "EM", "I", "U", "S", "STRIKE", "SUP", "SUB", "H1", "H2", "H3", "H4", "UL", "OL", "LI", "BLOCKQUOTE", "A", "HR"]);
            const removedTags = new Set(["SCRIPT", "STYLE", "IFRAME", "OBJECT", "EMBED", "IMG", "VIDEO", "AUDIO", "SVG", "MATH"]);
            const allowedAttrs = new Set(["href", "target", "rel", "style", "data-nv-font-family", "data-nv-font-size", "data-nv-rich-text"]);

            function clean(node) {
                [...node.childNodes].forEach(child => {
                    if (child.nodeType === Node.COMMENT_NODE) { child.remove(); return; }
                    if (child.nodeType === Node.TEXT_NODE) return;
                    if (child.nodeType !== Node.ELEMENT_NODE) { child.remove(); return; }

                    if (removedTags.has(child.tagName)) { child.remove(); return; }
                    if (!allowedTags.has(child.tagName)) {
                        clean(child);
                        child.replaceWith(...child.childNodes);
                        return;
                    }

                    [...child.attributes].forEach(attr => {
                        const name = attr.name.toLowerCase();
                        if (!allowedAttrs.has(name)) { child.removeAttribute(attr.name); return; }
                        if (name === "style") {
                            const safeStyle = sanitizeInlineStyle(child.getAttribute("style") || "");
                            if (safeStyle) child.setAttribute("style", safeStyle); else child.removeAttribute("style");
                        }
                        if (name === "data-nv-font-family") {
                            const trusted = getTrustedFontStack(child.getAttribute("data-nv-font-family") || "");
                            if (trusted) child.style.fontFamily = trusted; else child.removeAttribute("data-nv-font-family");
                        }
                        if (name === "data-nv-font-size") {
                            const size = normalizeFontSize(child.getAttribute("data-nv-font-size") || "");
                            if (size) child.style.fontSize = size; else child.removeAttribute("data-nv-font-size");
                        }
                        if (name === "href") {
                            const href = child.getAttribute("href") || "";
                            if (!/^https?:\/\//i.test(href) && !href.startsWith("#")) child.removeAttribute("href");
                            child.setAttribute("data-preview-action", "Link");
                        }
                    });

                    if (child.tagName === "A") {
                        child.setAttribute("target", "_blank");
                        child.setAttribute("rel", "noopener noreferrer");
                    }

                    clean(child);
                    removeEmptyInlineShell(child);
                });
            }

            clean(template.content);
            return template.innerHTML;
        }

        function normalizeRenderedRichText(root) {
            if (!root) return;
            root.querySelectorAll("b,strong").forEach(element => element.style.setProperty("font-weight", element.style.fontWeight || "700", "important"));
            root.querySelectorAll("i,em").forEach(element => element.style.setProperty("font-style", element.style.fontStyle || "italic", "important"));
            root.querySelectorAll("u").forEach(element => element.style.setProperty("text-decoration", element.style.textDecoration || "underline", "important"));
            root.querySelectorAll("s,strike").forEach(element => element.style.setProperty("text-decoration", element.style.textDecoration || "line-through", "important"));
            root.querySelectorAll("span,mark,b,strong,i,em,u,s,strike,p,div,li,blockquote,h1,h2,h3,h4").forEach(element => promoteInlineStylePriority(element));
        }

        function promoteInlineStylePriority(element) {
            if (!element?.style) return;
            ["font-family", "font-size", "color", "background-color", "font-weight", "font-style", "text-decoration", "text-decoration-line", "line-height", "text-align", "margin", "margin-top", "margin-right", "margin-bottom", "margin-left", "padding-left", "text-indent", "letter-spacing", "word-spacing"].forEach(prop => {
                const value = element.style.getPropertyValue(prop);
                if (value) element.style.setProperty(prop, value, "important");
            });
        }

        function renderPlainText(value) {
            const raw = String(value || "");
            if (!raw.trim()) return "No content yet.";
            return raw.split(/\n{2,}/).map(block => `<p>${escapeHtml(block).replaceAll("\n", "<br>")}</p>`).join("");
        }

        function plainTextFromRich(html) {
            try {
                const snapshot = extractRichTextSnapshot(String(html || ""));
                if (snapshot) {
                    return (snapshot.blocks || []).map(block => {
                        if (Array.isArray(block.items)) {
                            return block.items.map(item => (item.runs || []).map(run => run?.break ? "\n" : String(run?.text || "")).join("")).join("\n");
                        }
                        return (block.runs || []).map(run => run?.break ? "\n" : String(run?.text || "")).join("");
                    }).join("\n");
                }

                const holder = document.createElement("div");
                holder.innerHTML = sanitizeRichHtml(removeRichTextSnapshotComment(String(html || "")));
                return holder.textContent || holder.innerText || String(html || "");
            } catch {
                return String(html || "").replace(/<[^>]+>/g, " ");
            }
        }

        function normalizeSavedRichText(value) {
            let text = String(value ?? "").trim();
            if (!text) return "";
            text = text.replace(/^\uFEFF/, "").trim();
            text = decodeBackslashEscapes(text);
            text = stripOuterStringQuotes(text);
            text = decodeRichHtmlEntities(text).trim();
            text = decodeBackslashEscapes(text);
            text = stripOuterStringQuotes(text);
            return text.trim();
        }

        function stripOuterStringQuotes(value) {
            let text = String(value || "").trim();
            for (let i = 0; i < 2; i++) {
                const startsDouble = text.startsWith('"') && text.endsWith('"');
                const startsSingle = text.startsWith("'") && text.endsWith("'");
                if (!startsDouble && !startsSingle) break;
                if (startsDouble) {
                    try {
                        const parsed = JSON.parse(text);
                        if (typeof parsed === "string") { text = parsed.trim(); continue; }
                    } catch { }
                }
                const inner = text.slice(1, -1).trim();
                if (textLooksLikeRichHtml(inner) || textLooksLikeEscapedRichHtml(inner) || /\\u003c|\\x3c/i.test(inner)) {
                    text = inner;
                    continue;
                }
                break;
            }
            return text;
        }

        function decodeBackslashEscapes(value) {
            return String(value || "")
                .replace(/\\u003c/gi, "<")
                .replace(/\\u003e/gi, ">")
                .replace(/\\u0026/gi, "&")
                .replace(/\\u0022/gi, '"')
                .replace(/\\u0027/gi, "'")
                .replace(/\\x3c/gi, "<")
                .replace(/\\x3e/gi, ">")
                .replace(/\\"/g, '"')
                .replace(/\\'/g, "'");
        }

        function textLooksLikeRichHtml(value) {
            return /<\s*\/?\s*(p|br|div|span|font|strong|b|em|i|u|s|strike|sup|sub|h1|h2|h3|h4|ul|ol|li|blockquote|a|hr|mark)\b/i.test(String(value || ""));
        }

        function textLooksLikeEscapedRichHtml(value) {
            return /&(?:amp;)*lt;\s*\/?\s*(p|br|div|span|font|strong|b|em|i|u|s|strike|sup|sub|h1|h2|h3|h4|ul|ol|li|blockquote|a|hr|mark)\b/i.test(String(value || ""));
        }

        function decodeRichHtmlEntities(value) {
            let decoded = String(value || "");
            if (!textLooksLikeEscapedRichHtml(decoded) && !/&(?:amp;)*(?:quot|#0*34|#x0*22);/i.test(decoded)) return decoded;
            for (let i = 0; i < 5; i++) {
                const previous = decoded;
                const textarea = document.createElement("textarea");
                textarea.innerHTML = decoded;
                decoded = textarea.value;
                if (textLooksLikeRichHtml(decoded)) return decoded;
                if (decoded === previous || !textLooksLikeEscapedRichHtml(decoded)) break;
            }
            return decoded;
        }

        function expandEscapedRichTextNodes(root) {
            const walker = document.createTreeWalker(root, NodeFilter.SHOW_TEXT);
            const textNodes = [];
            while (walker.nextNode()) textNodes.push(walker.currentNode);
            textNodes.forEach(textNode => {
                const text = String(textNode.nodeValue || "");
                if (!textLooksLikeRichHtml(text) && !textLooksLikeEscapedRichHtml(text)) return;
                const normalized = normalizeSavedRichText(text);
                if (!textLooksLikeRichHtml(normalized)) return;
                const template = document.createElement("template");
                template.innerHTML = normalized;
                textNode.replaceWith(...template.content.childNodes);
            });
        }

        function convertLegacyFontTags(root) {
            root.querySelectorAll?.("font").forEach(font => {
                const span = document.createElement("span");
                if (font.getAttribute("face")) span.style.fontFamily = getTrustedFontStack(font.getAttribute("face"));
                if (font.getAttribute("color")) span.style.color = normalizeCssColor(font.getAttribute("color"));
                if (font.getAttribute("size")) span.style.fontSize = mapLegacyFontSize(font.getAttribute("size"));
                span.innerHTML = font.innerHTML;
                font.replaceWith(span);
            });
        }

        function mapLegacyFontSize(size) {
            return ({ "1": "12px", "2": "14px", "3": "16px", "4": "18px", "5": "24px", "6": "32px", "7": "40px" })[String(size).trim()] || "";
        }

        function sanitizeInlineStyle(styleText) {
            const safeRules = [];
            String(styleText || "").split(";").map(rule => rule.trim()).filter(Boolean).forEach(rule => {
                const separator = rule.indexOf(":");
                if (separator === -1) return;
                const prop = rule.slice(0, separator).trim().toLowerCase();
                const value = rule.slice(separator + 1).trim().replace(/\s*!important\s*$/i, "");
                const safeValue = sanitizeStyleValue(prop, value);
                if (prop && safeValue) safeRules.push(`${prop}: ${safeValue}`);
            });
            return safeRules.join("; ");
        }

        function sanitizeStyleValue(prop, value) {
            if (!prop || !value) return "";
            if (/url\s*\(|expression\s*\(|javascript:|data:/i.test(value)) return "";
            if (["color", "background-color", "background"].includes(prop)) return normalizeCssColor(value);
            if (prop === "font-family") return getTrustedFontStack(value);
            if (prop === "font-size") return normalizeFontSize(value);
            if (prop === "line-height") return normalizeLineHeight(value);
            if (prop === "text-align") return normalizeTextAlign(value);
            if (prop === "font-weight") return normalizeFontWeight(value);
            if (prop === "font-style") return normalizeFontStyle(value);
            if (prop === "text-decoration" || prop === "text-decoration-line") return normalizeTextDecoration(value);
            if (["margin", "margin-top", "margin-right", "margin-bottom", "margin-left", "padding-left", "text-indent", "letter-spacing", "word-spacing"].includes(prop)) return normalizeSafeLength(value, -120, 160);
            return "";
        }

        function decodeFontValue(value) {
            return String(value || "")
                .replaceAll("&quot;", '"')
                .replaceAll("&#034;", '"')
                .replaceAll("&#34;", '"')
                .replaceAll("&apos;", "'")
                .replaceAll("&#039;", "'")
                .replaceAll("&#39;", "'")
                .replace(/\\"/g, '"')
                .replace(/\\'/g, "'")
                .trim();
        }

        function getTrustedFontStack(value) {
            const decoded = decodeFontValue(value);
            const first = decoded.split(",")[0].trim().replace(/^["']+|["']+$/g, "").replace(/\s+/g, " ");
            if (!first) return "";
            const lower = first.toLowerCase();
            if (WORLD_EDITOR_FONT_ALIASES[lower]) return WORLD_EDITOR_FONT_STACKS[WORLD_EDITOR_FONT_ALIASES[lower]];
            const direct = Object.keys(WORLD_EDITOR_FONT_STACKS).find(font => font.toLowerCase() === lower);
            if (direct) return WORLD_EDITOR_FONT_STACKS[direct];
            const partial = Object.keys(WORLD_EDITOR_FONT_STACKS).find(font => decoded.toLowerCase().includes(font.toLowerCase()));
            if (partial) return WORLD_EDITOR_FONT_STACKS[partial];
            const safe = first.replace(/[^a-zA-Z0-9\s\-]/g, "").trim();
            return safe ? `"${safe}", Arial, Helvetica, sans-serif` : "";
        }

        function normalizeCssColor(value) {
            const clean = String(value || "").trim();
            if (!clean) return "";
            const probe = document.createElement("span");
            probe.style.color = clean;
            if (probe.style.color) return probe.style.color;
            probe.style.backgroundColor = clean;
            return probe.style.backgroundColor || "";
        }

        function normalizeFontSize(value) {
            const raw = String(value || "").trim().toLowerCase();
            if (!raw) return "";
            let px = null;
            if (raw.endsWith("px")) px = Number(raw.replace("px", ""));
            else if (raw.endsWith("pt")) px = Number(raw.replace("pt", "")) * 1.333;
            else if (raw.endsWith("em") || raw.endsWith("rem")) px = Number(raw.replace("rem", "").replace("em", "")) * 18;
            else if (raw.endsWith("%")) px = 18 * (Number(raw.replace("%", "")) / 100);
            else if (/^\d+(\.\d+)?$/.test(raw)) px = Number(raw);
            if (!Number.isFinite(px)) return "";
            return `${Math.round(Math.max(10, Math.min(72, px)) * 100) / 100}px`;
        }

        function normalizeLineHeight(value) {
            const raw = String(value || "").trim().toLowerCase();
            if (/^\d+(\.\d+)?$/.test(raw)) {
                const number = Number(raw);
                return number >= 0.8 && number <= 3.5 ? String(number) : "";
            }
            if (raw.endsWith("px")) return normalizeSafeLength(raw, 10, 90);
            if (raw.endsWith("%")) {
                const percent = Number(raw.replace("%", ""));
                return percent >= 80 && percent <= 350 ? `${percent}%` : "";
            }
            return "";
        }

        function normalizeSafeLength(value, min, max) {
            const raw = String(value || "").trim().toLowerCase();
            let number = null;
            let unit = "px";
            if (raw.endsWith("px")) number = Number(raw.replace("px", ""));
            else if (raw.endsWith("em")) number = Number(raw.replace("em", "")) * 18;
            else if (raw.endsWith("rem")) number = Number(raw.replace("rem", "")) * 18;
            else if (/^-?\d+(\.\d+)?$/.test(raw)) number = Number(raw);
            if (!Number.isFinite(number)) return "";
            return `${Math.round(Math.max(min, Math.min(max, number)) * 100) / 100}${unit}`;
        }

        function normalizeFontWeight(value) {
            const clean = String(value || "").trim().toLowerCase();
            if (["bold", "normal", "bolder", "lighter"].includes(clean)) return clean;
            const weight = Number(clean);
            return weight >= 100 && weight <= 900 ? String(weight) : "";
        }

        function normalizeFontStyle(value) {
            const clean = String(value || "").trim().toLowerCase();
            return ["italic", "normal", "oblique"].includes(clean) ? clean : "";
        }

        function normalizeTextDecoration(value) {
            const clean = String(value || "").trim().toLowerCase();
            if (clean.includes("underline")) return "underline";
            if (clean.includes("line-through")) return "line-through";
            if (clean === "none") return "none";
            return "";
        }

        function normalizeTextAlign(value) {
            const clean = String(value || "").trim().toLowerCase();
            return new Set(["left", "center", "right", "justify", "start", "end"]).has(clean) ? clean : "";
        }

        function removeEmptyInlineShell(element) {
            if (!element || !["SPAN", "B", "STRONG", "EM", "I", "U", "S", "MARK"].includes(element.tagName)) return;
            const text = element.textContent || "";
            const hasBreak = element.querySelector?.("br,hr");
            if (!text.trim() && !hasBreak) element.remove();
        }

        function normalizeSearch(value) {
            return String(value || "")
                .normalize("NFD")
                .replace(/[\u0300-\u036f]/g, "")
                .toLowerCase()
                .replace(/&/g, " and ")
                .replace(/['’‘"`´]/g, "")
                .replace(/[^a-z0-9]+/g, " ")
                .replace(/\s+/g, " ")
                .trim();
        }

        function countWords(value) {
            const words = String(value || "").trim().match(/\b[\w'’-]+\b/g);
            return words ? words.length : 0;
        }
    </script>
</body>
