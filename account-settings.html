<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Account Settings - Nullverse</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #0d0d12;
            color: #f2f2f2;
        }

        header {
            padding: 24px 40px;
            border-bottom: 1px solid #2a2a35;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #111118;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .logo a {
            color: white;
            text-decoration: none;
            font-size: 1.6rem;
            font-weight: bold;
        }

        nav {
            display: flex;
            gap: 22px;
            align-items: center;
            flex-wrap: wrap;
        }

            nav a, nav button {
                color: #cfcfd8;
                text-decoration: none;
                background: none;
                border: none;
                cursor: pointer;
                font-family: Arial, sans-serif;
                font-size: 0.95rem;
            }

        main {
            max-width: 950px;
            margin: auto;
            padding: 40px;
        }

        .panel {
            background: #15151f;
            border: 1px solid #2a2a35;
            border-radius: 12px;
            padding: 24px;
            margin-bottom: 22px;
        }

        .profile-preview {
            overflow: hidden;
            padding: 0;
        }

        .banner {
            height: 190px;
            background: #242436;
            background-size: cover;
            background-position: center;
            border-bottom: 1px solid #2a2a35;
        }

        .profile-row {
            display: flex;
            align-items: flex-end;
            gap: 18px;
            padding: 0 24px 24px;
            margin-top: -55px;
        }

        .avatar {
            width: 115px;
            height: 115px;
            border-radius: 50%;
            object-fit: cover;
            background: #2a2a35;
            border: 5px solid #15151f;
        }

        .profile-info h1 {
            margin: 0;
            font-size: 2rem;
        }

        .profile-info p {
            margin: 6px 0 0;
            color: #bdbdca;
        }

        input, textarea, select {
            width: 100%;
            margin-bottom: 14px;
            padding: 12px;
            border-radius: 8px;
            border: 1px solid #333344;
            background: #0d0d12;
            color: white;
            font-family: Arial, sans-serif;
            box-sizing: border-box;
        }

        label {
            display: block;
            margin-bottom: 6px;
            color: #d7d7e2;
            font-size: 0.9rem;
        }

        button, .button {
            display: inline-block;
            background: #2a2a44;
            color: white;
            border: none;
            padding: 10px 14px;
            border-radius: 8px;
            cursor: pointer;
            text-decoration: none;
            font-family: Arial, sans-serif;
            margin-top: 4px;
        }

            button:hover, .button:hover {
                background: #3a3a5c;
            }

        p {
            color: #c8c8d4;
            line-height: 1.6;
        }

        .message {
            color: #bdbdca;
            margin-top: 12px;
        }

        .grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 18px;
        }

        @media (max-width: 800px) {
            header {
                flex-direction: column;
                gap: 14px;
            }

            .grid {
                grid-template-columns: 1fr;
            }

            .profile-row {
                flex-direction: column;
                align-items: flex-start;
            }
        }
    </style>
</head>

<body>

    <header>
        <div class="logo">
            <a href="index.html">Nullverse</a>
        </div>

        <nav>
            <a href="index.html">Home</a>
            <a href="explore.html">Explore</a>
            <a href="world.html">Worlds</a>
            <a href="character.html">Characters</a>
            <a href="story.html">Stories</a>
            <a href="dashboard.html">Dashboard</a>
            <button onclick="logOut()">Log Out</button>
        </nav>
    </header>

    <main>

        <section class="panel profile-preview">
            <div id="banner-preview" class="banner"></div>

            <div class="profile-row">
                <img id="avatar-preview" class="avatar" src="" alt="Profile picture">

                <div class="profile-info">
                    <h1 id="preview-name">Your Profile</h1>
                    <p id="preview-username">@username</p>
                    <p id="preview-bio">Your bio will appear here.</p>
                </div>
            </div>
        </section>

        <section class="panel">
            <h2>Edit Public Profile</h2>

            <label>Banner Image</label>
            <input id="banner-file" type="file" accept="image/*">

            <label>Profile Picture</label>
            <input id="avatar-file" type="file" accept="image/*">

            <div class="grid">
                <div>
                    <label>Username</label>
                    <input id="username" placeholder="nyx">
                </div>

                <div>
                    <label>Display Name</label>
                    <input id="display-name" placeholder="Nyx">
                </div>
            </div>

            <label>Creator Type</label>
            <select id="creator-type">
                <option value="">Choose creator type</option>
                <option value="Worldbuilder">Worldbuilder</option>
                <option value="Writer">Writer</option>
                <option value="Artist">Artist</option>
                <option value="Character Creator">Character Creator</option>
                <option value="Mixed Creator">Mixed Creator</option>
            </select>

            <label>Bio</label>
            <textarea id="bio" rows="5" placeholder="Tell people what you create..."></textarea>

            <div class="grid">
                <div>
                    <label>Phone Number</label>
                    <input id="phone" placeholder="Optional">
                </div>

                <div>
                    <label>Location</label>
                    <input id="location" placeholder="Optional">
                </div>
            </div>

            <label>Website / Social Link</label>
            <input id="website" placeholder="https://example.com">

            <button onclick="saveProfile()">Save Profile</button>
            <p id="profile-message" class="message"></p>
        </section>

        <section class="panel">
            <h2>Account Security</h2>
            <p id="account-email">Checking account...</p>

            <label>New Email</label>
            <input id="new-email" type="email" placeholder="new@email.com">
            <button onclick="changeEmail()">Change Email</button>
            <p id="email-message" class="message"></p>

            <label>New Password</label>
            <input id="new-password" type="password" placeholder="New password">
            <button onclick="changePassword()">Change Password</button>
            <p id="password-message" class="message"></p>
        </section>

        <section class="panel">
            <h2>Works Gallery</h2>
            <p>Your worlds, characters, stories, documents, and languages will appear here later.</p>
            <a class="button" href="dashboard.html">Back to Dashboard</a>
        </section>

    </main>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <script>
        const SUPABASE_URL = "https://baaygzddafopihtxyyjq.supabase.co";
        const SUPABASE_ANON_KEY = "sb_publishable_O0JPmpCSe7TDoUxotIe4aQ_4EBgEBV8";

        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        let currentUser = null;
        let currentAvatarUrl = "";
        let currentBannerUrl = "";

        const defaultAvatar = "https://baaygzddafopihtxyyjq.supabase.co/storage/v1/object/public/avatars/default-avatar.png";

        async function checkUserAndLoadProfile() {
            const { data: { user }, error } = await supabaseClient.auth.getUser();

            if (error || !user) {
                window.location.href = "login.html";
                return;
            }

            currentUser = user;
            document.getElementById("account-email").textContent = "Signed in as: " + user.email;

            const { data: profile, error: profileError } = await supabaseClient
                .from("profiles")
                .select("*")
                .eq("id", user.id)
                .single();

            if (profileError || !profile) {
                document.getElementById("profile-message").textContent = "No profile found yet. Fill this out and save.";
                return;
            }

            document.getElementById("username").value = profile.username || "";
            document.getElementById("display-name").value = profile.display_name || "";
            document.getElementById("creator-type").value = profile.creator_type || "";
            document.getElementById("bio").value = profile.bio || "";
            document.getElementById("phone").value = profile.phone || "";
            document.getElementById("website").value = profile.website || "";
            document.getElementById("location").value = profile.location || "";

            currentAvatarUrl = profile.avatar_url || "";
            currentBannerUrl = profile.banner_url || "";

            updatePreview(profile);
        }

        function updatePreview(profile) {
            document.getElementById("preview-name").textContent = profile.display_name || "Your Profile";
            document.getElementById("preview-username").textContent = profile.username ? "@" + profile.username : "@username";
            document.getElementById("preview-bio").textContent = profile.bio || "Your bio will appear here.";

            if (profile.avatar_url) {
                document.getElementById("avatar-preview").src = profile.avatar_url;
            }

            if (profile.banner_url) {
                document.getElementById("banner-preview").style.backgroundImage = `url('${profile.banner_url}')`;
            }
        }

        async function uploadFileIfSelected(inputId, bucketName, currentUrl, fileNameBase) {
            const fileInput = document.getElementById(inputId);
            const file = fileInput.files[0];

            if (!file) {
                return currentUrl;
            }

            const fileExtension = file.name.split(".").pop();
            const filePath = currentUser.id + "/" + fileNameBase + "-" + Date.now() + "." + fileExtension;

            const { error: uploadError } = await supabaseClient.storage
                .from(bucketName)
                .upload(filePath, file);

            if (uploadError) {
                throw uploadError;
            }

            const { data } = supabaseClient.storage
                .from(bucketName)
                .getPublicUrl(filePath);

            return data.publicUrl + "?v=" + Date.now();
        }

        async function saveProfile() {
            const profileMessage = document.getElementById("profile-message");

            if (!currentUser) {
                window.location.href = "login.html";
                return;
            }

            try {
                const avatarUrl = await uploadFileIfSelected("avatar-file", "avatars", currentAvatarUrl, "avatar");
                const bannerUrl = await uploadFileIfSelected("banner-file", "banners", currentBannerUrl, "banner");

                const username = document.getElementById("username").value.trim();
                const displayName = document.getElementById("display-name").value.trim();
                const creatorType = document.getElementById("creator-type").value;
                const bio = document.getElementById("bio").value.trim();
                const phone = document.getElementById("phone").value.trim();
                const website = document.getElementById("website").value.trim();
                const location = document.getElementById("location").value.trim();

                if (!username || !displayName) {
                    profileMessage.textContent = "Username and display name are required.";
                    return;
                }

                const updatedProfile = {
                    id: currentUser.id,
                    username: username,
                    display_name: displayName,
                    creator_type: creatorType,
                    bio: bio,
                    phone: phone,
                    website: website,
                    location: location,
                    avatar_url: avatarUrl,
                    banner_url: bannerUrl
                };

                const { error } = await supabaseClient
                    .from("profiles")
                    .upsert(updatedProfile);

                if (error) {
                    profileMessage.textContent = error.message;
                } else {
                    currentAvatarUrl = avatarUrl;
                    currentBannerUrl = bannerUrl;
                    updatePreview(updatedProfile);
                    profileMessage.textContent = "Profile updated successfully.";
                }
            } catch (error) {
                profileMessage.textContent = error.message;
            }
        }

        async function changeEmail() {
            const newEmail = document.getElementById("new-email").value.trim();
            const emailMessage = document.getElementById("email-message");

            if (!newEmail) {
                emailMessage.textContent = "Enter a new email first.";
                return;
            }

            const { error } = await supabaseClient.auth.updateUser({
                email: newEmail
            });

            if (error) {
                emailMessage.textContent = error.message;
            } else {
                emailMessage.textContent = "Email change started. Check your email for confirmation.";
            }
        }

        async function changePassword() {
            const newPassword = document.getElementById("new-password").value.trim();
            const passwordMessage = document.getElementById("password-message");

            if (!newPassword) {
                passwordMessage.textContent = "Enter a new password first.";
                return;
            }

            const { error } = await supabaseClient.auth.updateUser({
                password: newPassword
            });

            if (error) {
                passwordMessage.textContent = error.message;
            } else {
                passwordMessage.textContent = "Password updated successfully.";
                document.getElementById("new-password").value = "";
            }
        }

        async function logOut() {
            await supabaseClient.auth.signOut();
            window.location.href = "login.html";
        }

        checkUserAndLoadProfile();
    </script>

</body>
</html>
