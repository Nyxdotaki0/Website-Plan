<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" href="favicon.png">
    <title>World Q&A - Nullverse</title>

    <script>
        const savedNullverseTheme =
            localStorage.getItem("nullverse-theme") || "void";

        document.documentElement.setAttribute(
            "data-theme",
            savedNullverseTheme
        );
    </script>

    <link rel="stylesheet" href="theme.css?v=25">

    <style>
        html {
            min-height: 100%;
            background: #000000;
        }

        body {
            margin: 0;
            min-height: 100vh;
            font-family: Arial, sans-serif;
            background: var(--page-bg);
            background-attachment: fixed;
            color: var(--text-primary);
        }

        header {
            padding: 12px 40px;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(12,12,14,0.72);
            position: sticky;
            top: 0;
            z-index: 100;
            backdrop-filter: blur(18px);
            -webkit-backdrop-filter: blur(18px);
            box-shadow: 0 10px 35px rgba(0,0,0,0.28);
        }

        .logo,
        .logo a {
            display: flex;
            align-items: center;
        }

        .site-logo {
            height: 64px;
            width: auto;
            display: block;
            max-width: none;
        }

        nav {
            display: flex;
            gap: 22px;
            flex-wrap: wrap;
        }

            nav a,
            nav button {
                color: var(--text-secondary);
                text-decoration: none;
                background: none;
                border: none;
                cursor: pointer;
                font-family: Arial, sans-serif;
                transition: 0.18s ease;
            }

                nav a:hover,
                nav button:hover {
                    color: white;
                }

        main {
            max-width: 950px;
            margin: auto;
            padding: 45px 40px 80px;
        }

        .hero,
        .panel {
            background: linear-gradient( 135deg, rgba(255,255,255,0.06), rgba(255,255,255,0.02) ), var(--panel-bg);
            border: 1px solid var(--border-color);
            border-radius: 22px;
            padding: 30px;
            margin-bottom: 24px;
            backdrop-filter: blur(18px);
            -webkit-backdrop-filter: blur(18px);
            box-shadow: 0 18px 40px rgba(0,0,0,0.24), 0 0 24px rgba(255,255,255,0.03);
        }

        h1 {
            margin: 0 0 10px;
            font-size: 2.8rem;
            line-height: 1.05;
        }

        h2 {
            margin-top: 0;
        }

        p {
            color: var(--text-secondary);
            line-height: 1.7;
        }

        textarea {
            width: 100%;
            box-sizing: border-box;
            padding: 14px;
            border-radius: 14px;
            border: 1px solid var(--border-color);
            background: rgba(0,0,0,0.22);
            color: var(--text-primary);
            resize: vertical;
            font-family: Arial, sans-serif;
            margin-bottom: 14px;
            transition: 0.18s ease;
        }

            textarea:focus {
                outline: none;
                border-color: rgba(255,255,255,0.16);
                box-shadow: 0 0 18px rgba(255,255,255,0.05);
            }

        .button {
            display: inline-block;
            background: linear-gradient( 180deg, #2a2a2f 0%, #16161a 45%, #0d0d10 100% );
            color: #f5f5f5;
            border: 1px solid rgba(255,255,255,0.12);
            padding: 10px 14px;
            border-radius: 10px;
            cursor: pointer;
            text-decoration: none;
            font-family: Arial, sans-serif;
            transition: 0.18s ease;
            box-shadow: 0 0 16px rgba(255,255,255,0.08), inset 0 1px 0 rgba(255,255,255,0.06);
        }

            .button:hover {
                background: linear-gradient( 180deg, #3a3a40 0%, #202026 45%, #111116 100% );
                border-color: rgba(255,255,255,0.18);
                box-shadow: 0 0 20px rgba(255,255,255,0.12), inset 0 1px 0 rgba(255,255,255,0.08);
                transform: translateY(-1px);
            }

        .question-card {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 18px;
            padding: 24px;
            margin-bottom: 20px;
            box-shadow: 0 12px 30px rgba(0,0,0,0.18);
            transition: 0.18s ease;
        }

            .question-card:hover {
                transform: translateY(-2px);
                border-color: rgba(255,255,255,0.12);
                box-shadow: 0 18px 40px rgba(0,0,0,0.24), 0 0 22px rgba(255,255,255,0.05);
            }

        .author {
            color: var(--text-muted);
            margin-bottom: 14px;
            font-size: 0.95rem;
        }

        .answer {
            margin-top: 20px;
            padding: 18px;
            border-radius: 14px;
            background: linear-gradient( 180deg, rgba(255,255,255,0.05), rgba(255,255,255,0.015) );
            border: 1px solid var(--border-color);
            box-shadow: inset 0 1px 0 rgba(255,255,255,0.04);
        }

            .answer p {
                margin-bottom: 0;
            }

        .empty {
            color: var(--text-muted);
        }

        .notification-link {
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }

        .notification-badge {
            min-width: 18px;
            height: 18px;
            padding: 0 6px;
            border-radius: 999px;
            background: white;
            color: black;
            font-size: 0.72rem;
            align-items: center;
            justify-content: center;
            line-height: 1;
        }

        @media (max-width: 800px) {
            header {
                flex-direction: column;
                gap: 14px;
                padding: 20px;
            }

            nav {
                justify-content: center;
            }

            main {
                padding: 32px 24px 70px;
            }

            h1 {
                font-size: 2.2rem;
            }

            .hero,
            .panel {
                padding: 24px;
            }
        }
    </style>
</head>

<body>
    <div class="nullverse-stars"></div>
    <header>
        <div class="logo">
            <a href="index.html">
                <img src="Nullverse-3.png"
                     alt="Nullverse"
                     class="site-logo">
            </a>
        </div>

        <nav>
            <a href="index.html">Home</a>
            <a href="notifications.html">Notifications</a>
            <a href="explore.html">Explore</a>
            <a href="profile.html">Profile</a>
            <a href="dashboard.html">Dashboard</a>
            <a href="messages.html">Messages</a>
            <button onclick="logOut()">Log Out</button>
        </nav>
    </header>

    <main>

        <a id="back-to-world" class="button">← Back to World</a>

        <section class="hero" style="margin-top:24px;">
            <h1 id="page-title">World Q&A</h1>
            <p id="page-subtitle">Loading world...</p>
        </section>

        <section id="question-form-section" class="panel">
            <h2>Ask the Creator</h2>

            <textarea id="question-input"
                      rows="5"
                      placeholder="Ask a question about this world..."></textarea>

            <button class="button" onclick="submitQuestion()">
                Ask Question
            </button>
        </section>

        <section>
            <h2>Questions</h2>
            <div id="questions-container">
                <p class="empty">Loading questions...</p>
            </div>
        </section>

    </main>

    <div id="report-modal"
         style="display:none;position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:9999;justify-content:center;align-items:center;">
        <div style="width:500px;max-width:90%;background:var(--panel-bg);border:1px solid var(--border-color);border-radius:18px;padding:24px;">
            <h2 id="report-modal-title">Report</h2>

            <select id="report-reason" style="width:100%;padding:12px;margin-bottom:12px;">
                <option>Spam</option>
                <option>Harassment</option>
                <option>Hate Speech</option>
                <option>NSFW Content</option>
                <option>Misinformation</option>
                <option>Other</option>
            </select>

            <textarea id="report-details"
                      placeholder="Additional details..."
                      style="width:100%;height:120px;box-sizing:border-box;padding:12px;margin-bottom:16px;"></textarea>

            <div style="display:flex;gap:10px;flex-wrap:wrap;">
                <button class="button" id="submit-report-btn">Submit Report</button>
                <button class="button" id="close-report-btn">Cancel</button>
            </div>
        </div>
    </div>

    <script type="module">
        import { requireBetaAccess } from "./betaGate.js";
        import { supabase } from "./supabaseClient.js";
        import { setupNotificationBadge } from "./notificationBadge.js";
        import { createNotification } from "./notifications.js";
        import { setupMessageBadge } from "./messageBadge.js";
        setupMessageBadge();

        const currentUser = await requireBetaAccess();
        setupNotificationBadge();

        const params = new URLSearchParams(window.location.search);
        const worldId = params.get("id");

        let currentWorld = null;
        let pendingReport = null;
        let blockedUserIds = [];

        async function loadBlockedUsers() {

            const { data, error } = await supabase
                .from("user_blocks")
                .select("blocker_id, blocked_id")
                .in("blocker_id", [currentUser.id]);

            const { data: reverseData, error: reverseError } = await supabase
                .from("user_blocks")
                .select("blocker_id, blocked_id")
                .in("blocked_id", [currentUser.id]);

            if (error || reverseError) {
                console.error(error || reverseError);
                blockedUserIds = [];
                return;
            }

            blockedUserIds = [
                ...(data || []).map(x => x.blocked_id),
                ...(reverseData || []).map(x => x.blocker_id)
            ];
        }

        document.getElementById("close-report-btn").addEventListener("click", () => {
            document.getElementById("report-modal").style.display = "none";
        });

        document.getElementById("submit-report-btn").addEventListener("click", submitQaReport);

        if (!worldId) {
            alert("No world ID provided.");
            window.location.href = "explore.html";
        }

        await loadBlockedUsers();
        await loadWorld();
        await loadQuestions();

        async function loadWorld() {
            const { data, error } = await supabase
                .from("worlds")
                .select("*")
                .eq("id", worldId)
                .single();

            if (error || !data) {
                alert("World not found.");
                window.location.href = "explore.html";
                return;
            }

            currentWorld = data;
            if (
                blockedUserIds.includes(
                    currentWorld.owner_id
                )
            ) {
                alert("This Q&A is unavailable.");
                window.location.href = "explore.html";
                return;
            }

            document.getElementById("page-title").textContent =
                `${data.title} Q&A`;

            document.getElementById("page-subtitle").textContent =
                `Ask questions about ${data.title}, or read what the creator has answered.`;

            document.getElementById("back-to-world").href =
                `world.html?id=${encodeURIComponent(worldId)}`;

            if (currentUser.id === currentWorld.owner_id) {
                document.getElementById("question-form-section").style.display =
                    "none";
            }
        }

        async function loadQuestions() {
            const container = document.getElementById("questions-container");

            const { data: questions, error } = await supabase
                .from("world_questions")
                .select("*")
                .eq("world_id", worldId)
                .order("created_at", { ascending: false });

            if (error) {
                container.innerHTML = `<p class="empty">${escapeHtml(error.message)}</p>`;
                return;
            }

            const visibleQuestions =
                (questions || []).filter(question =>
                    !blockedUserIds.includes(question.user_id)
                );

            if (!visibleQuestions.length) {
                container.innerHTML = `<p class="empty">No questions yet.</p>`;
                return;
            }

            const userIds = [
                ...new Set(visibleQuestions.map(question => question.user_id))
            ];

            const { data: profiles } = await supabase
                .from("profiles")
                .select("id, username, display_name")
                .in("id", userIds);

            container.innerHTML = visibleQuestions.map(question => {
                const profile = profiles?.find(profile => profile.id === question.user_id);
                return renderQuestionCard(question, profile);
            }).join("");
        }

        function renderQuestionCard(question, profile) {
            const username = profile?.username || "unknown";
            const displayName = profile?.display_name || username;
            const isOwner = currentUser.id === currentWorld.owner_id;


            return `
<article class="question-card">
        <div class="author">
            Asked by <strong>${escapeHtml(displayName)}</strong>
            (@${escapeHtml(username)})
        </div>

        <p>
            <strong>Q:</strong>
            ${escapeHtml(question.question)}
        </p>

        <div style="margin-top:14px;display:flex;gap:10px;flex-wrap:wrap;">
            <button class="button"
                    onclick="openQaReport('question','${question.id}')">
                Report Question
            </button>

            ${(
                    currentUser.id === question.user_id ||
                    currentUser.id === currentWorld.owner_id
                ) ? `
                ${currentUser.id === question.user_id ? `
                    <button class="button"
                            onclick="editQuestion('${question.id}', \`${escapeHtml(question.question)}\`)">
                        Edit Question
                    </button>
                ` : ""}

                <button class="button"
                        onclick="deleteQuestion('${question.id}')">
                    Delete
                </button>
            ` : ""}
        </div>

        ${question.creator_answer ? `
            <div class="answer">
                <strong>Creator Answer:</strong>
                <p>${escapeHtml(question.creator_answer)}</p>

                <button class="button"
                        style="margin-top:14px;"
                        onclick="openQaReport('answer','${question.id}')">
                    Report Answer
                </button>
            </div>
        ` : `
            <p class="empty">Awaiting creator response.</p>

            ${isOwner ? `
                <textarea id="answer-${question.id}"
                          rows="4"
                          placeholder="Write your answer..."></textarea>

                <button class="button"
                        onclick="answerQuestion('${question.id}')">
                    Reply
                </button>
            ` : ""}
        `}
</article>
`;
        }

        window.openQaReport = async function (reportTarget, questionId) {
            const { data: question, error } = await supabase
                .from("world_questions")
                .select("*")
                .eq("id", questionId)
                .single();

            if (error || !question) {
                alert("This question could not be loaded.");
                return;
            }

            const reportedText =
                reportTarget === "answer"
                    ? question.creator_answer || ""
                    : question.question || "";

            if (!reportedText.trim()) {
                alert("There is no text to report.");
                return;
            }

            pendingReport = {
                reportTarget,
                questionId,
                reportedUserId: reportTarget === "answer"
                    ? currentWorld.owner_id
                    : question.user_id,
                reportedText
            };

            document.getElementById("report-modal-title").textContent =
                reportTarget === "answer"
                    ? "Report Creator Answer"
                    : "Report Question";

            document.getElementById("report-details").value = "";
            document.getElementById("report-modal").style.display = "flex";
        };

        async function submitQaReport() {
            if (!pendingReport || !currentWorld) return;

            const reason = document.getElementById("report-reason").value;
            const details = document.getElementById("report-details").value.trim();

            const { error } = await supabase
                .from("reports")
                .insert({
                    reporter_id: currentUser.id,
                    reported_user_id: pendingReport.reportedUserId,
                    world_id: worldId,
                    question_id: pendingReport.questionId,
                    report_type: pendingReport.reportTarget === "answer"
                        ? "qa_answer"
                        : "qa_question",
                    reason,
                    details,
                    reported_text: pendingReport.reportedText,
                    status: "open"
                });

            if (error) {
                alert(error.message);
                return;
            }

            pendingReport = null;
            document.getElementById("report-modal").style.display = "none";
            alert("Report submitted.");
        }

        window.submitQuestion = async function () {
            if (
                blockedUserIds.includes(
                    currentWorld.owner_id
                )
            ) {

                alert(
                    "You cannot interact with this creator."
                );

                return;
            }
            if (!currentWorld) return;

            if (currentUser.id === currentWorld.owner_id) {
                return;
            }

            const input = document.getElementById("question-input");
            const question = input.value.trim();

            if (!question) return;

            const { error } = await supabase
                .from("world_questions")
                .insert({
                    world_id: worldId,
                    user_id: currentUser.id,
                    question
                });

            if (!error) {
                await createNotification({
                    recipientId: currentWorld.owner_id,
                    actorId: currentUser.id,
                    worldId: worldId,
                    type: "world_question",
                    message: `Someone asked a question about ${currentWorld.title}.`,
                    link: `world-qa.html?id=${encodeURIComponent(worldId)}`
                });
            }

            if (error) {
                alert(error.message);
                return;
            }

            input.value = "";
            await loadQuestions();
        };

        window.answerQuestion = async function (questionId) {
            if (!currentWorld) return;

            if (currentUser.id !== currentWorld.owner_id) {
                return;
            }

            const input = document.getElementById(`answer-${questionId}`);
            const answer = input.value.trim();

            if (!answer) return;

            const { error } = await supabase
                .from("world_questions")
                .update({
                    creator_answer: answer,
                    answered_at: new Date().toISOString()
                })
                .eq("id", questionId)
                .eq("world_id", worldId);

            const questionData = await supabase
                .from("world_questions")
                .select("user_id")
                .eq("id", questionId)
                .single();

            if (!error && questionData.data) {
                await createNotification({
                    recipientId: questionData.data.user_id,
                    actorId: currentUser.id,
                    worldId: worldId,
                    type: "question_answered",
                    message: `Your question about ${currentWorld.title} was answered.`,
                    link: `world-qa.html?id=${encodeURIComponent(worldId)}`
                });
            }

            if (error) {
                alert(error.message);
                return;
            }

            await loadQuestions();
        };

        window.deleteQuestion = async function (questionId) {

            const confirmed =
                confirm("Delete this question?");

            if (!confirmed) return;

            const { error } = await supabase
                .from("world_questions")
                .delete()
                .eq("id", questionId);

            if (error) {
                alert(error.message);
                return;
            }

            await loadQuestions();
        };

        window.editQuestion = async function (questionId, oldQuestion) {

            const updated =
                prompt("Edit question:", oldQuestion);

            if (!updated) return;

            const { error } = await supabase
                .from("world_questions")
                .update({
                    question: updated
                })
                .eq("id", questionId);

            if (error) {
                alert(error.message);
                return;
            }

            await loadQuestions();
        };

        function escapeHtml(value) {
            return String(value || "")
                .replaceAll("&", "&amp;")
                .replaceAll("<", "&lt;")
                .replaceAll(">", "&gt;")
                .replaceAll('"', "&quot;")
                .replaceAll("'", "&#039;");
        }

        window.logOut = async function () {
            await supabase.auth.signOut();
            window.location.href = "login.html";
        };
    </script>

</body>
</html>
