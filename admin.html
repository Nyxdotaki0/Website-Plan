<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" href="favicon.png">
    <title>Admin - Nullverse</title>
    <script>
        const savedNullverseTheme = localStorage.getItem("nullverse-theme") || "void";
        document.documentElement.setAttribute("data-theme", savedNullverseTheme);
    </script>
    <link rel="stylesheet" href="theme.css?v=20">
    <style>
        html {
            min-height: 100%;
            background: #000
        }

        body {
            margin: 0;
            min-height: 100vh;
            font-family: Arial,sans-serif;
            background: var(--page-bg);
            background-attachment: fixed;
            color: var(--text-primary)
        }

        header {
            padding: 12px 40px;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(12,12,14,.72);
            position: sticky;
            top: 0;
            z-index: 100;
            backdrop-filter: blur(18px);
            -webkit-backdrop-filter: blur(18px);
            box-shadow: 0 10px 35px rgba(0,0,0,.28)
        }

        .logo, .logo a {
            display: flex;
            align-items: center
        }

        .site-logo {
            height: 64px;
            width: auto;
            display: block;
            max-width: none
        }

        nav {
            display: flex;
            gap: 22px;
            align-items: center;
            flex-wrap: wrap
        }

            nav a, nav button {
                color: var(--text-secondary);
                text-decoration: none;
                background: none;
                border: none;
                cursor: pointer;
                font-family: Arial,sans-serif;
                font-size: .95rem;
                transition: .18s ease
            }

                nav a:hover, nav button:hover {
                    color: white
                }

                nav a.active {
                    color: white;
                    background: linear-gradient(180deg,#35353b 0%,#1d1d22 45%,#101014 100%);
                    padding: 8px 12px;
                    border-radius: 999px;
                    border: 1px solid rgba(255,255,255,.12);
                    box-shadow: 0 0 18px rgba(255,255,255,.10),inset 0 1px 0 rgba(255,255,255,.07)
                }

        main {
            max-width: 950px;
            margin: auto;
            padding: 55px 40px 80px
        }

        .hero, .panel, .card {
            background: linear-gradient(135deg,rgba(255,255,255,.06),rgba(255,255,255,.02)),var(--panel-bg);
            border: 1px solid var(--border-color);
            border-radius: 22px;
            backdrop-filter: blur(18px);
            -webkit-backdrop-filter: blur(18px);
            box-shadow: 0 18px 40px rgba(0,0,0,.24),0 0 24px rgba(255,255,255,.03)
        }

        .hero {
            padding: 42px;
            margin-bottom: 28px
        }

            .hero h1 {
                font-size: 3.1rem;
                margin: 0 0 14px
            }

            .hero p, p {
                color: var(--text-secondary);
                line-height: 1.65
            }

        .panel {
            padding: 24px;
            margin-bottom: 24px
        }

        .card {
            padding: 18px;
            margin-bottom: 16px;
            border-radius: 16px;
            background: var(--card-bg)
        }

        .button {
            display: inline-block;
            background: linear-gradient(180deg,#2a2a2f 0%,#16161a 45%,#0d0d10 100%);
            color: #f5f5f5;
            border: 1px solid rgba(255,255,255,.12);
            padding: 11px 15px;
            border-radius: 10px;
            cursor: pointer;
            text-decoration: none;
            font-family: Arial,sans-serif;
            transition: .18s ease;
            box-shadow: 0 0 16px rgba(255,255,255,.08),inset 0 1px 0 rgba(255,255,255,.06)
        }

            .button:hover {
                background: linear-gradient(180deg,#3a3a40 0%,#202026 45%,#111116 100%);
                transform: translateY(-1px)
            }

            .button.danger {
                border-color: rgba(255,80,80,.35);
                color: #ffd7d7
            }

        input, select {
            width: 100%;
            box-sizing: border-box;
            margin-bottom: 12px;
            padding: 12px;
            border-radius: 10px;
            border: 1px solid var(--border-color);
            background: rgba(0,0,0,.24);
            color: var(--text-primary);
            font-family: Arial,sans-serif
        }

        .actions {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            margin-top: 12px
        }

        .badge {
            display: inline-block;
            border: 1px solid var(--border-color);
            border-radius: 999px;
            padding: 5px 9px;
            color: var(--text-secondary);
            background: rgba(255,255,255,.03);
            font-size: .82rem
        }

        .empty, .meta {
            color: var(--text-muted)
        }

        .meta {
            font-size: .9rem;
            margin-top: 6px
        }

        .role-pill {
            display: inline-block;
            margin-top: 10px;
            border: 1px solid var(--border-color);
            border-radius: 999px;
            padding: 6px 10px;
            color: var(--text-secondary);
            background: rgba(255,255,255,.04);
            font-size: .85rem
        }

        @media(max-width:800px) {
            header {
                flex-direction: column;
                gap: 14px;
                padding: 20px
            }

            nav {
                justify-content: center
            }

            main {
                padding: 35px 24px 70px
            }

            .hero {
                padding: 28px
            }

                .hero h1 {
                    font-size: 2.3rem
                }
        }
    </style>
</head>
<body>
    <header>
        <div class="logo">
            <a href="index.html"><img src="Nullverse-3.png" alt="Nullverse" class="site-logo"></a>
        </div>
        <nav>
            <a href="index.html">Home</a>
            <a href="notifications.html">Notifications</a>
            <a href="explore.html">Explore</a>
            <a href="profile.html">Profile</a>
            <a href="dashboard.html">Dashboard</a>
            <a href="admin.html" class="active">Admin</a>
            <button onclick="logOut()">Log Out</button>
        </nav>
    </header>

    <main>
        <section class="hero">
            <h1>Role Management</h1>
            <p>Assign staff roles for Nullverse. Keep this page simple for now: search users, change their role, and save.</p>
        </section>

        <section id="access-panel" class="panel">
            <p class="empty">Checking access...</p>
        </section>

        <section id="admin-content" class="panel" style="display:none;">
            <h2>Find User</h2>
            <input id="user-search" placeholder="Search username or display name">
            <div class="actions">
                <button id="search-users-button" class="button">Search Users</button>
                <button id="clear-search-button" class="button">Clear</button>
            </div>
            <div id="users-container" style="margin-top:18px;">
                <p class="empty">Search for a user to manage their role.</p>
            </div>
        </section>
    </main>

    <script type="module">
        import { requireBetaAccess } from "./betaGate.js";
        import { supabase } from "./supabaseClient.js";
        import { setupNotificationBadge } from "./notificationBadge.js";

        const currentUser = await requireBetaAccess({ allowRestricted: false });
        setupNotificationBadge();

        const { data: myProfile, error: myProfileError } = await supabase
            .from("profiles")
            .select("id, username, display_name, role, role_name, account_status")
            .eq("id", currentUser.id)
            .single();

        const myRole = myProfile?.role_name || myProfile?.role || "creator";

        if (myProfileError || !myProfile || myRole !== "void_architect" || myProfile.account_status !== "active") {
            document.getElementById("access-panel").innerHTML =
                `<p class="empty">Access denied. Void Architects only.</p>`;
        } else {
            document.getElementById("access-panel").innerHTML =
                `<span class="badge">Signed in as Void Architect: ${escapeHtml(myProfile.display_name || myProfile.username || currentUser.email)}</span>`;
            document.getElementById("admin-content").style.display = "block";
            await loadUsers();
        }

        async function loadUsers() {
            const container = document.getElementById("users-container");
            const search = document.getElementById("user-search").value.trim();

            container.innerHTML = `<p class="empty">Loading users...</p>`;

            let query = supabase
                .from("profiles")
                .select("id, username, display_name, role, role_name, account_status")
                .order("username", { ascending: true })
                .limit(30);

            if (search) {
                query = query.or(`username.ilike.%${search}%,display_name.ilike.%${search}%`);
            }

            const { data, error } = await query;

            if (error) {
                container.innerHTML = `<p class="empty">${escapeHtml(error.message)}</p>`;
                return;
            }

            if (!data || data.length === 0) {
                container.innerHTML = `<p class="empty">No users found.</p>`;
                return;
            }

            container.innerHTML = data.map(renderUserCard).join("");
        };

        function renderUserCard(user) {
            const role = user.role_name || user.role || "creator";
            const isSelf = user.id === currentUser.id;

            return `
<article class="card">
<strong>${escapeHtml(user.display_name || "Unnamed Creator")}</strong>
<div class="meta">
@${escapeHtml(user.username || "no-username")} • ${escapeHtml(user.account_status || "active")}
</div>

<span class="role-pill">Current role: ${escapeHtml(role)}</span>

<select id="role-select-${user.id}" ${isSelf ? "disabled" : ""}>
<option value="creator" ${role === "creator" ? "selected" : ""}>Creator</option>
<option value="moderator" ${role === "moderator" ? "selected" : ""}>Moderator</option>
<option value="void_architect" ${role === "void_architect" ? "selected" : ""}>Void Architect</option>
</select>

<div class="actions">
<a class="button" href="profile.html?user=${encodeURIComponent(user.username || "")}">Open Profile</a>
${isSelf ? `<span class="badge">You cannot change your own role here</span>` : `<button class="button" onclick="saveUserRole('${user.id}')">Save Role</button>`}
</div>

<p id="message-${user.id}" class="empty"></p>
</article>
`;
        }

        window.saveUserRole = async function (userId) {
            const message = document.getElementById(`message-${userId}`);
            const select = document.getElementById(`role-select-${userId}`);
            const newRole = select.value;

            message.textContent = "Saving role...";

            const { error } = await supabase
                .from("profiles")
                .update({
                    role_name: newRole,
                    role: newRole
                })
                .eq("id", userId);

            if (error) {
                message.textContent = error.message;
                return;
            }

            await supabase
                .from("moderation_logs")
                .insert({
                    target_user_id: userId,
                    moderator_id: currentUser.id,
                    action: "role_changed",
                    reason: `Role changed to ${newRole}`,
                    expires_at: null
                });

            message.textContent = `Role updated to ${newRole}.`;
            await loadUsers();
        };

        async function clearSearch() {
            document.getElementById("user-search").value = "";
            await loadUsers();
        };

        document.getElementById("search-users-button").addEventListener("click", loadUsers);

        document.getElementById("clear-search-button").addEventListener("click", clearSearch);

        document.getElementById("user-search").addEventListener("keydown", function (event) {
            if (event.key === "Enter") {
                loadUsers();
            }
        });

        function escapeHtml(value) {
            return String(value || "")
                .replaceAll("&", "&amp;")
                .replaceAll("<", "&lt;")
                .replaceAll(">", "&gt;")
                .replaceAll('"', "&quot;")
                .replaceAll("'", "&#039;");
        }

        window.logOut = async function () {
            await supabase.auth.signOut();
            window.location.href = "login.html";
        };
    </script>
</body>
</html>
