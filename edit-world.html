<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Edit World - Nullverse</title>
    <style>
        body {
            margin: 0;
            font-family: Arial,sans-serif;
            background: #0d0d12;
            color: #f2f2f2;
            display: flex;
            height: 100vh;
            overflow: hidden
        }

        .sidebar {
            width: 300px;
            background: #111118;
            border-right: 1px solid #2a2a35;
            display: flex;
            flex-direction: column
        }

        .sidebar-header, .sidebar-footer {
            padding: 20px;
            border-bottom: 1px solid #2a2a35
        }

        .sidebar-footer {
            border-top: 1px solid #2a2a35;
            border-bottom: none
        }

        .section-list {
            flex: 1;
            overflow-y: auto;
            padding: 18px
        }

        .section-card {
            background: #1b1b28;
            border: 1px solid #2a2a35;
            border-radius: 10px;
            padding: 14px;
            margin-bottom: 12px;
            cursor: pointer
        }

            .section-card.active {
                border-color: #6d6da5
            }

            .section-card p {
                margin: 6px 0 0;
                color: #8f8fa3;
                font-size: .9rem
            }

        .main {
            flex: 1;
            overflow-y: auto;
            padding: 40px
        }

        .editor-panel {
            max-width: 900px;
            margin: auto
        }

        .topbar {
            display: flex;
            justify-content: space-between;
            gap: 14px;
            flex-wrap: wrap;
            margin-bottom: 28px
        }

        .nav-link {
            color: #9f9fb1;
            text-decoration: none;
            margin-right: 14px
        }

            .nav-link:hover {
                color: white
            }

        .panel {
            background: #15151f;
            border: 1px solid #2a2a35;
            border-radius: 14px;
            padding: 28px
        }

        input, textarea, select {
            width: 100%;
            box-sizing: border-box;
            padding: 12px;
            margin-bottom: 16px;
            border-radius: 8px;
            border: 1px solid #333344;
            background: #0d0d12;
            color: white;
            font-family: Arial,sans-serif
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: #d8d8e5
        }

        .button {
            background: #2a2a44;
            color: white;
            border: none;
            padding: 10px 14px;
            border-radius: 8px;
            cursor: pointer;
            text-decoration: none;
            font-family: Arial,sans-serif
        }

            .button:hover {
                background: #3a3a5c
            }

        .primary-button {
            background: #4d4d7a
        }

        .danger-button {
            background: #552d36
        }

        .message {
            margin-top: 12px;
            color: #9f9fb1
        }

        .tag-container {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-bottom: 16px
        }

        .tag-pill {
            background: #232338;
            border: 1px solid #3b3b55;
            color: #d7d7e8;
            padding: 8px 12px;
            border-radius: 999px;
            display: flex;
            gap: 8px;
            align-items: center
        }

            .tag-pill button {
                background: none;
                border: none;
                color: #9f9fb1;
                cursor: pointer
            }

        .tag-input-row {
            display: flex;
            gap: 10px;
            margin-bottom: 18px
        }

            .tag-input-row input {
                margin-bottom: 0
            }

        @media(max-width:900px) {
            body {
                flex-direction: column;
                height: auto
            }

            .sidebar {
                width: 100%;
                border-right: none;
                border-bottom: 1px solid #2a2a35
            }

            .main {
                padding: 24px
            }
        }
    </style>
</head>

<body>

    <div class="sidebar">
        <div class="sidebar-header">
            <h1 id="world-name">Loading...</h1>
            <p style="color:#9f9fb1;line-height:1.5;">Build and organize your world.</p>
        </div>

        <div class="section-list">
            <div class="section-card active" id="overview-card" onclick="openOverviewSettings()">
                <strong>Overview Settings</strong>
                <p>World details, tags, visibility</p>
            </div>

            <div id="sections-container"></div>
        </div>

        <div class="sidebar-footer">
            <button class="button" onclick="createSection()">+ Add Section</button>
        </div>
    </div>

    <div class="main">
        <div class="editor-panel">
            <div class="topbar">
                <div>
                    <h1 id="editor-title" style="margin:0;">World Editor</h1>
                    <p style="margin-top:8px;color:#8f8fa3;">Edit and expand your universe over time.</p>
                </div>

                <div>
                    <a class="nav-link" href="dashboard.html">← Dashboard</a>
                    <a class="nav-link" href="#" onclick="openOverviewSettings()">Overview Settings</a>
                </div>
            </div>

            <div id="editor-content"></div>
        </div>
    </div>

    <script type="module">
        import { requireBetaAccess } from "./betaGate.js";
        import { supabase } from "./supabaseClient.js";

        const user = await requireBetaAccess();
        const params = new URLSearchParams(window.location.search);
        const worldId = params.get("id");

        let currentWorld = null;
        let currentSection = null;
        let allSections = [];
        let genreTags = [];
        let themeTags = [];

        if (!worldId) {
            alert("No world ID provided.");
            window.location.href = "dashboard.html";
        }

        await loadWorld();
        await loadSections();
        openOverviewSettings();

        async function loadWorld() {
            const { data, error } = await supabase
                .from("worlds")
                .select("*")
                .eq("id", worldId)
                .single();

            if (error || !data) {
                alert("World not found.");
                window.location.href = "dashboard.html";
                return;
            }

            currentWorld = data;
            document.getElementById("world-name").textContent = currentWorld.title || "Untitled World";
            document.getElementById("editor-title").textContent = currentWorld.title || "Untitled World";
        }

        async function loadSections() {
            const { data, error } = await supabase
                .from("world_sections")
                .select("*")
                .eq("world_id", worldId)
                .order("created_at", { ascending: true });

            if (error) {
                alert(error.message);
                return;
            }

            allSections = data || [];
            renderSections();
        }

        function renderSections() {
            const container = document.getElementById("sections-container");

            if (!allSections.length) {
                container.innerHTML = `<p style="color:#8f8fa3;">No sections yet.</p>`;
                return;
            }

            container.innerHTML = allSections.map(section => `
            <div class="section-card" id="section-${section.id}" onclick="openSection('${section.id}')">
                <strong>${escapeHtml(section.title || "Untitled Section")}</strong>
                <p>${escapeHtml(section.section_type || "Custom")}</p>
            </div>
        `).join("");
        }

        function setActiveCard(id) {
            document.querySelectorAll(".section-card").forEach(card => card.classList.remove("active"));

            const card = document.getElementById(id);
            if (card) card.classList.add("active");
        }

        window.openOverviewSettings = function () {
            currentSection = null;
            setActiveCard("overview-card");

            genreTags = currentWorld.genres
                ? currentWorld.genres.split(",").map(t => t.trim()).filter(Boolean)
                : [];

            themeTags = currentWorld.themes
                ? currentWorld.themes.split(",").map(t => t.trim()).filter(Boolean)
                : [];

            document.getElementById("editor-content").innerHTML = `
            <div class="panel">
                <label>World Title</label>
                <input id="overview-title" value="${escapeAttribute(currentWorld.title || "")}">

                <label>Short Summary</label>
                <textarea id="overview-summary" rows="5">${escapeHtml(currentWorld.summary || "")}</textarea>

                <label>Genres</label>
                <div class="tag-input-row">
                    <input id="genre-input" placeholder="Add genre...">
                    <button class="button" onclick="addGenreTag()">Add</button>
                </div>
                <div id="genre-tags" class="tag-container"></div>

                <label>Themes</label>
                <div class="tag-input-row">
                    <input id="theme-input" placeholder="Add theme...">
                    <button class="button" onclick="addThemeTag()">Add</button>
                </div>
                <div id="theme-tags" class="tag-container"></div>

                <label>Visibility</label>
                <select id="overview-visibility">
                    <option value="published" ${currentWorld.visibility === "published" ? "selected" : ""}>Published</option>
                    <option value="draft" ${currentWorld.visibility === "draft" ? "selected" : ""}>Draft</option>
                </select>

                <label style="display:flex;align-items:center;gap:10px;">
                    <input id="overview-featured" type="checkbox" style="width:auto;" ${currentWorld.featured ? "checked" : ""}>
                    Feature on profile
                </label>

                <button class="button primary-button" onclick="saveOverviewSettings()">Save Overview</button>
                <p id="message" class="message"></p>
            </div>
        `;

            renderGenreTags();
            renderThemeTags();
        };

        window.openSection = function (sectionId) {
            const section = allSections.find(s => s.id === sectionId);
            if (!section) return;

            currentSection = section;
            setActiveCard(`section-${sectionId}`);

            document.getElementById("editor-content").innerHTML = `
            <div class="panel">
                <label>Section Type</label>
                <select id="section-type">
                    ${["Main Story", "Characters", "Locations", "Timeline", "Languages", "Lore", "Politics", "Religion", "Organizations", "Technology", "Artifacts", "Custom"]
                    .map(type => `<option value="${type}" ${section.section_type === type ? "selected" : ""}>${type}</option>`)
                    .join("")}
                </select>

                <label>Section Title</label>
                <input id="section-title" value="${escapeAttribute(section.title || "")}">

                <label>Content</label>
                <textarea id="section-content" rows="18">${escapeHtml(section.content || "")}</textarea>

                <div style="display:flex;justify-content:space-between;gap:12px;flex-wrap:wrap;margin-top:18px;">
                    <button class="button danger-button" onclick="deleteCurrentSection()">Delete Section</button>
                    <button class="button primary-button" onclick="saveCurrentSection()">Save Changes</button>
                </div>

                <p id="message" class="message"></p>
            </div>
        `;
        };

        window.createSection = async function () {
            const title = prompt("Section title:");
            if (!title) return;

            const { data, error } = await supabase
                .from("world_sections")
                .insert({
                    world_id: worldId,
                    owner_id: user.id,
                    title: title,
                    section_type: "Custom",
                    content: ""
                })
                .select()
                .single();

            if (error || !data) {
                alert(error?.message || "Failed to create section.");
                return;
            }

            await loadSections();
            openSection(data.id);
        };

        window.saveCurrentSection = async function () {
            if (!currentSection) return;

            const type = document.getElementById("section-type").value;
            const title = document.getElementById("section-title").value.trim();
            const content = document.getElementById("section-content").value;

            const { error } = await supabase
                .from("world_sections")
                .update({
                    section_type: type,
                    title: title,
                    content: content,
                    updated_at: new Date().toISOString()
                })
                .eq("id", currentSection.id)
                .eq("owner_id", user.id);

            if (error) {
                document.getElementById("message").textContent = error.message;
                return;
            }

            document.getElementById("message").textContent = "Saved successfully.";
            await loadSections();
            openSection(currentSection.id);
        };

        window.deleteCurrentSection = async function () {
            if (!currentSection) return;

            if (!confirm("Delete this section?")) return;

            const { error } = await supabase
                .from("world_sections")
                .delete()
                .eq("id", currentSection.id)
                .eq("owner_id", user.id);

            if (error) {
                alert(error.message);
                return;
            }

            currentSection = null;
            await loadSections();
            openOverviewSettings();
        };

        window.saveOverviewSettings = async function () {
            const title = document.getElementById("overview-title").value.trim();
            const summary = document.getElementById("overview-summary").value.trim();
            const visibility = document.getElementById("overview-visibility").value;
            const featured = document.getElementById("overview-featured").checked;

            const genres = genreTags.join(", ");
            const themes = themeTags.join(", ");

            const { error } = await supabase
                .from("worlds")
                .update({
                    title,
                    summary,
                    genres,
                    themes,
                    visibility,
                    featured,
                    updated_at: new Date().toISOString()
                })
                .eq("id", currentWorld.id)
                .eq("owner_id", user.id);

            if (error) {
                document.getElementById("message").textContent = error.message;
                return;
            }

            currentWorld = { ...currentWorld, title, summary, genres, themes, visibility, featured };

            document.getElementById("world-name").textContent = title;
            document.getElementById("editor-title").textContent = title;
            document.getElementById("message").textContent = "Overview updated successfully.";
        };

        function renderGenreTags() {
            const container = document.getElementById("genre-tags");
            if (!container) return;

            container.innerHTML = genreTags.map((tag, index) => `
            <div class="tag-pill">
                ${escapeHtml(tag)}
                <button onclick="removeGenreTag(${index})">✕</button>
            </div>
        `).join("");
        }

        function renderThemeTags() {
            const container = document.getElementById("theme-tags");
            if (!container) return;

            container.innerHTML = themeTags.map((tag, index) => `
            <div class="tag-pill">
                ${escapeHtml(tag)}
                <button onclick="removeThemeTag(${index})">✕</button>
            </div>
        `).join("");
        }

        window.addGenreTag = function () {
            const input = document.getElementById("genre-input");
            const value = input.value.trim();
            if (!value) return;

            genreTags.push(value);
            input.value = "";
            renderGenreTags();
        };

        window.addThemeTag = function () {
            const input = document.getElementById("theme-input");
            const value = input.value.trim();
            if (!value) return;

            themeTags.push(value);
            input.value = "";
            renderThemeTags();
        };

        window.removeGenreTag = function (index) {
            genreTags.splice(index, 1);
            renderGenreTags();
        };

        window.removeThemeTag = function (index) {
            themeTags.splice(index, 1);
            renderThemeTags();
        };

        function escapeHtml(value) {
            return String(value || "")
                .replaceAll("&", "&amp;")
                .replaceAll("<", "&lt;")
                .replaceAll(">", "&gt;")
                .replaceAll('"', "&quot;")
                .replaceAll("'", "&#039;");
        }

        function escapeAttribute(value) {
            return escapeHtml(value).replaceAll("`", "&#096;");
        }
    </script>

</body>
</html>
