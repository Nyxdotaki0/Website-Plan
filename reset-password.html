<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password - Nullverse</title>
    <link rel="icon" type="image/png" href="favicon.png">
    <link rel="stylesheet" href="theme.css?v=25">

    <style>
        html {
            min-height: 100%;
            background: #000;
        }

        body {
            margin: 0;
            min-height: 100vh;
            font-family: Arial, sans-serif;
            background: var(--page-bg);
            color: var(--text-primary);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 30px;
            box-sizing: border-box;
        }

        .auth-shell {
            width: 100%;
            max-width: 500px;
        }

        .auth-card {
            background: linear-gradient(135deg, rgba(255,255,255,0.06), rgba(255,255,255,0.015)), rgba(10,10,12,0.82);
            border: 1px solid rgba(255,255,255,0.10);
            border-radius: 28px;
            padding: 40px;
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            box-shadow: 0 30px 80px rgba(0,0,0,0.42), 0 0 50px rgba(255,255,255,0.04);
        }

        .logo-wrap {
            display: flex;
            justify-content: center;
            margin-bottom: 28px;
        }

        .site-logo {
            height: 92px;
            width: auto;
            display: block;
        }

        h1 {
            margin: 0 0 10px;
            font-size: 2.35rem;
        }

        p {
            color: var(--text-secondary);
            line-height: 1.7;
        }

        input {
            width: 100%;
            box-sizing: border-box;
            padding: 14px;
            margin-bottom: 16px;
            border-radius: 14px;
            border: 1px solid rgba(255,255,255,0.08);
            background: rgba(0,0,0,0.24);
            color: white;
            font-family: Arial, sans-serif;
        }

        button {
            width: 100%;
            padding: 14px;
            border-radius: 14px;
            border: 1px solid rgba(255,255,255,0.12);
            background: linear-gradient(180deg, #2a2a2f 0%, #16161a 45%, #0d0d10 100%);
            color: #f5f5f5;
            cursor: pointer;
            font-size: 1rem;
            font-family: Arial, sans-serif;
            box-shadow: 0 0 16px rgba(255,255,255,0.08), inset 0 1px 0 rgba(255,255,255,0.06);
        }

            button:hover {
                background: linear-gradient(180deg, #3a3a40 0%, #202026 45%, #111116 100%);
            }

        .message {
            margin-top: 18px;
            color: var(--text-secondary);
            line-height: 1.6;
        }

        .back-link {
            display: block;
            margin-top: 24px;
            color: var(--text-muted);
            text-align: center;
            text-decoration: none;
        }

            .back-link:hover {
                color: white;
            }
    </style>
</head>

<body>
    <div class="nullverse-stars"></div>

    <main class="auth-shell">
        <section class="auth-card">
            <div class="logo-wrap">
                <img src="Nullverse-3.png" alt="Nullverse" class="site-logo">
            </div>

            <h1>Reset Password</h1>

            <p>
                Enter a new password for your Nullverse account.
            </p>

            <input id="new-password" type="password" placeholder="New password">
            <input id="confirm-password" type="password" placeholder="Confirm new password">

            <button onclick="resetPassword()">Update Password</button>

            <p id="message" class="message"></p>

            <a class="back-link" href="login.html">Back to Login</a>
        </section>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <script>
        const SUPABASE_URL = "https://baaygzddafopihtxyyjq.supabase.co";
        const SUPABASE_ANON_KEY = "sb_publishable_O0JPmpCSe7TDoUxotIe4aQ_4EBgEBV8";

        const supabaseClient =
            supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        const message = document.getElementById("message");

        async function resetPassword() {
            const password = document.getElementById("new-password").value.trim();
            const confirmPassword = document.getElementById("confirm-password").value.trim();

            if (!password || !confirmPassword) {
                message.textContent = "Enter and confirm your new password.";
                return;
            }

            if (password.length < 6) {
                message.textContent = "Password must be at least 6 characters.";
                return;
            }

            if (password !== confirmPassword) {
                message.textContent = "Passwords do not match.";
                return;
            }

            const { error } = await supabaseClient.auth.updateUser({
                password: password
            });

            if (error) {
                message.textContent = error.message;
                return;
            }

            message.innerHTML = `
                Password updated successfully.<br><br>
                You can now return to login.
            `;
        }
    </script>
</body>
</html>
