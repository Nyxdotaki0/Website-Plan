<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" href="favicon.png">
    <title>Nullverse Profile</title>

    <style>
        :root {
            --profile-color: #15151f;
        }

        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #0d0d12;
            color: #f2f2f2;
        }

        header {
            padding: 24px 40px;
            border-bottom: 1px solid #2a2a35;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #111118;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .logo,
        .logo a {
            display: flex;
            align-items: center;
        }

        .site-logo {
            height: 64px;
            width: auto;
            display: block;
            max-width: none;
        }

        nav {
            display: flex;
            gap: 22px;
            flex-wrap: wrap;
            align-items: center;
        }

            nav a,
            nav button {
                color: #cfcfd8;
                text-decoration: none;
                background: none;
                border: none;
                cursor: pointer;
                font-family: Arial, sans-serif;
                font-size: 0.95rem;
            }

                nav a:hover,
                nav button:hover {
                    color: white;
                }

                nav a.active {
                    color: white;
                    background: #2a2a44;
                    padding: 8px 12px;
                    border-radius: 999px;
                }

        main {
            max-width: 1100px;
            margin: auto;
            padding-bottom: 60px;
        }

        .profile-header {
            overflow: visible;
            background: #15151f;
            border-bottom: 1px solid #2a2a35;
        }

        .banner {
            height: 225px;
            background: linear-gradient(135deg, #1b1b28, #2a2a44);
            background-size: cover;
            background-position: center;
        }

        .profile-info {
            display: flex;
            gap: 20px;
            padding: 22px 30px;
            margin: -58px 32px 24px;
            align-items: flex-start;
            background: var(--profile-color, #15151f);
            border: 1px solid #2a2a35;
            border-radius: 18px;
            position: relative;
            z-index: 5;
            box-shadow: 0 18px 40px rgba(0,0,0,.22);
        }

        .avatar {
            width: 124px;
            height: 124px;
            border-radius: 50%;
            object-fit: cover;
            border: 5px solid #15151f;
            background: #2a2a35;
            flex-shrink: 0;
        }

        .info-text {
            display: flex;
            flex-direction: column;
            flex: 1;
            min-width: 0;
            padding-top: 8px;
        }

        .name-row {
            display: flex;
            align-items: center;
            gap: 12px;
            flex-wrap: nowrap;
            min-height: 42px;
        }

        .info-text h1 {
            margin: 0;
            font-size: 2.2rem;
            line-height: 1.08;
        }

        .username {
            display: block;
            color: #9c9cb0;
            margin-top: 8px;
            margin-left: 2px;
            font-size: .98rem;
        }

        .bio {
            margin-top: 12px;
            max-width: 720px;
            line-height: 1.55;
            color: #c8c8d4;
        }

        .creator-type {
            margin-top: 10px;
            color: #8f8fa3;
        }

        .badge-wrap {
            position: relative;
            display: inline-flex;
            width: fit-content;
            isolation: isolate;
        }

            .badge-wrap::before,
            .badge-wrap::after {
                content: "";
                position: absolute;
                z-index: 2;
                pointer-events: none;
                width: 34px;
                height: 3px;
                border-radius: 999px;
                background: linear-gradient(90deg, transparent, rgba(255,255,255,.35), rgba(255,255,255,1), rgba(255,255,255,.35), transparent);
                box-shadow: 0 0 8px rgba(255,255,255,.55), 0 0 16px rgba(255,255,255,.25);
                opacity: .72;
                offset-path: inset(0 round 999px);
                offset-rotate: auto;
                animation: badgeRimHighlight 4.8s linear infinite;
            }

            .badge-wrap::after {
                animation-delay: -2.4s;
            }

            .badge-wrap:hover::before,
            .badge-wrap:hover::after,
            .badge-wrap.badge-open::before,
            .badge-wrap.badge-open::after {
                opacity: 1;
                height: 4px;
                box-shadow: 0 0 10px rgba(255,255,255,.85), 0 0 24px rgba(255,255,255,.45), 0 0 36px rgba(255,255,255,.22);
            }

        @keyframes badgeRimHighlight {
            from {
                offset-distance: 0%;
            }

            to {
                offset-distance: 100%;
            }
        }

        .profile-badge {
            display: inline-flex;
            position: relative;
            z-index: 1;
            align-items: center;
            gap: 10px;
            padding: 9px 16px;
            border-radius: 999px;
            background: #000;
            border: 1px solid rgba(255,255,255,.42);
            color: #fff;
            font-size: .86rem;
            font-weight: 850;
            letter-spacing: .085em;
            text-transform: uppercase;
            cursor: pointer;
            user-select: none;
            box-shadow: 0 0 10px rgba(255,255,255,.18), 0 0 24px rgba(255,255,255,.14), 0 0 42px rgba(255,255,255,.08), inset 0 0 12px rgba(255,255,255,.06);
            transition: transform .18s ease, box-shadow .18s ease, border-color .18s ease;
        }

            .profile-badge img {
                width: 24px;
                height: auto;
                display: block;
                object-fit: contain;
                opacity: .98;
                filter: brightness(1.55) contrast(1.18);
                flex-shrink: 0;
            }

        .badge-wrap:hover .profile-badge,
        .badge-wrap.badge-open .profile-badge {
            transform: translateY(-1px);
            border-color: rgba(255,255,255,.7);
            box-shadow: 0 0 14px rgba(255,255,255,.28), 0 0 34px rgba(255,255,255,.22), 0 0 64px rgba(255,255,255,.14), inset 0 0 16px rgba(255,255,255,.09);
        }

        .badge-tooltip {
            position: absolute;
            left: 0;
            top: calc(100% + 12px);
            width: 285px;
            background: #000;
            border: 1px solid rgba(255,255,255,.32);
            border-radius: 14px;
            padding: 13px 15px;
            color: #e6e6ff;
            font-size: .9rem;
            line-height: 1.55;
            opacity: 0;
            visibility: hidden;
            pointer-events: none;
            z-index: 1000;
            box-shadow: 0 0 18px rgba(255,255,255,.14), 0 14px 34px rgba(0,0,0,.5);
        }

        @media (hover: hover) {
            .badge-wrap:hover .badge-tooltip {
                opacity: 1;
                visibility: visible;
            }
        }

        .badge-tooltip.open {
            opacity: 1;
            visibility: visible;
            pointer-events: auto;
        }

        .content-section {
            padding: 38px 40px;
        }

            .content-section h2 {
                margin-top: 0;
                margin-bottom: 20px;
            }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
            gap: 20px;
        }

        .card {
            background: #15151f;
            border: 1px solid #2a2a35;
            border-radius: 12px;
            padding: 20px;
        }

            .card h3 {
                margin-top: 0;
            }

                .card h3 a {
                    color: white;
                    text-decoration: none;
                }

                    .card h3 a:hover {
                        text-decoration: underline;
                    }

            .card p {
                color: #c8c8d4;
                line-height: 1.5;
            }

        .empty {
            color: #8f8fa3;
        }

        .button {
            display: inline-block;
            margin-top: 14px;
            background: #2a2a44;
            color: white;
            border: none;
            padding: 10px 14px;
            border-radius: 8px;
            text-decoration: none;
            cursor: pointer;
        }

            .button:hover {
                background: #3a3a5c;
            }

        .follow-button.following {
            background: #4a2d36;
        }

        .notification-link {
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }

        .notification-badge {
            min-width: 18px;
            height: 18px;
            padding: 0 6px;
            border-radius: 999px;
            background: #56568a;
            color: white;
            font-size: 0.72rem;
            align-items: center;
            justify-content: center;
            line-height: 1;
        }

        @media (max-width: 800px) {
            header {
                flex-direction: column;
                gap: 14px;
            }

            nav {
                justify-content: center;
            }

            .banner {
                height: 205px;
            }

            .profile-info {
                margin: -50px 20px 24px;
                padding: 22px;
                flex-direction: column;
                align-items: flex-start;
            }

            .avatar {
                width: 116px;
                height: 116px;
            }

            .info-text {
                padding-top: 0;
                width: 100%;
            }

            .name-row {
                gap: 10px;
                flex-wrap: wrap;
            }

            .info-text h1 {
                font-size: 2rem;
            }

            .badge-tooltip {
                width: 245px;
            }

            .content-section {
                padding: 25px;
            }
        }
    </style>
</head>

<body>

<header>
    <div class="logo">
        <a href="index.html">
            <img src="Nullverse-3.png"
                 alt="Nullverse"
                 class="site-logo">
        </a>
    </div>

    <nav>
        <a href="index.html">Home</a>
        <a href="notifications.html">Notifications</a>
        <a href="explore.html">Explore</a>
        <a href="profile.html" class="active">Profile</a>
        <a href="dashboard.html">Dashboard</a>
        <button onclick="logOut()">Log Out</button>
    </nav>
</header>

<main>

    <section class="profile-header">
        <div id="profile-banner" class="banner"></div>

        <div class="profile-info">
            <img id="profile-avatar"
                 class="avatar"
                 src="https://placehold.co/200x200/1b1b28/ffffff?text=NV"
                 alt="Profile picture">

            <div class="info-text">
                <div class="name-row">

                    <h1 id="profile-display-name">
                        Loading...
                    </h1>

                    <div class="badge-wrap" id="profile-badge-wrap" style="display:none;">
                        <div id="profile-badge" class="profile-badge"></div>

                        <div id="profile-badge-tooltip" class="badge-tooltip">
                            This badge marks one of the founding creators of Nullverse.
                        </div>
                    </div>

                <div id="profile-username" class="username">
                    @username
                </div>

                <div id="profile-bio" class="bio">
                    Loading bio...
                </div>

                <div id="profile-creator-type" class="creator-type"></div>

                <div id="follow-stats" style="
                    display:flex;
                    gap:18px;
                    margin-top:16px;
                    color:#bdbdca;
                    flex-wrap:wrap;
                ">
                    <span id="followers-count">0 Followers</span>
                    <span id="following-count">0 Following</span>
                </div>

                <div id="follow-button-container"></div>

                <a id="edit-profile-button" class="button" href="account-settings.html">
                    Edit Profile
                </a>
            </div>
        </div>
    </section>

    <section class="content-section">
        <h2>Featured Worlds</h2>
        <div id="featured-worlds" class="grid">
            <p class="empty">Loading featured worlds...</p>
        </div>
    </section>

    <section class="content-section">
        <h2>Published Worlds</h2>
        <div id="all-worlds" class="grid">
            <p class="empty">Loading worlds...</p>
        </div>
    </section>

</main>

<script type="module">
    import { requireBetaAccess } from "./betaGate.js";
    import { supabase } from "./supabaseClient.js";
    import { createNotification } from "./notifications.js";
    import { setupNotificationBadge } from "./notificationBadge.js";

    const currentUser = await requireBetaAccess();
    setupNotificationBadge();
    const { data: currentProfile } = await supabase
        .from("profiles")
        .select("username, display_name")
        .eq("id", currentUser.id)
        .single();

    const params = new URLSearchParams(window.location.search);
    const usernameFromUrl = params.get("user");

    let query = supabase
        .from("profiles")
        .select("*");

    if (usernameFromUrl) {
        query = query.eq("username", usernameFromUrl);
    } else {
        const { data: { user } } = await supabase.auth.getUser();
        query = query.eq("id", user.id);
    }

    const { data: profile, error } = await query.single();

    if (error || !profile) {
        showProfileNotFound();
    } else {
        renderProfile(profile);

        await Promise.all([
            loadProfileWorlds(profile.id),
            loadFollowData(profile.id)
        ]);
    }

    function renderProfile(profile) {
        document.getElementById("profile-display-name").textContent =
            profile.display_name || "Unnamed Creator";
        const badge =
            document.getElementById(
                "profile-badge"
            );

        if (
            profile.profile_badge
        ) {

            document.getElementById("profile-badge-wrap").style.display = "inline-flex";

            badge.innerHTML =
                `
<img
src="Infinity.png"
alt=""
>

<span>
${escapeHtml(
                    profile.profile_badge
                )}
</span>
`;

        }

        else {

            document.getElementById("profile-badge-wrap").style.display = "none";

        }

        document.getElementById("profile-username").textContent =
            "@" + (profile.username || "username");

        document.getElementById("profile-bio").textContent =
            profile.bio || "No bio yet.";

        document.getElementById("profile-creator-type").textContent =
            profile.creator_type || "";


        

        document.documentElement.style.setProperty(
            "--profile-color",
            profile.profile_color || "#15151f"
        );

        if (profile.avatar_url) {
            document.getElementById("profile-avatar").src = profile.avatar_url;
        }

        if (profile.banner_url) {
            document.getElementById("profile-banner").style.backgroundImage =
                `url('${profile.banner_url}')`;
        }
        const editButton = document.getElementById("edit-profile-button");

        if (editButton && currentUser.id !== profile.id) {
            editButton.style.display = "none";
        }
    }

    function showProfileNotFound() {
        document.getElementById("profile-display-name").textContent =
            "Profile not found";

        document.getElementById("profile-username").textContent = "";

        document.getElementById("profile-bio").textContent =
            "This creator profile does not exist.";

        document.getElementById("profile-creator-type").textContent = "";

        document.getElementById("profile-avatar").src =
            "https://placehold.co/200x200/1b1b28/ffffff?text=?";

        document.getElementById("profile-banner").style.background =
            "linear-gradient(135deg, #1b1b28, #2a2a44)";

        document.getElementById("featured-worlds").innerHTML =
            `<p class="empty">No featured worlds.</p>`;

        document.getElementById("all-worlds").innerHTML =
            `<p class="empty">No published worlds.</p>`;

        const editButton = document.querySelector('a[href="account-settings.html"]');
        if (editButton) {
            editButton.style.display = "none";
        }
    }

    async function loadProfileWorlds(profileId) {
        const featuredContainer = document.getElementById("featured-worlds");
        const allContainer = document.getElementById("all-worlds");

        const { data: worlds, error } = await supabase
            .from("worlds")
            .select("*")
            .eq("owner_id", profileId)
            .eq("visibility", "published")
            .order("updated_at", { ascending: false });

        if (error) {
            featuredContainer.innerHTML = `<p class="empty">${error.message}</p>`;
            allContainer.innerHTML = `<p class="empty">${error.message}</p>`;
            return;
        }

        if (!worlds || worlds.length === 0) {
            featuredContainer.innerHTML =
                `<p class="empty">No featured worlds yet.</p>`;

            allContainer.innerHTML =
                `<p class="empty">No published worlds yet.</p>`;

            return;
        }

        const featuredWorlds = worlds.filter(world => world.featured);

        featuredContainer.innerHTML = featuredWorlds.length
            ? featuredWorlds.map(renderWorldCard).join("")
            : `<p class="empty">No featured worlds yet.</p>`;

        allContainer.innerHTML = worlds.map(renderWorldCard).join("");
    }

    function renderWorldCard(world) {

        const coverImage =
            world.cover_image_url ||
            "https://placehold.co/600x600/1b1b28/ffffff?text=World";

        return `
        <div class="card">

           <div style="
    width:100%;
    height:145px;
    border-radius:12px;
    overflow:hidden;
    margin-bottom:16px;
    background:#222;
">
    <img
        src="${escapeHtml(coverImage)}"
        alt="${escapeHtml(world.title || "World cover")}"
        style="
            width:100%;
            height:100%;
            object-fit:cover;
            display:block;
        "
    >
</div>

            <p class="empty">
                ${escapeHtml(world.genres || "World")}
            </p>

            <h3>
                <a href="world.html?id=${encodeURIComponent(world.id)}">
                    ${escapeHtml(world.title || "Untitled World")}
                </a>
            </h3>

            <p>
                ${escapeHtml(world.summary || "No summary yet.")}
            </p>

            <p class="empty">
                ${escapeHtml(world.themes || "")}
            </p>

        </div>
    `;
    }

    async function loadFollowData(profileId) {

        const { count: followerCount } = await supabase
            .from("follows")
            .select("*", { count: "exact", head: true })
            .eq("following_id", profileId);

        const { count: followingCount } = await supabase
            .from("follows")
            .select("*", { count: "exact", head: true })
            .eq("follower_id", profileId);

        document.getElementById("followers-count").textContent =
            `${followerCount || 0} Followers`;

        document.getElementById("following-count").textContent =
            `${followingCount || 0} Following`;

        if (!currentUser || currentUser.id === profileId) {
            return;
        }

        const { data: existingFollow } = await supabase
            .from("follows")
            .select("*")
            .eq("follower_id", currentUser.id)
            .eq("following_id", profileId)
            .maybeSingle();

        renderFollowButton(profileId, !!existingFollow);
    }

    function renderFollowButton(profileId, isFollowing) {

        document.getElementById("follow-button-container").innerHTML = `
        <button
            id="follow-button"
            class="button follow-button ${isFollowing ? "following" : ""}"
        >
            ${isFollowing ? "Following" : "Follow"}
        </button>
    `;

        document.getElementById("follow-button")
            .addEventListener("click", async () => {

                const button =
                    document.getElementById("follow-button");

                button.disabled = true;

                if (isFollowing) {

                    await supabase
                        .from("follows")
                        .delete()
                        .eq("follower_id", currentUser.id)
                        .eq("following_id", profileId);

                } else {

                    const { error: followError } = await supabase
                        .from("follows")
                        .insert({
                            follower_id: currentUser.id,
                            following_id: profileId
                        });

                    if (!followError) {
                        await createNotification({
                            recipientId: profileId,
                            actorId: currentUser.id,
                            type: "new_follower",
                            message: `${currentProfile?.display_name || currentProfile?.username || "Someone"} followed you.`,
                            link: `profile.html?user=${encodeURIComponent(currentProfile?.username || "")}`
                        });
                    }
                }

                await loadFollowData(profileId);

                button.disabled = false;
            });
    }

    function escapeHtml(value) {
        return String(value || "")
            .replaceAll("&", "&amp;")
            .replaceAll("<", "&lt;")
            .replaceAll(">", "&gt;")
            .replaceAll('"', "&quot;")
            .replaceAll("'", "&#039;");
    }

    window.logOut = async function () {
        await supabase.auth.signOut();
        window.location.href = "login.html";
    };


    document.addEventListener("pointerdown", function (e) {

        const badgeWrap =
            e.target.closest(
                "#profile-badge-wrap"
            );

        const tooltip =
            document.getElementById(
                "profile-badge-tooltip"
            );

        const badge =
            document.getElementById(
                "profile-badge-wrap"
            );

        if (
            badgeWrap &&
            tooltip
        ) {

            e.preventDefault();
            e.stopPropagation();

            const isOpen =
                tooltip.classList.contains(
                    "open"
                );

            tooltip.classList.toggle(
                "open"
            );

            badge.classList.toggle(
                "badge-open",
                !isOpen
            );

            return;

        }

        if (
            tooltip &&
            badge
        ) {

            tooltip.classList.remove(
                "open"
            );

            badge.classList.remove(
                "badge-open"
            );

        }

    });
</script>

</body>
</html>
