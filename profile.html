<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" href="favicon.png">
    <title>Nullverse Profile</title>

    <script>
        const savedNullverseTheme =
            localStorage.getItem("nullverse-theme") || "void";

        document.documentElement.setAttribute(
            "data-theme",
            savedNullverseTheme
        );
    </script>

    <link rel="stylesheet" href="theme.css?v=20">

    <style>
        :root {
            --profile-color: var(--card-bg);
        }

        @property --rim-angle {
            syntax: "<angle>";
            inherits: false;
            initial-value: 0deg;
        }

        html {
            min-height: 100%;
            background: #000000;
        }

        body {
            margin: 0;
            min-height: 100vh;
            font-family: Arial, sans-serif;
            background: var(--page-bg);
            background-attachment: fixed;
            color: var(--text-primary);
            transition: background 0.25s ease, color 0.25s ease;
        }

        header {
            padding: 12px 40px;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(12,12,14,0.72);
            position: sticky;
            top: 0;
            z-index: 100;
            backdrop-filter: blur(18px);
            -webkit-backdrop-filter: blur(18px);
            box-shadow: 0 10px 35px rgba(0,0,0,0.28);
        }

        .logo,
        .logo a {
            display: flex;
            align-items: center;
        }

        .site-logo {
            height: 64px;
            width: auto;
            display: block;
            max-width: none;
        }

        nav {
            display: flex;
            gap: 22px;
            flex-wrap: wrap;
            align-items: center;
        }

            nav a,
            nav button {
                color: var(--text-secondary);
                text-decoration: none;
                background: none;
                border: none;
                cursor: pointer;
                font-family: Arial, sans-serif;
                font-size: 0.95rem;
                transition: 0.18s ease;
            }

                nav a:hover,
                nav button:hover {
                    color: white;
                }

                nav a.active {
                    color: white;
                    background: linear-gradient( 180deg, #35353b 0%, #1d1d22 45%, #101014 100% );
                    padding: 8px 12px;
                    border-radius: 999px;
                    border: 1px solid rgba(255,255,255,0.12);
                    box-shadow: 0 0 18px rgba(255,255,255,0.10), inset 0 1px 0 rgba(255,255,255,0.07);
                }

        main {
            max-width: 1100px;
            margin: auto;
            padding-bottom: 60px;
        }

        .profile-header {
            overflow: visible;
            background: transparent;
            border-bottom: 1px solid var(--border-color);
        }

        .banner {
            height: 220px;
            background: radial-gradient(circle at 20% 20%, rgba(255,255,255,0.08), transparent 30%), linear-gradient(135deg, #0b0b0d, #1a1a1f);
            background-size: cover;
            background-position: center;
            border-bottom: 1px solid var(--border-color);
        }

        .profile-info {
            display: flex;
            gap: 20px;
            padding: 22px 30px;
            margin: -56px 32px 24px;
            align-items: flex-start;
            background: var(--panel-bg);
            border: 1px solid var(--border-color);
            border-radius: 18px;
            position: relative;
            z-index: 5;
            backdrop-filter: blur(18px);
            -webkit-backdrop-filter: blur(18px);
            box-shadow: 0 18px 40px rgba(0,0,0,.22), 0 0 24px rgba(255,255,255,.03);
        }

        .avatar {
            width: 122px;
            height: 122px;
            border-radius: 50%;
            object-fit: cover;
            border: 5px solid #121214;
            background: #2a2a35;
            flex-shrink: 0;
            box-shadow: 0 0 24px rgba(255,255,255,0.05);
        }

        .info-text {
            flex: 1;
            min-width: 0;
            padding-top: 6px;
        }

        .name-row {
            display: flex;
            align-items: center;
            gap: 12px;
            flex-wrap: wrap;
            margin-bottom: 3px;
        }

        .info-text h1 {
            margin: 0;
            font-size: 2.18rem;
            line-height: 1.08;
        }

        .username {
            display: block;
            color: var(--text-muted);
            margin-top: 4px;
            font-size: .98rem;
        }

        .bio {
            margin-top: 11px;
            max-width: 720px;
            line-height: 1.55;
            color: var(--text-secondary);
        }

        .creator-type {
            margin-top: 9px;
            color: var(--text-muted);
        }

        .badge-wrap {
            position: relative;
            display: inline-flex;
            width: fit-content;
            isolation: isolate;
        }

            .badge-wrap::before,
            .badge-wrap::after {
                content: "";
                position: absolute;
                inset: -4px;
                border-radius: 999px;
                pointer-events: none;
                padding: 3px;
                background: conic-gradient( from var(--rim-angle), transparent 0deg, transparent 28deg, rgba(255,255,255,.18) 39deg, rgba(255,255,255,1) 52deg, rgba(255,255,255,.32) 66deg, transparent 82deg, transparent 208deg, rgba(255,255,255,.16) 219deg, rgba(255,255,255,.9) 232deg, rgba(255,255,255,.28) 246deg, transparent 262deg, transparent 360deg );
                -webkit-mask: linear-gradient(#000 0 0) content-box, linear-gradient(#000 0 0);
                -webkit-mask-composite: xor;
                mask-composite: exclude;
                opacity: .92;
                filter: blur(.7px);
                z-index: 0;
                animation: badgeRimSpin 5s linear infinite;
            }

            .badge-wrap::after {
                inset: -8px;
                padding: 5px;
                opacity: .48;
                filter: blur(9px);
                z-index: -1;
            }

            .badge-wrap:hover::before,
            .badge-wrap.badge-open::before {
                opacity: 1;
                filter: blur(.35px);
            }

            .badge-wrap:hover::after,
            .badge-wrap.badge-open::after {
                opacity: .9;
                filter: blur(13px);
            }

        @keyframes badgeRimSpin {
            from {
                --rim-angle: 0deg;
            }

            to {
                --rim-angle: 360deg;
            }
        }

        .profile-badge {
            display: inline-flex;
            position: relative;
            z-index: 1;
            align-items: center;
            gap: 10px;
            padding: 9px 16px;
            border-radius: 999px;
            background: #000;
            border: 1px solid rgba(255,255,255,.42);
            color: #fff;
            font-size: .86rem;
            font-weight: 850;
            letter-spacing: .085em;
            text-transform: uppercase;
            cursor: pointer;
            user-select: none;
            box-shadow: 0 0 10px rgba(255,255,255,.18), 0 0 24px rgba(255,255,255,.14), 0 0 42px rgba(255,255,255,.08), inset 0 0 12px rgba(255,255,255,.06);
            transition: transform .18s ease, box-shadow .18s ease, border-color .18s ease;
        }

            .profile-badge img {
                width: 24px;
                height: auto;
                display: block;
                object-fit: contain;
                opacity: .98;
                filter: brightness(1.55) contrast(1.18);
                flex-shrink: 0;
            }

        .badge-wrap:hover .profile-badge,
        .badge-wrap.badge-open .profile-badge {
            transform: translateY(-1px);
            border-color: rgba(255,255,255,.7);
            box-shadow: 0 0 14px rgba(255,255,255,.28), 0 0 34px rgba(255,255,255,.22), 0 0 64px rgba(255,255,255,.14), inset 0 0 16px rgba(255,255,255,.09);
        }

        .badge-tooltip {
            position: absolute;
            left: 0;
            top: calc(100% + 12px);
            width: 285px;
            background: #000;
            border: 1px solid rgba(255,255,255,.32);
            border-radius: 14px;
            padding: 13px 15px;
            color: #e6e6ff;
            font-size: .9rem;
            line-height: 1.55;
            opacity: 0;
            visibility: hidden;
            pointer-events: none;
            z-index: 1000;
            box-shadow: 0 0 18px rgba(255,255,255,.14), 0 14px 34px rgba(0,0,0,.5);
        }

        @media (hover: hover) {
            .badge-wrap:hover .badge-tooltip {
                opacity: 1;
                visibility: visible;
            }
        }

        .badge-tooltip.open {
            opacity: 1;
            visibility: visible;
            pointer-events: auto;
        }

        .content-section {
            padding: 38px 40px;
        }

            .content-section h2 {
                margin-top: 0;
                margin-bottom: 20px;
            }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
            gap: 20px;
        }

        .card {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            padding: 20px;
            transition: 0.18s ease;
            box-shadow: 0 12px 30px rgba(0,0,0,0.18);
        }

            .card:hover {
                transform: translateY(-2px);
                border-color: rgba(255,255,255,0.12);
                box-shadow: 0 18px 40px rgba(0,0,0,0.24), 0 0 22px rgba(255,255,255,0.05);
            }

            .card h3 {
                margin-top: 0;
            }

                .card h3 a {
                    color: white;
                    text-decoration: none;
                }

                    .card h3 a:hover {
                        text-decoration: underline;
                    }

            .card p {
                color: var(--text-secondary);
                line-height: 1.5;
            }

        .empty {
            color: var(--text-muted);
        }

        .button {
            display: inline-block;
            margin-top: 14px;
            background: linear-gradient( 180deg, #2a2a2f 0%, #16161a 45%, #0d0d10 100% );
            color: #f5f5f5;
            border: 1px solid rgba(255,255,255,0.12);
            padding: 10px 14px;
            border-radius: 10px;
            text-decoration: none;
            cursor: pointer;
            transition: 0.18s ease;
            box-shadow: 0 0 16px rgba(255,255,255,0.08), inset 0 1px 0 rgba(255,255,255,0.06);
        }

            .button:hover {
                background: linear-gradient( 180deg, #3a3a40 0%, #202026 45%, #111116 100% );
                border-color: rgba(255,255,255,0.18);
                box-shadow: 0 0 20px rgba(255,255,255,0.12), inset 0 1px 0 rgba(255,255,255,0.08);
                transform: translateY(-1px);
            }

        .follow-button.following {
            background: linear-gradient( 180deg, #35353b 0%, #1d1d22 45%, #101014 100% );
        }

        .notification-link {
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }

        .notification-badge {
            min-width: 18px;
            height: 18px;
            padding: 0 6px;
            border-radius: 999px;
            background: white;
            color: black;
            font-size: 0.72rem;
            align-items: center;
            justify-content: center;
            line-height: 1;
        }

        @media (max-width: 800px) {
            header {
                flex-direction: column;
                gap: 14px;
            }

            nav {
                justify-content: center;
            }

            .banner {
                height: 205px;
            }

            .profile-info {
                margin: -48px 20px 24px;
                padding: 22px;
                flex-direction: column;
                align-items: flex-start;
            }

            .avatar {
                width: 116px;
                height: 116px;
            }

            .info-text {
                padding-top: 0;
                width: 100%;
            }

                .info-text h1 {
                    font-size: 2rem;
                }

            .name-row {
                gap: 10px;
                align-items: center;
            }

            .badge-tooltip {
                width: 245px;
            }

            .content-section {
                padding: 25px;
            }
        }
    </style>
</head>

<body>

<header>
    <div class="logo">
        <a href="index.html">
            <img src="Nullverse-3.png"
                 alt="Nullverse"
                 class="site-logo">
        </a>
    </div>

    <nav>
        <a href="index.html">Home</a>
        <a href="notifications.html">Notifications</a>
        <a href="explore.html">Explore</a>
        <a href="profile.html" class="active">Profile</a>
        <a href="dashboard.html">Dashboard</a>
        <button onclick="logOut()">Log Out</button>
    </nav>
</header>

<main>

    <section class="profile-header">
        <div id="profile-banner" class="banner"></div>

        <div class="profile-info">
            <img id="profile-avatar"
                 class="avatar"
                 src="https://placehold.co/200x200/1b1b28/ffffff?text=NV"
                 alt="Profile picture">

            <div class="info-text">
                <div class="name-row">
                    <h1 id="profile-display-name">Loading...</h1>

                    <div class="badge-wrap" id="profile-badge-wrap" style="display:none;">
                        <div id="profile-badge" class="profile-badge"></div>

                        <div id="profile-badge-tooltip" class="badge-tooltip">
                            This badge marks one of the founding creators of Nullverse.
                        </div>
                    </div>
                </div>

                <div id="profile-username" class="username">@username</div>

                <div id="profile-bio" class="bio">Loading bio...</div>

                <div id="profile-creator-type" class="creator-type"></div>

                <div id="follow-stats" style="display:flex; gap:18px; margin-top:14px; color:#bdbdca; flex-wrap:wrap;">
                    <span id="followers-count">0 Followers</span>
                    <span id="following-count">0 Following</span>
                </div>

                <div id="follow-button-container"></div>

                <a id="edit-profile-button" class="button" href="account-settings.html">
                    Edit Profile
                </a>
            </div>

            <div id="moderation-panel"
                 style="
        display:none;
        margin-top:16px;
        padding:16px;
        border:1px solid var(--border-color);
        border-radius:12px;
        background:rgba(255,255,255,0.03);
     ">

                <h3 style="margin-top:0;">Void Architect Controls</h3>

                <label style="display:block;margin-top:10px;color:var(--text-secondary);">
                    Moderation Type
                </label>

                <select id="moderation-duration-mode" style="width:100%;box-sizing:border-box;margin-top:8px;margin-bottom:10px;padding:10px;border-radius:10px;border:1px solid var(--border-color);background:rgba(0,0,0,0.25);color:var(--text-primary);">
                    <option value="timed">Timed</option>
                    <option value="permanent">Permanent</option>
                </select>

                <div id="duration-container">

                    <label style="display:block;color:var(--text-secondary);">
                        Duration in seconds
                    </label>

                    <input id="moderation-duration-seconds"
                           type="number"
                           min="1"
                           placeholder="Example: 3600"
                           style="width:100%;box-sizing:border-box;margin-top:8px;margin-bottom:10px;padding:10px;border-radius:10px;border:1px solid var(--border-color);background:rgba(0,0,0,0.25);color:var(--text-primary);">

                </div>

                <input id="moderation-reason" placeholder="Reason for action..." style="width:100%;box-sizing:border-box;margin-top:8px;margin-bottom:12px;padding:10px;border-radius:10px;border:1px solid var(--border-color);background:rgba(0,0,0,0.25);color:var(--text-primary);">

                <div style="display:flex; gap:10px; flex-wrap:wrap;">
                    <button class="button" onclick="setAccountStatus('active')">Restore</button>
                    <button class="button" onclick="applyModerationStatus('restricted')">Restrict</button>
                    <button class="button" onclick="applyModerationStatus('suspended')">Suspend</button>
                    <button class="button" onclick="applyModerationStatus('banned')">Ban</button>
                </div>

                <div id="moderation-status-display" style="margin-top:12px; color:var(--text-secondary);"></div>

            </div>
</section>



    <section class="content-section">
        <h2>Featured Worlds</h2>
        <div id="featured-worlds" class="grid">
            <p class="empty">Loading featured worlds...</p>
        </div>
    </section>

    <section class="content-section">
        <h2>Published Worlds</h2>
        <div id="all-worlds" class="grid">
            <p class="empty">Loading worlds...</p>
        </div>
    </section>

</main>

<script type="module">
    import { requireBetaAccess } from "./betaGate.js";
    import { supabase } from "./supabaseClient.js";
    import { createNotification } from "./notifications.js";
    import { setupNotificationBadge } from "./notificationBadge.js";

    const currentUser = await requireBetaAccess();
    setupNotificationBadge();
    const { data: currentProfile } = await supabase
        .from("profiles")
        .select("username, display_name, role")
        .eq("id", currentUser.id)
        .single();

    const params = new URLSearchParams(window.location.search);
    const usernameFromUrl = params.get("user");

    let query = supabase
        .from("profiles")
        .select("*");

    if (usernameFromUrl) {
        query = query.eq("username", usernameFromUrl);
    } else {
        const { data: { user } } = await supabase.auth.getUser();
        query = query.eq("id", user.id);
    }

    const { data: profile, error } = await query.single();

    if (error || !profile) {
        showProfileNotFound();
    } else {
        renderProfile(profile);

        await Promise.all([
            loadProfileWorlds(profile.id),
            loadFollowData(profile.id)
        ]);
    }

    function renderProfile(profile) {
        document.getElementById("profile-display-name").textContent =
            profile.display_name || "Unnamed Creator";
        const badge =
            document.getElementById(
                "profile-badge"
            );

        if (
            profile.profile_badge
        ) {

            document.getElementById("profile-badge-wrap").style.display = "inline-flex";

            badge.innerHTML =
                `
<img
src="Infinity.png"
alt=""
>

<span>
${escapeHtml(
                    profile.profile_badge
                )}
</span>
`;

        }

        else {

            document.getElementById("profile-badge-wrap").style.display = "none";

        }

        document.getElementById("profile-username").textContent =
            "@" + (profile.username || "username");

        document.getElementById("profile-bio").textContent =
            profile.bio || "No bio yet.";

        document.getElementById("profile-creator-type").textContent =
            profile.creator_type || "";


        

        document.documentElement.style.setProperty(
            "--profile-color",
            profile.profile_color || "#15151f"
        );

        if (profile.avatar_url) {
            document.getElementById("profile-avatar").src = profile.avatar_url;
        }

        if (profile.banner_url) {
            document.getElementById("profile-banner").style.backgroundImage =
                `url('${profile.banner_url}')`;
        }
        const editButton = document.getElementById("edit-profile-button");

        if (editButton && currentUser.id !== profile.id) {
            editButton.style.display = "none";
        }
        if (
            currentProfile?.role === "void_architect" &&
            currentUser.id !== profile.id &&
            profile.role !== "void_architect"
        ) {
            document.getElementById("moderation-panel").style.display = "block";

            const expires = profile.moderation_expires_at
                ? new Date(profile.moderation_expires_at).toLocaleString()
                : profile.account_status === "active"
                    ? "None"
                    : "Permanent";

            document.getElementById("moderation-status-display").textContent =
                `Status: ${profile.account_status || "active"} | Expires: ${expires}`;
        }
    }

    function showProfileNotFound() {
        document.getElementById("profile-display-name").textContent =
            "Profile not found";

        document.getElementById("profile-username").textContent = "";

        document.getElementById("profile-bio").textContent =
            "This creator profile does not exist.";

        document.getElementById("profile-creator-type").textContent = "";

        document.getElementById("profile-avatar").src =
            "https://placehold.co/200x200/1b1b28/ffffff?text=?";

        document.getElementById("profile-banner").style.background =
            "linear-gradient(135deg, #1b1b28, #2a2a44)";

        document.getElementById("featured-worlds").innerHTML =
            `<p class="empty">No featured worlds.</p>`;

        document.getElementById("all-worlds").innerHTML =
            `<p class="empty">No published worlds.</p>`;

        const editButton = document.querySelector('a[href="account-settings.html"]');
        if (editButton) {
            editButton.style.display = "none";
        }
    }

    async function loadProfileWorlds(profileId) {
        const featuredContainer = document.getElementById("featured-worlds");
        const allContainer = document.getElementById("all-worlds");

        const { data: worlds, error } = await supabase
            .from("worlds")
            .select("*")
            .eq("owner_id", profileId)
            .eq("visibility", "published")
            .order("updated_at", { ascending: false });

        if (error) {
            featuredContainer.innerHTML = `<p class="empty">${error.message}</p>`;
            allContainer.innerHTML = `<p class="empty">${error.message}</p>`;
            return;
        }

        if (!worlds || worlds.length === 0) {
            featuredContainer.innerHTML =
                `<p class="empty">No featured worlds yet.</p>`;

            allContainer.innerHTML =
                `<p class="empty">No published worlds yet.</p>`;

            return;
        }

        const featuredWorlds = worlds.filter(world => world.featured);

        featuredContainer.innerHTML = featuredWorlds.length
            ? featuredWorlds.map(renderWorldCard).join("")
            : `<p class="empty">No featured worlds yet.</p>`;

        allContainer.innerHTML = worlds.map(renderWorldCard).join("");
    }

    function renderWorldCard(world) {

        const coverImage =
            world.cover_image_url ||
            "https://placehold.co/600x600/1b1b28/ffffff?text=World";

        return `
        <div class="card">

           <div style="
    width:100%;
    height:145px;
    border-radius:12px;
    overflow:hidden;
    margin-bottom:16px;
    background:#222;
">
    <img
        src="${escapeHtml(coverImage)}"
        alt="${escapeHtml(world.title || "World cover")}"
        style="
            width:100%;
            height:100%;
            object-fit:cover;
            display:block;
        "
    >
</div>

            <p class="empty">
                ${escapeHtml(world.genres || "World")}
            </p>

            <h3>
                <a href="world.html?id=${encodeURIComponent(world.id)}">
                    ${escapeHtml(world.title || "Untitled World")}
                </a>
            </h3>

            <p>
                ${escapeHtml(world.summary || "No summary yet.")}
            </p>

            <p class="empty">
                ${escapeHtml(world.themes || "")}
            </p>

        </div>
    `;
    }

    async function loadFollowData(profileId) {

        const { count: followerCount } = await supabase
            .from("follows")
            .select("*", { count: "exact", head: true })
            .eq("following_id", profileId);

        const { count: followingCount } = await supabase
            .from("follows")
            .select("*", { count: "exact", head: true })
            .eq("follower_id", profileId);

        document.getElementById("followers-count").textContent =
            `${followerCount || 0} Followers`;

        document.getElementById("following-count").textContent =
            `${followingCount || 0} Following`;

        if (!currentUser || currentUser.id === profileId) {
            return;
        }

        const { data: existingFollow } = await supabase
            .from("follows")
            .select("*")
            .eq("follower_id", currentUser.id)
            .eq("following_id", profileId)
            .maybeSingle();

        renderFollowButton(profileId, !!existingFollow);
    }

    function renderFollowButton(profileId, isFollowing) {

        document.getElementById("follow-button-container").innerHTML = `
        <button
            id="follow-button"
            class="button follow-button ${isFollowing ? "following" : ""}"
        >
            ${isFollowing ? "Following" : "Follow"}
        </button>
    `;

        document.getElementById("follow-button")
            .addEventListener("click", async () => {

                const button =
                    document.getElementById("follow-button");

                button.disabled = true;

                if (isFollowing) {

                    await supabase
                        .from("follows")
                        .delete()
                        .eq("follower_id", currentUser.id)
                        .eq("following_id", profileId);

                } else {

                    const { error: followError } = await supabase
                        .from("follows")
                        .insert({
                            follower_id: currentUser.id,
                            following_id: profileId
                        });

                    if (!followError) {
                        await createNotification({
                            recipientId: profileId,
                            actorId: currentUser.id,
                            type: "new_follower",
                            message: `${currentProfile?.display_name || currentProfile?.username || "Someone"} followed you.`,
                            link: `profile.html?user=${encodeURIComponent(currentProfile?.username || "")}`
                        });
                    }
                }

                await loadFollowData(profileId);

                button.disabled = false;
            });
    }

    function escapeHtml(value) {
        return String(value || "")
            .replaceAll("&", "&amp;")
            .replaceAll("<", "&lt;")
            .replaceAll(">", "&gt;")
            .replaceAll('"', "&quot;")
            .replaceAll("'", "&#039;");
    }

    window.logOut = async function () {
        await supabase.auth.signOut();
        window.location.href = "login.html";
    };


    document.addEventListener("pointerdown", function (e) {

        const badgeWrap =
            e.target.closest(
                "#profile-badge-wrap"
            );

        const tooltip =
            document.getElementById(
                "profile-badge-tooltip"
            );

        const badge =
            document.getElementById(
                "profile-badge-wrap"
            );

        if (
            badgeWrap &&
            tooltip
        ) {

            e.preventDefault();
            e.stopPropagation();

            const isOpen =
                tooltip.classList.contains(
                    "open"
                );

            tooltip.classList.toggle(
                "open"
            );

            badge.classList.toggle(
                "badge-open",
                !isOpen
            );

            return;

        }

        if (
            tooltip &&
            badge
        ) {

            tooltip.classList.remove(
                "open"
            );

            badge.classList.remove(
                "badge-open"
            );

        }

    });

    window.setTimedAccountStatus = async function (status) {
        const seconds = Number(document.getElementById("moderation-duration-seconds").value);
        const reason = document.getElementById("moderation-reason").value.trim();

        if (!seconds || seconds < 1) {
            alert("Enter a valid duration in seconds.");
            return;
        }

        const expiresAt = new Date();
        expiresAt.setSeconds(expiresAt.getSeconds() + seconds);

        await setAccountStatus(status, expiresAt.toISOString(), reason);
    };

    window.setPermanentAccountStatus = async function () {
        const status = prompt("Permanent status: restricted, suspended, or banned");
        if (!["restricted", "suspended", "banned"].includes(status)) {
            alert("Use restricted, suspended, or banned.");
            return;
        }

        const reason = document.getElementById("moderation-reason").value.trim();
        await setAccountStatus(status, null, reason);
    };

    window.applyModerationStatus = async function(status) {
    const mode = document.getElementById("moderation-duration-mode").value;
    const seconds = Number(document.getElementById("moderation-duration-seconds").value);
    const reason = document.getElementById("moderation-reason").value.trim();

    let expiresAt = null;

    if (mode === "timed") {
        if (!seconds || seconds < 1) {
            alert("Enter a valid duration in seconds.");
            return;
        }

        const expiration = new Date();
        expiration.setSeconds(expiration.getSeconds() + seconds);
        expiresAt = expiration.toISOString();
    }

    await setAccountStatus(status, expiresAt, reason);
};

window.setAccountStatus = async function(status, expiresAt = null, reason = "") {
    if (!confirm(`Set account to ${status}?`)) return;

    const { error } = await supabase
        .from("profiles")
        .update({
            account_status: status,
            moderation_expires_at: status === "active" ? null : expiresAt,
            moderation_reason: status === "active" ? null : reason
        })
        .eq("id", profile.id);

    if (error) {
        alert(error.message);
        return;
    }

    alert(`Account updated to ${status}.`);
    window.location.reload();
    };

    function setupModerationModeToggle() {
        const moderationMode = document.getElementById("moderation-duration-mode");
        const durationContainer = document.getElementById("duration-container");

        if (!moderationMode || !durationContainer) return;

        function updateModerationMode() {
            durationContainer.style.display =
                moderationMode.value === "permanent" ? "none" : "block";
        }

        moderationMode.addEventListener("change", updateModerationMode);
        updateModerationMode();
    }

    setupModerationModeToggle();
</script>
