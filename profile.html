<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" href="favicon.png">
    <title>Nullverse Profile</title>

    <style>
        :root {
            --profile-color: #15151f;
        }

        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #0d0d12;
            color: #f2f2f2;
        }

        header {
            padding: 24px 40px;
            border-bottom: 1px solid #2a2a35;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #111118;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .logo {
            display: flex;
            align-items: center;
        }

            .logo a {
                display: flex;
                align-items: center;
            }

        .site-logo {
            height: 64px;
            width: auto;
            display: block;
            max-width: none;
        }

        nav {
            display: flex;
            gap: 22px;
            flex-wrap: wrap;
            align-items: center;
        }

            nav a, nav button {
                color: #cfcfd8;
                text-decoration: none;
                background: none;
                border: none;
                cursor: pointer;
                font-family: Arial, sans-serif;
                font-size: 0.95rem;
            }

                nav a:hover, nav button:hover {
                    color: white;
                }
                nav a.active {
                    color: white;
                    background: #2a2a44;
                    padding: 8px 12px;
                    border-radius: 999px;
                }

        main {
            max-width: 1100px;
            margin: auto;
            padding-bottom: 60px;
        }

        .profile-header {
            overflow: hidden;
            background: #15151f;
            border-bottom: 1px solid #2a2a35;
        }

        .banner {
            height: 240px;
            background: linear-gradient(135deg, #1b1b28, #2a2a44);
            background-size: cover;
            background-position: center;
        }

        .profile-info {
            display: flex;
            gap: 24px;
            padding: 24px 32px;
            margin: -70px 32px 30px;
            flex-wrap: wrap;
            align-items: flex-end;
            background: var(--profile-color, #15151f);
            border: 1px solid #2a2a35;
            border-radius: 18px;
            position: relative;
            z-index: 5;
        }

        .avatar {
            width: 130px;
            height: 130px;
            border-radius: 50%;
            object-fit: cover;
            border: 5px solid #15151f;
            background: #2a2a35;
        }

        .info-text h1 {
            margin: 0;
            font-size: 2.2rem;
        }

        .username {
            color: #9c9cb0;
            margin-top: 6px;
        }

        .bio {
            margin-top: 14px;
            max-width: 700px;
            line-height: 1.6;
            color: #c8c8d4;
        }

        .creator-type {
            margin-top: 12px;
            color: #8f8fa3;
        }

        .name-row {
            display: flex;
            align-items: center;
            gap: 10px;
            flex-wrap: wrap;
        }

        .profile-badge {
            display: inline-flex;
            align-items: center;
            gap: 9px;
            padding: 8px 14px;
            border-radius: 999px;
            background: #000;
            border: 1px solid rgba( 255, 255, 255, .18 );
            color: #fff;
            font-size: .82rem;
            font-weight: 800;
            letter-spacing: .08em;
            text-transform: uppercase;
            box-shadow: 0 0 20px rgba( 255, 255, 255, .06 );
            transition: .18s;
        }

            .profile-badge img {
                width: 22px;
                height: auto;
                display: block;
                object-fit: contain;
                opacity: .96;
                filter: brightness(1.35) contrast(1.15);
                flex-shrink: 0;
            }

            .profile-badge:hover {
                transform: translateY(-1px);
                border-color: rgba( 255, 255, 255, .32 );
            }

            .profile-badge img {
                width: 18px;
                height: auto;
                display: block;
                object-fit: contain;
                opacity: .82;
                filter: brightness(1.15);
                flex-shrink: 0;
            }

        .content-section {
            padding: 40px;
        }

            .content-section h2 {
                margin-top: 0;
                margin-bottom: 20px;
            }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
            gap: 20px;
        }

        .card {
            background: #15151f;
            border: 1px solid #2a2a35;
            border-radius: 12px;
            padding: 20px;
        }

            .card h3 {
                margin-top: 0;
            }

                .card h3 a {
                    color: white;
                    text-decoration: none;
                }

                    .card h3 a:hover {
                        text-decoration: underline;
                    }

            .card p {
                color: #c8c8d4;
                line-height: 1.5;
            }

        .empty {
            color: #8f8fa3;
        }

        .button {
            display: inline-block;
            margin-top: 14px;
            background: #2a2a44;
            color: white;
            border: none;
            padding: 10px 14px;
            border-radius: 8px;
            text-decoration: none;
            cursor: pointer;
        }

            .button:hover {
                background: #3a3a5c;
            }

        .follow-button.following {
            background: #4a2d36;
        }

        @media (max-width: 800px) {
            header {
                flex-direction: column;
                gap: 14px;
            }

            .profile-info {
                flex-direction: column;
                align-items: flex-start;
            }

            .content-section {
                padding: 25px;
            }
        }
        .notification-link {
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }

        .notification-badge {
            min-width: 18px;
            height: 18px;
            padding: 0 6px;
            border-radius: 999px;
            background: #56568a;
            color: white;
            font-size: 0.72rem;
            align-items: center;
            justify-content: center;
            line-height: 1;
        }
    </style>
</head>

<body>

<header>
    <div class="logo">
        <a href="index.html">
            <img src="Nullverse-3.png"
                 alt="Nullverse"
                 class="site-logo">
        </a>
    </div>

    <nav>
        <a href="index.html">Home</a>
        <a href="notifications.html">Notifications</a>
        <a href="explore.html">Explore</a>
        <a href="profile.html" class="active">Profile</a>
        <a href="dashboard.html">Dashboard</a>
        <button onclick="logOut()">Log Out</button>
    </nav>
</header>

<main>

    <section class="profile-header">
        <div id="profile-banner" class="banner"></div>

        <div class="profile-info">
            <img id="profile-avatar"
                 class="avatar"
                 src="https://placehold.co/200x200/1b1b28/ffffff?text=NV"
                 alt="Profile picture">

            <div class="info-text">
                <div class="name-row">

                    <h1 id="profile-display-name">
                        Loading...
                    </h1>

                    <div id="profile-badge"
                         class="profile-badge"
                         style="display:none;"></div>

                </div>

                <div id="profile-username" class="username">
                    @username
                </div>

                <div id="profile-bio" class="bio">
                    Loading bio...
                </div>

                <div id="profile-creator-type" class="creator-type"></div>

                <div id="follow-stats" style="
                    display:flex;
                    gap:18px;
                    margin-top:16px;
                    color:#bdbdca;
                    flex-wrap:wrap;
                ">
                    <span id="followers-count">0 Followers</span>
                    <span id="following-count">0 Following</span>
                </div>

                <div id="follow-button-container"></div>

                <a id="edit-profile-button" class="button" href="account-settings.html">
                    Edit Profile
                </a>
            </div>
        </div>
    </section>

    <section class="content-section">
        <h2>Featured Worlds</h2>
        <div id="featured-worlds" class="grid">
            <p class="empty">Loading featured worlds...</p>
        </div>
    </section>

    <section class="content-section">
        <h2>Published Worlds</h2>
        <div id="all-worlds" class="grid">
            <p class="empty">Loading worlds...</p>
        </div>
    </section>

</main>

<script type="module">
    import { requireBetaAccess } from "./betaGate.js";
    import { supabase } from "./supabaseClient.js";
    import { createNotification } from "./notifications.js";
    import { setupNotificationBadge } from "./notificationBadge.js";

    const currentUser = await requireBetaAccess();
    setupNotificationBadge();
    const { data: currentProfile } = await supabase
        .from("profiles")
        .select("username, display_name")
        .eq("id", currentUser.id)
        .single();

    const params = new URLSearchParams(window.location.search);
    const usernameFromUrl = params.get("user");

    let query = supabase
        .from("profiles")
        .select("*");

    if (usernameFromUrl) {
        query = query.eq("username", usernameFromUrl);
    } else {
        const { data: { user } } = await supabase.auth.getUser();
        query = query.eq("id", user.id);
    }

    const { data: profile, error } = await query.single();

    if (error || !profile) {
        showProfileNotFound();
    } else {
        renderProfile(profile);

        await Promise.all([
            loadProfileWorlds(profile.id),
            loadFollowData(profile.id)
        ]);
    }

    function renderProfile(profile) {
        document.getElementById("profile-display-name").textContent =
            profile.display_name || "Unnamed Creator";
        const badge =
            document.getElementById(
                "profile-badge"
            );

        if (
            profile.profile_badge
        ) {

            badge.style.display =
                "inline-flex";

            badge.innerHTML =
                `
<img
src="Infinity.png"
alt=""
>

<span>
${escapeHtml(
                    profile.profile_badge
                )}
</span>
`;

        }

        else {

            badge.style.display =
                "none";

        }

        document.getElementById("profile-username").textContent =
            "@" + (profile.username || "username");

        document.getElementById("profile-bio").textContent =
            profile.bio || "No bio yet.";

        document.getElementById("profile-creator-type").textContent =
            profile.creator_type || "";


        

        document.documentElement.style.setProperty(
            "--profile-color",
            profile.profile_color || "#15151f"
        );

        if (profile.avatar_url) {
            document.getElementById("profile-avatar").src = profile.avatar_url;
        }

        if (profile.banner_url) {
            document.getElementById("profile-banner").style.backgroundImage =
                `url('${profile.banner_url}')`;
        }
        const editButton = document.getElementById("edit-profile-button");

        if (editButton && currentUser.id !== profile.id) {
            editButton.style.display = "none";
        }
    }

    function showProfileNotFound() {
        document.getElementById("profile-display-name").textContent =
            "Profile not found";

        document.getElementById("profile-username").textContent = "";

        document.getElementById("profile-bio").textContent =
            "This creator profile does not exist.";

        document.getElementById("profile-creator-type").textContent = "";

        document.getElementById("profile-avatar").src =
            "https://placehold.co/200x200/1b1b28/ffffff?text=?";

        document.getElementById("profile-banner").style.background =
            "linear-gradient(135deg, #1b1b28, #2a2a44)";

        document.getElementById("featured-worlds").innerHTML =
            `<p class="empty">No featured worlds.</p>`;

        document.getElementById("all-worlds").innerHTML =
            `<p class="empty">No published worlds.</p>`;

        const editButton = document.querySelector('a[href="account-settings.html"]');
        if (editButton) {
            editButton.style.display = "none";
        }
    }

    async function loadProfileWorlds(profileId) {
        const featuredContainer = document.getElementById("featured-worlds");
        const allContainer = document.getElementById("all-worlds");

        const { data: worlds, error } = await supabase
            .from("worlds")
            .select("*")
            .eq("owner_id", profileId)
            .eq("visibility", "published")
            .order("updated_at", { ascending: false });

        if (error) {
            featuredContainer.innerHTML = `<p class="empty">${error.message}</p>`;
            allContainer.innerHTML = `<p class="empty">${error.message}</p>`;
            return;
        }

        if (!worlds || worlds.length === 0) {
            featuredContainer.innerHTML =
                `<p class="empty">No featured worlds yet.</p>`;

            allContainer.innerHTML =
                `<p class="empty">No published worlds yet.</p>`;

            return;
        }

        const featuredWorlds = worlds.filter(world => world.featured);

        featuredContainer.innerHTML = featuredWorlds.length
            ? featuredWorlds.map(renderWorldCard).join("")
            : `<p class="empty">No featured worlds yet.</p>`;

        allContainer.innerHTML = worlds.map(renderWorldCard).join("");
    }

    function renderWorldCard(world) {

        const coverImage =
            world.cover_image_url ||
            "https://placehold.co/600x600/1b1b28/ffffff?text=World";

        return `
        <div class="card">

           <div style="
    width:100%;
    height:145px;
    border-radius:12px;
    overflow:hidden;
    margin-bottom:16px;
    background:#222;
">
    <img
        src="${escapeHtml(coverImage)}"
        alt="${escapeHtml(world.title || "World cover")}"
        style="
            width:100%;
            height:100%;
            object-fit:cover;
            display:block;
        "
    >
</div>

            <p class="empty">
                ${escapeHtml(world.genres || "World")}
            </p>

            <h3>
                <a href="world.html?id=${encodeURIComponent(world.id)}">
                    ${escapeHtml(world.title || "Untitled World")}
                </a>
            </h3>

            <p>
                ${escapeHtml(world.summary || "No summary yet.")}
            </p>

            <p class="empty">
                ${escapeHtml(world.themes || "")}
            </p>

        </div>
    `;
    }

    async function loadFollowData(profileId) {

        const { count: followerCount } = await supabase
            .from("follows")
            .select("*", { count: "exact", head: true })
            .eq("following_id", profileId);

        const { count: followingCount } = await supabase
            .from("follows")
            .select("*", { count: "exact", head: true })
            .eq("follower_id", profileId);

        document.getElementById("followers-count").textContent =
            `${followerCount || 0} Followers`;

        document.getElementById("following-count").textContent =
            `${followingCount || 0} Following`;

        if (!currentUser || currentUser.id === profileId) {
            return;
        }

        const { data: existingFollow } = await supabase
            .from("follows")
            .select("*")
            .eq("follower_id", currentUser.id)
            .eq("following_id", profileId)
            .maybeSingle();

        renderFollowButton(profileId, !!existingFollow);
    }

    function renderFollowButton(profileId, isFollowing) {

        document.getElementById("follow-button-container").innerHTML = `
        <button
            id="follow-button"
            class="button follow-button ${isFollowing ? "following" : ""}"
        >
            ${isFollowing ? "Following" : "Follow"}
        </button>
    `;

        document.getElementById("follow-button")
            .addEventListener("click", async () => {

                const button =
                    document.getElementById("follow-button");

                button.disabled = true;

                if (isFollowing) {

                    await supabase
                        .from("follows")
                        .delete()
                        .eq("follower_id", currentUser.id)
                        .eq("following_id", profileId);

                } else {

                    const { error: followError } = await supabase
                        .from("follows")
                        .insert({
                            follower_id: currentUser.id,
                            following_id: profileId
                        });

                    if (!followError) {
                        await createNotification({
                            recipientId: profileId,
                            actorId: currentUser.id,
                            type: "new_follower",
                            message: `${currentProfile?.display_name || currentProfile?.username || "Someone"} followed you.`,
                            link: `profile.html?user=${encodeURIComponent(currentProfile?.username || "")}`
                        });
                    }
                }

                await loadFollowData(profileId);

                button.disabled = false;
            });
    }

    function escapeHtml(value) {
        return String(value || "")
            .replaceAll("&", "&amp;")
            .replaceAll("<", "&lt;")
            .replaceAll(">", "&gt;")
            .replaceAll('"', "&quot;")
            .replaceAll("'", "&#039;");
    }

    window.logOut = async function () {
        await supabase.auth.signOut();
        window.location.href = "login.html";
    };
</script>

</body>
</html>
