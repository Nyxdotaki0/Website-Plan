<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1.0">
    <link rel="icon" type="image/png" href="favicon.png">
    <title>Comic - Nullverse</title>
    <script>
        const savedNullverseTheme = localStorage.getItem("nullverse-theme") || "void";
        document.documentElement.setAttribute("data-theme", savedNullverseTheme);
    </script>
    <link rel="stylesheet" href="theme.css?v=25">
    <style>
        html {
            min-height: 100%;
            background: #000
        }

        body {
            margin: 0;
            min-height: 100vh;
            font-family: Arial,sans-serif;
            background: #000;
            background-attachment: fixed;
            color: var(--text-primary);
            overflow-x: hidden
        }

            body.reader-open {
                overflow: hidden
            }

        header, main {
            position: relative;
            z-index: 2
        }

        .comic-background-layer {
            position: fixed;
            inset: 0;
            z-index: 0;
            overflow: hidden;
            pointer-events: none
        }

        .comic-background-base, .comic-background-image, .comic-background-overlay {
            position: absolute;
            inset: 0
        }

        .comic-background-base {
            background: var(--page-bg)
        }

        .comic-background-image {
            background-position: center;
            background-size: cover;
            background-repeat: no-repeat;
            opacity: .35
        }

        .comic-background-overlay {
            background: rgba(0,0,0,.35)
        }

        .comic-background-layer .credit-pill {
            position: fixed;
            left: 18px;
            bottom: 18px;
            pointer-events: auto
        }

        header {
            padding: 12px 40px;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(12,12,14,.72);
            position: sticky;
            top: 0;
            z-index: 100;
            backdrop-filter: blur(18px);
            -webkit-backdrop-filter: blur(18px);
            box-shadow: 0 10px 35px rgba(0,0,0,.28)
        }

        .logo, .logo a {
            display: flex;
            align-items: center
        }

        .site-logo {
            height: 64px;
            width: auto;
            display: block;
            max-width: none
        }

        nav {
            display: flex;
            gap: 22px;
            flex-wrap: wrap;
            align-items: center
        }

            nav a, nav button {
                color: var(--text-secondary);
                text-decoration: none;
                background: none;
                border: none;
                cursor: pointer;
                font-family: Arial,sans-serif;
                font-size: .95rem;
                transition: .18s ease
            }

                nav a:hover, nav button:hover {
                    color: white
                }

        main {
            display: flex;
            gap: 28px;
            max-width: 1500px;
            margin: auto;
            padding: 45px 40px 80px
        }

        .left-sidebar {
            width: 290px;
            flex-shrink: 0;
            position: sticky;
            top: 110px;
            height: fit-content
        }

        .content-column {
            flex: 1;
            min-width: 0
        }

        .comic-hero, .chapter-index, .comic-gallery-panel, .content-warning-panel {
            border: 1px solid var(--border-color);
            border-radius: 22px;
            background: var(--panel-bg);
            backdrop-filter: blur(18px);
            -webkit-backdrop-filter: blur(18px);
            box-shadow: 0 18px 40px rgba(0,0,0,.24),0 0 24px rgba(255,255,255,.03)
        }

        .comic-hero {
            position: relative;
            overflow: hidden;
            padding: 34px;
            padding-bottom: 72px;
            margin-bottom: 28px;
            background: linear-gradient(135deg,rgba(255,255,255,.06),rgba(255,255,255,.02)),var(--panel-bg)
        }

        .comic-layout {
            display: grid;
            grid-template-columns: minmax(180px,260px) minmax(0,1fr);
            gap: 26px;
            align-items: start
        }

        .cover-wrap {
            position: relative;
            overflow: hidden;
            border-radius: 18px;
            border: 1px solid rgba(255,255,255,.12);
            background: rgba(255,255,255,.04);
            box-shadow: 0 14px 34px rgba(0,0,0,.24)
        }

            .cover-wrap img {
                width: 100%;
                height: auto;
                max-height: 420px;
                object-fit: contain;
                display: block
            }

            .cover-wrap.has-credit {
                padding-bottom: 54px
            }

        .cover-placeholder {
            min-height: 270px;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 18px;
            text-align: center;
            color: var(--text-muted);
            box-sizing: border-box
        }

        .tag-row {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            margin-bottom: 18px
        }

        .tag {
            display: inline-block;
            font-size: .82rem;
            color: var(--text-secondary);
            border: 1px solid var(--border-color);
            background: rgba(255,255,255,.04);
            border-radius: 999px;
            padding: 7px 11px
        }

        h1 {
            margin: 0 0 10px;
            font-size: clamp(2rem,5vw,4.2rem);
            color: var(--text-primary)
        }

        .creator, .summary {
            color: var(--text-secondary);
            line-height: 1.7
        }

            .creator a {
                color: var(--text-secondary);
                text-decoration: none
            }

                .creator a:hover {
                    color: white
                }

        .summary {
            margin-top: 18px;
            white-space: pre-wrap
        }

        .action-row {
            display: flex;
            align-items: center;
            gap: 14px;
            margin-top: 26px;
            flex-wrap: wrap
        }

        .button, .like-button {
            display: inline-block;
            background: linear-gradient(180deg,#2a2a2f,#0d0d10);
            color: #f5f5f5;
            border: 1px solid rgba(255,255,255,.12);
            padding: 10px 15px;
            border-radius: 10px;
            cursor: pointer;
            text-decoration: none;
            font-family: Arial,sans-serif;
            transition: .18s ease;
            box-shadow: 0 0 16px rgba(255,255,255,.08),inset 0 1px 0 rgba(255,255,255,.06)
        }

            .button:hover, .like-button:hover {
                opacity: .92;
                transform: translateY(-1px);
                border-color: rgba(255,255,255,.18)
            }

            .button.active {
                background: linear-gradient(180deg,#4a4a52,#1a1a20)
            }

            .like-button.liked {
                background: linear-gradient(180deg,#4a2f37 0%,#2a181d 100%)
            }

        .like-count {
            color: var(--text-muted)
        }

        .owner-actions {
            margin-top: 22px
        }

        .chapter-index {
            position: relative;
            overflow: hidden;
            padding: 18px;
            padding-bottom: 85px;
            background: var(--comic-index-background,var(--panel-bg));
            color: var(--comic-index-text,var(--text-primary))
        }

            .chapter-index::before {
                content: "";
                position: absolute;
                inset: 0;
                background-image: var(--comic-index-image);
                background-size: cover;
                background-position: center;
                opacity: var(--comic-index-opacity,.85);
                z-index: 0
            }

            .chapter-index::after {
                content: "";
                position: absolute;
                inset: 0;
                background: rgba(0,0,0,var(--comic-index-overlay,.35));
                z-index: 1
            }

            .chapter-index > * {
                position: relative;
                z-index: 2
            }

        .index-header h2 {
            margin: 0;
            font-size: 1.15rem
        }

        .index-header p {
            margin: 6px 0 18px;
            color: var(--comic-index-text,var(--text-muted));
            font-size: .88rem;
            line-height: 1.5
        }

        .chapter-search {
            width: 100%;
            box-sizing: border-box;
            padding: 12px 14px;
            border-radius: 12px;
            border: 1px solid rgba(255,255,255,.16);
            background: rgba(0,0,0,.28);
            color: var(--comic-index-text,white);
            margin-bottom: 14px;
            transition: .18s ease
        }

            .chapter-search:focus {
                outline: none;
                border-color: rgba(255,255,255,.24);
                box-shadow: 0 0 16px rgba(255,255,255,.06)
            }

        .chapter-count {
            color: var(--comic-index-text,var(--text-muted));
            font-size: .82rem;
            margin-bottom: 16px
        }

        #chapter-nav-links {
            display: flex;
            flex-direction: column;
            gap: 10px
        }

        .chapter-nav-link {
            display: block;
            padding: 13px 14px;
            border-radius: 14px;
            background: rgba(0,0,0,.18);
            border: 1px solid rgba(255,255,255,.08);
            color: var(--comic-index-button-text,var(--comic-index-text));
            text-decoration: none;
            transition: .18s ease
        }

            .chapter-nav-link:hover, .chapter-nav-link.active {
                background: rgba(255,255,255,.14);
                transform: translateX(4px);
                color: var(--comic-index-text,white);
                border-color: rgba(255,255,255,.18)
            }

            .chapter-nav-link span {
                display: block;
                font-weight: 600
            }

            .chapter-nav-link small {
                display: block;
                margin-top: 5px;
                color: var(--comic-index-button-text,var(--comic-index-text));
                font-size: .78rem;
                opacity: .82
            }

        .comic-gallery-panel {
            padding: 28px;
            margin-bottom: 28px
        }

        .gallery-top {
            display: flex;
            justify-content: space-between;
            gap: 16px;
            flex-wrap: wrap;
            align-items: flex-start;
            margin-bottom: 22px
        }

            .gallery-top h2 {
                margin: 0;
                font-size: clamp(1.6rem,3vw,2.6rem)
            }

        .chapter-eyebrow {
            color: var(--text-muted);
            font-size: .88rem;
            letter-spacing: .08em;
            text-transform: uppercase;
            margin-bottom: 8px
        }

        .chapter-subtitle {
            color: var(--text-secondary);
            line-height: 1.6;
            margin-top: 8px
        }

        .author-note {
            margin: 18px 0 22px;
            background: rgba(255,255,255,.055);
            border: 1px solid rgba(255,255,255,.10);
            border-radius: 16px;
            padding: 18px;
            color: var(--text-secondary);
            line-height: 1.7;
            white-space: pre-wrap
        }

        .chapter-gallery-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill,minmax(145px,1fr));
            gap: 16px
        }

        .page-thumb {
            position: relative;
            border: 1px solid rgba(255,255,255,.10);
            border-radius: 16px;
            background: rgba(255,255,255,.035);
            overflow: hidden;
            cursor: pointer;
            transition: .18s ease;
            box-shadow: 0 12px 28px rgba(0,0,0,.22)
        }

            .page-thumb:hover {
                transform: translateY(-3px);
                border-color: rgba(255,255,255,.22);
                box-shadow: 0 18px 36px rgba(0,0,0,.32),0 0 18px rgba(255,255,255,.06)
            }

            .page-thumb img {
                width: 100%;
                aspect-ratio: 2/3;
                object-fit: cover;
                display: block;
                background: #050505
            }

        .page-thumb-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 8px;
            padding: 10px 11px;
            color: var(--text-secondary);
            font-size: .82rem
        }

        .credit-dot {
            width: 18px;
            height: 18px;
            border-radius: 50%;
            border: 1px solid rgba(255,255,255,.16);
            display: inline-flex;
            align-items: center;
            justify-content: center;
            background: rgba(0,0,0,.36);
            color: var(--text-secondary);
            font-size: .72rem
        }

        .empty {
            color: var(--text-muted);
            line-height: 1.6
        }

        .content-warning-panel {
            max-width: 760px;
            margin: 60px auto;
            padding: 32px;
            border-color: rgba(255,214,102,.28)
        }

            .content-warning-panel h1 {
                margin-top: 0
            }

        .warning-list {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin: 18px 0 24px
        }

        .warning-pill {
            border: 1px solid rgba(255,214,102,.32);
            background: rgba(255,214,102,.10);
            color: #ffe6a3;
            border-radius: 999px;
            padding: 7px 11px
        }

        .credit-pill {
            position: absolute;
            left: 14px;
            bottom: 14px;
            z-index: 6;
            display: inline-flex;
            align-items: center;
            max-width: calc(100% - 28px);
            padding: 7px 11px;
            border-radius: 999px;
            border: 1px solid rgba(255,255,255,.16);
            background: rgba(0,0,0,.58);
            color: white;
            font-size: .78rem;
            text-decoration: none;
            backdrop-filter: blur(14px);
            -webkit-backdrop-filter: blur(14px);
            white-space: nowrap
        }

            .credit-pill:hover {
                background: rgba(0,0,0,.75)
            }

        .credit-tooltip {
            position: absolute;
            left: 0;
            bottom: calc(100% + 8px);
            width: 240px;
            padding: 10px 12px;
            border-radius: 12px;
            background: rgba(0,0,0,.9);
            border: 1px solid rgba(255,255,255,.16);
            color: var(--text-secondary);
            font-size: .78rem;
            line-height: 1.45;
            opacity: 0;
            visibility: hidden;
            pointer-events: none;
            white-space: normal;
            box-shadow: 0 12px 28px rgba(0,0,0,.35)
        }

        .credit-pill:hover .credit-tooltip, .credit-pill.show-tooltip .credit-tooltip {
            opacity: 1;
            visibility: visible
        }

        .reader-overlay {
            position: fixed;
            inset: 0;
            z-index: 99999;
            display: none;
            background: #000;
            color: white
        }

            .reader-overlay.open {
                display: block
            }

        .reader-bg-image {
            position: absolute;
            inset: 0;
            background-image: var(--reader-bg-image);
            background-size: var(--reader-bg-size,cover);
            background-position: var(--reader-bg-position,center);
            background-repeat: var(--reader-bg-repeat,no-repeat);
            opacity: var(--reader-bg-opacity,.25);
            filter: blur(var(--reader-bg-blur,0px));
            transform: scale(1.03)
        }

        .reader-bg-base {
            position: absolute;
            inset: 0;
            background: var(--reader-bg-base,#000)
        }

        .reader-bg-overlay {
            position: absolute;
            inset: 0;
            background: rgba(0,0,0,var(--reader-bg-overlay,.65))
        }

        .reader-ui {
            position: relative;
            z-index: 3;
            height: 100%;
            display: flex;
            flex-direction: column
        }

        .reader-topbar {
            height: 58px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            padding: 10px 16px;
            box-sizing: border-box;
            background: linear-gradient(180deg,rgba(0,0,0,.76),rgba(0,0,0,.18));
            transition: .18s ease
        }

        .reader-title {
            min-width: 0
        }

            .reader-title strong {
                display: block;
                white-space: nowrap;
                overflow: hidden;
                text-overflow: ellipsis
            }

            .reader-title span {
                display: block;
                color: rgba(255,255,255,.66);
                font-size: .82rem;
                white-space: nowrap;
                overflow: hidden;
                text-overflow: ellipsis
            }

        .reader-actions {
            display: flex;
            gap: 8px;
            align-items: center;
            flex-wrap: wrap;
            justify-content: flex-end
        }

        .reader-action {
            border: 1px solid rgba(255,255,255,.16);
            background: rgba(255,255,255,.08);
            color: white;
            border-radius: 999px;
            padding: 8px 11px;
            cursor: pointer;
            font-family: Arial,sans-serif;
            backdrop-filter: blur(12px)
        }

            .reader-action.active {
                background: white;
                color: black
            }

        .reader-stage {
            position: relative;
            flex: 1;
            min-height: 0;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center
        }

            .reader-stage.webtoon {
                align-items: flex-start;
                overflow-y: auto;
                overflow-x: hidden;
                padding: 20px 0;
                box-sizing: border-box
            }

        .reader-page {
            max-width: 100vw;
            max-height: calc(100vh - 120px);
            object-fit: contain;
            display: block;
            box-shadow: 0 18px 70px rgba(0,0,0,.65);
            user-select: none;
            -webkit-user-drag: none
        }

        .reader-webtoon-stack {
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0
        }

            .reader-webtoon-stack img {
                width: min(100%,900px);
                height: auto;
                display: block;
                box-shadow: 0 12px 44px rgba(0,0,0,.45);
                user-select: none;
                -webkit-user-drag: none
            }

        .tap-zone {
            position: absolute;
            top: 0;
            bottom: 0;
            width: 34%;
            z-index: 6
        }

        .tap-left {
            left: 0
        }

        .tap-right {
            right: 0
        }

        .reader-arrow {
            position: absolute;
            z-index: 7;
            top: 50%;
            transform: translateY(-50%);
            width: 46px;
            height: 72px;
            border-radius: 999px;
            border: 1px solid rgba(255,255,255,.16);
            background: rgba(0,0,0,.38);
            color: white;
            font-size: 2rem;
            cursor: pointer;
            backdrop-filter: blur(12px);
            display: flex;
            align-items: center;
            justify-content: center;
            transition: .18s ease
        }

        .reader-stage.webtoon .reader-arrow,
        .reader-stage.webtoon .tap-zone {
            display: none;
        }

        .reader-stage.webtoon .reader-credit-desktop {
            position: fixed;
            left: 18px;
            bottom: 18px;
        }

        .reader-stage.webtoon .reader-credit-mobile-btn {
            position: fixed;
            right: 14px;
            bottom: 68px;
        }

        .reader-arrow:hover {
            background: rgba(255,255,255,.16)
        }

        .reader-arrow.left {
            left: 18px
        }

        .reader-arrow.right {
            right: 18px
        }

        .reader-bottombar {
            min-height: 52px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            padding: 10px 16px;
            box-sizing: border-box;
            background: linear-gradient(0deg,rgba(0,0,0,.78),rgba(0,0,0,.10));
            color: rgba(255,255,255,.72);
            font-size: .9rem;
            transition: .18s ease
        }

        .reader-credit-desktop {
            position: absolute;
            z-index: 8;
            left: 18px;
            bottom: 18px;
            max-width: min(420px,42vw);
            padding: 10px 13px;
            border: 1px solid rgba(255,255,255,.16);
            border-radius: 14px;
            background: rgba(0,0,0,.58);
            backdrop-filter: blur(14px);
            font-size: .82rem;
            line-height: 1.45;
            color: rgba(255,255,255,.76)
        }

            .reader-credit-desktop a {
                color: white;
                text-decoration: underline
            }

        .reader-credit-mobile-btn {
            display: none;
            position: absolute;
            z-index: 9;
            right: 14px;
            bottom: 68px;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            border: 1px solid rgba(255,255,255,.18);
            background: rgba(0,0,0,.58);
            color: white;
            font-weight: bold;
            backdrop-filter: blur(14px)
        }

        .reader-credit-sheet {
            position: fixed;
            z-index: 100000;
            left: 0;
            right: 0;
            bottom: 0;
            display: none;
            padding: 18px;
            background: rgba(8,8,10,.96);
            border-top: 1px solid rgba(255,255,255,.14);
            box-shadow: 0 -18px 40px rgba(0,0,0,.45);
            color: rgba(255,255,255,.78)
        }

            .reader-credit-sheet.open {
                display: block
            }

            .reader-credit-sheet a {
                color: white;
                text-decoration: underline
            }

        .reader-hidden .reader-topbar, .reader-hidden .reader-bottombar, .reader-hidden .reader-credit-desktop, .reader-hidden .reader-arrow, .reader-hidden .reader-credit-mobile-btn {
            opacity: 0;
            pointer-events: none
        }

        #report-modal {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,.75);
            z-index: 9999;
            justify-content: center;
            align-items: center
        }

        .report-box {
            width: 500px;
            max-width: 90%;
            background: var(--panel-bg);
            border: 1px solid var(--border-color);
            border-radius: 18px;
            padding: 24px
        }

            .report-box select, .report-box textarea, .report-box input {
                width: 100%;
                box-sizing: border-box;
                padding: 12px;
                margin-bottom: 12px;
                border-radius: 12px;
                border: 1px solid var(--border-color);
                background: rgba(0,0,0,.28);
                color: var(--text-primary)
            }

        .notification-link {
            display: inline-flex;
            align-items: center;
            gap: 6px
        }

        .notification-badge {
            min-width: 18px;
            height: 18px;
            padding: 0 6px;
            border-radius: 999px;
            background: white;
            color: black;
            font-size: .72rem;
            align-items: center;
            justify-content: center;
            line-height: 1
        }

        @media(max-width:900px) {
            header {
                flex-direction: column;
                gap: 14px;
                padding: 20px
            }

            nav {
                justify-content: center
            }

            main {
                flex-direction: column;
                padding: 30px 18px 70px
            }

            .left-sidebar {
                width: 100%;
                position: static
            }

            .comic-layout {
                grid-template-columns: 1fr
            }

            .cover-wrap {
                max-width: 280px
            }

            .chapter-index {
                padding-bottom: 95px
            }

            .comic-gallery-panel {
                padding: 20px
            }

            .chapter-gallery-grid {
                grid-template-columns: repeat(auto-fill,minmax(112px,1fr));
                gap: 12px
            }

            .reader-topbar {
                height: 56px;
                padding: 8px 10px
            }

            .reader-title strong {
                font-size: .92rem
            }

            .reader-title span {
                font-size: .74rem
            }

            .reader-action {
                padding: 7px 9px;
                font-size: .78rem
            }

            .reader-arrow {
                display: none
            }

            .reader-page {
                max-height: calc(100vh - 108px);
                width: 100%;
                height: auto
            }

            .reader-stage.webtoon {
                padding: 0
            }

            .reader-webtoon-stack img {
                width: 100%;
                box-shadow: none
            }

            .reader-bottombar {
                min-height: 50px;
                font-size: .78rem
            }

            .reader-credit-desktop {
                display: none
            }

            .reader-credit-mobile-btn {
                display: block
            }
        }


        .placed-image-frame {
            position: relative;
            overflow: hidden;
        }

            .placed-image-frame > img,
            img.placed-image {
                transform-origin: center center;
                will-change: transform;
            }

        .chapter-index::before {
            background-size: var(--comic-index-image-size, cover);
            transform: var(--comic-index-image-transform, none);
            transform-origin: center center;
        }

        .comic-background-image,
        .reader-bg-image {
            transform-origin: center center;
            transform: var(--comic-background-image-transform, scale(1.03));
        }
    </style>
</head>
<body>

                    <button id="reader-mode-webtoon" class="reader-action" onclick="setFullscreenMode('webtoon')">Webtoon</button>

                <button class="reader-arrow right" onclick="readerForward()">›</button>

    <div id="report-modal">

                <option>Spam</option>
                <option>Harassment</option>

                <option>NSFW Content</option>
                <option>Copyright Violation</option>

                <option>Impersonation</option>
                <option>Other</option>
            </select>
<textarea id="report-details" rows="6" placeholder="Additional details..."></textarea>
            <div style="display:flex;gap:10px;flex-wrap:wrap;">
                <button class="button" id="submit-report-btn">Submit Report</button>
                <button class="button" id="close-report-btn">Cancel</button>
            </div>

    <script type="module">
        import { requireBetaAccess } from "./betaGate.js";
        import { supabase } from "./supabaseClient.js";
        import { setupNotificationBadge } from "./notificationBadge.js";
        import { createNotification } from "./notifications.js";
        import { setupMessageBadge } from "./messageBadge.js";
        import { getCurrentUserWithPermissions, canModerateWorlds, canModerateContentOwner } from "./permissions.js?v=4";

        const currentUser = await requireBetaAccess();
        setupNotificationBadge();
        setupMessageBadge();

        const { profile: currentProfile, permissions: currentPermissions } = await getCurrentUserWithPermissions(currentUser.id);
        const params = new URLSearchParams(window.location.search);
        const comicId = params.get("id");

        let currentComic = null;
        let allChapters = [];
        let allPagesByChapter = {};
        let readerChapterIndex = 0;
        let readerPageIndex = 0;
        let fullscreenMode = "paged";
        let contentExperience = "balanced";
        let blockedContentWarnings = [];
        let ageRole = "unknown";
        let touchStartX = 0;
        let touchStartY = 0;
        let lastTapTime = 0;

        setupReportSystem();
        await loadViewerContentPreferences();

        if (!comicId) {
            showNotFound("No comic ID was provided.");
        } else {
            await loadComic(comicId);
        }

        window.logOut = async function () {
            await supabase.auth.signOut();
            window.location.href = "login.html";
        };

        document.addEventListener("keydown", event => {
            if (!document.getElementById("reader-overlay").classList.contains("open")) return;
            if (event.key === "Escape") closeReader();
            if (event.key === "ArrowRight") readerForward();
            if (event.key === "ArrowLeft") readerBack();
            if (event.key.toLowerCase() === "w") setFullscreenMode("webtoon");
            if (event.key.toLowerCase() === "p") setFullscreenMode("paged");
        });

        document.getElementById("reader-stage").addEventListener("touchstart", event => {
            const touch = event.touches[0];
            touchStartX = touch.clientX;
            touchStartY = touch.clientY;
        }, { passive: true });

        document.getElementById("reader-stage").addEventListener("touchend", event => {
            const touch = event.changedTouches[0];
            const diffX = touch.clientX - touchStartX;
            const diffY = touch.clientY - touchStartY;
            if (Math.abs(diffX) > 55 && Math.abs(diffX) > Math.abs(diffY)) {
                if (diffX < 0) readerForward();
                else readerBack();
                return;
            }
            const now = Date.now();
            if (now - lastTapTime < 280) {
                toggleReaderUI();
            }
            lastTapTime = now;
        }, { passive: true });

        document.addEventListener("click", event => {
            const pill = event.target.closest(".credit-pill");
            document.querySelectorAll(".credit-pill").forEach(item => {
                if (item !== pill) item.classList.remove("show-tooltip");
            });
            if (pill) {
                const href = pill.getAttribute("href");
                if (!href || href === "#") {
                    event.preventDefault();
                    pill.classList.toggle("show-tooltip");
                }
            }
        });

        async function areUsersBlocked(userA, userB) {
            const { data, error } = await supabase
                .from("user_blocks")
                .select("id,blocker_id,blocked_id")
                .in("blocker_id", [userA, userB])
                .in("blocked_id", [userA, userB])
                .limit(1);
            if (error) return false;
            return data && data.length > 0;
        }

        async function loadViewerContentPreferences() {
            const { data: profile } = await supabase
                .from("profiles")
                .select("content_experience,blocked_content_warnings,age_role")
                .eq("id", currentUser.id)
                .single();
            if (!profile) return;
            contentExperience = profile.content_experience || "balanced";
            blockedContentWarnings = profile.blocked_content_warnings || [];
            ageRole = profile.age_role || "unknown";
        }

        function getContentSafetyInfo(item) {
            const safeWarnings = ["gore", "sexual_content", "disturbing_imagery"];
            const warnings = item.content_warnings || [];
            const rating = item.content_rating || "general";
            const hasHardBlockedWarning = warnings.some(warning => blockedContentWarnings.includes(warning));
            const hasSafeWarning = warnings.some(warning => safeWarnings.includes(warning));
            const isAdult = rating === "adult";
            return { warnings, rating, hasHardBlockedWarning, hasSafeWarning, isAdult };
        }

        function shouldBlockContent(item) {
            const info = getContentSafetyInfo(item);
            if (ageRole === "minor") return info.isAdult || info.hasSafeWarning;
            if (info.hasHardBlockedWarning) return true;
            if (contentExperience === "safe") return info.isAdult || info.hasSafeWarning;
            return false;
        }

        function shouldWarnContent(item) {
            const info = getContentSafetyInfo(item);
            if (contentExperience !== "balanced") return false;
            if (ageRole === "minor") return false;
            if (info.hasHardBlockedWarning) return false;
            return info.isAdult || info.hasSafeWarning;
        }

        async function loadComic(id) {
            const { data: comic, error } = await supabase.from("worlds").select("*").eq("id", id).single();
            if (error || !comic) { showNotFound("This comic does not exist."); return; }
            if (!["comic", "manga"].includes(comic.content_type)) { showNotFound("This page is only for comic and manga projects."); return; }

            currentComic = comic;

            const ownerAccess = currentUser && currentUser.id === comic.owner_id;
            const staffAccess = canModerateWorlds(currentPermissions);

            if (comic.visibility !== "published" && !ownerAccess && !staffAccess) {
                showNotFound("This comic does not exist or is not published.");
                return;
            }

            if (comic.moderation_status === "hidden" && ownerAccess) {
                showHiddenNotice(comic);
                return;
            }

            if (comic.moderation_status === "hidden" && !staffAccess) {
                showNotFound("This comic has been hidden by Nullverse staff.");
                return;
            }

            if (!ownerAccess && !staffAccess && shouldBlockContent(comic)) {
                showContentBlocked(comic);
                return;
            }

            const warningAccepted = params.get("contentOk") === comic.id;
            if (!ownerAccess && !staffAccess && shouldWarnContent(comic) && !warningAccepted) {
                showContentWarning(comic);
                return;
            }

            await renderLoadedComic(comic);
        }

        async function renderLoadedComic(comic) {
            const blocked = await areUsersBlocked(currentUser.id, comic.owner_id);
            if (blocked) { showNotFound("This comic is unavailable."); return; }

            const { data: profile } = await supabase
                .from("profiles")
                .select("id,username,display_name,role,role_name")
                .eq("id", comic.owner_id)
                .single();

            currentComic.ownerProfile = profile;

            applyComicTheme(comic);
            renderComicHero(comic, profile);
            renderOwnerActions(comic);
            await loadLikes();
            await loadChapters(comic.id);

            document.getElementById("comments-link").href = `world-comments.html?id=${encodeURIComponent(comic.id)}`;
            document.getElementById("qa-link").href = `world-qa.html?id=${encodeURIComponent(comic.id)}`;
            document.getElementById("community-link").href = `world-additions.html?id=${encodeURIComponent(comic.id)}`;
        }



        function getDefaultImagePlacement() {
            return {
                x: 0,
                y: 0,
                scale: 1,
                rotation: 0,
                fit: "cover"
            };
        }

        function normalizeImagePlacement(value) {
            let parsed = value;

            if (typeof parsed === "string") {
                try {
                    parsed = JSON.parse(parsed);
                } catch {
                    parsed = null;
                }
            }

            return {
                ...getDefaultImagePlacement(),
                ...(parsed && typeof parsed === "object" ? parsed : {})
            };
        }

        function getPlacementTransformStyle(placement) {
            const normalized = normalizeImagePlacement(placement);

            return `object-fit:${normalized.fit || "cover"};transform:translate(${normalized.x || 0}px, ${normalized.y || 0}px) rotate(${normalized.rotation || 0}deg) scale(${normalized.scale || 1});transform-origin:center center;`;
        }

        function getPlacementTransformValue(placement, includeBaseScale = false) {
            const normalized = normalizeImagePlacement(placement);
            const base = includeBaseScale ? " scale(1.03)" : "";

            return `translate(${normalized.x || 0}px, ${normalized.y || 0}px) rotate(${normalized.rotation || 0}deg) scale(${normalized.scale || 1})${base}`;
        }

        function getPlacementBackgroundSize(placement) {
            const normalized = normalizeImagePlacement(placement);
            return normalized.fit === "contain" ? "contain" : "cover";
        }

        function renderComicHero(comic, profile) {
            document.title = `${comic.title || "Comic"} - Nullverse`;
            document.getElementById("comic-title").textContent = comic.title || "Untitled Comic";
            document.getElementById("comic-summary").textContent = comic.summary || "No description provided.";

            if (profile) {
                document.getElementById("comic-creator").innerHTML = `by <a href="profile.html?user=${encodeURIComponent(profile.username)}">${escapeHtml(profile.display_name || profile.username)} (@${escapeHtml(profile.username)})</a>`;
            } else {
                document.getElementById("comic-creator").textContent = "by Unknown Creator";
            }

            renderTags(comic);

            const coverWrap = document.getElementById("comic-cover-wrap");
            const coverCredit = buildCreditPill({
                type: comic.cover_credit_type,
                name: comic.cover_credit_name,
                username: comic.cover_credit_nullverse_username,
                url: comic.cover_credit_url,
                note: comic.cover_credit_note,
                ownerUsername: profile?.username,
                context: "Cover Image"
            });

            coverWrap.classList.toggle("has-credit", !!coverCredit);

            if (comic.cover_image_url) {
                coverWrap.innerHTML = `<img class="placed-image" src="${escapeHtml(comic.cover_image_url)}" alt="" style="${getPlacementTransformStyle(comic.cover_image_placement)}">${coverCredit}`;
            } else {
                coverWrap.innerHTML = `<div class="cover-placeholder">No cover image yet</div>`;
            }

            const backgroundCredit = buildCreditPill({
                type: comic.background_credit_type,
                name: comic.background_credit_name,
                username: comic.background_credit_nullverse_username,
                url: comic.background_credit_url,
                note: comic.background_credit_note,
                ownerUsername: profile?.username,
                context: "Reader Background"
            });

            if (backgroundCredit && comic.theme_background_style === "image" && comic.theme_background_image_url) {
                document.getElementById("comic-background-layer").insertAdjacentHTML("beforeend", backgroundCredit);
            }
        }

        function applyComicTheme(comic) {
            const root = document.documentElement;
            const baseLayer = document.getElementById("comic-background-base");
            const imageLayer = document.getElementById("comic-background-image");
            const overlayLayer = document.getElementById("comic-background-overlay");
            const style = comic.theme_background_style || "default";

            baseLayer.style.background = "var(--page-bg)";
            imageLayer.style.backgroundImage = "none";
            imageLayer.style.opacity = "0";

            if (style === "solid") baseLayer.style.background = comic.theme_background_color_1 || "#050505";
            if (style === "gradient") baseLayer.style.background = `linear-gradient(135deg, ${comic.theme_background_color_1 || "#050505"}, ${comic.theme_background_color_2 || "#000000"})`;

            if (style === "image" && comic.theme_background_image_url) {
                baseLayer.style.background = `linear-gradient(135deg, ${comic.theme_background_color_1 || "#050505"}, ${comic.theme_background_color_2 || "#000000"})`;
                imageLayer.style.backgroundImage = `url("${comic.theme_background_image_url}")`;
                imageLayer.style.opacity = comic.theme_background_image_opacity ?? .35;
                imageLayer.style.filter = `blur(${comic.theme_background_image_blur || 0}px)`;
                imageLayer.style.backgroundRepeat = comic.theme_background_image_repeat || "no-repeat";
                imageLayer.style.backgroundPosition = `${comic.theme_background_position_x || 50}% ${comic.theme_background_position_y || 50}%`;
                const savedSize = comic.theme_background_image_size || "cover";
                imageLayer.style.backgroundSize = getPlacementBackgroundSize(comic.theme_background_image_placement);
                imageLayer.style.transform = getPlacementTransformValue(comic.theme_background_image_placement, true);
            }

            overlayLayer.style.background = `rgba(0,0,0,${comic.theme_background_overlay_strength ?? .35})`;

            let indexBackground = "linear-gradient(135deg,rgba(255,255,255,.06),rgba(255,255,255,.02))";
            if (comic.theme_index_style === "solid") indexBackground = comic.theme_index_color_1 || "#141416";
            if (comic.theme_index_style === "gradient" || comic.theme_index_style === "image") {
                indexBackground = `linear-gradient(135deg, ${comic.theme_index_color_1 || "#141416"}, ${comic.theme_index_color_2 || "#0b0b0d"})`;
            }

            root.style.setProperty("--comic-index-background", indexBackground);
            root.style.setProperty("--comic-index-text", comic.theme_index_text_color || "#f5f5f5");
            root.style.setProperty("--comic-index-image", comic.theme_index_style === "image" && comic.theme_index_image_url ? `url("${comic.theme_index_image_url}")` : "none");
            root.style.setProperty("--comic-index-image-size", getPlacementBackgroundSize(comic.theme_index_image_placement));
            root.style.setProperty("--comic-index-image-transform", getPlacementTransformValue(comic.theme_index_image_placement));
            root.style.setProperty("--comic-index-opacity", comic.theme_index_opacity ?? .85);
            root.style.setProperty("--comic-index-overlay", comic.theme_index_overlay ?? .35);
            root.style.setProperty("--comic-index-button-text", comic.theme_index_button_text_color || comic.theme_index_text_color || "#f5f5f5");

            const readerBase = document.getElementById("reader-bg-base");
            const readerImage = document.getElementById("reader-bg-image");
            const readerOverlay = document.getElementById("reader-bg-overlay");

            readerBase.style.background = baseLayer.style.background || "#000";
            readerImage.style.setProperty("--reader-bg-image", style === "image" && comic.theme_background_image_url ? `url("${comic.theme_background_image_url}")` : "none");
            readerImage.style.setProperty("--reader-bg-opacity", comic.theme_background_image_opacity ?? .22);
            readerImage.style.setProperty("--reader-bg-blur", `${comic.theme_background_image_blur || 0}px`);
            readerImage.style.setProperty("--reader-bg-position", "center");
            readerImage.style.setProperty("--reader-bg-repeat", comic.theme_background_image_repeat || "no-repeat");
            readerImage.style.setProperty("--reader-bg-size", getPlacementBackgroundSize(comic.theme_background_image_placement));
            readerImage.style.setProperty("--comic-background-image-transform", getPlacementTransformValue(comic.theme_background_image_placement, true));
            readerOverlay.style.setProperty("--reader-bg-overlay", .7);
        }

        async function loadChapters(comicId) {
            const container = document.getElementById("chapters-gallery-container");

            const { data: chapters, error } = await supabase
                .from("comic_chapters")
                .select("*")
                .eq("world_id", comicId)
                .eq("visibility", "published")
                .order("display_order", { ascending: true });

            if (error) {
                container.innerHTML = `<p class="empty">${escapeHtml(error.message)}</p>`;
                return;
            }

            allChapters = chapters || [];

            if (!allChapters.length) {
                container.innerHTML = `<p class="empty">This comic does not have any public chapters yet.</p>`;
                return;
            }

            renderChapterIndex(allChapters);

            for (const chapter of allChapters) {
                const { data: pages, error: pageError } = await supabase
                    .from("comic_pages")
                    .select("*")
                    .eq("world_id", comicId)
                    .eq("chapter_id", chapter.id)
                    .eq("visibility", "published")
                    .order("display_order", { ascending: true });
                allPagesByChapter[chapter.id] = pageError ? [] : (pages || []);
            }

            renderChapterGalleries();
        }

        function renderChapterIndex(chapters) {
            const nav = document.getElementById("chapter-index");
            const links = document.getElementById("chapter-nav-links");
            const search = document.getElementById("chapter-search");
            const count = document.getElementById("chapter-count");

            nav.style.display = "block";

            const oldCredit = nav.querySelector(".credit-pill");
            if (oldCredit) oldCredit.remove();

            const indexCredit = buildCreditPill({
                type: currentComic.index_credit_type,
                name: currentComic.index_credit_name,
                username: currentComic.index_credit_nullverse_username,
                url: currentComic.index_credit_url,
                note: currentComic.index_credit_note,
                ownerUsername: currentComic.ownerProfile?.username,
                context: "Index Image"
            });

            if (indexCredit && currentComic.theme_index_style === "image" && currentComic.theme_index_image_url) {
                nav.insertAdjacentHTML("beforeend", indexCredit);
            }

            function draw() {
                const query = (search.value || "").toLowerCase().trim();
                const filtered = chapters.filter(chapter =>
                    (chapter.title || "").toLowerCase().includes(query) ||
                    (chapter.subtitle || "").toLowerCase().includes(query) ||
                    (chapter.author_note || "").toLowerCase().includes(query)
                );

                count.textContent = `${filtered.length} ${filtered.length === 1 ? "Chapter" : "Chapters"}`;

                if (!filtered.length) {
                    links.innerHTML = `<p class="empty">No chapters match this search.</p>`;
                    return;
                }

                links.innerHTML = filtered.map(chapter => {
                    const realIndex = chapters.indexOf(chapter);
                    return `
<a class="chapter-nav-link" href="#chapter-gallery-${realIndex + 1}">
<span>Chapter ${realIndex + 1}: ${escapeHtml(chapter.title || "Untitled")}</span>
<small>${escapeHtml(chapter.subtitle || "Open gallery")}</small>
</a>`;
                }).join("");
            }

            search.addEventListener("input", draw);
            draw();
        }

        function renderChapterGalleries() {
            const container = document.getElementById("chapters-gallery-container");
            container.innerHTML = allChapters.map((chapter, chapterIndex) => {
                const pages = allPagesByChapter[chapter.id] || [];
                return `
<section id="chapter-gallery-${chapterIndex + 1}" class="comic-gallery-panel">
<div class="gallery-top">
<div>
<div class="chapter-eyebrow">Chapter ${chapterIndex + 1}</div>
<h2>${escapeHtml(chapter.title || "Untitled")}</h2>
${chapter.subtitle ? `<div class="chapter-subtitle">${escapeHtml(chapter.subtitle)}</div>` : ""}
</div>
<button class="button" onclick="openReader(${chapterIndex},0)">Start Reading</button>
</div>
${chapter.author_note ? `<div class="author-note"><strong>Author Note</strong><br><br>${escapeHtml(chapter.author_note)}</div>` : ""}
${pages.length ? `
<div class="chapter-gallery-grid">
${pages.map((page, pageIndex) => `
<div class="page-thumb" onclick="openReader(${chapterIndex},${pageIndex})">
<img src="${escapeHtml(page.image_url || "")}" alt="Page ${pageIndex + 1}" style="${getPlacementTransformStyle(page.image_placement)}">
<div class="page-thumb-footer">
<span>Page ${pageIndex + 1}</span>
${hasCredit(page) ? `<span class="credit-dot">?</span>` : ""}
</div>
</div>
`).join("")}
</div>
`: `<p class="empty">This chapter does not have any public pages yet.</p>`}
</section>
`;
            }).join("");
        }

        window.openReader = function (chapterIndex, pageIndex) {
            readerChapterIndex = chapterIndex;
            readerPageIndex = pageIndex;
            fullscreenMode = currentComic.comic_reading_mode || "paged";
            document.body.classList.add("reader-open");
            document.getElementById("reader-overlay").classList.add("open");
            document.getElementById("reader-ui").classList.remove("reader-hidden");
            renderFullscreenReader();
        };

        window.closeReader = function () {
            document.body.classList.remove("reader-open");
            document.getElementById("reader-overlay").classList.remove("open");
            document.getElementById("reader-credit-sheet").classList.remove("open");
        };

        window.setFullscreenMode = function (mode) {
            fullscreenMode = mode;
            document.getElementById("reader-credit-sheet").classList.remove("open");
            renderFullscreenReader();
        };

        function renderFullscreenReader() {
            const chapter = allChapters[readerChapterIndex];
            const pages = allPagesByChapter[chapter.id] || [];
            const stage = document.getElementById("reader-stage");
            const content = document.getElementById("reader-content");

            document.getElementById("reader-mode-paged").classList.toggle("active", fullscreenMode === "paged");
            document.getElementById("reader-mode-webtoon").classList.toggle("active", fullscreenMode === "webtoon");
            document.getElementById("reader-title").textContent = currentComic.title || "Comic Reader";
            document.getElementById("reader-subtitle").textContent = `Chapter ${readerChapterIndex + 1}: ${chapter.title || "Untitled"}`;

            stage.classList.toggle("webtoon", fullscreenMode === "webtoon");
            stage.onscroll = null;

            if (!pages.length) {
                content.innerHTML = `<p>No pages in this chapter.</p>`;
                updateReaderCredit(null);
                return;
            }

            if (fullscreenMode === "webtoon") {
                content.innerHTML = `
<div class="reader-webtoon-stack">
${pages.map((page, index) => `
<img
src="${escapeHtml(page.image_url || "")}"
alt="Page ${index + 1}"
data-page-index="${index}"
style="${getPlacementTransformStyle(page.image_placement)}">
`).join("")}
</div>
`;
                document.getElementById("reader-bottombar").textContent = `Chapter ${readerChapterIndex + 1} / ${allChapters.length} · Webtoon Mode`;
                setTimeout(() => {
                    stage.scrollTop = 0;
                    readerPageIndex = 0;
                    updateReaderCredit(pages[0]);
                    stage.onscroll = updateWebtoonVisiblePageCredit;
                }, 0);
                return;
            }

            const page = pages[readerPageIndex] || pages[0];
            content.innerHTML = `<img class="reader-page placed-image" src="${escapeHtml(page.image_url || "")}" alt="Page ${readerPageIndex + 1}" style="${getPlacementTransformStyle(page.image_placement)}">`;
            document.getElementById("reader-bottombar").textContent = `Chapter ${readerChapterIndex + 1} · Page ${readerPageIndex + 1} / ${pages.length}`;
            updateReaderCredit(page);
        }

        function updateWebtoonVisiblePageCredit() {
            if (fullscreenMode !== "webtoon") return;

            const chapter = allChapters[readerChapterIndex];
            const pages = allPagesByChapter[chapter.id] || [];
            const stage = document.getElementById("reader-stage");
            const images = [...stage.querySelectorAll(".reader-webtoon-stack img")];

            if (!images.length || !pages.length) return;

            const stageRect = stage.getBoundingClientRect();
            const viewportMiddle = stageRect.top + stageRect.height * 0.45;

            let closestIndex = 0;
            let closestDistance = Infinity;

            images.forEach(img => {
                const rect = img.getBoundingClientRect();
                const imageMiddle = rect.top + rect.height / 2;
                const distance = Math.abs(imageMiddle - viewportMiddle);

                if (distance < closestDistance) {
                    closestDistance = distance;
                    closestIndex = Number(img.dataset.pageIndex) || 0;
                }
            });

            if (closestIndex !== readerPageIndex) {
                readerPageIndex = closestIndex;
                updateReaderCredit(pages[readerPageIndex]);
                document.getElementById("reader-bottombar").textContent =
                    `Chapter ${readerChapterIndex + 1} · Page ${readerPageIndex + 1} / ${pages.length} · Webtoon Mode`;
            }
        }

        window.readerForward = function () {
            if (fullscreenMode === "webtoon") {
                if (readerChapterIndex < allChapters.length - 1) {
                    readerChapterIndex++;
                    readerPageIndex = 0;
                    renderFullscreenReader();
                }
                return;
            }

            const chapter = allChapters[readerChapterIndex];
            const pages = allPagesByChapter[chapter.id] || [];
            const direction = currentComic.comic_page_direction || "ltr";
            const delta = direction === "rtl" ? -1 : 1;
            const next = readerPageIndex + delta;

            if (next >= 0 && next < pages.length) {
                readerPageIndex = next;
                renderFullscreenReader();
                return;
            }

            if (readerChapterIndex < allChapters.length - 1) {
                readerChapterIndex++;
                const nextChapter = allChapters[readerChapterIndex];
                const nextPages = allPagesByChapter[nextChapter.id] || [];
                readerPageIndex = direction === "rtl" ? Math.max(nextPages.length - 1, 0) : 0;
                renderFullscreenReader();
            }
        };

        window.readerBack = function () {
            if (fullscreenMode === "webtoon") {
                if (readerChapterIndex > 0) {
                    readerChapterIndex--;
                    readerPageIndex = 0;
                    renderFullscreenReader();
                }
                return;
            }

            const chapter = allChapters[readerChapterIndex];
            const pages = allPagesByChapter[chapter.id] || [];
            const direction = currentComic.comic_page_direction || "ltr";
            const delta = direction === "rtl" ? 1 : -1;
            const previous = readerPageIndex + delta;

            if (previous >= 0 && previous < pages.length) {
                readerPageIndex = previous;
                renderFullscreenReader();
                return;
            }

            if (readerChapterIndex > 0) {
                readerChapterIndex--;
                const previousChapter = allChapters[readerChapterIndex];
                const previousPages = allPagesByChapter[previousChapter.id] || [];
                readerPageIndex = direction === "rtl" ? 0 : Math.max(previousPages.length - 1, 0);
                renderFullscreenReader();
            }
        };

        function toggleReaderUI() {
            document.getElementById("reader-ui").classList.toggle("reader-hidden");
        }

        window.toggleCreditSheet = function () {
            document.getElementById("reader-credit-sheet").classList.toggle("open");
        };

        function updateReaderCredit(page) {
            const html = buildReaderCredit(page);
            document.getElementById("reader-credit-desktop").innerHTML = html || "No credit information shown.";
            document.getElementById("reader-credit-mobile-btn").style.display = html ? "block" : "none";
            document.getElementById("reader-credit-sheet").innerHTML = `
<div style="display:flex;justify-content:space-between;gap:12px;align-items:center;">
<strong>Page Credit</strong>
<button class="reader-action" onclick="toggleCreditSheet()">Close</button>
</div>
<div style="margin-top:12px;">${html || "No credit information shown."}</div>
`;
        }

        function hasCredit(page) {
            return page && (page.image_credit_type || "no_credit_needed") !== "no_credit_needed";
        }

        function buildReaderCredit(page) {
            if (!hasCredit(page)) return "";
            const type = page.image_credit_type || "no_credit_needed";
            let source = "";
            let href = "";

            if (type === "own_work") {
                source = `@${currentComic.ownerProfile?.username || "creator"}`;
                if (currentComic.ownerProfile?.username) href = `profile.html?user=${encodeURIComponent(currentComic.ownerProfile.username)}`;
            } else if (type === "nullverse_creator" && page.image_credit_nullverse_username) {
                source = `@${page.image_credit_nullverse_username}`;
                href = `profile.html?user=${encodeURIComponent(page.image_credit_nullverse_username)}`;
            } else {
                source = page.image_credit_name || formatCreditType(type);
                href = page.image_credit_url || "";
            }

            const sourceHtml = href
                ? `<a href="${escapeHtml(href)}" ${href.startsWith("http") ? 'target="_blank"' : ""}>${escapeHtml(source)}</a>`
                : escapeHtml(source);

            return `
<strong>Page Artwork Credit</strong><br>
Source: ${sourceHtml}
${page.image_credit_note ? `<br><br>${escapeHtml(page.image_credit_note)}` : ""}
`;
        }

        function renderTags(comic) {
            const container = document.getElementById("comic-tags");
            const label = comic.content_type === "manga" ? "Manga" : "Comic";
            const tags = [...(comic.genres || "").split(","), ...(comic.themes || "").split(",")].map(tag => tag.trim()).filter(Boolean);
            container.innerHTML = `<span class="tag">${label}</span>` + tags.map(tag => `<span class="tag">${escapeHtml(tag)}</span>`).join("");
        }

        function renderOwnerActions(comic) {
            const container = document.getElementById("owner-actions");
            let html = "";

            if (currentUser && currentUser.id === comic.owner_id) {
                html += `<a class="button" href="edit-comic.html?id=${encodeURIComponent(comic.id)}">Edit Comic</a>`;
            }

            if (canModerateWorlds(currentPermissions) && canModerateContentOwner(currentProfile, comic.ownerProfile)) {
                html += `
<div style="margin-top:16px;padding:14px;border:1px solid var(--border-color);border-radius:14px;background:rgba(255,255,255,0.04);">
<strong>Comic Moderation</strong>
<p class="empty">Status: ${escapeHtml(comic.moderation_status || "visible")}</p>
<div style="display:flex;gap:10px;flex-wrap:wrap;">
<button class="button" onclick="setComicModerationStatus('visible')">Restore Comic</button>
<div style="width:100%;margin-top:10px;">
<label class="empty">Reason for hiding</label>
<input id="comic-hide-reason" placeholder="Reason shown to creator..." style="width:100%;box-sizing:border-box;margin-top:8px;padding:10px;border-radius:10px;border:1px solid var(--border-color);background:rgba(0,0,0,.28);color:var(--text-primary);">
</div>
<button class="button" onclick="setComicModerationStatus('hidden')">Hide Comic</button>
</div>
<p id="comic-moderation-message" class="empty"></p>
</div>`;
            }

            container.innerHTML = html;
        }

        async function loadLikes() {
            if (!currentComic) return;
            const { data: likes, error } = await supabase.from("world_likes").select("*").eq("world_id", currentComic.id);
            if (error) {
                document.getElementById("like-count").textContent = "Likes unavailable";
                return;
            }
            const likeCount = likes ? likes.length : 0;
            document.getElementById("like-count").textContent = `${likeCount} ${likeCount === 1 ? "Like" : "Likes"}`;
            const userLiked = likes?.some(like => like.user_id === currentUser.id);
            const button = document.getElementById("like-button");
            button.classList.toggle("liked", !!userLiked);
            button.textContent = userLiked ? "♥ Liked" : "♡ Like";
        }

        document.getElementById("like-button").addEventListener("click", async () => {
            if (!currentComic || !currentUser) return;
            const button = document.getElementById("like-button");
            const alreadyLiked = button.classList.contains("liked");

            if (alreadyLiked) {
                await supabase.from("world_likes").delete().eq("world_id", currentComic.id).eq("user_id", currentUser.id);
            } else {
                const { error: likeError } = await supabase.from("world_likes").insert({ world_id: currentComic.id, user_id: currentUser.id });
                if (!likeError) {
                    await createNotification({
                        recipientId: currentComic.owner_id,
                        actorId: currentUser.id,
                        worldId: currentComic.id,
                        type: "world_liked",
                        message: `Someone liked ${currentComic.title}.`,
                        link: `comic.html?id=${encodeURIComponent(currentComic.id)}`
                    });
                }
            }
            await loadLikes();
        });

        window.setComicModerationStatus = async function (status) {
            if (!currentComic || !canModerateWorlds(currentPermissions)) return;
            const reasonInput = document.getElementById("comic-hide-reason");
            const reason = reasonInput ? reasonInput.value.trim() : "";

            if (status === "hidden" && !reason) {
                const message = document.getElementById("comic-moderation-message");
                if (message) message.textContent = "Enter a reason before hiding this comic.";
                return;
            }

            const { error } = await supabase.from("worlds").update({
                moderation_status: status,
                moderation_reason: status === "hidden" ? reason : null
            }).eq("id", currentComic.id);

            const message = document.getElementById("comic-moderation-message");
            if (error) {
                if (message) message.textContent = error.message;
                return;
            }

            await supabase.from("moderation_logs").insert({
                target_user_id: currentComic.owner_id,
                moderator_id: currentUser.id,
                action: `comic_${status}`,
                reason: status === "hidden" ? reason : `Comic "${currentComic.title || "Untitled Comic"}" restored to visible.`,
                expires_at: null
            });

            if (status === "hidden") {
                await createNotification({
                    recipientId: currentComic.owner_id,
                    actorId: currentUser.id,
                    worldId: currentComic.id,
                    type: "world_hidden",
                    message: `Your comic "${currentComic.title || "Untitled Comic"}" was hidden by moderation. Reason: ${reason}`,
                    link: "dashboard.html"
                });
            }

            if (status === "visible") {
                await createNotification({
                    recipientId: currentComic.owner_id,
                    actorId: currentUser.id,
                    worldId: currentComic.id,
                    type: "world_restored",
                    message: `Your comic "${currentComic.title || "Untitled Comic"}" was restored by moderation.`,
                    link: `comic.html?id=${encodeURIComponent(currentComic.id)}`
                });
            }

            if (message) message.textContent = `Comic set to ${status}.`;
            setTimeout(() => window.location.reload(), 700);
        };

        function setupReportSystem() {
            const reportBtn = document.getElementById("report-comic-btn");
            const modal = document.getElementById("report-modal");
            const closeBtn = document.getElementById("close-report-btn");
            const submitBtn = document.getElementById("submit-report-btn");
            if (!reportBtn) return;
            reportBtn.addEventListener("click", () => modal.style.display = "flex");
            closeBtn.addEventListener("click", () => modal.style.display = "none");
            submitBtn.addEventListener("click", submitComicReport);
        }

        async function submitComicReport() {
            if (!currentComic) return;
            const reason = document.getElementById("report-reason").value;
            const details = document.getElementById("report-details").value.trim();

            const { error } = await supabase.from("reports").insert({
                reporter_id: currentUser.id,
                reported_user_id: currentComic.owner_id,
                world_id: currentComic.id,
                report_type: "comic",
                reason,
                details,
                status: "open"
            });

            if (error) { alert(error.message); return; }
            document.getElementById("report-modal").style.display = "none";
            alert("Report submitted.");
        }

        function showHiddenNotice(comic) {
            document.querySelector("main").innerHTML = `
<section class="content-warning-panel">
<h1>Comic Hidden by Moderation</h1>
<p class="empty">This comic is currently hidden from the public by Nullverse moderation.</p>
<p class="empty"><strong>Reason:</strong> ${escapeHtml(comic.moderation_reason || "No reason provided.")}</p>
<div style="display:flex;gap:12px;flex-wrap:wrap;">
<a class="button" href="dashboard.html">Back to Dashboard</a>
<a class="button" href="edit-comic.html?id=${encodeURIComponent(comic.id)}">Edit Comic</a>
</div>
</section>`;
        }

        function showNotFound(message) {
            document.getElementById("comic-title").textContent = "Comic not found";
            document.getElementById("comic-creator").textContent = "";
            document.getElementById("comic-summary").textContent = message;
            document.getElementById("chapters-gallery-container").innerHTML = "";
            document.getElementById("comic-tags").innerHTML = `<span class="tag">Not Found</span>`;
            document.getElementById("like-button").style.display = "none";
            document.getElementById("like-count").style.display = "none";
        }

        function showContentBlocked(comic) {
            document.querySelector("main").innerHTML = `
<section class="content-warning-panel">
<h1>Content Hidden</h1>
<p class="empty">This comic is hidden by your content safety settings.</p>
<div class="warning-list">
${(comic.content_warnings || []).map(warning => `<span class="warning-pill">${escapeHtml(formatWarningLabel(warning))}</span>`).join("")}
</div>
<a class="button" href="explore.html">Back to Explore</a>
</section>`;
        }

        function showContentWarning(comic) {
            document.querySelector("main").innerHTML = `
<section class="content-warning-panel">
<h1>Content Warning</h1>
<p class="empty">This comic may contain sensitive or mature content.</p>
<div class="warning-list">
${comic.content_rating === "adult" ? `<span class="warning-pill">Adult 18+</span>` : ""}
${(comic.content_warnings || []).map(warning => `<span class="warning-pill">${escapeHtml(formatWarningLabel(warning))}</span>`).join("")}
</div>
<div style="display:flex;gap:12px;flex-wrap:wrap;">
<button id="continue-warning-button" class="button">Continue Anyway</button>
<a class="button" href="explore.html">Go Back</a>
</div>
</section>`;
            document.getElementById("continue-warning-button").addEventListener("click", () => {
                window.location.href = `comic.html?id=${encodeURIComponent(comic.id)}&contentOk=${encodeURIComponent(comic.id)}`;
            });
        }

        function formatWarningLabel(value) {
            return String(value || "").replaceAll("_", " ").replace(/\b\w/g, letter => letter.toUpperCase());
        }

        function formatCreditType(value) {
            return String(value || "").replaceAll("_", " ").replace(/\b\w/g, letter => letter.toUpperCase());
        }

        function escapeHtml(value) {
            return String(value || "")
                .replaceAll("&", "&amp;")
                .replaceAll("<", "&lt;")
                .replaceAll(">", "&gt;")
                .replaceAll('"', "&quot;")
                .replaceAll("'", "&#039;");
        }

        function buildCreditPill({ type, name, username, url, note, ownerUsername, context = "Image" }) {
            type = type || "no_credit_needed";
            if (type === "no_credit_needed") return "";
            let label = "";
            let href = "";

            if (type === "own_work") {
                label = `${context} Credit: @${ownerUsername || "creator"}`;
                if (ownerUsername) href = `profile.html?user=${encodeURIComponent(ownerUsername)}`;
            } else if (type === "nullverse_creator" && username) {
                label = `${context} Credit: @${username}`;
                href = `profile.html?user=${encodeURIComponent(username)}`;
            } else {
                label = `${context} Credit: ${name || formatCreditType(type)}`;
                href = url || "";
            }

            const tooltipContent = `
<strong>${escapeHtml(context)} Credit</strong>
<br>
Source: ${escapeHtml(name || username || ownerUsername || formatCreditType(type))}
${note ? `<br><br>${escapeHtml(note)}` : ""}
`;

            const tooltip = `<span class="credit-tooltip">${tooltipContent}</span>`;

            if (href) {
                return `
<a class="credit-pill" href="${escapeHtml(href)}" ${href.startsWith("http") ? 'target="_blank"' : ""}>
${escapeHtml(label)}
${tooltip}
</a>`;
            }

            return `
<span class="credit-pill">
${escapeHtml(label)}
${tooltip}
</span>`;
        }
    </script>
</body>
