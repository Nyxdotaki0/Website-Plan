<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1.0">
    <link rel="icon" type="image/png" href="favicon.png">
    <title>Comic - Nullverse</title>
    <script>
        const savedNullverseTheme = localStorage.getItem("nullverse-theme") || "void";
        document.documentElement.setAttribute("data-theme", savedNullverseTheme);
    </script>
    <link rel="stylesheet" href="theme.css?v=25">
    <style>
        html {
            min-height: 100%;
            background: #000
        }

        body {
            margin: 0;
            min-height: 100vh;
            font-family: Arial,sans-serif;
            background: #000;
            background-attachment: fixed;
            color: var(--text-primary);
            overflow-x: hidden
        }

            body.reader-open {
                overflow: hidden
            }

        header, main {
            position: relative;
            z-index: 2
        }

        .comic-background-layer {
            position: fixed;
            inset: 0;
            z-index: 0;
            overflow: hidden;
            pointer-events: none
        }

        .comic-background-base, .comic-background-image, .comic-background-overlay {
            position: absolute;
            inset: 0
        }

        .comic-background-base {
            background: var(--page-bg)
        }

        .comic-background-image {
            background-position: center;
            background-size: cover;
            background-repeat: no-repeat;
            opacity: .35
        }

        .comic-background-overlay {
            background: rgba(0,0,0,.35)
        }

        .comic-background-layer .credit-pill {
            position: fixed;
            left: 18px;
            bottom: 18px;
            pointer-events: auto
        }

        header {
            padding: 12px 40px;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(12,12,14,.72);
            position: sticky;
            top: 0;
            z-index: 100;
            backdrop-filter: blur(18px);
            -webkit-backdrop-filter: blur(18px);
            box-shadow: 0 10px 35px rgba(0,0,0,.28)
        }

        .logo, .logo a {
            display: flex;
            align-items: center
        }

        .site-logo {
            height: 64px;
            width: auto;
            display: block;
            max-width: none
        }

        nav {
            display: flex;
            gap: 22px;
            flex-wrap: wrap;
            align-items: center
        }

            nav a, nav button {
                color: var(--text-secondary);
                text-decoration: none;
                background: none;
                border: none;
                cursor: pointer;
                font-family: Arial,sans-serif;
                font-size: .95rem;
                transition: .18s ease
            }

                nav a:hover, nav button:hover {
                    color: white
                }

        main {
            display: flex;
            gap: 28px;
            max-width: 1500px;
            margin: auto;
            padding: 45px 40px 80px
        }

        .left-sidebar {
            width: 290px;
            flex-shrink: 0;
            position: sticky;
            top: 110px;
            height: fit-content
        }

        .content-column {
            flex: 1;
            min-width: 0
        }

        .comic-hero, .chapter-index, .comic-gallery-panel, .content-warning-panel {
            border: 1px solid var(--border-color);
            border-radius: 22px;
            background: var(--panel-bg);
            backdrop-filter: blur(18px);
            -webkit-backdrop-filter: blur(18px);
            box-shadow: 0 18px 40px rgba(0,0,0,.24),0 0 24px rgba(255,255,255,.03)
        }

        .comic-hero {
            position: relative;
            overflow: hidden;
            padding: 34px;
            padding-bottom: 72px;
            margin-bottom: 28px;
            background: linear-gradient(135deg,rgba(255,255,255,.06),rgba(255,255,255,.02)),var(--panel-bg)
        }

        .comic-layout {
            display: grid;
            grid-template-columns: minmax(180px,260px) minmax(0,1fr);
            gap: 26px;
            align-items: start
        }

        .cover-wrap {
            position: relative;
            overflow: hidden;
            border-radius: 18px;
            border: 1px solid rgba(255,255,255,.12);
            background: rgba(255,255,255,.04);
            box-shadow: 0 14px 34px rgba(0,0,0,.24)
        }

            .cover-wrap img {
                width: 100%;
                height: auto;
                max-height: 420px;
                object-fit: contain;
                display: block
            }

            .cover-wrap.has-credit {
                padding-bottom: 54px
            }

        .cover-placeholder {
            min-height: 270px;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 18px;
            text-align: center;
            color: var(--text-muted);
            box-sizing: border-box
        }

        .tag-row {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            margin-bottom: 18px
        }

        .tag {
            display: inline-block;
            font-size: .82rem;
            color: var(--text-secondary);
            border: 1px solid var(--border-color);
            background: rgba(255,255,255,.04);
            border-radius: 999px;
            padding: 7px 11px
        }

        h1 {
            margin: 0 0 10px;
            font-size: clamp(2rem,5vw,4.2rem);
            color: var(--text-primary)
        }

        .creator, .summary {
            color: var(--text-secondary);
            line-height: 1.7
        }

            .creator a {
                color: var(--text-secondary);
                text-decoration: none
            }

                .creator a:hover {
                    color: white
                }

        .summary {
            margin-top: 18px;
            white-space: pre-wrap
        }

        .action-row {
            display: flex;
            align-items: center;
            gap: 14px;
            margin-top: 26px;
            flex-wrap: wrap
        }

        .button, .like-button {
            display: inline-block;
            background: linear-gradient(180deg,#2a2a2f,#0d0d10);
            color: #f5f5f5;
            border: 1px solid rgba(255,255,255,.12);
            padding: 10px 15px;
            border-radius: 10px;
            cursor: pointer;
            text-decoration: none;
            font-family: Arial,sans-serif;
            transition: .18s ease;
            box-shadow: 0 0 16px rgba(255,255,255,.08),inset 0 1px 0 rgba(255,255,255,.06)
        }

            .button:hover, .like-button:hover {
                opacity: .92;
                transform: translateY(-1px);
                border-color: rgba(255,255,255,.18)
            }

            .button.active {
                background: linear-gradient(180deg,#4a4a52,#1a1a20)
            }

            .like-button.liked {
                background: linear-gradient(180deg,#4a2f37 0%,#2a181d 100%)
            }

        .like-count {
            color: var(--text-muted)
        }

        .owner-actions {
            margin-top: 22px
        }

        .chapter-index {
            position: relative;
            overflow: hidden;
            padding: 18px;
            padding-bottom: 85px;
            background: var(--comic-index-background,var(--panel-bg));
            color: var(--comic-index-text,var(--text-primary))
        }

            .chapter-index::before {
                content: "";
                position: absolute;
                inset: 0;
                background-image: var(--comic-index-image);
                background-size: cover;
                background-position: center;
                opacity: var(--comic-index-opacity,.85);
                z-index: 0
            }

            .chapter-index::after {
                content: "";
                position: absolute;
                inset: 0;
                background: rgba(0,0,0,var(--comic-index-overlay,.35));
                z-index: 1
            }

            .chapter-index > * {
                position: relative;
                z-index: 2
            }

        .index-header h2 {
            margin: 0;
            font-size: 1.15rem
        }

        .index-header p {
            margin: 6px 0 18px;
            color: var(--comic-index-text,var(--text-muted));
            font-size: .88rem;
            line-height: 1.5
        }

        .chapter-search {
            width: 100%;
            box-sizing: border-box;
            padding: 12px 14px;
            border-radius: 12px;
            border: 1px solid rgba(255,255,255,.16);
            background: rgba(0,0,0,.28);
            color: var(--comic-index-text,white);
            margin-bottom: 14px;
            transition: .18s ease
        }

            .chapter-search:focus {
                outline: none;
                border-color: rgba(255,255,255,.24);
                box-shadow: 0 0 16px rgba(255,255,255,.06)
            }

        .chapter-count {
            color: var(--comic-index-text,var(--text-muted));
            font-size: .82rem;
            margin-bottom: 16px
        }

        #chapter-nav-links {
            display: flex;
            flex-direction: column;
            gap: 10px
        }

        .chapter-nav-link {
            display: block;
            padding: 13px 14px;
            border-radius: 14px;
            background: rgba(0,0,0,.18);
            border: 1px solid rgba(255,255,255,.08);
            color: var(--comic-index-button-text,var(--comic-index-text));
            text-decoration: none;
            transition: .18s ease
        }

            .chapter-nav-link:hover, .chapter-nav-link.active {
                background: rgba(255,255,255,.14);
                transform: translateX(4px);
                color: var(--comic-index-text,white);
                border-color: rgba(255,255,255,.18)
            }

            .chapter-nav-link span {
                display: block;
                font-weight: 600
            }

            .chapter-nav-link small {
                display: block;
                margin-top: 5px;
                color: var(--comic-index-button-text,var(--comic-index-text));
                font-size: .78rem;
                opacity: .82
            }

        .comic-gallery-panel {
            padding: 28px;
            margin-bottom: 28px
        }

        .gallery-top {
            display: flex;
            justify-content: space-between;
            gap: 16px;
            flex-wrap: wrap;
            align-items: flex-start;
            margin-bottom: 22px
        }

            .gallery-top h2 {
                margin: 0;
                font-size: clamp(1.6rem,3vw,2.6rem)
            }

        .chapter-eyebrow {
            color: var(--text-muted);
            font-size: .88rem;
            letter-spacing: .08em;
            text-transform: uppercase;
            margin-bottom: 8px
        }

        .chapter-subtitle {
            color: var(--text-secondary);
            line-height: 1.6;
            margin-top: 8px
        }

        .author-note {
            margin: 18px 0 22px;
            background: rgba(255,255,255,.055);
            border: 1px solid rgba(255,255,255,.10);
            border-radius: 16px;
            padding: 18px;
            color: var(--text-secondary);
            line-height: 1.7;
            white-space: pre-wrap
        }

        .chapter-gallery-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill,minmax(145px,1fr));
            gap: 16px
        }

        .page-thumb {
            position: relative;
            border: 1px solid rgba(255,255,255,.10);
            border-radius: 16px;
            background: rgba(255,255,255,.035);
            overflow: hidden;
            cursor: pointer;
            transition: .18s ease;
            box-shadow: 0 12px 28px rgba(0,0,0,.22)
        }

            .page-thumb:hover {
                transform: translateY(-3px);
                border-color: rgba(255,255,255,.22);
                box-shadow: 0 18px 36px rgba(0,0,0,.32),0 0 18px rgba(255,255,255,.06)
            }

            .page-thumb img {
                width: 100%;
                aspect-ratio: 2/3;
                object-fit: cover;
                display: block;
                background: #050505
            }

        .page-thumb-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 8px;
            padding: 10px 11px;
            color: var(--text-secondary);
            font-size: .82rem
        }

        .credit-dot {
            width: 18px;
            height: 18px;
            border-radius: 50%;
            border: 1px solid rgba(255,255,255,.16);
            display: inline-flex;
            align-items: center;
            justify-content: center;
            background: rgba(0,0,0,.36);
            color: var(--text-secondary);
            font-size: .72rem
        }

        .empty {
            color: var(--text-muted);
            line-height: 1.6
        }

        .content-warning-panel {
            max-width: 760px;
            margin: 60px auto;
            padding: 32px;
            border-color: rgba(255,214,102,.28)
        }

            .content-warning-panel h1 {
                margin-top: 0
            }

        .warning-list {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin: 18px 0 24px
        }

        .warning-pill {
            border: 1px solid rgba(255,214,102,.32);
            background: rgba(255,214,102,.10);
            color: #ffe6a3;
            border-radius: 999px;
            padding: 7px 11px
        }

        body.content-safety-mode main {
            display: grid;
            place-items: center;
            max-width: none;
            width: 100%;
            min-height: calc(100vh - 120px);
            padding: 48px 24px 80px;
            box-sizing: border-box;
        }

        body.content-safety-mode .content-warning-panel {
            width: min(540px, 100%);
            max-width: 540px;
            margin: 0;
            padding: 34px;
            box-sizing: border-box;
            text-align: left;
        }

        body.content-safety-mode .warning-list {
            justify-content: flex-start;
        }

        body.content-safety-mode .content-warning-actions {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            align-items: center;
        }

        @media(max-width:900px) {
            body.content-safety-mode main {
                min-height: calc(100vh - 168px);
                padding: 34px 18px 70px;
            }

            body.content-safety-mode .content-warning-panel {
                width: 100%;
                padding: 26px 22px;
            }
        }

        .credit-pill {
            position: absolute;
            left: 14px;
            bottom: 14px;
            z-index: 6;
            display: inline-flex;
            align-items: center;
            max-width: calc(100% - 28px);
            padding: 7px 11px;
            border-radius: 999px;
            border: 1px solid rgba(255,255,255,.16);
            background: rgba(0,0,0,.58);
            color: white;
            font-size: .78rem;
            text-decoration: none;
            backdrop-filter: blur(14px);
            -webkit-backdrop-filter: blur(14px);
            white-space: nowrap
        }

            .credit-pill:hover {
                background: rgba(0,0,0,.75)
            }

        .credit-tooltip {
            position: absolute;
            left: 0;
            bottom: calc(100% + 8px);
            width: 240px;
            padding: 10px 12px;
            border-radius: 12px;
            background: rgba(0,0,0,.9);
            border: 1px solid rgba(255,255,255,.16);
            color: var(--text-secondary);
            font-size: .78rem;
            line-height: 1.45;
            opacity: 0;
            visibility: hidden;
            pointer-events: none;
            white-space: normal;
            box-shadow: 0 12px 28px rgba(0,0,0,.35)
        }

        .credit-pill:hover .credit-tooltip, .credit-pill.show-tooltip .credit-tooltip {
            opacity: 1;
            visibility: visible
        }

        .reader-overlay {
            position: fixed;
            inset: 0;
            z-index: 99999;
            display: none;
            background: #000;
            color: white
        }

            .reader-overlay.open {
                display: block
            }

        .reader-bg-image {
            position: absolute;
            inset: 0;
            background-image: var(--reader-bg-image);
            background-size: var(--reader-bg-size,cover);
            background-position: var(--reader-bg-position,center);
            background-repeat: var(--reader-bg-repeat,no-repeat);
            opacity: var(--reader-bg-opacity,.25);
            filter: blur(var(--reader-bg-blur,0px));
            transform: scale(1.03)
        }

        .reader-bg-base {
            position: absolute;
            inset: 0;
            background: var(--reader-bg-base,#000)
        }

        .reader-bg-overlay {
            position: absolute;
            inset: 0;
            background: rgba(0,0,0,var(--reader-bg-overlay,.65))
        }

        .reader-ui {
            position: relative;
            z-index: 3;
            height: 100%;
            display: flex;
            flex-direction: column
        }

        .reader-topbar {
            height: 58px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            padding: 10px 16px;
            box-sizing: border-box;
            background: linear-gradient(180deg,rgba(0,0,0,.76),rgba(0,0,0,.18));
            transition: .18s ease
        }

        .reader-title {
            min-width: 0
        }

            .reader-title strong {
                display: block;
                white-space: nowrap;
                overflow: hidden;
                text-overflow: ellipsis
            }

            .reader-title span {
                display: block;
                color: rgba(255,255,255,.66);
                font-size: .82rem;
                white-space: nowrap;
                overflow: hidden;
                text-overflow: ellipsis
            }

        .reader-actions {
            display: flex;
            gap: 8px;
            align-items: center;
            flex-wrap: wrap;
            justify-content: flex-end
        }

        .reader-action {
            border: 1px solid rgba(255,255,255,.16);
            background: rgba(255,255,255,.08);
            color: white;
            border-radius: 999px;
            padding: 8px 11px;
            cursor: pointer;
            font-family: Arial,sans-serif;
            backdrop-filter: blur(12px)
        }

            .reader-action.active {
                background: white;
                color: black
            }

        .reader-stage {
            position: relative;
            flex: 1;
            min-height: 0;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center
        }

            .reader-stage.webtoon {
                align-items: flex-start;
                overflow-y: auto;
                overflow-x: hidden;
                padding: 20px 0;
                box-sizing: border-box
            }

        .reader-page {
            max-width: 100vw;
            max-height: calc(100vh - 120px);
            object-fit: contain;
            display: block;
            box-shadow: 0 18px 70px rgba(0,0,0,.65);
            user-select: none;
            -webkit-user-drag: none
        }

        .reader-webtoon-stack {
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0
        }

            .reader-webtoon-stack img {
                width: min(100%,900px);
                height: auto;
                display: block;
                box-shadow: 0 12px 44px rgba(0,0,0,.45);
                user-select: none;
                -webkit-user-drag: none
            }

        .tap-zone {
            position: absolute;
            top: 0;
            bottom: 0;
            width: 34%;
            z-index: 6
        }

        .tap-left {
            left: 0
        }

        .tap-right {
            right: 0
        }

        .reader-arrow {
            position: absolute;
            z-index: 7;
            top: 50%;
            transform: translateY(-50%);
            width: 46px;
            height: 72px;
            border-radius: 999px;
            border: 1px solid rgba(255,255,255,.16);
            background: rgba(0,0,0,.38);
            color: white;
            font-size: 2rem;
            cursor: pointer;
            backdrop-filter: blur(12px);
            display: flex;
            align-items: center;
            justify-content: center;
            transition: .18s ease
        }

        .reader-stage.webtoon .reader-arrow,
        .reader-stage.webtoon .tap-zone {
            display: none;
        }

        .reader-stage.webtoon .reader-credit-desktop {
            position: fixed;
            left: 18px;
            bottom: 18px;
        }

        .reader-stage.webtoon .reader-credit-mobile-btn {
            position: fixed;
            right: 14px;
            bottom: 68px;
        }

        .reader-arrow:hover {
            background: rgba(255,255,255,.16)
        }

        .reader-arrow.left {
            left: 18px
        }

        .reader-arrow.right {
            right: 18px
        }

        .reader-bottombar {
            min-height: 52px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            padding: 10px 16px;
            box-sizing: border-box;
            background: linear-gradient(0deg,rgba(0,0,0,.78),rgba(0,0,0,.10));
            color: rgba(255,255,255,.72);
            font-size: .9rem;
            transition: .18s ease
        }

        .reader-credit-desktop {
            position: absolute;
            z-index: 8;
            left: 18px;
            bottom: 18px;
            max-width: min(420px,42vw);
            padding: 10px 13px;
            border: 1px solid rgba(255,255,255,.16);
            border-radius: 14px;
            background: rgba(0,0,0,.58);
            backdrop-filter: blur(14px);
            font-size: .82rem;
            line-height: 1.45;
            color: rgba(255,255,255,.76)
        }

            .reader-credit-desktop a {
                color: white;
                text-decoration: underline
            }

        .reader-credit-mobile-btn {
            display: none;
            position: absolute;
            z-index: 9;
            right: 14px;
            bottom: 68px;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            border: 1px solid rgba(255,255,255,.18);
            background: rgba(0,0,0,.58);
            color: white;
            font-weight: bold;
            backdrop-filter: blur(14px)
        }

        .reader-credit-sheet {
            position: fixed;
            z-index: 100000;
            left: 0;
            right: 0;
            bottom: 0;
            display: none;
            padding: 18px;
            background: rgba(8,8,10,.96);
            border-top: 1px solid rgba(255,255,255,.14);
            box-shadow: 0 -18px 40px rgba(0,0,0,.45);
            color: rgba(255,255,255,.78)
        }

            .reader-credit-sheet.open {
                display: block
            }

            .reader-credit-sheet a {
                color: white;
                text-decoration: underline
            }

        .reader-hidden .reader-topbar, .reader-hidden .reader-bottombar, .reader-hidden .reader-credit-desktop, .reader-hidden .reader-arrow, .reader-hidden .reader-credit-mobile-btn {
            opacity: 0;
            pointer-events: none
        }

        #report-modal {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,.75);
            z-index: 9999;
            justify-content: center;
            align-items: center
        }

        .report-box {
            width: 500px;
            max-width: 90%;
            background: var(--panel-bg);
            border: 1px solid var(--border-color);
            border-radius: 18px;
            padding: 24px
        }

            .report-box select, .report-box textarea, .report-box input {
                width: 100%;
                box-sizing: border-box;
                padding: 12px;
                margin-bottom: 12px;
                border-radius: 12px;
                border: 1px solid var(--border-color);
                background: rgba(0,0,0,.28);
                color: var(--text-primary)
            }

        .notification-link {
            display: inline-flex;
            align-items: center;
            gap: 6px
        }

        .notification-badge {
            min-width: 18px;
            height: 18px;
            padding: 0 6px;
            border-radius: 999px;
            background: white;
            color: black;
            font-size: .72rem;
            align-items: center;
            justify-content: center;
            line-height: 1
        }

        @media(max-width:900px) {
            header {
                flex-direction: column;
                gap: 14px;
                padding: 20px
            }

            nav {
                justify-content: center
            }

            main {
                flex-direction: column;
                padding: 30px 18px 70px
            }

            .left-sidebar {
                width: 100%;
                position: static
            }

            .comic-layout {
                grid-template-columns: 1fr
            }

            .cover-wrap {
