<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><link rel="icon" type="image/png" href="favicon.png"><title>Comic - Nullverse</title>
<script>const savedNullverseTheme=localStorage.getItem("nullverse-theme")||"void";document.documentElement.setAttribute("data-theme",savedNullverseTheme);</script><link rel="stylesheet" href="theme.css?v=25">
<style>
html{min-height:100%;background:#000}body{margin:0;min-height:100vh;font-family:Arial,sans-serif;background:var(--page-bg);background-attachment:fixed;color:var(--text-primary)}header,main{position:relative;z-index:2}header{padding:12px 40px;border-bottom:1px solid var(--border-color);display:flex;justify-content:space-between;align-items:center;background:rgba(12,12,14,.72);position:sticky;top:0;z-index:100;backdrop-filter:blur(18px);box-shadow:0 10px 35px rgba(0,0,0,.28)}.logo,.logo a{display:flex;align-items:center}.site-logo{height:64px;width:auto;display:block}nav{display:flex;gap:22px;flex-wrap:wrap;align-items:center}nav a,nav button{color:var(--text-secondary);text-decoration:none;background:none;border:0;cursor:pointer;font-family:Arial,sans-serif;font-size:.95rem}.shell{max-width:1180px;margin:auto;padding:42px 40px 80px}.hero,.panel{background:var(--panel-bg);border:1px solid var(--border-color);border-radius:22px;padding:30px;margin-bottom:24px;backdrop-filter:blur(18px);box-shadow:0 18px 40px rgba(0,0,0,.24)}.hero{display:grid;grid-template-columns:230px 1fr;gap:24px}.cover{width:100%;height:310px;border-radius:18px;object-fit:cover;background:#111}.tag-row,.actions,.chapter-row{display:flex;gap:10px;flex-wrap:wrap}.tag{font-size:.82rem;color:var(--text-secondary);border:1px solid var(--border-color);background:rgba(255,255,255,.04);border-radius:999px;padding:7px 11px}.muted,.empty{color:var(--text-secondary);line-height:1.65}.button{display:inline-block;background:var(--world-button-background,linear-gradient(180deg,#2a2a2f,#0d0d10));color:var(--world-button-text,#f5f5f5);border:1px solid rgba(255,255,255,.12);padding:10px 15px;border-radius:10px;cursor:pointer;text-decoration:none;font-family:Arial,sans-serif;transition:.18s ease}.button:hover{transform:translateY(-1px)}.chapter-button.active{border-color:white;background:rgba(255,255,255,.14)}.reader{background:#020202;border:1px solid var(--border-color);border-radius:22px;padding:18px;text-align:center}.reader-page{position:relative;width:100%;display:flex;justify-content:center}.reader-page img{max-width:100%;max-height:78vh;border-radius:10px;background:#111}.webtoon-stack{display:flex;flex-direction:column;align-items:center;gap:12px}.webtoon-page{position:relative;max-width:920px;width:100%}.webtoon-page img{width:100%;display:block;border-radius:8px;background:#111}.credit-pill{position:absolute;left:12px;bottom:12px;z-index:6;display:inline-flex;max-width:calc(100% - 24px);padding:7px 11px;border-radius:999px;border:1px solid rgba(255,255,255,.16);background:rgba(0,0,0,.58);color:white;font-size:.78rem;text-decoration:none;backdrop-filter:blur(14px);white-space:nowrap}.credit-tooltip{position:absolute;left:0;bottom:calc(100% + 8px);width:240px;padding:10px 12px;border-radius:12px;background:rgba(0,0,0,.9);border:1px solid rgba(255,255,255,.16);color:var(--text-secondary);font-size:.78rem;line-height:1.45;opacity:0;visibility:hidden;white-space:normal}.credit-pill:hover .credit-tooltip,.credit-pill.show-tooltip .credit-tooltip{opacity:1;visibility:visible}.nav-row{display:flex;justify-content:center;align-items:center;gap:12px;flex-wrap:wrap;margin:18px 0}.content-warning-panel{max-width:760px;margin:60px auto;background:var(--panel-bg);border:1px solid rgba(255,214,102,.28);border-radius:22px;padding:32px}.warning-pill{border:1px solid rgba(255,214,102,.32);background:rgba(255,214,102,.10);color:#ffe6a3;border-radius:999px;padding:7px 11px}.modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:9999;justify-content:center;align-items:center}.modal-card{width:500px;max-width:90%;background:var(--panel-bg);border:1px solid var(--border-color);border-radius:18px;padding:24px}@media(max-width:800px){header{flex-direction:column;gap:14px;padding:20px}nav{justify-content:center}.shell{padding:30px 24px 70px}.hero{grid-template-columns:1fr}.cover{height:240px}}
</style>
</head>
<body><div class="nullverse-stars"></div><header><div class="logo"><a href="index.html"><img src="Nullverse-3.png" alt="Nullverse" class="site-logo"></a></div><nav><a href="index.html">Home</a><a href="notifications.html">Notifications</a><a href="explore.html">Explore</a><a href="profile.html">Profile</a><a href="dashboard.html">Dashboard</a><a href="messages.html">Messages</a><button onclick="logOut()">Log Out</button></nav></header>
<main class="shell"><section id="hero" class="hero"><img id="cover" class="cover"><div><div id="tags" class="tag-row"></div><h1 id="title">Loading comic...</h1><p id="creator" class="muted"></p><p id="summary" class="muted"></p><div class="actions"><button id="like-button" class="button">♡ Like</button><span id="like-count" class="muted">0 Likes</span><a id="comments-link" class="button">Comments</a><a id="qa-link" class="button">Q&A</a><a id="community-link" class="button">Community</a><button id="report-btn" class="button">Report</button></div><div id="owner-actions" class="actions" style="margin-top:16px"></div></div></section><section class="panel"><h2>Chapters</h2><div id="chapter-row" class="chapter-row"></div></section><section id="reader" class="reader"><p class="empty">Choose a chapter to start reading.</p></section></main>
<div id="report-modal" class="modal"><div class="modal-card"><h2>Report Comic</h2><select id="report-reason"><option>Spam</option><option>Harassment</option><option>Hate Speech</option><option>NSFW Content</option><option>Copyright Violation</option><option>Impersonation</option><option>Other</option></select><textarea id="report-details" rows="5" placeholder="Additional details..."></textarea><div class="actions"><button class="button" id="submit-report-btn">Submit Report</button><button class="button" id="close-report-btn">Cancel</button></div></div></div>
<script type="module">
import{requireBetaAccess}from"./betaGate.js";import{supabase}from"./supabaseClient.js";import{setupNotificationBadge}from"./notificationBadge.js";import{setupMessageBadge}from"./messageBadge.js";import{createNotification}from"./notifications.js";import{getCurrentUserWithPermissions,canModerateWorlds}from"./permissions.js?v=4";
setupMessageBadge();const currentUser=await requireBetaAccess();setupNotificationBadge();const{permissions:currentPermissions}=await getCurrentUserWithPermissions(currentUser.id);const params=new URLSearchParams(location.search);const worldId=params.get("id");let currentWorld=null;let chapters=[];let pages=[];let activeChapter=null;let pageIndex=0;let contentExperience="balanced";let blockedContentWarnings=[];let ageRole="unknown";await loadViewerContentPreferences();if(!worldId)showNotFound("No comic ID was provided.");else await loadComic(worldId);
document.addEventListener("click",e=>{const pill=e.target.closest(".credit-pill");document.querySelectorAll(".credit-pill").forEach(p=>{if(p!==pill)p.classList.remove("show-tooltip")});if(pill){e.preventDefault();pill.classList.toggle("show-tooltip")}});
async function loadViewerContentPreferences(){const{data:p}=await supabase.from("profiles").select("content_experience,blocked_content_warnings,age_role").eq("id",currentUser.id).single();if(!p)return;contentExperience=p.content_experience||"balanced";blockedContentWarnings=p.blocked_content_warnings||[];ageRole=p.age_role||"unknown"}
function getSafetyInfo(w){const safe=["gore","sexual_content","disturbing_imagery"];const warnings=w.content_warnings||[];return{warnings,rating:w.content_rating||"general",hasHardBlockedWarning:warnings.some(x=>blockedContentWarnings.includes(x)),hasSafeWarning:warnings.some(x=>safe.includes(x)),isAdult:(w.content_rating||"general")==="adult"}}
function shouldBlock(w){const i=getSafetyInfo(w);if(ageRole==="minor")return i.isAdult||i.hasSafeWarning;if(i.hasHardBlockedWarning)return true;if(contentExperience==="safe")return i.isAdult||i.hasSafeWarning;return false}
function shouldWarn(w){const i=getSafetyInfo(w);return contentExperience==="balanced"&&ageRole!=="minor"&&!i.hasHardBlockedWarning&&(i.isAdult||i.hasSafeWarning)}
async function areUsersBlocked(a,b){const{data}=await supabase.from("user_blocks").select("id").in("blocker_id",[a,b]).in("blocked_id",[a,b]).limit(1);return data&&data.length>0}
async function loadComic(id){const{data:w,error}=await supabase.from("worlds").select("*").eq("id",id).eq("visibility","published").single();if(error||!w){showNotFound("This comic does not exist or is not published.");return}currentWorld=w;if(shouldBlock(w)){showBlocked(w);return}if(shouldWarn(w)&&params.get("contentOk")!==w.id){showWarning(w);return}if(await areUsersBlocked(currentUser.id,w.owner_id)){showNotFound("This comic is unavailable.");return}if(w.moderation_status==="hidden"&&currentUser.id!==w.owner_id&&!canModerateWorlds(currentPermissions)){showNotFound("This comic has been hidden by Nullverse staff.");return}await renderComic(w)}
async function renderComic(w){const{data:profile}=await supabase.from("profiles").select("id,username,display_name").eq("id",w.owner_id).single();w.ownerProfile=profile;document.title=`${w.title||"Comic"} - Nullverse`;document.getElementById("cover").src=w.cover_image_url||"https://placehold.co/600x900/111111/ffffff?text=Comic";document.getElementById("title").textContent=w.title||"Untitled Comic";document.getElementById("summary").textContent=w.summary||"No summary provided.";document.getElementById("creator").innerHTML=profile?`by <a href="profile.html?user=${encodeURIComponent(profile.username)}">${escapeHtml(profile.display_name||profile.username)} (@${escapeHtml(profile.username)})</a>`:"by Unknown Creator";renderTags(w);if(currentUser.id===w.owner_id)document.getElementById("owner-actions").innerHTML=`<a class="button" href="edit-comic.html?id=${encodeURIComponent(w.id)}">Edit Comic</a><a class="button" href="edit-world.html?id=${encodeURIComponent(w.id)}">Edit World Settings</a>`;document.getElementById("comments-link").href=`world-comments.html?id=${encodeURIComponent(w.id)}`;document.getElementById("qa-link").href=`world-qa.html?id=${encodeURIComponent(w.id)}`;document.getElementById("community-link").href=`world-additions.html?id=${encodeURIComponent(w.id)}`;await loadLikes();await loadChapters();setupReports()}
function renderTags(w){const tags=[w.content_type||"comic",...(w.genres||"").split(","),...(w.themes||"").split(",")].map(t=>t.trim()).filter(Boolean);document.getElementById("tags").innerHTML=tags.map(t=>`<span class="tag">${escapeHtml(t)}</span>`).join("")}
async function loadChapters(){const{data,error}=await supabase.from("comic_chapters").select("*").eq("world_id",currentWorld.id).eq("visibility","published").eq("moderation_status","visible").order("chapter_number",{ascending:true});if(error){document.getElementById("chapter-row").innerHTML=`<p class="empty">${escapeHtml(error.message)}</p>`;return}chapters=data||[];if(!chapters.length){document.getElementById("chapter-row").innerHTML=`<p class="empty">No public chapters yet.</p>`;return}document.getElementById("chapter-row").innerHTML=chapters.map(ch=>`<button class="button chapter-button" id="chapter-${ch.id}" onclick="openChapter('${ch.id}')">${ch.chapter_number}. ${escapeHtml(ch.title)}</button>`).join("");openChapter(chapters[0].id)}
window.openChapter=async function(id){activeChapter=chapters.find(c=>c.id===id);document.querySelectorAll(".chapter-button").forEach(b=>b.classList.remove("active"));document.getElementById(`chapter-${id}`)?.classList.add("active");const{data,error}=await supabase.from("comic_pages").select("*").eq("chapter_id",id).order("page_number",{ascending:true});if(error){document.getElementById("reader").innerHTML=`<p class="empty">${escapeHtml(error.message)}</p>`;return}pages=data||[];pageIndex=0;renderReader()};
function renderReader(){const r=document.getElementById("reader");if(!pages.length){r.innerHTML=`<p class="empty">This chapter has no pages yet.</p>`;return}if(currentWorld.comic_reading_mode==="webtoon"){r.innerHTML=`<h2>${escapeHtml(activeChapter.title)}</h2><div class="webtoon-stack">${pages.map(p=>`<div class="webtoon-page"><img src="${escapeHtml(p.image_url)}" alt="${escapeHtml(p.alt_text||`Page ${p.page_number}`)}">${buildCreditPill(p)}</div>`).join("")}</div>`;return}const p=pages[pageIndex];r.innerHTML=`<h2>${escapeHtml(activeChapter.title)}</h2><div class="reader-page"><img src="${escapeHtml(p.image_url)}" alt="${escapeHtml(p.alt_text||`Page ${p.page_number}`)}">${buildCreditPill(p)}</div><div class="nav-row"><button class="button" onclick="prevPage()">← Previous</button><span class="muted">Page ${pageIndex+1} / ${pages.length}</span><button class="button" onclick="nextPage()">Next →</button></div>`}
window.prevPage=function(){if(pageIndex>0){pageIndex--;renderReader()}};window.nextPage=function(){if(pageIndex<pages.length-1){pageIndex++;renderReader()}};document.addEventListener("keydown",e=>{if(e.key==="ArrowLeft")prevPage();if(e.key==="ArrowRight")nextPage()});
function buildCreditPill(p){const label=getCreditLabel(p);const href=p.credit_type==="nullverse_creator"&&p.credit_nullverse_username?`profile.html?user=${encodeURIComponent(p.credit_nullverse_username)}`:p.credit_url||"#";return `<a class="credit-pill" href="${escapeHtml(href)}">Credit: ${escapeHtml(label)}<span class="credit-tooltip">${escapeHtml(getCreditTooltip(p))}</span></a>`}
function getCreditLabel(p){if(p.credit_type==="own_work")return currentWorld.ownerProfile?.username?`@${currentWorld.ownerProfile.username}`:"Creator";if(p.credit_type==="nullverse_creator")return`@${p.credit_nullverse_username||"creator"}`;return p.credit_name||p.credit_note||"No credit needed"}
function getCreditTooltip(p){if(p.credit_type==="own_work")return"Artwork credited to this comic's creator.";if(p.credit_type==="nullverse_creator")return`Artwork credited to @${p.credit_nullverse_username||"creator"}. ${p.credit_note||""}`;return[p.credit_name,p.credit_note,p.credit_no_ai?"Confirmed non-AI artwork":""].filter(Boolean).join(" • ")||"No credit needed."}
async function loadLikes(){const{data:likes}=await supabase.from("world_likes").select("*").eq("world_id",currentWorld.id);const count=likes?.length||0;document.getElementById("like-count").textContent=`${count} ${count===1?"Like":"Likes"}`;const liked=likes?.some(l=>l.user_id===currentUser.id);document.getElementById("like-button").textContent=liked?"♥ Liked":"♡ Like";document.getElementById("like-button").classList.toggle("liked",liked)}
document.getElementById("like-button").addEventListener("click",async()=>{const liked=document.getElementById("like-button").textContent.includes("Liked");if(liked)await supabase.from("world_likes").delete().eq("world_id",currentWorld.id).eq("user_id",currentUser.id);else{const{error}=await supabase.from("world_likes").insert({world_id:currentWorld.id,user_id:currentUser.id});if(!error)await createNotification({recipientId:currentWorld.owner_id,actorId:currentUser.id,worldId:currentWorld.id,type:"world_liked",message:`Someone liked ${currentWorld.title}.`,link:`comic.html?id=${encodeURIComponent(currentWorld.id)}`})}await loadLikes()});
function setupReports(){document.getElementById("report-btn").onclick=()=>document.getElementById("report-modal").style.display="flex";document.getElementById("close-report-btn").onclick=()=>document.getElementById("report-modal").style.display="none";document.getElementById("submit-report-btn").onclick=async()=>{const reason=document.getElementById("report-reason").value;const details=document.getElementById("report-details").value.trim();const{error}=await supabase.from("reports").insert({reporter_id:currentUser.id,reported_user_id:currentWorld.owner_id,world_id:currentWorld.id,report_type:"comic",reason,details,status:"open"});if(error){alert(error.message);return}alert("Report submitted.");document.getElementById("report-modal").style.display="none"}}
function showNotFound(msg){document.querySelector("main").innerHTML=`<section class="panel"><h1>Comic not found</h1><p class="empty">${escapeHtml(msg)}</p></section>`}
function showBlocked(w){document.querySelector("main").innerHTML=`<section class="content-warning-panel"><h1>Content Hidden</h1><p class="empty">This comic is hidden by your content safety settings.</p></section>`}
function showWarning(w){const warnings=getSafetyInfo(w).warnings;document.querySelector("main").innerHTML=`<section class="content-warning-panel"><h1>Content Warning</h1><p class="empty">This comic may contain content you may want to review before opening.</p><div class="tag-row">${warnings.map(x=>`<span class="warning-pill">${escapeHtml(formatWarning(x))}</span>`).join("")}</div><a class="button" href="comic.html?id=${encodeURIComponent(w.id)}&contentOk=${encodeURIComponent(w.id)}">Continue Anyway</a><a class="button" href="explore.html">Go Back</a></section>`}
function formatWarning(v){return String(v||"").replaceAll("_"," ").replace(/\b\w/g,l=>l.toUpperCase())}function escapeHtml(v){return String(v||"").replaceAll("&","&amp;").replaceAll("<","&lt;").replaceAll(">","&gt;").replaceAll('"',"&quot;").replaceAll("'","&#039;")}window.logOut=async function(){await supabase.auth.signOut();location.href="login.html"}
</script></body></html>
