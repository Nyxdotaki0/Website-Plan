<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" href="favicon.png">
    <title>World - Nullverse</title>

    <script>
        const savedNullverseTheme =
            localStorage.getItem("nullverse-theme") || "void";

        document.documentElement.setAttribute(
            "data-theme",
            savedNullverseTheme
        );
    </script>

    <link rel="stylesheet" href="theme.css?v=20">

    <style>
        html {
            min-height: 100%;
            background: #000000;
        }

        body {
            margin: 0;
            min-height: 100vh;
            font-family: Arial, sans-serif;
            background: var(--page-bg);
            background-attachment: fixed;
            color: var(--text-primary);
            transition: background 0.25s ease, color 0.25s ease;
        }

        header {
            padding: 12px 40px;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(12,12,14,0.72);
            position: sticky;
            top: 0;
            z-index: 100;
            backdrop-filter: blur(18px);
            -webkit-backdrop-filter: blur(18px);
            box-shadow: 0 10px 35px rgba(0,0,0,0.28);
        }

        .logo,
        .logo a {
            display: flex;
            align-items: center;
        }

        .site-logo {
            height: 64px;
            width: auto;
            display: block;
            max-width: none;
        }

        nav {
            display: flex;
            gap: 22px;
            flex-wrap: wrap;
            align-items: center;
        }

            nav a,
            nav button {
                color: var(--text-secondary);
                text-decoration: none;
                background: none;
                border: none;
                cursor: pointer;
                font-family: Arial, sans-serif;
                font-size: 0.95rem;
                transition: .18s ease;
            }

                nav a:hover,
                nav button:hover {
                    color: white;
                }

        main {
            display: flex;
            gap: 28px;
            max-width: 1400px;
            margin: auto;
            padding: 45px 40px 80px;
        }

        .hero {
            background: linear-gradient( 135deg, rgba(255,255,255,0.06), rgba(255,255,255,0.02) ), var(--world-panel, var(--panel-bg));
            border: 1px solid var(--border-color);
            border-radius: 22px;
            padding: 36px;
            margin-bottom: 28px;
            backdrop-filter: blur(18px);
            -webkit-backdrop-filter: blur(18px);
            box-shadow: 0 18px 40px rgba(0,0,0,0.24), 0 0 24px rgba(255,255,255,0.03);
        }

        .tag-row {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            margin-bottom: 18px;
        }

        .tag {
            display: inline-block;
            font-size: 0.82rem;
            color: var(--text-secondary);
            border: 1px solid var(--border-color);
            background: rgba(255,255,255,0.04);
            border-radius: 999px;
            padding: 7px 11px;
        }

        h1 {
            font-size: 3rem;
            margin: 0 0 12px;
            line-height: 1.05;
        }

        .creator {
            color: var(--text-muted);
            margin-bottom: 22px;
        }

            .creator a {
                color: var(--text-secondary);
                text-decoration: none;
            }

                .creator a:hover {
                    color: white;
                }

        .summary {
            color: var(--text-secondary);
            font-size: 1.1rem;
            line-height: 1.75;
            max-width: 820px;
        }

        .like-row {
            display: flex;
            align-items: center;
            gap: 14px;
            margin-top: 26px;
            flex-wrap: wrap;
        }

        .like-button,
        .button {
            display: inline-block;
            background: linear-gradient( 180deg, var(--world-accent, #2a2a2f) 0%, rgba(0,0,0,0.35) 100% );
            color: #f5f5f5;
            border: 1px solid rgba(255,255,255,0.12);
            padding: 10px 15px;
            border-radius: 10px;
            cursor: pointer;
            text-decoration: none;
            font-family: Arial, sans-serif;
            transition: 0.18s ease;
            box-shadow: 0 0 16px rgba(255,255,255,0.08), inset 0 1px 0 rgba(255,255,255,0.06);
        }

            .like-button:hover,
            .button:hover {
                background: linear-gradient( 180deg, rgba(255,255,255,0.16) 0%, var(--world-accent, #3a3a40) 100% );
                border-color: rgba(255,255,255,0.18);
                box-shadow: 0 0 20px rgba(255,255,255,0.12), inset 0 1px 0 rgba(255,255,255,0.08);
                transform: translateY(-1px);
            }

            .like-button.liked {
                background: linear-gradient( 180deg, #4a2f37 0%, #2a181d 100% );
            }

        .like-count {
            color: var(--text-muted);
        }

        .section-nav {
            background: var(--panel-bg);
            border: 1px solid var(--border-color);
            border-radius: 18px;
            padding: 18px;
            margin-bottom: 26px;
            backdrop-filter: blur(18px);
            -webkit-backdrop-filter: blur(18px);
            box-shadow: 0 14px 34px rgba(0,0,0,0.22), 0 0 24px rgba(255,255,255,0.03);
        }

        .index-header h2 {
            margin: 0;
            font-size: 1.15rem;
        }

        .index-header p {
            margin: 6px 0 18px;
            color: var(--text-muted);
            font-size: .88rem;
        }

        .section-search {
            width: 100%;
            box-sizing: border-box;
            padding: 12px 14px;
            border-radius: 12px;
            border: 1px solid var(--border-color);
            background: rgba(0,0,0,0.22);
            color: white;
            margin-bottom: 14px;
            transition: .18s ease;
        }

            .section-search:focus {
                outline: none;
                border-color: rgba(255,255,255,0.16);
                box-shadow: 0 0 16px rgba(255,255,255,0.05);
            }

        .section-filters {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-bottom: 16px;
        }

        .filter-chip {
            background: linear-gradient( 180deg, #222228 0%, #141418 100% );
            border: 1px solid var(--border-color);
            padding: 7px 10px;
            border-radius: 999px;
            cursor: pointer;
            font-size: .8rem;
            color: var(--text-secondary);
            transition: .18s ease;
        }

            .filter-chip.active,
            .filter-chip:hover {
                background: linear-gradient( 180deg, #35353b 0%, #1d1d22 45%, #101014 100% );
                color: white;
                border-color: rgba(255,255,255,0.14);
                box-shadow: 0 0 18px rgba(255,255,255,0.10);
            }

        .section-count {
            color: var(--text-muted);
            font-size: .82rem;
            margin-bottom: 16px;
        }

        .left-sidebar {
            width: 280px;
            flex-shrink: 0;
            position: sticky;
            top: 110px;
            height: fit-content;
        }

        .content-column {
            flex: 1;
            min-width: 0;
        }

        #section-nav-links {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .section-nav a {
            display: block;
            padding: 13px 14px;
            border-radius: 14px;
            background: rgba(255,255,255,0.025);
            border: 1px solid transparent;
            color: var(--text-secondary);
            text-decoration: none;
            transition: .18s ease;
        }

            .section-nav a:hover {
                background: rgba(255,255,255,0.045);
                transform: translateX(4px);
                color: white;
            }

            .section-nav a.active {
                border-color: rgba(255,255,255,0.18);
                background: linear-gradient( 180deg, rgba(255,255,255,0.06), rgba(255,255,255,0.02) );
            }

            .section-nav a span {
                display: block;
                font-weight: 600;
            }

            .section-nav a small {
                display: block;
                margin-top: 5px;
                color: var(--text-muted);
                font-size: .78rem;
            }

        .world-section {
            background: linear-gradient( 180deg, rgba(255,255,255,0.04), rgba(255,255,255,0.012) ), var(--world-panel, var(--card-bg));
            border: 1px solid var(--border-color);
            border-radius: 18px;
            padding: 30px;
            margin-bottom: 24px;
            box-shadow: 0 14px 34px rgba(0,0,0,0.20);
            transition: .18s ease;
        }

            .world-section:hover {
                border-color: rgba(255,255,255,0.10);
                box-shadow: 0 18px 40px rgba(0,0,0,0.24), 0 0 24px rgba(255,255,255,0.03);
            }

            .world-section h2 {
                margin: 0 0 10px;
                font-size: 2rem;
            }

        .section-type {
            color: var(--text-muted);
            margin-bottom: 18px;
            font-size: 0.95rem;
        }

        .section-content {
            white-space: pre-wrap;
            color: var(--text-primary);
            line-height: 1.9;
        }

        .empty {
            color: var(--text-muted);
            line-height: 1.6;
        }

        .owner-actions {
            margin-top: 22px;
        }

        .notification-link {
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }

        .notification-badge {
            min-width: 18px;
            height: 18px;
            padding: 0 6px;
            border-radius: 999px;
            background: white;
            color: black;
            font-size: 0.72rem;
            align-items: center;
            justify-content: center;
            line-height: 1;
        }

        @media (max-width: 800px) {
            header {
                flex-direction: column;
                gap: 14px;
                padding: 20px;
            }

            nav {
                justify-content: center;
            }

            main {
                flex-direction: column;
                padding: 30px 24px 70px;
            }

            .left-sidebar {
                width: 100%;
                position: static;
            }

            h1 {
                font-size: 2.2rem;
            }

            .hero {
                padding: 24px;
            }

            .like-row {
                align-items: flex-start;
                flex-wrap: wrap;
            }
        }
    </style>
</head>

<body>

    <header>
        <div class="logo">
            <a href="index.html">
                <img src="Nullverse-3.png"
                     alt="Nullverse"
                     class="site-logo">
            </a>
        </div>

        <nav>
            <a href="index.html">Home</a>
            <a href="notifications.html">Notifications</a>
            <a href="explore.html">Explore</a>
            <a href="profile.html">Profile</a>
            <a href="dashboard.html">Dashboard</a>
            <button onclick="logOut()">Log Out</button>
        </nav>
    </header>

    <main>
        <aside class="left-sidebar">

            <section id="section-nav"
                     class="section-nav"
                     style="display:none;">

                <div class="index-header">

                    <h2>
                        Search This World
                    </h2>

                    <p>
                        Jump between sections instantly
                    </p>

                </div>

                <input id="section-search"
                       class="section-search"
                       type="text"
                       placeholder="Search sections...">

                <div id="section-type-filter"
                     class="section-filters">
                </div>

                <div id="section-count"
                     class="section-count">
                </div>

                <div id="section-nav-links">
                </div>

            </section>

        </aside>

        <div class="content-column">
            <section class="hero">
                <div id="world-tags" class="tag-row"></div>

                <h1 id="world-title">Loading world...</h1>

                <p id="world-creator" class="creator"></p>

                <div id="world-summary" class="summary"></div>

                <div class="like-row">
                    <button id="like-button" class="like-button">
                        ♡ Like
                    </button>

                    <span id="like-count" class="like-count">
                        0 Likes
                    </span>

                    <a class="button" id="comments-link">
                        Comments
                    </a>

                    <a class="button" id="qa-link">
                        Q&A
                    </a>

                    <a class="button" id="community-link">
                        Community
                    </a>
                </div>

                <div id="owner-actions" class="owner-actions"></div>
            </section>

            <section id="sections-container">
                <p class="empty">Loading sections...</p>
            </section>
        </div>
    </main>

    <script type="module">
        import { requireBetaAccess } from "./betaGate.js";
        import { supabase } from "./supabaseClient.js";
        import { setupNotificationBadge } from "./notificationBadge.js";
        import { createNotification } from "./notifications.js";

        const currentUser = await requireBetaAccess();
        setupNotificationBadge();

        const params = new URLSearchParams(window.location.search);
        const worldId = params.get("id");

        let currentWorld = null;

        if (!worldId) {
            showNotFound("No world ID was provided.");
        } else {
            await loadWorld(worldId);
        }

        async function loadWorld(id) {
            const { data: world, error } = await supabase
                .from("worlds")
                .select("*")
                .eq("id", id)
                .eq("visibility", "published")
                .single();

            if (error || !world) {
                showNotFound("This world does not exist or is not published.");
                return;
            }

            currentWorld = world;
            applyWorldTheme(world);

            const { data: profile } = await supabase
                .from("profiles")
                .select("username, display_name")
                .eq("id", world.owner_id)
                .single();

            document.title = `${world.title || "World"} - Nullverse`;

            document.getElementById("world-title").textContent =
                world.title || "Untitled World";

            document.getElementById("world-summary").textContent =
                world.summary || "No summary provided.";

            if (profile) {
                document.getElementById("world-creator").innerHTML =
                    `by <a href="profile.html?user=${encodeURIComponent(profile.username)}">${escapeHtml(profile.display_name || profile.username)} (@${escapeHtml(profile.username)})</a>`;
            } else {
                document.getElementById("world-creator").textContent =
                    "by Unknown Creator";
            }

            renderTags(world);
            renderOwnerActions(world);
            await loadLikes();
            await loadSections(world.id);

            document.getElementById("comments-link").href =
                `world-comments.html?id=${encodeURIComponent(world.id)}`;

            document.getElementById("qa-link").href =
                `world-qa.html?id=${encodeURIComponent(world.id)}`;

            document.getElementById("community-link").href =
                `world-additions.html?id=${encodeURIComponent(world.id)}`;

            
        }

        function applyWorldTheme(world) {

            const root = document.documentElement;

            const accent =
                world.theme_accent_color || "#e8e8ef";

            const background =
                world.theme_background_color || "#000000";

            const panel =
                world.theme_panel_color || "#141416";

            const text =
                world.theme_text_color || "#f5f5f5";

            root.style.setProperty(
                "--world-accent",
                accent
            );

            root.style.setProperty(
                "--world-background",
                background
            );

            root.style.setProperty(
                "--world-panel",
                panel
            );

            root.style.setProperty(
                "--world-text",
                text
            );

            const glow =
                hexToRgb(accent, 0.16);

            root.style.setProperty(
                "--world-glow",
                glow
            );

            let pageBackground = "var(--page-bg)";

            if (world.theme_gradient_enabled) {

                let opacity = "0.22";

                if (world.theme_gradient_strength === "subtle") {
                    opacity = "0.14";
                }

                if (world.theme_gradient_strength === "strong") {
                    opacity = "0.34";
                }

                const color1 =
                    hexToRgb(
                        world.theme_gradient_color_1 || accent,
                        opacity
                    );

                const color2 =
                    hexToRgb(
                        world.theme_gradient_color_2 || background,
                        opacity
                    );

                const direction =
                    world.theme_gradient_direction || "180deg";

                pageBackground = `
            radial-gradient(circle at 15% 10%, ${color1}, transparent 30%),
            radial-gradient(circle at 85% 20%, ${color2}, transparent 34%),

            radial-gradient(circle at 10% 16%, rgba(255,255,255,0.9) 0 1px, transparent 1.7px),
            radial-gradient(circle at 18% 72%, rgba(255,255,255,0.42) 0 1px, transparent 1.6px),
            radial-gradient(circle at 25% 38%, rgba(255,255,255,0.55) 0 1px, transparent 1.6px),
            radial-gradient(circle at 36% 12%, rgba(255,255,255,0.45) 0 1px, transparent 1.5px),
            radial-gradient(circle at 48% 58%, rgba(255,255,255,0.35) 0 1px, transparent 1.5px),
            radial-gradient(circle at 54% 30%, rgba(255,255,255,0.6) 0 1px, transparent 1.6px),
            radial-gradient(circle at 70% 18%, rgba(255,255,255,0.7) 0 1px, transparent 1.7px),
            linear-gradient(
                ${direction},
                ${world.theme_gradient_color_1 || background} 0%,
                ${world.theme_gradient_color_2 || "#000000"} 100%
            )
        `;
            }

            if (world.theme_preset && world.theme_preset !== "default") {
                document.body.style.background = pageBackground;
            }

            document.body.style.color =
                text;
        }

        function hexToRgb(hex, alpha = 1) {

            if (!hex) return `rgba(255,255,255,${alpha})`;

            const cleaned =
                hex.replace("#", "");

            const bigint =
                parseInt(cleaned, 16);

            const r =
                (bigint >> 16) & 255;

            const g =
                (bigint >> 8) & 255;

            const b =
                bigint & 255;

            return `rgba(${r}, ${g}, ${b}, ${alpha})`;
        }

        async function loadSections(id) {
            const container = document.getElementById("sections-container");

            const { data: sections, error } = await supabase
                .from("world_sections")
                .select("*")
                .eq("world_id", id)
                .order("created_at", { ascending: true });

            if (error) {
                container.innerHTML = `<p class="empty">${escapeHtml(error.message)}</p>`;
                return;
            }

            if (!sections || sections.length === 0) {
                container.innerHTML =
                    `<p class="empty">This world does not have any public sections yet.</p>`;
                return;
            }

            renderSectionNav(sections);

            container.innerHTML = sections.map((section, index) => {
                const sectionId = `section-${index}`;

                return `
<article id="${sectionId}" class="world-section">

    <h2>
        ${escapeHtml(section.title || "Untitled Section")}
    </h2>

    <div class="section-type">
        ${escapeHtml(section.section_type || "Section")}
    </div>

    ${section.image_url ? `
        <img
            src="${escapeHtml(section.image_url)}"
            style="
                width:${section.image_position === "full" ? "100%" : "320px"};
                max-width:100%;
                border-radius:16px;
                margin-bottom:20px;
                display:block;
                object-fit:cover;
                float:${section.image_position === "left" ? "left" :
                            section.image_position === "right" ? "right" : "none"};
                margin-right:${section.image_position === "left" ? "22px" : "0"};
                margin-left:${section.image_position === "right" ? "22px" : "0"};
            "
        >
    ` : ""}

    <div class="section-content">
        ${escapeHtml(section.content || "No content yet.")}
    </div>

</article>
`;
            }).join("");
        }

        function renderSectionNav(sections) {
            const nav = document.getElementById("section-nav");
            const links = document.getElementById("section-nav-links");
            const search = document.getElementById("section-search");
            const filters = document.getElementById("section-type-filter");
            const count = document.getElementById("section-count");

            if (!sections || sections.length <= 1) {
                nav.style.display = "none";
                return;
            }

            nav.style.display = "block";

            const types = [...new Set(
                sections
                    .map(section => section.section_type || "Section")
                    .map(type => type.trim())
                    .filter(Boolean)
            )];

            filters.innerHTML = `
        <button class="filter-chip active" data-type="All">All</button>
        ${types.map(type => `
            <button class="filter-chip" data-type="${escapeHtml(type)}">
                ${escapeHtml(type)}
            </button>
        `).join("")}
    `;

            let activeType = "All";

            function draw() {
                const query = (search.value || "").toLowerCase().trim();

                const filtered = sections.filter(section => {
                    const title = (section.title || "").toLowerCase();
                    const type = (section.section_type || "Section").trim();
                    const content = (section.content || "").toLowerCase();

                    const matchesSearch =
                        title.includes(query) ||
                        type.toLowerCase().includes(query) ||
                        content.includes(query);

                    const matchesType =
                        activeType === "All" || type === activeType;

                    return matchesSearch && matchesType;
                });

                count.textContent =
                    `${filtered.length} ${filtered.length === 1 ? "Section" : "Sections"}`;

                if (!filtered.length) {
                    links.innerHTML = `
                <p class="empty">
                    No sections match this search.
                </p>
            `;
                    return;
                }

                links.innerHTML = filtered.map(section => {
                    const realIndex = sections.indexOf(section);

                    return `
                <a href="#section-${realIndex}">
                    <span>${escapeHtml(section.title || "Untitled")}</span>
                    <small>${escapeHtml(section.section_type || "Section")}</small>
                </a>
            `;
                }).join("");
            }

            filters.addEventListener("click", function (e) {
                const button = e.target.closest(".filter-chip");
                if (!button) return;

                activeType = button.dataset.type || "All";

                filters.querySelectorAll(".filter-chip").forEach(chip => {
                    chip.classList.remove("active");
                });

                button.classList.add("active");

                draw();
            });

            search.addEventListener("input", draw);

            draw();
        }

        function renderTags(world) {
            const container = document.getElementById("world-tags");

            const tags = [
                ...(world.genres || "").split(","),
                ...(world.themes || "").split(",")
            ]
                .map(tag => tag.trim())
                .filter(Boolean);

            if (!tags.length) {
                container.innerHTML = `<span class="tag">World</span>`;
                return;
            }

            container.innerHTML = tags.map(tag =>
                `<span class="tag">${escapeHtml(tag)}</span>`
            ).join("");
        }

        function renderOwnerActions(world) {
            const container = document.getElementById("owner-actions");

            if (currentUser && currentUser.id === world.owner_id) {
                container.innerHTML = `
                    <a class="button" href="edit-world.html?id=${encodeURIComponent(world.id)}">
                        Edit World
                    </a>
                `;
            } else {
                container.innerHTML = "";
            }
        }

        async function loadLikes() {
            if (!currentWorld) return;

            const { data: likes, error } = await supabase
                .from("world_likes")
                .select("*")
                .eq("world_id", currentWorld.id);

            if (error) {
                document.getElementById("like-count").textContent =
                    "Likes unavailable";
                return;
            }

            const likeCount = likes ? likes.length : 0;

            document.getElementById("like-count").textContent =
                `${likeCount} ${likeCount === 1 ? "Like" : "Likes"}`;

            const userLiked = likes?.some(
                like => like.user_id === currentUser.id
            );

            const button = document.getElementById("like-button");

            if (userLiked) {
                button.classList.add("liked");
                button.textContent = "♥ Liked";
            } else {
                button.classList.remove("liked");
                button.textContent = "♡ Like";
            }
        }

        document.getElementById("like-button").addEventListener("click", async () => {
            if (!currentWorld || !currentUser) return;

            const button = document.getElementById("like-button");
            const alreadyLiked = button.classList.contains("liked");

            if (alreadyLiked) {
                await supabase
                    .from("world_likes")
                    .delete()
                    .eq("world_id", currentWorld.id)
                    .eq("user_id", currentUser.id);
            } else {
                await supabase
                const { error: likeError } = await supabase
                    .from("world_likes")
                    .insert({
                        world_id: currentWorld.id,
                        user_id: currentUser.id
                    });

                if (!likeError) {
                    await createNotification({
                        recipientId: currentWorld.owner_id,
                        actorId: currentUser.id,
                        worldId: currentWorld.id,
                        type: "world_liked",
                        message: `Someone liked ${currentWorld.title}.`,
                        link: `world.html?id=${encodeURIComponent(currentWorld.id)}`
                    });
                }
            }

            await loadLikes();
        });

        async function loadAdditionControls() {

            const container =
                document.getElementById("addition-actions");

            if (!currentWorld || !currentUser) {
                return;
            }

            if (currentWorld.addition_mode === "locked") {

                container.innerHTML = `
            <p class="empty">
                This world does not allow public additions.
            </p>
        `;

                return;
            }

            if (currentWorld.addition_mode === "open") {

                container.innerHTML = `
            <button class="button">
                Add to This World
            </button>
        `;

                return;
            }

            container.innerHTML = `
        <button class="button">
            Request Contribution Access
        </button>
    `;
        }

        async function loadComments() {

            const container =
                document.getElementById("comments-container");

            const { data } = await supabase
                .from("world_comments")
                .select("*")
                .eq("world_id", currentWorld.id)
                .order("created_at", { ascending: false });

            if (!data || !data.length) {

                container.innerHTML = `
            <p class="empty">
                No comments yet.
            </p>
        `;

                return;
            }

            container.innerHTML = data.map(comment => `
        <div class="panel"
             style="margin-bottom:16px;">

            <p>
                ${escapeHtml(comment.content)}
            </p>

        </div>
    `).join("");
        }

        window.submitComment = async function () {

            const input =
                document.getElementById("comment-input");

            const content =
                input.value.trim();

            if (!content) return;

            await supabase
                .from("world_comments")
                .insert({
                    world_id: currentWorld.id,
                    user_id: currentUser.id,
                    content
                });

            input.value = "";

            loadComments();
        };

        async function loadQuestions() {

            const container =
                document.getElementById("questions-container");

            const { data } = await supabase
                .from("world_questions")
                .select("*")
                .eq("world_id", currentWorld.id)
                .order("created_at", { ascending: false });

            if (!data || !data.length) {

                container.innerHTML = `
            <p class="empty">
                No questions yet.
            </p>
        `;

                return;
            }

            container.innerHTML = data.map(question => `
        <div class="panel"
             style="margin-bottom:16px;">

            <p>
                <strong>Q:</strong>
                ${escapeHtml(question.question)}
            </p>

            ${question.creator_answer ? `
                <p style="margin-top:16px;">
                    <strong>A:</strong>
                    ${escapeHtml(question.creator_answer)}
                </p>
            ` : `
                <p class="empty">
                    Awaiting creator response.
                </p>
            `}
        </div>
    `).join("");
        }

        window.submitQuestion = async function () {

            const input =
                document.getElementById("question-input");

            const question =
                input.value.trim();

            if (!question) return;

            await supabase
                .from("world_questions")
                .insert({
                    world_id: currentWorld.id,
                    user_id: currentUser.id,
                    question
                });

            input.value = "";

            loadQuestions();
        };

        function showNotFound(message) {
            document.getElementById("world-title").textContent = "World not found";
            document.getElementById("world-creator").textContent = "";
            document.getElementById("world-summary").textContent = message;
            document.getElementById("sections-container").innerHTML = "";
            document.getElementById("world-tags").innerHTML =
                `<span class="tag">Not Found</span>`;
            document.getElementById("like-button").style.display = "none";
            document.getElementById("like-count").style.display = "none";
        }

        function escapeHtml(value) {
            return String(value || "")
                .replaceAll("&", "&amp;")
                .replaceAll("<", "&lt;")
                .replaceAll(">", "&gt;")
                .replaceAll('"', "&quot;")
                .replaceAll("'", "&#039;");
        }

        window.logOut = async function () {
            await supabase.auth.signOut();
            window.location.href = "login.html";
        };
    </script>

</body>
</html>
