<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" href="favicon.png">
    <title>World - Nullverse</title>

    <script>
        const savedNullverseTheme =
            localStorage.getItem("nullverse-theme") || "void";

        document.documentElement.setAttribute(
            "data-theme",
            savedNullverseTheme
        );
    </script>

    <link rel="stylesheet" href="theme.css?v=25">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Alegreya:wght@400;500;600;700&family=EB+Garamond:wght@400;500;600;700&family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600;700&family=Libre+Baskerville:wght@400;700&family=Lora:wght@400;500;600;700&family=Merriweather:wght@300;400;700;900&family=Nunito:wght@400;500;600;700;800&family=Open+Sans:wght@400;500;600;700;800&family=Roboto:wght@400;500;700;900&display=swap" rel="stylesheet">

    <style>
        html {
            min-height: 100%;
            background: #000000;
        }

        body {
            margin: 0;
            min-height: 100vh;
            font-family: Arial, sans-serif;
            background: #000;
            background-attachment: fixed;
            color: var(--text-primary);
            transition: background 0.25s ease, color 0.25s ease;
        }

        .world-background-layer {
            position: fixed;
            inset: 0;
            z-index: 0;
            overflow: hidden;
            pointer-events: none;
        }

            .world-background-layer .credit-pill {
                position: fixed;
                pointer-events: auto;
            }

        .section-image-credit-under .credit-pill {
            position: relative;
            left: auto;
            bottom: auto;
        }

        header,
        main {
            position: relative;
            z-index: 2;
        }

        .world-background-image {
            position: absolute;
            inset: 0;
            background-position: center;
            background-size: cover;
            background-repeat: no-repeat;
        }

        .world-background-overlay {
            position: absolute;
            inset: 0;
            background: rgba(0,0,0,.35);
        }

        .world-gradient-layer {
            position: absolute;
            inset: 0;
        }

        header {
            padding: 12px 40px;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(12,12,14,0.72);
            position: sticky;
            top: 0;
            z-index: 100;
            backdrop-filter: blur(18px);
            -webkit-backdrop-filter: blur(18px);
            box-shadow: 0 10px 35px rgba(0,0,0,0.28);
        }

        .logo,
        .logo a {
            display: flex;
            align-items: center;
        }

        .site-logo {
            height: 64px;
            width: auto;
            display: block;
            max-width: none;
        }

        nav {
            display: flex;
            gap: 22px;
            flex-wrap: wrap;
            align-items: center;
        }

            nav a,
            nav button {
                color: var(--text-secondary);
                text-decoration: none;
                background: none;
                border: none;
                cursor: pointer;
                font-family: Arial, sans-serif;
                font-size: 0.95rem;
                transition: .18s ease;
            }

                nav a:hover,
                nav button:hover {
                    color: white;
                }

        main {
            display: flex;
            gap: 28px;
            max-width: 1400px;
            margin: auto;
            padding: 45px 40px 80px;
        }

        .hero {
            position: relative;
            overflow: visible;
            background: var( --hero-background, linear-gradient( 135deg, rgba(255,255,255,0.06), rgba(255,255,255,0.02) ) ), var(--panel-bg);
            border: 1px solid var(--border-color);
            border-radius: 22px;
            padding: 36px;
            margin-bottom: 28px;
            backdrop-filter: blur(18px);
            -webkit-backdrop-filter: blur(18px);
            box-shadow: 0 18px 40px rgba(0,0,0,0.24), 0 0 24px rgba(255,255,255,0.03);
        }

            .hero::before {
                content: "";
                position: absolute;
                inset: 0;
                background-image: var(--hero-image);
                background-size: cover;
                background-position: center;
                opacity: var(--hero-image-opacity,.85);
                z-index: 0;
            }

            .hero::after {
                content: "";
                position: absolute;
                inset: 0;
                background: rgba( 0, 0, 0, var(--hero-overlay,.35) );
                z-index: 1;
            }

            .hero > * {
                position: relative;
                z-index: 2;
            }

        .tag-row {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            margin-bottom: 18px;
        }

        .tag {
            display: inline-block;
            font-size: 0.82rem;
            color: var(--text-secondary);
            border: 1px solid var(--border-color);
            background: rgba(255,255,255,0.04);
            border-radius: 999px;
            padding: 7px 11px;
        }

        h1 {
            color: var(--hero-text-color, var(--text-primary));
        }

        .creator {
            color: var(--hero-text-color, var(--text-muted));
        }

            .creator a {
                color: var(--text-secondary);
                text-decoration: none;
            }

                .creator a:hover {
                    color: white;
                }

        .summary {
            color: var(--hero-text-color, var(--text-secondary));
        }

        .like-row {
            display: flex;
            align-items: center;
            gap: 14px;
            margin-top: 26px;
            flex-wrap: wrap;
        }

        .like-button,
        .button {
            display: inline-block;
            background: var( --world-button-background, linear-gradient(180deg,#2a2a2f,#0d0d10) );
            color: var( --world-button-text, #f5f5f5 );
            border: 1px solid rgba(255,255,255,.12);
            padding: 10px 15px;
            border-radius: 10px;
            cursor: pointer;
            text-decoration: none;
            font-family: Arial,sans-serif;
            transition: .18s ease;
            box-shadow: 0 0 16px rgba(255,255,255,.08), inset 0 1px 0 rgba(255,255,255,.06);
        }

            .like-button:hover,
            .button:hover {
                opacity: .92;
                transform: translateY(-1px);
                border-color: rgba(255,255,255,.18);
            }

            .like-button.liked {
                background: linear-gradient( 180deg, #4a2f37 0%, #2a181d 100% );
            }

        .like-count {
            color: var(--text-muted);
        }

        .section-nav {
            position: relative;
            overflow: hidden;
            height: min(620px, calc(100vh - 124px));
            max-height: calc(100vh - 124px);
            min-height: 360px;
            box-sizing: border-box;
            background: var(--world-index-background, var(--panel-bg));
            color: var(--world-index-text, var(--text-primary));
            border: 1px solid var(--border-color);
            border-radius: 18px;
            padding: 18px;
            padding-bottom: 85px;
            margin-bottom: 26px;
            backdrop-filter: blur(18px);
            -webkit-backdrop-filter: blur(18px);
            box-shadow: 0 14px 34px rgba(0,0,0,0.22), 0 0 24px rgba(255,255,255,0.03);
        }

            .section-nav::before {
                content: "";
                position: absolute;
                inset: 0;
                background-image: var(--world-index-image);
                background-size: cover;
                background-position: center;
                opacity: var(--world-index-opacity, .85);
                z-index: 0;
            }

            .section-nav::after {
                content: "";
                position: absolute;
                inset: 0;
                background: rgba(0,0,0,var(--world-index-overlay,.35));
                z-index: 1;
            }

            .section-nav > * {
                position: relative;
                z-index: 2;
            }

        .index-header h2 {
            margin: 0;
            font-size: 1.15rem;
        }

        .index-header p {
            margin: 6px 0 18px;
            color: var(--world-index-text, var(--text-muted));
            font-size: .88rem;
        }

        .section-search {
            width: 100%;
            box-sizing: border-box;
            padding: 12px 14px;
            border-radius: 12px;
            border: 1px solid rgba(255,255,255,0.16);
            background: rgba(0,0,0,0.28);
            color: var(--world-index-text, white);
            margin-bottom: 14px;
            transition: .18s ease;
        }

            .section-search:focus {
                outline: none;
                border-color: rgba(255,255,255,0.16);
                box-shadow: 0 0 16px rgba(255,255,255,0.05);
            }

        .section-filters {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            max-height: 96px;
            overflow-y: auto;
            overflow-x: hidden;
            padding-right: 4px;
            margin-bottom: 16px;
            overscroll-behavior: contain;
            scrollbar-width: thin;
        }

            .section-filters::-webkit-scrollbar {
                width: 7px;
            }

            .section-filters::-webkit-scrollbar-track {
                background: rgba(255,255,255,.035);
                border-radius: 999px;
            }

            .section-filters::-webkit-scrollbar-thumb {
                background: rgba(255,255,255,.18);
                border-radius: 999px;
            }

        .filter-chip {
            background: var(--world-index-button-background, rgba(0,0,0,0.24));
            border: 1px solid rgba(255,255,255,0.14);
            padding: 7px 10px;
            border-radius: 999px;
            cursor: pointer;
            font-size: .8rem;
            color: var(--world-index-button-text, var(--world-index-text));
            transition: .18s ease;
        }

            .filter-chip.active,
            .filter-chip:hover {
                background: rgba(255,255,255,0.14);
                color: var(--world-index-text, white);
                border-color: rgba(255,255,255,0.26);
                box-shadow: 0 0 18px rgba(255,255,255,0.10);
            }

        .section-count {
            color: var(--world-index-text, var(--text-muted));
            font-size: .82rem;
            margin-bottom: 16px;
        }

        .left-sidebar {
            width: 280px;
            flex-shrink: 0;
            position: sticky;
            top: 110px;
            height: fit-content;
        }

        .content-column {
            flex: 1;
            min-width: 0;
        }

        #section-nav-links {
            display: flex;
            flex-direction: column;
            gap: 10px;
            max-height: clamp(210px, calc(100vh - 420px), 410px);
            overflow-y: auto;
            overflow-x: hidden;
            padding-right: 6px;
            overscroll-behavior: contain;
            scrollbar-width: thin;
        }

            #section-nav-links::-webkit-scrollbar {
                width: 8px;
            }

            #section-nav-links::-webkit-scrollbar-track {
                background: rgba(255,255,255,.035);
                border-radius: 999px;
            }

            #section-nav-links::-webkit-scrollbar-thumb {
                background: rgba(255,255,255,.20);
                border-radius: 999px;
            }

        .section-nav a {
            display: block;
            padding: 13px 14px;
            border-radius: 14px;
            background: var(--world-index-button-background, rgba(0,0,0,0.18));
            border: 1px solid rgba(255,255,255,0.08);
            color: var(--world-index-button-text, var(--world-index-text));
            text-decoration: none;
            transition: .18s ease;
        }

            .section-nav a:hover {
                background: var( --world-index-button-background, rgba(255,255,255,0.12) );
                transform: translateX(4px);
                color: var(--world-index-text, white);
                border-color: rgba(255,255,255,0.18);
            }

            .section-nav a.active {
                border-color: rgba(255,255,255,0.26);
                background: rgba(255,255,255,0.16);
            }

            .section-nav a span {
                display: block;
                font-weight: 600;
            }

            .section-nav a small {
                display: block;
                margin-top: 5px;
                color: var( --world-index-button-text, var(--world-index-text) );
                font-size: .78rem;
            }

        .world-section {
            position: relative;
            overflow: hidden;
            background: var( --section-card-background, linear-gradient(180deg, rgba(255,255,255,.04), rgba(255,255,255,.012)) ), var(--card-bg);
            color: var(--section-card-text, var(--text-primary));
            border: 1px solid var(--border-color);
            border-radius: 18px;
            padding: 30px;
            margin-bottom: 24px;
            box-shadow: 0 14px 34px rgba(0,0,0,0.20);
            transition: .18s ease;
        }

            .world-section::before {
                content: "";
                position: absolute;
                inset: 0;
                background-image: var(--section-card-image);
                background-size: cover;
                background-position: center;
                opacity: var(--section-card-image-opacity, .85);
                z-index: 0;
            }

            .world-section::after {
                content: "";
                position: absolute;
                inset: 0;
                background: rgba(0,0,0,var(--section-card-overlay,.35));
                z-index: 1;
            }

            .world-section > * {
                position: relative;
                z-index: 2;
            }

            .world-section:hover {
                border-color: rgba(255,255,255,0.10);
                box-shadow: 0 18px 40px rgba(0,0,0,0.24), 0 0 24px rgba(255,255,255,0.03);
            }

            .world-section h2 {
                margin: 0 0 10px;
                font-size: 2rem;
            }

        .section-type {
            color: var(--section-card-text, var(--text-muted));
            margin-bottom: 18px;
            font-size: 0.95rem;
        }

        .section-content {
            color: var(--section-card-text, var(--text-primary));
            line-height: 1.9;
            overflow-wrap: break-word;
        }

            .section-content.rich-section-content {
                white-space: normal;
                font-family: Georgia, "Times New Roman", Times, serif;
                font-size: 18px;
                line-height: 1.75;
            }

                .section-content.rich-section-content p,
                .section-content.rich-section-content div {
                    margin: 0 0 1em;
                }

                    .section-content.rich-section-content p:last-child,
                    .section-content.rich-section-content div:last-child {
                        margin-bottom: 0;
                    }

                .section-content.rich-section-content h1,
                .section-content.rich-section-content h2,
                .section-content.rich-section-content h3,
                .section-content.rich-section-content h4 {
                    color: inherit;
                    line-height: 1.2;
                    margin: 1.2em 0 .45em;
                }

                .section-content.rich-section-content h1 {
                    font-size: 2.4rem;
                }

                .section-content.rich-section-content h2 {
                    font-size: 2rem;
                }

                .section-content.rich-section-content h3 {
                    font-size: 1.55rem;
                }

                .section-content.rich-section-content h4 {
                    font-size: 1.25rem;
                }

                .section-content.rich-section-content ul,
                .section-content.rich-section-content ol {
                    margin: 0 0 1em 1.35em;
                    padding-left: 1.15em;
                }

                .section-content.rich-section-content li {
                    margin: .35em 0;
                }

                .section-content.rich-section-content blockquote {
                    margin: 1.2em 0;
                    padding: 12px 18px;
                    border-left: 4px solid currentColor;
                    background: rgba(255,255,255,.06);
                    color: inherit;
                    opacity: .95;
                }

                .section-content.rich-section-content hr {
                    border: 0;
                    border-top: 1px solid currentColor;
                    opacity: .22;
                    margin: 28px 0;
                }

                .section-content.rich-section-content a {
                    color: inherit;
                    text-decoration: underline;
                    text-underline-offset: 3px;
                }

                .section-content.rich-section-content mark,
                .section-content.rich-section-content [style*="background-color"] {
                    border-radius: .18em;
                    box-decoration-break: clone;
                    -webkit-box-decoration-break: clone;
                }

                .section-content.rich-section-content,
                .section-content.rich-section-content * {
                    font-synthesis-weight: auto;
                    font-synthesis-style: auto;
                }

                    .section-content.rich-section-content [data-nv-world-rich-run="true"] {
                        white-space: pre-wrap;
                    }

                    .section-content.rich-section-content [data-nv-world-rich-block="true"] {
                        color: inherit;
                    }

        main.content-warning-screen {
            display: flex;
            align-items: center;
            justify-content: center;
            max-width: none;
            min-height: calc(100vh - 90px);
            padding: 42px 20px 80px;
            box-sizing: border-box;
        }

        .content-warning-panel {
            width: min(560px, calc(100vw - 40px));
            max-width: 560px;
            margin: 0 auto;
            background: radial-gradient(circle at 18% 10%, rgba(255,255,255,.10), transparent 30%), linear-gradient(135deg, rgba(255,255,255,.075), rgba(255,255,255,.024)), var(--panel-bg);
            border: 1px solid rgba(255,214,102,.28);
            border-radius: 26px;
            padding: 34px;
            box-shadow: 0 24px 70px rgba(0,0,0,0.46), inset 0 1px 0 rgba(255,255,255,.05);
        }

            .content-warning-panel h1 {
                margin-top: 0;
                margin-bottom: 12px;
                letter-spacing: -.02em;
            }

        .content-warning-actions {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            margin-top: 24px;
        }

        @media (max-width: 700px) {
            main.content-warning-screen {
                min-height: calc(100vh - 150px);
                padding: 30px 16px 70px;
            }

            .content-warning-panel {
                width: 100%;
                padding: 24px;
                border-radius: 22px;
            }

            .content-warning-actions .button {
                width: 100%;
                box-sizing: border-box;
                text-align: center;
            }
        }

        .warning-list {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin: 18px 0 24px;
        }

        .warning-pill {
            border: 1px solid rgba(255,214,102,.32);
            background: rgba(255,214,102,.10);
            color: #ffe6a3;
            border-radius: 999px;
            padding: 7px 11px;
        }

        .empty {
            color: var(--text-muted);
            line-height: 1.6;
        }

        .owner-actions {
            margin-top: 22px;
        }

        .notification-link {
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }

        .notification-badge {
            min-width: 18px;
            height: 18px;
            padding: 0 6px;
            border-radius: 999px;
            background: white;
            color: black;
            font-size: 0.72rem;
            align-items: center;
            justify-content: center;
            line-height: 1;
        }

        .credit-pill {
            position: absolute;
            left: 14px;
            bottom: 14px;
            z-index: 6;
            display: inline-flex;
            align-items: center;
            max-width: calc(100% - 28px);
            padding: 7px 11px;
            border-radius: 999px;
            border: 1px solid rgba(255,255,255,.16);
            background: rgba(0,0,0,.58);
            color: white;
            font-size: .78rem;
            text-decoration: none;
            backdrop-filter: blur(14px);
            -webkit-backdrop-filter: blur(14px);
            white-space: nowrap;
        }

            .credit-pill:hover {
                background: rgba(0,0,0,.75);
            }

        .credit-tooltip {
            position: absolute;
            left: 0;
            bottom: calc(100% + 8px);
            width: 240px;
            padding: 10px 12px;
            border-radius: 12px;
            background: rgba(0,0,0,.9);
            border: 1px solid rgba(255,255,255,.16);
            color: var(--text-secondary);
            font-size: .78rem;
            line-height: 1.45;
            opacity: 0;
            visibility: hidden;
            pointer-events: none;
            white-space: normal;
            box-shadow: 0 12px 28px rgba(0,0,0,.35);
        }

        .credit-pill:hover .credit-tooltip {
            opacity: 1;
            visibility: visible;
        }

        .credit-pill.show-tooltip .credit-tooltip {
            opacity: 1;
            visibility: visible;
        }

        .hero {
            padding-bottom: 70px;
        }

        .section-nav {
            padding-bottom: 85px;
        }

        .world-section {
            padding-bottom: 68px;
        }

        .section-image-credit-under {
            position: relative;
            display: inline-block;
            margin: -12px 0 20px;
        }

            .section-image-credit-under .credit-pill {
                position: relative;
                left: auto;
                bottom: auto;
            }

        @media (max-width: 800px) {
            header {
                flex-direction: column;
                gap: 14px;
                padding: 20px;
            }

            nav {
                justify-content: center;
            }

            main {
                flex-direction: column;
                padding: 30px 24px 70px;
            }

            .left-sidebar {
                width: 100%;
                position: static;
            }

            h1 {
                font-size: 2.2rem;
            }

            .hero {
                padding: 24px;
                padding-bottom: 90px;
            }

            .like-row {
                align-items: flex-start;
                flex-wrap: wrap;
            }

            .section-nav {
                height: min(560px, calc(100vh - 132px));
                max-height: calc(100vh - 132px);
                min-height: 330px;
                padding-bottom: 95px;
            }

            #section-nav-links {
                max-height: clamp(185px, calc(100vh - 438px), 350px);
            }
        }


        /* Saved Image Placement Rendering */
        .placed-image-stage {
            position: absolute;
            inset: 0;
            z-index: 0;
            overflow: hidden;
            border-radius: inherit;
            pointer-events: none;
        }

            .placed-image-stage img {
                position: absolute;
                inset: 0;
                width: 100%;
                height: 100%;
                object-fit: cover;
                transform-origin: center center;
                will-change: transform;
            }

        .hero .placed-image-stage {
            z-index: 0;
        }

        .section-nav .placed-image-stage,
        .world-section .placed-image-stage {
            z-index: 0;
        }

        .section-image-stage {
            position: relative;
            overflow: hidden;
            border-radius: 16px;
            margin-bottom: 20px;
            background: rgba(255,255,255,.04);
        }

            .section-image-stage img {
                position: absolute;
                inset: 0;
                width: 100%;
                height: 100%;
                object-fit: cover;
                transform-origin: center center;
            }

            .section-image-stage.section-image-zoomable {
                cursor: zoom-in;
            }

                .section-image-stage.section-image-zoomable img {
                    cursor: zoom-in;
                    transition: transform .18s ease, filter .18s ease;
                }

                .section-image-stage.section-image-zoomable:hover img {
                    filter: brightness(1.08);
                }

        body.section-image-lightbox-open {
            overflow: hidden;
        }

        .section-image-lightbox {
            display: none;
            position: fixed;
            inset: 0;
            z-index: 2147482600;
            justify-content: center;
            align-items: center;
            padding: 76px 24px 34px;
            box-sizing: border-box;
            background: rgba(0,0,0,.86);
            backdrop-filter: blur(14px);
            -webkit-backdrop-filter: blur(14px);
        }

            .section-image-lightbox.open {
                display: flex;
            }

        .section-image-lightbox-side {
            position: absolute;
            top: 0;
            bottom: 0;
            width: min(22vw, 220px);
            z-index: 1;
            cursor: zoom-out;

        const currentUser = await requireBetaAccess();

        document.addEventListener("click", (e) => {
            const pill = e.target.closest(".credit-pill");

            document.querySelectorAll(".credit-pill").forEach(p => {

        document.addEventListener("keydown", event => {
            if (event.key === "Escape") {

        function setupWorldSectionImageLightbox(container) {
            if (!container) {
                return;
            }

            container.querySelectorAll(".section-image-zoomable").forEach(stage => {
                if (stage.dataset.sectionImageLightboxReady === "true") {
                    return;
                }

                stage.dataset.sectionImageLightboxReady = "true";

                stage.addEventListener("click", () => {
                    openSectionImageLightbox(
                        stage.dataset.sectionImageSrc || "",
                        stage.dataset.sectionImageAlt || "Section image"

                stage.addEventListener("keydown", event => {
                    if (event.key !== "Enter" && event.key !== " ") {

        window.openSectionImageLightbox = function (imageUrl, altText = "Section image") {
            if (!imageUrl) {

            const lightbox = document.getElementById("section-image-lightbox");

            if (!lightbox || !image) {

            const lightbox = document.getElementById("section-image-lightbox");

        async function areUsersBlocked(userA, userB) {
            const { data, error } = await supabase
                .from("user_blocks")
                .select("id, blocker_id, blocked_id")
                .in("blocker_id", [userA, userB])
                .in("blocked_id", [userA, userB])
                .limit(1);

            if (error) {
                console.error("Block check error:", error);
                return false;
            }

            return data && data.length > 0;
        }

        async function loadViewerContentPreferences() {
            const { data: profile, error } = await supabase
                .from("profiles")
                .select("content_experience, blocked_content_warnings, age_role")
                .eq("id", currentUser.id)
                .single();

            if (error || !profile) {
                console.warn("Content preference load skipped:", error?.message || "No profile found.");
                return;
            }

            ageRole = normalizeAgeRole(profile.age_role);
            contentExperience = normalizeContentExperience(profile.content_experience);
            blockedContentWarnings = normalizeWarningList(profile.blocked_content_warnings);

            if (ageRole === "minor") {
                contentExperience = "safe";
            }
        }

        function normalizeContentExperience(value) {
            const normalized = String(value || "")
                .trim()
                .toLowerCase()
                .replace(/\s+/g, "_");

            if (["safe", "strict"].includes(normalized)) return "safe";
            if (["open", "adult", "all", "unfiltered", "full"].includes(normalized)) return "open";
            return "balanced";
        }

        function normalizeWarningKey(value) {
            return String(value || "")
                .trim()
                .toLowerCase()
                .replace(/\s+/g, "_")
                .replace(/-+/g, "_")
                .replace(/[^a-z0-9_]/g, "")
                .replace(/_+/g, "_")
                .replace(/^_+|_+$/g, "");
        }

        function normalizeWarningList(value) {
            let list = value;

            if (typeof list === "string") {
                const raw = list.trim();

                if (!raw) {
                    list = [];
                } else {
                    try {
                        list = JSON.parse(raw);
                    } catch {
                        if (raw.startsWith("{") && raw.endsWith("}")) {
                            list = raw
                                .slice(1, -1)
                                .split(",")
                                .map(item => item.replace(/^"|"$/g, ""));
                        } else {
                            list = raw.split(",");
                        }
                    }
                }
            }

            return [...new Set(
                (Array.isArray(list) ? list : [])
                    .map(normalizeWarningKey)
                    .filter(Boolean)
            )];
        }

        function normalizeAgeRole(value) {
            const normalized = String(value || "unknown").trim().toLowerCase();
            return normalized || "unknown";
        }

        function normalizeContentRating(value) {
            const normalized = String(value || "general").trim().toLowerCase();
            return ["general", "teen", "mature", "adult"].includes(normalized) ? normalized : "general";
        }

        function getWorldSafetyInfo(world) {
            const warnings = normalizeWarningList(world?.content_warnings);
            const rating = normalizeContentRating(world?.content_rating);
            const blockedWarningSet = new Set(normalizeWarningList(blockedContentWarnings));
            const hasHardBlockedWarning = warnings.some(warning => blockedWarningSet.has(warning));
            const hasContentWarning = warnings.length > 0;
            const isMature = rating === "mature";
            const isAdult = rating === "adult";

            return {
                warnings,
                rating,
                hasHardBlockedWarning,
                hasContentWarning,
                isMature,
                isAdult
            };
        }

        function shouldBlockWorld(world) {
            const info = getWorldSafetyInfo(world);

            if (ageRole === "minor") {
                return info.isAdult || info.isMature || info.hasContentWarning;
            }

            if (info.hasHardBlockedWarning) {
                return true;
            }

            if (contentExperience === "open") {
                return false;
            }

            if (contentExperience === "safe") {
                return info.isAdult || info.isMature || info.hasContentWarning;
            }

            return false;
        }

        function shouldWarnWorld(world) {
            const info = getWorldSafetyInfo(world);

            if (contentExperience !== "balanced") {
                return false;
            }

            if (ageRole === "minor") {
                return false;
            }

            if (info.hasHardBlockedWarning) {
                return false;
            }

            return info.isAdult || info.isMature || info.hasContentWarning;
        }

        async function loadWorld(id) {
            const { data: world, error } = await supabase
                .from("worlds")
                .select("*")
                .eq("id", id)
                .eq("visibility", "published")
                .single();

            if (error || !world) {
                showNotFound("This world does not exist or is not published.");
                return;
            }



            currentWorld = world;

            const ownerAccess =
                currentUser &&
                currentUser.id === world.owner_id;

            if (!ownerAccess && shouldBlockWorld(world)) {
                showContentBlocked(world);
                return;
            }

            const warningAccepted =
                params.get("contentOk") === world.id;

            if (!ownerAccess && shouldWarnWorld(world) && !warningAccepted) {
                pendingWarningWorld = world;
                showContentWarning(world);
                return;
            }

            await renderLoadedWorld(world);

        }

        async function renderLoadedWorld(world) {
            applyWorldTheme(world);

            const blocked = await areUsersBlocked(
                currentUser.id,
                world.owner_id
            );

            if (blocked) {
                showNotFound("This world is unavailable.");
                return;
            }

            const ownerAccess =
                currentUser &&
                currentUser.id === world.owner_id;

            if (
                world.moderation_status === "hidden" &&
                !ownerAccess &&
                !canModerateWorlds(currentPermissions)
            ) {
                showNotFound("This world has been hidden by Nullverse staff.");
                return;
            }

            const { data: profile } = await supabase
                .from("profiles")
                .select("id, username, display_name, role, role_name")
                .eq("id", world.owner_id)
                .single();

            currentWorld.ownerProfile = profile;

            document
                .getElementById("world-background-layer")
                .insertAdjacentHTML(
                    "beforeend",
                    buildCreditPill({
                        type: world.background_credit_type,
                        name: world.background_credit_name,
                        username: world.background_credit_nullverse_username,
                        url: world.background_credit_url,
                        note: world.background_credit_note,
                        ownerUsername: world.ownerProfile?.username,
                        context: "Background Image"
                    })
                );

            document.title = `${world.title || "World"} - Nullverse`;

            document.getElementById("world-title").textContent =
                world.title || "Untitled World";

            document.getElementById("world-summary").textContent =
                world.summary || "No summary provided.";



            if (profile) {
                document.getElementById("world-creator").innerHTML =
                    `by <a href="profile.html?user=${encodeURIComponent(profile.username)}">${escapeHtml(profile.display_name || profile.username)} (@${escapeHtml(profile.username)})</a>`;
            } else {
                document.getElementById("world-creator").textContent =
                    "by Unknown Creator";
            }

            renderTags(world);

            document.querySelector(".hero").insertAdjacentHTML(
                "afterbegin",
                buildPlacedImageStage(world.theme_overview_card_image_url, world.theme_overview_card_image_placement, "hero-placed-image")
            );

            document.querySelector(".hero").insertAdjacentHTML(
                "beforeend",
                buildCreditPill({
                    type: world.overview_card_credit_type,
                    name: world.overview_card_credit_name,
                    username: world.overview_card_credit_nullverse_username,
                    url: world.overview_card_credit_url,
                    note: world.overview_card_credit_note,
                    ownerUsername: profile?.username,
                    context: "Overview Image"
                })
            );

            renderOwnerActions(world);

            try {
                await loadLikes();
            } catch (error) {
                console.error("World likes load error:", error);
            }

            await loadSections(world.id);

            document.getElementById("comments-link").href =
                `world-comments.html?id=${encodeURIComponent(world.id)}`;

            document.getElementById("qa-link").href =
                `world-qa.html?id=${encodeURIComponent(world.id)}`;

            document.getElementById("community-link").href =
                `world-additions.html?id=${encodeURIComponent(world.id)}`;
        }




        function normalizeImagePlacement(value) {
            let parsed = value;

            if (typeof parsed === "string") {
                try {
                    parsed = JSON.parse(parsed);
                } catch {
                    parsed = null;
                }
            }

            return {
                x: 0,
                y: 0,
                scale: 1,
                rotation: 0,
                fit: "cover",
                ...(parsed && typeof parsed === "object" ? parsed : {})
            };
        }

        function buildPlacedImageStage(url, placement, className = "") {
            if (!url) {
                return "";
            }

            const safe = normalizeImagePlacement(placement);

            return `
                                                                                    <div class="placed-image-stage ${escapeHtml(className)}">
                                                                                        <img
                                                                                            src="${escapeHtml(url)}"
                                                                                            alt=""
                                                                                            style="
                                                                                                object-fit:${escapeHtml(safe.fit || "cover")};
                                                                                                transform:translate(${Number(safe.x) || 0}px, ${Number(safe.y) || 0}px) rotate(${Number(safe.rotation) || 0}deg) scale(${Number(safe.scale) || 1});
                                                                                            ">
                                                                                    </div>
                                                                                `;
        }

        function getSectionImageStage(section) {
            if (!section.image_url) {
                return "";
            }

            const isFull = section.image_position === "full";
            const width = isFull ? "100%" : "320px";
            const height = isFull ? "360px" : "260px";
            const safe = normalizeImagePlacement(section.image_placement);

            return `
                                                                                    <div
                                                                                        class="section-image-stage section-image-zoomable"
                                                                                        role="button"
                                                                                        tabindex="0"
                                                                                        aria-label="Open section image"
                                                                                        data-section-image-src="${escapeHtml(section.image_url)}"
                                                                                        data-section-image-alt="${escapeHtml(section.title || "Section image")}"
                                                                                        style="
                                                                                            width:${width};
                                                                                            max-width:100%;
                                                                                            height:${height};
                                                                                            display:block;
                                                                                            float:${section.image_position === "left" ? "left" : section.image_position === "right" ? "right" : "none"};
                                                                                            margin-right:${section.image_position === "left" ? "22px" : "0"};
                                                                                            margin-left:${section.image_position === "right" ? "22px" : "0"};
                                                                                        ">
                                                                                        <img
                                                                                            src="${escapeHtml(section.image_url)}"
                                                                                            alt=""
                                                                                            style="
                                                                                                object-fit:${escapeHtml(safe.fit || "cover")};
                                                                                                transform:translate(${Number(safe.x) || 0}px, ${Number(safe.y) || 0}px) rotate(${Number(safe.rotation) || 0}deg) scale(${Number(safe.scale) || 1});
                                                                                            ">
                                                                                    </div>
                                                                                `;
        }

        function applyWorldTheme(world) {

            const root = document.documentElement;

            const accent = "#e8e8ef";
            const background = "#000000";
            const panel = "var(--panel-bg)";
            const text = "#f5f5f5";


            let buttonBackground =
                "linear-gradient(180deg,#2a2a2f,#0d0d10)";

            if (
                world.theme_button_style ===
                "solid"
            ) {
                buttonBackground =
                    world.theme_button_color_1;
            }

            if (
                world.theme_button_style ===
                "gradient"
            ) {
                buttonBackground =
                    `linear-gradient(
                                                                                        180deg,
                                                                                        ${world.theme_button_color_1},
                                                                                        ${world.theme_button_color_2}
                                                                                    )`;
            }

            root.style.setProperty(
                "--world-button-background",
                buttonBackground
            );

            root.style.setProperty(
                "--world-button-text",
                world.theme_button_text_color ||
                "#f5f5f5"
            );




            root.style.setProperty(
                "--world-background",
                background
            );

        function hexToRgb(hex, alpha = 1) {

            if (!hex) return `rgba(255,255,255,${alpha})`;

            const cleaned =
                hex.replace("#", "");

            const bigint =
                parseInt(cleaned, 16);

            const r =
                (bigint >> 16) & 255;

            const g =
                (bigint >> 8) & 255;

            const b =
                bigint & 255;

            return `rgba(${r}, ${g}, ${b}, ${alpha})`;
        }

        function sortWorldSectionsForDisplay(sections) {
            return [...(sections || [])].sort((a, b) => {
                const aOrder = Number(a?.display_order);
                const bOrder = Number(b?.display_order);
                const aHasOrder = Number.isFinite(aOrder);
                const bHasOrder = Number.isFinite(bOrder);

                if (aHasOrder && bHasOrder && aOrder !== bOrder) {
                    return aOrder - bOrder;
                }

                if (aHasOrder && !bHasOrder) {
                    return -1;
                }

                if (!aHasOrder && bHasOrder) {
                    return 1;
                }

                const aDate = new Date(a?.created_at || 0).getTime();
                const bDate = new Date(b?.created_at || 0).getTime();

                if (Number.isFinite(aDate) && Number.isFinite(bDate)) {
                    return aDate - bDate;
                }

                return 0;
            });
        }

                    if (snapshotText.trim()) {

                }

                const holder = document.createElement("div");
                holder.innerHTML = sanitizeWorldSectionHtml(removeWorldRichTextSnapshotComment(raw));
                return holder.textContent || holder.innerText || raw;
            } catch (error) {

                return removeWorldRichTextSnapshotComment(raw)
                    .replace(/<script[\s\S]*?<\/script>/gi, " ")

            function decodeSectionSearchEntities(value) {
                const textarea = document.createElement("textarea");
                textarea.innerHTML = String(value || "");

            function normalizeSectionIndexSearch(value) {
                return decodeSectionSearchEntities(value)
                    .normalize("NFD")
                    .replace(/[\u0300-\u036f]/g, "")
                    .toLowerCase()
                    .replace(/&/g, " and ")
                    .replace(/['’‘"`´]/g, "")
                    .replace(/[^a-z0-9]+/g, " ")
                    .replace(/\s+/g, " ")
                    .trim();
            }

            function compactSectionIndexSearch(value) {
                return normalizeSectionIndexSearch(value).replace(/\s+/g, "");
            }

            function tokenizeSectionIndexSearch(value) {
                return normalizeSectionIndexSearch(value)
                    .split(" ")
                    .map(token => token.trim())
                    .filter(Boolean);
            }

            function safeSectionPlainText(value) {

                    return getWorldSearchableSectionText(value || "");

            function getSectionTitleForSearch(section) {

            function buildSectionIndexSearchField(label, value, weight, includeForNumeric = true) {
                const raw = String(value || "");
                const normalized = normalizeSectionIndexSearch(raw);
                const compact = normalized.replace(/\s+/g, "");
                const tokens = normalized
                    .split(" ")
                    .map(token => token.trim())
                    .filter(Boolean);

                return {
                    label,
                    raw,
                    normalized,
                    compact,
                    tokens,
                    weight,
                    includeForNumeric
                };
            }

            function buildSectionIndexSearchRecord(section, index) {
                const sectionNumber = index + 1;
                const sectionNumberText = String(sectionNumber);
                const title = getSectionTitleForSearch(section);
                const type = getSectionTypeForSearch(section);
                const subtitle = getSectionSubtitleForSearch(section);
                const bodyText = safeSectionPlainText(section?.content || section?.body || "");
                const tags = [
                    section?.tags,
                    section?.genres,
                    section?.themes,
                    section?.keywords,
                    section?.search_keywords
                ]
                    .filter(Boolean)
                    .join(" ");

                const numberAliases = [
                    sectionNumberText,
                    `section ${sectionNumber}`,
                    `sec ${sectionNumber}`,
                    `s ${sectionNumber}`,
                    `#${sectionNumber}`,
                    `section ${sectionNumberText.padStart(2, "0")}`,
                    `sec ${sectionNumberText.padStart(2, "0")}`,
                    `s ${sectionNumberText.padStart(2, "0")}`
                ];

                const fields = [
                    buildSectionIndexSearchField("number", numberAliases.join(" "), 130, true),
                    buildSectionIndexSearchField("title", title, 115, true),
                    buildSectionIndexSearchField("type", type, 92, true),
                    buildSectionIndexSearchField("subtitle", subtitle, 74, true),
                    buildSectionIndexSearchField("tags", tags, 58, true),
                    buildSectionIndexSearchField("body", bodyText, 22, false)
                ].filter(field => field.normalized || field.compact);

                const allNormalized = fields
                    .map(field => field.normalized)
                    .filter(Boolean)
                    .join(" ");

                const allCompact = allNormalized.replace(/\s+/g, "");

                const tokens = [...new Set(
                    fields.flatMap(field => field.tokens)
                )];

                const titleInitials = normalizeSectionIndexSearch(title)
                    .split(" ")
                    .map(word => word[0] || "")
                    .join("");

                const typeInitials = normalizeSectionIndexSearch(type)
                    .split(" ")
                    .map(word => word[0] || "")
                    .join("");

                return {
                    index,
                    sectionNumber,
                    sectionNumberText,
                    fields,
                    allNormalized,
                    allCompact,
                    tokens,
                    titleInitials,
                    typeInitials
                };
            }

            function getSectionIndexSearchRecord(section, index) {
                const cacheKey = [
                    section?.id || index,
                    section?.updated_at || "",
                    section?.title || "",
                    section?.section_type || "",
                    section?.subtitle || "",
                    section?.description || "",
                    section?.summary || "",
                    section?.content || section?.body || ""
                ].join("::");

                if (!sectionSearchCache.has(cacheKey)) {
                    sectionSearchCache.set(
                        cacheKey,
                        buildSectionIndexSearchRecord(section || {}, index)
                    );
                }

                return sectionSearchCache.get(cacheKey);
            }

            function levenshteinDistance(a, b) {
                a = String(a || "");
                b = String(b || "");

                if (a === b) return 0;
                if (!a.length) return b.length;
                if (!b.length) return a.length;

                const previous = Array.from({ length: b.length + 1 }, (_, index) => index);
                const current = new Array(b.length + 1);

                for (let i = 1; i <= a.length; i++) {
                    current[0] = i;

                    for (let j = 1; j <= b.length; j++) {
                        const cost = a[i - 1] === b[j - 1] ? 0 : 1;

                        current[j] = Math.min(
                            previous[j] + 1,
                            current[j - 1] + 1,
                            previous[j - 1] + cost
                        );
                    }

                    for (let j = 0; j <= b.length; j++) {
                        previous[j] = current[j];
                    }
                }

                return previous[b.length];
            }

            function isSectionSearchSubsequence(needle, haystack) {
                needle = String(needle || "");
                haystack = String(haystack || "");

                if (needle.length < 4 || haystack.length < needle.length) {
                    return false;
                }

                let needleIndex = 0;

                for (const character of haystack) {
                    if (character === needle[needleIndex]) {
                        needleIndex++;
                    }

                    if (needleIndex >= needle.length) {
                        return true;
                    }
                }

                return false;
            }

            function scoreSectionSearchToken(queryToken, searchableToken) {
                if (!queryToken || !searchableToken) {
                    return 0;
                }

                if (/^\d+$/.test(queryToken)) {
                    return searchableToken.includes(queryToken) ? 100 : 0;
                }

                if (searchableToken === queryToken) {
                    return 100;
                }

                if (searchableToken.startsWith(queryToken)) {
                    return 82;
                }

                if (searchableToken.includes(queryToken)) {
                    return 68;
                }

                if (queryToken.length >= 3 && searchableToken.includes(queryToken.slice(0, -1))) {
                    return 48;
                }

                if (queryToken.length >= 4 && searchableToken.length >= 4) {
                    const distance = levenshteinDistance(queryToken, searchableToken);
                    const allowedDistance = queryToken.length >= 7 ? 2 : 1;

                    if (distance <= allowedDistance) {
                        return 42 - (distance * 10);
                    }

                    if (isSectionSearchSubsequence(queryToken, searchableToken)) {
                        return 28;
                    }
                }

                return 0;
            }

            function scoreSectionSearchField(field, normalizedQuery, compactQuery, queryTokens, numericOnly) {
                if (!field || (!field.normalized && !field.compact)) {
                    return 0;
                }

                if (numericOnly && !field.includeForNumeric) {
                    return 0;
                }

                let score = 0;

                if (normalizedQuery && field.normalized === normalizedQuery) {
                    score += field.weight * 5;
                } else if (normalizedQuery && field.normalized.startsWith(normalizedQuery)) {
                    score += field.weight * 4;
                } else if (normalizedQuery && field.normalized.includes(normalizedQuery)) {
                    score += field.weight * 3;
                }

                if (
                    compactQuery &&
                    compactQuery.length >= 2 &&
                    field.compact &&
                    field.compact.includes(compactQuery)
                ) {
                    score += field.weight * 2;
                }

                for (const queryToken of queryTokens) {
                    let bestTokenScore = 0;

                    for (const searchableToken of field.tokens) {
                        bestTokenScore = Math.max(
                            bestTokenScore,
                            scoreSectionSearchToken(queryToken, searchableToken)
                        );
                    }

                    if (bestTokenScore > 0) {
                        score += Math.round((bestTokenScore / 100) * field.weight);
                    }
                }

                return score;
            }

            function scoreSectionIndexRecord(record, query) {
                const normalizedQuery = normalizeSectionIndexSearch(query);
                const compactQuery = compactSectionIndexSearch(query);
                const queryTokens = tokenizeSectionIndexSearch(query);
                const numericOnly = !!compactQuery && /^\d+$/.test(compactQuery);
                const shortLetterQuery =
                    !numericOnly &&
                    compactQuery.length > 0 &&
                    compactQuery.length < 3;

                if (!normalizedQuery && !compactQuery && !queryTokens.length) {
                    return 1;
                }

                if (numericOnly) {
                    let numericScore = 0;

                    if (record.sectionNumberText.includes(compactQuery)) {
                        numericScore += 1000;
                    }

                    for (const field of record.fields) {
                        if (!field.includeForNumeric) {
                            continue;
                        }

                        if (field.normalized.includes(compactQuery) || field.compact.includes(compactQuery)) {
                            numericScore += scoreSectionSearchField(
                                field,
                                normalizedQuery,
                                compactQuery,
                                queryTokens,
                                true
                            );
                        }
                    }

                    return numericScore;
                }

                const activeFields = shortLetterQuery
                    ? record.fields.filter(field => field.label !== "body")
                    : record.fields;

                const activeNormalized = activeFields
                    .map(field => field.normalized)
                    .filter(Boolean)
                    .join(" ");

                const activeCompact = activeNormalized.replace(/\s+/g, "");

                const activeTokens = [...new Set(
                    activeFields.flatMap(field => field.tokens)
                )];

                let score = 0;
                let phraseMatched = false;

                if (normalizedQuery && activeNormalized.includes(normalizedQuery)) {
                    phraseMatched = true;
                    score += 120;
                }

                if (
                    compactQuery &&
                    compactQuery.length >= 2 &&
                    activeCompact.includes(compactQuery)
                ) {
                    phraseMatched = true;
                    score += 90;
                }

                if (
                    compactQuery &&
                    compactQuery.length >= 2 &&
                    record.titleInitials &&
                    record.titleInitials.includes(compactQuery)
                ) {
                    phraseMatched = true;
                    score += 75;
                }

                if (
                    compactQuery &&
                    compactQuery.length >= 2 &&
                    record.typeInitials &&
                    record.typeInitials.includes(compactQuery)
                ) {
                    phraseMatched = true;
                    score += 45;
                }

                const tokenMatches = queryTokens.map(queryToken => {
                    let best = 0;

                    for (const searchableToken of activeTokens) {
                        best = Math.max(best, scoreSectionSearchToken(queryToken, searchableToken));
                    }

                    return best;
                });

                const allTokensMatched =
                    queryTokens.length > 0 &&
                    tokenMatches.every(value => value > 0);

                if (!phraseMatched && !allTokensMatched) {
                    return 0;
                }

                for (const field of activeFields) {
                    score += scoreSectionSearchField(
                        field,
                        normalizedQuery,
                        compactQuery,
                        queryTokens,
                        false
                    );
                }

                score += tokenMatches.reduce((sum, value) => sum + value, 0);

                return score;
            }


            function getExactOnlySectionTitleSearchResults(query) {
                const rawQuery = String(query || "").trim();
                const normalizedQuery = normalizeSectionIndexSearch(rawQuery);
                const compactQuery = compactSectionIndexSearch(rawQuery);
                const numericOnly = !!compactQuery && /^\d+$/.test(compactQuery);

                if (!normalizedQuery || numericOnly) {
                    return null;
                }

                const exactResults = sections
                    .map((section, index) => {
                        const type = getSectionTypeForSearch(section);
                        const typeMatches = activeType === "All" || type === activeType;

                        if (!typeMatches) {
                            return {
                                section,
                                index,
                                score: 0
                            };
                        }

                        const record = getSectionIndexSearchRecord(section, index);
                        const titleField = record.fields.find(field => field.label === "title");
                        const titleNormalized = titleField?.normalized || "";
                        const titleCompact = titleField?.compact || "";
                        const numberedTitle = normalizeSectionIndexSearch(`section ${record.sectionNumber} ${titleNormalized}`);
                        const numberedTitleCompact = numberedTitle.replace(/\s+/g, "");

                        let score = 0;

                        if (titleNormalized && titleNormalized === normalizedQuery) {
                            score = Math.max(score, 200000);
                        }

                        if (titleCompact && compactQuery && titleCompact === compactQuery) {
                            score = Math.max(score, 199000);
                        }

                        if (numberedTitle && numberedTitle === normalizedQuery) {
                            score = Math.max(score, 198000);
                        }

                        if (numberedTitleCompact && compactQuery && numberedTitleCompact === compactQuery) {
                            score = Math.max(score, 197000);
                        }

                        return {
                            section,
                            index,
                            score
                        };
                    })
                    .filter(result => result.score > 0)
                    .sort((a, b) => {
                        if (b.score !== a.score) {
                            return b.score - a.score;
                        }

                        return a.index - b.index;
                    });

                return exactResults.length ? exactResults : null;
            }

            function getSectionExactTitlePhraseScore(record, query) {
                const normalizedQuery = normalizeSectionIndexSearch(query);
                const compactQuery = compactSectionIndexSearch(query);
                const queryTokens = tokenizeSectionIndexSearch(query);
                const numericOnly = !!compactQuery && /^\d+$/.test(compactQuery);

                if (!normalizedQuery || numericOnly) {
                    return 0;
                }

                const titleField = record.fields.find(field => field.label === "title");
                const subtitleField = record.fields.find(field => field.label === "subtitle");
                const titleNormalized = titleField?.normalized || "";
                const titleCompact = titleField?.compact || "";
                const subtitleNormalized = subtitleField?.normalized || "";
                const subtitleCompact = subtitleField?.compact || "";
                const numberedTitle = normalizeSectionIndexSearch(`section ${record.sectionNumber} ${titleNormalized}`);
                const numberedTitleCompact = numberedTitle.replace(/\s+/g, "");
                const longEnoughForStrictPhrase =
                    queryTokens.length >= 2 ||
                    compactQuery.length >= 5;

                let score = 0;

                if (titleNormalized && titleNormalized === normalizedQuery) {
                    score = Math.max(score, 100000);
                }

                if (titleCompact && compactQuery.length >= 3 && titleCompact === compactQuery) {
                    score = Math.max(score, 98000);
                }

                if (numberedTitle && numberedTitle === normalizedQuery) {
                    score = Math.max(score, 97000);
                }

                if (numberedTitleCompact && compactQuery.length >= 3 && numberedTitleCompact === compactQuery) {
                    score = Math.max(score, 96000);
                }

                if (longEnoughForStrictPhrase && titleNormalized && titleNormalized.includes(normalizedQuery)) {
                    score = Math.max(score, 93000);
                }

                if (longEnoughForStrictPhrase && titleCompact && compactQuery.length >= 4 && titleCompact.includes(compactQuery)) {
                    score = Math.max(score, 92000);
                }

                if (longEnoughForStrictPhrase && numberedTitle && numberedTitle.includes(normalizedQuery)) {
                    score = Math.max(score, 91000);
                }

                if (longEnoughForStrictPhrase && subtitleNormalized && subtitleNormalized === normalizedQuery) {
                    score = Math.max(score, 87000);
                }

                if (longEnoughForStrictPhrase && subtitleCompact && compactQuery.length >= 4 && subtitleCompact === compactQuery) {
                    score = Math.max(score, 86000);
                }

                if (longEnoughForStrictPhrase && subtitleNormalized && subtitleNormalized.includes(normalizedQuery)) {
                    score = Math.max(score, 83000);
                }

                if (longEnoughForStrictPhrase && subtitleCompact && compactQuery.length >= 4 && subtitleCompact.includes(compactQuery)) {
                    score = Math.max(score, 82000);
                }

                return score;
            }

            function getStrictSectionTitlePhraseSearchResults(query) {
                const rawQuery = String(query || "").trim();
                const normalizedQuery = normalizeSectionIndexSearch(rawQuery);
                const compactQuery = compactSectionIndexSearch(rawQuery);
                const queryTokens = tokenizeSectionIndexSearch(rawQuery);
                const numericOnly = !!compactQuery && /^\d+$/.test(compactQuery);
                const strictCandidate =
                    !numericOnly &&
                    normalizedQuery &&
                    (
                        queryTokens.length >= 2 ||
                        compactQuery.length >= 5
                    );

                if (!strictCandidate) {
                    return null;
                }

                const strictResults = sections
                    .map((section, index) => {
                        const type = getSectionTypeForSearch(section);
                        const typeMatches = activeType === "All" || type === activeType;

                        if (!typeMatches) {
                            return {
                                section,
                                index,
                                score: 0
                            };
                        }

                        const record = getSectionIndexSearchRecord(section, index);

                        return {
                            section,
                            index,
                            score: getSectionExactTitlePhraseScore(record, rawQuery)
                        };
                    })
                    .filter(result => result.score > 0)
                    .sort((a, b) => {
                        if (b.score !== a.score) {
                            return b.score - a.score;
                        }

                        return a.index - b.index;
                    });

                return strictResults.length ? strictResults : null;
            }

            function getSectionSearchResults(query) {
                const rawQuery = String(query || "").trim();

                if (rawQuery) {
                    const exactTitleResults = getExactOnlySectionTitleSearchResults(rawQuery);

                    if (exactTitleResults) {
                        return exactTitleResults;
                    }

                    const strictTitleResults = getStrictSectionTitlePhraseSearchResults(rawQuery);

                    if (strictTitleResults) {
                        return strictTitleResults;
                    }
                }

                const results = sections.map((section, index) => {
                    const type = getSectionTypeForSearch(section);
                    const typeMatches = activeType === "All" || type === activeType;

                    if (!typeMatches) {
                        return {
                            section,
                            index,
                            score: 0
                        };
                    }

                    if (!rawQuery) {
                        return {
                            section,
                            index,
                            score: 1
                        };
                    }

                    const record = getSectionIndexSearchRecord(section, index);

                    return {
                        section,
                        index,
                        score: scoreSectionIndexRecord(record, rawQuery)
                    };
                });

                return results
                    .filter(result => result.score > 0)
                    .sort((a, b) => {
                        if (b.score !== a.score) {
                            return b.score - a.score;
                        }

                        return a.index - b.index;
                    });
            }

            function getSectionSearchSnippet(section) {
                return (
                    getSectionTypeForSearch(section) ||
                    getSectionSubtitleForSearch(section) ||
                    "Section"
                );
            }

            function draw() {
                try {
                    const query = searchInput.value || "";
                    const results = getSectionSearchResults(query);

                    count.textContent =
                        `${results.length} ${results.length === 1 ? "Section" : "Sections"}`;

                    if (!results.length) {
                        links.innerHTML = `
                                                <p class="empty">
                                                    No sections match this search.
                                                </p>
                                            `;
                        return;
                    }

                    links.innerHTML = results.map(result => {
                        const section = result.section;
                        const realIndex = result.index;
                        const title = getSectionTitleForSearch(section) || "Untitled Section";
                        const snippet = getSectionSearchSnippet(section);

                        return `
                                                <a href="#section-${realIndex}">
                                                    <span>Section ${realIndex + 1}: ${escapeHtml(title)}</span>
                                                    <small>${escapeHtml(snippet)}</small>
                                                </a>
                                            `;
                    }).join("");
                } catch (error) {
                    console.error("World section navigation draw error:", error);

                    links.innerHTML = `
                                            <p class="empty">
                                                Section search is unavailable, but the sections are still shown below.
                                            </p>
                                        `;
                }
            }

            nextFilters.addEventListener("click", function (event) {
                const button = event.target.closest(".filter-chip");

                if (!button) {
                    return;
                }

                activeType = button.dataset.type || "All";

                nextFilters.querySelectorAll(".filter-chip").forEach(chip => {
                    chip.classList.remove("active");
                });

                button.classList.add("active");

                draw();
            });

            searchInput.oninput = draw;
            searchInput.onkeyup = draw;
            searchInput.onchange = draw;
            searchInput.onsearch = draw;
            searchInput.addEventListener("compositionend", draw);

            draw();
        }

        async function loadLikes() {
            if (!currentWorld) return;

            const { data: likes, error } = await supabase
                .from("world_likes")
                .select("*")
                .eq("world_id", currentWorld.id);

            if (error) {
                document.getElementById("like-count").textContent =
                    "Likes unavailable";
                return;
            }

            const likeCount = likes ? likes.length : 0;

            document.getElementById("like-count").textContent =
                `${likeCount} ${likeCount === 1 ? "Like" : "Likes"}`;

            const userLiked = likes?.some(
                like => like.user_id === currentUser.id
            );

            const button = document.getElementById("like-button");

            if (userLiked) {
                button.classList.add("liked");
                button.textContent = "♥ Liked";
            } else {
                button.classList.remove("liked");
                button.textContent = "♡ Like";
            }
        }

        document.getElementById("like-button").addEventListener("click", async () => {
            if (!currentWorld || !currentUser) return;

            const button = document.getElementById("like-button");
            const alreadyLiked = button.classList.contains("liked");

            if (alreadyLiked) {
                await supabase
                    .from("world_likes")
                    .delete()
                    .eq("world_id", currentWorld.id)
                    .eq("user_id", currentUser.id);
            } else {

                const { error: likeError } = await supabase
                    .from("world_likes")
                    .insert({
                        world_id: currentWorld.id,
                        user_id: currentUser.id
                    });

                if (!likeError) {
                    await createNotification({
                        recipientId: currentWorld.owner_id,
                        actorId: currentUser.id,
                        worldId: currentWorld.id,
                        type: "world_liked",
                        message: `Someone liked ${currentWorld.title}.`,
                        link: `world.html?id=${encodeURIComponent(currentWorld.id)}`
                    });
                }
            }

            await loadLikes();
        });
