        window.setWorldModerationStatus = async function (status) {
            if (!currentWorld || !canModerateWorlds(currentPermissions)) return;

            const reasonInput = document.getElementById("world-hide-reason");
            const reason = reasonInput ? reasonInput.value.trim() : "";

            if (status === "hidden" && !reason) {
                const message = document.getElementById("world-moderation-message");
                if (message) {
                    message.textContent = "Enter a reason before hiding this world.";
                }
                return;
            }

            const { error } = await supabase
                .from("worlds")
                .update({
                    moderation_status: status,
                    moderation_reason: status === "hidden" ? reason : null
                })
                .eq("id", currentWorld.id);

            const message = document.getElementById("world-moderation-message");

            if (error) {
                if (message) message.textContent = error.message;
                return;
            }

            const logReason =
                status === "hidden"
                    ? reason
                    : `World "${currentWorld.title || "Untitled World"}" restored to visible.`;

            await supabase
                .from("moderation_logs")
                .insert({
                    target_user_id: currentWorld.owner_id,
                    moderator_id: currentUser.id,
                    action: `world_${status}`,
                    reason: logReason,
                    expires_at: null
                });

            if (status === "hidden") {
                await createNotification({
                    recipientId: currentWorld.owner_id,
                    actorId: currentUser.id,
                    worldId: currentWorld.id,
                    type: "world_hidden",
                    message: `Your world "${currentWorld.title || "Untitled World"}" was hidden by moderation. Reason: ${reason}`,
                    link: `dashboard.html`
                });
            }

            if (status === "visible") {
                await createNotification({
                    recipientId: currentWorld.owner_id,
                    actorId: currentUser.id,
                    worldId: currentWorld.id,
                    type: "world_restored",
                    message: `Your world "${currentWorld.title || "Untitled World"}" was restored by moderation.`,
                    link: `world.html?id=${encodeURIComponent(currentWorld.id)}`
                });
            }

            if (message) {
                message.textContent = `World set to ${status}.`;
            }

            setTimeout(() => {
                window.location.reload();
            }, 700);
        };

        function formatWarningLabel(value) {

        function normalizeRenderedWorldRichText(root) {

            root.querySelectorAll("u").forEach(element => {

            root.querySelectorAll("span,mark,b,strong,i,em,u,s,strike,p,div,li,blockquote,h1,h2,h3,h4").forEach(element => {

                const fontSize = element.getAttribute("data-nv-font-size");

                    if (stack) {

        function promoteWorldInlineStylePriority(element) {

                "font-size",
                "color",
                "background-color",
                "font-weight",
                "font-style",
                "text-decoration",
                "text-decoration-line",
                "line-height",
                "text-align",
                "margin",
                "margin-top",
                "margin-right",
                "margin-bottom",
                "margin-left",
                "padding-left",
                "text-indent",
                "letter-spacing",
                "word-spacing"

        function renderWorldPlainText(value) {

                .map(block => {

        function normalizeWorldSavedRichText(value) {

                const startsSingle = text.startsWith("'") && text.endsWith("'");

                if (!startsDouble && !startsSingle) {

                if (startsDouble) {

                        const parsed = JSON.parse(text);

                        if (typeof parsed === "string") {
                            text = parsed.trim();
                            continue;

                    }

                    worldTextLooksLikeEscapedRichHtml(inner) ||

        function worldTextLooksLikeRichHtml(value) {

                .replace(/\s+/g, " ");

            if (!firstFamily) {

            const lower = firstFamily.toLowerCase();

            if (WORLD_EDITOR_FONT_ALIASES[lower]) {
                return WORLD_EDITOR_FONT_STACKS[WORLD_EDITOR_FONT_ALIASES[lower]];

            const directMatch = Object.keys(WORLD_EDITOR_FONT_STACKS)
                .find(font => font.toLowerCase() === lower);

            if (directMatch) {

                .find(font => decoded.toLowerCase().includes(font.toLowerCase()));

                .replace(/[^a-zA-Z0-9\s\-]/g, "")

        function sanitizeWorldSectionHtml(html) {
            const template = document.createElement("template");
            template.innerHTML = normalizeWorldSavedRichText(html);

            const allowedTags = new Set([

        function expandEscapedWorldRichTextNodes(root) {

                "3": "16px",
                "4": "18px",

                "6": "32px",
                "7": "40px"

                }

                        .slice(0, separatorIndex)

                const clean = String(value).trim().toLowerCase();

                prop === "margin" ||
                prop === "margin-top" ||
                prop === "margin-right" ||
                prop === "margin-bottom" ||
                prop === "margin-left" ||
                prop === "padding-left" ||
                prop === "text-indent" ||
                prop === "letter-spacing" ||
                prop === "word-spacing"
            ) {
                return normalizeWorldSafeLength(value, -120, 160);
            }

            return "";
        }

        function normalizeWorldCssColor(value) {
            const clean = String(value || "").trim();

            if (!clean) {
                return "";
            }

            const probe = document.createElement("span");
            probe.style.color = "";
            probe.style.color = clean;

            if (probe.style.color) {
                return probe.style.color;
            }

            probe.style.backgroundColor = "";
            probe.style.backgroundColor = clean;

            return probe.style.backgroundColor ? probe.style.backgroundColor : "";
        }

        function normalizeWorldFontSize(value) {
            const raw = String(value || "").trim().toLowerCase();

            if (!raw) {
                return "";
            }

            let px = null;

            if (raw.endsWith("px")) {
                px = Number(raw.replace("px", ""));
            } else if (raw.endsWith("pt")) {
                px = Number(raw.replace("pt", "")) * 1.333;
            } else if (raw.endsWith("em") || raw.endsWith("rem")) {
                px = Number(raw.replace("rem", "").replace("em", "")) * 18;
            } else if (raw.endsWith("%")) {
                px = 18 * (Number(raw.replace("%", "")) / 100);
            } else if (/^\d+(\.\d+)?$/.test(raw)) {
                px = Number(raw);
            }

            if (!Number.isFinite(px)) {
                return "";
            }

            const clamped = Math.max(10, Math.min(72, px));

            return `${Math.round(clamped * 100) / 100}px`;
        }

        function normalizeWorldLineHeight(value) {
            const raw = String(value || "").trim().toLowerCase();

            if (!raw) {
                return "";
            }

            if (/^\d+(\.\d+)?$/.test(raw)) {
                const number = Number(raw);
                return number >= 0.8 && number <= 3.5 ? String(number) : "";
            }

            if (raw.endsWith("px")) {
                return normalizeWorldSafeLength(raw, 10, 90);
            }

            if (raw.endsWith("%")) {
                const percent = Number(raw.replace("%", ""));
                return percent >= 80 && percent <= 350 ? `${percent}%` : "";
            }

            return "";
        }

        function normalizeWorldSafeLength(value, min, max) {
            const raw = String(value || "").trim().toLowerCase();

            let number = null;
            let unit = "px";

            if (raw.endsWith("px")) {
                number = Number(raw.replace("px", ""));
            } else if (raw.endsWith("em")) {
                number = Number(raw.replace("em", "")) * 18;
            } else if (raw.endsWith("rem")) {
                number = Number(raw.replace("rem", "")) * 18;
            } else if (/^-?\d+(\.\d+)?$/.test(raw)) {
                number = Number(raw);
            }

            if (!Number.isFinite(number)) {
                return "";
            }

            const clamped = Math.max(min, Math.min(max, number));

            return `${Math.round(clamped * 100) / 100}${unit}`;
        }

        function removeEmptyWorldInlineShell(element) {
            if (!element || !["SPAN", "B", "STRONG", "EM", "I", "U", "S", "MARK"].includes(element.tagName)) {
                return;
            }

            const text = element.textContent || "";
            const hasBreak = element.querySelector?.("br,hr");

            if (!text.trim() && !hasBreak) {
                element.remove();
            }
        }

        function formatCreditType(value) {
            return String(value || "")
                .replaceAll("_", " ")
                .replace(/\b\w/g, letter => letter.toUpperCase());
        }

        function buildWorldCreditLine(
            type,
            creditName,
            nullverseUsername,
            creditUrl
        ) {

            if (type === "own_work") {
                return "Artwork by creator";
            }

            if (
                type === "nullverse_creator" &&
                nullverseUsername
            ) {
                return `
                                                                                Artwork by
                                                                                <a href="profile.html?user=${encodeURIComponent(nullverseUsername)}"
                                                                                   style="color:inherit;text-decoration:underline;">
                                                                                    @${escapeHtml(nullverseUsername)}
                                                                                </a>
                                                                            `;
            }

            if (creditUrl) {
                return `
                                                                                <a href="${escapeHtml(creditUrl)}"
                                                                                   target="_blank"
                                                                                   style="color:inherit;text-decoration:underline;">
                                                                                    ${escapeHtml(
                    creditName ||
                    formatCreditType(type)
                )}
                                                                                </a>
                                                                            `;
            }

            return escapeHtml(
                creditName ||
                formatCreditType(type)
            );
        }

        function buildCreditPill({
            type,
            name,
            username,
            url,
            note,
            ownerUsername,
            context = "Image"
        }) {
            type = type || "no_credit_needed";

            if (type === "no_credit_needed") {
                return "";
            }

            let label = "";
            let href = "";

            if (type === "own_work") {
                label = `${context} Credit: @${ownerUsername || "creator"}`;

                if (ownerUsername) {
                    href = `profile.html?user=${encodeURIComponent(ownerUsername)}`;
                }
            } else if (type === "nullverse_creator" && username) {
                label = `${context} Credit: @${username}`;
                href = `profile.html?user=${encodeURIComponent(username)}`;
            } else {
                label = `${context} Credit: ${name || formatCreditType(type)}`;
                href = url || "";
            }

            const tooltipContent = `
                                                                            <strong>${escapeHtml(context)} Credit</strong>
                                                                            <br>
                                                                            Source: ${escapeHtml(name || username || ownerUsername || formatCreditType(type))}
                                                                            ${note ? `<br><br>${escapeHtml(note)}` : ""}
                                                                        `;

            const tooltip = `
                                                                            <span class="credit-tooltip">
                                                                                ${tooltipContent}
                                                                            </span>
                                                                        `;

            if (href) {
                return `
                                                                                <a class="credit-pill"
                                                                                   href="${escapeHtml(href)}"
                                                                                   ${href.startsWith("http") ? 'target="_blank"' : ""}>
                                                                                    ${escapeHtml(label)}
                                                                                    ${tooltip}
                                                                                </a>
                                                                            `;
            }

            return `
                                                                            <span class="credit-pill">
                                                                                ${escapeHtml(label)}
                                                                                ${tooltip}
                                                                            </span>
                                                                        `;
        }

        function buildImageCreditLine(section) {
            const type = section.image_credit_type || "no_credit_needed";

            if (type === "own_work") {
                const username = currentWorld?.ownerProfile?.username;

                if (username) {
                    return `
                                                                                    Artwork by
                                                                                    <a href="profile.html?user=${encodeURIComponent(username)}"
                                                                                       style="color:inherit;text-decoration:underline;">
                                                                                        @${escapeHtml(username)}
                                                                                    </a>
                                                                                `;
                }

                return "Artwork by creator";
            }

            if (type === "nullverse_creator" && section.image_credit_nullverse_username) {
                return `
                                                                                Artwork by
                                                                                <a href="profile.html?user=${encodeURIComponent(section.image_credit_nullverse_username)}"
                                                                                   style="color:inherit;text-decoration:underline;">
                                                                                    @${escapeHtml(section.image_credit_nullverse_username)}
                                                                                </a>
                                                                            `;
            }

            if (section.image_credit_url) {
                return `
                                                                                Credit:
                                                                                <a href="${escapeHtml(section.image_credit_url)}"
                                                                                   target="_blank"
                                                                                   style="color:inherit;text-decoration:underline;">
                                                                                    ${escapeHtml(section.image_credit_name || formatCreditType(type))}
                                                                                </a>
                                                                            `;
            }

            return `Credit: ${escapeHtml(section.image_credit_name || formatCreditType(type))}`;
        }

        window.logOut = async function () {
            await supabase.auth.signOut();
            window.location.href = "login.html";
        };

        async function submitWorldReport() {

            if (!currentWorld) return;

            const reason =
                document.getElementById("report-reason").value;

            const details =
                document.getElementById("report-details").value.trim();

            const { error } = await supabase
                .from("reports")
                .insert({
                    reporter_id: currentUser.id,
                    reported_user_id: currentWorld.owner_id,
                    world_id: currentWorld.id,
                    report_type: "world",
                    reason,
                    details,
                    status: "open"
                });

            if (error) {
                alert(error.message);
                return;
            }

            document.getElementById("report-modal").style.display =
                "none";

            alert("Report submitted.");
        }

        function setupReportSystem() {

            const reportBtn =
                document.getElementById("report-world-btn");

            const modal =
                document.getElementById("report-modal");

            const closeBtn =
                document.getElementById("close-report-btn");

            const submitBtn =
                document.getElementById("submit-report-btn");

            if (!reportBtn) return;

            reportBtn.addEventListener("click", () => {
                modal.style.display = "flex";
            });

            closeBtn.addEventListener("click", () => {
                modal.style.display = "none";
            });

            submitBtn.addEventListener("click", submitWorldReport);
        }

    </script>

        import { setupAutomaticProgressTracking } from "./nullverse-progress.js";
        setupAutomaticProgressTracking("world");
    </script>
