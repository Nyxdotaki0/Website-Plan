        function escapeHtml(value) {
            return String(value || "")
                .replaceAll("&", "&amp;")
                .replaceAll("<", "&lt;")
                .replaceAll(">", "&gt;")
                .replaceAll('"', "&quot;")
                .replaceAll("'", "&#039;");
        }

        function formatWorldSectionContent(value) {
            const rawInput = String(value || "").trim();

            if (!rawInput) {
                return "No content yet.";
            }

            const raw = decodeWorldRichHtmlEntities(rawInput).trim();

            try {
                const looksLikeRichHtml =
                    /<\/?(p|br|div|span|font|strong|b|em|i|u|s|strike|sup|sub|h1|h2|h3|h4|ul|ol|li|blockquote|a|hr)\b/i
                        .test(raw);

                if (looksLikeRichHtml) {
                    const cleaned = sanitizeWorldSectionHtml(raw);
                    return cleaned || "No content yet.";
                }

                return raw
                    .split(/\n{2,}/)
                    .map(block => {
                        return `<p>${escapeHtml(block).replaceAll("\n", "<br>")}</p>`;
                    })
                    .join("");
            } catch (error) {
                console.error("World section rich text render error:", error);

                const fallback = decodeWorldRichHtmlEntities(rawInput);

                return fallback
                    .split(/\n{2,}/)
                    .map(block => {
                        return `<p>${escapeHtml(block).replaceAll("\n", "<br>")}</p>`;
                    })
                    .join("");
            }
        }

        function decodeWorldRichHtmlEntities(value) {
            const richTagPattern =
                /<\/?(p|br|div|span|font|strong|b|em|i|u|s|strike|sup|sub|h1|h2|h3|h4|ul|ol|li|blockquote|a|hr)\b/i;

            const escapedRichTagPattern =
                /&(?:amp;)*lt;\/?(p|br|div|span|font|strong|b|em|i|u|s|strike|sup|sub|h1|h2|h3|h4|ul|ol|li|blockquote|a|hr)\b/i;

            let decoded = String(value || "");

            if (!escapedRichTagPattern.test(decoded)) {
                return decoded;
            }

            for (let i = 0; i < 3; i++) {
                const textarea = document.createElement("textarea");
                textarea.innerHTML = decoded;
                decoded = textarea.value;

                if (richTagPattern.test(decoded)) {
                    return decoded;
                }

                if (!escapedRichTagPattern.test(decoded)) {
                    break;
                }
            }

            return decoded;
        }

        const WORLD_EDITOR_FONT_STACKS = {
            "Georgia": `Georgia, "Times New Roman", Times, serif`,
            "Merriweather": `"Merriweather", Georgia, "Times New Roman", Times, serif`,
            "Lora": `"Lora", Georgia, "Times New Roman", Times, serif`,
            "EB Garamond": `"EB Garamond", Garamond, Georgia, "Times New Roman", serif`,
            "Times New Roman": `"Times New Roman", Times, Georgia, serif`,
            "Inter": `"Inter", Arial, Helvetica, sans-serif`,
            "Arial": `Arial, Helvetica, sans-serif`,
            "Helvetica": `Helvetica, Arial, sans-serif`,
            "Open Sans": `"Open Sans", Arial, Helvetica, sans-serif`,
            "Roboto": `"Roboto", Arial, Helvetica, sans-serif`,
            "Nunito": `"Nunito", Arial, Helvetica, sans-serif`,
            "Courier New": `"Courier New", Courier, monospace`,
            "JetBrains Mono": `"JetBrains Mono", "Courier New", Courier, monospace`,
            "Alegreya": `"Alegreya", Georgia, "Times New Roman", Times, serif`,
            "Libre Baskerville": `"Libre Baskerville", Georgia, "Times New Roman", Times, serif`
        };

        const WORLD_EDITOR_FONT_ALIASES = {
            "serif": "Georgia",
            "times": "Times New Roman",
            "times new roman": "Times New Roman",
            "sans-serif": "Inter",
            "sans serif": "Inter",
            "monospace": "Courier New",
            "courier": "Courier New"
        };

        function decodeWorldFontValue(value) {
            const textarea = document.createElement("textarea");
            textarea.innerHTML = String(value || "");

            return textarea.value
                .replaceAll("\u201c", '"')
                .replaceAll("\u201d", '"')
                .replaceAll("\u2018", "'")
                .replaceAll("\u2019", "'")
                .trim();
        }

        function getTrustedWorldFontStack(value) {
            const decoded = decodeWorldFontValue(value);

            const firstFamily = decoded
                .split(",")[0]
                .trim()
                .replace(/^['"]+|['"]+$/g, "")
                .replace(/\s+/g, " ");

            if (!firstFamily) {
                return "";
            }

            const lower = firstFamily.toLowerCase();

            if (WORLD_EDITOR_FONT_ALIASES[lower]) {
                return WORLD_EDITOR_FONT_STACKS[WORLD_EDITOR_FONT_ALIASES[lower]];
            }

            const directMatch = Object.keys(WORLD_EDITOR_FONT_STACKS)
                .find(font => font.toLowerCase() === lower);

            if (directMatch) {
                return WORLD_EDITOR_FONT_STACKS[directMatch];
            }

            const partialMatch = Object.keys(WORLD_EDITOR_FONT_STACKS)
                .find(font => decoded.toLowerCase().includes(font.toLowerCase()));

            if (partialMatch) {
                return WORLD_EDITOR_FONT_STACKS[partialMatch];
            }

            const safeCustomFamily = firstFamily
                .replace(/[^a-zA-Z0-9\s\-]/g, "")
                .trim();

            if (!safeCustomFamily) {
                return "";
            }

            return `"${safeCustomFamily}", Arial, Helvetica, sans-serif`;
        }

        function sanitizeWorldSectionHtml(html) {
            const template = document.createElement("template");
            template.innerHTML = String(html || "");

            convertWorldLegacyFontTags(template.content);

            const allowedTags = new Set([
                "P", "BR", "DIV", "SPAN", "STRONG", "B", "EM", "I", "U", "S", "STRIKE", "SUP", "SUB",
                "H1", "H2", "H3", "H4", "UL", "OL", "LI", "BLOCKQUOTE", "A", "HR"
            ]);

            const removedTags = new Set([
                "SCRIPT", "STYLE", "IFRAME", "OBJECT", "EMBED", "IMG", "VIDEO", "AUDIO", "SVG", "MATH"
            ]);

            const allowedAttrs = new Set([
                "href", "target", "rel", "style", "data-nv-font-family", "data-nv-font-size"
            ]);

            function clean(node) {
                [...node.childNodes].forEach(child => {
                    if (child.nodeType === Node.COMMENT_NODE) {
                        child.remove();
                        return;
                    }

                    if (child.nodeType === Node.TEXT_NODE) {
                        return;
                    }

                    if (child.nodeType !== Node.ELEMENT_NODE) {
                        child.remove();
                        return;
                    }

                    if (removedTags.has(child.tagName)) {
                        child.remove();
                        return;
                    }

                    if (!allowedTags.has(child.tagName)) {
                        clean(child);
                        child.replaceWith(...child.childNodes);
                        return;
                    }

                    [...child.attributes].forEach(attr => {
                        const name = attr.name.toLowerCase();

                        if (!allowedAttrs.has(name)) {
                            child.removeAttribute(attr.name);
                            return;
                        }

                        if (name === "data-nv-font-family") {
                            const trustedStack = getTrustedWorldFontStack(child.getAttribute("data-nv-font-family") || "");

                            if (trustedStack) {
                                child.style.fontFamily = trustedStack;
                            } else {
                                child.removeAttribute("data-nv-font-family");
                            }
                        }

                        if (name === "data-nv-font-size") {
                            const safeSize = normalizeWorldFontSize(child.getAttribute("data-nv-font-size") || "");

                            if (safeSize) {
                                child.style.fontSize = safeSize;
                            } else {
                                child.removeAttribute("data-nv-font-size");
                            }
                        }

                        if (name === "href") {
                            const href = child.getAttribute("href") || "";

                            if (!/^https?:\/\//i.test(href) && !href.startsWith("#")) {
                                child.removeAttribute("href");
                            }
                        }

                        if (name === "style") {
                            const safeStyle =
                                sanitizeWorldInlineStyle(child.getAttribute("style") || "");

                            if (safeStyle) {
                                child.setAttribute("style", safeStyle);
                            } else {
                                child.removeAttribute("style");
                            }
                        }
                    });

                    if (child.tagName === "A") {
                        child.setAttribute("target", "_blank");
                        child.setAttribute("rel", "noopener noreferrer");
                    }

                    clean(child);
                    removeEmptyWorldInlineShell(child);
                });
            }

            clean(template.content);

            return template.innerHTML;
        }

        function convertWorldLegacyFontTags(root) {
            root.querySelectorAll?.("font").forEach(font => {
                const span = document.createElement("span");
                const style = {};

                const face = font.getAttribute("face");
                const color = font.getAttribute("color");
                const size = font.getAttribute("size");

                if (face) {
                    style.fontFamily = getTrustedWorldFontStack(face);
                }

                if (color) {
                    const safeColor = normalizeWorldCssColor(color);

                    if (safeColor) {
                        style.color = safeColor;
                    }
                }

                if (size) {
                    const mappedSize = mapWorldLegacyFontSize(size);

                    if (mappedSize) {
                        style.fontSize = mappedSize;
                    }
                }

                applyWorldStyleMapToElement(span, style);
                span.innerHTML = font.innerHTML;
                font.replaceWith(span);
            });
        }

        function mapWorldLegacyFontSize(size) {
            const sizeMap = {
                "1": "12px",
                "2": "14px",
                "3": "16px",
                "4": "18px",
                "5": "24px",
                "6": "32px",
                "7": "40px"
            };

            return sizeMap[String(size).trim()] || "";
        }

        function applyWorldStyleMapToElement(element, styleMap) {
            Object.entries(styleMap || {}).forEach(([prop, value]) => {
                if (!value) return;

                element.style[prop] = value;

                if (prop === "fontFamily") {
                    element.setAttribute("data-nv-font-family", decodeWorldFontValue(value).split(",")[0].replace(/^['"]+|['"]+$/g, "").trim());
                }

                if (prop === "fontSize") {
                    element.setAttribute("data-nv-font-size", value);
                }
            });
        }

        function sanitizeWorldInlineStyle(styleText) {
            const safeRules = [];

            String(styleText || "")
                .split(";")
                .map(rule => rule.trim())
                .filter(Boolean)
                .forEach(rule => {
                    const separatorIndex = rule.indexOf(":");

                    if (separatorIndex === -1) {
                        return;
                    }

                    const prop = rule
                        .slice(0, separatorIndex)
                        .trim()
                        .toLowerCase();

                    const value = rule
                        .slice(separatorIndex + 1)
                        .trim();

                    const safeValue = sanitizeWorldStyleValue(prop, value);

                    if (prop && safeValue) {
                        safeRules.push(`${prop}: ${safeValue}`);
                    }
                });

            return safeRules.join("; ");
        }

        function sanitizeWorldStyleValue(prop, value) {
            if (!prop || !value) {
                return "";
            }

            if (/url\s*\(|expression\s*\(|javascript:/i.test(value)) {
                return "";
            }

            if (prop === "color" || prop === "background-color") {
                return normalizeWorldCssColor(value);
            }

            if (prop === "background") {
                return normalizeWorldCssColor(value);
            }

            if (prop === "font-family") {
                return getTrustedWorldFontStack(value);
            }

            if (prop === "font-size") {
                return normalizeWorldFontSize(value);
            }

            if (prop === "line-height") {
                return normalizeWorldLineHeight(value);
            }

            if (prop === "text-align") {
                const safeAlignments = new Set(["left", "center", "right", "justify", "start", "end"]);
                const clean = String(value).trim().toLowerCase();

                return safeAlignments.has(clean) ? clean : "";
            }

            if (prop === "font-weight") {
                const clean = String(value).trim().toLowerCase();

                if (clean === "bold" || clean === "normal" || clean === "bolder" || clean === "lighter") {
                    return clean;
                }

                const weight = Number(clean);

                return weight >= 100 && weight <= 900 ? String(weight) : "";
            }

            if (prop === "font-style") {
                const clean = String(value).trim().toLowerCase();

                return clean === "italic" || clean === "normal" || clean === "oblique" ? clean : "";
            }

            if (prop === "text-decoration" || prop === "text-decoration-line") {
                const clean = String(value).trim().toLowerCase();

                if (clean.includes("underline")) {
                    return "underline";
                }

                if (clean.includes("line-through")) {
                    return "line-through";
                }

                if (clean === "none") {
                    return "none";
                }

                return "";
            }

            if (
                prop === "margin" ||
                prop === "margin-top" ||
                prop === "margin-right" ||
                prop === "margin-bottom" ||
                prop === "margin-left" ||
                prop === "padding-left" ||
                prop === "text-indent" ||
                prop === "letter-spacing" ||
                prop === "word-spacing"
            ) {
                return normalizeWorldSafeLength(value, -120, 160);
            }

            return "";
        }

        function normalizeWorldCssColor(value) {
            const clean = String(value || "").trim();

            if (!clean) {
                return "";
            }

            const probe = document.createElement("span");
            probe.style.color = "";
            probe.style.color = clean;

            return probe.style.color ? clean : "";
        }

        function normalizeWorldFontSize(value) {
            const raw = String(value || "").trim().toLowerCase();

            if (!raw) {
                return "";
            }

            let px = null;

            if (raw.endsWith("px")) {
                px = Number(raw.replace("px", ""));
            } else if (raw.endsWith("pt")) {
                px = Number(raw.replace("pt", "")) * 1.333;
            } else if (raw.endsWith("em") || raw.endsWith("rem")) {
                px = Number(raw.replace("rem", "").replace("em", "")) * 18;
            } else if (raw.endsWith("%")) {
                px = 18 * (Number(raw.replace("%", "")) / 100);
            } else if (/^\d+(\.\d+)?$/.test(raw)) {
                px = Number(raw);
            }

            if (!Number.isFinite(px)) {
                return "";
            }

            const clamped = Math.max(10, Math.min(72, px));

            return `${Math.round(clamped * 100) / 100}px`;
        }

        function normalizeWorldLineHeight(value) {
            const raw = String(value || "").trim().toLowerCase();

            if (!raw) {
                return "";
            }

            if (/^\d+(\.\d+)?$/.test(raw)) {
                const number = Number(raw);
                return number >= 0.8 && number <= 3.5 ? String(number) : "";
            }

            if (raw.endsWith("px")) {
                return normalizeWorldSafeLength(raw, 10, 90);
            }

            if (raw.endsWith("%")) {
                const percent = Number(raw.replace("%", ""));
                return percent >= 80 && percent <= 350 ? `${percent}%` : "";
            }

            return "";
        }

        function normalizeWorldSafeLength(value, min, max) {
            const raw = String(value || "").trim().toLowerCase();

            let number = null;
            let unit = "px";

            if (raw.endsWith("px")) {
                number = Number(raw.replace("px", ""));
            } else if (raw.endsWith("em")) {
                number = Number(raw.replace("em", "")) * 18;
            } else if (raw.endsWith("rem")) {
                number = Number(raw.replace("rem", "")) * 18;
            } else if (/^-?\d+(\.\d+)?$/.test(raw)) {
                number = Number(raw);
            }

            if (!Number.isFinite(number)) {
                return "";
            }

            const clamped = Math.max(min, Math.min(max, number));

            return `${Math.round(clamped * 100) / 100}${unit}`;
        }

        function removeEmptyWorldInlineShell(element) {
            if (!element || !["SPAN", "B", "STRONG", "EM", "I", "U", "S"].includes(element.tagName)) {
                return;
            }

            const text = element.textContent || "";
            const hasBreak = element.querySelector?.("br,hr");

            if (!text.trim() && !hasBreak) {
                element.remove();
            }
        }

        function formatCreditType(value) {
            return String(value || "")
                .replaceAll("_", " ")
                .replace(/\b\w/g, letter => letter.toUpperCase());
        }

        function buildWorldCreditLine(
            type,
            creditName,
            nullverseUsername,
            creditUrl
        ) {

            if (type === "own_work") {
                return "Artwork by creator";
            }

            if (
                type === "nullverse_creator" &&
                nullverseUsername
            ) {
                return `
                                            Artwork by
                                            <a href="profile.html?user=${encodeURIComponent(nullverseUsername)}"
                                               style="color:inherit;text-decoration:underline;">
                                                @${escapeHtml(nullverseUsername)}
                                            </a>
                                        `;
            }

            if (creditUrl) {
                return `
                                            <a href="${escapeHtml(creditUrl)}"
                                               target="_blank"
                                               style="color:inherit;text-decoration:underline;">
                                                ${escapeHtml(
                    creditName ||
                    formatCreditType(type)
                )}
                                            </a>
                                        `;
            }

            return escapeHtml(
                creditName ||
                formatCreditType(type)
            );
        }

        function buildCreditPill({
            type,
            name,
            username,
            url,
            note,
            ownerUsername,
            context = "Image"
        }) {
            type = type || "no_credit_needed";

            if (type === "no_credit_needed") {
                return "";
            }

            let label = "";
            let href = "";

            if (type === "own_work") {
                label = `${context} Credit: @${ownerUsername || "creator"}`;

                if (ownerUsername) {
                    href = `profile.html?user=${encodeURIComponent(ownerUsername)}`;
                }
            } else if (type === "nullverse_creator" && username) {
                label = `${context} Credit: @${username}`;
                href = `profile.html?user=${encodeURIComponent(username)}`;
            } else {
                label = `${context} Credit: ${name || formatCreditType(type)}`;
                href = url || "";
            }

            const tooltipContent = `
                                        <strong>${escapeHtml(context)} Credit</strong>
                                        <br>
                                        Source: ${escapeHtml(name || username || ownerUsername || formatCreditType(type))}
                                        ${note ? `<br><br>${escapeHtml(note)}` : ""}
                                    `;

            const tooltip = `
                                        <span class="credit-tooltip">
                                            ${tooltipContent}
                                        </span>
                                    `;

            if (href) {
                return `
                                            <a class="credit-pill"
                                               href="${escapeHtml(href)}"
                                               ${href.startsWith("http") ? 'target="_blank"' : ""}>
                                                ${escapeHtml(label)}
                                                ${tooltip}
                                            </a>
                                        `;
            }

            return `
                                        <span class="credit-pill">
                                            ${escapeHtml(label)}
                                            ${tooltip}
                                        </span>
                                    `;
        }

        function buildImageCreditLine(section) {
            const type = section.image_credit_type || "no_credit_needed";

            if (type === "own_work") {
                const username = currentWorld?.ownerProfile?.username;

                if (username) {
                    return `
                                                Artwork by
                                                <a href="profile.html?user=${encodeURIComponent(username)}"
                                                   style="color:inherit;text-decoration:underline;">
                                                    @${escapeHtml(username)}
                                                </a>
                                            `;
                }

                return "Artwork by creator";
            }

            if (type === "nullverse_creator" && section.image_credit_nullverse_username) {
                return `
                                            Artwork by
                                            <a href="profile.html?user=${encodeURIComponent(section.image_credit_nullverse_username)}"
                                               style="color:inherit;text-decoration:underline;">
                                                @${escapeHtml(section.image_credit_nullverse_username)}
                                            </a>
                                        `;
            }

            if (section.image_credit_url) {
                return `
                                            Credit:
                                            <a href="${escapeHtml(section.image_credit_url)}"
                                               target="_blank"
                                               style="color:inherit;text-decoration:underline;">
                                                ${escapeHtml(section.image_credit_name || formatCreditType(type))}
                                            </a>
                                        `;
            }

            return `Credit: ${escapeHtml(section.image_credit_name || formatCreditType(type))}`;
        }

        window.logOut = async function () {
            await supabase.auth.signOut();
            window.location.href = "login.html";
        };

        async function submitWorldReport() {

            if (!currentWorld) return;

            const reason =
                document.getElementById("report-reason").value;

            const details =
                document.getElementById("report-details").value.trim();

            const { error } = await supabase
                .from("reports")
                .insert({
                    reporter_id: currentUser.id,
                    reported_user_id: currentWorld.owner_id,
                    world_id: currentWorld.id,
                    report_type: "world",
                    reason,
                    details,
                    status: "open"
                });

            if (error) {
                alert(error.message);
                return;
            }

            document.getElementById("report-modal").style.display =
                "none";

            alert("Report submitted.");
        }

        function setupReportSystem() {

            const reportBtn =
                document.getElementById("report-world-btn");

            const modal =
                document.getElementById("report-modal");

            const closeBtn =
                document.getElementById("close-report-btn");

            const submitBtn =
                document.getElementById("submit-report-btn");

            if (!reportBtn) return;

            reportBtn.addEventListener("click", () => {
                modal.style.display = "flex";
            });

            closeBtn.addEventListener("click", () => {
                modal.style.display = "none";
            });

            submitBtn.addEventListener("click", submitWorldReport);
        }

    </script>
