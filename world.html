<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" href="favicon.png">
    <title>World - Nullverse</title>

    <script>
        const savedNullverseTheme =
            localStorage.getItem("nullverse-theme") || "void";

        document.documentElement.setAttribute(
            "data-theme",
            savedNullverseTheme
        );
    </script>

    <link rel="stylesheet" href="theme.css?v=25">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Alegreya:wght@400;500;600;700&family=EB+Garamond:wght@400;500;600;700&family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600;700&family=Libre+Baskerville:wght@400;700&family=Lora:wght@400;500;600;700&family=Merriweather:wght@300;400;700;900&family=Nunito:wght@400;500;600;700;800&family=Open+Sans:wght@400;500;600;700;800&family=Roboto:wght@400;500;700;900&display=swap" rel="stylesheet">

    <style>
        html {
            min-height: 100%;
            background: #000000;
        }

        body {
            margin: 0;
            min-height: 100vh;
            font-family: Arial, sans-serif;
            background: #000;
            background-attachment: fixed;
            color: var(--text-primary);
            transition: background 0.25s ease, color 0.25s ease;
        }

        .world-background-layer {
            position: fixed;
            inset: 0;
            z-index: 0;
            overflow: hidden;
            pointer-events: none;
        }

            .world-background-layer .credit-pill {
                position: fixed;
                pointer-events: auto;
            }

        .section-image-credit-under .credit-pill {
            position: relative;
            left: auto;
            bottom: auto;
        }

        header,
        main {
            position: relative;
            z-index: 2;
        }

        .world-background-image {
            position: absolute;
            inset: 0;
            background-position: center;
            background-size: cover;
            background-repeat: no-repeat;
        }

        .world-background-overlay {
            position: absolute;
            inset: 0;
            background: rgba(0,0,0,.35);
        }

        .world-gradient-layer {
            position: absolute;
            inset: 0;
        }

        header {
            padding: 12px 40px;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(12,12,14,0.72);
            position: sticky;
            top: 0;
            z-index: 100;
            backdrop-filter: blur(18px);
            -webkit-backdrop-filter: blur(18px);
            box-shadow: 0 10px 35px rgba(0,0,0,0.28);
        }

        .logo,
        .logo a {
            display: flex;
            align-items: center;
        }

        .site-logo {
            height: 64px;
            width: auto;
            display: block;
            max-width: none;
        }

        nav {
            display: flex;
            gap: 22px;
            flex-wrap: wrap;
            align-items: center;
        }

            nav a,
            nav button {
                color: var(--text-secondary);
                text-decoration: none;
                background: none;
                border: none;
                cursor: pointer;
                font-family: Arial, sans-serif;
                font-size: 0.95rem;
                transition: .18s ease;
            }

                nav a:hover,
                nav button:hover {
                    color: white;
                }

        main {
            display: flex;
            gap: 28px;
            max-width: 1400px;
            margin: auto;
            padding: 45px 40px 80px;
        }

        .hero {
            position: relative;
            overflow: visible;
            background: var( --hero-background, linear-gradient( 135deg, rgba(255,255,255,0.06), rgba(255,255,255,0.02) ) ), var(--panel-bg);
            border: 1px solid var(--border-color);
            border-radius: 22px;
            padding: 36px;
            margin-bottom: 28px;
            backdrop-filter: blur(18px);
            -webkit-backdrop-filter: blur(18px);
            box-shadow: 0 18px 40px rgba(0,0,0,0.24), 0 0 24px rgba(255,255,255,0.03);
        }

            .hero::before {
                content: "";
                position: absolute;
                inset: 0;
                background-image: var(--hero-image);
                background-size: cover;
                background-position: center;
                opacity: var(--hero-image-opacity,.85);
                z-index: 0;
            }

            .hero::after {
                content: "";
                position: absolute;
                inset: 0;
                background: rgba( 0, 0, 0, var(--hero-overlay,.35) );
                z-index: 1;
            }

            .hero > * {
                position: relative;
                z-index: 2;
            }

        .tag-row {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            margin-bottom: 18px;
        }

        .tag {
            display: inline-block;
            font-size: 0.82rem;
            color: var(--text-secondary);
            border: 1px solid var(--border-color);
            background: rgba(255,255,255,0.04);
            border-radius: 999px;
            padding: 7px 11px;
        }

        h1 {
            color: var(--hero-text-color, var(--text-primary));
        }

        .creator {
            color: var(--hero-text-color, var(--text-muted));
        }

            .creator a {
                color: var(--text-secondary);
                text-decoration: none;
            }

                .creator a:hover {
                    color: white;
                }

        .summary {
            color: var(--hero-text-color, var(--text-secondary));
        }

        .like-row {
            display: flex;
            align-items: center;
            gap: 14px;
            margin-top: 26px;
            flex-wrap: wrap;
        }

        .like-button,
        .button {
            display: inline-block;
            background: var( --world-button-background, linear-gradient(180deg,#2a2a2f,#0d0d10) );
            color: var( --world-button-text, #f5f5f5 );
            border: 1px solid rgba(255,255,255,.12);
            padding: 10px 15px;
            border-radius: 10px;
            cursor: pointer;
            text-decoration: none;
            font-family: Arial,sans-serif;
            transition: .18s ease;
            box-shadow: 0 0 16px rgba(255,255,255,.08), inset 0 1px 0 rgba(255,255,255,.06);
        }

            .like-button:hover,
            .button:hover {
                opacity: .92;
                transform: translateY(-1px);
                border-color: rgba(255,255,255,.18);
            }

            .like-button.liked {
                background: linear-gradient( 180deg, #4a2f37 0%, #2a181d 100% );
            }

        .like-count {
            color: var(--text-muted);
        }

        .section-nav {
            position: relative;
            overflow: visible;
            background: var(--world-index-background, var(--panel-bg));
            color: var(--world-index-text, var(--text-primary));
            border: 1px solid var(--border-color);
            border-radius: 18px;
            padding: 18px;
            margin-bottom: 26px;
            backdrop-filter: blur(18px);
            -webkit-backdrop-filter: blur(18px);
            box-shadow: 0 14px 34px rgba(0,0,0,0.22), 0 0 24px rgba(255,255,255,0.03);
        }

            .section-nav::before {
                content: "";
                position: absolute;
                inset: 0;
                background-image: var(--world-index-image);
                background-size: cover;
                background-position: center;
                opacity: var(--world-index-opacity, .85);
                z-index: 0;
            }

            .section-nav::after {
                content: "";
                position: absolute;
                inset: 0;
                background: rgba(0,0,0,var(--world-index-overlay,.35));
                z-index: 1;
            }

            .section-nav > * {
                position: relative;
                z-index: 2;
            }

        .index-header h2 {
            margin: 0;
            font-size: 1.15rem;
        }

        .index-header p {
            margin: 6px 0 18px;
            color: var(--world-index-text, var(--text-muted));
            font-size: .88rem;
        }

        .section-search {
            width: 100%;
            box-sizing: border-box;
            padding: 12px 14px;
            border-radius: 12px;
            border: 1px solid rgba(255,255,255,0.16);
            background: rgba(0,0,0,0.28);
            color: var(--world-index-text, white);
            margin-bottom: 14px;
            transition: .18s ease;
        }

            .section-search:focus {
                outline: none;
                border-color: rgba(255,255,255,0.16);
                box-shadow: 0 0 16px rgba(255,255,255,0.05);
            }

        .section-filters {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-bottom: 16px;
        }

        .filter-chip {
            background: var(--world-index-button-background, rgba(0,0,0,0.24));
            border: 1px solid rgba(255,255,255,0.14);
            padding: 7px 10px;
            border-radius: 999px;
            cursor: pointer;
            font-size: .8rem;
            color: var(--world-index-button-text, var(--world-index-text));
            transition: .18s ease;
        }

            .filter-chip.active,
            .filter-chip:hover {
                background: rgba(255,255,255,0.14);
                color: var(--world-index-text, white);
                border-color: rgba(255,255,255,0.26);
                box-shadow: 0 0 18px rgba(255,255,255,0.10);
            }

        .section-count {
            color: var(--world-index-text, var(--text-muted));
            font-size: .82rem;
            margin-bottom: 16px;
        }

        .left-sidebar {
            width: 280px;
            flex-shrink: 0;
            position: sticky;
            top: 110px;
            height: fit-content;
        }

        .content-column {
            flex: 1;
            min-width: 0;
        }

        #section-nav-links {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .section-nav a {
            display: block;
            padding: 13px 14px;
            border-radius: 14px;
            background: var(--world-index-button-background, rgba(0,0,0,0.18));
            border: 1px solid rgba(255,255,255,0.08);
            color: var(--world-index-button-text, var(--world-index-text));
            text-decoration: none;
            transition: .18s ease;
        }

            .section-nav a:hover {
                background: var( --world-index-button-background, rgba(255,255,255,0.12) );
                transform: translateX(4px);
                color: var(--world-index-text, white);
                border-color: rgba(255,255,255,0.18);
            }

            .section-nav a.active {
                border-color: rgba(255,255,255,0.26);
                background: rgba(255,255,255,0.16);
            }

            .section-nav a span {
                display: block;
                font-weight: 600;
            }

            .section-nav a small {
                display: block;
                margin-top: 5px;
                color: var( --world-index-button-text, var(--world-index-text) );
                font-size: .78rem;
            }

        .world-section {
            position: relative;
            overflow: hidden;
            background: var( --section-card-background, linear-gradient(180deg, rgba(255,255,255,.04), rgba(255,255,255,.012)) ), var(--card-bg);
            color: var(--section-card-text, var(--text-primary));
            border: 1px solid var(--border-color);
            border-radius: 18px;
            padding: 30px;
            margin-bottom: 24px;
            box-shadow: 0 14px 34px rgba(0,0,0,0.20);
            transition: .18s ease;
        }

            .world-section::before {
                content: "";
                position: absolute;
                inset: 0;
                background-image: var(--section-card-image);
                background-size: cover;
                background-position: center;
                opacity: var(--section-card-image-opacity, .85);
                z-index: 0;
            }

            .world-section::after {
                content: "";
                position: absolute;
                inset: 0;
                background: rgba(0,0,0,var(--section-card-overlay,.35));
                z-index: 1;
            }

            .world-section > * {
                position: relative;
                z-index: 2;
            }

            .world-section:hover {
                border-color: rgba(255,255,255,0.10);
                box-shadow: 0 18px 40px rgba(0,0,0,0.24), 0 0 24px rgba(255,255,255,0.03);
            }

            .world-section h2 {
                margin: 0 0 10px;
                font-size: 2rem;
            }

        .section-type {
            color: var(--section-card-text, var(--text-muted));
            margin-bottom: 18px;
            font-size: 0.95rem;
        }

        .section-content {
            color: var(--section-card-text, var(--text-primary));
            line-height: 1.9;
            overflow-wrap: break-word;
        }

            .section-content.rich-section-content {
                white-space: normal;
                font-family: Georgia, "Times New Roman", Times, serif;
                font-size: 18px;
                line-height: 1.75;
            }

                .section-content.rich-section-content p,
                .section-content.rich-section-content div {
                    margin: 0 0 1em;
                }

                    .section-content.rich-section-content p:last-child,
                    .section-content.rich-section-content div:last-child {
                        margin-bottom: 0;
                    }

                .section-content.rich-section-content h1,
                .section-content.rich-section-content h2,
                .section-content.rich-section-content h3,
                .section-content.rich-section-content h4 {
                    color: inherit;
                    line-height: 1.2;
                    margin: 1.2em 0 .45em;
                }

                .section-content.rich-section-content h1 {
                    font-size: 2.4rem;
                }

                .section-content.rich-section-content h2 {
                    font-size: 2rem;
                }

                .section-content.rich-section-content h3 {
                    font-size: 1.55rem;
                }

                .section-content.rich-section-content h4 {
                    font-size: 1.25rem;
                }

                .section-content.rich-section-content ul,
                .section-content.rich-section-content ol {
                    margin: 0 0 1em 1.35em;
                    padding-left: 1.15em;
                }

                .section-content.rich-section-content li {
                    margin: .35em 0;
                }

                .section-content.rich-section-content blockquote {
                    margin: 1.2em 0;
                    padding: 12px 18px;
                    border-left: 4px solid currentColor;
                    background: rgba(255,255,255,.06);
                    color: inherit;
                    opacity: .95;
                }

                .section-content.rich-section-content hr {
                    border: 0;
                    border-top: 1px solid currentColor;
                    opacity: .22;
                    margin: 28px 0;
                }

                .section-content.rich-section-content a {
                    color: inherit;
                    text-decoration: underline;
                    text-underline-offset: 3px;
                }

                .section-content.rich-section-content mark,
                .section-content.rich-section-content [style*="background-color"] {
                    border-radius: .18em;
                    box-decoration-break: clone;
                    -webkit-box-decoration-break: clone;
                }

                .section-content.rich-section-content,
                .section-content.rich-section-content * {
                    font-synthesis-weight: auto;
                    font-synthesis-style: auto;
                }

        .content-warning-panel {
            max-width: 760px;
            margin: 60px auto;
            background: var(--panel-bg);
            border: 1px solid rgba(255,214,102,.28);
            border-radius: 22px;
            padding: 32px;
            box-shadow: 0 18px 40px rgba(0,0,0,0.28);
        }

            .content-warning-panel h1 {
                margin-top: 0;
            }

        .warning-list {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin: 18px 0 24px;
        }

        .warning-pill {
            border: 1px solid rgba(255,214,102,.32);
            background: rgba(255,214,102,.10);
            color: #ffe6a3;
            border-radius: 999px;
            padding: 7px 11px;
        }

        .empty {
            color: var(--text-muted);
            line-height: 1.6;
        }

        .owner-actions {
            margin-top: 22px;
        }

        .notification-link {
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }

        .notification-badge {
            min-width: 18px;
            height: 18px;
            padding: 0 6px;
            border-radius: 999px;
            background: white;
            color: black;
            font-size: 0.72rem;
            align-items: center;
            justify-content: center;
            line-height: 1;
        }

        .credit-pill {
            position: absolute;
            left: 14px;
            bottom: 14px;
            z-index: 6;
            display: inline-flex;
            align-items: center;
            max-width: calc(100% - 28px);
            padding: 7px 11px;
            border-radius: 999px;
            border: 1px solid rgba(255,255,255,.16);
            background: rgba(0,0,0,.58);
            color: white;
            font-size: .78rem;
            text-decoration: none;
            backdrop-filter: blur(14px);
            -webkit-backdrop-filter: blur(14px);
            white-space: nowrap;
        }

            .credit-pill:hover {
                background: rgba(0,0,0,.75);
            }

        .credit-tooltip {
            position: absolute;
            left: 0;
            bottom: calc(100% + 8px);
            width: 240px;
            padding: 10px 12px;
            border-radius: 12px;
            background: rgba(0,0,0,.9);
            border: 1px solid rgba(255,255,255,.16);
            color: var(--text-secondary);
            font-size: .78rem;
            line-height: 1.45;
            opacity: 0;
            visibility: hidden;
            pointer-events: none;
            white-space: normal;
            box-shadow: 0 12px 28px rgba(0,0,0,.35);
        }

        .credit-pill:hover .credit-tooltip {
            opacity: 1;
            visibility: visible;
        }

        .credit-pill.show-tooltip .credit-tooltip {
            opacity: 1;
            visibility: visible;
        }

        .hero {
            padding-bottom: 70px;
        }

        .section-nav {
            padding-bottom: 85px;
        }

        .world-section {
            padding-bottom: 68px;
        }

        .section-image-credit-under {
            position: relative;
            display: inline-block;
            margin: -12px 0 20px;
        }

            .section-image-credit-under .credit-pill {
                position: relative;
                left: auto;
                bottom: auto;
            }

        @media (max-width: 800px) {
            header {
                flex-direction: column;
                gap: 14px;
                padding: 20px;
            }

            nav {
                justify-content: center;
            }

            main {
                flex-direction: column;
                padding: 30px 24px 70px;
            }

            .left-sidebar {
                width: 100%;
                position: static;
            }

            h1 {
                font-size: 2.2rem;
            }

            .hero {
                padding: 24px;
                padding-bottom: 90px;
            }

            .like-row {
                align-items: flex-start;
                flex-wrap: wrap;
            }

            .section-nav {
                padding-bottom: 95px;
            }
        }


        /* Saved Image Placement Rendering */
        .placed-image-stage {
            position: absolute;
            inset: 0;
            z-index: 0;
            overflow: hidden;
            border-radius: inherit;
            pointer-events: none;
        }

            .placed-image-stage img {
                position: absolute;
                inset: 0;
                width: 100%;
                height: 100%;
                object-fit: cover;
                transform-origin: center center;
                will-change: transform;
            }

        .hero .placed-image-stage {
            z-index: 0;
        }

        .section-nav .placed-image-stage,
        .world-section .placed-image-stage {
            z-index: 0;
        }

        .section-image-stage {
            position: relative;
            overflow: hidden;
            border-radius: 16px;
            margin-bottom: 20px;
            background: rgba(255,255,255,.04);
        }

            .section-image-stage img {
                position: absolute;
                inset: 0;
                width: 100%;
                height: 100%;
                object-fit: cover;
                transform-origin: center center;
            }
    </style>
</head>

<body>
    <div class="nullverse-stars"></div>
    <div id="world-background-layer"
         class="world-background-layer">

        <div id="world-background-image"
             class="world-background-image">
        </div>

        <div id="world-gradient-layer"
             class="world-gradient-layer">
        </div>

        <div id="world-background-overlay"
             class="world-background-overlay">
        </div>

    </div>

    <header>
        <div class="logo">
            <a href="index.html">
                <img src="Nullverse-3.png"
                     alt="Nullverse"
                     class="site-logo">
            </a>
        </div>

        <nav>
            <a href="index.html">Home</a>
            <a href="notifications.html">Notifications</a>
            <a href="explore.html">Explore</a>
            <a href="profile.html">Profile</a>
            <a href="dashboard.html">Dashboard</a>
            <a href="messages.html">Messages</a>
            <button onclick="logOut()">Log Out</button>
        </nav>
    </header>

    <main>
        <aside class="left-sidebar">

            <section id="section-nav"
                     class="section-nav"
                     style="display:none;">

                <div class="index-header">

                    <h2>
                        Search This World
                    </h2>

                    <p>
                        Jump between sections instantly
                    </p>

                </div>

                <input id="section-search"
                       class="section-search"
                       type="text"
                       placeholder="Search sections...">

                <div id="section-type-filter"
                     class="section-filters">
                </div>

                <div id="section-count"
                     class="section-count">
                </div>

                <div id="section-nav-links">
                </div>

            </section>

        </aside>

        <div class="content-column">
            <section class="hero">
                <div id="world-tags" class="tag-row"></div>

                <h1 id="world-title">Loading world...</h1>

                <p id="world-creator" class="creator"></p>

                <div id="world-summary" class="summary"></div>


                <div class="like-row">
                    <button id="like-button" class="like-button">
                        ♡ Like
                    </button>

                    <span id="like-count" class="like-count">
                        0 Likes
                    </span>

                    <a class="button" id="comments-link">
                        Comments
                    </a>

                    <a class="button" id="qa-link">
                        Q&A
                    </a>

                    <a class="button" id="community-link">
                        Community
                    </a>
                    <button class="button" id="report-world-btn">
                        Report
                    </button>
                </div>

                <div id="owner-actions" class="owner-actions"></div>


            </section>

            <section id="sections-container">
                <p class="empty">Loading sections...</p>
            </section>
        </div>
    </main>

    <div id="report-modal"
         style="
        display:none;
        position:fixed;
        inset:0;
        background:rgba(0,0,0,.75);
        z-index:9999;
        justify-content:center;
        align-items:center;
     ">

        <div style="
        width:500px;
        max-width:90%;
        background:var(--panel-bg);
        border:1px solid var(--border-color);
        border-radius:18px;
        padding:24px;
    ">

            <h2>Report World</h2>

            <select id="report-reason"
                    style="
                    width:100%;
                    padding:12px;
                    margin-bottom:12px;
                ">
                <option>Spam</option>
                <option>Harassment</option>
                <option>Hate Speech</option>
                <option>NSFW Content</option>
                <option>Copyright Violation</option>
                <option>Misinformation</option>
                <option>Impersonation</option>
                <option>Other</option>
            </select>

            <textarea id="report-details"
                      placeholder="Additional details..."
                      style="
                    width:100%;
                    height:120px;
                    padding:12px;
                    box-sizing:border-box;
                    margin-bottom:16px;
                  ">
        </textarea>

            <div style="display:flex;gap:10px;">
                <button class="button"
                        id="submit-report-btn">
                    Submit Report
                </button>

                <button class="button"
                        id="close-report-btn">
                    Cancel
                </button>
            </div>

        </div>
    </div>

    <script type="module">
        import { requireBetaAccess } from "./betaGate.js";
        import { supabase } from "./supabaseClient.js";
        import { setupNotificationBadge } from "./notificationBadge.js";
        import { createNotification } from "./notifications.js";
        import { setupMessageBadge } from "./messageBadge.js";
        setupMessageBadge();
        import {
            getCurrentUserWithPermissions,
            canModerateWorlds,
            canModerateContentOwner
        } from "./permissions.js?v=4";

        const currentUser = await requireBetaAccess();
        setupNotificationBadge();
        const {
            profile: currentProfile,
            permissions: currentPermissions
        } = await getCurrentUserWithPermissions(currentUser.id);

        const params = new URLSearchParams(window.location.search);
        const worldId = params.get("id");

        let currentWorld = null;
        let contentExperience = "balanced";
        let blockedContentWarnings = [];
        let ageRole = "unknown";
        let pendingWarningWorld = null;
        setupReportSystem();

        await loadViewerContentPreferences();

        if (!worldId) {
            showNotFound("No world ID was provided.");
        } else {
            await loadWorld(worldId);
        }

        document.addEventListener("click", (e) => {
            const pill = e.target.closest(".credit-pill");

            document.querySelectorAll(".credit-pill").forEach(p => {
                if (p !== pill) {
                    p.classList.remove("show-tooltip");
                }
            });

            if (pill) {
                e.preventDefault();
                pill.classList.toggle("show-tooltip");
            }
        });

        async function areUsersBlocked(userA, userB) {
            const { data, error } = await supabase
                .from("user_blocks")
                .select("id, blocker_id, blocked_id")
                .in("blocker_id", [userA, userB])
                .in("blocked_id", [userA, userB])
                .limit(1);

            if (error) {
                console.error("Block check error:", error);
                return false;
            }

            return data && data.length > 0;
        }

        async function loadViewerContentPreferences() {
            const { data: profile } = await supabase
                .from("profiles")
                .select("content_experience, blocked_content_warnings, age_role")
                .eq("id", currentUser.id)
                .single();

            if (!profile) return;

            contentExperience = profile.content_experience || "balanced";
            blockedContentWarnings = profile.blocked_content_warnings || [];
            ageRole = profile.age_role || "unknown";
        }

        function getWorldSafetyInfo(world) {
            const safeWarnings = [
                "gore",
                "sexual_content",
                "disturbing_imagery"
            ];

            const warnings = world.content_warnings || [];
            const rating = world.content_rating || "general";

            const hasHardBlockedWarning =
                warnings.some(warning =>
                    blockedContentWarnings.includes(warning)
                );

            const hasSafeWarning =
                warnings.some(warning =>
                    safeWarnings.includes(warning)
                );

            const isAdult =
                rating === "adult";

            return {
                warnings,
                rating,
                hasHardBlockedWarning,
                hasSafeWarning,
                isAdult
            };
        }

        function shouldBlockWorld(world) {
            const info = getWorldSafetyInfo(world);

            if (ageRole === "minor") {
                return info.isAdult || info.hasSafeWarning;
            }

            if (info.hasHardBlockedWarning) {
                return true;
            }

            if (contentExperience === "safe") {
                return info.isAdult || info.hasSafeWarning;
            }

            return false;
        }

        function shouldWarnWorld(world) {
            const info = getWorldSafetyInfo(world);

            if (contentExperience !== "balanced") {
                return false;
            }

            if (ageRole === "minor") {
                return false;
            }

            if (info.hasHardBlockedWarning) {
                return false;
            }

            return info.isAdult || info.hasSafeWarning;
        }

        async function loadWorld(id) {
            const { data: world, error } = await supabase
                .from("worlds")
                .select("*")
                .eq("id", id)
                .eq("visibility", "published")
                .single();

            if (error || !world) {
                showNotFound("This world does not exist or is not published.");
                return;
            }



            currentWorld = world;

            if (shouldBlockWorld(world)) {
                showContentBlocked(world);
                return;
            }

            const warningAccepted =
                params.get("contentOk") === world.id;

            if (shouldWarnWorld(world) && !warningAccepted) {
                pendingWarningWorld = world;
                showContentWarning(world);
                return;
            }

            await renderLoadedWorld(world);

        }

        async function renderLoadedWorld(world) {
            applyWorldTheme(world);

            const blocked = await areUsersBlocked(
                currentUser.id,
                world.owner_id
            );

            if (blocked) {
                showNotFound("This world is unavailable.");
                return;
            }

            const ownerAccess =
                currentUser &&
                currentUser.id === world.owner_id;

            if (
                world.moderation_status === "hidden" &&
                !ownerAccess &&
                !canModerateWorlds(currentPermissions)
            ) {
                showNotFound("This world has been hidden by Nullverse staff.");
                return;
            }

            const { data: profile } = await supabase
                .from("profiles")
                .select("id, username, display_name, role, role_name")
                .eq("id", world.owner_id)
                .single();

            currentWorld.ownerProfile = profile;

            document
                .getElementById("world-background-layer")
                .insertAdjacentHTML(
                    "beforeend",
                    buildCreditPill({
                        type: world.background_credit_type,
                        name: world.background_credit_name,
                        username: world.background_credit_nullverse_username,
                        url: world.background_credit_url,
                        note: world.background_credit_note,
                        ownerUsername: world.ownerProfile?.username,
                        context: "Background Image"
                    })
                );

            document.title = `${world.title || "World"} - Nullverse`;

            document.getElementById("world-title").textContent =
                world.title || "Untitled World";

            document.getElementById("world-summary").textContent =
                world.summary || "No summary provided.";



            if (profile) {
                document.getElementById("world-creator").innerHTML =
                    `by <a href="profile.html?user=${encodeURIComponent(profile.username)}">${escapeHtml(profile.display_name || profile.username)} (@${escapeHtml(profile.username)})</a>`;
            } else {
                document.getElementById("world-creator").textContent =
                    "by Unknown Creator";
            }

            renderTags(world);

            document.querySelector(".hero").insertAdjacentHTML(
                "afterbegin",
                buildPlacedImageStage(world.theme_overview_card_image_url, world.theme_overview_card_image_placement, "hero-placed-image")
            );

            document.querySelector(".hero").insertAdjacentHTML(
                "beforeend",
                buildCreditPill({
                    type: world.overview_card_credit_type,
                    name: world.overview_card_credit_name,
                    username: world.overview_card_credit_nullverse_username,
                    url: world.overview_card_credit_url,
                    note: world.overview_card_credit_note,
                    ownerUsername: profile?.username,
                    context: "Overview Image"
                })
            );

            renderOwnerActions(world);

            try {
                await loadLikes();
            } catch (error) {
                console.error("World likes load error:", error);
            }

            await loadSections(world.id);

            document.getElementById("comments-link").href =
                `world-comments.html?id=${encodeURIComponent(world.id)}`;

            document.getElementById("qa-link").href =
                `world-qa.html?id=${encodeURIComponent(world.id)}`;

            document.getElementById("community-link").href =
                `world-additions.html?id=${encodeURIComponent(world.id)}`;
        }




        function normalizeImagePlacement(value) {
            let parsed = value;

            if (typeof parsed === "string") {
                try {
                    parsed = JSON.parse(parsed);
                } catch {
                    parsed = null;
                }
            }

            return {
                x: 0,
                y: 0,
                scale: 1,
                rotation: 0,
                fit: "cover",
                ...(parsed && typeof parsed === "object" ? parsed : {})
            };
        }

        function buildPlacedImageStage(url, placement, className = "") {
            if (!url) {
                return "";
            }

            const safe = normalizeImagePlacement(placement);

            return `
                                                <div class="placed-image-stage ${escapeHtml(className)}">
                                                    <img
                                                        src="${escapeHtml(url)}"
                                                        alt=""
                                                        style="
                                                            object-fit:${escapeHtml(safe.fit || "cover")};
                                                            transform:translate(${Number(safe.x) || 0}px, ${Number(safe.y) || 0}px) rotate(${Number(safe.rotation) || 0}deg) scale(${Number(safe.scale) || 1});
                                                        ">
                                                </div>
                                            `;
        }

        function getSectionImageStage(section) {
            if (!section.image_url) {
                return "";
            }

            const isFull = section.image_position === "full";
            const width = isFull ? "100%" : "320px";
            const height = isFull ? "360px" : "260px";
            const safe = normalizeImagePlacement(section.image_placement);

            return `
                                                <div
                                                    class="section-image-stage"
                                                    style="
                                                        width:${width};
                                                        max-width:100%;
                                                        height:${height};
                                                        display:block;
                                                        float:${section.image_position === "left" ? "left" : section.image_position === "right" ? "right" : "none"};
                                                        margin-right:${section.image_position === "left" ? "22px" : "0"};
                                                        margin-left:${section.image_position === "right" ? "22px" : "0"};
                                                    ">
                                                    <img
                                                        src="${escapeHtml(section.image_url)}"
                                                        alt=""
                                                        style="
                                                            object-fit:${escapeHtml(safe.fit || "cover")};
                                                            transform:translate(${Number(safe.x) || 0}px, ${Number(safe.y) || 0}px) rotate(${Number(safe.rotation) || 0}deg) scale(${Number(safe.scale) || 1});
                                                        ">
                                                </div>
                                            `;
        }

        function applyWorldTheme(world) {

            const root = document.documentElement;

            const accent = "#e8e8ef";
            const background = "#000000";
            const panel = "var(--panel-bg)";
            const text = "#f5f5f5";


            let buttonBackground =
                "linear-gradient(180deg,#2a2a2f,#0d0d10)";

                                                    180deg,

            );

            root.style.setProperty(
                "--world-panel",

            );

            root.style.setProperty(
                "--world-text",

            );

            const glow =
                hexToRgb(accent, 0.16);

            let heroBackground =
                "linear-gradient(135deg,rgba(255,255,255,.06),rgba(255,255,255,.02))";

            if (
                world.theme_overview_card_style ===
                "solid"
            ) {
                heroBackground =
                    world.theme_overview_card_color_1;
            }

            if (
                world.theme_overview_card_style === "gradient" ||
                world.theme_overview_card_style === "image"
            ) {
                heroBackground =
                    `linear-gradient(
                                                    135deg,
                                                    ${world.theme_overview_card_color_1 || "#141416"},
                                                    ${world.theme_overview_card_color_2 || "#0b0b0d"}
                                                )`;
            }

            root.style.setProperty(

            root.style.setProperty(
                "--hero-overlay",
                world.theme_overview_card_overlay ?? .35

            root.style.setProperty(
                "--world-glow",

            let indexBackground =
                "linear-gradient(135deg,rgba(255,255,255,.06),rgba(255,255,255,.02))";

            if (world.theme_index_style === "solid") {

                    world.theme_index_color_1 || "#141416";
            }

            if (
                world.theme_index_style === "gradient" ||

                indexBackground =
                    `linear-gradient(
                                                    135deg,
                                                    ${world.theme_index_color_1 || "#141416"},
                                                    ${world.theme_index_color_2 || "#0b0b0d"}
                                                )`;
            }

            root.style.setProperty(
                "--world-index-background",
                indexBackground
            );

            root.style.setProperty(
                "--world-index-text",
                world.theme_index_text_color || "#f5f5f5"
            );

            root.style.setProperty(
                "--world-index-image",
                "none"
            );

            root.style.setProperty(
                "--world-index-opacity",
                world.theme_index_opacity ?? .85
            );

            root.style.setProperty(
                "--world-index-overlay",
                world.theme_index_overlay ?? .35
            );

            let indexButtonBackground =
                "rgba(0,0,0,0.18)";

            if (
                world.theme_index_button_style ===
                "solid"
            ) {
                indexButtonBackground =
                    world.theme_index_button_color_1;
            }

            if (
                world.theme_index_button_style ===
                "gradient"
            ) {
                indexButtonBackground =
                    `linear-gradient(
                                                    180deg,
                                                    ${world.theme_index_button_color_1},
                                                    ${world.theme_index_button_color_2}
                                                )`;
            }

            root.style.setProperty(
                "--world-index-button-background",
                indexButtonBackground
            );

            root.style.setProperty(
                "--world-index-button-text",
                world.theme_index_button_text_color ||
                "#f5f5f5"
            );

            const imageLayer =
                document.getElementById(
                    "world-background-image"
                );

            const gradientLayer =
                document.getElementById(
                    "world-gradient-layer"

            const overlayLayer =
                document.getElementById(
                    "world-background-overlay"
                );

            imageLayer.style.backgroundImage = "none";

            if (world.theme_background_image_url) {

                imageLayer.style.backgroundImage =
                    `url("${world.theme_background_image_url}")`;

                imageLayer.style.filter =
                    `blur(${world.theme_background_image_blur || 0}px)`;

                imageLayer.style.backgroundRepeat =
                    world.theme_background_image_repeat ||
                    "no-repeat";

                imageLayer.style.backgroundPosition =
                    `${world.theme_background_position_x || 50}% ${world.theme_background_position_y || 50}%`;

                const savedSize =
                    world.theme_background_image_size || "cover";

                imageLayer.style.backgroundSize =
                    savedSize === "auto"
                        ? `${world.theme_background_zoom || 100}%`
                        : savedSize;

                const backgroundPlacement = normalizeImagePlacement(world.theme_background_image_placement);
                imageLayer.style.backgroundSize = backgroundPlacement.fit === "contain" ? "contain" : imageLayer.style.backgroundSize;
                imageLayer.style.transformOrigin = "center center";
                imageLayer.style.transform = `translate(${Number(backgroundPlacement.x) || 0}px, ${Number(backgroundPlacement.y) || 0}px) rotate(${Number(backgroundPlacement.rotation) || 0}deg) scale(${Number(backgroundPlacement.scale) || 1})`;
            }

            let gradientBackground =
                world.theme_background_image_url
                    ? "transparent"
                    : "var(--page-bg)";

            if (world.theme_gradient_enabled) {

                    world.theme_gradient_strength ===
                    "subtle"
                ) {
                    opacity = "0.14";
                }

                if (
                    world.theme_gradient_strength ===
                    "strong"
                ) {
                    opacity = "0.34";
                }

                const color1 =
                    hexToRgb(
                        world.theme_gradient_color_1,
                        opacity
                    );

                const color2 =
                    hexToRgb(
                        world.theme_gradient_color_2,
                        opacity
                    );



                gradientBackground = `
                                                radial-gradient(
                                                    circle at 15% 10%,
                                                    ${color1},
                                                    transparent 30%
                                                ),

                                                radial-gradient(
                                                    circle at 85% 20%,
                                                    ${color2},
                                                    transparent 34%
                                                ),

                                                linear-gradient(
                                                    ${world.theme_gradient_direction || "180deg"},
                                                    ${world.theme_gradient_color_1},
                                                    ${world.theme_gradient_color_2}
                                                )

            }

            gradientLayer.style.background =
                gradientBackground;

            overlayLayer.style.background =
                `rgba(
                                                0,
                                                0,
                                                0,
                                                ${world.theme_background_overlay_strength ?? .35}
                                            )`;

            document.body.style.color =
                text;
        }

        function hexToRgb(hex, alpha = 1) {

            if (!hex) return `rgba(255,255,255,${alpha})`;

            const cleaned =
                hex.replace("#", "");

            const bigint =
                parseInt(cleaned, 16);

            const r =
                (bigint >> 16) & 255;

            const g =
                (bigint >> 8) & 255;

            const b =
                bigint & 255;

            return `rgba(${r}, ${g}, ${b}, ${alpha})`;
        }

        function buildSectionCardStyle(section) {
            let cardBackground =
                "linear-gradient(180deg, rgba(255,255,255,.04), rgba(255,255,255,.012))";

            if (section.theme_card_style === "solid") {
                cardBackground =
                    section.theme_card_color_1 || "#141416";
            }

            if (
                section.theme_card_style === "gradient" ||
                section.theme_card_style === "image"
            ) {
                cardBackground =
                    `linear-gradient(135deg, ${section.theme_card_color_1 || "#141416"}, ${section.theme_card_color_2 || "#0b0b0d"})`;
            }

            const cardImage = "none";

            return `
                                                --section-card-background: ${cardBackground};
                                                --section-card-text: ${section.theme_card_text_color || "#f5f5f5"};
                                                --section-card-image: ${cardImage};
                                                --section-card-image-opacity: ${section.theme_card_opacity ?? .85};
                                                --section-card-overlay: ${section.theme_card_overlay ?? .35};
                                            `;
        }

        function sortWorldSectionsForDisplay(sections) {
            return [...(sections || [])].sort((a, b) => {
                const aOrder = Number(a?.display_order);
                const bOrder = Number(b?.display_order);
                const aHasOrder = Number.isFinite(aOrder);
                const bHasOrder = Number.isFinite(bOrder);

                if (aHasOrder && bHasOrder && aOrder !== bOrder) {
                    return aOrder - bOrder;
                }

                if (aHasOrder && !bHasOrder) {
                    return -1;
                }

                if (!aHasOrder && bHasOrder) {
                    return 1;
                }

                const aDate = new Date(a?.created_at || 0).getTime();
                const bDate = new Date(b?.created_at || 0).getTime();

                if (Number.isFinite(aDate) && Number.isFinite(bDate)) {
                    return aDate - bDate;
                }

                return 0;
            });
        }

        function safeWorldSectionCardStyle(section) {
            try {
                return buildSectionCardStyle(section || {});
            } catch (error) {
                console.error("World section card style error:", error, section);
                return `
                            --section-card-background: linear-gradient(180deg, rgba(255,255,255,.04), rgba(255,255,255,.012));
                            --section-card-text: #f5f5f5;
                            --section-card-image: none;
                            --section-card-image-opacity: .85;
                            --section-card-overlay: .35;
                        `;
            }
        }

        function safeWorldPlacedImageStage(url, placement, className = "") {
            try {
                return buildPlacedImageStage(url, placement, className) || "";
            } catch (error) {
                console.error("World placed image render error:", error);
                return "";
            }
        }

        function safeWorldSectionImageStage(section) {
            try {
                return getSectionImageStage(section || {}) || "";
            } catch (error) {
                console.error("World section image render error:", error, section);
                return "";
            }
        }

        function safeWorldCreditPill(config) {
            try {
                return buildCreditPill(config || {}) || "";
            } catch (error) {
                console.error("World credit pill render error:", error, config);
                return "";
            }
        }

        function renderWorldSectionArticle(section, index) {

            const sectionId = `section-${index}`;

            try {

                                                <div class="section-type">

                                                </div>

                                                ${safeWorldSectionImageStage(safeSection)}

                                                ${safeSection.image_url ? `
                                    <div class="section-image-credit-under">
                                        ${safeWorldCreditPill({
                    type: safeSection.image_credit_type,

                })}
                                    </div>
` : ""}

                                                <div class="section-content rich-section-content">
                                                    ${formatWorldSectionContent(safeSection.content)}
                                                </div>

                                                ${safeWorldCreditPill({
                    type: safeSection.card_credit_type,

                })}

</article>
`;
            } catch (error) {
                console.error("World section article render error:", error, safeSection);

                return `
<article id="${sectionId}"
                 class="world-section"
                 style="
                     --section-card-background: linear-gradient(180deg, rgba(255,255,255,.04), rgba(255,255,255,.012));

                     --section-card-overlay: .35;
                 ">
            <h2>${escapeHtml(safeSection.title || "Untitled Section")}</h2>
            <div class="section-type">${escapeHtml(safeSection.section_type || "Section")}</div>
            <div class="section-content rich-section-content">
                ${escapeHtml(String(safeSection.content || "This section could not be rendered yet.")).replaceAll("\n", "<br>")}
            </div>
</article>
`;
            }
        }

        async function loadSections(id) {
            const container = document.getElementById("sections-container");

            if (!container) {
                return;
            }

            container.innerHTML = `<p class="empty">Loading sections...</p>`;

            try {
                const { data, error } = await supabase
                    .from("world_sections")
                    .select("*")
                    .eq("world_id", id)
                    .order("created_at", { ascending: true });

                if (error) {
                    throw error;
                }

                const sections = sortWorldSectionsForDisplay(data || []);

                if (!sections.length) {
                    container.innerHTML =
                        `<p class="empty">This world does not have any public sections yet.</p>`;

                    try {
                        document.getElementById("section-nav").style.display = "none";
                    } catch {
                    }

                    return;
                }

                container.innerHTML = sections
                    .map((section, index) => renderWorldSectionArticle(section, index))
                    .join("");

                try {
                    renderSectionNav(sections);
                } catch (navError) {
                    console.error("World section navigation render error:", navError);

                    const nav = document.getElementById("section-nav");

                    if (nav) {
                        nav.style.display = "none";
                    }
                }
            } catch (error) {
                console.error("World sections load error:", error);

                container.innerHTML = `
                            <p class="empty">
                                Sections could not load right now.
                                ${escapeHtml(error?.message || "Check the browser console for details.")}
                            </p>
                        `;
            }
        }

        function getWorldSearchableSectionText(value) {
            const raw = decodeWorldRichHtmlEntities(String(value || ""));

            try {
                const holder = document.createElement("div");
                holder.innerHTML = sanitizeWorldSectionHtml(raw);
                return holder.textContent || holder.innerText || raw;
            } catch (error) {
                console.error("World section searchable text error:", error);

                return raw
                    .replace(/<script[\s\S]*?<\/script>/gi, " ")
                    .replace(/<style[\s\S]*?<\/style>/gi, " ")
                    .replace(/<[^>]+>/g, " ");
            }
        }

        function renderSectionNav(sections) {
            const nav = document.getElementById("section-nav");
            const links = document.getElementById("section-nav-links");
            const search = document.getElementById("section-search");
            const filters = document.getElementById("section-type-filter");
            const count = document.getElementById("section-count");

            if (!nav || !links || !search || !filters || !count) {
                return;
            }

            if (!sections || sections.length <= 1) {
                nav.style.display = "none";
                return;
            }

            nav.style.display = "block";

            nav.querySelectorAll(".placed-image-stage").forEach(stage => stage.remove());

            try {
                nav.insertAdjacentHTML(
                    "afterbegin",
                    safeWorldPlacedImageStage(
                        currentWorld?.theme_index_image_url,
                        currentWorld?.theme_index_image_placement,
                        "index-placed-image"
                    )
                );
            } catch (error) {
                console.error("World index image render error:", error);
            }

            const oldIndexCredit =
                nav.querySelector(".credit-pill");

            if (oldIndexCredit) {
                oldIndexCredit.remove();
            }

            nav.insertAdjacentHTML(
                "beforeend",
                safeWorldCreditPill({
                    type: currentWorld?.index_credit_type,
                    name: currentWorld?.index_credit_name,
                    username: currentWorld?.index_credit_nullverse_username,
                    url: currentWorld?.index_credit_url,
                    note: currentWorld?.index_credit_note,
                    ownerUsername: currentWorld?.ownerProfile?.username,
                    context: "Index Image"
                })
            );

            const types = [...new Set(
                sections
                    .map(section => String(section?.section_type || "Section").trim())
                    .filter(Boolean)
            )];

            filters.innerHTML = `
                                                    <button class="filter-chip active" data-type="All">All</button>
                                                    ${types.map(type => `
                                                        <button class="filter-chip" data-type="${escapeHtml(type)}">
                                                            ${escapeHtml(type)}
                                                        </button>
                                                    `).join("")}
                                                `;

            let activeType = "All";

            function draw() {
                try {
                    const query = (search.value || "").toLowerCase().trim();

                    const filtered = sections.filter(section => {
                        const title = String(section?.title || "").toLowerCase();
                        const type = String(section?.section_type || "Section").trim();
                        const content = getWorldSearchableSectionText(section?.content || "").toLowerCase();

                        const matchesSearch =
                            title.includes(query) ||
                            type.toLowerCase().includes(query) ||
                            content.includes(query);

                        const matchesType =
                            activeType === "All" || type === activeType;

                        return matchesSearch && matchesType;
                    });

                    count.textContent =
                        `${filtered.length} ${filtered.length === 1 ? "Section" : "Sections"}`;

                    if (!filtered.length) {
                        links.innerHTML = `
                                                            <p class="empty">
                                                                No sections match this search.
                                                            </p>
                                                        `;
                        return;
                    }

                    links.innerHTML = filtered.map(section => {
                        const realIndex = sections.indexOf(section);

                        return `
                                                            <a href="#section-${realIndex}">
                                                                <span>${escapeHtml(section?.title || "Untitled")}</span>
                                                                <small>${escapeHtml(section?.section_type || "Section")}</small>
                                                            </a>
                                                        `;
                    }).join("");
                } catch (error) {
                    console.error("World section navigation draw error:", error);

                    links.innerHTML = `
                                <p class="empty">
                                    Section search is unavailable, but the sections are still shown below.
                                </p>
                            `;
                }
            }

            const nextFilters = filters.cloneNode(true);
            filters.replaceWith(nextFilters);

            nextFilters.addEventListener("click", function (e) {
                const button = e.target.closest(".filter-chip");
                if (!button) return;

                activeType = button.dataset.type || "All";

                nextFilters.querySelectorAll(".filter-chip").forEach(chip => {
                    chip.classList.remove("active");
                });

                button.classList.add("active");

                draw();
            });

            search.oninput = draw;

            draw();
        }

        window.setWorldModerationStatus = async function (status) {
            if (!currentWorld || !canModerateWorlds(currentPermissions)) return;

            const reasonInput = document.getElementById("world-hide-reason");
            const reason = reasonInput ? reasonInput.value.trim() : "";

            if (status === "hidden" && !reason) {
                const message = document.getElementById("world-moderation-message");
                if (message) {
                    message.textContent = "Enter a reason before hiding this world.";
                }
                return;
            }

            const { error } = await supabase
                .from("worlds")
                .update({
                    moderation_status: status,
                    moderation_reason: status === "hidden" ? reason : null
                })
                .eq("id", currentWorld.id);

            const message = document.getElementById("world-moderation-message");

            if (error) {
                if (message) message.textContent = error.message;
                return;
            }

            const logReason =
                status === "hidden"
                    ? reason
                    : `World "${currentWorld.title || "Untitled World"}" restored to visible.`;

            await supabase
                .from("moderation_logs")
                .insert({
                    target_user_id: currentWorld.owner_id,
                    moderator_id: currentUser.id,
                    action: `world_${status}`,
                    reason: logReason,
                    expires_at: null
                });

            if (status === "hidden") {
                await createNotification({
                    recipientId: currentWorld.owner_id,
                    actorId: currentUser.id,
                    worldId: currentWorld.id,
                    type: "world_hidden",
                    message: `Your world "${currentWorld.title || "Untitled World"}" was hidden by moderation. Reason: ${reason}`,
                    link: `dashboard.html`
                });
            }

            if (status === "visible") {
                await createNotification({
                    recipientId: currentWorld.owner_id,
                    actorId: currentUser.id,
                    worldId: currentWorld.id,
                    type: "world_restored",
                    message: `Your world "${currentWorld.title || "Untitled World"}" was restored by moderation.`,
                    link: `world.html?id=${encodeURIComponent(currentWorld.id)}`
                });
            }

            if (message) {
                message.textContent = `World set to ${status}.`;
            }

            setTimeout(() => {
                window.location.reload();
            }, 700);
        };
