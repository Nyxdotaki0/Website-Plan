<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" href="favicon.png">
    <title>World - Nullverse</title>

    <script>
        const savedNullverseTheme =
            localStorage.getItem("nullverse-theme") || "void";

        document.documentElement.setAttribute(
            "data-theme",
            savedNullverseTheme
        );
    </script>

    <link rel="stylesheet" href="theme.css?v=25">

    <style>
        html {
            min-height: 100%;
            background: #000000;
        }

        body {
            margin: 0;
            min-height: 100vh;
            font-family: Arial, sans-serif;
            background: #000;
            background-attachment: fixed;
            color: var(--text-primary);
            transition: background 0.25s ease, color 0.25s ease;
        }
        .world-background-layer {
            position: fixed;
            inset: 0;
            z-index: 0;
            overflow: hidden;
            pointer-events: none;
        }

        header,
        main {
            position: relative;
            z-index: 2;
        }

        .world-background-image {
            position: absolute;
            inset: 0;
            background-position: center;
            background-size: cover;
            background-repeat: no-repeat;
        }

        .world-background-overlay {
            position: absolute;
            inset: 0;
            background: rgba(0,0,0,.35);
        }

        .world-gradient-layer {
            position: absolute;
            inset: 0;
        }

        header {
            padding: 12px 40px;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(12,12,14,0.72);
            position: sticky;
            top: 0;
            z-index: 100;
            backdrop-filter: blur(18px);
            -webkit-backdrop-filter: blur(18px);
            box-shadow: 0 10px 35px rgba(0,0,0,0.28);
        }

        .logo,
        .logo a {
            display: flex;
            align-items: center;
        }

        .site-logo {
            height: 64px;
            width: auto;
            display: block;
            max-width: none;
        }

        nav {
            display: flex;
            gap: 22px;
            flex-wrap: wrap;
            align-items: center;
        }

            nav a,
            nav button {
                color: var(--text-secondary);
                text-decoration: none;
                background: none;
                border: none;
                cursor: pointer;
                font-family: Arial, sans-serif;
                font-size: 0.95rem;
                transition: .18s ease;
            }

                nav a:hover,
                nav button:hover {
                    color: white;
                }

        main {
            display: flex;
            gap: 28px;
            max-width: 1400px;
            margin: auto;
            padding: 45px 40px 80px;
        }

        .hero {
            position: relative;
            overflow: hidden;
            background: var( --hero-background, linear-gradient( 135deg, rgba(255,255,255,0.06), rgba(255,255,255,0.02) ) ), var(--panel-bg);
            border: 1px solid var(--border-color);
            border-radius: 22px;
            padding: 36px;
            margin-bottom: 28px;
            backdrop-filter: blur(18px);
            -webkit-backdrop-filter: blur(18px);
            box-shadow: 0 18px 40px rgba(0,0,0,0.24), 0 0 24px rgba(255,255,255,0.03);
        }

            .hero::before {
                content: "";
                position: absolute;
                inset: 0;
                background-image: var(--hero-image);
                background-size: cover;
                background-position: center;
                opacity: var(--hero-image-opacity,.85);
                z-index: 0;
            }

            .hero::after {
                content: "";
                position: absolute;
                inset: 0;
                background: rgba( 0, 0, 0, var(--hero-overlay,.35) );
                z-index: 1;
            }

            .hero > * {
                position: relative;
                z-index: 2;
            }

        .tag-row {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            margin-bottom: 18px;
        }

        .tag {
            display: inline-block;
            font-size: 0.82rem;
            color: var(--text-secondary);
            border: 1px solid var(--border-color);
            background: rgba(255,255,255,0.04);
            border-radius: 999px;
            padding: 7px 11px;
        }

        h1 {
            color: var(--hero-text-color, var(--text-primary));
        }

        .creator {
            color: var(--hero-text-color, var(--text-muted));
        }

            .creator a {
                color: var(--text-secondary);
                text-decoration: none;
            }

                .creator a:hover {
                    color: white;
                }

        .summary {
            color: var(--hero-text-color, var(--text-secondary));
        }

        .like-row {
            display: flex;
            align-items: center;
            gap: 14px;
            margin-top: 26px;
            flex-wrap: wrap;
        }

        .like-button,
        .button {
            display: inline-block;
            background: var( --world-button-background, linear-gradient(180deg,#2a2a2f,#0d0d10) );
            color: var( --world-button-text, #f5f5f5 );
            border: 1px solid rgba(255,255,255,.12);
            padding: 10px 15px;
            border-radius: 10px;
            cursor: pointer;
            text-decoration: none;
            font-family: Arial,sans-serif;
            transition: .18s ease;
            box-shadow: 0 0 16px rgba(255,255,255,.08), inset 0 1px 0 rgba(255,255,255,.06);
        }

            .like-button:hover,
            .button:hover {
                opacity: .92;
                transform: translateY(-1px);
                border-color: rgba(255,255,255,.18);
            }

            .like-button.liked {
                background: linear-gradient( 180deg, #4a2f37 0%, #2a181d 100% );
            }

        .like-count {
            color: var(--text-muted);
        }

        .section-nav {
            position: relative;
            overflow: hidden;
            background: var(--world-index-background, var(--panel-bg));
            color: var(--world-index-text, var(--text-primary));
            border: 1px solid var(--border-color);
            border-radius: 18px;
            padding: 18px;
            margin-bottom: 26px;
            backdrop-filter: blur(18px);
            -webkit-backdrop-filter: blur(18px);
            box-shadow: 0 14px 34px rgba(0,0,0,0.22), 0 0 24px rgba(255,255,255,0.03);
        }

            .section-nav::before {
                content: "";
                position: absolute;
                inset: 0;
                background-image: var(--world-index-image);
                background-size: cover;
                background-position: center;
                opacity: var(--world-index-opacity, .85);
                z-index: 0;
            }

            .section-nav::after {
                content: "";
                position: absolute;
                inset: 0;
                background: rgba(0,0,0,var(--world-index-overlay,.35));
                z-index: 1;
            }

            .section-nav > * {
                position: relative;
                z-index: 2;
            }

        .index-header h2 {
            margin: 0;
            font-size: 1.15rem;
        }

        .index-header p {
            margin: 6px 0 18px;
            color: var(--world-index-text, var(--text-muted));
            font-size: .88rem;
        }

        .section-search {
            width: 100%;
            box-sizing: border-box;
            padding: 12px 14px;
            border-radius: 12px;
            border: 1px solid rgba(255,255,255,0.16);
            background: rgba(0,0,0,0.28);
            color: var(--world-index-text, white);
            margin-bottom: 14px;
            transition: .18s ease;
        }

            .section-search:focus {
                outline: none;
                border-color: rgba(255,255,255,0.16);
                box-shadow: 0 0 16px rgba(255,255,255,0.05);
            }

        .section-filters {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-bottom: 16px;
        }

        .filter-chip {
            background: var(--world-index-button-background, rgba(0,0,0,0.24));
            border: 1px solid rgba(255,255,255,0.14);
            padding: 7px 10px;
            border-radius: 999px;
            cursor: pointer;
            font-size: .8rem;
            color: var(--world-index-button-text, var(--world-index-text));
            transition: .18s ease;
        }

            .filter-chip.active,
            .filter-chip:hover {
                background: rgba(255,255,255,0.14);
                color: var(--world-index-text, white);
                border-color: rgba(255,255,255,0.26);
                box-shadow: 0 0 18px rgba(255,255,255,0.10);
            }

        .section-count {
            color: var(--world-index-text, var(--text-muted));
            font-size: .82rem;
            margin-bottom: 16px;
        }

        .left-sidebar {
            width: 280px;
            flex-shrink: 0;
            position: sticky;
            top: 110px;
            height: fit-content;
        }

        .content-column {
            flex: 1;
            min-width: 0;
        }

        #section-nav-links {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .section-nav a {
            display: block;
            padding: 13px 14px;
            border-radius: 14px;
            background: var(--world-index-button-background, rgba(0,0,0,0.18));
            border: 1px solid rgba(255,255,255,0.08);
            color: var(--world-index-button-text, var(--world-index-text));
            text-decoration: none;
            transition: .18s ease;
        }

            .section-nav a:hover {
                background: var( --world-index-button-background, rgba(255,255,255,0.12) );
                transform: translateX(4px);
                color: var(--world-index-text, white);
                border-color: rgba(255,255,255,0.18);
            }

            .section-nav a.active {
                border-color: rgba(255,255,255,0.26);
                background: rgba(255,255,255,0.16);
            }

            .section-nav a span {
                display: block;
                font-weight: 600;
            }

            .section-nav a small {
                display: block;
                margin-top: 5px;
                color: var( --world-index-button-text, var(--world-index-text) );
                font-size: .78rem;
            }

        .world-section {
            position: relative;
            overflow: hidden;
            background: var( --section-card-background, linear-gradient(180deg, rgba(255,255,255,.04), rgba(255,255,255,.012)) ), var(--card-bg);
            color: var(--section-card-text, var(--text-primary));
            border: 1px solid var(--border-color);
            border-radius: 18px;
            padding: 30px;
            margin-bottom: 24px;
            box-shadow: 0 14px 34px rgba(0,0,0,0.20);
            transition: .18s ease;
        }

            .world-section::before {
                content: "";
                position: absolute;
                inset: 0;
                background-image: var(--section-card-image);
                background-size: cover;
                background-position: center;
                opacity: var(--section-card-image-opacity, .85);
                z-index: 0;
            }

            .world-section::after {
                content: "";
                position: absolute;
                inset: 0;
                background: rgba(0,0,0,var(--section-card-overlay,.35));
                z-index: 1;
            }

            .world-section > * {
                position: relative;
                z-index: 2;
            }

            .world-section:hover {
                border-color: rgba(255,255,255,0.10);
                box-shadow: 0 18px 40px rgba(0,0,0,0.24), 0 0 24px rgba(255,255,255,0.03);
            }

            .world-section h2 {
                margin: 0 0 10px;
                font-size: 2rem;
            }

        .section-type {
            color: var(--section-card-text, var(--text-muted));
            margin-bottom: 18px;
            font-size: 0.95rem;
        }

        .section-content {
            white-space: pre-wrap;
            color: var(--section-card-text, var(--text-primary));
            line-height: 1.9;
        }

        .content-warning-panel {
            max-width: 760px;
            margin: 60px auto;
            background: var(--panel-bg);
            border: 1px solid rgba(255,214,102,.28);
            border-radius: 22px;
            padding: 32px;
            box-shadow: 0 18px 40px rgba(0,0,0,0.28);
        }

            .content-warning-panel h1 {
                margin-top: 0;
            }

        .warning-list {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin: 18px 0 24px;
        }

        .warning-pill {
            border: 1px solid rgba(255,214,102,.32);
            background: rgba(255,214,102,.10);
            color: #ffe6a3;
            border-radius: 999px;
            padding: 7px 11px;
        }

        .empty {
            color: var(--text-muted);
            line-height: 1.6;
        }

        .owner-actions {
            margin-top: 22px;
        }

        .notification-link {
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }

        .notification-badge {
            min-width: 18px;
            height: 18px;
            padding: 0 6px;
            border-radius: 999px;
            background: white;
            color: black;
            font-size: 0.72rem;
            align-items: center;
            justify-content: center;
            line-height: 1;
        }

        @media (max-width: 800px) {
            header {
                flex-direction: column;
                gap: 14px;
                padding: 20px;
            }

            nav {
                justify-content: center;
            }

            main {
                flex-direction: column;
                padding: 30px 24px 70px;
            }

            .left-sidebar {
                width: 100%;
                position: static;
            }

            h1 {
                font-size: 2.2rem;
            }

            .hero {
                padding: 24px;
            }

            .like-row {
                align-items: flex-start;
                flex-wrap: wrap;
            }
        }
    </style>
</head>

         style="
        display:none;

        inset:0;
        background:rgba(0,0,0,.75);

        <div style="

    <script type="module">
        import { requireBetaAccess } from "./betaGate.js";
        import { supabase } from "./supabaseClient.js";
        import { setupNotificationBadge } from "./notificationBadge.js";
        import { createNotification } from "./notifications.js";
        import { setupMessageBadge } from "./messageBadge.js";
        setupMessageBadge();
        import {
            getCurrentUserWithPermissions,
            canModerateWorlds,
            canModerateContentOwner
        } from "./permissions.js?v=4";

        const currentUser = await requireBetaAccess();
        setupNotificationBadge();
        const {
            profile: currentProfile,
            permissions: currentPermissions
        } = await getCurrentUserWithPermissions(currentUser.id);

        const params = new URLSearchParams(window.location.search);
        const worldId = params.get("id");

        let currentWorld = null;
        let contentExperience = "balanced";
        let blockedContentWarnings = [];
        let ageRole = "unknown";
        let pendingWarningWorld = null;
        setupReportSystem();

        await loadViewerContentPreferences();

        if (!worldId) {
            showNotFound("No world ID was provided.");
        } else {
            await loadWorld(worldId);
        }

        async function areUsersBlocked(userA, userB) {
            const { data, error } = await supabase
                .from("user_blocks")
                .select("id, blocker_id, blocked_id")
                .in("blocker_id", [userA, userB])
                .in("blocked_id", [userA, userB])
                .limit(1);

            if (error) {
                console.error("Block check error:", error);
                return false;
            }

            return data && data.length > 0;
        }

        async function loadViewerContentPreferences() {
            const { data: profile } = await supabase
                .from("profiles")
                .select("content_experience, blocked_content_warnings, age_role")
                .eq("id", currentUser.id)
                .single();

            if (!profile) return;

            contentExperience = profile.content_experience || "balanced";
            blockedContentWarnings = profile.blocked_content_warnings || [];
            ageRole = profile.age_role || "unknown";
        }

        function getWorldSafetyInfo(world) {
            const safeWarnings = [
                "gore",
                "sexual_content",
                "disturbing_imagery"
            ];

            const warnings = world.content_warnings || [];
            const rating = world.content_rating || "general";

            const hasHardBlockedWarning =
                warnings.some(warning =>
                    blockedContentWarnings.includes(warning)
                );

            const hasSafeWarning =
                warnings.some(warning =>
                    safeWarnings.includes(warning)
                );

            const isAdult =
                rating === "adult";

            return {
                warnings,
                rating,
                hasHardBlockedWarning,
                hasSafeWarning,
                isAdult
            };
        }

        function shouldBlockWorld(world) {
            const info = getWorldSafetyInfo(world);

            if (ageRole === "minor") {
                return info.isAdult || info.hasSafeWarning;
            }

            if (info.hasHardBlockedWarning) {
                return true;
            }

            if (contentExperience === "safe") {
                return info.isAdult || info.hasSafeWarning;
            }

            return false;
        }

        function shouldWarnWorld(world) {
            const info = getWorldSafetyInfo(world);

            if (contentExperience !== "balanced") {
                return false;
            }

            if (ageRole === "minor") {
                return false;
            }

            if (info.hasHardBlockedWarning) {
                return false;
            }

            return info.isAdult || info.hasSafeWarning;
        }

        async function loadWorld(id) {
            const { data: world, error } = await supabase
                .from("worlds")
                .select("*")
                .eq("id", id)
                .eq("visibility", "published")
                .single();

            if (error || !world) {
                showNotFound("This world does not exist or is not published.");
                return;
            }

            

            currentWorld = world;

            if (shouldBlockWorld(world)) {
                showContentBlocked(world);
                return;
            }

            const warningAccepted =
                params.get("contentOk") === world.id;

            if (shouldWarnWorld(world) && !warningAccepted) {
                pendingWarningWorld = world;
                showContentWarning(world);
                return;
            }

            await renderLoadedWorld(world);
            
        }

        async function renderLoadedWorld(world) {
            applyWorldTheme(world);

            const blocked = await areUsersBlocked(
                currentUser.id,
                world.owner_id
            );

            if (blocked) {
                showNotFound("This world is unavailable.");
                return;
            }

            const ownerAccess =
                currentUser &&
                currentUser.id === world.owner_id;

            if (
                world.moderation_status === "hidden" &&
                !ownerAccess &&
                !canModerateWorlds(currentPermissions)
            ) {
                showNotFound("This world has been hidden by Nullverse staff.");
                return;
            }

            const { data: profile } = await supabase
                .from("profiles")
                .select("id, username, display_name, role, role_name")
                .eq("id", world.owner_id)
                .single();

            currentWorld.ownerProfile = profile;

            document.title = `${world.title || "World"} - Nullverse`;

            document.getElementById("world-title").textContent =
                world.title || "Untitled World";

            document.getElementById("world-summary").textContent =
                world.summary || "No summary provided.";

            if (profile) {
                document.getElementById("world-creator").innerHTML =
                    `by <a href="profile.html?user=${encodeURIComponent(profile.username)}">${escapeHtml(profile.display_name || profile.username)} (@${escapeHtml(profile.username)})</a>`;
            } else {
                document.getElementById("world-creator").textContent =
                    "by Unknown Creator";
            }

            renderTags(world);

            renderOwnerActions(world);
            await loadLikes();
            await loadSections(world.id);

            document.getElementById("comments-link").href =
                `world-comments.html?id=${encodeURIComponent(world.id)}`;

            document.getElementById("qa-link").href =
                `world-qa.html?id=${encodeURIComponent(world.id)}`;

            document.getElementById("community-link").href =
                `world-additions.html?id=${encodeURIComponent(world.id)}`;
        }

        function applyWorldTheme(world) {

            const root = document.documentElement;

            const accent = "#e8e8ef";
            const background = "#000000";
            const panel = "var(--panel-bg)";
            const text = "#f5f5f5";


            let buttonBackground =
                "linear-gradient(180deg,#2a2a2f,#0d0d10)";

            if (
                world.theme_button_style ===
                "solid"
            ) {
                buttonBackground =
                    world.theme_button_color_1;
            }

            if (
                world.theme_button_style ===

        function hexToRgb(hex, alpha = 1) {

            if (!hex) return `rgba(255,255,255,${alpha})`;

            const cleaned =
                hex.replace("#", "");

            const bigint =
                parseInt(cleaned, 16);

            const r =
                (bigint >> 16) & 255;

            const g =
                (bigint >> 8) & 255;

            const b =
                bigint & 255;

            return `rgba(${r}, ${g}, ${b}, ${alpha})`;
        }

        function renderSectionNav(sections) {
            const nav = document.getElementById("section-nav");
            const links = document.getElementById("section-nav-links");
            const search = document.getElementById("section-search");
            const filters = document.getElementById("section-type-filter");
            const count = document.getElementById("section-count");

            if (!sections || sections.length <= 1) {
                nav.style.display = "none";
                return;
            }

            nav.style.display = "block";

            const types = [...new Set(
                sections
                    .map(section => section.section_type || "Section")
                    .map(type => type.trim())
                    .filter(Boolean)
            )];

            filters.innerHTML = `
                    <button class="filter-chip active" data-type="All">All</button>
                    ${types.map(type => `
                        <button class="filter-chip" data-type="${escapeHtml(type)}">
                            ${escapeHtml(type)}
                        </button>
                    `).join("")}
                `;

            let activeType = "All";

            function draw() {
                const query = (search.value || "").toLowerCase().trim();

                const filtered = sections.filter(section => {
                    const title = (section.title || "").toLowerCase();
                    const type = (section.section_type || "Section").trim();
                    const content = (section.content || "").toLowerCase();

                    const matchesSearch =
                        title.includes(query) ||
                        type.toLowerCase().includes(query) ||
                        content.includes(query);

                    const matchesType =
                        activeType === "All" || type === activeType;

                    return matchesSearch && matchesType;
                });

                count.textContent =
                    `${filtered.length} ${filtered.length === 1 ? "Section" : "Sections"}`;

                if (!filtered.length) {
                    links.innerHTML = `
                            <p class="empty">
                                No sections match this search.
                            </p>
                        `;
                    return;
                }

                links.innerHTML = filtered.map(section => {
                    const realIndex = sections.indexOf(section);

                    return `
                            <a href="#section-${realIndex}">
                                <span>${escapeHtml(section.title || "Untitled")}</span>
                                <small>${escapeHtml(section.section_type || "Section")}</small>
                            </a>
                        `;
                }).join("");
            }

            filters.addEventListener("click", function (e) {
                const button = e.target.closest(".filter-chip");
                if (!button) return;

                activeType = button.dataset.type || "All";

                filters.querySelectorAll(".filter-chip").forEach(chip => {
                    chip.classList.remove("active");
                });

                button.classList.add("active");

                draw();
            });

            search.addEventListener("input", draw);

            draw();
        }

        async function loadLikes() {
            if (!currentWorld) return;

            const { data: likes, error } = await supabase
                .from("world_likes")
                .select("*")
                .eq("world_id", currentWorld.id);

            if (error) {
                document.getElementById("like-count").textContent =
                    "Likes unavailable";
                return;
            }

            const likeCount = likes ? likes.length : 0;

            document.getElementById("like-count").textContent =
                `${likeCount} ${likeCount === 1 ? "Like" : "Likes"}`;

            const userLiked = likes?.some(
                like => like.user_id === currentUser.id
            );

            const button = document.getElementById("like-button");

            if (userLiked) {
                button.classList.add("liked");
                button.textContent = "♥ Liked";
            } else {
                button.classList.remove("liked");
                button.textContent = "♡ Like";
            }
        }

        document.getElementById("like-button").addEventListener("click", async () => {
            if (!currentWorld || !currentUser) return;

            const button = document.getElementById("like-button");
            const alreadyLiked = button.classList.contains("liked");

            if (alreadyLiked) {
                await supabase
                    .from("world_likes")
                    .delete()
                    .eq("world_id", currentWorld.id)
                    .eq("user_id", currentUser.id);
            } else {

                const { error: likeError } = await supabase
                    .from("world_likes")
                    .insert({
                        world_id: currentWorld.id,
                        user_id: currentUser.id
                    });

                if (!likeError) {
                    await createNotification({
                        recipientId: currentWorld.owner_id,
                        actorId: currentUser.id,
                        worldId: currentWorld.id,
                        type: "world_liked",
                        message: `Someone liked ${currentWorld.title}.`,
                        link: `world.html?id=${encodeURIComponent(currentWorld.id)}`
                    });
                }
            }

            await loadLikes();
        });

        window.setWorldModerationStatus = async function (status) {
            if (!currentWorld || !canModerateWorlds(currentPermissions)) return;

            const reasonInput = document.getElementById("world-hide-reason");
            const reason = reasonInput ? reasonInput.value.trim() : "";

            if (status === "hidden" && !reason) {
                const message = document.getElementById("world-moderation-message");
                if (message) {
                    message.textContent = "Enter a reason before hiding this world.";
                }
                return;
            }

            const { error } = await supabase
                .from("worlds")
                .update({
                    moderation_status: status,
                    moderation_reason: status === "hidden" ? reason : null
                })
                .eq("id", currentWorld.id);

            const message = document.getElementById("world-moderation-message");

            if (error) {
                if (message) message.textContent = error.message;
                return;
            }

            const logReason =
                status === "hidden"
                    ? reason
                    : `World "${currentWorld.title || "Untitled World"}" restored to visible.`;

            await supabase
                .from("moderation_logs")
                .insert({
                    target_user_id: currentWorld.owner_id,
                    moderator_id: currentUser.id,
                    action: `world_${status}`,
                    reason: logReason,
                    expires_at: null
                });

            if (status === "hidden") {
                await createNotification({
                    recipientId: currentWorld.owner_id,
                    actorId: currentUser.id,
                    worldId: currentWorld.id,
                    type: "world_hidden",
                    message: `Your world "${currentWorld.title || "Untitled World"}" was hidden by moderation. Reason: ${reason}`,
                    link: `dashboard.html`
                });
            }

            if (status === "visible") {
                await createNotification({
                    recipientId: currentWorld.owner_id,
                    actorId: currentUser.id,
                    worldId: currentWorld.id,
                    type: "world_restored",
                    message: `Your world "${currentWorld.title || "Untitled World"}" was restored by moderation.`,
                    link: `world.html?id=${encodeURIComponent(currentWorld.id)}`
                });
            }

            if (message) {
                message.textContent = `World set to ${status}.`;
            }

            setTimeout(() => {
                window.location.reload();
            }, 700);
        };

            return String(value || "")
                .replaceAll("&", "&amp;")
                .replaceAll("<", "&lt;")
                .replaceAll(">", "&gt;")
                .replaceAll('"', "&quot;")
                .replaceAll("'", "&#039;");
        }

        function formatCreditType(value) {
            return String(value || "")
                .replaceAll("_", " ")
                .replace(/\b\w/g, letter => letter.toUpperCase());
        }

        function buildImageCreditLine(section) {
            const type = section.image_credit_type || "no_credit_needed";

            if (type === "own_work") {
                const username = currentWorld?.ownerProfile?.username;

                if (username) {
                    return `
                Artwork by
                <a href="profile.html?user=${encodeURIComponent(username)}"
                   style="color:inherit;text-decoration:underline;">
                    @${escapeHtml(username)}
                </a>
            `;
                }

                return "Artwork by creator";
            }

            if (type === "nullverse_creator" && section.image_credit_nullverse_username) {
                return `
            Artwork by
            <a href="profile.html?user=${encodeURIComponent(section.image_credit_nullverse_username)}"
               style="color:inherit;text-decoration:underline;">
                @${escapeHtml(section.image_credit_nullverse_username)}
            </a>
        `;
            }

            if (section.image_credit_url) {
                return `
            Credit:
            <a href="${escapeHtml(section.image_credit_url)}"
               target="_blank"
               style="color:inherit;text-decoration:underline;">
                ${escapeHtml(section.image_credit_name || formatCreditType(type))}
            </a>
        `;
            }

            return `Credit: ${escapeHtml(section.image_credit_name || formatCreditType(type))}`;
        }

        window.logOut = async function () {
            await supabase.auth.signOut();
            window.location.href = "login.html";
        };

        async function submitWorldReport() {

            if (!currentWorld) return;

            const reason =
                document.getElementById("report-reason").value;

            const details =
                document.getElementById("report-details").value.trim();

            const { error } = await supabase
                .from("reports")
                .insert({
                    reporter_id: currentUser.id,
                    reported_user_id: currentWorld.owner_id,
                    world_id: currentWorld.id,
                    report_type: "world",
                    reason,
                    details,
                    status: "open"
                });

            if (error) {
                alert(error.message);
                return;
            }

            document.getElementById("report-modal").style.display =
                "none";

            alert("Report submitted.");
        }

        function setupReportSystem() {

            const reportBtn =
                document.getElementById("report-world-btn");

            const modal =
                document.getElementById("report-modal");

            const closeBtn =
                document.getElementById("close-report-btn");

            const submitBtn =
                document.getElementById("submit-report-btn");

            if (!reportBtn) return;

            reportBtn.addEventListener("click", () => {
                modal.style.display = "flex";
            });

            closeBtn.addEventListener("click", () => {
                modal.style.display = "none";
            });

            submitBtn.addEventListener("click", submitWorldReport);
        }

    </script>



</body>
