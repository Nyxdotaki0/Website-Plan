<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" href="favicon.png">
    <title>Literature - Nullverse</title>
    <script>
        const savedNullverseTheme = localStorage.getItem("nullverse-theme") || "void";
        document.documentElement.setAttribute("data-theme", savedNullverseTheme);
    </script>
    <link rel="stylesheet" href="theme.css?v=25">
    <style>
        html {
            min-height: 100%;
            background: #000;
            scroll-behavior: smooth;
        }

        body {
            margin: 0;
            min-height: 100vh;
            font-family: Arial, sans-serif;
            background: #000;
            background-attachment: fixed;
            color: var(--text-primary);
            transition: background .25s ease, color .25s ease;
        }

            body.reader-focus {
                overflow: hidden;
            }

                body.reader-focus header,
                body.reader-focus .book-hero,
                body.reader-focus .left-sidebar {
                    display: none;
                }

                body.reader-focus main {
                    position: fixed;
                    inset: 0;
                    z-index: 9990;
                    display: block;
                    max-width: none;
                    width: 100%;
                    height: 100dvh;
                    margin: 0;
                    padding: 0;
                    overflow-y: auto;
                    overflow-x: hidden;
                    background: radial-gradient(circle at top, rgba(255,255,255,.055), transparent 35%), rgba(0,0,0,.72);
                    backdrop-filter: blur(18px);
                    -webkit-backdrop-filter: blur(18px);
                }

                body.reader-focus .content-column {
                    width: 100%;
                    max-width: none;
                    min-height: 100dvh;
                }

                body.reader-focus .reader-tools {
                    position: sticky;
                    top: 0;
                    z-index: 9995;
                    margin: 0;
                    border-radius: 0;
                    border-left: 0;
                    border-right: 0;
                    padding: 10px 18px;
                    background: linear-gradient(180deg, rgba(12,12,16,.96), rgba(8,8,12,.90));
                    box-shadow: 0 12px 38px rgba(0,0,0,.38);
                }

                body.reader-focus #chapters-container {
                    width: 100%;
                    max-width: none;
                    box-sizing: border-box;
                    padding: 26px clamp(14px, 4vw, 64px) 90px;
                }

                body.reader-focus .literature-chapter {
                    width: 100%;
                    max-width: none;
                    min-height: calc(100dvh - 112px);
                    box-sizing: border-box;
                    margin: 0 auto 34px;
                    border-radius: 28px;
                    box-shadow: 0 24px 70px rgba(0,0,0,.52), 0 0 36px rgba(255,255,255,.06);
                }

                body.reader-focus .chapter-title-row,
                body.reader-focus .chapter-header-image-wrap,
                body.reader-focus .author-note {
                    max-width: min(1120px, calc(100vw - 48px));
                }

                body.reader-focus .chapter-main-text {
                    max-width: min(1120px, calc(100vw - 48px));
                    margin-left: auto;
                    margin-right: auto;
                }

                body.reader-focus.reader-wide .chapter-main-text,
                body.reader-focus.reader-wide .chapter-title-row,
                body.reader-focus.reader-wide .chapter-header-image-wrap,
                body.reader-focus.reader-wide .author-note {
                    max-width: min(1380px, calc(100vw - 48px));
                }

                body.reader-focus .literature-background-layer .credit-pill {
                    z-index: 10000;
                }

        header, main {
            position: relative;
            z-index: 2;
        }

        .reading-progress {
            position: fixed;
            top: 0;
            left: 0;
            height: 3px;
            width: 0%;
            z-index: 10000;
            background: linear-gradient(90deg, rgba(255,255,255,.35), #fff);
            box-shadow: 0 0 16px rgba(255,255,255,.38);
            transition: width .08s linear;
        }

        .literature-background-layer {
            position: fixed;
            inset: 0;
            z-index: 0;
            overflow: hidden;
            pointer-events: none;
        }

        .literature-background-image,
        .literature-background-base,
        .literature-background-overlay {
            position: absolute;
            inset: 0;
        }

        .literature-background-base {
            background: var(--page-bg);
        }

        .literature-background-image {
            background-position: center;
            background-size: cover;
            background-repeat: no-repeat;
            opacity: .35;
            transform: scale(1.03);
        }

        .literature-background-overlay {
            background: rgba(0,0,0,.35);
        }

        .literature-background-layer .credit-pill {
            position: fixed;
            left: 18px;
            bottom: 18px;
            pointer-events: auto;
        }

        header {
            padding: 10px 38px;
            border-bottom: 1px solid rgba(255,255,255,.10);
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(8,8,12,.72);
            position: sticky;
            top: 0;
            z-index: 100;
            backdrop-filter: blur(22px);
            -webkit-backdrop-filter: blur(22px);
            box-shadow: 0 12px 38px rgba(0,0,0,.30);
        }

        .logo, .logo a {
            display: flex;
            align-items: center;
        }

        .site-logo {
            height: 58px;
            width: auto;
            display: block;
            max-width: none;
        }

        nav {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
            align-items: center;
        }

            nav a,
            nav button {
                color: var(--text-secondary);
                text-decoration: none;
                background: none;
                border: none;
                cursor: pointer;
                font-family: Arial, sans-serif;
                font-size: .94rem;
                transition: .18s ease;
            }

                nav a:hover,
                nav button:hover {
                    color: white;
                }

        main {
            display: grid;
            grid-template-columns: 310px minmax(0, 1fr);
            gap: 30px;
            max-width: 1480px;
            margin: auto;
            padding: 38px 40px 90px;
            box-sizing: border-box;
        }

        .left-sidebar {
            position: sticky;
            top: 94px;
            height: fit-content;
        }

        .content-column {
            min-width: 0;
        }

        .book-hero,
        .chapter-index,
        .literature-chapter,
        .content-warning-panel,
        .reader-tools {
            border: 1px solid rgba(255,255,255,.11);
            border-radius: 28px;
            background: linear-gradient(135deg, rgba(255,255,255,.075), rgba(255,255,255,.022)), rgba(8,8,12,.70);
            backdrop-filter: blur(22px);
            -webkit-backdrop-filter: blur(22px);
            box-shadow: 0 24px 58px rgba(0,0,0,.32), inset 0 1px 0 rgba(255,255,255,.04);
        }

        .book-hero {
            position: relative;
            overflow: hidden;
            padding: 34px;
            margin-bottom: 22px;
        }

        .book-layout {
            display: grid;
            grid-template-columns: minmax(180px, 285px) minmax(0,1fr);
            gap: 30px;
            align-items: start;
        }

        .cover-wrap {
            position: relative;
            overflow: hidden;
            border-radius: 22px;
            border: 1px solid rgba(255,255,255,.12);
            min-height: 0;
            background: rgba(255,255,255,.045);
            box-shadow: 0 18px 44px rgba(0,0,0,.34);
            align-self: start;
        }

            .cover-wrap img {
                width: 100%;
                height: auto;
                max-height: 470px;
                object-fit: contain;
                display: block;
            }

            .cover-wrap.has-credit {
                padding-bottom: 54px;
            }

        .cover-placeholder {
            min-height: 320px;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 18px;
            text-align: center;
            color: var(--text-muted);
            box-sizing: border-box;
        }

        .tag-row {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            margin-bottom: 18px;
        }

        .tag {
            display: inline-block;
            font-size: .8rem;
            color: var(--text-secondary);
            border: 1px solid rgba(255,255,255,.10);
            background: rgba(255,255,255,.05);
            border-radius: 999px;
            padding: 7px 11px;
        }

        h1 {
            margin: 0 0 10px;
            font-size: clamp(2.25rem, 5vw, 4.8rem);
            letter-spacing: -.04em;
            color: var(--text-primary);
        }

        .creator,
        .summary,
        .empty {
            color: var(--text-secondary);
            line-height: 1.75;
        }

            .creator a {
                color: var(--text-secondary);
                text-decoration: none;
            }

                .creator a:hover {
                    color: white;
                }

        .summary {
            margin-top: 18px;
            white-space: pre-wrap;
            max-width: 78ch;
        }

        .reading-meta {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            margin: 16px 0 0;
        }

            .reading-meta span {
                display: inline-flex;
                padding: 8px 12px;
                border-radius: 999px;
                border: 1px solid rgba(255,255,255,.10);
                background: rgba(255,255,255,.045);
                color: var(--text-muted);
                font-size: .86rem;
            }

        .action-row {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-top: 26px;
            flex-wrap: wrap;
        }

        .button,
        .like-button {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(180deg,#2a2a2f,#0d0d10);
            color: #f5f5f5;
            border: 1px solid rgba(255,255,255,.12);
            padding: 10px 15px;
            border-radius: 12px;
            cursor: pointer;
            text-decoration: none;
            font-family: Arial, sans-serif;
            transition: .18s ease;
            box-shadow: 0 0 16px rgba(255,255,255,.08), inset 0 1px 0 rgba(255,255,255,.06);
        }

            .button:hover,
            .like-button:hover {
                opacity: .95;
                transform: translateY(-1px);
                border-color: rgba(255,255,255,.20);
                box-shadow: 0 0 20px rgba(255,255,255,.12), inset 0 1px 0 rgba(255,255,255,.08);
            }

            .like-button.liked {
                background: linear-gradient(180deg,#4a2f37 0%,#2a181d 100%);
            }

        .like-count {
            color: var(--text-muted);
        }

        .owner-actions {
            margin-top: 22px;
        }

        .reader-tools {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 12px;
            flex-wrap: wrap;
            margin-bottom: 22px;
            padding: 14px;
            border-radius: 22px;
        }

        .reader-tools-left,
        .reader-tools-right {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            align-items: center;
        }

        .reader-tool-button {
            border: 1px solid rgba(255,255,255,.10);
            background: rgba(255,255,255,.045);
            color: var(--text-secondary);
            border-radius: 999px;
            padding: 9px 12px;
            cursor: pointer;
            transition: .18s ease;
        }

            .reader-tool-button:hover,
            .reader-tool-button.active {
                color: white;
                background: rgba(255,255,255,.11);
                border-color: rgba(255,255,255,.20);
            }

        .chapter-index {
            position: relative;
            overflow: hidden;
            padding: 18px;
            padding-bottom: 84px;
            background: var(--literature-index-background, var(--panel-bg));
            color: var(--literature-index-text, var(--text-primary));
            border-radius: 24px;
        }

            .chapter-index::before {
                content: "";
                position: absolute;
                inset: 0;
                background-image: var(--literature-index-image);
                background-size: cover;
                background-position: center;
                opacity: var(--literature-index-opacity,.85);
                z-index: 0;
            }

            .chapter-index::after {
                content: "";
                position: absolute;
                inset: 0;
                background: rgba(0,0,0,var(--literature-index-overlay,.35));
                z-index: 1;
            }

            .chapter-index > * {
                position: relative;
                z-index: 2;
            }

        .index-header h2 {
            margin: 0;
            font-size: 1.16rem;
        }

        .index-header p {
            margin: 6px 0 16px;
            color: var(--literature-index-text, var(--text-muted));
            font-size: .88rem;
            line-height: 1.5;
            opacity: .82;
        }

        .chapter-search {
            width: 100%;
            box-sizing: border-box;
            padding: 12px 14px;
            border-radius: 13px;
            border: 1px solid rgba(255,255,255,.16);
            background: rgba(0,0,0,.30);
            color: var(--literature-index-text,white);
            margin-bottom: 14px;
            transition: .18s ease;
        }

            .chapter-search:focus {
                outline: none;
                border-color: rgba(255,255,255,.28);
                box-shadow: 0 0 18px rgba(255,255,255,.08);
            }

        .chapter-count {
            color: var(--literature-index-text, var(--text-muted));
            font-size: .82rem;
            margin-bottom: 16px;
            opacity: .82;
        }

        #chapter-nav-links {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .chapter-nav-link {
            display: block;
            padding: 13px 14px;
            border-radius: 15px;
            background: rgba(0,0,0,.20);
            border: 1px solid rgba(255,255,255,.08);
            color: var(--literature-index-button-text, var(--literature-index-text));
            text-decoration: none;
            transition: .18s ease;
        }

            .chapter-nav-link:hover,
            .chapter-nav-link.active {
                background: rgba(255,255,255,.15);
                transform: translateX(4px);
                color: var(--literature-index-text,white);
                border-color: rgba(255,255,255,.20);
            }

            .chapter-nav-link span {
                display: block;
                font-weight: 700;
            }

            .chapter-nav-link small {
                display: block;
                margin-top: 5px;
                color: var(--literature-index-button-text, var(--literature-index-text));
                font-size: .78rem;
                opacity: .82;
                line-height: 1.45;
            }

        .literature-chapter {
            position: relative;
            overflow: hidden;
            padding: clamp(24px, 4vw, 42px);
            padding-bottom: 74px;
            margin-bottom: 30px;
            background: var(--chapter-card-background, linear-gradient(180deg,rgba(255,255,255,.045),rgba(255,255,255,.012))), rgba(8,8,12,.76);
            color: var(--chapter-card-text, var(--text-primary));
            transition: .18s ease;
        }

            .literature-chapter::before {
                content: "";
                position: absolute;
                inset: 0;
                background-image: var(--chapter-card-image);
                background-size: cover;
                background-position: center;
                opacity: var(--chapter-card-image-opacity,.85);
                z-index: 0;
            }

            .literature-chapter::after {
                content: "";
                position: absolute;
                inset: 0;
                background: rgba(0,0,0,var(--chapter-card-overlay,.35));
                z-index: 1;
            }

            .literature-chapter > * {
                position: relative;
                z-index: 2;
            }

        .chapter-title-row {
            max-width: 900px;
            margin: 0 auto 28px;
            text-align: var(--reader-heading-align, left);
        }

        .chapter-eyebrow {
            color: var(--chapter-card-text, var(--text-muted));
            font-size: .86rem;
            letter-spacing: .11em;
            text-transform: uppercase;
            margin-bottom: 9px;
            opacity: .78;
        }

        .chapter-title-row h2 {
            margin: 0;
            font-size: clamp(2rem, 4vw, 3.4rem);
            line-height: 1.04;
            letter-spacing: -.035em;
            color: var(--chapter-card-text, var(--text-primary));
        }

        .chapter-subtitle {
            color: var(--chapter-card-text, var(--text-secondary));
            margin-top: 12px;
            line-height: 1.65;
            opacity: .82;
        }

        .chapter-header-image-wrap {
            position: relative;
            max-width: 900px;
            margin: 0 auto 26px;
        }

            .chapter-header-image-wrap.float-left {
                float: left;
                width: 320px;
                max-width: 42%;
                margin: 4px 26px 18px 0;
            }

            .chapter-header-image-wrap.float-right {
                float: right;
                width: 320px;
                max-width: 42%;
                margin: 4px 0 18px 26px;
            }

            .chapter-header-image-wrap.full {
                max-width: 100%;
            }

                .chapter-header-image-wrap.full img,
                .chapter-header-image-wrap.top img,
                .chapter-header-image-wrap.bottom img {
                    width: 100%;
                    max-height: 540px;
                }

            .chapter-header-image-wrap img {
                display: block;
                width: 100%;
                max-width: 100%;
                object-fit: cover;
                border-radius: 18px;
                border: 1px solid rgba(255,255,255,.12);
                box-shadow: 0 18px 44px rgba(0,0,0,.30);
            }

            .chapter-header-image-wrap.has-credit {
                padding-bottom: 54px;
            }

                .chapter-header-image-wrap.has-credit .credit-pill {
                    bottom: 8px;
                }

        .chapter-main-text {
            clear: none;
            max-width: var(--reader-width, 820px);
            margin: 0 auto;
            background: var(--chapter-panel-background, rgba(12,12,14,.64));
            color: var(--chapter-text-color, var(--chapter-card-text));
            border: 1px solid rgba(255,255,255,.10);
            border-radius: 22px;
            padding: clamp(26px, 5vw, 54px);
            line-height: var(--chapter-line-height,1.8);
            letter-spacing: var(--chapter-letter-spacing,0);
            white-space: normal;
            font-size: var(--reader-font-size, 1.08rem);
            overflow-wrap: anywhere;
            box-shadow: inset 0 1px 0 rgba(255,255,255,.05), 0 16px 36px rgba(0,0,0,.18);
        }

            .chapter-main-text h1,
            .chapter-main-text h2,
            .chapter-main-text h3,
            .chapter-main-text h4 {
                color: var(--chapter-text-color, var(--chapter-card-text));
                line-height: 1.18;
                margin: 1.25em 0 .45em;
                letter-spacing: -.02em;
            }

            .chapter-main-text h1 {
                font-size: 2.1em;
            }

            .chapter-main-text h2 {
                font-size: 1.72em;
            }

            .chapter-main-text h3 {
                font-size: 1.35em;
            }

            .chapter-main-text h4 {
                font-size: 1.12em;
            }

            .chapter-main-text p {
                margin: 0 0 1em;
            }

            .chapter-main-text blockquote {
                margin: 1.35em 0;
                padding: 14px 18px;
                border-left: 4px solid rgba(255,255,255,.26);
                background: rgba(255,255,255,.065);
                border-radius: 0 14px 14px 0;
                font-style: italic;
            }

            .chapter-main-text a {
                color: inherit;
                text-decoration: underline;
                text-underline-offset: 3px;
            }

            .chapter-main-text ul,
            .chapter-main-text ol {
                padding-left: 1.6em;
                margin: 0 0 1em;
            }

            .chapter-main-text li {
                margin-bottom: .35em;
            }

            .chapter-main-text hr {
                border: 0;
                border-top: 1px solid rgba(255,255,255,.20);
                margin: 30px 0;
            }

            .chapter-main-text img {
                max-width: 100%;
            }

            .chapter-main-text::after {
                content: "";
                display: block;
                clear: both;
            }

        body.reader-large-text {
            --reader-font-size: 1.2rem;
        }

        body.reader-wide {
            --reader-width: 1040px;
        }

        body.reader-center-headings {
            --reader-heading-align: center;
        }

        .author-note {
            clear: both;
            max-width: var(--reader-width, 820px);
            margin: 24px auto 0;
            background: rgba(255,255,255,.060);
            border: 1px solid rgba(255,255,255,.10);
            border-radius: 18px;
            padding: 18px;
            color: var(--chapter-card-text, var(--text-secondary));
            line-height: 1.7;
            white-space: pre-wrap;
        }

        .content-warning-panel {
            max-width: 760px;
            margin: 60px auto;
            padding: 32px;
            border-color: rgba(255,214,102,.28);
        }

            .content-warning-panel h1 {
                margin-top: 0;
            }

        .warning-list {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin: 18px 0 24px;
        }

        .warning-pill {
            border: 1px solid rgba(255,214,102,.32);
            background: rgba(255,214,102,.10);
            color: #ffe6a3;
            border-radius: 999px;
            padding: 7px 11px;
        }

        .credit-pill {
            position: absolute;
            left: 14px;
            bottom: 14px;
            z-index: 6;
            display: inline-flex;
            align-items: center;
            max-width: calc(100% - 28px);
            padding: 7px 11px;
            border-radius: 999px;
            border: 1px solid rgba(255,255,255,.16);
            background: rgba(0,0,0,.62);
            color: white;
            font-size: .78rem;
            text-decoration: none;
            backdrop-filter: blur(14px);
            -webkit-backdrop-filter: blur(14px);
            white-space: nowrap;
        }

            .credit-pill:hover {
                background: rgba(0,0,0,.78);
            }

        .credit-tooltip {
            position: absolute;
            left: 0;
            bottom: calc(100% + 8px);
            width: 240px;
            padding: 10px 12px;
            border-radius: 12px;
            background: rgba(0,0,0,.92);
            border: 1px solid rgba(255,255,255,.16);
            color: var(--text-secondary);
            font-size: .78rem;
            line-height: 1.45;
            opacity: 0;
            visibility: hidden;
            pointer-events: none;
            white-space: normal;
            box-shadow: 0 12px 28px rgba(0,0,0,.35);
        }

        .credit-pill:hover .credit-tooltip,
        .credit-pill.show-tooltip .credit-tooltip {
            opacity: 1;
            visibility: visible;
        }

        #report-modal {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,.75);
            z-index: 9999;
            justify-content: center;
            align-items: center;
        }

        .report-box {
            width: 500px;
            max-width: 90%;
            background: var(--panel-bg);
            border: 1px solid var(--border-color);
            border-radius: 18px;
            padding: 24px;
        }

            .report-box select,
            .report-box textarea,
            .report-box input {
                width: 100%;
                box-sizing: border-box;
                padding: 12px;
                margin-bottom: 12px;
                border-radius: 12px;
                border: 1px solid var(--border-color);
                background: rgba(0,0,0,.28);
                color: var(--text-primary);
            }

        .notification-link {
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }

        .notification-badge {
            min-width: 18px;
            height: 18px;
            padding: 0 6px;
            border-radius: 999px;
            background: white;
            color: black;
            font-size: .72rem;
            align-items: center;
            justify-content: center;
            line-height: 1;
        }

        .mobile-index-toggle {
            display: none;
        }



        .placed-image-stage {
            position: absolute;
            inset: 0;
            overflow: hidden;
            border-radius: inherit;
            z-index: 0;
            pointer-events: none;
        }

            .placed-image-stage img {
                width: 100%;
                height: 100%;
                display: block;
                object-fit: cover;
                transform-origin: center center;
                will-change: transform;
            }

        .cover-wrap .placed-image-stage {
            position: relative;
            height: 470px;
            min-height: 320px;
            border-radius: inherit;
        }

        .chapter-header-image-wrap .placed-image-stage {
            position: relative;
            height: 340px;
            border-radius: 18px;
            border: 1px solid rgba(255,255,255,.12);
            box-shadow: 0 18px 44px rgba(0,0,0,.30);
        }

        .chapter-header-image-wrap.full .placed-image-stage,
        .chapter-header-image-wrap.top .placed-image-stage,
        .chapter-header-image-wrap.bottom .placed-image-stage {
            height: 460px;
        }

        .chapter-index .placed-image-stage,
        .literature-chapter .placed-image-stage,
        .literature-background-layer .placed-image-stage {
            position: absolute;
        }

        .literature-background-layer .placed-image-stage {
            position: fixed;
            inset: 0;
            border-radius: 0;
            z-index: 1;
        }

        .literature-background-base {
            z-index: 0;
        }

        .literature-background-image {
            z-index: 1;
        }

        .literature-background-overlay {
            z-index: 2;
        }

        .chapter-index .placed-image-stage,
        .literature-chapter .placed-image-stage {
            z-index: 0;
        }

        @media (max-width: 1050px) {
            main {
                grid-template-columns: 1fr;
                padding: 28px 24px 76px;
            }

            .left-sidebar {
                width: 100%;
                position: static;
            }

            .chapter-index {
                display: none;
            }

                .chapter-index.mobile-open {
                    display: block !important;
                }

            .mobile-index-toggle {
                display: inline-flex;
            }

            .book-layout {
                grid-template-columns: 1fr;
            }

            .cover-wrap {
                max-width: 300px;
            }
        }

        @media (max-width: 700px) {
            header {
                flex-direction: column;
                gap: 12px;
                padding: 16px;
            }

            .site-logo {
                height: 54px;
            }

            nav {
                justify-content: center;
                gap: 14px;
            }

            .book-hero {
                padding: 22px;
                border-radius: 22px;
            }

            .reader-tools {
                position: sticky;
                top: 0;
                z-index: 90;
                border-radius: 18px;
            }

            .literature-chapter {
                padding: 20px;
                padding-bottom: 90px;
                border-radius: 22px;
            }

            .chapter-main-text {
                padding: 22px;
                font-size: var(--reader-font-size, 1rem);
                border-radius: 18px;
            }

            .chapter-header-image-wrap.float-left,
            .chapter-header-image-wrap.float-right {
                float: none;
                width: 100%;
                max-width: 100%;
                margin: 0 auto 22px;
            }

            .chapter-index {
                padding-bottom: 95px;
            }

            .credit-pill {
                max-width: calc(100% - 28px);
                overflow: hidden;
                text-overflow: ellipsis;
            }

            body.reader-focus .reader-tools {
                padding: 9px 10px;
                gap: 8px;
            }

            body.reader-focus #chapters-container {
                padding: 12px 10px 70px;
            }

            body.reader-focus .literature-chapter {
                min-height: calc(100dvh - 104px);
                border-radius: 18px;
                padding: 16px;
                padding-bottom: 70px;
                margin-bottom: 16px;
            }

            body.reader-focus .chapter-main-text,
            body.reader-focus .chapter-title-row,
            body.reader-focus .chapter-header-image-wrap,
            body.reader-focus .author-note {
                max-width: 100%;
            }
        }
    </style>
</head>

    <div id="report-modal">

                <option>Spam</option>

            </select>
            <textarea id="report-details" rows="6" placeholder="Additional details..."></textarea>
            <div style="display:flex;gap:10px;flex-wrap:wrap;">

                <button class="button" id="close-report-btn">Cancel</button>
            </div>
