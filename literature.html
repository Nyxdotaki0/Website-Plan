    </div>
    <script type="module">
        import { requireBetaAccess } from "./betaGate.js";
        import { supabase } from "./supabaseClient.js";
        import { setupNotificationBadge } from "./notificationBadge.js";
        import { createNotification } from "./notifications.js";
        import { setupMessageBadge } from "./messageBadge.js";
        import { getCurrentUserWithPermissions, canModerateWorlds, canModerateContentOwner } from "./permissions.js?v=4";

        const currentUser = await requireBetaAccess();
        setupNotificationBadge();
        setupMessageBadge();

        const { profile: currentProfile, permissions: currentPermissions } = await getCurrentUserWithPermissions(currentUser.id);
        const params = new URLSearchParams(window.location.search);
        const literatureId = params.get("id");

        let currentLiterature = null;
        let allChapters = [];
        let contentExperience = "balanced";
        let blockedContentWarnings = [];
        let ageRole = "unknown";

        setupReportSystem();
        await loadViewerContentPreferences();

        if (!literatureId) {
            showNotFound("No literature ID was provided.");
        } else {
            await loadLiterature(literatureId);
        }

        document.addEventListener("click", event => {
            const pill = event.target.closest(".credit-pill");

            document.querySelectorAll(".credit-pill").forEach(item => {
                if (item !== pill) item.classList.remove("show-tooltip");
            });

            if (pill) {
                event.preventDefault();
                pill.classList.toggle("show-tooltip");
            }
        });

        async function areUsersBlocked(userA, userB) {
            const { data, error } = await supabase
                .from("user_blocks")
                .select("id, blocker_id, blocked_id")
                .in("blocker_id", [userA, userB])
                .in("blocked_id", [userA, userB])
                .limit(1);

            if (error) {
                console.error("Block check error:", error);
                return false;
            }

            return data && data.length > 0;
        }

        async function loadViewerContentPreferences() {
            const { data: profile } = await supabase
                .from("profiles")
                .select("content_experience, blocked_content_warnings, age_role")
                .eq("id", currentUser.id)
                .single();

            if (!profile) return;

            contentExperience = profile.content_experience || "balanced";
            blockedContentWarnings = profile.blocked_content_warnings || [];
            ageRole = profile.age_role || "unknown";
        }

        function getContentSafetyInfo(item) {
            const safeWarnings = ["gore", "sexual_content", "disturbing_imagery"];
            const warnings = item.content_warnings || [];
            const rating = item.content_rating || "general";
            const hasHardBlockedWarning = warnings.some(warning => blockedContentWarnings.includes(warning));
            const hasSafeWarning = warnings.some(warning => safeWarnings.includes(warning));
            const isAdult = rating === "adult";

            return { warnings, rating, hasHardBlockedWarning, hasSafeWarning, isAdult };
        }

        function shouldBlockContent(item) {
            const info = getContentSafetyInfo(item);

            if (ageRole === "minor") return info.isAdult || info.hasSafeWarning;
            if (info.hasHardBlockedWarning) return true;
            if (contentExperience === "safe") return info.isAdult || info.hasSafeWarning;

            return false;
        }

        function shouldWarnContent(item) {
            const info = getContentSafetyInfo(item);

            if (contentExperience !== "balanced") return false;
            if (ageRole === "minor") return false;
            if (info.hasHardBlockedWarning) return false;

            return info.isAdult || info.hasSafeWarning;
        }

        async function loadLiterature(id) {
            const { data: literature, error } = await supabase
                .from("worlds")
                .select("*")
                .eq("id", id)
                .single();

            if (error || !literature) {
                showNotFound("This literature does not exist.");
                return;
            }

            if (literature.content_type !== "literature") {
                showNotFound("This page is only for literature projects.");
                return;
            }

            currentLiterature = literature;

            const ownerAccess =
                currentUser &&
                currentUser.id === literature.owner_id;

            const staffAccess =
                canModerateWorlds(currentPermissions);

            if (literature.visibility !== "published" && !ownerAccess && !staffAccess) {
                showNotFound("This literature does not exist or is not published.");
                return;
            }

            if (literature.moderation_status === "hidden" && ownerAccess) {
                showHiddenNotice(literature);
                return;
            }

            if (literature.moderation_status === "hidden" && !staffAccess) {
                showNotFound("This literature has been hidden by Nullverse staff.");
                return;
            }

            if (!ownerAccess && !staffAccess && shouldBlockContent(literature)) {
                showContentBlocked(literature);
                return;
            }

            const warningAccepted = params.get("contentOk") === literature.id;

            if (!ownerAccess && !staffAccess && shouldWarnContent(literature) && !warningAccepted) {
                showContentWarning(literature);
                return;
            }

            await renderLoadedLiterature(literature);
        }

        async function renderLoadedLiterature(literature) {
            const blocked = await areUsersBlocked(currentUser.id, literature.owner_id);

            if (blocked) {
                showNotFound("This literature is unavailable.");
                return;
            }

            const ownerAccess = currentUser && currentUser.id === literature.owner_id;

            if (
                literature.moderation_status === "hidden" &&
                !ownerAccess &&
                !canModerateWorlds(currentPermissions)
            ) {
                showNotFound("This literature has been hidden by Nullverse staff.");
                return;
            }

            const { data: profile } = await supabase
                .from("profiles")
                .select("id, username, display_name, role, role_name")
                .eq("id", literature.owner_id)
                .single();

            currentLiterature.ownerProfile = profile;

            applyLiteratureTheme(literature);
            renderBookHero(literature, profile);
            renderOwnerActions(literature);
            await loadLikes();
            await loadChapters(literature.id);

            document.getElementById("comments-link").href = `literature-comments.html?id=${encodeURIComponent(literature.id)}`;
            document.getElementById("qa-link").href = `literature-qa.html?id=${encodeURIComponent(literature.id)}`;

        }


        function getDefaultImagePlacement() {
            return {
                x: 0,
                y: 0,
                scale: 1,
                rotation: 0,
                fit: "cover"
            };
        }

        function normalizeImagePlacement(value) {
            let parsed = value;

            if (typeof parsed === "string") {
                try {
                    parsed = JSON.parse(parsed);
                } catch {
                    parsed = null;
                }
            }

            return {
                ...getDefaultImagePlacement(),
                ...(parsed && typeof parsed === "object" ? parsed : {})
            };
        }

        function buildPlacedImageStage(url, placement, className = "") {
            if (!url) {
                return "";
            }

            const safe = normalizeImagePlacement(placement);

            return `
                    <div class="placed-image-stage ${className}">
                        <img src="${escapeHtml(url)}" alt="" style="
                            object-fit:${escapeHtml(safe.fit || "cover")};
                            transform:translate(${Number(safe.x) || 0}px, ${Number(safe.y) || 0}px) rotate(${Number(safe.rotation) || 0}deg) scale(${Number(safe.scale) || 1});
                        ">
                    </div>
                `;
        }

        function renderBookHero(literature, profile) {
            document.title = `${literature.title || "Literature"} - Nullverse`;
            document.getElementById("book-title").textContent = literature.title || "Untitled Literature";
            document.getElementById("book-summary").textContent = literature.summary || "No description provided.";

            if (profile) {
                document.getElementById("book-creator").innerHTML =
                    `by <a href="profile.html?user=${encodeURIComponent(profile.username)}">${escapeHtml(profile.display_name || profile.username)} (@${escapeHtml(profile.username)})</a>`;
            } else {
                document.getElementById("book-creator").textContent = "by Unknown Creator";
            }

            renderTags(literature);

            const coverWrap = document.getElementById("book-cover-wrap");
            const coverCredit = buildCreditPill({
                type: literature.cover_credit_type,
                name: literature.cover_credit_name,
                username: literature.cover_credit_nullverse_username,
                url: literature.cover_credit_url,
                note: literature.cover_credit_note,
                ownerUsername: profile?.username,
                context: "Cover Image"
            });

            coverWrap.classList.toggle("has-credit", !!coverCredit);

            if (literature.cover_image_url) {
                coverWrap.innerHTML = `
                            ${buildPlacedImageStage(literature.cover_image_url, literature.cover_image_placement, "cover-placed-image")}
                            ${coverCredit}
                        `;
            } else {
                coverWrap.innerHTML = `<div class="cover-placeholder">No cover image yet</div>`;
            }

            const backgroundCredit = buildCreditPill({
                type: literature.background_credit_type,
                name: literature.background_credit_name,
                username: literature.background_credit_nullverse_username,
                url: literature.background_credit_url,
                note: literature.background_credit_note,
                ownerUsername: profile?.username,
                context: "Reader Background"
            });

            const backgroundLayer = document.getElementById("literature-background-layer");
            backgroundLayer.querySelectorAll(".placed-image-stage").forEach(stage => stage.remove());

            if (literature.theme_background_style === "image" && literature.theme_background_image_url) {
                backgroundLayer.insertAdjacentHTML(
                    "afterbegin",
                    buildPlacedImageStage(literature.theme_background_image_url, literature.theme_background_image_placement, "literature-background-placed-image")
                );
            }

            if (backgroundCredit && literature.theme_background_style === "image" && literature.theme_background_image_url) {
                document.getElementById("literature-background-layer").insertAdjacentHTML("beforeend", backgroundCredit);
            }
        }

        function applyLiteratureTheme(literature) {
            const root = document.documentElement;
            const baseLayer = document.getElementById("literature-background-base");
            const imageLayer = document.getElementById("literature-background-image");
            const overlayLayer = document.getElementById("literature-background-overlay");
            const style = literature.theme_background_style || "default";

            baseLayer.style.background = "var(--page-bg)";
            imageLayer.style.backgroundImage = "none";
            imageLayer.style.opacity = "0";

            if (style === "solid") {
                baseLayer.style.background = literature.theme_background_color_1 || "#050505";
            }

            if (style === "gradient") {
                baseLayer.style.background = `linear-gradient(135deg, ${literature.theme_background_color_1 || "#050505"}, ${literature.theme_background_color_2 || "#000000"})`;
            }

            if (style === "image" && literature.theme_background_image_url) {
                baseLayer.style.background = `linear-gradient(135deg, ${literature.theme_background_color_1 || "#050505"}, ${literature.theme_background_color_2 || "#000000"})`;
                imageLayer.style.backgroundImage = "none";
                imageLayer.style.opacity = literature.theme_background_image_opacity ?? .35;
                imageLayer.style.filter = `blur(${literature.theme_background_image_blur || 0}px)`;
                imageLayer.style.backgroundRepeat = literature.theme_background_image_repeat || "no-repeat";
                imageLayer.style.backgroundPosition = `${literature.theme_background_position_x || 50}% ${literature.theme_background_position_y || 50}%`;

                const savedSize = literature.theme_background_image_size || "cover";
                imageLayer.style.backgroundSize = savedSize === "auto"
                    ? `${literature.theme_background_zoom || 100}%`
                    : savedSize;
            }

            overlayLayer.style.background = `rgba(0,0,0,${literature.theme_background_overlay_strength ?? .35})`;

            let indexBackground = "linear-gradient(135deg,rgba(255,255,255,.06),rgba(255,255,255,.02))";

            if (literature.theme_index_style === "solid") {
                indexBackground = literature.theme_index_color_1 || "#141416";
            }

            if (literature.theme_index_style === "gradient" || literature.theme_index_style === "image") {
                indexBackground = `linear-gradient(135deg, ${literature.theme_index_color_1 || "#141416"}, ${literature.theme_index_color_2 || "#0b0b0d"})`;
            }

            root.style.setProperty("--literature-index-background", indexBackground);
            root.style.setProperty("--literature-index-text", literature.theme_index_text_color || "#f5f5f5");
            root.style.setProperty("--literature-index-image", "none");
            root.style.setProperty("--literature-index-opacity", literature.theme_index_opacity ?? .85);
            root.style.setProperty("--literature-index-overlay", literature.theme_index_overlay ?? .35);
            root.style.setProperty("--literature-index-button-text", literature.theme_index_button_text_color || literature.theme_index_text_color || "#f5f5f5");
        }

        async function loadChapters(literatureId) {
            const container = document.getElementById("chapters-container");

            const { data: chapters, error } = await supabase
                .from("literature_chapters")
                .select("*")
                .eq("literature_id", literatureId)
                .eq("visibility", "published")
                .order("display_order", { ascending: true });

            if (error) {
                container.innerHTML = `<p class="empty">${escapeHtml(error.message)}</p>`;
                return;
            }

            allChapters = chapters || [];
            updateReadingMeta(allChapters);
            document.getElementById("reader-tools").style.display = allChapters.length ? "flex" : "none";

            if (!allChapters.length) {
                container.innerHTML = `<p class="empty">This literature project does not have any public chapters yet.</p>`;
                return;
            }

            renderChapterIndex(allChapters);
            container.innerHTML = allChapters.map((chapter, index) => buildChapterArticle(chapter, index)).join("");
            setupReaderScrollTracking();

            const requested = Number(params.get("chapter")) || Number((window.location.hash || "").replace("#chapter-", ""));
            if (requested && requested > 0 && requested <= allChapters.length) {
                setTimeout(() => {
                    document.getElementById(`chapter-${requested}`)?.scrollIntoView({ behavior: "smooth", block: "start" });
                }, 100);
            }
        }

        function renderChapterIndex(chapters) {
            const nav = document.getElementById("chapter-index");
            const links = document.getElementById("chapter-nav-links");
            const search = document.getElementById("chapter-search");
            const count = document.getElementById("chapter-count");

            nav.style.display = "block";

            const oldCredit = nav.querySelector(".credit-pill");
            if (oldCredit) oldCredit.remove();

            nav.querySelectorAll(".placed-image-stage").forEach(stage => stage.remove());

            if (currentLiterature.theme_index_style === "image" && currentLiterature.theme_index_image_url) {
                nav.insertAdjacentHTML(
                    "afterbegin",
                    buildPlacedImageStage(currentLiterature.theme_index_image_url, currentLiterature.theme_index_image_placement, "literature-index-placed-image")
                );
            }

            const indexCredit = buildCreditPill({
                type: currentLiterature.index_credit_type,
                name: currentLiterature.index_credit_name,
                username: currentLiterature.index_credit_nullverse_username,
                url: currentLiterature.index_credit_url,
                note: currentLiterature.index_credit_note,
                ownerUsername: currentLiterature.ownerProfile?.username,
                context: "Index Image"
            });

            if (indexCredit && currentLiterature.theme_index_style === "image" && currentLiterature.theme_index_image_url) {
                nav.insertAdjacentHTML("beforeend", indexCredit);
            }

            function draw() {
                const query = (search.value || "").toLowerCase().trim();
                const filtered = chapters.filter(chapter => {
                    return (
                        (chapter.title || "").toLowerCase().includes(query) ||
                        (chapter.subtitle || "").toLowerCase().includes(query) ||
                        getPlainTextFromHtml(chapter.body || "").toLowerCase().includes(query)
                    );
                });

                count.textContent = `${filtered.length} ${filtered.length === 1 ? "Chapter" : "Chapters"}`;

                if (!filtered.length) {
                    links.innerHTML = `<p class="empty">No chapters match this search.</p>`;
                    return;
                }

                links.innerHTML = filtered.map(chapter => {
                    const realIndex = chapters.indexOf(chapter);
                    return `
                                <a class="chapter-nav-link" href="#chapter-${realIndex + 1}">
                                    <span>Chapter ${realIndex + 1}: ${escapeHtml(chapter.title || "Untitled")}</span>
                                    <small>${escapeHtml(chapter.subtitle || "Read chapter")}</small>
                                </a>
                            `;
                }).join("");
            }

            search.addEventListener("input", draw);
            draw();
        }


        function getChapterWordCount(chapter) {
            const text = getPlainTextFromHtml(chapter.body || "");
            return text.trim() ? text.trim().split(/\s+/).filter(Boolean).length : 0;
        }

        function getChapterReadTime(chapter) {
            return Math.max(1, Math.ceil(getChapterWordCount(chapter) / 250));
        }

        function updateReadingMeta(chapters) {
            const meta = document.getElementById("reading-meta");
            if (!meta) return;

            const totalWords = chapters.reduce((sum, chapter) => sum + getChapterWordCount(chapter), 0);
            const minutes = Math.max(1, Math.ceil(totalWords / 250));
            const chapterLabel = chapters.length === 1 ? "chapter" : "chapters";

            meta.innerHTML = `
                        <span>${chapters.length} ${chapterLabel}</span>
                        <span>${totalWords.toLocaleString()} words</span>
                        <span>${minutes} min read</span>
                    `;
        }

        window.scrollToFirstChapter = function () {
            document.getElementById("chapter-1")?.scrollIntoView({ behavior: "smooth", block: "start" });
        };

        function toggleActiveReaderButton(className) {
            document.body.classList.toggle(className);
            const target = window.event?.target;
            if (target) target.classList.toggle("active");
        }

        window.toggleReaderFocus = function () {
            const wasFocused = document.body.classList.contains("reader-focus");
            toggleActiveReaderButton("reader-focus");
            const button = window.event?.target;
            if (button) button.textContent = wasFocused ? "Focus" : "Exit Focus";
            if (!wasFocused) {
                setTimeout(() => {
                    document.getElementById("chapter-1")?.scrollIntoView({ behavior: "smooth", block: "start" });
                }, 60);
            }
        };

        window.toggleLargeText = function () {
            toggleActiveReaderButton("reader-large-text");
        };

        window.toggleWideReader = function () {
            toggleActiveReaderButton("reader-wide");
        };

        window.toggleCenteredHeadings = function () {
            toggleActiveReaderButton("reader-center-headings");
        };

        window.toggleMobileIndex = function () {
            document.getElementById("chapter-index")?.classList.toggle("mobile-open");
        };

        function setupReaderScrollTracking() {
            const progress = document.getElementById("reading-progress");
            const chapters = [...document.querySelectorAll(".literature-chapter")];
            const links = [...document.querySelectorAll(".chapter-nav-link")];

            function update() {
                const focus = document.body.classList.contains("reader-focus");
                const scroller = focus ? document.querySelector("main") : document.documentElement;

                const scrollTop = focus
                    ? scroller.scrollTop
                    : (window.scrollY || document.documentElement.scrollTop);

                const docHeight = focus
                    ? (scroller.scrollHeight - scroller.clientHeight)
                    : (document.documentElement.scrollHeight - window.innerHeight);

                const percentage = docHeight > 0
                    ? Math.min(100, Math.max(0, (scrollTop / docHeight) * 100))
                    : 0;

                if (progress) progress.style.width = `${percentage}%`;

                let activeId = "";

                for (const chapter of chapters) {
                    const rect = chapter.getBoundingClientRect();
                    if (rect.top <= 180) activeId = chapter.id;
                }

                links.forEach(link => {
                    link.classList.toggle(
                        "active",
                        link.getAttribute("href") === `#${activeId}`
                    );
                });
            }

            if (window.__nullverseLiteratureScrollHandler) {
                window.removeEventListener("scroll", window.__nullverseLiteratureScrollHandler);

                const oldMain = document.querySelector("main");
                if (oldMain) {
                    oldMain.removeEventListener(
                        "scroll",
                        window.__nullverseLiteratureScrollHandler
                    );
                }
            }

            window.__nullverseLiteratureScrollHandler = update;

            window.addEventListener("scroll", update, { passive: true });

            const main = document.querySelector("main");
            if (main) {
                main.addEventListener("scroll", update, { passive: true });
            }

            update();
        }


        function buildChapterBodyHtml(value) {
            const raw = String(value || "").trim();
            if (!raw) return "No chapter text yet.";

            const looksLikeHtml = /<\/?(p|br|h1|h2|h3|h4|ul|ol|li|blockquote|strong|em|span|div|a|hr)\b/i.test(raw);
            if (looksLikeHtml) return sanitizeChapterHtml(raw);

            return raw
                .split(/\n{2,}/)
                .map(block => `<p>${escapeHtml(block).replaceAll("\n", "<br>")}</p>`)
                .join("");
        }

        function sanitizeChapterHtml(html) {
            const template = document.createElement("template");
            template.innerHTML = String(html || "");

            const allowedTags = new Set([
                "P", "BR", "DIV", "SPAN", "STRONG", "B", "EM", "I", "U", "S", "SUP", "SUB",
                "H1", "H2", "H3", "H4", "UL", "OL", "LI", "BLOCKQUOTE", "A", "HR"
            ]);

            const allowedAttrs = new Set(["href", "target", "rel", "style"]);
            const allowedStyle = new Set([
                "color", "background-color", "font-family", "font-size", "line-height", "text-align",
                "margin-top", "margin-bottom", "padding-left"
            ]);

            function clean(node) {
                [...node.childNodes].forEach(child => {
                    if (child.nodeType === Node.ELEMENT_NODE) {
                        if (!allowedTags.has(child.tagName)) {
                            child.replaceWith(...child.childNodes);
                            return;
                        }

                        [...child.attributes].forEach(attr => {
                            const name = attr.name.toLowerCase();

                            if (!allowedAttrs.has(name)) {
                                child.removeAttribute(attr.name);
                                return;
                            }

                            if (name === "href") {
                                const href = child.getAttribute("href") || "";
                                if (!/^https?:\/\//i.test(href) && !href.startsWith("#")) {
                                    child.removeAttribute("href");
                                }
                            }

                            if (name === "style") {
                                const safeRules = String(child.getAttribute("style") || "")
                                    .split(";")
                                    .map(rule => rule.trim())
                                    .filter(rule => {
                                        const prop = rule.split(":")[0]?.trim().toLowerCase();
                                        return allowedStyle.has(prop);
                                    });

                                if (safeRules.length) child.setAttribute("style", safeRules.join("; "));
                                else child.removeAttribute("style");
                            }
                        });

                        if (child.tagName === "A") {
                            child.setAttribute("target", "_blank");
                            child.setAttribute("rel", "noopener noreferrer");
                        }

                        clean(child);
                    }
                });
            }

            clean(template.content);
            return template.innerHTML;
        }

        function getPlainTextFromHtml(html) {
            const div = document.createElement("div");
            div.innerHTML = sanitizeChapterHtml(html || "");
            return div.textContent || div.innerText || "";
        }

        function buildChapterArticle(chapter, index) {
            const chapterNumber = index + 1;
            const visualTop = buildChapterHeaderImage(chapter, "top");
            const visualLeftRight = ["left", "right"].includes(chapter.image_position) ? buildChapterHeaderImage(chapter, chapter.image_position) : "";
            const visualBottom = buildChapterHeaderImage(chapter, "bottom");

            return `
                        <article id="chapter-${chapterNumber}"
                                 class="literature-chapter"
                                 style="${buildChapterCardStyle(chapter)} ${buildChapterWritingStyle(chapter)}">
                            ${chapter.theme_card_style === "image" && chapter.theme_card_image_url ? buildPlacedImageStage(chapter.theme_card_image_url, chapter.theme_card_image_placement, "chapter-card-placed-image") : ""}
                            <div class="chapter-title-row">
                                <div class="chapter-eyebrow">Chapter ${chapterNumber} · ${getChapterReadTime(chapter)} min read</div>
                                <h2>${escapeHtml(chapter.title || "Untitled")}</h2>
                                ${chapter.subtitle ? `<div class="chapter-subtitle">${escapeHtml(chapter.subtitle)}</div>` : ""}
                            </div>

                            ${visualTop}

                            <div class="chapter-main-text">
                                ${visualLeftRight}
                                ${buildChapterBodyHtml(chapter.body || "No chapter text yet.")}
                            </div>

                            ${visualBottom}

                            ${chapter.author_note ? `
                                <div class="author-note">
                                    <strong>Author Note</strong>
                                    <br><br>
                                    ${escapeHtml(chapter.author_note)}
                                </div>
                            ` : ""}

                            ${chapter.theme_card_style === "image" && chapter.theme_card_image_url ? buildCreditPill({
                type: chapter.card_credit_type,
                name: chapter.card_credit_name,
                username: chapter.card_credit_nullverse_username,
                url: chapter.card_credit_url,
                note: chapter.card_credit_note,
                ownerUsername: currentLiterature.ownerProfile?.username,
                context: "Chapter Card Image"
            }) : ""}
                        </article>
                    `;
        }

        function buildChapterHeaderImage(chapter, requestedPosition) {
            if (!chapter.image_url) return "";

            const savedPosition = chapter.image_position || "top";
            const isLeftRight = savedPosition === "left" || savedPosition === "right";

            if (requestedPosition === "top" && !(savedPosition === "top" || savedPosition === "full")) return "";
            if (requestedPosition === "bottom" && savedPosition !== "bottom") return "";
            if ((requestedPosition === "left" || requestedPosition === "right") && savedPosition !== requestedPosition) return "";

            const credit = buildCreditPill({
                type: chapter.image_credit_type,
                name: chapter.image_credit_name,
                username: chapter.image_credit_nullverse_username,
                url: chapter.image_credit_url,
                note: chapter.image_credit_note,
                ownerUsername: currentLiterature.ownerProfile?.username,
                context: "Chapter Image"
            });

            const classes = [
                "chapter-header-image-wrap",
                savedPosition === "full" ? "full" : savedPosition,
                isLeftRight ? `float-${savedPosition}` : "",
                credit ? "has-credit" : ""
            ].filter(Boolean).join(" ");

            return `
                        <div class="${classes}">
                            ${buildPlacedImageStage(chapter.image_url, chapter.image_placement, "chapter-header-placed-image")}
                            ${credit}
                        </div>
                    `;
        }

        function buildChapterCardStyle(chapter) {
            let background = "linear-gradient(180deg, rgba(255,255,255,.04), rgba(255,255,255,.012))";

            if (chapter.theme_card_style === "solid") {
                background = chapter.theme_card_color_1 || "#141416";
            }

            if (chapter.theme_card_style === "gradient" || chapter.theme_card_style === "image") {
                background = `linear-gradient(135deg, ${chapter.theme_card_color_1 || "#141416"}, ${chapter.theme_card_color_2 || "#0b0b0d"})`;
            }

            const image = "none";

            return `
                        --chapter-card-background:${background};
                        --chapter-card-text:${chapter.theme_card_text_color || "#f5f5f5"};
                        --chapter-card-image:${image};
                        --chapter-card-image-opacity:${chapter.theme_card_opacity ?? .85};
                        --chapter-card-overlay:${chapter.theme_card_overlay ?? .35};
                    `;
        }

        function buildChapterWritingStyle(chapter) {
            const spacingMap = {
                compact: ["1.45", "0px"],
                comfortable: ["1.8", "0px"],
                airy: ["2.15", ".02em"],
                manuscript: ["2", ".01em"]
            };

            const spacing = spacingMap[chapter.spacing_type || "comfortable"] || spacingMap.comfortable;

            return `
                        --chapter-text-color:${chapter.text_color || "#f5f5f5"};
                        --chapter-panel-background:${chapter.chapter_panel_color || "#141416"};
                        --chapter-line-height:${spacing[0]};
                        --chapter-letter-spacing:${spacing[1]};
                    `;
        }

        function renderTags(literature) {
            const container = document.getElementById("book-tags");
            const tags = [
                ...(literature.genres || "").split(","),
                ...(literature.themes || "").split(",")
            ].map(tag => tag.trim()).filter(Boolean);

            container.innerHTML = `<span class="tag">Literature</span>` +
                tags.map(tag => `<span class="tag">${escapeHtml(tag)}</span>`).join("");
        }

        function renderOwnerActions(literature) {
            const container = document.getElementById("owner-actions");
            let html = "";

            if (currentUser && currentUser.id === literature.owner_id) {
                html += `
                            <a class="button" href="edit-literature.html?id=${encodeURIComponent(literature.id)}">
                                Edit Literature
                            </a>
                        `;
            }

            if (canModerateWorlds(currentPermissions) && canModerateContentOwner(currentProfile, literature.ownerProfile)) {
                html += `
                            <div style="margin-top:16px;padding:14px;border:1px solid var(--border-color);border-radius:14px;background:rgba(255,255,255,0.04);">
                <strong>Literature Moderation</strong>

                <p class="empty">
                    Status: ${escapeHtml(literature.moderation_status || "visible")}
                </p>

                <div style="display:flex;gap:10px;flex-wrap:wrap;">
                    <button class="button" onclick="setLiteratureModerationStatus('visible')">
                        Restore Literature
                    </button>

                    <div style="width:100%;margin-top:10px;">
                        <label class="empty">Reason for hiding</label>

                        <input id="literature-hide-reason"
                               placeholder="Reason shown to creator..."
                               style="
                                   width:100%;
                                   box-sizing:border-box;
                                   margin-top:8px;
                                   padding:10px;
                                   border-radius:10px;
                                   border:1px solid var(--border-color);
                                   background:rgba(0,0,0,.28);
                                   color:var(--text-primary);
                               ">
                    </div>

                    <button class="button" onclick="setLiteratureModerationStatus('hidden')">
                        Hide Literature
                    </button>
                </div>

                <p id="literature-moderation-message" class="empty"></p>
</div>
                        `;
            }

            container.innerHTML = html;
        }

        async function loadLikes() {
            if (!currentLiterature) return;

            const { data: likes, error } = await supabase
                .from("world_likes")
                .select("*")
                .eq("world_id", currentLiterature.id);

            if (error) {
                document.getElementById("like-count").textContent = "Likes unavailable";
                return;
            }

            const likeCount = likes ? likes.length : 0;
            document.getElementById("like-count").textContent = `${likeCount} ${likeCount === 1 ? "Like" : "Likes"}`;

            const userLiked = likes?.some(like => like.user_id === currentUser.id);
            const button = document.getElementById("like-button");

            if (userLiked) {
                button.classList.add("liked");
                button.textContent = "♥ Liked";
            } else {
                button.classList.remove("liked");
                button.textContent = "♡ Like";
            }
        }

        document.getElementById("like-button").addEventListener("click", async () => {
            if (!currentLiterature || !currentUser) return;

            const button = document.getElementById("like-button");
            const alreadyLiked = button.classList.contains("liked");

            if (alreadyLiked) {
                await supabase
                    .from("world_likes")
                    .delete()
                    .eq("world_id", currentLiterature.id)
                    .eq("user_id", currentUser.id);
            } else {
                const { error: likeError } = await supabase
                    .from("world_likes")
                    .insert({
                        world_id: currentLiterature.id,
                        user_id: currentUser.id
                    });

                if (!likeError) {
                    await createNotification({
                        recipientId: currentLiterature.owner_id,
                        actorId: currentUser.id,
                        worldId: currentLiterature.id,
                        type: "world_liked",
                        message: `Someone liked ${currentLiterature.title}.`,
                        link: `literature.html?id=${encodeURIComponent(currentLiterature.id)}`
                    });
                }
            }

            await loadLikes();
        });

        window.setLiteratureModerationStatus = async function (status) {
            if (!currentLiterature || !canModerateWorlds(currentPermissions)) return;

            const reasonInput = document.getElementById("literature-hide-reason");
            const reason = reasonInput ? reasonInput.value.trim() : "";

            if (status === "hidden" && !reason) {
                const message = document.getElementById("literature-moderation-message");
                if (message) message.textContent = "Enter a reason before hiding this literature.";
                return;
            }

            const { error } = await supabase
                .from("worlds")
                .update({
                    moderation_status: status,
                    moderation_reason: status === "hidden" ? reason : null
                })
                .eq("id", currentLiterature.id);

            const message = document.getElementById("literature-moderation-message");

            if (error) {
                if (message) message.textContent = error.message;
                return;
            }

            const logReason = status === "hidden"
                ? reason
                : `Literature "${currentLiterature.title || "Untitled Literature"}" restored to visible.`;

            await supabase.from("moderation_logs").insert({
                target_user_id: currentLiterature.owner_id,
                moderator_id: currentUser.id,
                action: `literature_${status}`,
                reason: logReason,
                expires_at: null
            });

            if (status === "hidden") {
                await createNotification({
                    recipientId: currentLiterature.owner_id,
                    actorId: currentUser.id,
                    worldId: currentLiterature.id,
                    type: "world_hidden",
                    message: `Your literature "${currentLiterature.title || "Untitled Literature"}" was hidden by moderation. Reason: ${reason}`,
                    link: "dashboard.html"
                });
            }

            if (status === "visible") {
                await createNotification({
                    recipientId: currentLiterature.owner_id,
                    actorId: currentUser.id,
                    worldId: currentLiterature.id,
                    type: "world_restored",
                    message: `Your literature "${currentLiterature.title || "Untitled Literature"}" was restored by moderation.`,
                    link: `literature.html?id=${encodeURIComponent(currentLiterature.id)}`
                });
            }

            if (message) message.textContent = `Literature set to ${status}.`;

            setTimeout(() => window.location.reload(), 700);
        };

        function setupReportSystem() {
            const reportBtn = document.getElementById("report-literature-btn");
            const modal = document.getElementById("report-modal");
            const closeBtn = document.getElementById("close-report-btn");
            const submitBtn = document.getElementById("submit-report-btn");

            if (!reportBtn) return;

            reportBtn.addEventListener("click", () => {
                modal.style.display = "flex";
            });

            closeBtn.addEventListener("click", () => {
                modal.style.display = "none";
            });

            submitBtn.addEventListener("click", submitLiteratureReport);
        }

        async function submitLiteratureReport() {
            if (!currentLiterature) return;

            const reason = document.getElementById("report-reason").value;
            const details = document.getElementById("report-details").value.trim();

            const { error } = await supabase.from("reports").insert({
                reporter_id: currentUser.id,
                reported_user_id: currentLiterature.owner_id,
                world_id: currentLiterature.id,
                report_type: "literature",
                reason,
                details,
                status: "open"
            });

            if (error) {
                alert(error.message);
                return;
            }

            document.getElementById("report-modal").style.display = "none";
            alert("Report submitted.");
        }

        function showHiddenNotice(literature) {
            document.querySelector("main").innerHTML = `
                    <section class="content-warning-panel">
                        <h1>Literature Hidden by Moderation</h1>

                        <p class="empty">
                            This literature is currently hidden from the public by Nullverse moderation.
                        </p>

                        <p class="empty">
                            <strong>Reason:</strong>
                            ${escapeHtml(literature.moderation_reason || "No reason provided.")}
                        </p>

                        <div style="display:flex;gap:12px;flex-wrap:wrap;">
                            <a class="button" href="dashboard.html">Back to Dashboard</a>

                            <a class="button" href="edit-literature.html?id=${encodeURIComponent(literature.id)}">
                                Edit Literature
                            </a>
                        </div>
                    </section>
                `;
        }

        function showNotFound(message) {
            document.getElementById("book-title").textContent = "Literature not found";
            document.getElementById("book-creator").textContent = "";
            document.getElementById("book-summary").textContent = message;
            document.getElementById("chapters-container").innerHTML = "";
            document.getElementById("book-tags").innerHTML = `<span class="tag">Not Found</span>`;
            document.getElementById("like-button").style.display = "none";
            document.getElementById("like-count").style.display = "none";
        }

        function showContentBlocked(literature) {
            document.querySelector("main").innerHTML = `
                        <section class="content-warning-panel">
                            <h1>Content Hidden</h1>
                            <p class="empty">This literature is hidden by your content safety settings.</p>
                            <div class="warning-list">
                                ${(literature.content_warnings || []).map(warning => `
                                    <span class="warning-pill">${escapeHtml(formatWarningLabel(warning))}</span>
                                `).join("")}
                            </div>
                            <a class="button" href="explore.html">Back to Explore</a>
                        </section>
                    `;
        }

        function showContentWarning(literature) {
            document.querySelector("main").innerHTML = `
                        <section class="content-warning-panel">
                            <h1>Content Warning</h1>
                            <p class="empty">This literature may contain sensitive or mature content.</p>
                            <div class="warning-list">
                                ${literature.content_rating === "adult" ? `<span class="warning-pill">Adult 18+</span>` : ""}
                                ${(literature.content_warnings || []).map(warning => `
                                    <span class="warning-pill">${escapeHtml(formatWarningLabel(warning))}</span>
                                `).join("")}
                            </div>
                            <div style="display:flex;gap:12px;flex-wrap:wrap;">
                                <button id="continue-warning-button" class="button">Continue Anyway</button>
                                <a class="button" href="explore.html">Go Back</a>
                            </div>
                        </section>
                    `;

            document.getElementById("continue-warning-button").addEventListener("click", () => {
                window.location.href = `literature.html?id=${encodeURIComponent(literature.id)}&contentOk=${encodeURIComponent(literature.id)}`;
            });
        }

        function formatWarningLabel(value) {
            return String(value || "")
                .replaceAll("_", " ")
                .replace(/\b\w/g, letter => letter.toUpperCase());
        }

        function escapeHtml(value) {
            return String(value || "")
                .replaceAll("&", "&amp;")
                .replaceAll("<", "&lt;")
                .replaceAll(">", "&gt;")
                .replaceAll('"', "&quot;")
                .replaceAll("'", "&#039;");
        }

        function formatCreditType(value) {
            return String(value || "")
                .replaceAll("_", " ")
                .replace(/\b\w/g, letter => letter.toUpperCase());
        }

        function buildCreditPill({ type, name, username, url, note, ownerUsername, context = "Image" }) {
            type = type || "no_credit_needed";

            if (type === "no_credit_needed") return "";

            let label = "";
            let href = "";

            if (type === "own_work") {
                label = `${context} Credit: @${ownerUsername || "creator"}`;
                if (ownerUsername) href = `profile.html?user=${encodeURIComponent(ownerUsername)}`;
            } else if (type === "nullverse_creator" && username) {
                label = `${context} Credit: @${username}`;
                href = `profile.html?user=${encodeURIComponent(username)}`;
            } else {
                label = `${context} Credit: ${name || formatCreditType(type)}`;
                href = url || "";
            }

            const tooltipContent = `
                        <strong>${escapeHtml(context)} Credit</strong>
                        <br>
                        Source: ${escapeHtml(name || username || ownerUsername || formatCreditType(type))}
                        ${note ? `<br><br>${escapeHtml(note)}` : ""}
                    `;

            const tooltip = `<span class="credit-tooltip">${tooltipContent}</span>`;

            if (href) {
                return `
                            <a class="credit-pill"
                               href="${escapeHtml(href)}"
                               ${href.startsWith("http") ? 'target="_blank"' : ""}>
                                ${escapeHtml(label)}
                                ${tooltip}
                            </a>
                        `;
            }

            return `
                        <span class="credit-pill">
                            ${escapeHtml(label)}
                            ${tooltip}
                        </span>
                    `;
        }

        window.logOut = async function () {
            await supabase.auth.signOut();
            window.location.href = "login.html";
        };
    </script>
