<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" href="favicon.png">
    <title>Literature - Nullverse</title>
    <script>
        const savedNullverseTheme = localStorage.getItem("nullverse-theme") || "void";
        document.documentElement.setAttribute("data-theme", savedNullverseTheme);
    </script>
    <link rel="stylesheet" href="theme.css?v=25">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Alegreya:wght@400;500;600;700&family=EB+Garamond:wght@400;500;600;700&family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600;700&family=Libre+Baskerville:wght@400;700&family=Lora:wght@400;500;600;700&family=Merriweather:wght@300;400;700;900&family=Nunito:wght@400;500;600;700;800&family=Open+Sans:wght@400;500;600;700;800&family=Roboto:wght@400;500;700;900&display=swap" rel="stylesheet">
    <style>
        html {
            min-height: 100%;
            background: #000;
            scroll-behavior: smooth;
        }

        body {
            margin: 0;
            min-height: 100vh;
            font-family: Arial, sans-serif;
            background: #000;
            background-attachment: fixed;
            color: var(--text-primary);
            transition: background .25s ease, color .25s ease;
        }

            body.reader-focus {
                overflow: hidden;
            }

                body.reader-focus header,
                body.reader-focus .book-hero,
                body.reader-focus .left-sidebar {
                    display: none;
                }

                body.reader-focus main {
                    position: fixed;
                    inset: 0;
                    z-index: 9990;
                    display: block;
                    max-width: none;
                    width: 100%;
                    height: 100dvh;
                    margin: 0;
                    padding: 0;
                    overflow-y: auto;
                    overflow-x: hidden;
                    background: radial-gradient(circle at top, rgba(255,255,255,.055), transparent 35%), rgba(0,0,0,.72);
                    backdrop-filter: blur(18px);
                    -webkit-backdrop-filter: blur(18px);
                }

                body.reader-focus .content-column {
                    width: 100%;
                    max-width: none;
                    min-height: 100dvh;
                }

                body.reader-focus .reader-tools {
                    position: sticky;
                    top: 0;
                    z-index: 9995;
                    margin: 0;
                    border-radius: 0;
                    border-left: 0;
                    border-right: 0;
                    padding: 10px 18px;
                    background: linear-gradient(180deg, rgba(12,12,16,.96), rgba(8,8,12,.90));
                    box-shadow: 0 12px 38px rgba(0,0,0,.38);
                }

                body.reader-focus #chapters-container {
                    width: 100%;
                    max-width: none;
                    box-sizing: border-box;
                    padding: 26px clamp(14px, 4vw, 64px) 90px;
                }

                body.reader-focus .literature-chapter {
                    width: 100%;
                    max-width: none;
                    min-height: calc(100dvh - 112px);
                    box-sizing: border-box;
                    margin: 0 auto 34px;
                    border-radius: 28px;
                    box-shadow: 0 24px 70px rgba(0,0,0,.52), 0 0 36px rgba(255,255,255,.06);
                }

                body.reader-focus .chapter-title-row,
                body.reader-focus .chapter-header-image-wrap,
                body.reader-focus .author-note {
                    max-width: min(1120px, calc(100vw - 48px));
                }

                body.reader-focus .chapter-main-text {
                    max-width: min(1120px, calc(100vw - 48px));
                    margin-left: auto;
                    margin-right: auto;
                }

                body.reader-focus.reader-wide .chapter-main-text,
                body.reader-focus.reader-wide .chapter-title-row,
                body.reader-focus.reader-wide .chapter-header-image-wrap,
                body.reader-focus.reader-wide .author-note {
                    max-width: min(1380px, calc(100vw - 48px));
                }

                body.reader-focus .literature-background-layer .credit-pill {
                    z-index: 10000;
                }

        header, main {
            position: relative;
            z-index: 2;
        }

        .reading-progress {
            position: fixed;
            top: 0;
            left: 0;
            height: 3px;
            width: 0%;
            z-index: 10000;
            background: linear-gradient(90deg, rgba(255,255,255,.35), #fff);
            box-shadow: 0 0 16px rgba(255,255,255,.38);
            transition: width .08s linear;
        }

        .literature-background-layer {
            position: fixed;
            inset: 0;
            z-index: 0;
            overflow: hidden;
            pointer-events: none;
        }

        .literature-background-image,
        .literature-background-base,
        .literature-background-overlay {
            position: absolute;
            inset: 0;
        }

        .literature-background-base {
            background: var(--page-bg);
        }

        .literature-background-image {
            background-position: center;
            background-size: cover;
            background-repeat: no-repeat;
            opacity: .35;
            transform: scale(1.03);
        }

        .literature-background-overlay {
            background: rgba(0,0,0,.35);
        }

        .literature-background-layer .credit-pill {
            position: fixed;
            left: 18px;
            bottom: 18px;
            pointer-events: auto;
        }

        header {
            padding: 10px 38px;
            border-bottom: 1px solid rgba(255,255,255,.10);
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(8,8,12,.72);
            position: sticky;
            top: 0;
            z-index: 100;
            backdrop-filter: blur(22px);
            -webkit-backdrop-filter: blur(22px);
            box-shadow: 0 12px 38px rgba(0,0,0,.30);
        }

        .logo, .logo a {
            display: flex;
            align-items: center;
        }

        .site-logo {
            height: 58px;
            width: auto;
            display: block;
            max-width: none;
        }

        nav {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
            align-items: center;
        }

            nav a,
            nav button {
                color: var(--text-secondary);
                text-decoration: none;
                background: none;
                border: none;
                cursor: pointer;
                font-family: Arial, sans-serif;
                font-size: .94rem;
                transition: .18s ease;
            }

                nav a:hover,
                nav button:hover {
                    color: white;
                }

        main {
            display: grid;
            grid-template-columns: 310px minmax(0, 1fr);
            gap: 30px;
            max-width: 1480px;
            margin: auto;
            padding: 38px 40px 90px;
            box-sizing: border-box;
        }

        .left-sidebar {
            position: sticky;
            top: 94px;
            height: fit-content;
        }

        .content-column {
            min-width: 0;
        }

        .book-hero,
        .chapter-index,
        .literature-chapter,
        .content-warning-panel,
        .reader-tools {
            border: 1px solid rgba(255,255,255,.11);
            border-radius: 28px;
            background: linear-gradient(135deg, rgba(255,255,255,.075), rgba(255,255,255,.022)), rgba(8,8,12,.70);
            backdrop-filter: blur(22px);
            -webkit-backdrop-filter: blur(22px);
            box-shadow: 0 24px 58px rgba(0,0,0,.32), inset 0 1px 0 rgba(255,255,255,.04);
        }

        .book-hero {
            position: relative;
            overflow: hidden;
            padding: 34px;
            margin-bottom: 22px;
        }

        .book-layout {
            display: grid;
            grid-template-columns: minmax(180px, 285px) minmax(0,1fr);
            gap: 30px;
            align-items: start;
        }

        .cover-wrap {
            position: relative;
            overflow: hidden;
            border-radius: 22px;
            border: 1px solid rgba(255,255,255,.12);
            min-height: 0;
            background: rgba(255,255,255,.045);
            box-shadow: 0 18px 44px rgba(0,0,0,.34);
            align-self: start;
        }

            .cover-wrap img {
                width: 100%;
                height: auto;
                max-height: 470px;
                object-fit: contain;
                display: block;
                transform-origin: center center;
            }

            .cover-wrap.placed-cover {
                height: 470px;
            }

                .cover-wrap.placed-cover img {
                    width: 100%;
                    height: 100%;
                    max-height: none;
                    object-fit: cover;
                }

            .cover-wrap.has-credit {
                padding-bottom: 54px;
            }

        .cover-placeholder {
            min-height: 320px;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 18px;
            text-align: center;
            color: var(--text-muted);
            box-sizing: border-box;
        }

        .tag-row {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            margin-bottom: 18px;
        }

        .tag {
            display: inline-block;
            font-size: .8rem;
            color: var(--text-secondary);
            border: 1px solid rgba(255,255,255,.10);
            background: rgba(255,255,255,.05);
            border-radius: 999px;
            padding: 7px 11px;
        }

        h1 {
            margin: 0 0 10px;
            font-size: clamp(2.25rem, 5vw, 4.8rem);
            letter-spacing: -.04em;
            color: var(--text-primary);
        }

        .creator,
        .summary,
        .empty {
            color: var(--text-secondary);
            line-height: 1.75;
        }

            .creator a {
                color: var(--text-secondary);
                text-decoration: none;
            }

                .creator a:hover {
                    color: white;
                }

        .summary {
            margin-top: 18px;
            white-space: pre-wrap;
            max-width: 78ch;
        }

        .reading-meta {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            margin: 16px 0 0;
        }

            .reading-meta span {
                display: inline-flex;
                padding: 8px 12px;
                border-radius: 999px;
                border: 1px solid rgba(255,255,255,.10);
                background: rgba(255,255,255,.045);
                color: var(--text-muted);
                font-size: .86rem;
            }

        .action-row {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-top: 26px;
            flex-wrap: wrap;
        }

        .button,
        .like-button {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(180deg,#2a2a2f,#0d0d10);
            color: #f5f5f5;
            border: 1px solid rgba(255,255,255,.12);
            padding: 10px 15px;
            border-radius: 12px;
            cursor: pointer;
            text-decoration: none;
            font-family: Arial, sans-serif;
            transition: .18s ease;
            box-shadow: 0 0 16px rgba(255,255,255,.08), inset 0 1px 0 rgba(255,255,255,.06);
        }

            .button:hover,
            .like-button:hover {
                opacity: .95;
                transform: translateY(-1px);
                border-color: rgba(255,255,255,.20);
                box-shadow: 0 0 20px rgba(255,255,255,.12), inset 0 1px 0 rgba(255,255,255,.08);
            }

            .like-button.liked {
                background: linear-gradient(180deg,#4a2f37 0%,#2a181d 100%);
            }

        .like-count {
            color: var(--text-muted);
        }

        .owner-actions {
            margin-top: 22px;
        }

        .reader-tools {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 12px;
            flex-wrap: wrap;
            margin-bottom: 22px;
            padding: 14px;
            border-radius: 22px;
        }

        .reader-tools-left,
        .reader-tools-right {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            align-items: center;
        }

        .reader-tool-button {
            border: 1px solid rgba(255,255,255,.10);
            background: rgba(255,255,255,.045);
            color: var(--text-secondary);
            border-radius: 999px;
            padding: 9px 12px;
            cursor: pointer;
            transition: .18s ease;
        }

            .reader-tool-button:hover,
            .reader-tool-button.active {
                color: white;
                background: rgba(255,255,255,.11);
                border-color: rgba(255,255,255,.20);
            }

        .chapter-index {
            position: relative;
            overflow: hidden;
            height: min(620px, calc(100vh - 124px));
            max-height: calc(100vh - 124px);
            min-height: 360px;
            box-sizing: border-box;
            padding: 18px;
            padding-bottom: 84px;
            background: var(--literature-index-background, var(--panel-bg));
            color: var(--literature-index-text, var(--text-primary));
            border-radius: 24px;
        }

            .chapter-index::before {
                content: "";
                position: absolute;
                inset: 0;
                background-image: var(--literature-index-image);
                background-size: var(--literature-index-image-size, cover);
                background-position: center;
                transform-origin: center center;
                transform: var(--literature-index-image-transform, none);
                opacity: var(--literature-index-opacity,.85);
                z-index: 0;
            }

            .chapter-index::after {
                content: "";
                position: absolute;
                inset: 0;
                background: rgba(0,0,0,var(--literature-index-overlay,.35));
                z-index: 1;
            }

            .chapter-index > * {
                position: relative;
                z-index: 2;
            }

        .index-header h2 {
            margin: 0;
            font-size: 1.16rem;
        }

        .index-header p {
            margin: 6px 0 16px;
            color: var(--literature-index-text, var(--text-muted));
            font-size: .88rem;
            line-height: 1.5;
            opacity: .82;
        }

        .chapter-search {
            width: 100%;
            box-sizing: border-box;
            padding: 12px 14px;
            border-radius: 13px;
            border: 1px solid rgba(255,255,255,.16);
            background: rgba(0,0,0,.30);
            color: var(--literature-index-text,white);
            margin-bottom: 14px;
            transition: .18s ease;
        }

            .chapter-search:focus {
                outline: none;
                border-color: rgba(255,255,255,.28);
                box-shadow: 0 0 18px rgba(255,255,255,.08);
            }

        .chapter-count {
            color: var(--literature-index-text, var(--text-muted));
            font-size: .82rem;
            margin-bottom: 16px;
            opacity: .82;
        }

        #chapter-nav-links {
            display: flex;
            flex-direction: column;
            gap: 10px;
            max-height: clamp(210px, calc(100vh - 358px), 410px);
            overflow-y: auto;
            overflow-x: hidden;
            padding-right: 6px;
            overscroll-behavior: contain;
            scrollbar-width: thin;
        }

            #chapter-nav-links::-webkit-scrollbar {
                width: 8px;
            }

            #chapter-nav-links::-webkit-scrollbar-track {
                background: rgba(255,255,255,.035);
                border-radius: 999px;
            }

            #chapter-nav-links::-webkit-scrollbar-thumb {
                background: rgba(255,255,255,.20);
                border-radius: 999px;
            }

        .chapter-nav-link {
            display: block;
            padding: 13px 14px;
            border-radius: 15px;
            background: rgba(0,0,0,.20);
            border: 1px solid rgba(255,255,255,.08);
            color: var(--literature-index-button-text, var(--literature-index-text));
            text-decoration: none;
            transition: .18s ease;
        }

            .chapter-nav-link:hover,
            .chapter-nav-link.active {
                background: rgba(255,255,255,.15);
                transform: translateX(4px);
                color: var(--literature-index-text,white);
                border-color: rgba(255,255,255,.20);
            }

            .chapter-nav-link span {
                display: block;
                font-weight: 700;
            }

            .chapter-nav-link small {
                display: block;
                margin-top: 5px;
                color: var(--literature-index-button-text, var(--literature-index-text));
                font-size: .78rem;
                opacity: .82;
                line-height: 1.45;
            }

        .literature-chapter {
            position: relative;
            overflow: hidden;
            padding: clamp(24px, 4vw, 42px);
            padding-bottom: 74px;
            margin-bottom: 30px;
            background: var(--chapter-card-background, linear-gradient(180deg,rgba(255,255,255,.045),rgba(255,255,255,.012))), rgba(8,8,12,.76);
            color: var(--chapter-card-text, var(--text-primary));
            transition: .18s ease;
        }

            .literature-chapter::before {
                content: "";
                position: absolute;
                inset: 0;
                background-image: var(--chapter-card-image);
                background-size: var(--chapter-card-image-size, cover);
                background-position: center;
                transform-origin: center center;
                transform: var(--chapter-card-image-transform, none);
                opacity: var(--chapter-card-image-opacity,.85);
                z-index: 0;
            }

            .literature-chapter::after {
                content: "";
                position: absolute;
                inset: 0;
                background: rgba(0,0,0,var(--chapter-card-overlay,.35));
                z-index: 1;
            }

            .literature-chapter > * {
                position: relative;
                z-index: 2;
            }

        .chapter-title-row {
            max-width: 900px;
            margin: 0 auto 28px;
            text-align: var(--reader-heading-align, left);
        }

        .chapter-eyebrow {
            color: var(--chapter-card-text, var(--text-muted));
            font-size: .86rem;
            letter-spacing: .11em;
            text-transform: uppercase;
            margin-bottom: 9px;
            opacity: .78;
        }

        .chapter-title-row h2 {
            margin: 0;
            font-size: clamp(2rem, 4vw, 3.4rem);
            line-height: 1.04;
            letter-spacing: -.035em;
            color: var(--chapter-card-text, var(--text-primary));
        }

        .chapter-subtitle {
            color: var(--chapter-card-text, var(--text-secondary));
            margin-top: 12px;
            line-height: 1.65;
            opacity: .82;
        }

        .chapter-header-image-wrap {
            position: relative;
            max-width: 900px;
            margin: 0 auto 26px;
        }

            .chapter-header-image-wrap.float-left {
                float: left;
                width: 320px;
                max-width: 42%;
                margin: 4px 26px 18px 0;
            }

            .chapter-header-image-wrap.float-right {
                float: right;
                width: 320px;
                max-width: 42%;
                margin: 4px 0 18px 26px;
            }

            .chapter-header-image-wrap.full {
                max-width: 100%;
            }

                .chapter-header-image-wrap.full img,
                .chapter-header-image-wrap.top img,
                .chapter-header-image-wrap.bottom img {
                    width: 100%;
                    max-height: 540px;
                }

            .chapter-header-image-wrap img {
                display: block;
                width: 100%;
                max-width: 100%;
                object-fit: cover;
                border-radius: 18px;
                border: 1px solid rgba(255,255,255,.12);
                box-shadow: 0 18px 44px rgba(0,0,0,.30);
            }

            .chapter-header-image-wrap.has-credit {
                padding-bottom: 54px;
            }

                .chapter-header-image-wrap.has-credit .credit-pill {
                    bottom: 8px;
                }

        .chapter-main-text {
            clear: none;
            max-width: var(--reader-width, 820px);
            margin: 0 auto;
            background: var(--chapter-panel-background, rgba(12,12,14,.64));
            color: var(--chapter-text-color, var(--chapter-card-text));
            border: 1px solid rgba(255,255,255,.10);
            border-radius: 22px;
            padding: clamp(26px, 5vw, 54px);
            line-height: var(--chapter-line-height,1.8);
            letter-spacing: var(--chapter-letter-spacing,0);
            white-space: normal;
            font-size: var(--reader-font-size, 1.08rem);
            overflow-wrap: anywhere;
            box-shadow: inset 0 1px 0 rgba(255,255,255,.05), 0 16px 36px rgba(0,0,0,.18);
        }

            .chapter-main-text h1,
            .chapter-main-text h2,
            .chapter-main-text h3,
            .chapter-main-text h4 {
                color: var(--chapter-text-color, var(--chapter-card-text));
                line-height: 1.18;
                margin: 1.25em 0 .45em;
                letter-spacing: -.02em;
            }

            .chapter-main-text h1 {
                font-size: 2.1em;
            }

            .chapter-main-text h2 {
                font-size: 1.72em;
            }

            .chapter-main-text h3 {
                font-size: 1.35em;
            }

            .chapter-main-text h4 {
                font-size: 1.12em;
            }

            .chapter-main-text p {
                margin: 0 0 1em;
            }

            .chapter-main-text blockquote {
                margin: 1.35em 0;
                padding: 14px 18px;
                border-left: 4px solid rgba(255,255,255,.26);
                background: rgba(255,255,255,.065);
                border-radius: 0 14px 14px 0;
                font-style: italic;
            }

            .chapter-main-text a {
                color: inherit;
                text-decoration: underline;
                text-underline-offset: 3px;
            }

            .chapter-main-text ul,
            .chapter-main-text ol {
                padding-left: 1.6em;
                margin: 0 0 1em;
            }

            .chapter-main-text li {
                margin-bottom: .35em;
            }

            .chapter-main-text hr {
                border: 0;
                border-top: 1px solid rgba(255,255,255,.20);
                margin: 30px 0;
            }

            .chapter-main-text img {
                max-width: 100%;
            }

            .chapter-main-text::after {
                content: "";
                display: block;
                clear: both;
            }


            .chapter-main-text.rich-chapter-content {
                white-space: normal;
                font-family: Georgia, "Times New Roman", Times, serif;
                font-size: var(--reader-font-size, 1.08rem);
                line-height: var(--chapter-line-height, 1.8);
            }

                .chapter-main-text.rich-chapter-content p,
                .chapter-main-text.rich-chapter-content div {
                    margin: 0 0 1em;
                }

                    .chapter-main-text.rich-chapter-content p:last-child,
                    .chapter-main-text.rich-chapter-content div:last-child {
                        margin-bottom: 0;
                    }

                .chapter-main-text.rich-chapter-content h1,
                .chapter-main-text.rich-chapter-content h2,
                .chapter-main-text.rich-chapter-content h3,
                .chapter-main-text.rich-chapter-content h4 {
                    color: inherit;
                    line-height: 1.2;
                    margin: 1.2em 0 .45em;
                }

                .chapter-main-text.rich-chapter-content h1 {
                    font-size: 2.4rem;
                }

                .chapter-main-text.rich-chapter-content h2 {
                    font-size: 2rem;
                }

                .chapter-main-text.rich-chapter-content h3 {
                    font-size: 1.55rem;
                }

                .chapter-main-text.rich-chapter-content h4 {
                    font-size: 1.25rem;
                }

                .chapter-main-text.rich-chapter-content mark,
                .chapter-main-text.rich-chapter-content [style*="background-color"] {
                    border-radius: .18em;
                    box-decoration-break: clone;
                    -webkit-box-decoration-break: clone;
                }

                .chapter-main-text.rich-chapter-content,
                .chapter-main-text.rich-chapter-content * {
                    font-synthesis-weight: auto;
                    font-synthesis-style: auto;
                }

                    .chapter-main-text.rich-chapter-content [data-nv-world-rich-run="true"],
                    .chapter-main-text.rich-chapter-content [data-nv-literature-rich-run="true"] {
                        white-space: pre-wrap;
                    }

                    .chapter-main-text.rich-chapter-content [data-nv-world-rich-block="true"],
                    .chapter-main-text.rich-chapter-content [data-nv-literature-rich-block="true"] {
                        color: inherit;
                    }

        body.reader-large-text {

    <script type="module">
        import { supabase } from "./supabaseClient.js";
        import { setupNotificationBadge } from "./notificationBadge.js";
        import { createNotification } from "./notifications.js";
        import { setupMessageBadge } from "./messageBadge.js";
        import { getCurrentUserWithPermissions, canModerateWorlds, canModerateContentOwner } from "./permissions.js?v=4";

        const NULLVERSE_WORLD_RICH_TEXT_EARLY_CONSTANTS_READY = true;


        const WORLD_EDITOR_FONT_STACKS = {
            "Georgia": `Georgia, "Times New Roman", Times, serif`,

        };


        const params = new URLSearchParams(window.location.search);
        const literatureId = params.get("id");

        let currentUser = null;
        let currentProfile = null;
        let currentPermissions = [];
        let isGuestReader = true;
        let currentLiterature = null;
        let allChapters = [];
        let currentChapterIndex = 0;
        let contentExperience = "balanced";
        let blockedContentWarnings = [];
        let ageRole = "unknown";
        let lastFocusedElement = null;
        let readerStateRestored = false;

        await initializeOptionalViewer();
        renderLiteratureNavigation();
        setupLiteratureNavigationControls();
        restoreReaderPreferences();

        async function initializeOptionalViewer() {
            try {
                const { data: sessionData, error: sessionError } = await supabase.auth.getSession();
                const sessionUser = sessionData?.session?.user || null;

                if (sessionError || !sessionUser) {
                    return;
                }

                const normalizedEmail = String(sessionUser.email || "").trim().toLowerCase();
                if (!normalizedEmail) {
                    return;
                }

                const { data: betaAccess, error: betaError } = await supabase
                    .from("beta_access")
                    .select("role")
                    .ilike("email", normalizedEmail)
                    .maybeSingle();

                if (betaError || !betaAccess) {
                    return;
                }

                const viewer = await getCurrentUserWithPermissions(sessionUser.id);
                const profile = viewer?.profile || null;
                const status = String(profile?.account_status || "active").toLowerCase();

                if (!profile || status === "banned" || status === "suspended") {
                    return;
                }

                currentUser = sessionUser;
                currentProfile = profile;
                currentPermissions = Array.isArray(viewer?.permissions) ? viewer.permissions : [];
                isGuestReader = false;

                await Promise.allSettled([
                    setupNotificationBadge(),
                    setupMessageBadge()
                ]);
            } catch (error) {
                console.warn("Optional Literature viewer session was skipped:", error);
                currentUser = null;
                currentProfile = null;
                currentPermissions = [];
                isGuestReader = true;
            }
        }

        function getLiteratureReturnPath() {
            const url = new URL(window.location.href);
            const safe = new URLSearchParams();

            if (literatureId) {
                safe.set("id", literatureId);
            }

            const requestedChapter = Number(url.searchParams.get("chapter"));
            const chapterToReturn =
                Number.isInteger(requestedChapter) && requestedChapter > 0
                    ? requestedChapter
                    : (allChapters.length ? currentChapterIndex + 1 : 0);

            if (chapterToReturn > 0) {
                safe.set("chapter", String(chapterToReturn));
            }

            return `literature.html${safe.toString() ? `?${safe.toString()}` : ""}`;
        }

        function getBetaLoginUrl() {
            return `login.html?return=${encodeURIComponent(getLiteratureReturnPath())}`;
        }

        function renderLiteratureNavigation() {
            const nav = document.getElementById("literature-main-nav");
            const logoLink = document.getElementById("literature-logo-link");
            const menuButton = document.getElementById("literature-mobile-menu-button");

            if (!nav || !logoLink || !menuButton) return;

            if (currentUser) {
                logoLink.href = "index.html";
                logoLink.style.pointerEvents = "";
                nav.classList.remove("guest-nav");
                nav.innerHTML = `
                        <a href="index.html">Home</a>
                        <a href="notifications.html">Notifications</a>
                        <a href="explore.html">Explore</a>
                        <a href="profile.html">Profile</a>
                        <a href="dashboard.html">Dashboard</a>
                        <a href="messages.html">Messages</a>
                        <button type="button" onclick="logOut()">Log Out</button>
                    `;
                menuButton.classList.remove("guest-hidden");
            } else {
                logoLink.href = "javascript:void(0)";
                logoLink.style.pointerEvents = "none";
                nav.classList.add("guest-nav");
                nav.innerHTML = `<a class="literature-guest-login" href="${escapeHtml(getBetaLoginUrl())}">Beta Login</a>`;
                menuButton.classList.add("guest-hidden");
            }
        }

        function setupLiteratureNavigationControls() {
            const nav = document.getElementById("literature-main-nav");
            const button = document.getElementById("literature-mobile-menu-button");
            const scrim = document.getElementById("literature-nav-scrim");

            function close() {
                nav?.classList.remove("open");
                scrim?.classList.remove("open");
                button?.setAttribute("aria-expanded", "false");
            }

            button?.addEventListener("click", () => {
                if (!currentUser) return;
                const opening = !nav?.classList.contains("open");
                nav?.classList.toggle("open", opening);
                scrim?.classList.toggle("open", opening);
                button.setAttribute("aria-expanded", String(opening));
            });

            scrim?.addEventListener("click", close);
            nav?.addEventListener("click", event => {
                if (event.target.closest("a,button")) close();
            });

            window.addEventListener("resize", () => {
                if (window.innerWidth > 760) close();
            });
        }

        const BETA_FEATURE_COPY = {
            like: {
                title: "Likes are currently in closed beta",
                message: "You can read every published chapter, but liking stories is currently available only to Nullverse beta testers."
            },
            comments: {
                title: "Comments are still in beta",
                message: "Community discussions are still being tested. Public reading is available now, but commenting requires beta access."
            },
            qa: {
                title: "Creator Q&A is still in beta",
                message: "Questions and creator responses are currently limited to Nullverse beta testers."
            },
            report: {
                title: "Reporting is currently in beta",
                message: "The full Nullverse reporting system is still being tested and requires a beta account."
            }
        };

        function showBetaFeatureModal(feature = "like") {
            if (currentUser) return;

            const copy = BETA_FEATURE_COPY[feature] || BETA_FEATURE_COPY.like;
            const backdrop = document.getElementById("beta-feature-backdrop");
            const title = document.getElementById("beta-feature-title");
            const message = document.getElementById("beta-feature-message");
            const login = document.getElementById("beta-feature-login");

            lastFocusedElement = document.activeElement;
            if (title) title.textContent = copy.title;
            if (message) message.textContent = copy.message;
            if (login) login.href = getBetaLoginUrl();

            backdrop?.classList.add("open");
            backdrop?.setAttribute("aria-hidden", "false");
            document.body.classList.add("beta-feature-modal-open");

            setTimeout(() => document.getElementById("beta-feature-continue")?.focus(), 40);
        }

        function closeBetaFeatureModal() {
            const backdrop = document.getElementById("beta-feature-backdrop");
            backdrop?.classList.remove("open");
            backdrop?.setAttribute("aria-hidden", "true");
            document.body.classList.remove("beta-feature-modal-open");
            lastFocusedElement?.focus?.();
            lastFocusedElement = null;
        }

        function setupBetaFeatureModal() {
            const backdrop = document.getElementById("beta-feature-backdrop");

            document.getElementById("beta-feature-close")?.addEventListener("click", closeBetaFeatureModal);
            document.getElementById("beta-feature-continue")?.addEventListener("click", closeBetaFeatureModal);
            backdrop?.addEventListener("click", event => {
                if (event.target === backdrop) closeBetaFeatureModal();
            });
        }

        function getReaderPreferenceState() {
            return {
                largeText: document.body.classList.contains("reader-large-text"),
                wide: document.body.classList.contains("reader-wide"),
                centered: document.body.classList.contains("reader-center-headings"),
                airy: document.body.classList.contains("reader-airy")
            };
        }

        function saveReaderPreferences() {
            try {
                localStorage.setItem(
                    "nullverse_literature_reader_preferences_v2",
                    JSON.stringify(getReaderPreferenceState())
                );
            } catch (error) {
                console.warn("Reader preference save skipped:", error);
            }
        }

        function restoreReaderPreferences() {
            try {
                const saved = JSON.parse(localStorage.getItem("nullverse_literature_reader_preferences_v2") || "{}");
                document.body.classList.toggle("reader-large-text", !!saved.largeText);
                document.body.classList.toggle("reader-wide", !!saved.wide);
                document.body.classList.toggle("reader-center-headings", !!saved.centered);
                document.body.classList.toggle("reader-airy", !!saved.airy);
            } catch (error) {
                console.warn("Reader preference restore skipped:", error);
            }

            syncReaderPreferenceButtons();
        }

        function syncReaderPreferenceButtons() {
            const mappings = [
                ["reader-text-button", "reader-large-text"],
                ["reader-wide-button", "reader-wide"],
                ["reader-center-button", "reader-center-headings"],
                ["reader-spacing-button", "reader-airy"]
            ];

            mappings.forEach(([id, className]) => {
                document.getElementById(id)?.classList.toggle("active", document.body.classList.contains(className));
            });
        }

        function getReadingProgressKey() {
            return currentLiterature?.id
                ? `nullverse_literature_progress_v2:${currentLiterature.id}`
                : "";
        }

        function saveReadingProgress(extra = {}) {
            const key = getReadingProgressKey();
            if (!key || !allChapters.length) return;

            const normalChapter = document.querySelector("#chapters-container .literature-chapter");
            const focusScroll = document.getElementById("literature-focus-scroll");
            const focusOpen = document.getElementById("literature-focus-overlay")?.classList.contains("open");
            const scrollTop = focusOpen
                ? Number(focusScroll?.scrollTop || 0)
                : Number(window.scrollY || document.documentElement.scrollTop || 0);

            try {
                localStorage.setItem(key, JSON.stringify({
                    chapterIndex: currentChapterIndex,
                    scrollTop,
                    focus: !!focusOpen,
                    updatedAt: Date.now(),
                    ...extra
                }));
            } catch (error) {
                console.warn("Reading progress save skipped:", error);
            }
        }

        function getSavedReadingProgress() {
            const key = getReadingProgressKey();
            if (!key) return null;

            try {
                const value = JSON.parse(localStorage.getItem(key) || "null");
                return value && typeof value === "object" ? value : null;
            } catch {
                return null;
            }
        }


        function getDefaultImagePlacement() {
            return {
                x: 0,
                y: 0,
                scale: 1,
                rotation: 0,
                fit: "cover"
            };
        }

        function normalizeImagePlacement(value) {
            let parsed = value;

            if (typeof parsed === "string") {
                try {
                    parsed = JSON.parse(parsed);
                } catch {
                    parsed = null;
                }
            }

            return {
                ...getDefaultImagePlacement(),
                ...(parsed && typeof parsed === "object" ? parsed : {})
            };
        }

        function getImagePlacementTransform(placement, includeDefaultScale = false) {
            const safe = normalizeImagePlacement(placement);

        function normalizeWorldFontSize(value) {
            const raw = String(value || "").trim().toLowerCase();

            if (!raw) {
                return "";
            }

            let px = null;

            if (raw.endsWith("px")) {
                px = Number(raw.replace("px", ""));
            } else if (raw.endsWith("pt")) {
                px = Number(raw.replace("pt", "")) * 1.333;
            } else if (raw.endsWith("em") || raw.endsWith("rem")) {
                px = Number(raw.replace("rem", "").replace("em", "")) * 18;
            } else if (raw.endsWith("%")) {
                px = 18 * (Number(raw.replace("%", "")) / 100);
            } else if (/^\d+(\.\d+)?$/.test(raw)) {
                px = Number(raw);
            }

            if (!Number.isFinite(px)) {
                return "";
            }

            const clamped = Math.max(10, Math.min(72, px));

            return `${Math.round(clamped * 100) / 100}px`;
        }

        function normalizeWorldLineHeight(value) {
            const raw = String(value || "").trim().toLowerCase();

            if (!raw) {
                return "";
            }

            if (/^\d+(\.\d+)?$/.test(raw)) {
                const number = Number(raw);
                return number >= 0.8 && number <= 3.5 ? String(number) : "";
            }

            if (raw.endsWith("px")) {
                return normalizeWorldSafeLength(raw, 10, 90);
            }

            if (raw.endsWith("%")) {
                const percent = Number(raw.replace("%", ""));
                return percent >= 80 && percent <= 350 ? `${percent}%` : "";
            }

            return "";
        }

        function normalizeWorldSafeLength(value, min, max) {
            const raw = String(value || "").trim().toLowerCase();

            let number = null;
            let unit = "px";

            if (raw.endsWith("px")) {
                number = Number(raw.replace("px", ""));
            } else if (raw.endsWith("em")) {
                number = Number(raw.replace("em", "")) * 18;
            } else if (raw.endsWith("rem")) {
                number = Number(raw.replace("rem", "")) * 18;
            } else if (/^-?\d+(\.\d+)?$/.test(raw)) {
                number = Number(raw);
            }

            if (!Number.isFinite(number)) {
                return "";
            }

            const clamped = Math.max(min, Math.min(max, number));

            return `${Math.round(clamped * 100) / 100}${unit}`;
        }

        function removeEmptyWorldInlineShell(element) {
            if (!element || !["SPAN", "B", "STRONG", "EM", "I", "U", "S", "MARK"].includes(element.tagName)) {
                return;
            }

            const text = element.textContent || "";
            const hasBreak = element.querySelector?.("br,hr");

            if (!text.trim() && !hasBreak) {
                element.remove();
            }
        }

        function normalizeContentExperience(value) {
            const normalized = String(value || "")
                .trim()
                .toLowerCase()
                .replace(/\s+/g, "_");

            if (["safe", "strict"].includes(normalized)) return "safe";
            if (["open", "adult", "all", "unfiltered", "full"].includes(normalized)) return "open";
            return "balanced";
        }

        function normalizeWarningKey(value) {
            return String(value || "")
                .trim()
                .toLowerCase()
                .replace(/\s+/g, "_")
                .replace(/-+/g, "_")
                .replace(/[^a-z0-9_]/g, "")
                .replace(/_+/g, "_")
                .replace(/^_+|_+$/g, "");
        }

        function normalizeWarningList(value) {
            let list = value;

            if (typeof list === "string") {
                const raw = list.trim();

                if (!raw) {
                    list = [];
                } else {
                    try {
                        list = JSON.parse(raw);
                    } catch {
                        if (raw.startsWith("{") && raw.endsWith("}")) {
                            list = raw
                                .slice(1, -1)
                                .split(",")
                                .map(item => item.replace(/^"|"$/g, ""));
                        } else {
                            list = raw.split(",");
                        }
                    }
                }
            }

            return [...new Set(
                (Array.isArray(list) ? list : [])
                    .map(normalizeWarningKey)
                    .filter(Boolean)
            )];
        }

        function normalizeAgeRole(value) {
            const normalized = String(value || "unknown").trim().toLowerCase();
            return normalized || "unknown";
        }

        function normalizeContentRating(value) {
            const normalized = String(value || "general").trim().toLowerCase();
            return ["general", "teen", "mature", "adult"].includes(normalized) ? normalized : "general";
        }

        async function loadViewerContentPreferences() {
            if (!currentUser) {
                ageRole = "unknown";
                contentExperience = "balanced";
                blockedContentWarnings = [];
                return;
            }

            const { data: profile, error } = await supabase
                .from("profiles")
                .select("content_experience, blocked_content_warnings, age_role")
                .eq("id", currentUser.id)
                .single();

            if (error || !profile) {
                console.warn("Content preference load skipped:", error?.message || "No profile found.");
                return;
            }

            ageRole = normalizeAgeRole(profile.age_role);
            contentExperience = normalizeContentExperience(profile.content_experience);
            blockedContentWarnings = normalizeWarningList(profile.blocked_content_warnings);

            if (ageRole === "minor") {
                contentExperience = "safe";
            }
        }

        function getContentSafetyInfo(item) {
            const warnings = normalizeWarningList(item?.content_warnings);
            const rating = normalizeContentRating(item?.content_rating);
            const blockedWarningSet = new Set(normalizeWarningList(blockedContentWarnings));
            const hasHardBlockedWarning = warnings.some(warning => blockedWarningSet.has(warning));
            const hasContentWarning = warnings.length > 0;
            const isMature = rating === "mature";
            const isAdult = rating === "adult";

            return { warnings, rating, hasHardBlockedWarning, hasContentWarning, isMature, isAdult };
        }

        function shouldBlockContent(item) {
            const info = getContentSafetyInfo(item);

            if (ageRole === "minor") return info.isAdult || info.isMature || info.hasContentWarning;
            if (info.hasHardBlockedWarning) return true;
            if (contentExperience === "open") return false;
            if (contentExperience === "safe") return info.isAdult || info.isMature || info.hasContentWarning;

            return false;
        }

        function shouldWarnContent(item) {
            const info = getContentSafetyInfo(item);

            if (contentExperience !== "balanced") return false;
            if (ageRole === "minor") return false;
            if (info.hasHardBlockedWarning) return false;

            return info.isAdult || info.isMature || info.hasContentWarning;
        }

                return;
            }

            if (literature.moderation_status === "hidden" && ownerAccess) {

                return;
            }

            if (literature.moderation_status === "hidden" && !staffAccess) {
                showNotFound("This literature has been hidden by Nullverse staff.");
                return;

                showContentBlocked(literature);

            if (!ownerAccess && shouldWarnContent(literature) && !warningAccepted) {
                showContentWarning(literature);
                return;

        }

        function renderChapterIndex(chapters) {
            const nav = document.getElementById("chapter-index");
            const links = document.getElementById("chapter-nav-links");
            const search = document.getElementById("chapter-search");

            if (oldCredit) oldCredit.remove();

                type: currentLiterature.index_credit_type,
