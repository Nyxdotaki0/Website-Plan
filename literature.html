            const chapterSearchCache = new Map();

            function decodeChapterSearchEntities(value) {
                const textarea = document.createElement("textarea");
                textarea.innerHTML = String(value || "");
                return textarea.value;
            }

            function normalizeChapterIndexSearch(value) {
                return decodeChapterSearchEntities(value)
                    .normalize("NFD")
                    .replace(/[\u0300-\u036f]/g, "")
                    .toLowerCase()
                    .replace(/&/g, " and ")
                    .replace(/['’‘"`´]/g, "")
                    .replace(/[^a-z0-9]+/g, " ")
                    .replace(/\s+/g, " ")
                    .trim();
            }

            function compactChapterIndexSearch(value) {
                return normalizeChapterIndexSearch(value).replace(/\s+/g, "");
            }

            function tokenizeChapterIndexSearch(value) {
                return normalizeChapterIndexSearch(value)
                    .split(" ")
                    .map(token => token.trim())
                    .filter(Boolean);
            }

            function safeChapterPlainText(value) {
                try {
                    return getPlainTextFromHtml(value || "");
                } catch (error) {
                    console.error("Chapter search text extraction error:", error);
                    return String(value || "")
                        .replace(/<!--[\s\S]*?-->/g, " ")
                        .replace(/<script[\s\S]*?<\/script>/gi, " ")
                        .replace(/<style[\s\S]*?<\/style>/gi, " ")
                        .replace(/<[^>]+>/g, " ");
                }
            }

            function getChapterTitleForSearch(chapter) {
                return (
                    chapter?.title ||
                    chapter?.name ||
                    chapter?.chapter_title ||
                    chapter?.display_title ||
                    ""
                );
            }

            function getChapterSubtitleForSearch(chapter) {
                return (
                    chapter?.subtitle ||
                    chapter?.description ||
                    chapter?.summary ||
                    ""
                );
            }

            function buildChapterIndexSearchField(label, value, weight, includeForNumeric = true) {
                const raw = String(value || "");
                const normalized = normalizeChapterIndexSearch(raw);
                const compact = normalized.replace(/\s+/g, "");
                const tokens = normalized
                    .split(" ")
                    .map(token => token.trim())
                    .filter(Boolean);

                return {
                    label,
                    raw,
                    normalized,
                    compact,
                    tokens,
                    weight,
                    includeForNumeric
                };
            }

            function buildChapterIndexSearchRecord(chapter, index) {
                const chapterNumber = index + 1;
                const chapterNumberText = String(chapterNumber);
                const title = getChapterTitleForSearch(chapter);
                const subtitle = getChapterSubtitleForSearch(chapter);
                const bodyText = safeChapterPlainText(chapter?.body || chapter?.content || "");
                const authorNote = chapter?.author_note || "";

                const numberAliases = [
                    chapterNumberText,
                    `chapter ${chapterNumber}`,
                    `chap ${chapterNumber}`,
                    `ch ${chapterNumber}`,
                    `#${chapterNumber}`,
                    `chapter ${chapterNumberText.padStart(2, "0")}`,
                    `chap ${chapterNumberText.padStart(2, "0")}`,
                    `ch ${chapterNumberText.padStart(2, "0")}`
                ];

                const fields = [
                    buildChapterIndexSearchField("number", numberAliases.join(" "), 130, true),
                    buildChapterIndexSearchField("title", title, 110, true),
                    buildChapterIndexSearchField("subtitle", subtitle, 80, true),
                    buildChapterIndexSearchField("author note", authorNote, 45, true),
                    buildChapterIndexSearchField("body", bodyText, 22, false)
                ].filter(field => field.normalized || field.compact);

                const allNormalized = fields
                    .map(field => field.normalized)
                    .filter(Boolean)
                    .join(" ");

                const allCompact = allNormalized.replace(/\s+/g, "");

                const tokens = [...new Set(
                    fields.flatMap(field => field.tokens)
                )];

                const titleInitials = normalizeChapterIndexSearch(title)
                    .split(" ")
                    .map(word => word[0] || "")
                    .join("");

                return {
                    index,
                    chapterNumber,
                    chapterNumberText,
                    fields,
                    allNormalized,
                    allCompact,
                    tokens,
                    titleInitials
                };
            }

            function getChapterIndexSearchRecord(chapter, index) {
                const cacheKey = [
                    chapter?.id || index,
                    chapter?.updated_at || "",
                    chapter?.title || "",
                    chapter?.subtitle || "",
                    chapter?.author_note || "",
                    chapter?.body || chapter?.content || ""
                ].join("::");

                if (!chapterSearchCache.has(cacheKey)) {
                    chapterSearchCache.set(
                        cacheKey,
                        buildChapterIndexSearchRecord(chapter || {}, index)
                    );
                }

                return chapterSearchCache.get(cacheKey);
            }

            function levenshteinDistance(a, b) {
                a = String(a || "");
                b = String(b || "");

                if (a === b) return 0;
                if (!a.length) return b.length;
                if (!b.length) return a.length;

                const previous = Array.from({ length: b.length + 1 }, (_, index) => index);
                const current = new Array(b.length + 1);

                for (let i = 1; i <= a.length; i++) {
                    current[0] = i;

                    for (let j = 1; j <= b.length; j++) {
                        const cost = a[i - 1] === b[j - 1] ? 0 : 1;

                        current[j] = Math.min(
                            previous[j] + 1,
                            current[j - 1] + 1,
                            previous[j - 1] + cost
                        );
                    }

                    for (let j = 0; j <= b.length; j++) {
                        previous[j] = current[j];
                    }
                }

                return previous[b.length];
            }

            function isChapterSearchSubsequence(needle, haystack) {
                needle = String(needle || "");
                haystack = String(haystack || "");

                if (needle.length < 4 || haystack.length < needle.length) {
                    return false;
                }

                let needleIndex = 0;

                for (const character of haystack) {
                    if (character === needle[needleIndex]) {
                        needleIndex++;
                    }

                    if (needleIndex >= needle.length) {
                        return true;
                    }
                }

                return false;
            }

            function scoreChapterSearchToken(queryToken, searchableToken) {
                if (!queryToken || !searchableToken) {
                    return 0;
                }

                if (/^\d+$/.test(queryToken)) {
                    return searchableToken.includes(queryToken) ? 100 : 0;
                }

                if (searchableToken === queryToken) {
                    return 100;
                }

                if (searchableToken.startsWith(queryToken)) {
                    return 82;
                }

                if (searchableToken.includes(queryToken)) {
                    return 68;
                }

                if (queryToken.length >= 3 && searchableToken.includes(queryToken.slice(0, -1))) {
                    return 48;
                }

                if (queryToken.length >= 4 && searchableToken.length >= 4) {
                    const distance = levenshteinDistance(queryToken, searchableToken);
                    const allowedDistance = queryToken.length >= 7 ? 2 : 1;

                    if (distance <= allowedDistance) {
                        return 42 - (distance * 10);
                    }

                    if (isChapterSearchSubsequence(queryToken, searchableToken)) {
                        return 28;
                    }
                }

                return 0;
            }

            function scoreChapterSearchField(field, normalizedQuery, compactQuery, queryTokens, numericOnly) {
                if (!field || (!field.normalized && !field.compact)) {
                    return 0;
                }

                if (numericOnly && !field.includeForNumeric) {
                    return 0;
                }

                let score = 0;

                if (normalizedQuery && field.normalized === normalizedQuery) {
                    score += field.weight * 5;
                } else if (normalizedQuery && field.normalized.startsWith(normalizedQuery)) {
                    score += field.weight * 4;
                } else if (normalizedQuery && field.normalized.includes(normalizedQuery)) {
                    score += field.weight * 3;
                }

                if (
                    compactQuery &&
                    compactQuery.length >= 2 &&
                    field.compact &&
                    field.compact.includes(compactQuery)
                ) {
                    score += field.weight * 2;
                }

                for (const queryToken of queryTokens) {
                    let bestTokenScore = 0;

                    for (const searchableToken of field.tokens) {
                        bestTokenScore = Math.max(
                            bestTokenScore,
                            scoreChapterSearchToken(queryToken, searchableToken)
                        );
                    }

                    if (bestTokenScore > 0) {
                        score += Math.round((bestTokenScore / 100) * field.weight);
                    }
                }

                return score;
            }

            function scoreChapterIndexRecord(record, query) {
                const normalizedQuery = normalizeChapterIndexSearch(query);
                const compactQuery = compactChapterIndexSearch(query);
                const queryTokens = tokenizeChapterIndexSearch(query);
                const numericOnly = !!compactQuery && /^\d+$/.test(compactQuery);
                const shortLetterQuery =
                    !numericOnly &&
                    compactQuery.length > 0 &&
                    compactQuery.length < 3;

                if (!normalizedQuery && !compactQuery && !queryTokens.length) {
                    return 1;
                }

                if (numericOnly) {
                    let numericScore = 0;

                    if (record.chapterNumberText.includes(compactQuery)) {
                        numericScore += 1000;
                    }

                    for (const field of record.fields) {
                        if (!field.includeForNumeric) {
                            continue;
                        }

                        if (field.normalized.includes(compactQuery) || field.compact.includes(compactQuery)) {
                            numericScore += scoreChapterSearchField(
                                field,
                                normalizedQuery,
                                compactQuery,
                                queryTokens,
                                true
                            );
                        }
                    }

                    return numericScore;
                }

                const activeFields = shortLetterQuery
                    ? record.fields.filter(field => field.label !== "body")
                    : record.fields;

                const activeNormalized = activeFields
                    .map(field => field.normalized)
                    .filter(Boolean)
                    .join(" ");

                const activeCompact = activeNormalized.replace(/\s+/g, "");

                const activeTokens = [...new Set(
                    activeFields.flatMap(field => field.tokens)
                )];

                let score = 0;
                let phraseMatched = false;

                if (normalizedQuery && activeNormalized.includes(normalizedQuery)) {
                    phraseMatched = true;
                    score += 120;
                }

                if (
                    compactQuery &&
                    compactQuery.length >= 2 &&
                    activeCompact.includes(compactQuery)
                ) {
                    phraseMatched = true;
                    score += 90;
                }

                if (
                    compactQuery &&
                    compactQuery.length >= 2 &&
                    record.titleInitials &&
                    record.titleInitials.includes(compactQuery)
                ) {
                    phraseMatched = true;
                    score += 75;
                }

                const tokenMatches = queryTokens.map(queryToken => {
                    let best = 0;

                    for (const searchableToken of activeTokens) {
                        best = Math.max(best, scoreChapterSearchToken(queryToken, searchableToken));
                    }

                    return best;
                });

                const allTokensMatched =
                    queryTokens.length > 0 &&
                    tokenMatches.every(value => value > 0);

                if (!phraseMatched && !allTokensMatched) {
                    return 0;
                }

                for (const field of activeFields) {
                    score += scoreChapterSearchField(
                        field,
                        normalizedQuery,
                        compactQuery,
                        queryTokens,
                        false
                    );
                }

                score += tokenMatches.reduce((sum, value) => sum + value, 0);

                return score;
            }



            function getExactOnlyChapterTitleSearchResults(query) {
                const rawQuery = String(query || "").trim();
                const normalizedQuery = normalizeChapterIndexSearch(rawQuery);
                const compactQuery = compactChapterIndexSearch(rawQuery);
                const numericOnly = !!compactQuery && /^\d+$/.test(compactQuery);

                if (!normalizedQuery || numericOnly) {
                    return null;
                }

                const exactResults = chapters
                    .map((chapter, index) => {
                        const record = getChapterIndexSearchRecord(chapter, index);
                        const titleField = record.fields.find(field => field.label === "title");
                        const titleNormalized = titleField?.normalized || "";
                        const titleCompact = titleField?.compact || "";
                        const numberedTitle = normalizeChapterIndexSearch(`chapter ${record.chapterNumber} ${titleNormalized}`);
                        const numberedTitleCompact = numberedTitle.replace(/\s+/g, "");

                        let score = 0;

                        if (titleNormalized && titleNormalized === normalizedQuery) {
                            score = Math.max(score, 200000);
                        }

                        if (titleCompact && compactQuery && titleCompact === compactQuery) {
                            score = Math.max(score, 199000);
                        }

                        if (numberedTitle && numberedTitle === normalizedQuery) {
                            score = Math.max(score, 198000);
                        }

                        if (numberedTitleCompact && compactQuery && numberedTitleCompact === compactQuery) {
                            score = Math.max(score, 197000);
                        }

                        return {
                            chapter,
                            index,
                            score
                        };
                    })
                    .filter(result => result.score > 0)
                    .sort((a, b) => {
                        if (b.score !== a.score) {
                            return b.score - a.score;
                        }

                        return a.index - b.index;
                    });

                return exactResults.length ? exactResults : null;
            }

            function getChapterExactTitlePhraseScore(record, query) {
                const normalizedQuery = normalizeChapterIndexSearch(query);
                const compactQuery = compactChapterIndexSearch(query);
                const queryTokens = tokenizeChapterIndexSearch(query);
                const numericOnly = !!compactQuery && /^\d+$/.test(compactQuery);

                if (!normalizedQuery || numericOnly) {
                    return 0;
                }

                const titleField = record.fields.find(field => field.label === "title");
                const subtitleField = record.fields.find(field => field.label === "subtitle");
                const titleNormalized = titleField?.normalized || "";
                const titleCompact = titleField?.compact || "";
                const subtitleNormalized = subtitleField?.normalized || "";
                const subtitleCompact = subtitleField?.compact || "";
                const numberedTitle = normalizeChapterIndexSearch(`chapter ${record.chapterNumber} ${titleNormalized}`);
                const numberedTitleCompact = numberedTitle.replace(/\s+/g, "");
                const longEnoughForStrictPhrase =
                    queryTokens.length >= 2 ||
                    compactQuery.length >= 5;

                let score = 0;

                if (titleNormalized && titleNormalized === normalizedQuery) {
                    score = Math.max(score, 100000);
                }

                if (titleCompact && compactQuery.length >= 3 && titleCompact === compactQuery) {
                    score = Math.max(score, 98000);
                }

                if (numberedTitle && numberedTitle === normalizedQuery) {
                    score = Math.max(score, 97000);
                }

                if (numberedTitleCompact && compactQuery.length >= 3 && numberedTitleCompact === compactQuery) {
                    score = Math.max(score, 96000);
                }

                if (longEnoughForStrictPhrase && titleNormalized && titleNormalized.includes(normalizedQuery)) {
                    score = Math.max(score, 93000);
                }

                if (longEnoughForStrictPhrase && titleCompact && compactQuery.length >= 4 && titleCompact.includes(compactQuery)) {
                    score = Math.max(score, 92000);
                }

                if (longEnoughForStrictPhrase && numberedTitle && numberedTitle.includes(normalizedQuery)) {
                    score = Math.max(score, 91000);
                }

                if (longEnoughForStrictPhrase && subtitleNormalized && subtitleNormalized === normalizedQuery) {
                    score = Math.max(score, 87000);
                }

                if (longEnoughForStrictPhrase && subtitleCompact && compactQuery.length >= 4 && subtitleCompact === compactQuery) {
                    score = Math.max(score, 86000);
                }

                if (longEnoughForStrictPhrase && subtitleNormalized && subtitleNormalized.includes(normalizedQuery)) {
                    score = Math.max(score, 83000);
                }

                if (longEnoughForStrictPhrase && subtitleCompact && compactQuery.length >= 4 && subtitleCompact.includes(compactQuery)) {
                    score = Math.max(score, 82000);
                }

                return score;
            }

            function getStrictChapterTitlePhraseSearchResults(query) {
                const rawQuery = String(query || "").trim();
                const normalizedQuery = normalizeChapterIndexSearch(rawQuery);
                const compactQuery = compactChapterIndexSearch(rawQuery);
                const queryTokens = tokenizeChapterIndexSearch(rawQuery);
                const numericOnly = !!compactQuery && /^\d+$/.test(compactQuery);
                const strictCandidate =
                    !numericOnly &&
                    normalizedQuery &&
                    (
                        queryTokens.length >= 2 ||
                        compactQuery.length >= 5
                    );

                if (!strictCandidate) {
                    return null;
                }

                const strictResults = chapters
                    .map((chapter, index) => {
                        const record = getChapterIndexSearchRecord(chapter, index);
                        return {
                            chapter,
                            index,
                            score: getChapterExactTitlePhraseScore(record, rawQuery)
                        };
                    })
                    .filter(result => result.score > 0)
                    .sort((a, b) => {
                        if (b.score !== a.score) {
                            return b.score - a.score;
                        }

                        return a.index - b.index;
                    });

                return strictResults.length ? strictResults : null;
            }

            function getChapterSearchResults(query) {
                const rawQuery = String(query || "").trim();

                if (!rawQuery) {
                    return chapters.map((chapter, index) => ({
                        chapter,
                        index,
                        score: 1
                    }));
                }

                const exactTitleResults = getExactOnlyChapterTitleSearchResults(rawQuery);

                if (exactTitleResults) {
                    return exactTitleResults;
                }

                const strictTitleResults = getStrictChapterTitlePhraseSearchResults(rawQuery);

                if (strictTitleResults) {
                    return strictTitleResults;
                }

                return chapters
                    .map((chapter, index) => {
                        const record = getChapterIndexSearchRecord(chapter, index);
                        return {
                            chapter,
                            index,
                            score: scoreChapterIndexRecord(record, rawQuery)
                        };
                    })
                    .filter(result => result.score > 0)
                    .sort((a, b) => {
                        if (b.score !== a.score) {
                            return b.score - a.score;
                        }

                        return a.index - b.index;
                    });
            }

            function getChapterSearchSnippet(chapter) {
                return (
                    chapter.subtitle ||
                    chapter.description ||
                    chapter.author_note ||
                    "Read chapter"
                );
            }

            function draw() {
                const query = search.value || "";
                const results = getChapterSearchResults(query);

                count.textContent = `${results.length} ${results.length === 1 ? "Chapter" : "Chapters"}`;

                if (!results.length) {
                    links.innerHTML = `<p class="empty">No chapters match this search.</p>`;
                    return;
                }

                links.innerHTML = results.map(result => {
                    const chapter = result.chapter;
                    const realIndex = result.index;
                    const title = getChapterTitleForSearch(chapter) || "Untitled";
                    const snippet = getChapterSearchSnippet(chapter);

                    return `
                                                <button type="button"
                                                        class="chapter-nav-link${realIndex === currentChapterIndex ? " active" : ""}"
                                                        data-chapter-index="${realIndex}">
                                                    <span>Chapter ${realIndex + 1}: ${escapeHtml(title)}</span>
                                                    <small>${escapeHtml(snippet)}</small>
                                                </button>
                                            `;
                }).join("");

                links.querySelectorAll(".chapter-nav-link").forEach(button => {
                    button.addEventListener("click", async () => {
                        const index = Number(button.dataset.chapterIndex);
                        await setActiveChapter(index, {
                            updateHistory: true,
                            scroll: true,
                            closeDrawer: true,
                            preserveFocusMode: true
                        });
                    });
                });
            }

            search.oninput = draw;
            search.onkeyup = draw;
            search.onchange = draw;
            search.onsearch = draw;
            search.addEventListener("compositionend", draw);

            draw();
        }

        function getSafeChapterIndex(value) {
            const number = Number(value);
            if (!Number.isFinite(number) || !allChapters.length) return 0;
            return Math.min(allChapters.length - 1, Math.max(0, Math.trunc(number)));
        }

        function buildChapterSwitcher(position = "top") {
            const previous = allChapters[currentChapterIndex - 1] || null;
            const next = allChapters[currentChapterIndex + 1] || null;
            const current = allChapters[currentChapterIndex] || null;

            return `
                    <nav class="chapter-switcher ${position}" aria-label="Chapter navigation">
                        <button type="button"
                                class="chapter-switch-button previous"
                                data-chapter-direction="-1"
                                ${previous ? "" : "disabled"}>
                            <small>Previous Chapter</small>
                            <strong>${previous ? escapeHtml(previous.title || `Chapter ${currentChapterIndex}`) : "Beginning"}</strong>
                        </button>
                        <button type="button" class="chapter-list-button" data-open-chapter-list>
                            <small>Chapter List</small>
                            <strong>${currentChapterIndex + 1} / ${allChapters.length}</strong>
                        </button>
                        <button type="button"
                                class="chapter-switch-button next"
                                data-chapter-direction="1"
                                ${next ? "" : "disabled"}>
                            <small>${next ? "Next Chapter" : "End of Story"}</small>
                            <strong>${next ? escapeHtml(next.title || `Chapter ${currentChapterIndex + 2}`) : escapeHtml(current?.title || "Complete")}</strong>
                        </button>
                    </nav>
                `;
        }

        function bindChapterSwitcher(container) {
            container?.querySelectorAll("[data-chapter-direction]").forEach(button => {
                button.addEventListener("click", async () => {
                    const direction = Number(button.dataset.chapterDirection) || 0;
                    await setActiveChapter(currentChapterIndex + direction, {
                        updateHistory: true,
                        scroll: true,
                        preserveFocusMode: true
                    });
                });
            });

            container?.querySelectorAll("[data-open-chapter-list]").forEach(button => {
                button.addEventListener("click", openChapterDrawer);
            });
        }

        async function setActiveChapter(index, options = {}) {
            if (!allChapters.length) return;

            const {
                updateHistory = true,
                replaceHistory = false,
                scroll = true,
                closeDrawer = false,
                restoreScroll = false,
                preserveFocusMode = false
            } = options;

            currentChapterIndex = getSafeChapterIndex(index);
            const chapter = allChapters[currentChapterIndex];
            const container = document.getElementById("chapters-container");
            const focusWasOpen = document.getElementById("literature-focus-overlay")?.classList.contains("open");

            container.innerHTML = `
                    <div class="active-chapter-shell">
                        ${buildChapterSwitcher("top")}
                        ${buildChapterArticle(chapter, currentChapterIndex)}
                        ${buildChapterSwitcher("bottom")}
                    </div>
                `;

            container
                .querySelectorAll(".chapter-main-text.rich-chapter-content")
                .forEach(normalizeRenderedWorldRichText);

            bindChapterSwitcher(container);
            updateChapterInterface();

            if (updateHistory) {
                const url = new URL(window.location.href);
                url.searchParams.set("chapter", String(currentChapterIndex + 1));
                url.hash = "";
                const method = replaceHistory ? "replaceState" : "pushState";
                window.history[method](
                    { literatureId, chapterIndex: currentChapterIndex },
                    "",
                    `${url.pathname}${url.search}`
                );
            }

            if (focusWasOpen || preserveFocusMode && document.body.classList.contains("literature-focus-open")) {
                renderFocusChapter();
            }

            if (closeDrawer) {
                closeChapterDrawer();
            }

            setupReaderScrollTracking();

            if (!restoreScroll) {
                saveReadingProgress({ chapterIndex: currentChapterIndex, scrollTop: 0 });
            }

            if (scroll) {
                requestAnimationFrame(() => {
                    document.getElementById(`chapter-${currentChapterIndex + 1}`)
                        ?.scrollIntoView({ behavior: "smooth", block: "start" });
                });
            } else if (restoreScroll) {
                const saved = getSavedReadingProgress();
                if (saved && Number(saved.chapterIndex) === currentChapterIndex && Number(saved.scrollTop) > 0) {
                    requestAnimationFrame(() => {
                        window.scrollTo({ top: Number(saved.scrollTop), behavior: "auto" });
                    });
                }
            }
        }

        function updateChapterInterface() {
            const chapter = allChapters[currentChapterIndex];
            if (!chapter) return;

            document.querySelectorAll(".chapter-nav-link").forEach(button => {
                button.classList.toggle(
                    "active",
                    Number(button.dataset.chapterIndex) === currentChapterIndex
                );
            });

            const status = document.getElementById("current-chapter-status");
            if (status) {
                status.textContent = `Chapter ${currentChapterIndex + 1} of ${allChapters.length}`;
            }

            const search = document.getElementById("chapter-search");
            if (search && search.value) {
                search.dispatchEvent(new Event("input", { bubbles: true }));
            }

            updateFocusReaderControls();
        }

        function setupChapterDrawerControls() {
            document.getElementById("chapter-index-close")?.addEventListener("click", closeChapterDrawer);
            document.getElementById("chapter-index-mobile-scrim")?.addEventListener("click", closeChapterDrawer);
        }

        function openChapterDrawer() {
            const sidebar = document.querySelector(".left-sidebar");
            const index = document.getElementById("chapter-index");
            const scrim = document.getElementById("chapter-index-mobile-scrim");

            const focusOpen = document.getElementById("literature-focus-overlay")?.classList.contains("open");

            if (window.innerWidth > 1050 && !focusOpen) {
                index?.scrollIntoView({ behavior: "smooth", block: "nearest" });
                document.getElementById("chapter-search")?.focus();
                return;
            }

            sidebar?.classList.add("mobile-open");
            index?.classList.add("mobile-open");
            scrim?.classList.add("open");
            scrim?.setAttribute("aria-hidden", "false");
            document.body.classList.add("literature-drawer-open");

            setTimeout(() => document.getElementById("chapter-search")?.focus(), 80);
        }

        function closeChapterDrawer() {
            document.querySelector(".left-sidebar")?.classList.remove("mobile-open");
            document.getElementById("chapter-index")?.classList.remove("mobile-open");
            document.getElementById("chapter-index-mobile-scrim")?.classList.remove("open");
            document.getElementById("chapter-index-mobile-scrim")?.setAttribute("aria-hidden", "true");
            document.body.classList.remove("literature-drawer-open");
        }

        function setupFocusReaderControls() {
            document.getElementById("focus-reader-close")?.addEventListener("click", closeFocusReader);
            document.getElementById("focus-prev-button")?.addEventListener("click", () => {
                setActiveChapter(currentChapterIndex - 1, {
                    updateHistory: true,
                    scroll: false,
                    preserveFocusMode: true
                });
            });
            document.getElementById("focus-next-button")?.addEventListener("click", () => {
                if (currentChapterIndex >= allChapters.length - 1) {
                    closeFocusReader();
                    document.querySelector(".book-hero")?.scrollIntoView({ behavior: "smooth", block: "start" });
                    return;
                }

                setActiveChapter(currentChapterIndex + 1, {
                    updateHistory: true,
                    scroll: false,
                    preserveFocusMode: true
                });
            });
            document.getElementById("focus-chapter-menu-button")?.addEventListener("click", openChapterDrawer);

            document.addEventListener("keydown", event => {
                if (event.key === "Escape") {
                    if (document.getElementById("beta-feature-backdrop")?.classList.contains("open")) {
                        closeBetaFeatureModal();
                        return;
                    }

                    if (document.querySelector(".left-sidebar")?.classList.contains("mobile-open")) {
                        closeChapterDrawer();
                        return;
                    }

                    if (document.getElementById("literature-focus-overlay")?.classList.contains("open")) {
                        closeFocusReader();
                    }
                }

                if (
                    document.getElementById("literature-focus-overlay")?.classList.contains("open") &&
                    !event.ctrlKey &&
                    !event.metaKey &&
                    !event.altKey
                ) {
                    if (event.key === "ArrowLeft" && currentChapterIndex > 0) {
                        setActiveChapter(currentChapterIndex - 1, {
                            updateHistory: true,
                            scroll: false,
                            preserveFocusMode: true
                        });
                    }

                    if (event.key === "ArrowRight" && currentChapterIndex < allChapters.length - 1) {
                        setActiveChapter(currentChapterIndex + 1, {
                            updateHistory: true,
                            scroll: false,
                            preserveFocusMode: true
                        });
                    }
                }
            });

            window.addEventListener("popstate", () => {
                if (!allChapters.length) return;
                const requested = Number(new URLSearchParams(window.location.search).get("chapter"));
                const nextIndex = Number.isInteger(requested) && requested > 0 ? requested - 1 : 0;

                if (getSafeChapterIndex(nextIndex) !== currentChapterIndex) {
                    setActiveChapter(nextIndex, {
                        updateHistory: false,
                        scroll: true,
                        preserveFocusMode: true
                    });
                }
            });

            window.addEventListener("beforeunload", () => saveReadingProgress());
            document.addEventListener("visibilitychange", () => {
                if (document.visibilityState === "hidden") saveReadingProgress();
            });
        }

        function openFocusReader() {
            if (!allChapters.length) return;

            lastFocusedElement = document.activeElement;
            renderFocusChapter();

            const overlay = document.getElementById("literature-focus-overlay");
            overlay?.classList.add("open");
            overlay?.setAttribute("aria-hidden", "false");
            document.body.classList.add("literature-focus-open");

            const focusScroll = document.getElementById("literature-focus-scroll");
            if (focusScroll) focusScroll.scrollTop = 0;

            updateFocusReaderControls();
            setupReaderScrollTracking();
            setTimeout(() => document.getElementById("focus-reader-close")?.focus(), 40);
        }

        function closeFocusReader() {
            const overlay = document.getElementById("literature-focus-overlay");
            const focusScroll = document.getElementById("literature-focus-scroll");
            saveReadingProgress({
                chapterIndex: currentChapterIndex,
                scrollTop: Number(focusScroll?.scrollTop || 0),
                focus: false
            });

            overlay?.classList.remove("open");
            overlay?.setAttribute("aria-hidden", "true");
            document.body.classList.remove("literature-focus-open");
            closeChapterDrawer();
            setupReaderScrollTracking();

            lastFocusedElement?.focus?.();
            lastFocusedElement = null;
        }

        function renderFocusChapter() {
            const chapter = allChapters[currentChapterIndex];
            const content = document.getElementById("literature-focus-content");
            if (!chapter || !content) return;

            content.innerHTML = buildChapterArticle(chapter, currentChapterIndex, "focus-chapter");
            content
                .querySelectorAll(".chapter-main-text.rich-chapter-content")
                .forEach(normalizeRenderedWorldRichText);

            const scroll = document.getElementById("literature-focus-scroll");
            if (scroll) scroll.scrollTop = 0;

            updateFocusReaderControls();
            setupReaderScrollTracking();
        }

        function updateFocusReaderControls() {
            const chapter = allChapters[currentChapterIndex];
            const previous = allChapters[currentChapterIndex - 1] || null;
            const next = allChapters[currentChapterIndex + 1] || null;

            const bookTitle = document.getElementById("focus-reader-book-title");
            const chapterLabel = document.getElementById("focus-reader-chapter-label");
            const previousButton = document.getElementById("focus-prev-button");
            const nextButton = document.getElementById("focus-next-button");
            const previousLabel = document.getElementById("focus-prev-label");
            const nextLabel = document.getElementById("focus-next-label");

            if (bookTitle) bookTitle.textContent = currentLiterature?.title || "Literature";
            if (chapterLabel) {
                chapterLabel.textContent = chapter
                    ? `Chapter ${currentChapterIndex + 1} of ${allChapters.length} · ${chapter.title || "Untitled"}`
                    : "Chapter";
            }

            if (previousButton) previousButton.disabled = !previous;
            if (previousLabel) previousLabel.textContent = previous?.title || "Beginning";

            if (nextButton) nextButton.disabled = false;
            if (nextLabel) nextLabel.textContent = next?.title || "Return to Book";
            if (nextButton) {
                const small = nextButton.querySelector("small");
                if (small) small.textContent = next ? "Next Chapter" : "End of Story";
            }
        }

        function getChapterWordCount(chapter) {
            const text = getPlainTextFromHtml(chapter.body || "");
            return text.trim() ? text.trim().split(/\s+/).filter(Boolean).length : 0;
        }

        function getChapterReadTime(chapter) {
            return Math.max(1, Math.ceil(getChapterWordCount(chapter) / 250));
        }

        function updateReadingMeta(chapters) {
            const meta = document.getElementById("reading-meta");
            if (!meta) return;

            const totalWords = chapters.reduce((sum, chapter) => sum + getChapterWordCount(chapter), 0);
            const minutes = Math.max(1, Math.ceil(totalWords / 250));
            const chapterLabel = chapters.length === 1 ? "chapter" : "chapters";

            meta.innerHTML = `
                                                                    <span>${chapters.length} ${chapterLabel}</span>
                                                                    <span>${totalWords.toLocaleString()} words</span>
                                                                    <span>${minutes} min read</span>
                                                                `;
        }

        window.scrollToFirstChapter = async function () {
            if (!allChapters.length) return;
            await setActiveChapter(currentChapterIndex, {
                updateHistory: true,
                replaceHistory: true,
                scroll: true
            });
        };

        function toggleReaderPreference(className) {
            document.body.classList.toggle(className);
            syncReaderPreferenceButtons();
            saveReaderPreferences();
        }

        window.toggleReaderFocus = function () {
            const overlay = document.getElementById("literature-focus-overlay");
            if (overlay?.classList.contains("open")) {
                closeFocusReader();
            } else {
                openFocusReader();
            }
        };

        window.toggleLargeText = function () {
            toggleReaderPreference("reader-large-text");
        };

        window.toggleWideReader = function () {
            toggleReaderPreference("reader-wide");
        };

        window.toggleCenteredHeadings = function () {
            toggleReaderPreference("reader-center-headings");
        };

        window.toggleReaderSpacing = function () {
            toggleReaderPreference("reader-airy");
        };

        window.resetReaderPreferences = function () {
            [
                "reader-large-text",
                "reader-wide",
                "reader-center-headings",
                "reader-airy"
            ].forEach(className => document.body.classList.remove(className));

            syncReaderPreferenceButtons();
            saveReaderPreferences();

        function setupReaderScrollTracking() {
            const progress = document.getElementById("reading-progress");
            const focusOverlay = document.getElementById("literature-focus-overlay");
            const focusScroll = document.getElementById("literature-focus-scroll");
            const focusOpen = focusOverlay?.classList.contains("open");

            if (window.__nullverseLiteratureWindowScrollHandler) {
                window.removeEventListener("scroll", window.__nullverseLiteratureWindowScrollHandler);
            }

            if (window.__nullverseLiteratureFocusScrollHandler && focusScroll) {
                focusScroll.removeEventListener("scroll", window.__nullverseLiteratureFocusScrollHandler);
            }

            let saveTimer = null;

            function updateWindowProgress() {
                if (focusOverlay?.classList.contains("open")) return;

                const article = document.querySelector("#chapters-container .literature-chapter");
                if (!article) {
                    if (progress) progress.style.width = "0%";
                    return;
                }

                const rect = article.getBoundingClientRect();
                const articleTop = (window.scrollY || document.documentElement.scrollTop) + rect.top;
                const readableHeight = Math.max(1, article.offsetHeight - window.innerHeight);
                const scrolled = (window.scrollY || document.documentElement.scrollTop) - articleTop;
                const percentage = Math.min(100, Math.max(0, (scrolled / readableHeight) * 100));

                if (progress) progress.style.width = `${percentage}%`;

                clearTimeout(saveTimer);
                saveTimer = setTimeout(() => saveReadingProgress(), 180);
            }

            function updateFocusProgress() {
                if (!focusOverlay?.classList.contains("open") || !focusScroll) return;

                const distance = Math.max(1, focusScroll.scrollHeight - focusScroll.clientHeight);
                const percentage = Math.min(100, Math.max(0, (focusScroll.scrollTop / distance) * 100));
                if (progress) progress.style.width = `${percentage}%`;

                clearTimeout(saveTimer);
                saveTimer = setTimeout(() => saveReadingProgress(), 180);
            }

            window.__nullverseLiteratureWindowScrollHandler = updateWindowProgress;
            window.__nullverseLiteratureFocusScrollHandler = updateFocusProgress;

            window.addEventListener("scroll", updateWindowProgress, { passive: true });
            focusScroll?.addEventListener("scroll", updateFocusProgress, { passive: true });

            if (focusOpen) {
                updateFocusProgress();
            } else {
                updateWindowProgress();
            }
        }

        function sanitizeChapterHtml(html) {
            const template = document.createElement("template");
            template.innerHTML = String(html || "");

            const allowedTags = new Set([
                "P", "BR", "DIV", "SPAN", "STRONG", "B", "EM", "I", "U", "S", "SUP", "SUB",
                "H1", "H2", "H3", "H4", "UL", "OL", "LI", "BLOCKQUOTE", "A", "HR"
            ]);

            const allowedAttrs = new Set(["href", "target", "rel", "style"]);
            const allowedStyle = new Set([
                "color", "background-color", "font-family", "font-size", "line-height", "text-align",
                "margin-top", "margin-bottom", "padding-left"
            ]);

            function clean(node) {
                [...node.childNodes].forEach(child => {
                    if (child.nodeType === Node.ELEMENT_NODE) {
                        if (!allowedTags.has(child.tagName)) {
                            child.replaceWith(...child.childNodes);
                            return;
                        }

                        [...child.attributes].forEach(attr => {
                            const name = attr.name.toLowerCase();

                            if (!allowedAttrs.has(name)) {
                                child.removeAttribute(attr.name);
                                return;
                            }

                            if (name === "href") {
                                const href = child.getAttribute("href") || "";
                                if (!/^https?:\/\//i.test(href) && !href.startsWith("#")) {
                                    child.removeAttribute("href");
                                }
                            }

                            if (name === "style") {
                                const safeRules = String(child.getAttribute("style") || "")
                                    .split(";")
                                    .map(rule => rule.trim())
                                    .filter(rule => {
                                        const prop = rule.split(":")[0]?.trim().toLowerCase();
                                        return allowedStyle.has(prop);
                                    });

                                if (safeRules.length) child.setAttribute("style", safeRules.join("; "));
                                else child.removeAttribute("style");
                            }
                        });

                        if (child.tagName === "A") {
                            child.setAttribute("target", "_blank");
                            child.setAttribute("rel", "noopener noreferrer");
                        }

                        clean(child);
                    }
                });
            }

            clean(template.content);
            return template.innerHTML;
        }

        function getWorldSearchableSectionText(value) {
            const raw = decodeWorldRichHtmlEntities(String(value || ""));

            try {
                const snapshot = extractWorldRichTextSnapshot(raw);

                if (snapshot) {
                    const snapshotText = getWorldRichTextSnapshotPlainText(snapshot);

                    if (snapshotText.trim()) {
                        return snapshotText;
                    }
                }

                const holder = document.createElement("div");
                holder.innerHTML = sanitizeWorldSectionHtml(removeWorldRichTextSnapshotComment(raw));
                return holder.textContent || holder.innerText || raw;
            } catch (error) {
                console.error("Literature chapter searchable text error:", error);

                return removeWorldRichTextSnapshotComment(raw)
                    .replace(/<script[\s\S]*?<\/script>/gi, " ")
                    .replace(/<style[\s\S]*?<\/style>/gi, " ")
                    .replace(/<[^>]+>/g, " ");
            }
        }

        function getPlainTextFromHtml(html) {
            return getWorldSearchableSectionText(html || "");
        }

        function buildChapterHeaderImage(chapter, requestedPosition) {
            if (!chapter.image_url) return "";

            const savedPosition = chapter.image_position || "top";
            const isLeftRight = savedPosition === "left" || savedPosition === "right";

            if (requestedPosition === "top" && !(savedPosition === "top" || savedPosition === "full")) return "";
            if (requestedPosition === "bottom" && savedPosition !== "bottom") return "";
            if ((requestedPosition === "left" || requestedPosition === "right") && savedPosition !== requestedPosition) return "";

            const credit = buildCreditPill({
                type: chapter.image_credit_type,
                name: chapter.image_credit_name,
                username: chapter.image_credit_nullverse_username,
                url: chapter.image_credit_url,
                note: chapter.image_credit_note,
                ownerUsername: currentLiterature.ownerProfile?.username,
                context: "Chapter Image"
            });

            const classes = [
                "chapter-header-image-wrap",
                savedPosition === "full" ? "full" : savedPosition,
                isLeftRight ? `float-${savedPosition}` : "",
                credit ? "has-credit" : ""
            ].filter(Boolean).join(" ");

            return `
                                                                    <div class="${classes}">
                                                                        <img src="${escapeHtml(chapter.image_url)}" alt="" style="${getImagePlacementStyle(chapter.image_placement)}">

        async function loadLikes() {
            if (!currentLiterature) return;

            const button = document.getElementById("like-button");

            if (!currentUser) {
                const { data, error } = await supabase.rpc("get_public_world_like_count", {
                    target_world_id: currentLiterature.id
                });

                if (error) {
                    console.warn("Public like count unavailable:", error.message);
                    document.getElementById("like-count").textContent = "Likes unavailable";
                } else {
                    const likeCount = Number(data || 0);
                    document.getElementById("like-count").textContent = `${likeCount} ${likeCount === 1 ? "Like" : "Likes"}`;
                }

                button?.classList.remove("liked");
                if (button) button.textContent = "♡ Like";
                return;
            }

            const { data: likes, error } = await supabase
                .from("world_likes")
                .select("user_id")
                .eq("world_id", currentLiterature.id);

            if (error) {
                document.getElementById("like-count").textContent = "Likes unavailable";
                return;
            }

            const likeCount = likes ? likes.length : 0;
            document.getElementById("like-count").textContent = `${likeCount} ${likeCount === 1 ? "Like" : "Likes"}`;

            const userLiked = likes?.some(like => like.user_id === currentUser.id);

            if (userLiked) {
                button.classList.add("liked");
                button.textContent = "♥ Liked";
            } else {
                button.classList.remove("liked");
                button.textContent = "♡ Like";
            }
        }

        document.getElementById("like-button").addEventListener("click", async () => {
            if (!currentLiterature) return;

            if (!currentUser) {
                showBetaFeatureModal("like");
                return;
            }

            const button = document.getElementById("like-button");
            const alreadyLiked = button.classList.contains("liked");

            if (alreadyLiked) {
                await supabase
                    .from("world_likes")
                    .delete()
                    .eq("world_id", currentLiterature.id)
                    .eq("user_id", currentUser.id);
            } else {
                const { error: likeError } = await supabase
                    .from("world_likes")
                    .insert({
                        world_id: currentLiterature.id,
                        user_id: currentUser.id
                    });

                if (!likeError) {
                    await createNotification({
                        recipientId: currentLiterature.owner_id,
                        actorId: currentUser.id,
                        worldId: currentLiterature.id,
                        type: "world_liked",
                        message: `Someone liked ${currentLiterature.title}.`,
                        link: `literature.html?id=${encodeURIComponent(currentLiterature.id)}`
                    });
                }
            }

            await loadLikes();

        window.setLiteratureModerationStatus = async function (status) {
            if (!currentLiterature || !canModerateWorlds(currentPermissions)) return;

            const reasonInput = document.getElementById("literature-hide-reason");
            const reason = reasonInput ? reasonInput.value.trim() : "";

            if (status === "hidden" && !reason) {
                const message = document.getElementById("literature-moderation-message");
                if (message) message.textContent = "Enter a reason before hiding this literature.";
                return;
            }

            const { error } = await supabase
                .from("worlds")
                .update({
                    moderation_status: status,
                    moderation_reason: status === "hidden" ? reason : null
                })
                .eq("id", currentLiterature.id);

            const message = document.getElementById("literature-moderation-message");

            if (error) {
                if (message) message.textContent = error.message;
                return;
            }

            const logReason = status === "hidden"
                ? reason
                : `Literature "${currentLiterature.title || "Untitled Literature"}" restored to visible.`;

            await supabase.from("moderation_logs").insert({
                target_user_id: currentLiterature.owner_id,
                moderator_id: currentUser.id,
                action: `literature_${status}`,
                reason: logReason,
                expires_at: null
            });

            if (status === "hidden") {
                await createNotification({
                    recipientId: currentLiterature.owner_id,
                    actorId: currentUser.id,
                    worldId: currentLiterature.id,
                    type: "world_hidden",
                    message: `Your literature "${currentLiterature.title || "Untitled Literature"}" was hidden by moderation. Reason: ${reason}`,
                    link: "dashboard.html"
                });
            }

            if (status === "visible") {
                await createNotification({
                    recipientId: currentLiterature.owner_id,
                    actorId: currentUser.id,
                    worldId: currentLiterature.id,
                    type: "world_restored",
                    message: `Your literature "${currentLiterature.title || "Untitled Literature"}" was restored by moderation.`,
                    link: `literature.html?id=${encodeURIComponent(currentLiterature.id)}`
                });
            }

            if (message) message.textContent = `Literature set to ${status}.`;

            setTimeout(() => window.location.reload(), 700);
        };

        }

        function escapeHtml(value) {
            return String(value || "")
                .replaceAll("&", "&amp;")
                .replaceAll("<", "&lt;")
                .replaceAll(">", "&gt;")
                .replaceAll('"', "&quot;")
                .replaceAll("'", "&#039;");
        }

        function formatCreditType(value) {
            return String(value || "")
                .replaceAll("_", " ")
                .replace(/\b\w/g, letter => letter.toUpperCase());
        }

        function buildCreditPill({ type, name, username, url, note, ownerUsername, context = "Image" }) {
            type = type || "no_credit_needed";

            if (type === "no_credit_needed") return "";

            let label = "";
            let href = "";

            if (type === "own_work") {
                label = `${context} Credit: @${ownerUsername || "creator"}`;
                if (currentUser && ownerUsername) href = `profile.html?user=${encodeURIComponent(ownerUsername)}`;
            } else if (type === "nullverse_creator" && username) {
                label = `${context} Credit: @${username}`;
                if (currentUser) href = `profile.html?user=${encodeURIComponent(username)}`;
            } else {
                label = `${context} Credit: ${name || formatCreditType(type)}`;
                href = url || "";
            }

            const tooltipContent = `
                                                                    <strong>${escapeHtml(context)} Credit</strong>
                                                                    <br>
                                                                    Source: ${escapeHtml(name || username || ownerUsername || formatCreditType(type))}
                                                                    ${note ? `<br><br>${escapeHtml(note)}` : ""}
                                                                `;

            const tooltip = `<span class="credit-tooltip">${tooltipContent}</span>`;

            if (href) {
                return `
                                                                        <a class="credit-pill"
                                                                           href="${escapeHtml(href)}"
                                                                           ${href.startsWith("http") ? 'target="_blank"' : ""}>
                                                                            ${escapeHtml(label)}
                                                                            ${tooltip}
                                                                        </a>
                                                                    `;
            }

            return `
                                                                    <span class="credit-pill">
                                                                        ${escapeHtml(label)}
                                                                        ${tooltip}
                                                                    </span>
                                                                `;
        }

        window.logOut = async function () {
            await supabase.auth.signOut();
            window.location.href = "login.html";
        };
    </script>
</body>
</html>
