<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1.0">
    <link rel="icon" type="image/png" href="favicon.png">
    <title>Literature - Nullverse</title>

    <script>
        const savedNullverseTheme = localStorage.getItem("nullverse-theme") || "void";
        document.documentElement.setAttribute("data-theme", savedNullverseTheme);
    </script>

    <link rel="stylesheet" href="theme.css?v=25">

    <style>
        html {
            min-height: 100%;
            background: #000;
        }

        body {
            margin: 0;
            min-height: 100vh;
            font-family: Arial, sans-serif;
            background: #000;
            color: var(--text-primary);
            transition: background .25s ease, color .25s ease;
        }

        header,
        main {
            position: relative;
            z-index: 2;
        }

        .literature-background-layer {
            position: fixed;
            inset: 0;
            z-index: 0;
            overflow: hidden;
            pointer-events: none;
        }

        .literature-background-image,
        .literature-gradient-layer,
        .literature-background-overlay {
            position: absolute;
            inset: 0;
        }

        .literature-background-image {
            background-position: center;
            background-size: cover;
            background-repeat: no-repeat;
        }

        .literature-background-overlay {
            background: rgba(0,0,0,.35);
        }

        .literature-background-layer .credit-pill {
            position: fixed;
            left: 18px;
            bottom: 18px;
            pointer-events: auto;
        }

        header {
            padding: 12px 40px;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(12,12,14,.72);
            position: sticky;
            top: 0;
            z-index: 100;
            backdrop-filter: blur(18px);
            -webkit-backdrop-filter: blur(18px);
            box-shadow: 0 10px 35px rgba(0,0,0,.28);
        }

        .logo,
        .logo a {
            display: flex;
            align-items: center;
        }

        .site-logo {
            height: 64px;
            width: auto;
            display: block;
        }

        nav {
            display: flex;
            gap: 22px;
            flex-wrap: wrap;
            align-items: center;
        }

            nav a,
            nav button {
                color: var(--text-secondary);
                text-decoration: none;
                background: none;
                border: none;
                cursor: pointer;
                font-family: Arial, sans-serif;
                font-size: .95rem;
                transition: .18s ease;
            }

                nav a:hover,
                nav button:hover {
                    color: white;
                }

        main {
            display: grid;
            grid-template-columns: 310px minmax(0,1fr);
            gap: 28px;
            max-width: 1400px;
            margin: auto;
            padding: 45px 40px 80px;
        }

        .left-sidebar {
            position: sticky;
            top: 110px;
            height: fit-content;
        }

        .content-column {
            min-width: 0;
        }

        .panel,
        .book-hero,
        .chapter-index,
        .chapter-reader {
            border: 1px solid var(--border-color);
            border-radius: 22px;
            background: var(--panel-bg);
            backdrop-filter: blur(18px);
            -webkit-backdrop-filter: blur(18px);
            box-shadow: 0 18px 40px rgba(0,0,0,.24), 0 0 24px rgba(255,255,255,.03);
        }

        .book-hero {
            position: relative;
            overflow: hidden;
            padding: 34px;
            margin-bottom: 28px;
            background: var(--book-hero-background, var(--panel-bg));
            color: var(--book-hero-text, var(--text-primary));
        }

            .book-hero::before {
                content: "";
                position: absolute;
                inset: 0;
                background-image: var(--book-hero-image);
                background-size: cover;
                background-position: center;
                opacity: var(--book-hero-opacity,.85);
                z-index: 0;
            }

            .book-hero::after {
                content: "";
                position: absolute;
                inset: 0;
                background: rgba(0,0,0,var(--book-hero-overlay,.35));
                z-index: 1;
            }

            .book-hero > * {
                position: relative;
                z-index: 2;
            }

        .book-layout {
            display: grid;
            grid-template-columns: 180px minmax(0,1fr);
            gap: 24px;
            align-items: start;
        }

        .cover-wrap {
            position: relative;
            border-radius: 18px;
            overflow: hidden;
            border: 1px solid rgba(255,255,255,.12);
            min-height: 250px;
            background: rgba(255,255,255,.04);
        }

            .cover-wrap img {
                width: 100%;
                height: 270px;
                object-fit: cover;
                display: block;
            }

        .cover-placeholder {
            min-height: 270px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text-muted);
            text-align: center;
            padding: 18px;
        }

        .tag-row {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            margin-bottom: 16px;
        }

        .tag {
            display: inline-block;
            font-size: .82rem;
            color: var(--book-hero-text, var(--text-secondary));
            border: 1px solid rgba(255,255,255,.16);
            background: rgba(255,255,255,.06);
            border-radius: 999px;
            padding: 7px 11px;
        }

        h1 {
            margin: 0 0 10px;
            font-size: clamp(2rem,5vw,4.2rem);
            color: var(--book-hero-text, var(--text-primary));
        }

        .creator,
        .summary {
            color: var(--book-hero-text, var(--text-secondary));
            line-height: 1.7;
        }

            .creator a {
                color: inherit;
                text-decoration: underline;
            }

        .summary {
            margin-top: 18px;
            white-space: pre-wrap;
        }

        .action-row {
            display: flex;
            align-items: center;
            gap: 14px;
            margin-top: 26px;
            flex-wrap: wrap;
        }

        .button,
        .like-button {
            display: inline-block;
            background: linear-gradient(180deg,#2a2a2f,#0d0d10);
            color: #f5f5f5;
            border: 1px solid rgba(255,255,255,.12);
            padding: 10px 15px;
            border-radius: 10px;
            cursor: pointer;
            text-decoration: none;
            font-family: Arial,sans-serif;
            transition: .18s ease;
            box-shadow: 0 0 16px rgba(255,255,255,.08), inset 0 1px 0 rgba(255,255,255,.06);
        }

            .button:hover,
            .like-button:hover {
                opacity: .92;
                transform: translateY(-1px);
                border-color: rgba(255,255,255,.18);
            }

            .like-button.liked {
                background: linear-gradient(180deg,#4a2f37 0%,#2a181d 100%);
            }

        .like-count {
            color: var(--book-hero-text, var(--text-muted));
        }

        .chapter-index {
            position: relative;
            overflow: hidden;
            padding: 18px;
            background: var(--literature-index-background, var(--panel-bg));
            color: var(--literature-index-text, var(--text-primary));
        }

            .chapter-index::before {
                content: "";
                position: absolute;
                inset: 0;
                background-image: var(--literature-index-image);
                background-size: cover;
                background-position: center;
                opacity: var(--literature-index-opacity,.85);
                z-index: 0;
            }

            .chapter-index::after {
                content: "";
                position: absolute;
                inset: 0;
                background: rgba(0,0,0,var(--literature-index-overlay,.35));
                z-index: 1;
            }

            .chapter-index > * {
                position: relative;
                z-index: 2;
            }

        .index-header h2 {
            margin: 0;
            font-size: 1.15rem;
        }

        .index-header p {
            margin: 6px 0 18px;
            color: var(--literature-index-text, var(--text-muted));
            font-size: .88rem;
            line-height: 1.5;
        }

        .chapter-search {
            width: 100%;
            box-sizing: border-box;
            padding: 12px 14px;
            border-radius: 12px;
            border: 1px solid rgba(255,255,255,.16);
            background: rgba(0,0,0,.28);
            color: var(--literature-index-text, white);
            margin-bottom: 14px;
        }

        .chapter-count {
            color: var(--literature-index-text, var(--text-muted));
            font-size: .82rem;
            margin-bottom: 16px;
        }

        #chapter-nav-links {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .chapter-link {
            display: block;
            width: 100%;
            text-align: left;
            padding: 13px 14px;
            border-radius: 14px;
            background: rgba(0,0,0,.20);
            border: 1px solid rgba(255,255,255,.08);
            color: var(--literature-index-text, white);
            cursor: pointer;
            transition: .18s ease;
            font-family: Arial,sans-serif;
        }

            .chapter-link:hover,
            .chapter-link.active {
                background: rgba(255,255,255,.14);
                transform: translateX(4px);
                border-color: rgba(255,255,255,.18);
            }

            .chapter-link span {
                display: block;
                font-weight: 600;
            }

            .chapter-link small {
                display: block;
                margin-top: 5px;
                opacity: .82;
                font-size: .78rem;
            }

        .chapter-reader {
            position: relative;
            overflow: hidden;
            padding: 0;
            background: var(--chapter-reader-background, var(--card-bg));
            color: var(--chapter-reader-text, var(--text-primary));
        }

        .chapter-reader-bg-image {
            position: absolute;
            inset: 0;
            background-image: var(--chapter-bg-image);
            background-size: var(--chapter-bg-size,cover);
            background-position: var(--chapter-bg-position,center);
            background-repeat: no-repeat;
            opacity: var(--chapter-bg-opacity,.35);
            filter: blur(var(--chapter-bg-blur,0px));
            z-index: 0;
            transform: scale(1.03);
        }

        .chapter-reader-overlay {
            position: absolute;
            inset: 0;
            background: rgba(0,0,0,var(--chapter-bg-overlay,.35));
            z-index: 1;
        }

        .chapter-reader-inner {
            position: relative;
            z-index: 2;
            padding: 36px;
        }

        .chapter-title-row {
            margin-bottom: 28px;
        }

        .chapter-eyebrow {
            color: var(--chapter-reader-text, var(--text-muted));
            font-size: .9rem;
            letter-spacing: .08em;
            text-transform: uppercase;
            margin-bottom: 8px;
        }

        .chapter-title-row h2 {
            margin: 0;
            font-size: clamp(2rem,4vw,3.2rem);
            color: var(--chapter-reader-text, var(--text-primary));
        }

        .chapter-subtitle {
            color: var(--chapter-reader-text, var(--text-secondary));
            margin-top: 10px;
            line-height: 1.6;
        }

        .chapter-visual {
            position: relative;
            overflow: hidden;
            border-radius: 18px;
            border: 1px solid rgba(255,255,255,.12);
            background: var(--chapter-visual-background, rgba(255,255,255,.04));
            color: var(--chapter-visual-text, #f5f5f5);
            margin-bottom: 26px;
        }

            .chapter-visual::before {
                content: "";
                position: absolute;
                inset: 0;
                background-image: var(--chapter-visual-image);
                background-size: cover;
                background-position: center;
                opacity: .86;
                z-index: 0;
            }

            .chapter-visual::after {
                content: "";
                position: absolute;
                inset: 0;
                background: rgba(0,0,0,.35);
                z-index: 1;
            }

            .chapter-visual > * {
                position: relative;
                z-index: 2;
            }

        .chapter-visual-image {
            width: 100%;
            height: 320px;
            object-fit: cover;
            display: block;
        }

        .chapter-visual-placeholder {
            min-height: 190px;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
            color: inherit;
            opacity: .84;
        }

        .chapter-main-text {
            background: var(--chapter-panel-background, rgba(12,12,14,.58));
            color: var(--chapter-reader-text, var(--text-primary));
            border: 1px solid rgba(255,255,255,.10);
            border-radius: 18px;
            padding: 30px;
            line-height: var(--chapter-line-height,1.8);
            letter-spacing: var(--chapter-letter-spacing,0);
            white-space: pre-wrap;
            font-size: 1.05rem;
        }

        .author-note {
            margin-top: 24px;
            background: rgba(255,255,255,.055);
            border: 1px solid rgba(255,255,255,.10);
            border-radius: 16px;
            padding: 18px;
            color: var(--chapter-reader-text, var(--text-secondary));
            line-height: 1.7;
            white-space: pre-wrap;
        }

        .reader-controls {
            display: flex;
            justify-content: space-between;
            gap: 12px;
            flex-wrap: wrap;
            margin-top: 26px;
        }

        .empty {
            color: var(--text-muted);
            line-height: 1.6;
        }

        .owner-actions {
            margin-top: 22px;
        }

        .content-warning-panel {
            max-width: 760px;
            margin: 60px auto;
            background: var(--panel-bg);
            border: 1px solid rgba(255,214,102,.28);
            border-radius: 22px;
            padding: 32px;
            box-shadow: 0 18px 40px rgba(0,0,0,.28);
        }

        .warning-list {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin: 18px 0 24px;
        }

        .warning-pill {
            border: 1px solid rgba(255,214,102,.32);
            background: rgba(255,214,102,.10);
            color: #ffe6a3;
            border-radius: 999px;
            padding: 7px 11px;
        }

        .credit-pill {
            position: absolute;
            left: 14px;
            bottom: 14px;
            z-index: 6;
            display: inline-flex;
            align-items: center;
            max-width: calc(100% - 28px);
            padding: 7px 11px;
            border-radius: 999px;
            border: 1px solid rgba(255,255,255,.16);
            background: rgba(0,0,0,.58);
            color: white;
            font-size: .78rem;
            text-decoration: none;
            backdrop-filter: blur(14px);
            -webkit-backdrop-filter: blur(14px);
            white-space: nowrap;
        }

            .credit-pill:hover {
                background: rgba(0,0,0,.75);
            }

        .credit-tooltip {
            position: absolute;
            left: 0;
            bottom: calc(100% + 8px);
            width: 240px;
            padding: 10px 12px;
            border-radius: 12px;
            background: rgba(0,0,0,.9);
            border: 1px solid rgba(255,255,255,.16);
            color: var(--text-secondary);
            font-size: .78rem;
            line-height: 1.45;
            opacity: 0;
            visibility: hidden;
            pointer-events: none;
            white-space: normal;
            box-shadow: 0 12px 28px rgba(0,0,0,.35);
        }

        .credit-pill:hover .credit-tooltip,
        .credit-pill.show-tooltip .credit-tooltip {
            opacity: 1;
            visibility: visible;
        }

        .chapter-visual .credit-pill {
            position: absolute;
            left: 14px;
            bottom: 14px;
        }

        #report-modal {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,.75);
            z-index: 9999;
            justify-content: center;
            align-items: center;
        }

        .report-box {
            width: 500px;
            max-width: 90%;
            background: var(--panel-bg);
            border: 1px solid var(--border-color);
            border-radius: 18px;
            padding: 24px;
        }

            .report-box select,
            .report-box textarea {
                width: 100%;
                box-sizing: border-box;
                padding: 12px;
                margin-bottom: 12px;
                border-radius: 12px;
                border: 1px solid var(--border-color);
                background: rgba(0,0,0,.28);
                color: var(--text-primary);
            }

        @media (max-width: 900px) {
            header {
                flex-direction: column;
                gap: 14px;
                padding: 20px;
            }

            nav {
                justify-content: center;
            }

            main {
                display: block;
                padding: 30px 24px 70px;
            }

            .left-sidebar {
                position: static;
                margin-bottom: 24px;
            }

            .book-layout {
                grid-template-columns: 1fr;
            }

            .cover-wrap {
                max-width: 260px;
            }

            .chapter-reader-inner {
                padding: 24px;
            }

            .chapter-main-text {
                padding: 22px;
            }
        }
    </style>
</head>

    <script type="module">
        import { requireBetaAccess } from "./betaGate.js";
        import { supabase } from "./supabaseClient.js";
        import { setupNotificationBadge } from "./notificationBadge.js";
        import { createNotification } from "./notifications.js";
        import { setupMessageBadge } from "./messageBadge.js";
        import {
            getCurrentUserWithPermissions,
            canModerateWorlds,
            canModerateContentOwner
        } from "./permissions.js?v=4";

        const currentUser = await requireBetaAccess();

        setupNotificationBadge();
        setupMessageBadge();

        const {
            profile: currentProfile,
            permissions: currentPermissions
        } = await getCurrentUserWithPermissions(currentUser.id);

        const params = new URLSearchParams(window.location.search);
        const literatureId = params.get("id");

        let currentLiterature = null;
        let allChapters = [];
        let activeChapterIndex = 0;

        let contentExperience = "balanced";
        let blockedContentWarnings = [];
        let ageRole = "unknown";
        let pendingWarningLiterature = null;

        setupReportSystem();
        await loadViewerContentPreferences();

        if (!literatureId) {
            showNotFound("No literature ID was provided.");
        } else {
            await loadLiterature(literatureId);
        }

        document.addEventListener("click", (event) => {
            const pill = event.target.closest(".credit-pill");

            document.querySelectorAll(".credit-pill").forEach(item => {
                if (item !== pill) {
                    item.classList.remove("show-tooltip");
                }
            });

            if (pill) {
                event.preventDefault();
                pill.classList.toggle("show-tooltip");
            }
        });

        async function areUsersBlocked(userA, userB) {
            const { data, error } = await supabase
                .from("user_blocks")
                .select("id, blocker_id, blocked_id")
                .in("blocker_id", [userA, userB])
                .in("blocked_id", [userA, userB])
                .limit(1);

            if (error) {
                console.error("Block check error:", error);
                return false;
            }

            return data && data.length > 0;
        }

        async function loadViewerContentPreferences() {
            const { data: profile } = await supabase
                .from("profiles")
                .select("content_experience, blocked_content_warnings, age_role")
                .eq("id", currentUser.id)
                .single();

            if (!profile) return;

            contentExperience = profile.content_experience || "balanced";
            blockedContentWarnings = profile.blocked_content_warnings || [];
            ageRole = profile.age_role || "unknown";
        }

        function getContentSafetyInfo(item) {
            const safeWarnings = [
                "gore",
                "sexual_content",
                "disturbing_imagery"
            ];

            const warnings = item.content_warnings || [];
            const rating = item.content_rating || "general";

            const hasHardBlockedWarning =
                warnings.some(warning =>
                    blockedContentWarnings.includes(warning)
                );

            const hasSafeWarning =
                warnings.some(warning =>
                    safeWarnings.includes(warning)
                );

            const isAdult =
                rating === "adult";

            return {
                warnings,
                rating,
                hasHardBlockedWarning,
                hasSafeWarning,
                isAdult
            };
        }

        function shouldBlockContent(item) {
            const info = getContentSafetyInfo(item);

            if (ageRole === "minor") {
                return info.isAdult || info.hasSafeWarning;
            }

            if (info.hasHardBlockedWarning) {
                return true;
            }

            if (contentExperience === "safe") {
                return info.isAdult || info.hasSafeWarning;
            }

            return false;
        }

        function shouldWarnContent(item) {
            const info = getContentSafetyInfo(item);

            if (contentExperience !== "balanced") {
                return false;
            }

            if (ageRole === "minor") {
                return false;
            }

            if (info.hasHardBlockedWarning) {
                return false;
            }

            return info.isAdult || info.hasSafeWarning;
        }

        async function loadLiterature(id) {
            const { data: literature, error } = await supabase
                .from("worlds")
                .select("*")
                .eq("id", id)
                .eq("visibility", "published")
                .single();

            if (error || !literature) {
                showNotFound("This literature does not exist or is not published.");
                return;
            }

            if (literature.content_type !== "literature") {
                showNotFound("This page is only for literature projects.");
                return;
            }

            currentLiterature = literature;

            if (shouldBlockContent(literature)) {
                showContentBlocked(literature);
                return;
            }

            const warningAccepted =
                params.get("contentOk") === literature.id;

            if (shouldWarnContent(literature) && !warningAccepted) {
                pendingWarningLiterature = literature;
                showContentWarning(literature);
                return;
            }

            await renderLoadedLiterature(literature);
        }

        async function renderLoadedLiterature(literature) {
            const blocked = await areUsersBlocked(
                currentUser.id,
                literature.owner_id
            );

            if (blocked) {
                showNotFound("This literature is unavailable.");
                return;
            }

            const ownerAccess =
                currentUser &&
                currentUser.id === literature.owner_id;

            if (
                literature.moderation_status === "hidden" &&
                !ownerAccess &&
                !canModerateWorlds(currentPermissions)
            ) {
                showNotFound("This literature has been hidden by Nullverse staff.");
                return;
            }

            const { data: profile } = await supabase
                .from("profiles")
                .select("id, username, display_name, role, role_name")
                .eq("id", literature.owner_id)
                .single();

            currentLiterature.ownerProfile = profile;

            applyLiteratureTheme(literature);
            renderBookHero(literature, profile);
            renderOwnerActions(literature);
            await loadLikes();
            await loadChapters(literature.id);

            document.getElementById("comments-link").href =
                `world-comments.html?id=${encodeURIComponent(literature.id)}`;

            document.getElementById("qa-link").href =
                `world-qa.html?id=${encodeURIComponent(literature.id)}`;

            document.getElementById("community-link").href =
                `world-additions.html?id=${encodeURIComponent(literature.id)}`;
        }

        function applyLiteratureTheme(literature) {
            const root = document.documentElement;

            const imageLayer =
                document.getElementById("literature-background-image");

            const gradientLayer =
                document.getElementById("literature-gradient-layer");

            const overlayLayer =
                document.getElementById("literature-background-overlay");

            const backgroundStyle =
                literature.theme_background_style || "default";

            imageLayer.style.backgroundImage = "none";
            gradientLayer.style.background = "var(--page-bg)";

            if (backgroundStyle === "solid") {
                gradientLayer.style.background =
                    literature.theme_background_color_1 || "#050505";
            }

            if (backgroundStyle === "gradient") {
                gradientLayer.style.background =
                    `linear-gradient(135deg, ${literature.theme_background_color_1 || "#050505"}, ${literature.theme_background_color_2 || "#000000"})`;
            }

            if (
                backgroundStyle === "image" &&
                literature.theme_background_image_url
            ) {
                gradientLayer.style.background =
                    `linear-gradient(135deg, ${literature.theme_background_color_1 || "#050505"}, ${literature.theme_background_color_2 || "#000000"})`;

                imageLayer.style.backgroundImage =
                    `url("${literature.theme_background_image_url}")`;

                imageLayer.style.opacity =
                    literature.theme_background_image_opacity ?? .35;

                imageLayer.style.filter =
                    `blur(${literature.theme_background_image_blur || 0}px)`;

                imageLayer.style.backgroundRepeat =
                    literature.theme_background_image_repeat || "no-repeat";

                imageLayer.style.backgroundPosition =
                    `${literature.theme_background_position_x || 50}% ${literature.theme_background_position_y || 50}%`;

                const savedSize =
                    literature.theme_background_image_size || "cover";

                imageLayer.style.backgroundSize =
                    savedSize === "auto"
                        ? `${literature.theme_background_zoom || 100}%`
                        : savedSize;
            }

            if (
                literature.theme_gradient_enabled &&
                backgroundStyle === "default"
            ) {
                gradientLayer.style.background =
                    `linear-gradient(135deg, ${literature.theme_gradient_color_1 || "#000000"}, ${literature.theme_gradient_color_2 || "#1a1a1a"})`;
            }

            overlayLayer.style.background =
                `rgba(0,0,0,${literature.theme_background_overlay_strength ?? .35})`;

            let indexBackground =
                "linear-gradient(135deg,rgba(255,255,255,.06),rgba(255,255,255,.02))";

            if (literature.theme_index_style === "solid") {
                indexBackground =
                    literature.theme_index_color_1 || "#141416";
            }

            if (
                literature.theme_index_style === "gradient" ||
                literature.theme_index_style === "image"
            ) {
                indexBackground =
                    `linear-gradient(135deg, ${literature.theme_index_color_1 || "#141416"}, ${literature.theme_index_color_2 || "#0b0b0d"})`;
            }

            root.style.setProperty(
                "--literature-index-background",
                indexBackground
            );

            root.style.setProperty(
                "--literature-index-text",
                literature.theme_index_text_color || "#f5f5f5"
            );

            root.style.setProperty(
                "--literature-index-image",
                literature.theme_index_style === "image" && literature.theme_index_image_url
                    ? `url("${literature.theme_index_image_url}")`
                    : "none"
            );

            root.style.setProperty(
                "--literature-index-opacity",
                literature.theme_index_opacity ?? .85
            );

            root.style.setProperty(
                "--literature-index-overlay",
                literature.theme_index_overlay ?? .35
            );
        }

        async function loadChapters(literatureId) {
            const { data: chapters, error } = await supabase
                .from("literature_chapters")
                .select("*")
                .eq("literature_id", literatureId)
                .eq("visibility", "published")
                .order("display_order", { ascending: true });

            if (error) {
                document.getElementById("chapter-reader-inner").innerHTML =
                    `<p class="empty">${escapeHtml(error.message)}</p>`;
                return;
            }

            allChapters = chapters || [];

            if (!allChapters.length) {
                document.getElementById("chapter-reader-inner").innerHTML =
                    `<p class="empty">This literature project does not have any public chapters yet.</p>`;
                return;
            }

            renderChapterIndex(allChapters);

            const chapterParam =
                Number(params.get("chapter"));

            const hashChapter =
                Number((window.location.hash || "").replace("#chapter-", ""));

            let requestedIndex =
                Number.isFinite(chapterParam) && chapterParam > 0
                    ? chapterParam - 1
                    : Number.isFinite(hashChapter) && hashChapter > 0
                        ? hashChapter - 1
                        : 0;

            if (requestedIndex < 0 || requestedIndex >= allChapters.length) {
                requestedIndex = 0;
            }

            renderChapter(requestedIndex);
        }

        function renderChapterIndex(chapters) {
            const nav =
                document.getElementById("chapter-index");

            const links =
                document.getElementById("chapter-nav-links");

            const search =
                document.getElementById("chapter-search");

            const count =
                document.getElementById("chapter-count");

            nav.style.display = "block";

            function draw() {
                const query =
                    (search.value || "").toLowerCase().trim();

                const filtered = chapters.filter(chapter => {
                    return (
                        (chapter.title || "").toLowerCase().includes(query) ||
                        (chapter.subtitle || "").toLowerCase().includes(query) ||
                        (chapter.body || "").toLowerCase().includes(query)
                    );
                });

                count.textContent =
                    `${filtered.length} ${filtered.length === 1 ? "Chapter" : "Chapters"}`;

                if (!filtered.length) {
                    links.innerHTML =
                        `<p class="empty">No chapters match this search.</p>`;
                    return;
                }

                links.innerHTML = filtered.map(chapter => {
                    const realIndex =
                        chapters.indexOf(chapter);

                    return `
                        <button class="chapter-link"
                                data-index="${realIndex}">
                            <span>Chapter ${realIndex + 1}: ${escapeHtml(chapter.title || "Untitled")}</span>
                            <small>${escapeHtml(chapter.subtitle || "Read chapter")}</small>
                        </button>
                    `;
                }).join("");
            }

            links.addEventListener("click", event => {
                const button =
                    event.target.closest(".chapter-link");

                if (!button) return;

                const index =
                    Number(button.dataset.index);

                renderChapter(index);
            });

            search.addEventListener("input", draw);

            draw();
        }

        function renderChapter(index) {
            const chapter =
                allChapters[index];

            if (!chapter) return;

            activeChapterIndex = index;
            applyChapterTheme(chapter);

            document.querySelectorAll(".chapter-link").forEach(button => {
                button.classList.toggle(
                    "active",
                    Number(button.dataset.index) === index
                );
            });

            const visualHtml =
                buildChapterVisual(chapter, index);

            const previousButton =
                index > 0
                    ? `<button class="button" onclick="openReaderChapter(${index - 1})">← Previous Chapter</button>`
                    : `<span></span>`;

            const nextButton =
                index < allChapters.length - 1
                    ? `<button class="button" onclick="openReaderChapter(${index + 1})">Next Chapter →</button>`
                    : `<span></span>`;

            document.getElementById("chapter-reader-inner").innerHTML = `
                <div class="chapter-title-row">
                    <div class="chapter-eyebrow">
                        Chapter ${index + 1}
                    </div>

                    <h2>
                        ${escapeHtml(chapter.title || "Untitled")}
                    </h2>

                    ${chapter.subtitle ? `
                        <div class="chapter-subtitle">
                            ${escapeHtml(chapter.subtitle)}
                        </div>
                    ` : ""}
                </div>

                ${visualHtml}

                <div class="chapter-main-text">
                    ${escapeHtml(chapter.body || "No chapter text yet.")}
                </div>

                ${chapter.author_note ? `
                    <div class="author-note">
                        <strong>Author Note</strong>
                        <br><br>
                        ${escapeHtml(chapter.author_note)}
                    </div>
                ` : ""}

                <div class="reader-controls">
                    ${previousButton}
                    ${nextButton}
                </div>
            `;

            window.history.replaceState(
                null,
                "",
                `literature.html?id=${encodeURIComponent(currentLiterature.id)}#chapter-${index + 1}`
            );

            document.getElementById("chapter-reader")
                .scrollIntoView({ behavior: "smooth", block: "start" });
        }

        window.openReaderChapter = function (index) {
            renderChapter(index);
        };

        function buildChapterVisual(chapter, index) {
            const style =
                chapter.image_style || "default";

            const hasImage =
                style === "image" && chapter.image_url;

            const hasStyledVisual =
                style === "solid" ||
                style === "gradient" ||
                hasImage;

            if (!hasStyledVisual) {
                return "";
            }

            let background =
                "linear-gradient(135deg,rgba(255,255,255,.07),rgba(255,255,255,.025))";

            if (style === "solid") {
                background =
                    chapter.image_color_1 || "#141416";
            }

            if (style === "gradient" || style === "image") {
                background =
                    `linear-gradient(135deg, ${chapter.image_color_1 || "#141416"}, ${chapter.image_color_2 || "#0b0b0d"})`;
            }

            const image =
                hasImage
                    ? `url("${chapter.image_url}")`
                    : "none";

            const inner =
                hasImage
                    ? `<img src="${escapeHtml(chapter.image_url)}"
                            class="chapter-visual-image"
                            alt="">`
                    : `<div class="chapter-visual-placeholder">
                            Chapter ${index + 1} Visual Block
                       </div>`;

            return `
                <div class="chapter-visual"
                     style="
                        --chapter-visual-background:${background};
                        --chapter-visual-text:${chapter.image_text_color || "#f5f5f5"};
                        --chapter-visual-image:${image};
                     ">
                    ${inner}

                    ${hasImage ? buildCreditPill({
                        type: chapter.image_credit_type,
                        name: chapter.image_credit_name,
                        username: chapter.image_credit_nullverse_username,
                        url: chapter.image_credit_url,
                        note: chapter.image_credit_note,
                        ownerUsername: currentLiterature.ownerProfile?.username,
                        context: "Chapter Image"
                    }) : ""}
                </div>
            `;
        }

        function applyChapterTheme(chapter) {
            const root =
                document.documentElement;

            const reader =
                document.getElementById("chapter-reader");

            const bg =
                document.getElementById("chapter-reader-bg-image");

            const style =
                chapter.theme_background_style || "default";

            let background =
                chapter.background_color || "#0b0b0d";

            if (style === "solid") {
                background =
                    chapter.theme_background_color_1 || "#050505";
            }

            if (style === "gradient" || style === "image") {
                background =
                    `linear-gradient(135deg, ${chapter.theme_background_color_1 || "#050505"}, ${chapter.theme_background_color_2 || "#000000"})`;
            }

            root.style.setProperty(
                "--chapter-reader-background",
                background
            );

            root.style.setProperty(
                "--chapter-reader-text",
                chapter.text_color || "#f5f5f5"
            );

            root.style.setProperty(
                "--chapter-panel-background",
                chapter.chapter_panel_color || "#141416"
            );

            const spacingMap = {
                compact: ["1.45", "0px"],
                comfortable: ["1.8", "0px"],
                airy: ["2.15", ".02em"],
                manuscript: ["2", ".01em"]
            };

            const spacing =
                spacingMap[chapter.spacing_type || "comfortable"] ||
                spacingMap.comfortable;

            root.style.setProperty(
                "--chapter-line-height",
                spacing[0]
            );

            root.style.setProperty(
                "--chapter-letter-spacing",
                spacing[1]
            );

            if (
                style === "image" &&
                chapter.theme_background_image_url
            ) {
                root.style.setProperty(
                    "--chapter-bg-image",
                    `url("${chapter.theme_background_image_url}")`
                );
            } else {
                root.style.setProperty(
                    "--chapter-bg-image",
                    "none"
                );
            }

            root.style.setProperty(
                "--chapter-bg-opacity",
                chapter.theme_background_image_opacity ?? .35
            );

            root.style.setProperty(
                "--chapter-bg-blur",
                `${chapter.theme_background_image_blur || 0}px`
            );

            root.style.setProperty(
                "--chapter-bg-overlay",
                chapter.theme_background_overlay_strength ?? .35
            );

            root.style.setProperty(
                "--chapter-bg-position",
                `${chapter.theme_background_position_x || 50}% ${chapter.theme_background_position_y || 50}%`
            );

            root.style.setProperty(
                "--chapter-bg-size",
                `${chapter.theme_background_zoom || 100}%`
            );

            const oldCredit =
                reader.querySelector(".chapter-background-credit");

            if (oldCredit) {
                oldCredit.remove();
            }

            if (
                style === "image" &&
                chapter.theme_background_image_url
            ) {
                reader.insertAdjacentHTML(
                    "beforeend",
                    `<div class="chapter-background-credit">
                        ${buildCreditPill({
                            type: chapter.background_credit_type,
                            name: chapter.background_credit_name,
                            username: chapter.background_credit_nullverse_username,
                            url: chapter.background_credit_url,
                            note: chapter.background_credit_note,
                            ownerUsername: currentLiterature.ownerProfile?.username,
                            context: "Chapter Background"
                        })}
                    </div>`
                );
            }
        }

        function renderTags(literature) {
            const container =
                document.getElementById("book-tags");

            const tags = [
                ...(literature.genres || "").split(","),
                ...(literature.themes || "").split(",")
            ]
                .map(tag => tag.trim())
                .filter(Boolean);

            if (!tags.length) {
                container.innerHTML =
                    `<span class="tag">Literature</span>`;
                return;
            }

            container.innerHTML =
                `<span class="tag">Literature</span>` +
                tags.map(tag =>
                    `<span class="tag">${escapeHtml(tag)}</span>`
                ).join("");
        }

        function renderOwnerActions(literature) {

                document.getElementById("owner-actions");

            if (currentUser && currentUser.id === literature.owner_id) {

        async function loadLikes() {
            if (!currentLiterature) return;

            const { data: likes, error } = await supabase
                .from("world_likes")
                .select("*")
                .eq("world_id", currentLiterature.id);

            if (error) {
                document.getElementById("like-count").textContent =
                    "Likes unavailable";
                return;
            }

            const likeCount =
                likes ? likes.length : 0;

            document.getElementById("like-count").textContent =
                `${likeCount} ${likeCount === 1 ? "Like" : "Likes"}`;

            const userLiked =
                likes?.some(like => like.user_id === currentUser.id);

            const button =
                document.getElementById("like-button");

            if (userLiked) {
                button.classList.add("liked");
                button.textContent = "♥ Liked";
            } else {
                button.classList.remove("liked");
                button.textContent = "♡ Like";
            }
        }

        document.getElementById("like-button").addEventListener("click", async () => {
            if (!currentLiterature || !currentUser) return;

            const button =
                document.getElementById("like-button");

            const alreadyLiked =
                button.classList.contains("liked");

            if (alreadyLiked) {
                await supabase
                    .from("world_likes")
                    .delete()
                    .eq("world_id", currentLiterature.id)
                    .eq("user_id", currentUser.id);
            } else {
                const { error: likeError } = await supabase
                    .from("world_likes")
                    .insert({
                        world_id: currentLiterature.id,
                        user_id: currentUser.id
                    });

                if (!likeError) {
                    await createNotification({
                        recipientId: currentLiterature.owner_id,
                        actorId: currentUser.id,
                        worldId: currentLiterature.id,
                        type: "world_liked",
                        message: `Someone liked ${currentLiterature.title}.`,
                        link: `literature.html?id=${encodeURIComponent(currentLiterature.id)}`
                    });
                }
            }

            await loadLikes();
        });

        window.setLiteratureModerationStatus = async function (status) {
            if (!currentLiterature || !canModerateWorlds(currentPermissions)) return;

            const reasonInput =
                document.getElementById("literature-hide-reason");

            const reason =
                reasonInput ? reasonInput.value.trim() : "";

            if (status === "hidden" && !reason) {
                const message =
                    document.getElementById("literature-moderation-message");

                if (message) {
                    message.textContent =
                        "Enter a reason before hiding this literature.";
                }

                return;
            }

            const { error } = await supabase
                .from("worlds")
                .update({
                    moderation_status: status,
                    moderation_reason: status === "hidden" ? reason : null
                })
                .eq("id", currentLiterature.id);

            const message =
                document.getElementById("literature-moderation-message");

            if (error) {
                if (message) message.textContent = error.message;
                return;
            }

            const logReason =
                status === "hidden"
                    ? reason
                    : `Literature "${currentLiterature.title || "Untitled Literature"}" restored to visible.`;

            await supabase
                .from("moderation_logs")
                .insert({
                    target_user_id: currentLiterature.owner_id,
                    moderator_id: currentUser.id,
                    action: `literature_${status}`,
                    reason: logReason,
                    expires_at: null
                });

            if (status === "hidden") {
                await createNotification({
                    recipientId: currentLiterature.owner_id,
                    actorId: currentUser.id,
                    worldId: currentLiterature.id,
                    type: "world_hidden",
                    message: `Your literature "${currentLiterature.title || "Untitled Literature"}" was hidden by moderation. Reason: ${reason}`,
                    link: "dashboard.html"
                });
            }

            if (status === "visible") {
                await createNotification({
                    recipientId: currentLiterature.owner_id,
                    actorId: currentUser.id,
                    worldId: currentLiterature.id,
                    type: "world_restored",
                    message: `Your literature "${currentLiterature.title || "Untitled Literature"}" was restored by moderation.`,
                    link: `literature.html?id=${encodeURIComponent(currentLiterature.id)}`
                });
            }

            if (message) {
                message.textContent =
                    `Literature set to ${status}.`;
            }

            setTimeout(() => {
                window.location.reload();
            }, 700);
        };

        function setupReportSystem() {
            const reportBtn =
                document.getElementById("report-literature-btn");

            const modal =
                document.getElementById("report-modal");

            const closeBtn =
                document.getElementById("close-report-btn");

            const submitBtn =

            if (!reportBtn) return;

            reportBtn.addEventListener("click", () => {
                modal.style.display = "flex";
            });

            closeBtn.addEventListener("click", () => {
                modal.style.display = "none";
            });

            submitBtn.addEventListener("click", submitLiteratureReport);
        }

        async function submitLiteratureReport() {
            if (!currentLiterature) return;

            const reason =
                document.getElementById("report-reason").value;

            const details =
                document.getElementById("report-details").value.trim();

            const { error } = await supabase
                .from("reports")
                .insert({
                    reporter_id: currentUser.id,
                    reported_user_id: currentLiterature.owner_id,
                    world_id: currentLiterature.id,
                    report_type: "literature",
                    reason,
                    details,
                    status: "open"
                });

            if (error) {
                alert(error.message);
                return;
            }

            document.getElementById("report-modal").style.display =
                "none";

            alert("Report submitted.");
        }

        function showNotFound(message) {
            document.getElementById("book-title").textContent =
                "Literature not found";

            document.getElementById("book-creator").textContent = "";
            document.getElementById("book-summary").textContent = message;

            document.getElementById("chapter-reader-inner").innerHTML = "";
            document.getElementById("book-tags").innerHTML =
                `<span class="tag">Not Found</span>`;

            document.getElementById("like-button").style.display = "none";
            document.getElementById("like-count").style.display = "none";
        }

        function showContentBlocked(literature) {
            document.querySelector("main").innerHTML = `
                <section class="content-warning-panel">
                    <h1>Content Hidden</h1>

                    <p class="empty">
                        This literature is hidden by your content safety settings.
                    </p>

                    <div class="warning-list">
                        ${(literature.content_warnings || []).map(warning => `
                            <span class="warning-pill">
                                ${escapeHtml(formatWarningLabel(warning))}
                            </span>
                        `).join("")}
                    </div>

                    <a class="button" href="explore.html">Back to Explore</a>
                </section>
            `;
        }

        function showContentWarning(literature) {
            document.querySelector("main").innerHTML = `
                <section class="content-warning-panel">
                    <h1>Content Warning</h1>

                    <p class="empty">
                        This literature may contain sensitive or mature content.
                    </p>

                    <div class="warning-list">
                        ${literature.content_rating === "adult" ? `
                            <span class="warning-pill">Adult 18+</span>
                        ` : ""}

                        ${(literature.content_warnings || []).map(warning => `
                            <span class="warning-pill">
                                ${escapeHtml(formatWarningLabel(warning))}
                            </span>
                        `).join("")}
                    </div>

                    <div style="display:flex;gap:12px;flex-wrap:wrap;">
                        <button id="continue-warning-button" class="button">
                            Continue Anyway
                        </button>

                        <a class="button" href="explore.html">
                            Go Back
                        </a>
                    </div>
                </section>
            `;

            document
                .getElementById("continue-warning-button")
                .addEventListener("click", () => {
                    window.location.href =
                        `literature.html?id=${encodeURIComponent(literature.id)}&contentOk=${encodeURIComponent(literature.id)}`;
                });
        }

        function formatWarningLabel(value) {
            return String(value || "")
                .replaceAll("_", " ")
                .replace(/\b\w/g, letter => letter.toUpperCase());
        }

        function escapeHtml(value) {
            return String(value || "")
                .replaceAll("&", "&amp;")
                .replaceAll("<", "&lt;")
                .replaceAll(">", "&gt;")
                .replaceAll('"', "&quot;")
                .replaceAll("'", "&#039;");
        }

        function formatCreditType(value) {
            return String(value || "")
                .replaceAll("_", " ")
                .replace(/\b\w/g, letter => letter.toUpperCase());
        }

        function buildCreditPill({
            type,
            name,
            username,
            url,
            note,
            ownerUsername,
            context = "Image"
        }) {
            type =
                type || "no_credit_needed";

            if (type === "no_credit_needed") {
                return "";
            }

            let label = "";
            let href = "";

            if (type === "own_work") {
                label =
                    `${context} Credit: @${ownerUsername || "creator"}`;

                if (ownerUsername) {
                    href =
                        `profile.html?user=${encodeURIComponent(ownerUsername)}`;
                }
            } else if (
                type === "nullverse_creator" &&
                username
            ) {
                label =
                    `${context} Credit: @${username}`;

                href =
                    `profile.html?user=${encodeURIComponent(username)}`;
            } else {
                label =
                    `${context} Credit: ${name || formatCreditType(type)}`;

                href =
                    url || "";
            }

            const tooltipContent = `
                <strong>${escapeHtml(context)} Credit</strong>
                <br>
                Source: ${escapeHtml(name || username || ownerUsername || formatCreditType(type))}
                ${note ? `<br><br>${escapeHtml(note)}` : ""}
            `;

            const tooltip = `
                <span class="credit-tooltip">
                    ${tooltipContent}
                </span>
            `;

            if (href) {
                return `
                    <a class="credit-pill"
                       href="${escapeHtml(href)}"
                       ${href.startsWith("http") ? 'target="_blank"' : ""}>
                        ${escapeHtml(label)}
                        ${tooltip}
                    </a>
                `;
            }

            return `
                <span class="credit-pill">
                    ${escapeHtml(label)}
                    ${tooltip}
                </span>
            `;
        }

        window.logOut = async function () {
            await supabase.auth.signOut();
            window.location.href = "login.html";
        };
    </script>
</body>
</html>
